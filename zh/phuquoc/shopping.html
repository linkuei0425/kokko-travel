                    ],
                    mart: [
                        {n:"日落小鎮便利超商 (Mini Marts)", f:"充滿歐洲風情的街道上隱藏著幾間便利商店，提供各式進口飲料、冰淇淋、啤酒與零食解饞。", a:"Sunset Town, Phú Quốc", t:"🚶 步行遊覽"},
                        {n:"安泰傳統市場 (Chợ An Thới)", f:"想體驗最在地的生活？南島的安泰傳統市場可以買到超便宜的熱帶水果與各式海鮮乾貨。", a:"Chợ An Thới, Phú Quốc", t:"🚗 搭乘 Grab 前往南島市區"},
                        {n:"纜車站輕食補給站", f:"準備搭乘長達 20 分鐘的跨海纜車前，可以先在這裡購買一些輕食、瓶裝水與小零食帶上車。", a:"Ga An Thới", t:"🚶 位於纜車站內"}
                    ],
                    hobby: [
                        {n:"親吻橋專屬紀念品店 (Kiss Bridge Shop)", f:"專賣南島地標「親吻橋」主題的浪漫明信片、情侶對飾、馬克杯與各式唯美文創小物。", a:"Sunset Town, Phú Quốc", t:"🚶 靠近親吻橋入口處"},
                        {n:"藝術畫廊與陶藝工作室", f:"日落小鎮的藝術街區內，有當地藝術家進駐，販售手繪富國島風景畫與獨一無二的手作陶藝品。", a:"Sunset Town Art District", t:"🚶 日落小鎮內步行"},
                        {n:"海洋風居家工藝品店", f:"販售由貝殼、海星(非活體)與漂流木等海洋元素製成的精美居家裝飾品與風鈴。", a:"Ga An Thới Area", t:"🚶 步行於南島街道"}
                    ]
                }
            }
        };

        const catsMap = {
            souvenir: { icon: "🛍️", name: "必買伴手禮", bg: "bg-sky-50 text-sky-700 hover:bg-sky-600 hover:text-white border-sky-200" },
            fashion:  { icon: "👗", name: "商場與服飾", bg: "bg-fuchsia-50 text-fuchsia-700 hover:bg-fuchsia-600 hover:text-white border-fuchsia-200" },
            beauty:   { icon: "✨", name: "藥妝與保養", bg: "bg-teal-50 text-teal-700 hover:bg-teal-600 hover:text-white border-teal-200" },
            mart:     { icon: "🛒", name: "超市與便利店", bg: "bg-emerald-50 text-emerald-700 hover:bg-emerald-600 hover:text-white border-emerald-200" },
            hobby:    { icon: "🎨", name: "文創與特色小物", bg: "bg-amber-50 text-amber-700 hover:bg-amber-600 hover:text-white border-amber-200" }
        };

        let currentCity = "center"; // 預設視圖：中島
        let currentCat = "souvenir"; 

        const cityContainer = document.getElementById('city-container');
        const categoryContainer = document.getElementById('category-container');
        const shopContainer = document.getElementById('shop-container');

        // Nav Arrows 滾動功能
        function scrollNav(containerId, offset) {
            const container = document.getElementById(containerId);
            if (container) {
                container.scrollBy({ left: offset, behavior: 'smooth' });
            }
        }

        function initUI() {
            // 設定區域順序 (中島、北島、南島)
            const cityOrder = ['center', 'north', 'south'];
            
            cityOrder.forEach(cityKey => {
                if(db[cityKey]) {
                    const btn = document.createElement('button');
                    btn.className = `city-btn whitespace-nowrap px-6 py-2.5 rounded-full border border-sky-200 bg-white text-sky-700 font-bold hover:bg-sky-100 hover:text-sky-900 shadow-sm ${cityKey === currentCity ? 'active' : ''}`;
                    btn.innerText = db[cityKey].name;
                    btn.onclick = () => {
                        document.querySelectorAll('.city-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        currentCity = cityKey;
                        renderContent();
                    };
                    cityContainer.appendChild(btn);
                }
            });

            // 渲染類別
            Object.keys(catsMap).forEach(catKey => {
                const c = catsMap[catKey];
                const btn = document.createElement('button');
                btn.className = `tab-btn whitespace-nowrap px-5 py-2.5 rounded-full border transition-all font-bold shadow-sm flex items-center ${c.bg} ${catKey === currentCat ? 'active' : ''}`;
                btn.innerHTML = `<span class="mr-1.5 text-lg">${c.icon}</span> ${c.name}`;
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCat = catKey;
                    renderContent();
                };
                categoryContainer.appendChild(btn);
            });

            // 載入預設視圖
            renderContent();
        }

        function renderContent() {
            shopContainer.innerHTML = '';
            const items = db[currentCity].cat[currentCat];

            if(!items || items.length === 0) {
                shopContainer.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 text-lg font-bold">此區域目前沒有該類別的推薦項目。</div>`;
                return;
            }

            items.forEach((item, index) => {
                // 生成 Google Maps URL (替換關鍵字為 Phú Quốc Vietnam)
                const pureAddress = item.a.split('<br>')[0];
                const encodedQuery = encodeURIComponent(`${item.n} Phú Quốc Vietnam ${pureAddress}`);
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;

                const card = document.createElement('div');
                card.className = `bg-white rounded-2xl shadow-sm border border-sky-50 p-6 flex flex-col justify-between hover:shadow-lg transition-shadow duration-300 transform hover:-translate-y-1 animate-fade-in`;
                card.style.animationDelay = `${index * 0.05}s`;
                
                card.innerHTML = `
                    <div>
                        <div class="flex items-start justify-between mb-4">
                            <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                                ${item.n}
                            </h3>
                        </div>
                        <div class="space-y-4">
                            <div class="flex items-start">
                                <i class="fa-solid fa-star text-amber-400 mt-0.5 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-xs text-sky-500 font-bold mb-1 uppercase tracking-wider">亮點特色</p>
                                    <p class="text-sm text-slate-600 leading-relaxed font-medium">${item.f}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <i class="fa-solid fa-location-dot text-sky-500 mt-0.5 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-xs text-sky-500 font-bold mb-1 uppercase tracking-wider">地址</p>
                                    <p class="text-sm text-slate-600 font-medium">${item.a}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <i class="fa-solid fa-motorcycle text-sky-500 mt-0.5 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-xs text-sky-500 font-bold mb-1 uppercase tracking-wider">交通指南</p>
                                    <span class="inline-block bg-sky-50 text-sky-700 text-xs px-2.5 py-1 rounded-md font-bold text-left leading-normal">${item.t}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-6 pt-4 border-t border-sky-50">
                        <a href="${mapsUrl}" target="_blank" rel="noopener noreferrer" 
                           class="w-full flex items-center justify-center gap-2 px-4 py-3 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white btn-maps focus:outline-none transition-colors">
                            <i class="fa-solid fa-map-location-dot text-lg"></i>
                            在 Google Maps 中打開
                        </a>
                    </div>
                `;
                shopContainer.appendChild(card);
            });
        }

        window.onload = initUI;
    </script>
</body>
</html>
