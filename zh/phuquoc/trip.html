                                    {selectedRegion}
                                </h2>
                                <p className="text-slate-500 font-medium">
                                    探索 {selectedCategory} 的最佳推薦行程
                                </p>
                            </div>
                            <span className="bg-orange-100 text-orange-600 text-xs font-black px-4 py-1.5 rounded-full tracking-widest uppercase">
                                Editor's Choice
                            </span>
                        </div>

                        {/* Responsive Card List */}
                        {currentData.length > 0 ? (
                            <section className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-2 gap-6 lg:gap-8">
                                {currentData.map((item, index) => (
                                    <article 
                                        key={index} 
                                        className="bg-white rounded-3xl border border-slate-100 p-8 flex flex-col justify-between transition-all duration-500 animate-fade-in card-shadow group"
                                        style={{ animationDelay: `${index * 0.1}s` }}
                                    >
                                        <div>
                                            <div className="flex items-center gap-2 mb-4">
                                                <div className="bg-orange-50 p-1.5 rounded-lg group-hover:scale-110 transition-transform">
                                                    <Sparkles className="w-5 h-5 text-orange-500"/>
                                                </div>
                                                <h3 className="text-xl md:text-2xl font-bold text-slate-900 leading-snug">
                                                    {item.title}
                                                </h3>
                                            </div>
                                            <p className="text-slate-500 text-base md:text-lg mb-8 leading-relaxed font-normal">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-3 bg-sky-600 hover:bg-sky-700 text-white font-bold py-4 px-8 rounded-2xl transition-all shadow-md hover:shadow-xl w-full sm:w-auto text-center"
                                            >
                                                <span>查看優惠票券</span>
                                                <ExternalLink className="w-4 h-4 opacity-90" />
                                            </a>
                                        </div>
                                    </article>
                                ))}
                            </section>
                        ) : (
                            <div className="bg-white rounded-3xl border-2 border-dashed border-slate-200 p-20 text-center">
                                <div className="text-slate-400 mb-4 flex justify-center">
                                    <Info className="w-12 h-12" />
                                </div>
                                <h3 className="text-xl font-bold text-slate-800 mb-2">尚無行程推薦</h3>
                                <p className="text-slate-500">請嘗試選擇其他區域或分類探索。</p>
                            </div>
                        )}

                        {/* Secondary Navigation / Global Exploration */}
                        <div className="mt-20 flex flex-col items-center">
                            <a 
                                href={`https://www.klook.com/zh-TW/search/result/?query=%E5%AF%8C%E5%9C%8B%E5%B3%B6&aid=117232`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="group inline-flex items-center justify-center gap-3 bg-slate-900 text-white font-black py-5 px-12 rounded-full shadow-2xl transition-all duration-300 hover:scale-105 hover:bg-sky-600"
                            >
                                <span className="text-lg">探索更多 {selectedRegion.split(' ')[0]} 私房景點</span>
                                <ExternalLink className="w-6 h-6 group-hover:translate-x-1 group-hover:-translate-y-1 transition-transform" />
                            </a>
                        </div>
                    </main>

                    <Footer />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
