                    { title: '越南 4G 上網卡 (富國機場領取)', description: '抵達機場實體領取，提供穩定高速的上網服務，方便在島上隨時導航、叫 Grab、查資料與分享海島美照。', link: 'https://www.klook.com/zh-TW/activity/117294-4g-sim-card-phu-quoc-airport-pick-up-for-vietnam/?spm=SearchResult.SearchResult_LIST&clickId=88ee710a66&aid=117232' }
                ]
            }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('北島 (珍珠區)');
            const [selectedCategory, setSelectedCategory] = useState('景點門票');

            const currentData = itineraryData[selectedRegion]?.[selectedCategory] || [];

            return (
                <div className="min-h-screen bg-sky-50 font-sans text-slate-800 pb-12">
                    {/* Header */}
                    <header className="bg-white shadow-sm sticky top-0 z-10 border-b border-sky-100">
                        <div className="max-w-7xl mx-auto px-4 py-4 md:py-6">
                            <div className="flex items-center justify-between gap-2 mb-4">
                                <div className="flex items-center gap-2">
                                    <MapPin className="text-sky-600 w-6 h-6 md:w-8 md:h-8" />
                                    <h1 className="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-sky-600 to-teal-500">
                                        富國島票券與行程指南
                                    </h1>
                                </div>
                                <a
                                    href="https://linkuei0425.github.io/PhuQuoc/"
                                    className="hidden md:flex items-center gap-1.5 px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 bg-sky-600 text-white hover:bg-sky-700 shadow-sm"
                                >
                                    <Home className="w-4 h-4" />
                                    回到首頁
                                </a>
                            </div>
                            
                            {/* Region Selection */}
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                <a
                                    href="https://linkuei0425.github.io/PhuQuoc/"
                                    className="md:hidden flex items-center justify-center gap-1.5 whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 bg-sky-600 text-white hover:bg-sky-700 shadow-sm"
                                >
                                    <Home className="w-4 h-4" />
                                    回到首頁
                                </a>
                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => {
                                            setSelectedRegion(region);
                                            if (!itineraryData[region]?.[selectedCategory]) {
                                                const availableCategories = Object.keys(itineraryData[region] || {});
                                                if (availableCategories.length > 0) {
                                                    setSelectedCategory(availableCategories[0]);
                                                }
                                            }
                                        }}
                                        className={`whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 ${
                                            selectedRegion === region
                                            ? 'bg-orange-500 text-white shadow-md'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-sky-50 hover:text-sky-600'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {/* Category Tabs */}
                        <div className="flex flex-wrap gap-2 md:gap-3 mb-8">
                            {CATEGORIES.map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 px-4 py-2.5 rounded-lg border text-sm font-bold transition-all ${
                                        selectedCategory === id
                                        ? 'border-sky-500 bg-sky-50 text-sky-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4" />
                                    {id}
                                </button>
                            ))}
                        </div>

                        {/* Section Header */}
                        <div className="mb-6 flex items-center gap-2">
                            <h2 className="text-2xl font-bold text-slate-800">
                                {selectedRegion} - {selectedCategory} <span className="text-sky-600">精選</span>
                            </h2>
                        </div>

                        {/* Card List */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4 md:gap-6">
                                {currentData.map((item, index) => (
                                    <div 
                                        key={index} 
                                        className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col justify-between hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 animate-fade-in"
                                        style={{ animationDelay: `${index * 0.05}s` }}
                                    >
                                        <div>
                                            <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-3 leading-tight flex items-start gap-2">
                                                <span className="text-orange-500 mt-1"><Sparkles className="w-5 h-5"/></span>
                                                {item.title}
                                            </h3>
                                            <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed font-medium">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-4 border-t border-slate-100 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-sm hover:shadow-md w-full sm:w-auto"
                                            >
                                                <Info className="w-4 h-4" />
                                                <span>查看詳情</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-80" />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl border border-dashed border-slate-300 p-12 text-center flex flex-col items-center justify-center">
                                <h3 className="text-lg font-medium text-slate-700 mb-2">
                                    此分類目前沒有推薦項目
                                </h3>
                                <p className="text-slate-500">請嘗試選擇其他區域或分類探索更多。</p>
                            </div>
                        )}

                        {/* Global Exploration Button */}
                        <div className="mt-12 flex justify-center">
                            <a 
                                href={`https://www.klook.com/zh-TW/search/result/?query=%E5%AF%8C%E5%9C%8B%E5%B3%B6&aid=117232`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-sky-600 to-teal-500 hover:from-sky-700 hover:to-teal-600 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1"
                            >
                                <span className="tracking-wide">探索更多 {selectedRegion.split(' ')[0]} 行程</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
