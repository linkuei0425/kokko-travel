<body class="selection:bg-blue-200 selection:text-blue-900 flex flex-col min-h-screen">

    <!-- AAO: 提供給 AI 代理與語音朗讀器的隱藏網頁大綱 -->
    <div class="sr-only">
        此網頁是 Kokko Travel 提供的峴港與會安交通路線查詢系統。您可以選擇出發點與目的地，系統將自動為您規劃包含 Danabus 公車、會安 LK02 巴士、機場接駁與巴拿山專車的最短轉乘路徑與耗時。
    </div>

    <!-- React 渲染容器 -->
    <div id="root" class="flex-grow flex flex-col w-full"></div>

    <script type="text/babel">
        // --- 1. 資料庫建置 (峴港、會安及巴拿山交通系統) ---
        const transportData = {
            D12: [ // Danabus 12 號線 (沿海觀光線)
                { c: "D12-01", n: "壽光碼頭", e: "Thọ Quang", a: "山茶半島入口" },
                { c: "D12-02", n: "東海公園", e: "Bien Dong Park", a: "美溪沙灘北段、白鴿廣場" },
                { c: "D12-03", n: "美溪沙灘", e: "My Khe Beach", a: "絕美沙灘、海鮮餐廳街" },
                { c: "D12-04", n: "樂天瑪特", e: "Lotte Mart", a: "採買伴手禮、韓式超市" },
                { c: "D12-05", n: "Helio 夜市", e: "Helio Center", a: "文青夜市、亞洲公園" }
            ],
            LK02: [ // 跨省公車 (峴港 - 會安)
                { c: "LK02-01", n: "峴港中央車站", e: "Da Nang Bus Station", a: "長途巴士轉乘" },
                { c: "LK02-02", n: "峴港大學", e: "University of Da Nang", a: "市中心西側" },
                { c: "LK02-03", n: "龍橋 (西側)", e: "Dragon Bridge West", a: "粉紅教堂 (步行5分)、韓市場" },
                { c: "LK02-04", n: "五行山", e: "Marble Mountains", a: "石灰岩洞穴、大理石山" },
                { c: "LK02-05", n: "會安公車站", e: "Hoi An Bus Station", a: "會安古鎮轉乘中心" }
            ],
            AIR: [ // 機場接駁 / 市區路線
                { c: "A1-01", n: "峴港國際機場", e: "Da Nang Airport (DAD)", a: "國際/國內航廈" },
                { c: "A1-02", n: "阮文靈路", e: "Nguyen Van Linh St", a: "市中心金融區" },
                { c: "A1-03", n: "龍橋 (西側)", e: "Dragon Bridge West", a: "龍橋、愛情鎖橋、占婆博物館" },
                { c: "A1-04", n: "美溪沙灘", e: "My Khe Beach", a: "轉乘 D12 號線" }
            ],
            HOI: [ // 會安當地接駁/電車
                { c: "H-01", n: "會安公車站", e: "Hoi An Bus Station", a: "會安對外巴士總站" },
                { c: "H-02", n: "古鎮入口 (北側)", e: "Ancient Town North", a: "會安古鎮、日本橋" },
                { c: "H-03", n: "安邦海灘", e: "An Bang Beach", a: "熱門海景餐廳區" },
                { c: "H-04", n: "迦南島碼頭", e: "Cam Thanh Wharf", a: "竹籃船體驗" }
            ],
            BAN: [ // 巴拿山接駁巴士 (通常為旅遊巴士或私人包車路徑)
                { c: "B-01", n: "龍橋 (西側)", e: "Dragon Bridge West", a: "市區旅遊巴士起點" },
                { c: "B-02", n: "巴拿山纜車站", e: "Ba Na Hills Station", a: "佛手金橋、法國村、太陽世界遊樂園" }
            ]
        };

        const lineColors = {
            D12: { bg: 'bg-sky-500', border: 'border-sky-500', text: 'text-sky-700', name: '🚌 Danabus 12 號線' },
            LK02: { bg: 'bg-yellow-500', border: 'border-yellow-500', text: 'text-yellow-700', name: '🚍 會安跨省公車 LK02' },
            AIR: { bg: 'bg-blue-600', border: 'border-blue-600', text: 'text-blue-800', name: '✈️ 機場接駁路線' },
            HOI: { bg: 'bg-emerald-500', border: 'border-emerald-500', text: 'text-emerald-700', name: '🚲 會安觀光接駁/電車' },
            BAN: { bg: 'bg-indigo-600', border: 'border-indigo-600', text: 'text-indigo-800', name: '🚠 巴拿山接駁巴士/包車' }
        };

        // 轉乘節點映射：寫清楚具體位置
        const aliasMap = {
            "龍橋 (西側)": "市中心樞紐 (龍橋西側/近韓市場)",
            "美溪沙灘": "沿海樞紐 (美溪沙灘中心區)",
            "會安公車站": "會安轉運中心 (古鎮外圍)"
        };

        let allStationsMap = {};
        let uniquePhysicalStations = {}; 

        Object.keys(transportData).forEach(lineKey => {
            transportData[lineKey].forEach(st => {
                allStationsMap[st.c] = { ...st, line: lineKey };
                let baseName = aliasMap[st.n] || st.n;

                if (!uniquePhysicalStations[baseName]) {
                    uniquePhysicalStations[baseName] = { name: baseName, en: st.e, codes: [], attractions: st.a };
                }
                uniquePhysicalStations[baseName].codes.push(st.c);
                if (st.a && !uniquePhysicalStations[baseName].attractions.includes(st.a)) {
                    uniquePhysicalStations[baseName].attractions += (uniquePhysicalStations[baseName].attractions ? "、" : "") + st.a;
                }
            });
        });

        const graph = {};
        const BUS_TIME = 6; 
        const BANA_RIDE_TIME = 45; 
        const TRANSFER_TIME = 10; 

        function addEdge(u, v, weight, type, line) {
            if (!graph[u]) graph[u] = [];
            graph[u].push({ node: v, weight, type, line });
        }

        Object.keys(transportData).forEach(lineKey => {
            const lineArr = transportData[lineKey];
            const weight = lineKey === 'BAN' ? BANA_RIDE_TIME : BUS_TIME;
            for (let i = 0; i < lineArr.length - 1; i++) {
                addEdge(lineArr[i].c, lineArr[i+1].c, weight, 'ride', lineKey);
                addEdge(lineArr[i+1].c, lineArr[i].c, weight, 'ride', lineKey);
            }
        });

        Object.values(uniquePhysicalStations).forEach(station => {
            if (station.codes.length > 1) {
                for (let i = 0; i < station.codes.length; i++) {
                    for (let j = i + 1; j < station.codes.length; j++) {
                        addEdge(station.codes[i], station.codes[j], TRANSFER_TIME, 'transfer', null);
                        addEdge(station.codes[j], station.codes[i], TRANSFER_TIME, 'transfer', null);
                    }
                }
            }
        });

        function findShortestPath(startBaseName, endBaseName) {
            if (startBaseName === endBaseName) return null;
            const startCodes = uniquePhysicalStations[startBaseName].codes;
            const endCodes = uniquePhysicalStations[endBaseName].codes;
            const dist = {};
            const prev = {};
            const pq = [];
            Object.keys(allStationsMap).forEach(node => { dist[node] = Infinity; prev[node] = null; });
            startCodes.forEach(code => { dist[code] = 0; pq.push({ node: code, dist: 0 }); });

            while (pq.length > 0) {
                pq.sort((a, b) => a.dist - b.dist);
                const { node, dist: currentDist } = pq.shift();
                if (dist[node] < currentDist) continue;
                if (endCodes.includes(node)) return reconstructPath(prev, node);

                if (graph[node]) {
                    graph[node].forEach(edge => {
                        const alt = currentDist + edge.weight;
                        if (alt < dist[edge.node]) {
                            dist[edge.node] = alt;
                            prev[edge.node] = { node: node, edgeFromPrev: edge };
                            pq.push({ node: edge.node, dist: alt });
                        }
                    });
                }
            }
            return null;
        }

        function reconstructPath(prev, endNode) {
            const path = [];
            let curr = endNode;
            while (curr) {
                const step = prev[curr];
                if (step) { path.unshift({ node: curr, edge: step.edgeFromPrev }); curr = step.node; }
                else { path.unshift({ node: curr, edge: null }); curr = null; }
            }
            const legs = [];
            if (path.length < 2) return [];
            let currentLeg = { 
                type: path[1].edge.type, 
                line: path[1].edge.line, 
                nodes: [path[0].node, path[1].node],
                time: path[1].edge.weight,
                stops: path[1].edge.type === 'ride' ? 1 : 0
            };
            for (let i = 2; i < path.length; i++) {
                const edge = path[i].edge;
                if (edge.type === currentLeg.type && edge.line === currentLeg.line) {
                    currentLeg.nodes.push(path[i].node);
                    currentLeg.time += edge.weight;
                    if(edge.type === 'ride') currentLeg.stops += 1;
                } else {
                    legs.push(currentLeg);
                    currentLeg = { type: edge.type, line: edge.line, nodes: [path[i-1].node, path[i].node], time: edge.weight, stops: edge.type === 'ride' ? 1 : 0 };
                }
            }
            legs.push(currentLeg);
            return legs;
        }

        const { useState, useEffect } = React;

        const App = () => {
            const [startStation, setStartStation] = useState("峴港國際機場");
            const [endStation, setEndStation] = useState("巴拿山纜車站");
            const [route, setRoute] = useState(null);

            useEffect(() => { lucide.createIcons(); });

            useEffect(() => {
                if(startStation && endStation && startStation !== endStation) {
                    const legs = findShortestPath(startStation, endStation);
                    setRoute(legs);
                } else { setRoute(null); }
            }, [startStation, endStation]);

            const handleSwap = () => {
                const temp = startStation;
                setStartStation(endStation);
                setEndStation(temp);
            };

            return (
                <div className="flex flex-col min-h-screen">
                    <header role="banner" className="bg-blue-800 text-white shadow-md pt-8 sm:pt-12 pb-8 sm:pb-10 px-4 sm:px-6 text-center">
                        <div className="max-w-4xl mx-auto">
                            <div className="flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-6 mb-3 sm:mb-4">
                                <h1 className="text-2xl sm:text-3xl md:text-4xl font-extrabold tracking-tight flex items-center justify-center gap-2 sm:gap-3 order-2 sm:order-1">
                                    <i data-lucide="map" className="w-7 h-7 sm:w-8 sm:h-8 text-yellow-300" aria-hidden="true"></i>
                                    峴港交通路線指南
                                </h1>
                                <a href="https://kokko-travel.com/zh/danang/" aria-label="回到 Kokko Travel 峴港旅遊首頁" className="inline-flex items-center justify-center px-4 py-2 sm:px-5 sm:py-2.5 text-sm sm:text-base font-bold text-blue-800 bg-white hover:bg-blue-50 rounded-lg sm:rounded-xl transition-all shadow-sm hover:shadow-md order-1 sm:order-2 group">
                                    <i data-lucide="home" className="w-4 h-4 sm:w-5 sm:h-5 mr-1.5 group-hover:-translate-y-0.5 transition-transform" aria-hidden="true"></i>
                                    回到首頁
                                </a>
                            </div>
                            <p className="text-blue-100/90 text-sm sm:text-base">峴港公車、會安巴士與巴拿山旅遊接駁路線自動查詢</p>
                        </div>
                    </header>

                    <main role="main" className="flex-grow w-full max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 -mt-6 sm:-mt-8">
                        {/* 深度 RWD 響應式表單設計 */}
                        <div className="bg-white rounded-2xl sm:rounded-3xl shadow-xl p-5 sm:p-6 md:p-8 mb-8 relative border border-blue-50" aria-label="交通路線搜尋表單">
                            <div className="flex flex-col md:flex-row gap-4 sm:gap-5 md:items-center">
                                {/* 出發點 */}
                                <div className="relative w-full flex-1">
                                    <label htmlFor="start-station" className="text-xs sm:text-sm font-bold text-slate-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-blue-500 shadow-sm"></span> 出發點 (From)
                                    </label>
                                    <div className="relative group">
                                        <select id="start-station" aria-label="選擇出發站點" className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm sm:text-base rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3.5 pr-10 font-bold transition-all group-hover:bg-slate-100 appearance-none" value={startStation} onChange={(e) => setStartStation(e.target.value)}>
                                            {Object.keys(transportData).map(lineKey => (
                                                <optgroup key={`start-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                    {transportData[lineKey].map(st => {
                                                        const baseName = aliasMap[st.n] || st.n;
                                                        return <option key={`start-${st.c}`} value={baseName}>[{st.c}] {st.n} ({st.e})</option>;
                                                    })}
                                                </optgroup>
                                            ))}
                                        </select>
                                        <div className="pointer-events-none absolute inset-y-0 right-0 top-0 flex items-center px-4 text-slate-500">
                                            <i data-lucide="chevron-down" className="w-4 h-4 sm:w-5 sm:h-5"></i>
                                        </div>
                                    </div>
                                </div>

                                {/* 交換按鈕 (手機版直向，電腦版橫向) */}
                                <div className="relative flex justify-center z-10 shrink-0 md:mt-7 -my-2 md:my-0">
                                    <button onClick={handleSwap} aria-label="對調出發與目的站點" className="bg-yellow-500 hover:bg-yellow-600 text-white p-2.5 sm:p-3 rounded-full shadow-md transition-transform hover:scale-110 focus:outline-none focus:ring-2 focus:ring-yellow-400 focus:ring-offset-2 border-2 border-white md:border-none">
                                        <i data-lucide="arrow-down-up" className="w-5 h-5 md:hidden" aria-hidden="true"></i>
                                        <i data-lucide="arrow-right-left" className="w-5 h-5 hidden md:block" aria-hidden="true"></i>
                                    </button>
                                </div>

                                {/* 目的地 */}
                                <div className="relative w-full flex-1">
                                    <label htmlFor="end-station" className="text-xs sm:text-sm font-bold text-slate-500 uppercase tracking-widest mb-2 flex items-center gap-2">
                                        <span className="w-2 h-2 rounded-full bg-yellow-500 shadow-sm"></span> 目的地 (To)
                                    </label>
                                    <div className="relative group">
                                        <select id="end-station" aria-label="選擇目的站點" className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm sm:text-base rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3.5 pr-10 font-bold transition-all group-hover:bg-slate-100 appearance-none" value={endStation} onChange={(e) => setEndStation(e.target.value)}>
                                            {Object.keys(transportData).map(lineKey => (
                                                <optgroup key={`end-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                    {transportData[lineKey].map(st => {
                                                        const baseName = aliasMap[st.n] || st.n;
                                                        return <option key={`end-${st.c}`} value={baseName}>[{st.c}] {st.n} ({st.e})</option>;
                                                    })}
                                                </optgroup>
                                            ))}
                                        </select>
                                        <div className="pointer-events-none absolute inset-y-0 right-0 top-0 flex items-center px-4 text-slate-500">
                                            <i data-lucide="chevron-down" className="w-4 h-4 sm:w-5 sm:h-5"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* AAO: aria-live="polite" 確保動態更動會被語音閱讀器唸出 */}
                        <div aria-live="polite">
                            {startStation === endStation ? (
                                <div className="bg-blue-50 border border-blue-100 text-blue-800 p-5 rounded-2xl text-center shadow-sm font-bold text-base sm:text-lg animate-fade-in">
                                    📍 您已經在目的地附近囉！
                                </div>
                            ) : route ? (
                                <RouteTimeline legs={route} destName={endStation} />
                            ) : (
                                <div className="text-center text-slate-500 py-12 bg-white rounded-2xl shadow-sm border border-slate-100 font-medium">
                                    抱歉，目前這兩站之間尚無直接公車連網...
                                </div>
                            )}
                        </div>
                        
                        <div className="mt-8 sm:mt-10 bg-blue-50/80 rounded-2xl p-5 sm:p-6 text-sm text-blue-800 space-y-3 border border-blue-100 shadow-sm">
                            <p className="font-extrabold flex items-center gap-2 text-base"><i data-lucide="info" className="w-5 h-5 text-blue-600"></i> 自由行攻略建議：</p>
                            <ul className="list-disc pl-5 space-y-2 font-medium leading-relaxed">
                                <li><strong>市中心樞紐 (龍橋西側)：</strong> 此點位於占婆博物館與漢江畔，是前往巴拿山或會安巴士的關鍵轉乘地，步行 5-10 分鐘可達粉紅教堂與韓市場。</li>
                                <li><strong>巴拿山交通：</strong> 建議提前預訂共享接駁車；多人同行則可選擇 <strong>Grab 包車</strong> (含司機等候)。</li>
                                <li><strong>會安觀光電車：</strong> 從峴港搭 LK02 巴士抵達會安車站後，可轉乘當地綠色電車進入古鎮。</li>
                            </ul>
                        </div>
                    </main>
                    
                    {/* Footer (Copyright & Legal) */}
                    <footer role="contentinfo" className="border-t border-blue-200/50 mt-12 sm:mt-16 bg-blue-50/50 w-full">
                        <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10 sm:py-12 text-center">
                            <div className="bg-white rounded-2xl p-6 sm:p-8 shadow-sm border border-blue-100 inline-block w-full text-center">
                                <p className="text-slate-700 font-bold mb-2 text-sm sm:text-base">Copyright &copy; 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
                                <p className="text-slate-500 text-xs sm:text-sm mb-1">版權所有，未經授權禁止轉載、翻印或任何商業用途。</p>
                                <p className="text-slate-500 text-xs sm:text-sm">本站包含之圖片、文字內容及程式碼均受法律保護。</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };

        const RouteTimeline = ({ legs, destName }) => {
            const totalTime = legs.reduce((acc, leg) => acc + leg.time, 0);
            const totalTransfers = legs.filter(l => l.type === 'transfer').length;
            const destInfo = uniquePhysicalStations[destName];

            return (
                <div className="bg-white rounded-2xl sm:rounded-3xl shadow-xl overflow-hidden border border-slate-50 animate-fade-in" itemScope itemType="https://schema.org/Trip">
                    <meta itemProp="name" content={`從出發地至${destName}的交通路徑`} />
                    <div className="bg-slate-50 border-b border-slate-100 p-5 sm:p-6 flex justify-between items-center">
                        <div>
                            <p className="text-xs sm:text-sm font-bold text-slate-500 mb-1 uppercase tracking-wider">預估總耗時</p>
                            <p className="text-3xl sm:text-4xl font-black text-slate-800 tracking-tight">{totalTime} <span className="text-base sm:text-lg font-bold text-slate-500">分鐘</span></p>
                        </div>
                        <div className="text-right">
                            <p className="text-xs sm:text-sm font-bold text-slate-500 mb-1 uppercase tracking-wider">轉乘次數</p>
                            <p className="text-xl sm:text-2xl font-black text-slate-700">{totalTransfers} <span className="text-sm sm:text-base font-bold text-slate-500">次</span></p>
                        </div>
                    </div>

                    <div className="p-5 sm:p-8">
                        <div className="ml-4 sm:ml-6">
                            {legs.map((leg, idx) => (
                                <LegItem key={idx} leg={leg} isLast={idx === legs.length - 1} destName={destName} />
                            ))}
                        </div>
                        {/* 終點站 */}
                        <div className="relative pl-8 sm:pl-10 border-l-4 border-transparent" itemScope itemProp="itinerary" itemType="https://schema.org/Place">
                            <div className="absolute left-[-10px] top-1 w-4 h-4 bg-slate-800 rounded-full border-4 border-white shadow-sm z-10" aria-hidden="true"></div>
                            <h3 className="text-lg sm:text-xl font-extrabold text-slate-800" itemProp="name">{destInfo.name} <span className="text-sm font-semibold text-slate-500 ml-1.5">{destInfo.en}</span></h3>
                            <p className="text-sm font-bold text-slate-500 mb-2 mt-0.5">📍 抵達目的地 (Arrive)</p>
                            {destInfo.attractions && (
                                <div className="mt-3 bg-blue-50 border border-blue-100 rounded-xl p-3 sm:p-4 text-sm flex gap-3 shadow-sm">
                                    <i data-lucide="map-pin" className="w-5 h-5 sm:w-6 sm:h-6 text-blue-600 shrink-0 mt-0.5" aria-hidden="true"></i>
                                    <div>
                                        <span className="font-extrabold text-blue-900 block mb-1 text-sm sm:text-base">周邊地標與景點：</span>
                                        <span className="text-blue-800 font-medium leading-relaxed" itemProp="description">{destInfo.attractions}</span>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const LegItem = ({ leg, isLast, destName }) => {
            const startNodeCode = leg.nodes[0];
            const endNodeCode = leg.nodes[leg.nodes.length - 1];
            const startStation = allStationsMap[startNodeCode];
            const endStation = allStationsMap[endNodeCode];

            if (leg.type === 'transfer') {
                return (
                    <div className="relative pl-8 sm:pl-10 pb-8 sm:pb-10 border-l-4 border-dashed border-slate-300">
                        <div className="absolute left-[-14px] top-1 w-6 h-6 bg-white rounded-full border-2 border-slate-400 z-10 flex items-center justify-center shadow-sm" aria-hidden="true">
                            <i data-lucide="footprints" className="w-3.5 h-3.5 text-slate-600"></i>
                        </div>
                        <div className="bg-slate-50 border border-slate-200 rounded-xl p-3 sm:p-4 inline-block shadow-sm">
                            <p className="text-sm sm:text-base font-bold text-slate-600">於 <span className="text-slate-900 font-extrabold">{aliasMap[startStation.n] || startStation.n}</span> 轉乘車輛</p>
                            <p className="text-xs sm:text-sm font-semibold text-slate-500 mt-1.5 flex items-center gap-1.5"><i data-lucide="clock" className="w-3.5 h-3.5"></i> 步行或等待約 {leg.time} 分鐘</p>
                        </div>
                    </div>
                );
            }

            const lineTheme = lineColors[leg.line] || { bg: 'bg-slate-500', border: 'border-slate-500', text: 'text-slate-600', name: leg.line };
            return (
                <div className={`relative pl-8 sm:pl-10 pb-8 sm:pb-10 border-l-4 ${lineTheme.border}`}>
                    <div className={`absolute left-[-10px] top-1 w-4 h-4 rounded-full border-4 border-white shadow-sm z-10 ${lineTheme.bg}`} aria-hidden="true"></div>
                    <div className="mb-3">
                        <h3 className="text-base sm:text-lg font-extrabold text-slate-800">{startStation.n} <span className="text-xs sm:text-sm font-semibold text-slate-500 ml-1.5">{startStation.en}</span></h3>
                        {startStation.a && (
                            <p className="text-xs sm:text-sm font-semibold text-blue-600 mt-1.5 flex items-start gap-1.5"><i data-lucide="star" className="w-3.5 h-3.5 sm:w-4 sm:h-4 mt-0.5 shrink-0" aria-hidden="true"></i><span>{startStation.a}</span></p>
                        )}
                    </div>
                    <div className={`mt-3 sm:mt-4 border-l-4 rounded-r-xl sm:rounded-r-2xl p-4 sm:p-5 bg-white shadow-sm border-y border-r border-slate-100 group transition-all hover:shadow-md ${lineTheme.border}`}>
                        <div className="flex flex-wrap items-center gap-2 mb-2">
                            <span className={`${lineTheme.bg} text-white text-[10px] sm:text-xs font-black px-2.5 py-1 rounded-md uppercase tracking-wider shadow-sm`}>{startNodeCode}</span>
                            <span className={`text-sm sm:text-base font-extrabold ${lineTheme.text}`}>搭乘 {lineTheme.name}</span>
                        </div>
                        <p className="text-xs sm:text-sm font-medium text-slate-500 flex flex-wrap items-center gap-2 mt-2.5">
                            <span className="bg-slate-100 px-2 py-1 rounded text-slate-700 font-bold">前往 {endStation.n}</span>
                            <span className="text-slate-300">|</span>
                            <span>{leg.stops} 站</span>
                            <span className="text-slate-300">|</span>
                            <span>約 {leg.time} 分鐘</span>
                        </p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // 確保 Lucide Icons 初始載入渲染
        setTimeout(() => { lucide.createIcons(); }, 100);
    </script>
</body>
</html>
