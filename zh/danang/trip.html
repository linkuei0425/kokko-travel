                    { title: '占婆島一日遊', description: '前往擁有清澈海水與豐富珊瑚礁的占婆島，享受浮潛樂趣與新鮮海鮮大餐。', link: 'https://www.klook.com/zh-TW/activity/4791-cham-islands-day-trip-hoi-an/?spm=SearchResult.SearchResult_LIST&clickId=56194d9d16&aid=117264' }
                ],
                '體驗與娛樂': [
                    { title: '會安越南傳統奧黛租賃及寫真之旅', description: '換上飄逸的奧黛，在黃色復古牆面前拍下絕美寫真，留下難忘回憶。', link: 'https://www.klook.com/zh-TW/activity/115060-traditional-ao-dai-rental-photoshoot-hoi-an/?spm=SearchResult.SearchResult_LIST&clickId=cd4b0124ac&aid=117264' },
                    { title: '會安燈籠製作', description: '親手挑選布料與竹架，跟著師傅製作獨一無二的會安燈籠帶回家作紀念。', link: 'https://www.klook.com/zh-TW/activity/9280-lantern-making-class-hoi-an/?spm=SearchResult.SearchResult_LIST&clickId=d9d4add767&aid=117264' }
                ],
                '交通及網路': [
                    { title: '🎟️ 會安機場接送', description: '免去機場外喊價的困擾，專車司機接機，讓您安全、舒適且快速地直達市區飯店。', link: 'https://www.klook.com/zh-TW/airport-transfers/?flightDirection=1&code=DAD&spm=SearchResult.SearchResult_LIST&clickId=4bc47d4ea1&aid=117264' },
                    { title: '會安國際機場快速通道服務', description: '避開大排長龍的海關隊伍，由專人引導使用尊榮通道，省下寶貴時間。', link: 'https://www.klook.com/zh-TW/activity/86297-da-nang-airport-fast-track/?spm=SearchResult.SearchResult_LIST&clickId=2eeae9beb8&aid=117264' },
                    { title: '🎟️ 越南 5G 上網 SIM 卡', description: '抵達機場即可領取。網路穩定不斷線，出遊導航最安心。', link: 'https://www.klook.com/zh-TW/activity/16622-4g-sim-card-vietnam/?spm=SearchResult.SearchResult_LIST&clickId=8a2050b326&aid=117264' },
                    { title: '5G eSIM 越南', description: '掃描 QR Code 即可開通上網，免換實體卡超方便，導航與打卡必備。', link: 'https://www.klook.com/zh-TW/activity/123902-vietnam-esim-high-speed-internet-qr-code-voucher/?spm=SearchResult.SearchResult_LIST&clickId=d82cc57b90&aid=117264' },
                    { title: '會安包車', description: '行程完全由您作主！專屬司機帶您輕鬆暢遊中越各大景點，不受時間與路線限制。', link: 'https://www.klook.com/zh-TW/activity/6266-private-car-charter-da-nang/?spm=SearchResult.SearchResult_LIST&clickId=57f12b20e5&aid=117264' },
                    { title: '會安機場／會安 - 會安共乘巴士接送', description: '經濟實惠的交通選擇，輕鬆往返會安與會安兩大熱門城市。', link: 'https://www.klook.com/zh-TW/activity/12191-shared-shuttle-bus-transfers-between-da-nang-airport-da-nang-hoi-an-da-nang/?spm=SearchResult.SearchResult_LIST&clickId=fe88e47f4c&aid=117264' },
                    { title: '河內 - 會安/會安臥鋪大巴', description: '體驗越南特有的長途臥鋪巴士，平躺著移動，省下住宿費同時前往下一個目的地。', link: 'https://www.klook.com/zh-TW/activity/145072-hanoi-da-nang-hoi-an-cabin-sleeper-bus-by-hk-buslines/?spm=SearchResult.SearchResult_LIST&clickId=1f9e0f6f02&aid=117264' }
                ]
            },
            '順化/美山聖地': {
                '景點門票': [
                    { title: '順化皇城門票', description: '探索越南最後一個封建王朝的政治中心，親臨宏偉的宮殿建築群，感受阮朝的歷史榮光。', link: 'https://www.klook.com/zh-TW/activity/74899-hue-monuments-complex-admission-ticket/?aid=117264' }
                ],
                '一日遊': [
                    { title: '美山聖地半日遊（峴港出發）', description: '探索被列為世界文化遺產的「越南版吳哥窟」，感受千年占婆王國的神秘氣息。', link: 'https://www.klook.com/zh-TW/activity/9371-my-son-sanctuary-tour-da-nang/?spm=SearchResult.SearchResult_LIST&clickId=20d6c395c6&aid=117264' },
                    { title: '順化文化探索一日遊', description: '深度遊覽順化古都，參觀天姥寺、皇城及歷代帝王陵墓，沉浸在豐富的歷史文化中。', link: 'https://www.klook.com/zh-TW/activity/1560-hue-discovery-half-full-day-tour-hue/?aid=117264' },
                    { title: '白馬國家公園徒步一日遊', description: '遠離塵囂，深入白馬國家公園健行，欣賞壯麗的瀑布與豐富的自然生態系統。', link: 'https://www.klook.com/zh-TW/activity/11139-trekking-bach-ma-national-park-day-tour-hue/?aid=117264' }
                ],
                '交通及網路': [
                    { title: '峴港 - 順化火車票', description: '體驗越南特色鐵道之旅，沿途欣賞被譽為「天下第一雄關」的海雲嶺無敵海景。', link: 'https://affiliate.klook.com/redirect?aid=117264&aff_adid=1246766&k_site=https%3A%2F%2Fwww.klook.com%2Fzh-TW%2Factivity%2F99690-train-ticket-between-hue-danang%2F' },
                    { title: '順化租摩托車', description: '騎乘機車穿梭於順化的大街小巷，自由探索古都風情與在地隱藏版美食。', link: 'https://www.klook.com/zh-TW/activity/151839-hue-city-sightseeing-food-tour-by-motorbike/?aid=117264' }
                ]
            }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('峴港市區');
            const [selectedCategory, setSelectedCategory] = useState('景點門票');

            const currentData = itineraryData[selectedRegion]?.[selectedCategory] || [];

            return (
                <div className="flex flex-col min-h-screen">
                    {/* 頂部導覽列 */}
                    <header role="banner" className="bg-white/95 backdrop-blur-sm shadow-sm sticky top-0 z-30 border-b border-rose-100">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 sm:py-4">
                            <div className="flex items-center justify-between gap-3 mb-3 sm:mb-4">
                                <div className="flex items-center gap-2 sm:gap-3">
                                    <MapPin className="text-rose-600 w-6 h-6 sm:w-8 sm:h-8 shrink-0" />
                                    <h1 className="text-xl sm:text-2xl md:text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-rose-600 to-orange-500 tracking-tight">
                                        峴港行程推薦指南
                                    </h1>
                                </div>
                                <a
                                    href="https://kokko-travel.com/zh/danang/"
                                    aria-label="回到 Kokko Travel 峴港旅遊首頁"
                                    className="hidden md:flex items-center gap-1.5 px-5 py-2 sm:py-2.5 rounded-full text-sm font-bold transition-all duration-200 bg-rose-600 text-white hover:bg-rose-700 shadow-sm hover:shadow-md focus:ring-2 focus:ring-rose-400 focus:outline-none group"
                                >
                                    <Home className="w-4 h-4 group-hover:-translate-y-0.5 transition-transform" />
                                    回到首頁
                                </a>
                            </div>
                            
                            {/* 地區選擇 (Tabs) */}
                            <nav role="tablist" aria-label="選擇行程區域" className="flex gap-2 sm:gap-3 overflow-x-auto pb-2 scrollbar-hide -mx-4 px-4 sm:mx-0 sm:px-0">
                                <a
                                    href="https://kokko-travel.com/zh/danang/"
                                    aria-label="回到首頁"
                                    className="md:hidden shrink-0 flex items-center justify-center gap-1.5 whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 bg-rose-600 text-white hover:bg-rose-700 shadow-sm focus:ring-2 focus:ring-rose-400"
                                >
                                    <Home className="w-4 h-4" />
                                    首頁
                                </a>
                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        role="tab"
                                        aria-selected={selectedRegion === region}
                                        onClick={() => {
                                            setSelectedRegion(region);
                                            if (!itineraryData[region]?.[selectedCategory]) {
                                                const availableCategories = Object.keys(itineraryData[region] || {});
                                                if (availableCategories.length > 0) {
                                                    setSelectedCategory(availableCategories[0]);
                                                }
                                            }
                                        }}
                                        className={`shrink-0 whitespace-nowrap px-5 py-2 sm:py-2.5 rounded-full text-sm sm:text-base font-bold transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-orange-400 ${
                                            selectedRegion === region
                                            ? 'bg-orange-500 text-white shadow-md transform scale-105'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:border-orange-200 hover:bg-orange-50 hover:text-orange-600'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main role="main" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-10 flex-grow w-full">
                        {/* 分類標籤 */}
                        <section aria-label="選擇行程類別" className="flex flex-wrap gap-2 sm:gap-3 mb-8 sm:mb-10">
                            {CATEGORIES.map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    role="tab"
                                    aria-selected={selectedCategory === id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 sm:gap-2 px-4 sm:px-5 py-2 sm:py-2.5 rounded-xl border text-sm sm:text-base font-bold transition-all focus:outline-none focus:ring-2 focus:ring-rose-400 ${
                                        selectedCategory === id
                                        ? 'border-rose-500 bg-rose-50 text-rose-700 shadow-sm transform scale-105'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4 sm:w-5 sm:h-5" />
                                    {id}
                                </button>
                            ))}
                        </section>

                        {/* 內容區標題 */}
                        <div className="mb-6 flex items-center gap-2 border-l-4 border-rose-500 pl-3">
                            <h2 className="text-xl sm:text-2xl font-extrabold text-slate-800">
                                {selectedRegion} <span className="text-slate-400 mx-1">|</span> {selectedCategory} <span className="text-rose-600 ml-1">精選推薦</span>
                            </h2>
                        </div>

                        {/* 卡片列表 (深度 RWD Grid 應用，使用 aria-live 即時通報變化) */}
                        <div aria-live="polite">
                            {currentData.length > 0 ? (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 sm:gap-6 lg:gap-8">
                                    {currentData.map((item, index) => (
                                        <article 
                                            key={index} 
                                            itemScope itemType="https://schema.org/Product"
                                            className="bg-white rounded-2xl sm:rounded-3xl shadow-sm border border-rose-100/60 p-6 sm:p-7 flex flex-col justify-between hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 animate-fade-in group"
                                            style={{ animationDelay: `${index * 0.05}s` }}
                                        >
                                            <div className="flex-grow">
                                                <h3 itemProp="name" className="text-lg sm:text-xl font-extrabold text-slate-800 mb-3 sm:mb-4 leading-tight flex items-start gap-2.5 group-hover:text-rose-600 transition-colors">
                                                    <span className="text-orange-500 mt-0.5 shrink-0" aria-hidden="true"><Sparkles className="w-5 h-5 sm:w-6 sm:h-6"/></span>
                                                    {item.title}
                                                </h3>
                                                <p itemProp="description" className="text-slate-600 text-sm sm:text-base mb-6 leading-relaxed font-medium">
                                                    {item.description}
                                                </p>
                                            </div>
                                            
                                            <div className="mt-auto pt-5 border-t border-slate-100 flex justify-end">
                                                <a
                                                    itemProp="url"
                                                    href={item.link}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    aria-label={`查看 ${item.title} 的詳細說明與預訂`}
                                                    className="inline-flex items-center justify-center gap-2 bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 sm:py-3.5 px-6 rounded-xl transition-colors shadow-sm hover:shadow-md w-full focus:outline-none focus:ring-2 focus:ring-rose-400 focus:ring-offset-2 group/btn"
                                                >
                                                    <Info className="w-4 h-4 sm:w-5 sm:h-5 group-hover/btn:scale-110 transition-transform" aria-hidden="true" />
                                                    <span className="text-sm sm:text-base">詳細說明與預訂</span>
                                                    <ExternalLink className="w-4 h-4 ml-1 opacity-80" aria-hidden="true" />
                                                </a>
                                            </div>
                                        </article>
                                    ))}
                                </div>
                            ) : (
                                <div className="bg-white rounded-2xl border border-dashed border-slate-300 p-12 sm:p-16 text-center flex flex-col items-center justify-center shadow-sm">
                                    <h3 className="text-lg sm:text-xl font-bold text-slate-700 mb-2">
                                        此區域目前無對應項目的資料
                                    </h3>
                                    <p className="text-sm sm:text-base text-slate-500">請嘗試選擇其他分類或切換區域頁籤。</p>
                                </div>
                            )}
                        </div>

                        {/* 全局探索按鈕 */}
                        <div className="mt-12 sm:mt-16 flex justify-center">
                            <a 
                                href={`https://www.klook.com/zh-TW/search/result/?query=${encodeURIComponent(selectedRegion)}&aid=117264`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                aria-label={`前往 Klook 探索更多 ${selectedRegion} 的行程與票券`}
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-rose-600 to-orange-500 hover:from-rose-700 hover:to-orange-600 text-white font-bold py-4 px-8 sm:px-12 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1 hover:shadow-xl focus:outline-none focus:ring-2 focus:ring-orange-400 focus:ring-offset-2 w-full sm:w-auto"
                            >
                                <span className="tracking-wide text-sm sm:text-base">前往探索更多 {selectedRegion} 行程</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" aria-hidden="true" />
                            </a>
                        </div>
                    </main>

                    {/* Footer (Copyright & Legal) */}
                    <footer role="contentinfo" className="bg-rose-50/80 border-t border-rose-100 mt-auto w-full">
                        <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10 sm:py-12 text-center">
                            <div className="bg-white rounded-2xl p-6 sm:p-8 shadow-sm border border-rose-100 inline-block w-full">
                                <p className="text-slate-700 font-bold mb-2 text-sm sm:text-base">Copyright &copy; 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
                                <p className="text-slate-500 text-xs sm:text-sm mb-1">版權所有，未經授權禁止轉載、翻印或任何商業用途。</p>
                                <p className="text-slate-500 text-xs sm:text-sm">本站包含之圖片、文字內容及程式碼均受法律保護。</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
