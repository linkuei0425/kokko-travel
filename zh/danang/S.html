      // ================= 峴港市區 (City Center) =================

      // ================= 近郊熱門 (Outskirts) =================
      { id: 'bana_hills', city: 'outskirts', name: '巴拿山 Sun World', stay: 7, timeWindow: [8, 17], region: 14, regionName: '巴拿山', type: '打卡景點', desc: '看佛手金橋、搭世界最長纜車，並體驗最新的高山雲霄飛車。', transport: '建議訂購市區接駁巴士。', 
        bookingLinks: [

          { url: 'https://www.klook.com/zh-TW/activity/125425-sun-world-ba-na-alpine-coaster-experience/?aid=117264', text: '高山過山車' },

        ] 
      },
      { id: 'marble_mountain', city: 'outskirts', name: '五行山+會安一日遊', stay: 8, timeWindow: [8.5, 18], region: 14, regionName: '一日遊', type: '經典行程', desc: '一次走完五行山與會安古鎮，含專業導覽。', transport: '專車接送。', 
        bookingLinks: [
          { url: 'https://www.klook.com/zh-TW/activity/13570-marble-mountain-hoi-an-day-tour-da-nang/?aid=117264', text: '五行山+會安一日遊' },
          { url: 'https://www.klook.com/zh-TW/activity/147576-linh-ung-pagoda-son-tra-peninsula-marble-mountains-hoian-tour/?aid=117264', text: '靈應寺+五行山一日遊' }
        ] 
      },
      { id: 'my_son', city: 'outskirts', name: '美山聖地 (小吳哥窟)', stay: 4, timeWindow: [8, 14], region: 14, regionName: '文化遺產', type: '歷史文化', desc: '世界文化遺產，占婆王朝最重要的印度教聖地。', transport: '建議參加半日遊。',
        bookingLinks: [
          { url: 'https://www.klook.com/zh-TW/activity/9371-my-son-sanctuary-tour-da-nang/?aid=117264', text: '美山聖地半日遊' }
        ]
      },
      { id: 'nui_than_tai', city: 'outskirts', name: '紐倫泰溫泉樂園', stay: 5, timeWindow: [9, 17], region: 14, regionName: '休閒樂園', type: '打卡景點', desc: '在山林間享受溫泉、水上樂園與泥漿浴。', transport: '建議搭乘 Grab 或包車。',
        bookingLinks: [
          { url: 'https://www.klook.com/zh-TW/activity/16861-nui-than-tai-hot-springs-da-nang/?aid=117264', text: '紐倫泰溫泉門票' }
        ]
      },

      // ================= 會安古鎮 (Hoi An) =================
      { id: 'hoian_old_town', city: 'hoian', name: '會安古鎮 (含燈籠製作)', stay: 4, timeWindow: [14, 21], region: 15, regionName: '會安', type: '打卡景點', desc: '除了漫步老街，推薦體驗手作會安燈籠或租借奧黛拍照。', transport: '搭乘 LK02 公車。',
        bookingLinks: [
          { url: 'https://www.klook.com/zh-TW/activity/9280-lantern-making-class-hoi-an/?aid=117264', text: '會安燈籠製作' },
          { url: 'https://www.klook.com/zh-TW/activity/115060-traditional-ao-dai-rental-photoshoot-hoi-an/?aid=117264', text: '奧黛租借寫真' }
        ]
      },
      { id: 'coconut_boat', city: 'hoian', name: '迦南島竹籃船', stay: 2, timeWindow: [8, 16], region: 15, regionName: '會安', type: '打卡景點', desc: '瘋狂的水上旋轉表演與撒網捕魚。', transport: '搭乘 Grab。', 
        bookingLinks: [
          { url: 'https://www.klook.com/zh-TW/activity/24274-basket-boat-ticket-hoi-an-coconut-forest/?aid=117264', text: '竹籃船優惠票' }
        ] 
      },
      { id: 'memories_show', city: 'hoian', name: '會安印象秀', stay: 2, timeWindow: [19.5, 21.5], region: 15, regionName: '會安', type: '打卡景點', desc: '震撼人心的 500 人實景大秀，必看！', transport: '搭乘 Grab。', 
        bookingLinks: [
          { url: 'https://www.klook.com/zh-TW/activity/17514-hoi-an-memories-show-ticket/?aid=117264', text: '會安印象秀門票' }
        ] 
      },
      { id: 'cham_island', city: 'hoian', name: '占婆島一日遊', stay: 8, timeWindow: [8, 16], region: 15, regionName: '浮潛', type: '歷史文化', desc: '清澈的海水與豐富的珊瑚礁，適合浮潛。', transport: '包含船票接送。',
        bookingLinks: [
          { url: 'https://www.klook.com/zh-TW/activity/4791-cham-islands-day-trip-hoi-an/?aid=117264', text: '占婆島一日遊' }
        ]
      }
    ];

    const CITIES = [
      { id: 'city', name: '峴港市中心', color: 'blue' },
      { id: 'beach', name: '美溪沙灘區', color: 'cyan' },
      { id: 'sontra', name: '山茶半島', color: 'emerald' },
      { id: 'outskirts', name: '近郊與樂園', color: 'orange' },
      { id: 'hoian', name: '會安古鎮', color: 'amber' }
    ];

    // --- 核心交通與排程邏輯區 ---
    const formatTime = (h) => {
      let hh = Math.floor(h) % 24;
      let mm = Math.round((h - Math.floor(h)) * 60);
      if (mm === 60) { hh++; mm = 0; }
      return `${hh.toString().padStart(2, '0')}:${mm.toString().padStart(2, '0')}`;
    };

    const getCityColor = (cityId) => {
      const colors = { city: 'blue', beach: 'cyan', sontra: 'emerald', outskirts: 'orange', hoian: 'amber' };
      const c = colors[cityId] || 'slate';
      return `text-${c}-600 bg-${c}-100 border-${c}-200`;
    };

    const getSmartTransit = (prev, curr) => {
      if (curr.id === 'ret') return '✈️ 【行程結束】搭乘 Grab 或 預約接駁前往峴港機場 (DAD) 報到。';

      if (!prev || prev.id.startsWith('acc_') || prev.type === '起點') {
        if (curr.id === 'dad_airport') return `🛬 【抵達峴港】開啟美好的中越之旅。`;
        return `🏨 【飯店出發】準備妥當，搭乘 Grab 前往 ${curr.name}。`;
      }

      if (curr.id === 'bana_hills' || (prev && prev.id === 'bana_hills')) {
          return `🚐 【長途移動】搭乘預約的共享接駁車前往巴拿山 (約 45-60 分)。`;
      }
      
      if ((prev.city !== 'hoian' && curr.city === 'hoian') || (prev.city === 'hoian' && curr.city !== 'hoian')) {
          return `🚍 【跨城移動】搭乘黃色【LK02 巴士】或叫 Grab (約 40-50 分)。`;
      }

      if (prev.city !== curr.city) {
         return `🚗 【分區移動】搭乘 Grab 快速跨區 (約 15-25 分)。`;
      }

      return `🚶 【短程移動】從 ${prev.name} 步行或搭乘短程 Grab 抵達 ${curr.name}。`;
    };

    const getTTime = (isNewDay, fCity, tCity, fReg, tReg) => {
        let extraFarTime = 0;
        if (fCity !== tCity) {
            if (fCity === 'outskirts' || tCity === 'outskirts') extraFarTime += 0.8;
            if (fCity === 'hoian' || tCity === 'hoian') extraFarTime += 0.7;
        }
        if (isNewDay) return 0.3 + extraFarTime;
        return 0.2 + extraFarTime;
    };

    // --- 主應用程式 ---
    function App() {
      const [activeCity, setActiveCity] = useState('city');
      const [selectedIds, setSelectedIds] = useState([]);
      const [showPrintView, setShowPrintView] = useState(false);
      const [tripDuration, setTripDuration] = useState(5);

      const toggleAttr = (id) => setSelectedIds(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

      const itineraryDays = useMemo(() => {
        if (selectedIds.length === 0) return [];
        let idsToSchedule = [...new Set(selectedIds)];

        const getPriority = (item) => {
            if (item.id === 'ret') return 999;
            if (item.type === '起點') return 10;
            if (item.type === '住宿區域') return 20; 
            let win = item.timeWindow || [9.5, 21.5];
            const isNight = (['夜市美食', '夜景體驗'].includes(item.type)) || item.id === 'memories_show';
            if (isNight) return 90; 
            if (win[1] <= 18) return 30; 
            return 50; 
        };

        const sorted = idsToSchedule
          .map(id => ATTRACTIONS.find(a => a.id === id))
          .filter(a => a)
          .sort((a, b) => {
            const getSortKey = (item) => {
              let sk = getPriority(item);
              let cityGroup = CITIES.findIndex(c => c.id === item.city);
              return cityGroup * 100000 + sk * 1000; 
            };
            return getSortKey(a) - getSortKey(b);
          });

        let remaining = [...sorted];
        let days = [];
        let curDay = { items: [], dayCity: 'city', dayType: null, currentTime: 13.0 }; 
        let lCity = 'city', lReg = 11, prevItemObj = null; 

        const checkValid = (a, isF, curTime) => {
            let tTime = getTTime(isF, lCity, a.city, lReg, a.region);
            let arrivalTime = curTime + tTime;
            let isLastDay = days.length === tripDuration - 1;
            if (!isF) {
                if (!['住宿區域', '起點'].includes(a.type)) {
                    if (a.city !== lCity) {
                        if (remaining.some(r => r.city === lCity && !['住宿區域', '起點'].includes(r.type))) return false;
                        if (curTime > 15) return false;
                    }
                }
            }
            let win = a.timeWindow || [9, 22]; 
            if (['住宿區域', '起點'].includes(a.type)) win = [0, 24];
            let waitTime = arrivalTime < win[0] ? win[0] - arrivalTime : 0;
            if (waitTime > 2.0 && !isF) return false;
            let actStart = arrivalTime + waitTime;
            let actEnd = actStart + a.stay;
            if (actStart >= win[1] - 0.5) return false; 
            if (isLastDay) {
                let retTFromA = getTTime(false, a.city, 'city', a.region, 10);
                if (actEnd > (14.0 - 2.5 - retTFromA)) return false;
            } else if (!isF && actEnd > 23.5) return false;
            return { valid: true, tTime, waitTime, actStart, actEnd };
        };

        while (remaining.length > 0) {
            const isF = curDay.items.length === 0;
            let chosenIdx = -1, chosenStats = null, validCands = [];
            for (let i = 0; i < remaining.length; i++) {
                let stats = checkValid(remaining[i], isF, curDay.currentTime);
                if (stats && stats.valid) validCands.push({ a: remaining[i], idx: i, prio: getPriority(remaining[i]), stats });
            }
            if (validCands.length > 0) {
                validCands.sort((ca, cb) => {
                    let isSameCityA = ca.a.city === lCity ? 1 : 0, isSameCityB = cb.a.city === lCity ? 1 : 0;
                    if (isSameCityA !== isSameCityB) return isSameCityB - isSameCityA;
                    if (ca.prio !== cb.prio) return ca.prio - cb.prio;
                    return ca.idx - cb.idx; 
                });
                chosenIdx = validCands[0].idx; chosenStats = validCands[0].stats;
            }
            if (chosenIdx === -1) {
                days.push(curDay);
                if (days.length >= tripDuration) break;
                curDay = { items: [], dayCity: remaining[0].city, dayType: null, currentTime: 9.0 };
                continue;
            }
            const a = remaining.splice(chosenIdx, 1)[0];
            const { tTime, waitTime, actStart, actEnd } = chosenStats;
            if (isF && days.length === 0) prevItemObj = { id: 'origin', city: 'city', name: '抵達點/機場', type: '起點' };
            if (isF && days.length > 0) prevItemObj = { id: 'acc_city', city: a.city, name: `住宿地`, type: '住宿區域' }; 
            let sTime = curDay.currentTime, aTime = sTime + tTime;
            let transitMsg = getSmartTransit(prevItemObj, a) + `\n📍 交通指南：${a.transport}`;
            let win = a.timeWindow || [9, 22];
            if (actStart - aTime > 0 && win[0] > 0 && !['住宿區域', '起點'].includes(a.type)) transitMsg += `\n💡 建議：此景點 ${win[0]}:00 後較佳，預計 ${formatTime(aTime)} 抵達可先休息。`;
            curDay.items.push({ ...a, tTime: tTime.toFixed(1), prevName: prevItemObj.name, transitTransport: transitMsg, tStr: `${formatTime(sTime)} - ${formatTime(aTime)}`, sStr: `${formatTime(actStart)} - ${formatTime(actEnd)}`, isFirstPoint: (isF && days.length === 0), endTime: actEnd });
            curDay.currentTime = actEnd; lCity = a.city; lReg = a.region; prevItemObj = a;
            if (isF) curDay.dayCity = a.city;
        }
        if (curDay.items.length > 0 && days.length < tripDuration) days.push(curDay);
        while (days.length < tripDuration) days.push({ items: [], dayCity: lCity, dayType: null, currentTime: 9.0 });
        
        let lastD = days[days.length-1];
        if (!lastD) { lastD = { items: [], dayCity: 'city', dayType: null, currentTime: 9.0 }; days.push(lastD); }
        while (lastD.items.length > 0) {
            let lastItem = lastD.items[lastD.items.length-1];
            if (lastItem.endTime > (14.0 - 2.5 - getTTime(false, lastItem.city, 'city', lastItem.region, 10))) lastD.items.pop();
            else break;
        }
        if (lastD.items.length > 0) { let lastItem = lastD.items[lastD.items.length-1]; lastD.currentTime = lastItem.endTime; lCity = lastItem.city; lReg = lastItem.region; prevItemObj = lastItem; }
        else { lastD.currentTime = 9.0; lReg = 11; prevItemObj = { name: '住宿地', city: lCity }; }
        let retT = getTTime(lastD.items.length === 0, lCity, 'city', lReg, 10), startTransit = 14.0 - 2.5 - retT;
        lastD.items.push({ id: 'ret', city: 'city', name: '行程圓滿結束/前往機場', stay: 2.5, region: 999, regionName: '機場', type: '起點', desc: '帶著滿滿的紀念品與回憶，準備前往機場。峴港機場國際航線建議提早 2.5 小時報到。', transport: '搭乘 Grab 直達機場。', tTime: retT.toFixed(1), prevName: prevItemObj.name, transitTransport: '🚐 搭乘 Grab 或預約接駁前往機場報到。', tStr: `${formatTime(startTransit)} - ${formatTime(14.0 - 2.5)}`, sStr: `${formatTime(14.0 - 2.5)} - 14:00`, isFirstPoint: false, endTime: 14.0 });
        lastD.currentTime = 14.0;

        return days.map((d, i) => ({ dayNum: i+1, totalH: (d.currentTime - (i === 0 ? 13.0 : 9.0) > 0 ? (d.currentTime - (i === 0 ? 13.0 : 9.0)).toFixed(1) : "0.0"), cityName: CITIES.find(c => c.id === d.dayCity)?.name || '峴港', items: d.items }));
      }, [selectedIds, tripDuration]);

      if (showPrintView) {
        return (
          <div className="min-h-screen bg-white p-4 sm:p-8">
            <div className="max-w-3xl mx-auto border-2 border-blue-900 p-4 sm:p-8 rounded-2xl">
              <div className="text-center mb-10"><h1 className="text-2xl sm:text-3xl font-bold">🇻🇳 峴港與會安自由行 行程表</h1><p className="mt-2 text-slate-500 text-sm">智慧排程系統自動為您計算交通與分潤票券連結</p></div>
              {itineraryDays.map(d => (
                <div key={d.dayNum} className="mb-10 print-break-avoid">
                  <h2 className="text-xl font-bold border-b-2 border-blue-100 pb-2 mb-6">🌊 第 {d.dayNum} 天 - 【{d.cityName}】 ({d.totalH}h)</h2>
                  <div className="space-y-6 ml-2 sm:ml-4 border-l-2 pl-4 sm:pl-6 border-blue-200">
                    {d.items.map((it, idx) => (
                      <div key={`${it.id}-${idx}`} className="relative mb-8">
                        {!it.isFirstPoint && (
                          <div className="mb-4 bg-blue-50 border border-blue-100 rounded-lg p-3 text-xs sm:text-sm">
                             <div className="font-bold mb-2 text-blue-800">{it.prevName} ➔ {it.name}</div>
                             <div className="flex gap-3 mb-2"><span className="bg-white px-2 py-1 rounded border font-mono text-blue-600"><i className="fa-regular fa-clock"></i> {it.tStr}</span><span>交通預計：{it.tTime}h</span></div>
                             <div className="whitespace-pre-wrap text-slate-600">{it.transitTransport}</div>
                          </div>
                        )}
                        <div className="relative">
                          <div className="absolute -left-[23px] sm:-left-[31px] top-1 w-3 h-3 bg-blue-600 rounded-full border-2 border-white"></div>
                          <div className="font-bold text-xs sm:text-sm text-slate-500 mb-1"><i className="fa-regular fa-clock"></i> {it.sStr}</div>
                          <h4 className="text-lg sm:text-xl font-bold text-slate-900">{it.name}</h4>
                          <p className="text-xs sm:text-sm text-slate-600 my-2 leading-relaxed">{it.desc}</p>
                          {it.bookingLinks && <div className="mt-3 flex gap-2 flex-wrap print:hidden">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" className="bg-[#ff5b00] text-white text-xs px-2.5 py-1.5 rounded-full font-bold hover:bg-[#e05000]"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              <div className="mt-10 text-center flex flex-col sm:flex-row justify-center gap-4 print-hidden">
                <button onClick={() => setShowPrintView(false)} className="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-700">返回編輯</button>
                <button onClick={() => window.print()} className="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-500">列印行程 / 儲存 PDF</button>
              </div>
            </div>
          </div>
        );
      }

      const grouped = ATTRACTIONS.filter(a => a.city === activeCity && !a.id.startsWith('acc_')).reduce((acc, c) => { (acc[c.type] = acc[c.type] || []).push(c); return acc; }, {});

      return (
        <div className="min-h-screen bg-blue-50 pb-10">
          <header className="bg-white p-4 shadow-sm flex flex-wrap justify-between items-center sticky top-0 z-20 border-b gap-3">
            <div className="flex items-center gap-4">
              <h1 className="font-bold text-xl flex items-center gap-2"><i className="fa-solid fa-wand-magic-sparkles text-blue-600"></i>峴港行程魔法師</h1>
              <a href="https://linkuei0425.github.io/DaNang/" className="hidden sm:flex items-center gap-1.5 text-xs font-bold text-slate-500 hover:text-blue-600 bg-slate-100 hover:bg-blue-50 px-3 py-1.5 rounded-full border border-slate-200"><i className="fa-solid fa-house"></i> 回到首頁</a>
            </div>
            <div className="flex items-center gap-3">
              {selectedIds.length > 0 && <button onClick={() => setSelectedIds([])} className="text-xs font-bold text-red-500 hover:text-white border border-red-500 hover:bg-red-500 px-3 py-1.5 rounded-full shadow-sm flex items-center gap-1 cursor-pointer"><i className="fa-solid fa-trash-can"></i> 清空</button>}
              <div className="text-xs font-bold bg-blue-900 text-white px-3 py-1.5 rounded-full shadow-sm">已選 {selectedIds.length} 站</div>
            </div>
          </header>
          
          <main className="max-w-7xl mx-auto p-4 flex flex-col lg:flex-row gap-6 mt-2">
            <div className="lg:w-1/2 flex flex-col gap-4">
              <div className="bg-white p-2 rounded-xl flex gap-2 overflow-x-auto shadow-sm custom-scrollbar">
                {CITIES.map(c => <button key={c.id} onClick={() => setActiveCity(c.id)} className={`px-5 py-2.5 rounded-lg text-sm font-bold whitespace-nowrap transition-all ${activeCity === c.id ? 'bg-blue-600 text-white shadow-md' : 'bg-white hover:bg-blue-50 text-slate-600'}`}>{c.name}</button>)}
              </div>
              <div className="bg-white rounded-xl shadow-sm p-4 border border-blue-100">
                <h2 className="text-sm font-bold flex items-center gap-2 mb-1"><i className="fa-solid fa-circle-info text-blue-500"></i>排程說明</h2>
                <p className="text-xs text-slate-500">點選左側景點，右側將自動產出 3-7 日行程。已為您整合 AID:117264 分潤連結！</p>
              </div>
              <div className="max-h-[65vh] overflow-y-auto space-y-6 pr-2 custom-scrollbar">
                {Object.entries(grouped).length === 0 ? <p className="text-center py-10 text-slate-400">請點選上方區域開始</p> : 
                  Object.entries(grouped).map(([type, items]) => (
                    <div key={type} className="mb-6">
                      <h3 className="font-bold text-slate-700 mb-3 sticky top-0 bg-blue-50/90 py-2 backdrop-blur-sm z-10 border-b border-blue-200">{type}</h3>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        {items.map(it => (
                          <div key={it.id} onClick={() => toggleAttr(it.id)} className={`p-4 rounded-xl cursor-pointer border-2 transition-all ${selectedIds.includes(it.id) ? 'bg-blue-50 border-blue-500 scale-[1.02] shadow-md' : 'bg-white border-transparent shadow-sm hover:border-slate-300'}`}>
                            <div className="font-bold text-slate-900 mb-2">{it.name}</div>
                            <div className="text-[10px] flex gap-2 mb-2"><span className="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600"><i className="fa-regular fa-clock mr-1"></i>{it.stay}h</span><span className={`px-1.5 py-0.5 rounded border ${getCityColor(it.city)}`}><i className="fa-solid fa-location-dot"></i> {it.regionName}</span></div>
                            <p className="text-xs text-slate-500 line-clamp-2">{it.desc}</p>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))
                }
              </div>
            </div>

            <div className="lg:w-1/2">
              <div className="bg-white rounded-2xl shadow-xl border border-blue-100 overflow-hidden flex flex-col max-h-[85vh] sticky top-24">
                <div className="bg-blue-900 text-white p-5 lg:p-6">
                  <h2 className="text-xl font-bold flex items-center gap-2"><i className="fa-regular fa-calendar-check text-blue-300"></i>您的排程表</h2>
                  <div className="flex flex-wrap gap-2 mt-4">
                    <select value={tripDuration} onChange={(e) => setTripDuration(Number(e.target.value))} className="flex-1 sm:flex-none bg-blue-800 text-white font-bold py-3 px-3 rounded-xl border border-blue-700"><option value={3}>3 日</option><option value={4}>4 日</option><option value={5}>5 日</option><option value={6}>6 日</option><option value={7}>7 日</option></select>
                    <button onClick={() => setSelectedIds([])} className={`flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-4 py-3 rounded-xl font-bold shadow-lg transition-all ${selectedIds.length > 0 ? 'bg-red-500 text-white' : 'bg-blue-800 text-blue-400'}`}><i className="fa-solid fa-rotate-right"></i><span>重設</span></button>
                    <button onClick={() => setShowPrintView(true)} disabled={itineraryDays.length === 0} className="w-full sm:flex-1 bg-sky-500 py-3 px-2 rounded-xl font-bold text-white text-sm sm:text-base cursor-pointer disabled:opacity-30">產生詳細行程</button>
                  </div>
                </div>
                <div className="p-6 overflow-y-auto flex-1 custom-scrollbar bg-slate-50/50">
                  {itineraryDays.length === 0 ? <div className="text-center text-slate-400 py-24 flex flex-col items-center gap-4"><i className="fa-solid fa-umbrella-beach text-6xl opacity-10"></i><p>尚未選擇任何景點，請點選左側卡片</p></div> : 
                    itineraryDays.map(d => (
                      <div key={d.dayNum} className="mb-10">
                        <h3 className="font-bold text-lg mb-4 border-b-2 border-blue-100 pb-2 flex items-center gap-2 text-blue-900"><i className="fa-solid fa-sun text-yellow-500"></i> 第 {d.dayNum} 天 - 【{d.cityName}】 <span className="text-xs font-normal text-slate-400 ml-auto">累計: {d.totalH}h</span></h3>
                        <div className="space-y-5 border-l-[3px] border-blue-100 ml-4 pl-7 relative pb-4">
                          {d.items.map((it, idx) => (
                            <div key={`${it.id}-${idx}`} className="relative mb-6">
                              {!it.isFirstPoint && (
                                <div className="mb-4 relative">
                                  <div className="absolute -left-[40px] top-1/2 -translate-y-1/2 w-4 h-4 bg-white rounded-full border-2 border-blue-200 flex items-center justify-center shadow-sm z-10"><i className="fa-solid fa-arrow-down text-[8px] text-blue-300"></i></div>
                                  <div className={`rounded-lg p-3 text-[11px] border shadow-sm ${it.transitTransport.includes('跨城') || it.transitTransport.includes('巴拿山') ? 'bg-orange-50 border-orange-100' : 'bg-blue-50/70 border-blue-100'}`}>
                                    <div className={`font-bold mb-1.5 ${it.transitTransport.includes('跨城') || it.transitTransport.includes('巴拿山') ? 'text-orange-800' : 'text-blue-800'}`}>{it.prevName} ➔ {it.name}</div>
                                    <div className="flex items-center gap-3 mb-1.5"><span className={`bg-white px-2 py-0.5 rounded border font-mono shadow-sm ${it.transitTransport.includes('跨城') || it.transitTransport.includes('巴拿山') ? 'border-orange-200 text-orange-600' : 'border-blue-200 text-blue-600'}`}><i className="fa-regular fa-clock mr-1"></i> {it.tStr}</span><span className={`font-medium ${it.transitTransport.includes('跨城') || it.transitTransport.includes('巴拿山') ? 'text-orange-600' : 'text-blue-600'}`}>交通約 {it.tTime}h</span></div>
                                    <div className="text-slate-600 whitespace-pre-wrap leading-relaxed">{it.transitTransport}</div>
                                  </div>
                                </div>
                              )}
                              <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative hover:shadow-md transition-shadow">
                                <div className="absolute -left-[37px] top-4 w-4.5 h-4.5 bg-blue-500 rounded-full border-[3px] border-white shadow-sm z-10"></div>
                                <div className="text-xs font-bold text-slate-400 mb-1"><i className="fa-regular fa-clock"></i> 停留: {it.sStr}</div>
                                <h4 className="font-bold text-base mb-1">{it.name}</h4>
                                <p className="text-xs text-slate-500 leading-relaxed">{it.desc}</p>
                                {it.bookingLinks && <div className="mt-3 flex gap-1.5 flex-wrap">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-[9px] px-2.5 py-1 rounded-full font-bold transition-colors shadow-sm"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))
                  }
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
