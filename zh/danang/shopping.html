                        {n:"曼泰漁村市場 (Chợ Mân Thái)",f:"想要感受最純粹的在地生活？清晨來這裡看漁民卸貨拍賣。雖然主要是生鮮，但也有一些在地乾貨可以挖掘。",a:"105 Võ Nguyên Giáp, Mân Thái, Sơn Trà",t:"🚌 【公車】搭乘 Danabus 05 號線沿著海岸線往北。<br>🚗 【Grab】從美溪沙灘中心區搭 Grab 往北約 5-10 分鐘，建議清晨 6-7 點前往最震撼。"},
                        {n:"Joly Mart",f:"精緻型質感超市。引進許多歐美日韓進口食品，以及高品質的生鮮水果，是美溪沙灘區外國人的物資補給站。",a:"31 Yên Bái, 海洲郡 (沙灘區過橋即達)",t:"🚶 【步行】實際地址位於韓江西岸，但從沙灘區過橋即達。<br>🚗 【Grab】從美溪沙灘搭 Grab 過橋僅需 3-5 分鐘，非常便利。"}
                    ],
                    hobby: [
                        {n:"夜市雜貨區",f:"山茶夜市後半段有許多販售特色吊飾、越南傳統竹編工藝、藤編包與手機殼的攤位。",a:"山茶夜市內",t:"🚶 【步行】同樣位於龍橋東側橋頭，每晚 18:00 後攤販陸續出來，建議晚上氣候涼爽時慢慢逛。"}
                    ]
                }
            },
            hoian: {
                name: "會安古鎮",
                cat: {
                    souvenir: [
                        {n:"會安手工燈籠 (Lanterns)",f:"古鎮代表！可摺疊的紙燈籠或綢緞燈籠，帶回家妝點空間非常有氛圍，建議選 LED 版本。",a:"購買地點：會安夜市 (Hoi An Night Market)",t:"🚶 【步行】古鎮內傍晚禁行汽機車。請步行跨過秋盆河上的安會橋 (An Hoi Bridge)，下橋後沿途滿是燈籠攤位。"},
                        {n:"手工肉桂木製品 (Cinnamon)",f:"會安特產肉桂。有肉桂粉或肉桂木雕刻而成的牙籤筒、杯墊，散發天然且迷人的香氣。",a:"購買地點：會安古鎮老街內的選物店",t:"🚶 【步行】老街核心區步行即可找到多家專門店。<br>🚐 【跨城接駁】從峴港搭乘 LK02 公車或 Klook 共乘巴士抵達會安外圍，再步行進入。"},
                        {n:"客製化皮革製品 (Leather Goods)",f:"會安是知名的皮革中心。從皮包、皮夾到外套，24小時內即可依需求完全客製化生產。",a:"購買地點：Friendly Shoe Shop 或 皮革一條街",t:"🚶 【步行】老街中心區域 (Trần Phú 街周邊) 店家最為密集，該區為行人與自行車專區。"},
                        {n:"文創精品選物 (Lifestyle)",f:"包含 Sunday in Hoi An 的質感家居，以及 Reaching Out 聽障藝術家手作陶瓷，極具藝術價值。",a:"購買地點：Sunday in Hoi An / Reaching Out",t:"🚶 【步行】均位於老街中心區域，逛古蹟時一定會經過，適合順道造訪。"}
                    ],
                    mart: [
                        {n:"會安中央市場 (Hoi An Central Market)",f:"位於秋盆河畔，歷史悠久。這裡有豐富的特色香料、茶葉、即食海鮮與傳統手工藝品，是古鎮內最具魅力的市場。",a:"Trần Quý Cáp, Cẩm Châu, Hội An",t:"🚶 【步行】沿著古鎮秋盆河岸 (Bạch Đằng 街) 往東邊走到底即可抵達，旁邊也是搭乘觀光小船的地方。"},
                        {n:"會安夜市 (Hoi An Night Market)",f:"五顏六色的燈籠街！除了拍照，這裡的小吃攤與文創飾品攤位非常多，是會安夜晚購物的主戰場。",a:"Nguyễn Hoàng, Minh An, Hội An",t:"🚶 【步行】過安會橋即可抵達夜市區。<br>🚗 【Grab】若從會安外圍的度假村出發，可搭 Grab 至夜市街口下車。"}
                    ],
                    fashion: [
                        {n:"Friendly Shoe Shop",f:"會安最誠實的鞋店。以不二價與高品質聞名，提供最快當天取件的客製化真皮手工鞋服務。",a:"18 Trần Phú, 會安古鎮",t:"🚶 【步行】位於老街東側入口處 (Trần Phú 街頭)，徒步區內。<br>🚲 【自行車】許多會安飯店有提供免費自行車，騎車前往非常愜意。"},
                        {n:"Metiseko (有機棉服飾)",f:"結合法式設計與越南頂級有機棉。印花優雅，材質吸濕排汗，非常適合海島氣候穿著。",a:"142 Trần Phú, 會安古鎮",t:"🚶 【步行】位於會安古鎮老街核心區，鄰近日本橋與多家著名咖啡廳。"}
                    ],
                    hobby: [
                        {n:"Sunday in Hoi An",f:"IG 最熱門的網美雜貨店。粉嫩色調與精緻編織產品，商品包裝極美，是買禮物的好去處。",a:"76 Trần Phú, 會安古鎮",t:"🚶 【步行】位於古鎮老街中心，門口有極具標誌性的粉色裝飾，步行經過絕對不會錯過。"},
                        {n:"Reaching Out Charity Shop",f:"具社會意義的商店。販售由身障藝術家手製的精美陶瓷與銀飾，作工細膩且質感非凡。",a:"103 Trần Phú, 會安古鎮",t:"🚶 【步行】古鎮老街中心，緊鄰著名的「無聲茶館」，建議喝完下午茶後順便購買紀念品。"}
                    ]
                }
            }
        };

        const catsMap = {
            souvenir: { icon: "🛍️", name: "伴手禮", bg: "bg-sky-50 text-sky-700 hover:bg-sky-600 hover:text-white border-sky-200" },
            mart:     { icon: "🛒", name: "超市/市場", bg: "bg-emerald-50 text-emerald-700 hover:bg-emerald-600 hover:text-white border-emerald-200" },
            fashion:  { icon: "👗", name: "服飾百貨", bg: "bg-indigo-50 text-indigo-700 hover:bg-indigo-600 hover:text-white border-indigo-200" },
            hobby:    { icon: "🧸", name: "文創雜貨", bg: "bg-amber-50 text-amber-700 hover:bg-amber-600 hover:text-white border-amber-200" }
        };

        let currentCity = "haichau"; 
        let currentCat = "souvenir"; 

        const cityContainer = document.getElementById('city-container');
        const categoryContainer = document.getElementById('category-container');
        const shopContainer = document.getElementById('shop-container');

        function initUI() {
            // 區域選單
            const cities = Object.keys(db);
            cities.forEach(cityKey => {
                const btn = document.createElement('button');
                btn.setAttribute('role', 'tab');
                btn.setAttribute('aria-selected', cityKey === currentCity ? 'true' : 'false');
                btn.className = `city-btn whitespace-nowrap px-5 sm:px-6 py-2.5 sm:py-3 rounded-full border border-sky-200 bg-white text-sky-700 font-bold text-sm sm:text-base hover:bg-sky-100 hover:text-sky-900 shadow-sm focus:outline-none focus:ring-2 focus:ring-sky-400 ${cityKey === currentCity ? 'active transform scale-105' : ''}`;
                btn.innerText = db[cityKey].name;
                btn.onclick = () => {
                    document.querySelectorAll('.city-btn').forEach(b => {
                        b.classList.remove('active', 'transform', 'scale-105');
                        b.setAttribute('aria-selected', 'false');
                    });
                    btn.classList.add('active', 'transform', 'scale-105');
                    btn.setAttribute('aria-selected', 'true');
                    currentCity = cityKey;
                    renderContent();
                };
                cityContainer.appendChild(btn);
            });

            // 類別選單
            Object.keys(catsMap).forEach(catKey => {
                const c = catsMap[catKey];
                const btn = document.createElement('button');
                btn.setAttribute('role', 'tab');
                btn.setAttribute('aria-selected', catKey === currentCat ? 'true' : 'false');
                btn.className = `tab-btn whitespace-nowrap px-4 sm:px-5 py-2 sm:py-2.5 rounded-full border transition-all font-bold text-sm sm:text-base shadow-sm flex items-center focus:outline-none focus:ring-2 focus:ring-sky-400 ${c.bg} ${catKey === currentCat ? 'active transform scale-105' : ''}`;
                btn.innerHTML = `<span class="mr-1.5 sm:mr-2 text-base sm:text-lg" aria-hidden="true">${c.icon}</span> ${c.name}`;
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        b.classList.remove('active', 'transform', 'scale-105');
                        b.setAttribute('aria-selected', 'false');
                    });
                    btn.classList.add('active', 'transform', 'scale-105');
                    btn.setAttribute('aria-selected', 'true');
                    currentCat = catKey;
                    renderContent();
                };
                categoryContainer.appendChild(btn);
            });

            renderContent();
        }

        function renderContent() {
            shopContainer.innerHTML = '';
            const items = db[currentCity].cat[currentCat];

            if(!items || items.length === 0) {
                shopContainer.innerHTML = `<div class="col-span-full text-center py-12 sm:py-16 text-slate-400 text-base sm:text-lg font-bold bg-white rounded-2xl shadow-sm border border-slate-100 animate-fade-in">此區域目前尚無該類別推薦，請切換其他區域或類別試試。</div>`;
                return;
            }

            // AEO / GEO 優化：透過 itemscope itemtype="https://schema.org/LocalBusiness" 賦予結構化語意
            items.forEach((item, index) => {
                const encodedQuery = encodeURIComponent(`${item.n} ${item.a} Vietnam`);
                const mapsUrl = `https://www-d-google-d-com-s-gmn.v.tuangouai.com/maps/search/?api=1&query=${encodedQuery}`;

                const card = document.createElement('article');
                card.setAttribute('itemscope', '');
                card.setAttribute('itemtype', 'https://schema.org/LocalBusiness');
                card.className = `bg-white rounded-2xl sm:rounded-3xl shadow-sm border border-sky-100 p-5 sm:p-6 lg:p-7 flex flex-col justify-between hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 animate-fade-in group`;
                card.style.animationDelay = `${index * 0.05}s`;
                
                card.innerHTML = `
                    <div class="flex-grow">
                        <div class="flex items-start justify-between mb-4 sm:mb-5 border-b border-sky-50 pb-3">
                            <h3 itemprop="name" class="text-lg sm:text-xl font-extrabold text-slate-800 flex items-center gap-2 group-hover:text-sky-700 transition-colors leading-tight">
                                ${item.n}
                            </h3>
                        </div>
                        <div class="space-y-4 sm:space-y-5">
                            <div class="flex items-start">
                                <i class="fa-solid fa-star text-amber-400 mt-1 mr-3 sm:mr-4 w-4 text-center shrink-0" aria-hidden="true"></i>
                                <div>
                                    <p class="text-xs sm:text-sm text-sky-500 font-bold mb-1 uppercase tracking-wider">亮點特色</p>
                                    <p itemprop="description" class="text-sm sm:text-base text-slate-600 leading-relaxed font-medium">${item.f}</p>
                                </div>
                            </div>
                            <div itemprop="address" itemscope itemtype="https://schema.org/PostalAddress" class="flex items-start">
                                <i class="fa-solid fa-location-dot text-sky-500 mt-1 mr-3 sm:mr-4 w-4 text-center shrink-0" aria-hidden="true"></i>
                                <div>
                                    <p class="text-xs sm:text-sm text-sky-500 font-bold mb-1 uppercase tracking-wider">位置描述 / 地址</p>
                                    <p itemprop="streetAddress" class="text-sm sm:text-base text-slate-700 font-bold">${item.a}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <i class="fa-solid fa-motorcycle text-sky-500 mt-1 mr-3 sm:mr-4 w-4 text-center shrink-0" aria-hidden="true"></i>
                                <div>
                                    <p class="text-xs sm:text-sm text-sky-500 font-bold mb-1 uppercase tracking-wider">交通建議</p>
                                    <span class="inline-block bg-sky-50 text-sky-700 text-xs sm:text-sm px-2.5 py-1 sm:px-3 sm:py-1.5 rounded-lg font-bold text-left leading-normal shadow-sm border border-sky-100">${item.t}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-6 sm:mt-8 pt-5 border-t border-sky-100">
                        <a itemprop="url" href="${mapsUrl}" target="_blank" rel="noopener noreferrer" aria-label="在 Google 地圖中開啟 ${item.n}"
                           class="w-full flex items-center justify-center gap-2 px-4 py-3 sm:py-3.5 border border-transparent rounded-xl shadow-sm text-sm sm:text-base font-bold text-white btn-maps focus:outline-none focus:ring-2 focus:ring-sky-400 focus:ring-offset-2 transition-all hover:shadow-md group/btn">
                            <i class="fa-solid fa-map-location-dot text-lg group-hover/btn:scale-110 transition-transform" aria-hidden="true"></i>
                            開啟 Google Maps 導航
                        </a>
                    </div>
                `;
                shopContainer.appendChild(card);
            });
        }

        function scrollNav(containerId, offset) {
            const container = document.getElementById(containerId);
            if (container) {
                container.scrollBy({ left: offset, behavior: 'smooth' });
            }
        }

        window.onload = initUI;
    </script>
</body>
</html>
