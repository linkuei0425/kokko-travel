                        { name: "Laluna Hoi An Riverside Hotel & Spa", feature: ["沿秋盆河畔而建，擁有美麗的熱帶中庭與湛藍泳池", "客房空間開闊，步行至會安夜市僅需 3 分鐘", "河景房能一覽河邊漁船與夕陽，氛圍感極佳"], address: "12 Nguyễn Du, Minh An, Hội An", url: "https://hk.trip.com/hotels/hoi-an-hotel-detail-21859285/laluna-hoi-an-riverside-hotel-and-spa/?Allianceid=7913725&SID=303242458&trip_sub1=&trip_sub3=D14727967" },
                        { name: "Little Hoi An Boutique Hotel & Spa", feature: ["裝潢溫馨且復古，細節處處可見老會安的歷史影子", "飯店位置鄰近古城邊緣，避開嘈雜人潮且生活機能優", "提供物超所值的 Spa 按摩服務與河畔下午茶"], address: "2 Thoại Ngọc Hầu, Phường Minh An, Hội An", url: "https://hk.trip.com/hotels/hoi-an-hotel-detail-2135851/little-hoi-an-boutique-hotel-and-spa/?Allianceid=7913725&SID=303242458&trip_sub1=&trip_sub3=D14727967" }
                    ],
                    "特色青旅/平價": [
                        { name: "Mad Monkey Hostel Hoi An", feature: ["全球知名派對青旅，氣氛瘋狂熱烈，設有超大社交泳池", "每晚舉辦主題活動，是認識異國旅伴的最佳平台", "床位乾淨寬敞，是背包客圈的高人氣首選"], address: "250 Cửa Đại, Cẩm Châu, Hội An", url: "https://hk.trip.com/hotels/hoi-an-hotel-detail-101211699/mad-monkey-hoi-an/?Allianceid=7913725&SID=303242458&trip_sub1=&trip_sub3=D14727967" },
                        { name: "SnapStay Hoi An (Anio Boutique)", feature: ["由 Anio 集團管理的精品風格住宿，融合在地美學與現代生活", "環境清幽並附設質感良好的共享辦公空間", "適合數位遊牧民族與追求寧靜假期的背包客"], address: "163 Cửa Đại, Cẩm Châu, Hội An", url: "https://hk.trip.com/hotels/hoi-an-hotel-detail-41618776/anio-boutique-hotel-hoi-an/?Allianceid=7913725&SID=303242458&trip_sub1=&trip_sub3=D14727967" },
                        { name: "Tribee Cotu Hostel", feature: ["以社交與交流為核心的溫馨青旅，經常舉辦料理與文化活動", "裝潢色彩斑斕且極具創意，給人賓至如歸的活潑感受", "價格經濟實惠，地理位置靠近古鎮外圍，非常便利"], address: "41 Phan Đình Phùng, Cẩm Châu, Hội An", url: "https://hk.trip.com/hotels/hoi-an-hotel-detail-128765397/tribee-cotu-hostel/?Allianceid=7913725&SID=303242458&trip_sub1=&trip_sub3=D14727967" }
                    ]
                }
            }
        };

        const districtContainer = document.getElementById('district-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const contentArea = document.getElementById('content-area');
        
        let currentDistrictKey = null;
        let currentCategoryName = null;

        // 1. 初始化區域按鈕
        function initDistrictButtons() {
            Object.keys(hotelData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-5 py-2.5 rounded-full font-bold text-sm transition-all duration-200 border area-btn-inactive shadow-sm flex-shrink-0`;
                btn.innerHTML = `<i class="fa-solid fa-map-pin mr-1.5 opacity-70"></i>${hotelData[key].name}`;
                btn.onclick = () => selectDistrict(key, btn);
                districtContainer.appendChild(btn);
            });
        }

        // 2. 選擇區域
        function selectDistrict(key, activeBtn) {
            currentDistrictKey = key;

            const allBtns = districtContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('area-btn-active');
                btn.classList.add('area-btn-inactive');
            });
            activeBtn.classList.remove('area-btn-inactive');
            activeBtn.classList.add('area-btn-active');

            categoryContainer.classList.remove('hidden');
            renderCategoryButtons();
        }

        // 3. 生成類別按鈕
        function renderCategoryButtons() {
            categoryContainer.innerHTML = '';
            const currentCategories = Object.keys(hotelData[currentDistrictKey].categories);
            
            currentCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-5 py-2 rounded-lg font-bold text-sm transition-all duration-200 border cat-btn-inactive shadow-sm`;
                btn.innerText = cat;
                btn.onclick = () => selectCategory(cat, btn);
                categoryContainer.appendChild(btn);
            });

            // 預設點擊第一個類別
            const firstCatBtn = categoryContainer.querySelector('button');
            if(firstCatBtn) {
                selectCategory(currentCategories[0], firstCatBtn);
            }
        }

        // 4. 選擇類別
        function selectCategory(categoryName, activeBtn) {
            currentCategoryName = categoryName;

            const allBtns = categoryContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('cat-btn-active');
                btn.classList.add('cat-btn-inactive');
            });
            activeBtn.classList.remove('cat-btn-inactive');
            activeBtn.classList.add('cat-btn-active');

            renderHotels();
        }

        // 5. 渲染飯店資料
        function renderHotels() {
            const districtData = hotelData[currentDistrictKey];
            const hotels = districtData.categories[currentCategoryName] || [];

            let htmlContent = `
                <div class="flex flex-col sm:flex-row sm:items-center mb-6 border-b pb-4 border-blue-100 animate-fade-in">
                    <h2 class="text-2xl font-bold text-blue-900 mr-3">
                        <i class="fa-solid fa-location-dot mr-2 text-blue-500"></i>${districtData.name}
                    </h2>
                    <span class="inline-block mt-2 sm:mt-0 px-3 py-1 bg-blue-100 text-blue-800 text-sm font-bold rounded-full border border-blue-200">
                        <i class="fa-solid fa-tag mr-1"></i>${currentCategoryName}
                    </span>
                </div>
            `;

            if (hotels.length === 0) {
                htmlContent += `<p class="text-slate-500 py-10 text-center animate-fade-in">此類別尚無推薦飯店。</p>`;
            } else {
                htmlContent += `<div class="space-y-5">`;
                
                hotels.forEach((hotel, index) => {
                    let searchUrl = hotel.url || `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(hotel.name + ' Vietnam')}`;
                    
                    const linkTagHTML = `
                        <a href="${searchUrl}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center px-5 py-2.5 mt-3 sm:mt-0 rounded-xl text-sm font-bold bg-[#ff5b00] text-white hover:bg-[#e05000] transition-colors shadow-sm cursor-pointer sm:ml-auto w-full sm:w-auto">
                            <i class="fa-solid fa-magnifying-glass mr-1.5"></i>限時最低價
                        </a>
                    `;

                    htmlContent += `
                        <div class="bg-white border border-blue-100 p-5 md:p-6 rounded-2xl hover:shadow-lg transition-all duration-300 animate-fade-in" style="animation-delay: ${index * 0.05}s;">
                            <div class="flex flex-col sm:flex-row sm:items-start justify-between mb-4 gap-2">
                                <h4 class="text-xl font-bold text-blue-900 flex items-start leading-tight pt-1">
                                    <span class="text-white bg-blue-500 rounded-full w-6 h-6 inline-flex items-center justify-center text-sm mr-2 flex-shrink-0">${index + 1}</span> 
                                    ${hotel.name}
                                </h4>
                                ${linkTagHTML}
                            </div>
                            <div class="pl-0 sm:pl-8 space-y-3">
                                <div class="flex items-start">
                                    <span class="font-bold text-blue-800 bg-blue-100 px-2 py-0.5 rounded mr-3 flex-shrink-0 text-xs mt-0.5"><i class="fa-solid fa-star mr-1"></i>住宿特色</span> 
                                    <ul class="list-disc pl-4 m-0 text-sm text-slate-700 leading-relaxed font-medium space-y-1.5 w-full">
                                        ${hotel.feature.map(item => `<li>${item}</li>`).join('')}
                                    </ul>
                                </div>
                                <div class="flex items-start">
                                    <span class="font-bold text-blue-800 bg-blue-100 px-2 py-0.5 rounded mr-3 flex-shrink-0 text-xs mt-0.5"><i class="fa-solid fa-map-pin mr-1"></i>飯店位置</span> 
                                    <span class="text-sm text-slate-700 leading-relaxed font-medium pt-0.5">${hotel.address}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                htmlContent += `</div>`;
            }

            contentArea.innerHTML = htmlContent;
        }

        // 區域按鈕水平滾動控制
        function scrollDistricts(direction) {
            const container = document.getElementById('district-buttons');
            const scrollAmount = 200;
            if (direction === 'left') {
                container.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
            } else {
                container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initDistrictButtons();
            const firstDistrictKey = Object.keys(hotelData)[0];
            const firstDistrictBtn = districtContainer.querySelector('button');
            if(firstDistrictBtn) {
                selectDistrict(firstDistrictKey, firstDistrictBtn);
            }
        });
    </script>
</body>
</html>
