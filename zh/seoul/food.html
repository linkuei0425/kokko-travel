                    "traditional": [
                        { name: "惠化 石頭大叔披薩", feature: "大學路傳奇美食！雖然叫披薩店，但最狂的是點窯烤起司披薩就會送一大鍋「韓式起司辣炒年糕」與辛拉麵，中西合璧。", address: "서울 종로구 대학로129-8 (首爾鐘路區大學路129-8) / 惠化站步行2分鐘" },
                        { name: "東華飯店 (炸醬麵)", feature: "東大門營業至深夜的老字號中華料理，逛完批發市場必吃！他們家的黑色炸醬麵醬汁濃郁，糖醋肉外酥內軟。", address: "서울 중구 장충단로 282-1 (首爾中區獎忠壇路282-1) / 東大門歷史文化公園站" },
                        { name: "橋村炸雞 (東大門1號店)", feature: "雖然是連鎖店，但東大門這間24小時營業且佔地極廣！半半炸雞（蜂蜜/橋村辣味）配上冰涼啤酒，是宵夜霸主。", address: "서울 종로구 종로 294 2층 (首爾鐘路區鐘路294 2樓) / 東大門站6號出口" }
                    ],
                    "cafe": [
                        { name: "學林茶房 (Hakrim Dabang)", feature: "首爾現存最古老的咖啡館（創於1956年），《來自星星的你》拍攝地。復古黑膠唱片與老舊皮沙發，招牌是維也納咖啡。", address: "서울 종로구 대학로 119 2층 (首爾鐘路區大學路119 2樓) / 惠化站步行1分鐘" },
                        { name: "DDP 內設計咖啡廳", feature: "位於東大門設計廣場 (DDP) 內部，充滿未來感與流線型設計的空間，適合逛完展覽後在此品嚐簡約現代的甜點。", address: "서울 중구 을지로 281 (首爾中區乙支路281) / DDP建築內" },
                        { name: "駱山公園 景觀咖啡區", feature: "沿著惠化站後方的駱山公園城墎走上去，有許多能俯瞰首爾夜景與首爾塔的靜謐咖啡廳，氣氛極度浪漫。", address: "서울 종로구 낙산길 일대 (駱山公園城墎旁)" }
                    ],
                    "street_food": [
                        { name: "東大門歷史文化公園 小吃攤", feature: "深夜批發客的能量來源！DDP周邊的帳篷賣著熱騰騰的紫菜包飯、辣炒年糕、魚板湯與現炸熱狗，越夜越熱鬧。", address: "서울 중구 을지로 281 주변 (DDP 周圍及批發市場外)" },
                        { name: "大學路 炸雞肉串與糖餅", feature: "惠化站出口常見的學生小吃，超大串的特調醬汁雞肉串以及包著黑糖堅果的油炸糖餅，價格親民。", address: "서울 종로구 대학로 (惠化站出口至主街)" },
                        { name: "廣熙洞 俄羅斯/中亞小吃", feature: "東大門後方的異國街區，這裡有許多隱藏版的烤肉串、烤饢餅與中亞風味甜點，是首爾獨特的街頭體驗。", address: "서울 중구 광희동 (東大門歷史文化公園站旁廣熙洞)" }
                    ]
                }
            }
        };

        // Custom Categories adapted for Seoul
        const categoriesMap = {
            "bbq": { name: "🥩 韓式烤肉", color: "bg-red-100 text-red-800 hover:bg-red-600 hover:text-white border-red-400" },
            "chicken": { name: "🍗 蔘雞湯與一隻雞", color: "bg-amber-100 text-amber-800 hover:bg-amber-600 hover:text-white border-amber-400" },
            "traditional": { name: "🍲 傳統美食與鍋物", color: "bg-orange-100 text-orange-800 hover:bg-orange-600 hover:text-white border-orange-400" },
            "cafe": { name: "☕ 網美與特色咖啡", color: "bg-rose-100 text-rose-800 hover:bg-rose-600 hover:text-white border-rose-400" },
            "street_food": { name: "🍢 市場與街頭小吃", color: "bg-purple-100 text-purple-800 hover:bg-purple-600 hover:text-white border-purple-400" }
        };

        let currentRegion = "";
        let currentCategory = "";

        // Elements
        const regionContainer = document.getElementById('region-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const categorySection = document.getElementById('category-section');
        const contentArea = document.getElementById('content-area');

        // Render Regions
        function initRegions() {
            Object.keys(db).forEach(key => {
                const btn = document.createElement('button');
                btn.className = "whitespace-nowrap px-4 py-2 rounded-full border border-gray-300 bg-white text-gray-700 font-medium hover:bg-rose-600 hover:text-white hover:border-rose-600 transition-colors shadow-sm";
                btn.innerText = db[key].name;
                btn.onclick = () => selectRegion(key, btn);
                regionContainer.appendChild(btn);
            });
        }

        // Render Categories
        function initCategories() {
            Object.keys(categoriesMap).forEach(key => {
                const config = categoriesMap[key];
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-4 py-2 rounded-full border transition-all font-medium ${config.color}`;
                btn.innerText = config.name;
                btn.onclick = () => selectCategory(key, btn);
                categoryContainer.appendChild(btn);
            });
        }

        function selectRegion(regionKey, clickedBtn) {
            currentRegion = regionKey;
            
            // Highlight active region
            Array.from(regionContainer.children).forEach(btn => {
                btn.classList.remove('bg-rose-600', 'text-white', 'border-rose-600');
                btn.classList.add('bg-white', 'text-gray-700');
            });
            clickedBtn.classList.remove('bg-white', 'text-gray-700', 'hover:bg-rose-600');
            clickedBtn.classList.add('bg-rose-600', 'text-white', 'border-rose-600');

            // Show category section
            categorySection.classList.remove('hidden');
            categorySection.classList.add('fade-in');
            
            // Auto select first category if none selected
            if(!currentCategory) {
                const firstCatBtn = categoryContainer.children[0];
                selectCategory('bbq', firstCatBtn);
            } else {
                renderContent();
            }
        }

        function selectCategory(catKey, clickedBtn) {
            currentCategory = catKey;

            // Highlight active category
            Array.from(categoryContainer.children).forEach(btn => {
                btn.classList.remove('ring-2', 'ring-offset-2', 'ring-rose-500', 'shadow-md', 'scale-105');
                btn.style.opacity = "0.6";
            });
            clickedBtn.classList.add('ring-2', 'ring-offset-2', 'ring-rose-500', 'shadow-md', 'scale-105');
            clickedBtn.style.opacity = "1";

            renderContent();
        }

        function renderContent() {
            contentArea.innerHTML = '';
            const items = db[currentRegion].categories[currentCategory];

            if(!items || items.length === 0) {
                contentArea.innerHTML = `<p class="col-span-full text-center py-8 text-gray-500">此分類目前無資料</p>`;
                return;
            }

            items.forEach((item, index) => {
                // Generate Google Maps URL
                const encodedQuery = encodeURIComponent(`${item.name} Seoul ${item.address.split('/')[0]}`);
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;

                // Generate Naver Maps URL (擷取韓文地址部分以提高搜尋準確度)
                const koreanAddress = item.address.split('(')[0].trim();
                const naverQuery = encodeURIComponent(koreanAddress);
                const naverMapsUrl = `https://map.naver.com/v5/search/${naverQuery}`;

                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col fade-in hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1";
                card.style.animationDelay = `${index * 0.08}s`;

                card.innerHTML = `
                    <div class="p-6 flex-grow">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-xl font-bold text-gray-800 leading-tight">${item.name}</h3>
                        </div>
                        <p class="text-gray-600 text-sm mb-5 leading-relaxed tracking-wide"><span class="font-bold text-rose-700 bg-rose-50 px-2 py-0.5 rounded mr-1">特色</span>${item.feature}</p>
                        
                        <div class="bg-gray-50/80 p-3.5 rounded-xl flex items-start gap-3 border border-gray-100">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-rose-600 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <p class="text-sm text-gray-600 leading-tight font-medium"><span class="font-bold text-rose-800">地址：</span>${item.address}</p>
                        </div>
                    </div>
                    
                    <div class="px-6 pb-6 mt-auto flex flex-col gap-3">
                        <!-- Naver MAP 導航按鈕 -->
                        <a href="${naverMapsUrl}" target="_blank" class="w-full flex flex-col items-center justify-center bg-[#03C75A] hover:bg-[#02b351] text-white py-2.5 rounded-xl transition-colors shadow-sm hover:shadow-md">
                            <div class="flex items-center gap-2 font-bold text-base">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M16.037 2.126h5.83v19.748h-5.83V10.154l-7.904 11.72H2.303V2.126h5.83v11.72l7.904-11.72z" />
                                </svg>
                                開啟 Naver MAP 導航
                            </div>
                            <span class="text-xs font-normal opacity-90 mt-0.5">(需下載APP，韓國建議使用)</span>
                        </a>

                        <!-- Google Maps 導航按鈕 -->
                        <a href="${mapsUrl}" target="_blank" class="w-full flex items-center justify-center gap-2 btn-nav text-white py-2.5 rounded-xl font-bold transition-colors shadow-sm hover:shadow-md">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z" clip-rule="evenodd" />
                            </svg>
                            開啟 Google Maps 導航
                        </a>
                    </div>
                `;
                contentArea.appendChild(card);
            });
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            initRegions();
            initCategories();
        });

    </script>
</body>
</html>
