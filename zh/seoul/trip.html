        function App() {

                    {/* 頂部導覽列 */}

                        <div className="max-w-5xl mx-auto px-4 py-4 md:py-6">
                            <div className="flex items-center gap-2 mb-4">
                                <MapPin className="text-rose-600 w-6 h-6 md:w-8 md:h-8" />

                                    回到首頁
                                </a>

                                    <button
                                        key={region}
                                        onClick={() => {
                                            setSelectedRegion(region);
                                            const allowed = getAvailableCategoryIds(region);
                                            if (!allowed.includes(selectedCategory)) {
                                                setSelectedCategory(allowed[0]);
                                            }
                                        }}
                                        className={`whitespace-nowrap px-4 py-2 md:px-5 md:py-2.5 rounded-full text-xs md:text-sm font-medium transition-all duration-200 ${
                                            selectedRegion === region
                                            ? 'bg-rose-600 text-white shadow-md'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'
                                        }`}
                                    >

                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 px-3 py-1.5 md:px-4 md:py-2 rounded-lg border text-xs md:text-sm font-medium transition-all ${
                                        selectedCategory === id
                                        ? 'border-rose-500 bg-rose-50 text-rose-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-3.5 h-3.5 md:w-4 md:h-4" />
                                    {id}
                                </button>
                            ))}
                        </div>

                            <h2 className="text-lg md:text-xl font-bold text-slate-800 flex items-center gap-2">
                                {selectedRegion} - {selectedCategory} 精選推薦

                            <div itemScope itemType="https://schema.org/ItemList" className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6">
                                {currentData.map((item, index) => (
                                    <article 
                                        key={index}
                                        itemProp="itemListElement" 
                                        itemScope 
                                        itemType="https://schema.org/ListItem"
                                        className="bg-white rounded-xl shadow-sm border border-slate-100 p-4 md:p-6 flex flex-col justify-between hover:shadow-md transition-shadow h-full relative"
                                    >
                                        <meta itemProp="position" content={index + 1} />
                                        <meta itemProp="url" content={item.link} />
                                        
                                        <div className="flex-grow">
                                            <h3 itemProp="name" className="text-base md:text-xl font-bold text-slate-800 mb-2 md:mb-3 leading-tight">
                                                {item.title}

                                            <p itemProp="description" className="text-slate-600 text-xs md:text-base mb-4 md:mb-6 leading-relaxed">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-4 border-t border-slate-50 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-rose-600 hover:bg-rose-700 text-white font-medium py-2 md:py-2.5 px-4 md:px-5 rounded-lg transition-colors w-full sm:w-auto text-sm md:text-base"

                                                <Info className="w-4 h-4" />

                                                <ExternalLink className="w-4 h-4 ml-1 opacity-70" />

                                    </article>
                                ))}

                            <div className="bg-white rounded-xl border border-dashed border-slate-300 p-8 md:p-12 text-center flex flex-col items-center justify-center">

                                    此區域目前無對應項目的資料
                                </h3>
                                <p className="text-sm md:text-base text-slate-500">請嘗試選擇其他分類或分頁。</p>
                            </div>
                        )}

                        <div className="mt-8 md:mt-10 flex justify-center">
                            <a 
                                href="https://www.klook.com/zh-TW/search/result/?query=%E9%A6%96%E7%88%BE&aid=115640" 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-bold py-2.5 md:py-3.5 px-6 md:px-8 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1 text-sm md:text-base"
                            >
                                <span className="tracking-wide">前往 Klook 探索更多首爾行程</span>
                                <ExternalLink className="w-4 h-4 md:w-5 md:h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>

                    <footer className="bg-[#2d3748] text-gray-300 py-8 mt-auto border-t-4 border-rose-600">
                        <div className="max-w-5xl mx-auto px-4 text-center text-xs md:text-sm leading-loose">
                            <p className="font-bold text-gray-100 mb-1 text-sm md:text-base">Copyright &copy; 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
                            <p>版權所有，未經授權禁止轉載、翻印或任何商業用途。</p>
                            <p>本站包含之圖片、文字內容及程式碼均受法律保護。</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
