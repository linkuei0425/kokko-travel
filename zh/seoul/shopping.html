            { cat: 'mart', name: 'Homeplus (合井店)', feature: '位於弘大旁邊一站，隱身在購物中心地下室，人潮比首爾站少，逛起來特別舒服，泡麵與酒類款式極多。', loc: '서울 마포구 양화로 45 (首爾麻浦區楊花路45) Mecenatpolis B2', transit: '地鐵2/6號線「合井站 (합정역)」9號或10號出口地下連通道直達' },
            { cat: 'mart', name: 'No Brand (東大門 Doota店)', feature: 'E-mart 旗下的超高CP值自有品牌，推薦必買「紫薯洋芋片」與「起司球」，價格實惠包裝簡約。', loc: '서울 중구 장충단로 275 (首爾中區獎忠壇路275) Doota Mall 4樓', transit: '地鐵2/4/5號線「東大門歷史文化公園站」14號出口，步行約5分鐘' },

            // --- 球鞋運動 ---
            { cat: 'shoes', name: 'ABC-MART Grand Stage (明洞)', feature: '明洞商圈內最高等級的 ABC-MART，款式最潮最齊全，想找韓國限定色或熱門斷貨款的 Converse、Vans 來這就對了。', loc: '서울 중구 명동8길 12 (首爾中區明洞8街12)', transit: '地鐵4號線「明洞站 (명동역)」6號出口，步行約3分鐘' },
            { cat: 'shoes', name: 'Nike Seoul (明洞)', feature: '首爾最具代表性的 Nike 旗艦店，最大亮點是可以預約「Nike By You」客製化服務，製作專屬的首爾限定T恤與提袋。', loc: '서울 중구 명동길 14 (首爾中區明洞街14)', transit: '地鐵4號線「明洞站 (명동역)」6號出口，步行約6分鐘' },
            { cat: 'shoes', name: 'SHOOPEN (弘大店)', feature: '韓國國民平價鞋履品牌，主打百搭的帆布鞋、瑪莉珍鞋與厚底拖鞋，顏色豐富且價格超級親民。', loc: '서울 마포구 양화로 153 (首爾麻浦區楊花路153)', transit: '地鐵2號線「弘大入口站 (홍대입구역)」1號出口旁' },
            { cat: 'shoes', name: 'New Balance (弘大旗艦店)', feature: '韓國年輕人近年最愛的球鞋品牌，弘大旗艦店常有首發限定款，如 530、2002R 等熱門型號補貨最快。', loc: '서울 마포구 홍익로 20 (首爾麻浦區弘益路20)', transit: '地鐵2號線「弘大入口站 (홍대입구역)」9號出口，步行約5分鐘' },
            { cat: 'shoes', name: 'FOLDER (弘大店)', feature: '韓國衣戀集團旗下的連鎖鞋店，主要販售 Autry 小白鞋、OOFOS 雲朵拖鞋等時下流行品牌，選品品味佳。', loc: '서울 마포구 양화로 152 (首爾麻浦區楊花路152)', transit: '地鐵2號線「弘大入口站 (홍대입구역)」9號出口，步行約2分鐘' }
        ];

        // 負責渲染卡片的函數
        function renderCards(category) {
            const container = document.getElementById('shop-container');
            container.innerHTML = ''; // 清空現有內容

            // 修改篩選邏輯以支援陣列格式 (商品可以同時屬於多個分類)
            const filteredData = shopData.filter(item => {
                const itemCats = Array.isArray(item.cat) ? item.cat : [item.cat];
                return itemCats.includes(category);
            });

            filteredData.forEach((shop, index) => {
                const delay = index * 50; // 簡單的進場動畫延遲
                
                // 1. 產生 Google Map 搜尋網址
                const mapSearchQuery = encodeURIComponent(`${shop.name} Seoul`);
                const mapUrl = `https://www.google.com/maps/search/?api=1&query=${mapSearchQuery}`;

                // 2. 產生 Naver Map 導航網址
                const pureName = shop.name.split('(')[0].trim();
                const naverSearchQuery = encodeURIComponent(pureName);
                const naverMapsUrl = `https://map.naver.com/v5/search/${naverSearchQuery}`;
                
                const card = document.createElement('div');
                card.className = `bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col justify-between hover:shadow-lg transition-shadow duration-300 transform hover:-translate-y-1 animate-fade-in`;
                card.style.animationDelay = `${delay}ms`;
                
                card.innerHTML = `
                    <div>
                        <div class="flex items-start justify-between mb-4">
                            <h3 class="text-xl font-bold text-gray-800">${shop.name}</h3>
                        </div>
                        <div class="space-y-3">
                            <div class="flex items-start">
                                <i class="fa-solid fa-star text-yellow-400 mt-1 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-xs text-gray-400 font-semibold mb-1">推薦商品</p>
                                    <p class="text-sm text-gray-700 leading-relaxed">${shop.feature}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <i class="fa-solid fa-location-dot text-rose-400 mt-1 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-xs text-gray-400 font-semibold mb-1">詳細地址/購買地</p>
                                    <p class="text-sm text-gray-700 font-medium">${shop.loc}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <i class="fa-solid fa-train-subway text-rose-500 mt-1 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-xs text-gray-400 font-semibold mb-1">交通方式</p>
                                    <span class="inline-block bg-rose-50 text-rose-700 text-xs px-2 py-1 rounded-md font-medium text-left leading-normal">${shop.transit}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 導航按鈕區塊 -->
                    <div class="mt-5 pt-4 border-t border-gray-100 flex flex-col gap-2.5">
                        <!-- Naver Map 按鈕 -->
                        <a href="${naverMapsUrl}" target="_blank" rel="noopener noreferrer" 
                           class="w-full flex items-center justify-center gap-2 px-4 py-2 border border-transparent rounded-lg shadow-sm text-white btn-naver focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#03C75A] transition-colors">
                            <i class="fa-solid fa-map-location-dot text-lg"></i>
                            <div class="flex flex-col items-start justify-center text-left">
                                <span class="font-bold text-[14px] leading-tight">Naver MAP 導航</span>
                                <span class="text-[11px] font-normal opacity-90 leading-tight mt-0.5">需下載APP，韓國建議使用</span>
                            </div>
                        </a>
                        
                        <!-- Google Map 導航按鈕 -->
                        <a href="${mapUrl}" target="_blank" rel="noopener noreferrer" 
                           class="w-full flex items-center justify-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-[14px] font-bold text-white bg-rose-600 hover:bg-rose-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-rose-500 transition-colors">
                            <i class="fa-solid fa-map-location-dot mr-2 text-lg"></i> 開啟 Google Map 導航
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 點擊分類按鈕的處理邏輯
        function filterCategory(category, btnElement) {
            // 移除所有按鈕的 active 狀態
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));

            // 為當前點擊的按鈕加上 active 狀態
            btnElement.classList.add('active');

            // 渲染對應的資料
            renderCards(category);
        }

        // 新增簡單的進場動畫 CSS
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
                animation: fadeIn 0.5s ease-out forwards;
                opacity: 0;
            }
        `;
        document.head.appendChild(style);

        // 初始載入時顯示第一類 (流行服飾)
        window.onload = () => {
            const firstBtn = document.querySelector('.tab-btn');
            filterCategory('fashion', firstBtn);
        };
    </script>
</body>
</html>
