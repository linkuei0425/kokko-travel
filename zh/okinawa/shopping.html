<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>沖繩購物精選指南 | Okinawa Shopping Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 自訂捲軸樣式（針對分類按鈕區塊） */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* 沖繩琉球海藍色系 Active 狀態 */
        .tab-btn.active {
            background-color: #0284c7; /* sky-600 */
            color: white;
            box-shadow: 0 4px 6px -1px rgba(2, 132, 199, 0.3);
            border-color: #0284c7;
        }
        .tab-btn {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <!-- 頂部導覽列 -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex-shrink-0 flex items-center">
                    <span class="font-bold text-xl text-sky-600 tracking-wider"><i class="fa-solid fa-bag-shopping mr-2"></i>OKINAWA SHOPPING</span>
                </div>

                    <a href="https://linkuei0425.github.io/Okinawa/" class="inline-flex items-center justify-center px-4 py-2 border border-transparent rounded-full shadow-sm text-sm font-medium text-white bg-sky-600 hover:bg-sky-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-500 transition-colors">

        </div>
    </nav>

    <!-- 橫幅區域 -->

            <h1 class="text-3xl md:text-5xl font-extrabold text-white mb-4 shadow-sm">沖繩必買購物精選指南</h1>
            <p class="text-lg md:text-xl text-white opacity-90 max-w-2xl mx-auto">從超大型 AEON 夢樂城、海景 PARCO CITY 到國際通土產，租車自駕最棒的行程就是後車廂塞滿戰利品！</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- 分類按鈕區 (可橫向滾動) -->
        <div class="flex overflow-x-auto hide-scrollbar space-x-3 pb-4 mb-6 md:justify-center">

            </button>
            <button onclick="filterCategory('beauty', this)" class="tab-btn whitespace-nowrap px-6 py-3 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm hover:bg-sky-50 focus:outline-none flex items-center">

            </button>
            <button onclick="filterCategory('souvenir', this)" class="tab-btn whitespace-nowrap px-6 py-3 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm hover:bg-sky-50 focus:outline-none flex items-center">
                <span class="mr-2 text-lg">🎁</span> 特色伴手禮
            </button>

                <span class="mr-2 text-lg">🛒</span> 零食超市
            </button>
            <button onclick="filterCategory('lifestyle', this)" class="tab-btn whitespace-nowrap px-6 py-3 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm hover:bg-sky-50 focus:outline-none flex items-center">

            <button onclick="filterCategory('outlet', this)" class="tab-btn whitespace-nowrap px-6 py-3 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm hover:bg-sky-50 focus:outline-none flex items-center">

            // --- 流行服飾與商場 ---
            { cat: 'fashion', name: 'SAN-A 浦添西海岸 PARCO CITY', feature: '距離那霸最近的大型商場，全館面海，擁有許多首次登陸沖繩的品牌與美妝專櫃，好逛又好拍。', loc: '浦添市西洲', transit: '自由行：從那霸巴士總站搭乘 32、39、43 號路線巴士，於「PARCO CITY前」下車直達。自駕距機場約 15 分鐘。' },
            { cat: 'fashion', name: '永旺夢樂城 沖繩來客夢 (AEON MALL Rycom)', feature: '沖繩最大！腹地極廣的巨無霸購物中心，一樓有超大水族箱。進駐眾多日系服飾品牌與大型超市，排一整天都逛不完。', loc: '中頭郡北中城村', transit: '自由行：從那霸巴士總站搭乘 152 號巴士，或搭乘高速巴士 111、117 號至「比嘉(AEON MALL)」下車。自駕設有大型免費停車場。' },
            { cat: 'fashion', name: '美國村 (American Village)', feature: '充滿濃濃美式西海岸風情，商圈內有許多古著店、特色服飾、夏威夷花襯衫與海景咖啡廳。', loc: '北谷町美濱', transit: '自由行：從那霸巴士總站搭乘 120 號路線巴士，於「桑江站」下車後步行約 5 分鐘。自駕從那霸市區出發約 40 分鐘。' },
            { cat: 'fashion', name: '國際通商圈 (Kokusai Dori)', feature: '那霸最繁華的奇蹟的一英里。除了土產，巷弄內的「浮島通」隱藏著許多高質感的日系文青服飾與選物店。', loc: '那霸市國際通', transit: '自由行：搭乘單軌電車至「縣廳前站」、「美榮橋站」或「牧志站」，出站後步行 1-5 分鐘即可抵達各商圈入口。' },
            { cat: 'fashion', name: 'iias 沖繩豐崎', feature: '結合了 DMM Kariyushi 水族館的新型態商場，有大型 LOFT、H&M 以及絕美的頂樓海景 BBQ 區。', loc: '豐見城市 (ASHIBINAA旁)', transit: '自由行：從那霸機場搭乘 TK02 巴士直達，或從 ASHIBINAA Outlet 步行約 10 分鐘。自駕距機場約 20 分鐘。' },

            // --- 日系藥妝 ---
            { cat: 'beauty', name: '大國藥妝 (國際通/美國村)', feature: '沖繩買藥妝最便宜的首選店！會配有中文店員，合利他命、EVE止痛藥、各式面膜在這裡掃貨最划算。', loc: '那霸國際通 / 北谷美國村', transit: '自由行：國際通店搭乘單軌至「牧志站」步行 3 分鐘；美國村店搭乘 120 號巴士至「桑江站」步行 5 分鐘。' },
            { cat: 'beauty', name: '唐吉訶德 (國際通店/宜野灣店)', feature: '24小時營業的免稅天堂。從熱門美妝、家電、到大包裝的沖繩限定零食通通包辦，半夜睡不著的購物聖地。', loc: '那霸國際通 / 宜野灣', transit: '自由行：國際通店位於驚安殿堂大樓，搭乘單軌至「牧志站」步行 5 分鐘。宜野灣分店建議租車自駕前往。' },
            { cat: 'beauty', name: '札幌藥妝 (Sapporo Drug Store)', feature: '走道寬敞明亮，除了藥妝外，也有豐富的北海道限定商品與沖繩當地名產可一起購買，購物體驗極佳。', loc: '國際通 / 沖繩各處', transit: '自由行：國際通店可搭乘單軌電車至「縣廳前站」步行 3 分鐘抵達；其他分店多附設於商場內。' },
            { cat: 'beauty', name: 'Cosme Kitchen', feature: '專售有機、天然成分保養品與化妝品，深受日本輕熟女喜愛，包裝充滿質感。', loc: 'PARCO CITY 1F', transit: '自由行：從那霸巴士總站搭乘 32、39、43 號路線巴士至「PARCO CITY前」下車。' },

            // --- 特色伴手禮 ---
            { cat: 'souvenir', name: '御菓子御殿 (紅芋塔)', feature: '沖繩最具代表性的伴手禮！使用當地特產紫薯(紅芋)製作，外型像小船，口感綿密不會過甜。', loc: '國際通 / 恩納村本店 (可看海)', transit: '自由行：國際通松尾店搭乘單軌至「縣廳前站」步行 5 分鐘。恩納村本店（有海景）建議自駕前往。' },
            { cat: 'souvenir', name: '雪鹽 (Yukishio) 專賣店', feature: '宮古島名產。雪鹽金楚糕(傳統餅乾)與雪鹽冰淇淋必吃！還有賣各式美容沐浴鹽。', loc: '國際通各處', transit: '自由行：國際通本店搭乘單軌電車至「縣廳前站」步行 5 分鐘。那霸機場亦有專櫃可購買。' },
            { cat: 'souvenir', name: '邊銀食堂 激辛石垣島辣油', feature: '主婦瘋搶的神級調味料！雖然叫激辛但不死辣，充滿蒜香與芝麻香氣，拌麵拌飯都超級美味。', loc: '各大土產店 / 國際通', transit: '自由行：可於國際通各大土產店或唐吉訶德購買，搭乘單軌電車至「牧志站」或「縣廳前站」皆可抵達。' },
            { cat: 'souvenir', name: 'Orion 啤酒周邊與限定零食', feature: '沖繩在地的驕傲！除了好喝的生啤酒，Orion的T恤、毛巾，以及啤酒酵母做的堅果零食也是送禮好物。', loc: '便利商店 / 唐吉訶德', transit: '自由行：各處便利超商皆可買到啤酒；周邊商品可至國際通唐吉訶德購買（搭乘單軌至牧志站）。' },
            { cat: 'souvenir', name: 'Fukugiya (浮島花園) 年輪蛋糕', feature: '現烤的沖繩年輪蛋糕，有蜂蜜、紅芋、黑糖等多種口味，經過店面總能聞到濃郁香氣，包裝精美。', loc: '那霸國際通', transit: '自由行：搭乘單軌電車至「縣廳前站」，沿國際通步行約 5 分鐘即可抵達門市。' },

            // --- 零食超市 ---
            { cat: 'mart', name: 'SAN-A (3A超市) Naha Main Place', feature: '位於新都心的當地人愛用超市與商場。想買便宜的當季水果、日本綠茶、特價熟食來這裡就對了。', loc: '那霸新都心', transit: '自由行：搭乘單軌電車至「歌町站 (Omoromachi)」，出站後步行約 5 分鐘即可抵達。' },
            { cat: 'mart', name: 'Union 超市', feature: '沖繩在地的24小時連鎖超市，價格親民，以風災時也照常營業而聞名，可以買到極具在地特色的食材。', loc: '沖繩中南部多處分店', transit: '自由行：多位於住宅區，建議自駕前往（如赤嶺店距單軌赤嶺站步行約 10 分鐘，為少數地鐵可達分店）。' },
            { cat: 'mart', name: 'MaxValu 24小時超市', feature: '永旺(AEON)旗下的大型超市，牧志店離國際通很近，買當季水果、消夜與泡麵的好去處。', loc: '牧志店 / 全島各分店', transit: '自由行：牧志店搭乘單軌電車至「牧志站」，出站後步行約 5 分鐘，24小時營業非常方便。' },
            { cat: 'mart', name: '業務超市 (Gyomu Super)', feature: '價格極度便宜的批發型超市，非常適合大量掃貨抹茶零食、蒟蒻果凍與各式日本調味料。', loc: '新都心周邊 / 全島皆有', transit: '自由行：分店多不在單軌沿線，強烈建議租車自駕前往掃貨，以便搬運大量戰利品。' },

            // --- 球鞋與潮玩 ---
            { cat: 'lifestyle', name: '寶可夢中心 (Pokemon Center Okinawa)', feature: '位於 AEON 來客夢內，有沖繩限定的「穿著琉球傳統服飾的皮卡丘」與風獅爺造型周邊，粉絲必朝聖。', loc: 'AEON MALL Rycom 內', transit: '自由行：從那霸巴士總站搭乘 152、111 或 117 號巴士至「比嘉(AEON MALL)」下車。' },
            { cat: 'lifestyle', name: 'ABC-MART GRAND STAGE', feature: '最高規格的 ABC-MART，想找日本限定配色的 Converse 1970s、NIKE 或 Vans 來這裡就對了。', loc: 'PARCO CITY 內 / 浦添', transit: '自由行：PARCO CITY 分店可從那霸搭乘 32、39 號巴士直達。' },
            { cat: 'lifestyle', name: 'Sports Depot (新都心/美國村)', feature: '超大型體育用品專賣店。想買日本限定款跑鞋、露營用品或棒球手套來這裡挖寶就對了。', loc: '新都心天久 / 美國村', transit: '自由行：天久店搭乘單軌至「歌町站」步行約 15 分鐘。美國村店搭乘 120 號巴士至「桑江站」。' },
            { cat: 'lifestyle', name: 'T Galleria by DFS 沖繩', feature: '日本唯一免稅（免關稅）的路面店！精品如 LV、Chanel 齊全，且與單軌車站直結，也是許多租車公司的取還車點。', loc: '那霸新都心', transit: '自由行：搭乘單軌電車至「歌町站 (Omoromachi)」，出站後有空橋直通免稅店入口。' },
            { cat: 'lifestyle', name: '漫畫倉庫 (Manga Souko)', feature: '尋寶天堂！超大型二手雜貨店，有海量的公仔、遊戲、漫畫、古著與包包，夾娃娃機也超好玩。', loc: '那霸赤嶺店 / 浦添店', transit: '自由行：那霸店搭乘單軌電車至「赤嶺站」，出站步行約 3 分鐘即可抵達；浦添店建議自駕。' },

            // --- 附近城市 OUTLET ---
            { cat: 'outlet', name: '沖繩 ASHIBINAA Outlet', feature: '沖繩唯一的 Outlet！鄰近那霸機場，擁有濃厚南國風情。超過100間品牌，Coach、Adidas、GAP 折扣通常很有誠意，適合安排在搭機前或下機後前往。', loc: '豐見城市 (南部)', transit: '自由行：從那霸機場 4 號乘車處搭乘「95號」直達公車（約 15 分鐘）；或從那霸巴士總站搭乘 55、56、88 號巴士至「Outlet Mall 前」下車。' }
        ];

        // 負責渲染卡片的函數
        function renderCards(category) {
            const container = document.getElementById('shop-container');
            container.innerHTML = ''; // 清空現有內容

            const filteredData = shopData.filter(item => item.cat === category);

            filteredData.forEach((shop, index) => {
                const delay = index * 50; // 簡單的進場動畫延遲
                
                // 產生 Google Map 搜尋網址 (加入 Okinawa 提高精準度)
                const mapSearchQuery = encodeURIComponent(`${shop.name} 沖繩`);
                const mapUrl = `https://www.google.com/maps/search/?api=1&query=${mapSearchQuery}`;
                
                // 如果是閉館提醒，變更邊框顏色與圖示提示
                const isWarning = shop.name.includes('閉館');
                const cardBorderColor = isWarning ? 'border-orange-300 bg-orange-50' : 'border-gray-100 bg-white';
                const starIconColor = isWarning ? 'text-orange-500' : 'text-yellow-400';

                const card = document.createElement('div');
                card.className = `${cardBorderColor} rounded-2xl shadow-sm border p-6 flex flex-col justify-between hover:shadow-lg transition-shadow duration-300 transform hover:-translate-y-1 animate-fade-in`;
                card.style.animationDelay = `${delay}ms`;
                
                card.innerHTML = `
                    <div>
                        <div class="flex items-start justify-between mb-4">
                            <h3 class="text-xl font-bold text-gray-800">${shop.name}</h3>
                        </div>
                        <div class="space-y-3">
                            <div class="flex items-start">
                                <i class="fa-solid ${isWarning ? 'fa-triangle-exclamation' : 'fa-star'} ${starIconColor} mt-1 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-xs text-gray-400 font-semibold mb-1">${isWarning ? '重要提醒' : '推薦亮點'}</p>
                                    <p class="text-sm text-gray-700 leading-relaxed">${shop.feature}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <i class="fa-solid fa-location-dot text-sky-500 mt-1 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-xs text-gray-400 font-semibold mb-1">購買地點</p>
                                    <p class="text-sm text-gray-700 font-medium">${shop.loc}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <i class="fa-solid fa-car text-orange-400 mt-1 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-xs text-gray-400 font-semibold mb-1">交通方式</p>
                                    <span class="inline-block bg-sky-50 text-sky-700 text-xs px-2 py-1 rounded-md font-medium">${shop.transit}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Google Map 導航按鈕 -->
                    <div class="mt-5 pt-4 border-t border-gray-100">
                        <a href="${mapUrl}" target="_blank" rel="noopener noreferrer" 
                           class="w-full flex items-center justify-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white ${isWarning ? 'bg-orange-500 hover:bg-orange-600' : 'bg-sky-600 hover:bg-sky-700'} focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-500 transition-colors">
                            <i class="fa-solid fa-map-location-dot mr-2"></i> ${isWarning ? '查看地圖位置' : '開啟 Google Map 導航'}
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 點擊分類按鈕的處理邏輯
        function filterCategory(category, btnElement) {
            // 移除所有按鈕的 active 狀態
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));

            // 為當前點擊的按鈕加上 active 狀態
            btnElement.classList.add('active');

            // 渲染對應的資料
            renderCards(category);
        }

        // 新增簡單的進場動畫 CSS
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
                animation: fadeIn 0.5s ease-out forwards;
                opacity: 0;
            }
        `;
        document.head.appendChild(style);

        // 初始載入時顯示第一類 (流行服飾)
        window.onload = () => {
            const firstBtn = document.querySelector('.tab-btn');
            filterCategory('fashion', firstBtn);
        };
    </script>
</body>
</html>
