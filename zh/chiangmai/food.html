                        { name: "Tuptim Grob (紅寶石甜湯)", feature: "杭東路上的老字號甜品店，其「椰奶紅寶石」荸薺極大顆且外皮Ｑ彈，配上碎冰與濃郁椰漿，是飯後完美句點。", address: "Chiang Mai-Hang Dong Rd / 建議搭乘 Grab" },
                        { name: "Khao Soi Mae Malai", feature: "往南部的公路上在地人愛吃的咖哩麵，湯底有著濃郁的紅咖哩香氣，配料的酸菜給得很大方。", address: "往杭東主幹道旁 / 建議騎車" },
                        { name: "Moo Kratha (杭東泰式烤肉)", feature: "杭東區有許多佔地廣大的半露天銅盤烤肉吃到飽，一兩百泰銖就能無限享用肉類與新鮮蔬菜，CP值極高。", address: "Hang Dong 區域" }
                    ],
                    "dessert": [
                        { name: "Baan Kang Wat 藝術村手作甜點", feature: "藝術村內的木造高腳屋下，有多家小店販售手工磅蛋糕、布丁與冰滴咖啡，充滿濃濃的文青手作溫度。", address: "191-197 Soi Wat Umong / 建議搭乘 Grab 至 Baan Kang Wat" },
                        { name: "Obchoei Original Homemade", feature: "藝術村內的知名烘焙坊，肉桂捲與可頌剛出爐的香氣瀰漫在木屋間，搭配一杯熱茶非常享受。", address: "Baan Kang Wat 藝術村內 / 步行探索" },
                        { name: "Carp Cafe (錦鯉咖啡廳)", feature: "整間咖啡廳建在一個巨大的錦鯉池上！不僅有泰式甜點，還能買飼料餵食成群結隊的巨大鮮豔錦鯉，視覺衝擊強烈。", address: "118/2 Moo 1, Hang Dong / 建議搭乘 Grab" }
                    ],
                    "cafe": [
                        { name: "Daddy's Antique Cafe & Restaurant", feature: "外觀像是一座歐洲古堡，內部擺滿了老闆從歐洲各地收集來的古董鐘錶與老件，提供高品質的手沖咖啡與早午餐。", address: "45/8 Moo 1, Mae Hia / 建議搭乘 Grab" },
                        { name: "The Baristro at Ping River (杭東邊界)", feature: "知名咖啡品牌在萍河下游的分店，清水模設計搭配河畔的靜謐景色，極簡純粹的空間非常適合攝影。", address: "Wang Sing Kham Rd / 建議搭乘 Grab" },
                        { name: "No.39 Cafe (近藝術村分店)", feature: "雖然本店在素帖，但藝術村周邊也有許多類似這種擁有池塘與木屋的森林系咖啡館，步調極慢。", address: "Wat Umong 周邊巷弄" }
                    ],
                    "rooftop_seafood": [
                        { name: "Good View Village", feature: "市區知名 Good View 的杭東大型分店！雖然不是高空，但擁有巨大的景觀水池與庭園，夜晚點燈後氣氛熱鬧，海鮮料理澎湃。", address: "Mae Hia, Mueang Chiang Mai / 建議搭乘 Grab" },
                        { name: "Chom Cafe and Restaurant", feature: "以「愛麗絲夢遊仙境」般的迷霧森林造景聞名！雖然是平地，但花園裡不斷噴灑的水霧與巨樹，能拍出絕美的精靈系美照。", address: "2/13 Moo 2, Somphot Chiang Mai 700 Pi Rd / 建議搭乘 Grab" },
                        { name: "Pha Cho (帕丘峽谷觀景)", feature: "杭東再往南的自然奇景，被稱為清邁小大峽谷。爬上觀景台可以俯瞰奇特的紅土岩柱與整片國家公園森林。", address: "Mae Wang National Park / 距離較遠，必須包車半日遊" }
                    ]
                }
            }
        };

        const categoriesMap = {
            "michelin": { name: "🌟 米其林推薦", color: "bg-rose-100 text-rose-700 hover:bg-rose-600 hover:text-white border-rose-500" },
            "greenbowl": { name: "🟢 綠碗公認證", color: "bg-emerald-100 text-emerald-700 hover:bg-emerald-600 hover:text-white border-emerald-500" },
            "dessert": { name: "🍧 甜點飲料", color: "bg-amber-100 text-amber-700 hover:bg-amber-500 hover:text-white border-amber-500" },
            "cafe": { name: "☕ 咖啡廳", color: "bg-orange-100 text-orange-800 hover:bg-orange-600 hover:text-white border-orange-600" },
            "rooftop_seafood": { name: "🍸 景觀酒吧&人氣餐廳", color: "bg-indigo-100 text-indigo-700 hover:bg-indigo-600 hover:text-white border-indigo-500" }
        };

        let currentRegion = "";
        let currentCategory = "";

        // Elements
        const regionContainer = document.getElementById('region-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const categorySection = document.getElementById('category-section');
        const contentArea = document.getElementById('content-area');

        // Render Regions
        function initRegions() {
            Object.keys(db).forEach(key => {
                const btn = document.createElement('button');
                btn.className = "whitespace-nowrap px-4 py-2 rounded-full border border-gray-300 bg-white text-gray-700 font-medium hover:bg-teal-600 hover:text-white hover:border-teal-600 transition-colors shadow-sm";
                btn.innerText = db[key].name;
                btn.onclick = () => selectRegion(key, btn);
                regionContainer.appendChild(btn);
            });
        }

        // Render Categories
        function initCategories() {
            Object.keys(categoriesMap).forEach(key => {
                const config = categoriesMap[key];
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-4 py-2 rounded-full border transition-all font-medium ${config.color}`;
                btn.innerText = config.name;
                btn.onclick = () => selectCategory(key, btn);
                categoryContainer.appendChild(btn);
            });
        }

        function selectRegion(regionKey, clickedBtn) {
            currentRegion = regionKey;
            
            // Highlight active region
            Array.from(regionContainer.children).forEach(btn => {
                btn.classList.remove('bg-teal-600', 'text-white', 'border-teal-600');
                btn.classList.add('bg-white', 'text-gray-700');
            });
            clickedBtn.classList.remove('bg-white', 'text-gray-700', 'hover:bg-teal-600');
            clickedBtn.classList.add('bg-teal-600', 'text-white', 'border-teal-600');

            // Show category section
            categorySection.classList.remove('hidden');
            categorySection.classList.add('fade-in');
            
            // Auto select first category if none selected
            if(!currentCategory) {
                const firstCatBtn = categoryContainer.children[0];
                selectCategory('michelin', firstCatBtn);
            } else {
                renderContent();
            }
        }

        function selectCategory(catKey, clickedBtn) {
            currentCategory = catKey;

            // Highlight active category
            Array.from(categoryContainer.children).forEach(btn => {
                btn.classList.remove('ring-2', 'ring-offset-2', 'ring-teal-500', 'shadow-md', 'scale-105');
                btn.style.opacity = "0.6";
            });
            clickedBtn.classList.add('ring-2', 'ring-offset-2', 'ring-teal-500', 'shadow-md', 'scale-105');
            clickedBtn.style.opacity = "1";

            renderContent();
        }

        function renderContent() {
            contentArea.innerHTML = '';
            const items = db[currentRegion].categories[currentCategory];

            if(!items || items.length === 0) {
                contentArea.innerHTML = `<p class="col-span-full text-center py-8 text-gray-500">此分類目前無資料</p>`;
                return;
            }

            items.forEach((item, index) => {
                // Generate Google Maps URL (Focus query on Chiang Mai)
                const encodedQuery = encodeURIComponent(`${item.name} Chiang Mai ${item.address.split('/')[0]}`);
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;

                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col fade-in hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1";
                card.style.animationDelay = `${index * 0.08}s`;

                card.innerHTML = `
                    <div class="p-6 flex-grow">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-xl font-bold text-gray-800 leading-tight">${item.name}</h3>
                        </div>
                        <p class="text-gray-600 text-sm mb-5 leading-relaxed tracking-wide"><span class="font-bold text-teal-700 bg-teal-50 px-2 py-0.5 rounded mr-1">特色</span>${item.feature}</p>
                        
                        <div class="bg-gray-50/80 p-3.5 rounded-xl flex items-start gap-3 border border-gray-100">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-teal-600 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <p class="text-sm text-gray-600 leading-tight font-medium">${item.address}</p>
                        </div>
                    </div>
                    
                    <div class="px-6 pb-6 mt-auto">
                        <a href="${mapsUrl}" target="_blank" class="w-full flex items-center justify-center gap-2 btn-nav text-white py-3 rounded-xl font-bold transition-colors shadow-sm hover:shadow-md">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z" clip-rule="evenodd" />
                            </svg>
                            開啟 Google Maps 導航
                        </a>
                    </div>
                `;
                contentArea.appendChild(card);
            });
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            initRegions();
            initCategories();
        });

    </script>
</body>
</html>
