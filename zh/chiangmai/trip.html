                    link: 'https://affiliate.klook.com/redirect?aid=115196&aff_adid=1232878&k_site=https%3A%2F%2Fwww.klook.com%2Fzh-TW%2Fcar-rentals%2Fresults%2F%3Fpick%3DChiang%2520Rai%2520International%2520Airport%26drop%3DChiang%2520Rai%2520International%2520Airport%26diffLoc%3Dfalse%26pDate%3D2026-03-12%252010%3A00%26dDate%3D2026-03-15%252010%3A00%26age%3D30%26lat%3D19.952342%26long%3D99.882928%26dLat%3D19.952342%26dLong%3D99.882928%26code%3DTH%26dCode%3DTH%26iata%3DCEI%26dIata%3DCEI'
                }
                ]
            },
            '拜縣': {
                '一日遊': [
                {
                    title: '(清邁出發)清邁拜縣 Buatong 瀑布、ATV越野車、叢林飛躍和激流漂流探險',
                    description: '在鬱鬱蔥蔥的鄉村享受1小時的ATV騎行，度過美好時光。在3-4級路段體驗樂趣和刺激，穿越4公里，欣賞周圍鬱鬱蔥蔥的綠色植物，享受清爽的泳池與美味泰式午餐。',
                    link: 'https://affiliate.klook.com/redirect?aid=115196&aff_adid=1232859&k_site=https%3A%2F%2Fwww.klook.com%2Fzh-TW%2Factivity%2F140736-sticky-waterfall-atv-and-white-water-rafting-guided-adventures%2F'
                },
                {
                    title: '清邁拜縣粘粘瀑布一日遊',
                    description: '攀登七層高的美麗瀑布——Bua Tong瀑布，又名粘性瀑布。您將體驗大自然之美和七彩噴泉。',
                    link: 'https://affiliate.klook.com/redirect?aid=115196&aff_adid=1232871&k_site=https%3A%2F%2Fwww.klook.com%2Fzh-TW%2Factivity%2F96743-sticky-waterfall-chiang-mai-join-in-half-day-tour%2F'
                },
                {
                    title: '(拜縣出發)拜縣全日私人觀光之旅，飽覽絕美日落',
                    description: '走訪二戰紀念橋、帕達美燕寺、長頸卡倫山部落村、Tha Pai 溫泉、高古索竹橋、班桑蒂瓊，最後於雲來觀景台飽覽絕美日落。',
                    link: 'https://affiliate.klook.com/redirect?aid=115196&aff_adid=1232881&k_site=https%3A%2F%2Fwww.klook.com%2Fzh-TW%2Factivity%2F126608-from-pai-full-day-private-car-tour-to-pai-highlights%2F'
                }
                ],
                '交通及E-sim': [
                {
                    title: '5G eSIM 泰國｜吃到飽、不穩就退 | AIS',
                    description: 'App內一鍵開通，一秒加值用多少買多少。啟用前可取消、使用期間網路「不穩就退」，安心有保障，24小時LINE中文客服，零時差為你服務。',
                    link: 'https://affiliate.klook.com/redirect?aid=115196&aff_adid=1232867&k_site=https%3A%2F%2Fwww.klook.com%2Fzh-TW%2Factivity%2F110438-thailand-esim-high-speed-internet-qr-code-in-the-voucher%2F'
                }
                ]
            }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('清邁');
            const [selectedCategory, setSelectedCategory] = useState('門票');

            // 取得當前選定地區與分類的資料
            const currentData = itineraryData[selectedRegion]?.[selectedCategory] || [];

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800">
                    {/* 頂部導覽列 */}
                    <header className="bg-white shadow-sm sticky top-0 z-10">
                        <div className="max-w-5xl mx-auto px-4 py-4 md:py-6">
                            <div className="flex items-center gap-2 mb-4">
                                <MapPin className="text-teal-600 w-6 h-6 md:w-8 md:h-8" />
                                <h1 className="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-teal-500 to-emerald-500">
                                清邁及泰北行程探索指南
                                </h1>
                            </div>
                            
                            {/* 地區選擇按鈕 */}
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                {/* 回到首頁按鈕 */}
                                <a
                                    href="https://linkuei0425.github.io/ChiangMai/"
                                    className="flex items-center gap-1.5 whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-200 bg-teal-50 text-teal-700 hover:bg-teal-100 border border-teal-200"
                                >
                                    <Home className="w-4 h-4" />
                                    回到首頁
                                </a>

                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => {
                                            setSelectedRegion(region);
                                            // 判斷該地區可用的分類，若目前選擇的分類不在其中，則自動切換至第一個可用分類
                                            const allowed = getAvailableCategoryIds(region);
                                            if (!allowed.includes(selectedCategory)) {
                                                setSelectedCategory(allowed[0]);
                                            }
                                        }}
                                        className={`whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-200 ${
                                            selectedRegion === region
                                            ? 'bg-slate-800 text-white shadow-md'
                                            : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-6">
                        {/* 分類標籤 */}
                        <div className="flex flex-wrap gap-2 md:gap-3 mb-8">
                            {CATEGORIES.filter(cat => getAvailableCategoryIds(selectedRegion).includes(cat.id)).map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 px-4 py-2 rounded-lg border text-sm font-medium transition-all ${
                                        selectedCategory === id
                                        ? 'border-teal-500 bg-teal-50 text-teal-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4" />
                                    {id}
                                </button>
                            ))}
                        </div>

                        {/* 內容區域標題 */}
                        <div className="mb-6">
                            <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                {selectedRegion} - {selectedCategory} 精選推薦
                            </h2>
                        </div>

                        {/* 項目列表 */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6">
                                {currentData.map((item, index) => (
                                    <div 
                                        key={index} 
                                        className="bg-white rounded-xl shadow-sm border border-slate-100 p-5 md:p-6 flex flex-col justify-between hover:shadow-md transition-shadow"
                                    >
                                        <div>
                                            <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-3 leading-tight">
                                                {item.title}
                                            </h3>
                                            <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        {/* 詳細說明連結按鈕 */}
                                        <div className="mt-auto pt-4 border-t border-slate-50 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-teal-600 hover:bg-teal-700 text-white font-medium py-2.5 px-5 rounded-lg transition-colors w-full sm:w-auto"
                                            >
                                                <Info className="w-4 h-4" />
                                                <span>詳細說明</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-70" />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            /* 無資料時的空狀態提示 */
                            <div className="bg-white rounded-xl border border-dashed border-slate-300 p-12 text-center flex flex-col items-center justify-center">
                                <div className="bg-slate-50 p-4 rounded-full mb-4">
                                    <Sparkles className="w-8 h-8 text-slate-400" />
                                </div>
                                <h3 className="text-lg font-medium text-slate-700 mb-2">
                                    目前 {selectedRegion} 尚未新增「{selectedCategory}」的推薦項目
                                </h3>
                                <p className="text-slate-500">
                                    我們正在為您整理最優質的行程資料，敬請期待！
                                </p>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        // 渲染 React 應用程式到 DOM
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
