                const isWarning = shop.name.includes('閉館');
                const cardBorderColor = isWarning ? 'border-orange-300 bg-orange-50' : 'border-gray-200 bg-white';
                const starIconColor = isWarning ? 'text-orange-500' : 'text-yellow-400';

                const card = document.createElement('div');
                card.className = `${cardBorderColor} rounded-2xl shadow-sm hover:shadow-xl border p-5 md:p-6 flex flex-col justify-between transition-all duration-300 transform hover:-translate-y-1.5 animate-fade-in`;
                card.style.animationDelay = `${delay}ms`;
                
                card.innerHTML = `
                    <div>
                        <div class="flex items-start justify-between mb-4 md:mb-5">
                            <h3 class="text-lg md:text-xl font-bold text-gray-800 leading-tight">${shop.name}</h3>
                        </div>
                        <div class="space-y-4">
                            <div class="flex items-start">
                                <i class="fa-solid ${isWarning ? 'fa-triangle-exclamation' : 'fa-star'} ${starIconColor} mt-1 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-[11px] md:text-xs text-gray-400 font-semibold mb-1">${isWarning ? '重要提醒' : '推薦商品'}</p>
                                    <p class="text-sm md:text-base text-gray-700 leading-relaxed">${shop.feature}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <i class="fa-solid fa-location-dot text-rose-400 mt-1 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-[11px] md:text-xs text-gray-400 font-semibold mb-1">購買地點</p>
                                    <p class="text-sm md:text-base text-gray-700 font-medium">${shop.loc}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <i class="fa-solid fa-train-subway text-orange-500 mt-1 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-[11px] md:text-xs text-gray-400 font-semibold mb-1">交通方式</p>
                                    <span class="inline-block bg-rose-50 text-rose-700 text-xs md:text-sm px-2.5 py-1 rounded-md font-semibold">${shop.transit}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Google Map 導航按鈕 -->
                    <div class="mt-6 pt-5 border-t ${isWarning ? 'border-orange-200' : 'border-gray-100'}">
                        <a href="${mapUrl}" target="_blank" rel="noopener noreferrer" 
                           class="w-full flex items-center justify-center px-4 py-2.5 border border-transparent rounded-xl shadow-sm text-sm md:text-base font-bold text-white ${isWarning ? 'bg-orange-500 hover:bg-orange-600' : 'bg-rose-600 hover:bg-rose-700'} active:scale-95 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-rose-500 transition-all">
                            <i class="fa-solid fa-map-location-dot mr-2"></i> ${isWarning ? '查看地圖位置' : '開啟 Google Map 導航'}
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 點擊分類按鈕的處理邏輯
        function filterCategory(category, btnElement) {
            // 移除所有按鈕的 active 狀態
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));

            // 為當前點擊的按鈕加上 active 狀態
            btnElement.classList.add('active');

            // 渲染對應的資料
            renderCards(category);
        }

        // 初始載入時顯示第一類 (流行服飾)
        window.onload = () => {
            const firstBtn = document.querySelector('.tab-btn');
            filterCategory('fashion', firstBtn);
        };
    </script>
</body>
</html>
