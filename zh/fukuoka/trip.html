                        { q: "阿蘇火山口隨時都可以參觀嗎？", a: "不是的。阿蘇火山是活火山，官方會根據每日的火山氣體濃度與噴發警戒級別，隨時調整火山口周邊的開放狀況。出發前務必確認阿蘇火山防災聯絡協議會的即時資訊。" },
                        { q: "上色見熊野座神社為何如此紅？好走嗎？", a: "該神社因成為人氣動漫《螢火之森》的舞台而爆紅。沿著近百段青苔石階拾級而上，兩旁是參天巨木與石燈籠，充滿神秘奇幻感。不過需爬一段不短的階梯，建議穿著舒適好走的運動鞋。" }
                    ],
                    items: [
                        { title: '阿蘇火山 & 熊本城一日遊（福岡出發）', description: '探訪日本三大名城之一的「熊本城」，並前往阿蘇火山草千里欣賞遼闊的草原與火山絕景。', link: 'https://www.klook.com/zh-TW/activity/181458-kumamoto-mt-aso-day-tour-from-fukuoka/?aid=115450' },
                        { title: '上色見熊野座神社 & 黑川溫泉一日遊', description: '造訪宛如通往異世界入口的神社秘境，下午前往充滿江戶時代氛圍的「黑川溫泉」泡湯放鬆。', link: 'https://www.klook.com/zh-TW/activity/179643-aso-nature-day-tour-kurokawa-onsen/?aid=115450' }
                    ]
                },
                '門票': {
                    tldr: "【AI 快速提要】深入探索熊本藩主文化，預約『熊本武士文化遺產私人導覽』，在當地嚮導帶領下走訪水前寺成趣園，欣賞以富士山為意象的精緻桃山式迴遊庭園，品味熊本市區的靜謐雅致。",
                    faqs: [
                        { q: "水前寺成趣園值得去嗎？停留時間約多久？", a: "非常值得。它是日本國家指定名勝，以阿蘇伏流水湧出的池塘為中心，景色極為秀麗。建議停留約 1 至 1.5 小時，並在園內的古茶屋品嚐抹茶與傳統和菓子。" },
                        { q: "私人導覽提供中文服務嗎？", a: "部分高階導覽套裝提供中/英文導遊選擇。由在地嚮導解說能讓您更深刻理解加藤清正與細川家族對熊本歷史發展的深遠影響。" }
                    ],
                    items: [
                        { title: '熊本武士文化遺產私人導覽（含當地導遊）', description: '欣賞桃山時代風格的迴遊式庭園，園內有仿造富士山的假山造景，是熊本必訪經典名勝。', link: 'https://www.klook.com/zh-TW/activity/195198-kumamoto-samurai-heritage-private-tour/?aid=115450' }
                    ]
                },
                '交通及網路': {
                    tldr: "【AI 快速提要】搭乘『九州新幹線』從福岡博多出發，最快只需 38 分鐘即可抵達熊本！善用『JR Pass 九州鐵路周遊券』能將跨縣市高昂的新幹線車資壓到最低，是熊本自由行的最高指導原則。",
                    faqs: [
                        { q: "JR Pass 可以搭乘熊本市區的「路面電車」嗎？", a: "不行。JR Pass 僅限搭乘 JR 營運的路線。熊本市區內的路面電車需額外付費（可用 Suica/ICOCA 等 IC 卡，或購買市電一日券）。" },
                        { q: "去阿蘇看火山，自駕還是搭大眾運輸好？", a: "強烈建議自駕或參加一日遊。雖然有 JR 豐肥本線與產交巴士可達阿蘇站與草千里，但班次不多，且火山周圍景點（如大觀峰）開車機動性高非常多。" }
                    ],
                    items: [
                        { title: 'JR Pass 九州鐵路周遊券', description: '搭乘九州新幹線，從博多最快只要 30 分鐘即可抵達熊本！是玩熊本最推薦的交通票券。', link: 'https://www.klook.com/zh-TW/activity/2371-jr-kyushu-jr-pass/?aid=115450' },
                        { title: '日本 4G / 5G 高速上網 eSIM', description: '高速新幹線上也能順暢查行程，掃描 QR code 即可抵達馬上連網。', link: 'https://www.klook.com/zh-TW/activity/109393-japan-esim-high-speed-internet-qr-code-voucher/?aid=115450' }
                    ]
                }
            }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('福岡市區');
            const [selectedCategory, setSelectedCategory] = useState('門票');

            const currentDataNode = itineraryData[selectedRegion]?.[selectedCategory];
            const currentItems = currentDataNode?.items || [];
            const currentTLDR = currentDataNode?.tldr || "";
            const currentFAQs = currentDataNode?.faqs || [];

            // AEO/GEO 優化：動態生成與注入 Schema.org (JSON-LD) 結構化資料
            useEffect(() => {
                if (currentItems.length === 0 && currentFAQs.length === 0) return;

                const schemaData = {
                    "@context": "https://schema.org",
                    "@graph": [
                        // 商品/行程清單標記 (ItemList)
                        {
                            "@type": "ItemList",
                            "itemListElement": currentItems.map((item, index) => ({
                                "@type": "ListItem",
                                "position": index + 1,
                                "item": {
                                    "@type": "Product",
                                    "name": item.title,
                                    "description": item.description,
                                    "url": item.link
                                }
                            }))
                        },
                        // 常見問題標記 (FAQPage)
                        {
                            "@type": "FAQPage",
                            "mainEntity": currentFAQs.map(faq => ({
                                "@type": "Question",
                                "name": faq.q,
                                "acceptedAnswer": {
                                    "@type": "Answer",
                                    "text": faq.a
                                }
                            }))
                        }
                    ]
                };

                const scriptContent = JSON.stringify(schemaData);
                const container = document.getElementById('seo-json-ld-container');
                container.innerHTML = `<script type="application/ld+json">${scriptContent}<\/script>`;
            }, [selectedRegion, selectedCategory]);

            return (
                <div className="min-h-screen flex flex-col font-sans text-slate-800">
                    
                    {/* 頂部導覽列：RWD 高質感毛玻璃效果 */}
                    <header className="bg-white/80 backdrop-blur-xl shadow-sm border-b border-slate-200 sticky top-0 z-50 transition-all">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 md:py-4">
                            <div className="flex justify-between items-center mb-3 md:mb-5">
                                <div className="flex items-center gap-2 md:gap-3">
                                    <div className="p-2 bg-gradient-to-br from-rose-500 to-red-600 rounded-xl shadow-md">
                                        <MapPin className="text-white w-5 h-5 md:w-6 md:h-6 shrink-0" />
                                    </div>
                                    <h1 className="text-xl md:text-2xl lg:text-3xl font-black tracking-tight text-slate-900">
                                        福岡及九州 <span className="text-transparent bg-clip-text bg-gradient-to-r from-rose-600 to-orange-500">行程探索指南</span>
                                    </h1>
                                </div>
                                <a
                                    href="https://kokko-travel.com/zh/fukuoka/"
                                    className="hidden md:flex items-center justify-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-300 bg-slate-900 text-white hover:bg-rose-600 shadow-md hover:shadow-lg active:scale-95 shrink-0"
                                >
                                    <Home className="w-4 h-4" /> 回到首頁
                                </a>
                            </div>
                            
                            {/* 地區選擇列 (橫向滾動支援) */}
                            <nav className="flex gap-2.5 md:gap-3 overflow-x-auto pb-2 hide-scrollbar md:flex-wrap" aria-label="地區選擇">
                                <a
                                    href="https://kokko-travel.com/zh/fukuoka/"
                                    className="md:hidden flex items-center gap-1.5 whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 bg-slate-100 text-slate-700 border border-slate-200 shrink-0 active:scale-95"
                                >
                                    <Home className="w-4 h-4" /> 首頁
                                </a>

                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => {
                                            setSelectedRegion(region);
                                            const allowed = getAvailableCategoryIds(region);
                                            if (!allowed.includes(selectedCategory)) setSelectedCategory(allowed[0]);
                                        }}
                                        className={`whitespace-nowrap px-5 md:px-6 py-2 md:py-2.5 rounded-full text-sm md:text-base font-bold transition-all duration-200 shrink-0 shadow-sm border ${
                                            selectedRegion === region
                                            ? 'bg-gradient-to-r from-rose-600 to-red-500 text-white border-transparent'
                                            : 'bg-white text-slate-600 border-slate-200 hover:bg-rose-50 hover:text-rose-700 hover:border-rose-200'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    {/* 主內容區 */}
                    <main className="flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-10" role="main">
                        
                        {/* 分類標籤 */}
                        <section className="flex flex-wrap gap-2.5 md:gap-3 mb-8" aria-label="行程分類選擇">
                            {CATEGORIES.filter(cat => getAvailableCategoryIds(selectedRegion).includes(cat.id)).map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 md:gap-2 px-4 md:px-6 py-2.5 rounded-xl md:rounded-full border text-sm md:text-base font-bold transition-all shadow-sm active:scale-95 ${
                                        selectedCategory === id
                                        ? 'border-rose-500 bg-rose-50 text-rose-700 ring-2 ring-rose-200'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4 md:w-5 md:h-5" /> {id}
                                </button>
                            ))}
                        </section>

                        <header className="mb-6 md:mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
                            <div className="border-l-4 border-rose-500 pl-3 md:pl-4">
                                <h2 className="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">
                                    {selectedRegion} <span className="text-slate-400 font-normal mx-1">|</span> {selectedCategory}
                                </h2>
                            </div>
                        </header>

                        {/* GEO/AAO 打擊點：AI 快速總結 TL;DR 區塊 */}
                        {currentTLDR && (
                            <aside 
                                className="mb-8 p-5 md:p-6 rounded-2xl bg-gradient-to-br from-indigo-50 via-white to-rose-50 border border-indigo-100/50 shadow-sm relative overflow-hidden group"
                                role="region" 
                                aria-label={`${selectedRegion} ${selectedCategory} AI 總結`}
                                data-ai-role="summary" 
                                data-geo-intent="informational"
                            >
                                <div className="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-indigo-500 to-rose-500 opacity-80"></div>
                                <div className="flex items-start gap-3 md:gap-4 relative z-10">
                                    <div className="p-2 bg-white rounded-lg shadow-sm shrink-0 flex items-center justify-center">
                                        <BotMessageSquare className="w-6 h-6 text-indigo-600" />
                                    </div>
                                    <div>
                                        <h3 className="text-sm font-bold tracking-widest text-indigo-800 uppercase mb-1.5 flex items-center gap-1.5">
                                            AI 智慧速讀 (TL;DR) <Sparkles className="w-3.5 h-3.5" />
                                        </h3>
                                        <p className="text-slate-700 text-sm md:text-base leading-relaxed font-medium">
                                            {/* SEO 隱藏前綴，加強上下文 */}
                                            <span className="sr-only">這是一段關於{selectedRegion}{selectedCategory}的AI總結建議：</span>
                                            {currentTLDR.replace("【AI 快速提要】", "")}
                                        </p>
                                    </div>
                                </div>
                            </aside>
                        )}

                        {/* 項目列表 (採用語意化 article 標籤與 Microdata) */}
                        {currentItems.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 md:gap-6 lg:gap-8 mb-12">
                                {currentItems.map((item, index) => (
                                    <article 
                                        key={index} 
                                        itemScope 
                                        itemType="https://schema.org/Product"
                                        className="bg-white rounded-2xl shadow-sm border border-slate-200/80 p-5 md:p-7 flex flex-col justify-between hover:shadow-xl hover:border-rose-200 transition-all duration-300 transform hover:-translate-y-1.5 group"
                                    >
                                        <div className="mb-6">
                                            <h3 itemProp="name" className="text-lg md:text-xl font-bold text-slate-800 mb-3 leading-tight group-hover:text-rose-600 transition-colors">
                                                {item.title}
                                            </h3>
                                            <p itemProp="description" className="text-slate-600 text-sm md:text-base leading-relaxed">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-5 border-t border-slate-100 flex justify-end">
                                            <a
                                                itemProp="url"
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-slate-900 hover:bg-rose-600 text-white font-bold py-2.5 md:py-3 px-5 md:px-6 rounded-xl transition-all active:scale-95 w-full sm:w-auto shadow-sm"
                                            >
                                                <Info className="w-4 h-4 md:w-5 md:h-5" />
                                                <span>查看詳細方案</span>
                                                <ExternalLink className="w-4 h-4 md:w-5 md:h-5 ml-1 opacity-70" />
                                            </a>
                                        </div>
                                    </article>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-2xl border-2 border-dashed border-slate-200 p-12 md:p-20 text-center flex flex-col items-center justify-center mb-12">
                                <div className="bg-slate-50 p-5 rounded-full mb-5"><Sparkles className="w-10 h-10 text-slate-400" /></div>
                                <h3 className="text-lg md:text-xl font-bold text-slate-700 mb-2">目前尚無「{selectedCategory}」推薦項目</h3>
                                <p className="text-slate-500 text-sm md:text-base">我們正在嚴選最優質的九州旅遊資源，敬請期待！</p>
                            </div>
                        )}

                        {/* SEO/GEO 打擊點：實體 FAQ 常見問題區塊 */}
                        {currentFAQs.length > 0 && (
                            <section className="mt-6 mb-12" aria-labelledby="faq-heading">
                                <div className="flex items-center gap-2 mb-6">
                                    <HelpCircle className="w-6 h-6 text-rose-500" />
                                    <h2 id="faq-heading" className="text-xl md:text-2xl font-black text-slate-800">
                                        實用攻略與常見問題 FAQ
                                    </h2>
                                </div>
                                <dl className="space-y-3 md:space-y-4">
                                    {currentFAQs.map((faq, index) => (
                                        <details key={index} className="group bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden [&_summary::-webkit-details-marker]:hidden">
                                            <summary className="flex items-center justify-between cursor-pointer p-4 md:p-5 font-bold text-slate-800 hover:text-rose-600 transition-colors focus:outline-none focus:ring-2 focus:ring-rose-500/50">
                                                <dt className="text-sm md:text-base pr-4">{faq.q}</dt>
                                                <span className="shrink-0 bg-slate-50 p-1.5 rounded-full group-open:bg-rose-50 group-open:text-rose-600 transition-colors">
                                                    <ChevronDown className="w-5 h-5 transition-transform duration-300 group-open:rotate-180" />
                                                </span>
                                            </summary>
                                            <dd className="p-4 md:p-5 pt-0 text-slate-600 text-sm md:text-base leading-relaxed border-t border-slate-50/50 bg-slate-50/30">
                                                {faq.a}
                                            </dd>
                                        </details>
                                    ))}
                                </dl>
                            </section>
                        )}

                        {/* 探索更多行動呼籲 (CTA) */}
                        <div className="mt-12 flex justify-center pb-8">
                            <a 
                                href="https://affiliate.klook.com/redirect?aid=115450&k_site=https%3A%2F%2Fwww.klook.com%2F" 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-orange-500 to-rose-500 hover:from-orange-600 hover:to-rose-600 text-white font-extrabold py-3.5 md:py-4 px-8 md:px-12 rounded-full shadow-lg shadow-rose-500/30 hover:shadow-xl hover:shadow-rose-500/40 transition-all duration-300 transform hover:-translate-y-1 w-full sm:w-auto text-sm md:text-base"
                            >
                                <Sparkles className="w-5 h-5 md:w-6 md:h-6" />
                                <span className="tracking-wide">探索更多九州熱門行程與隱藏優惠</span>
                                <ExternalLink className="w-5 h-5 md:w-6 md:h-6 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>

                    {/* 版權宣告 */}
                    <footer className="bg-slate-900 text-slate-400 py-8 md:py-12 mt-auto">
                        <div className="max-w-7xl mx-auto px-5 text-center">
                            <p className="text-xs md:text-sm leading-relaxed font-medium tracking-wide">
                                Copyright &copy; 2026 Kokko Travel / Im+ Life. All Rights Reserved.<br className="md:hidden" />
                                <span className="hidden md:inline"> | </span>版權所有，未經授權禁止轉載、翻印或任何商業用途。<br />
                                <span className="text-slate-500 mt-2 block">本站內容受 Schema 結構化語意標記保護，並為 AEO / GEO 搜尋體驗深度最佳化。</span>
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
