                        {n:"華人宗教用品大宗",f:"平西市場周邊有許多販售傳統香燭、神像與華人宗教用品的老店，規模比第五郡更大。",a:"Tháp Mười, Quận 6",t:"從捷運濱城站搭Grab抵達平西市場外圍的馬路上即可看到。"},
                        {n:"在地塑膠/竹編雜貨",f:"第六郡是批發大本營，這裡可以買到極其便宜的編織提籃、塑膠椅與生活雜貨。",a:"Chợ Bình Tây 外圍",t:"從捷運濱城站轉搭Grab至平西市場周邊巷弄體驗當地的批發文化。"}
                    ]
                }
            },
            d7: {
                name: "第七郡 (富美興)",
                cat: {
                    souvenir: [
                        {n:"樂天超市 伴手禮特區",f:"觀光客最愛！超市內特別規劃了「伴手禮專區」，把最熱門的G7咖啡、芒果乾全集中在一起。",a:"469 Nguyễn Hữu Thọ, Quận 7",t:"從捷運濱城站搭Grab南下，車程約20-25分鐘（車資約10-15萬越盾），採買完直接搭車回飯店最省力。", cLink:"#", cName:"Lotte Mart 遊客專屬折扣 (範例)", cIcon:"fa-solid fa-cart-shopping"},
                        {n:"高檔燕窩專賣店",f:"富美興區有許多裝潢氣派的燕窩專賣店，提供高品質的越南野生/屋燕燕窩。",a:"Khu Phú Mỹ Hưng, Quận 7",t:"從捷運濱城站搭Grab車程約25-30分鐘，位於富美興高級住宅區內，街道寬敞適合步行。"}
                    ],
                    fashion: [
                        {n:"Crescent Mall (新月廣場)",f:"胡志明市最美的高級購物中心之一。緊鄰半月湖，品牌多元，逛起來非常寬敞舒適。",a:"101 Tôn Dật Tiên, Quận 7",t:"從捷運濱城站搭Grab約30分鐘；商場外可連接星光橋步行散步。"},
                        {n:"SC VivoCity",f:"由新加坡財團打造的超大型商場。平價服飾、Uniqlo、各類運動鞋品牌超級齊全。",a:"1058 Nguyễn Văn Linh, Quận 7",t:"從捷運濱城站搭Grab車程約25分鐘可達第七郡主幹道Nguyễn Văn Linh上。"}
                    ],
                    beauty: [
                        {n:"Guardian (Crescent Mall)",f:"位於商場內，環境極佳，適合買些隨身常備藥或平價開架彩妝。",a:"Crescent Mall B1, Quận 7",t:"從捷運濱城站搭Grab至Crescent Mall商場地下1樓，約30分鐘。"},
                        {n:"韓國進口美妝店",f:"第七郡是著名的「韓國村」，路上隨處可見專賣韓國最新流行保養品與彩妝的小店。",a:"Phú Mỹ Hưng, Quận 7",t:"從捷運濱城站搭Grab約30分鐘至富美興韓國村（如Sky Garden周邊）抵達後步行漫遊。"}
                    ],
                    mart: [
                        {n:"Lotte Mart (第七郡南西貢店)",f:"胡志明市「買伴手禮最強超市」！三層樓超大空間，買咖啡、帶皮腰果、河粉包一次搞定。",a:"469 Nguyễn Hữu Thọ, Quận 7",t:"從捷運濱城站搭Grab車程約20-25分鐘即可抵達這棟極具標誌性的三層樓大賣場。"},
                        {n:"K-Market / K-Mart",f:"想念韓國零食或泡麵？第七郡有全越南最密集的韓國超市，品項與韓國同步。",a:"Phú Mỹ Hưng, Quận 7",t:"建議從捷運濱城站搭Grab到韓國聚落（Sky Garden等）後徒步逛各家超市。"},
                        {n:"Finelife Supermarket",f:"Co.opmart旗下的高階品牌超市，生鮮與高檔進口食材豐富，環境高級。",a:"Urban Hill, Quận 7",t:"從捷運濱城站搭Grab車程約30分鐘至第七郡高級公寓下方，客群主要為韓國外派人士。"}
                    ],
                    hobby: [
                        {n:"誠品風格書店 (商場內)",f:"Crescent Mall 與 VivoCity 內皆有大型書店，販售精緻文具、原文書與玩具模型。",a:"各大商場內",t:"從捷運濱城站搭Grab抵達商場(車程30分)後直接搭電梯上樓即可。"},
                        {n:"Board Game 咖啡廳",f:"第七郡年輕人聚集地，有許多販售/體驗桌遊的特色咖啡館。",a:"Phú Mỹ Hưng, Quận 7",t:"從捷運濱城站搭Grab約30分鐘，是體驗當地韓國年輕人生活的好去處。"}
                    ]
                }
            }
        };

        const catsMap = {
            souvenir: { icon: "🛍️", name: "伴手禮", bg: "bg-rose-50 text-rose-700 hover:bg-rose-600 hover:text-white border-rose-200" },
            fashion:  { icon: "🏬", name: "百貨服飾", bg: "bg-fuchsia-50 text-fuchsia-700 hover:bg-fuchsia-600 hover:text-white border-fuchsia-200" },
            beauty:   { icon: "💊", name: "藥妝美妝", bg: "bg-sky-50 text-sky-700 hover:bg-sky-600 hover:text-white border-sky-200" },
            mart:     { icon: "🛒", name: "超市零食", bg: "bg-emerald-50 text-emerald-700 hover:bg-emerald-600 hover:text-white border-emerald-200" },
            hobby:    { icon: "🧸", name: "文創雜貨", bg: "bg-amber-50 text-amber-700 hover:bg-amber-600 hover:text-white border-amber-200" }
        };

        let currentCity = "d1"; // Default view: District 1
        let currentCat = "souvenir"; 

        const cityContainer = document.getElementById('city-container');
        const categoryContainer = document.getElementById('category-container');
        const shopContainer = document.getElementById('shop-container');

        // Scroll Function for Nav Arrows
        function scrollNav(containerId, offset) {
            const container = document.getElementById(containerId);
            if (container) {
                container.scrollBy({ left: offset, behavior: 'smooth' });
            }
        }

        function initUI() {
            // 確保區域按鈕排序嚴格依照：1 -> 2 -> 3 -> 4 -> 5 -> 6 -> 7
            const cityOrder = ['d1', 'd2', 'd3', 'd4', 'd5', 'd6', 'd7'];
            
            cityOrder.forEach(cityKey => {
                if(db[cityKey]) {
                    const btn = document.createElement('button');
                    btn.className = `city-btn whitespace-nowrap px-6 py-2.5 rounded-full border border-rose-200 bg-white text-rose-700 font-bold hover:bg-rose-100 hover:text-rose-900 shadow-sm ${cityKey === currentCity ? 'active' : ''}`;
                    btn.innerText = db[cityKey].name;
                    btn.onclick = () => {
                        document.querySelectorAll('.city-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        currentCity = cityKey;
                        renderContent();
                    };
                    cityContainer.appendChild(btn);
                }
            });

            // Render Categories
            Object.keys(catsMap).forEach(catKey => {
                const c = catsMap[catKey];
                const btn = document.createElement('button');
                btn.className = `tab-btn whitespace-nowrap px-5 py-2.5 rounded-full border transition-all font-bold shadow-sm flex items-center ${c.bg} ${catKey === currentCat ? 'active' : ''}`;
                btn.innerHTML = `<span class="mr-1.5 text-lg">${c.icon}</span> ${c.name}`;
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCat = catKey;
                    renderContent();
                };
                categoryContainer.appendChild(btn);
            });

            // Load Default View
            renderContent();
        }

        function renderContent() {
            shopContainer.innerHTML = '';
            const items = db[currentCity].cat[currentCat];

            if(!items || items.length === 0) {
                shopContainer.innerHTML = `<div class="col-span-full text-center py-12 text-slate-400 text-lg font-bold">此分類目前無推薦資料。</div>`;
                return;
            }

            // 將「含有優惠券 (cLink)」的店家排序到最上方
            const sortedItems = [...items].sort((a, b) => {
                if (a.cLink && !b.cLink) return -1;
                if (!a.cLink && b.cLink) return 1;
                return 0;
            });

            sortedItems.forEach((item, index) => {
                // Generate Google Maps URL
                const pureAddress = item.a.split('<br>')[0];
                const encodedQuery = encodeURIComponent(`${item.n} 越南 胡志明市 ${pureAddress}`);
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;

                // 如果該項目有專屬優惠券，生成粉色優惠券按鈕
                const couponHtml = item.cLink ? `
                    <a href="${item.cLink}" target="_blank" rel="noopener noreferrer" 
                       class="w-full flex items-center justify-center gap-2 px-4 py-3 mb-3 border border-rose-300 rounded-xl shadow-sm text-sm font-bold text-rose-600 bg-rose-50 hover:bg-rose-100 hover:text-rose-700 hover:border-rose-400 focus:outline-none transition-colors">
                        <i class="${item.cIcon} text-lg"></i>
                        領取優惠：${item.cName}
                    </a>
                ` : '';

                const card = document.createElement('div');
                card.className = `bg-white rounded-2xl shadow-sm border ${item.cLink ? 'border-rose-200' : 'border-rose-50'} p-6 flex flex-col justify-between hover:shadow-lg transition-shadow duration-300 transform hover:-translate-y-1 animate-fade-in`;
                card.style.animationDelay = `${index * 0.05}s`;
                
                card.innerHTML = `
                    <div>
                        <div class="flex items-start justify-between mb-4">
                            <h3 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                                ${item.n}
                                ${item.cLink ? '<span class="bg-rose-500 text-white text-[10px] px-2 py-0.5 rounded uppercase tracking-wider shadow-sm">優惠券</span>' : ''}
                            </h3>
                        </div>
                        <div class="space-y-4">
                            <div class="flex items-start">
                                <i class="fa-solid fa-star text-amber-400 mt-0.5 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-xs text-rose-400 font-bold mb-1 uppercase tracking-wider">亮點特色</p>
                                    <p class="text-sm text-slate-600 leading-relaxed font-medium">${item.f}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <i class="fa-solid fa-location-dot text-rose-500 mt-0.5 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-xs text-rose-400 font-bold mb-1 uppercase tracking-wider">地址</p>
                                    <p class="text-sm text-slate-600 font-medium">${item.a}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <i class="fa-solid fa-motorcycle text-rose-500 mt-0.5 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-xs text-rose-400 font-bold mb-1 uppercase tracking-wider">交通方式</p>
                                    <span class="inline-block bg-rose-50 text-rose-700 text-xs px-2.5 py-1 rounded-md font-bold text-left leading-normal">${item.t}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-6 pt-4 border-t border-rose-50">
                        ${couponHtml}
                        <a href="${mapsUrl}" target="_blank" rel="noopener noreferrer" 
                           class="w-full flex items-center justify-center gap-2 px-4 py-3 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white btn-maps focus:outline-none transition-colors">
                            <i class="fa-solid fa-map-location-dot text-lg"></i>
                            開啟 Google Maps 導航
                        </a>
                    </div>
                `;
                shopContainer.appendChild(card);
            });
        }

        window.onload = initUI;
    </script>
</body>
</html>
