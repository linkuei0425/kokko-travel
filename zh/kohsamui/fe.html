<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蘇梅島度假勝地導覽</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* 隱藏卷軸但保留滑動功能 */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body id="app-body" class="min-h-screen font-sans pb-12 transition-colors duration-500 text-gray-800">

  <!-- Header -->
  <header id="app-header" class="bg-white/80 backdrop-blur-md sticky top-0 z-10 shadow-sm border-b transition-colors duration-500">
    
    <!-- 回到首頁按鈕 -->
    <div class="max-w-6xl mx-auto px-4 pt-4">
      <a href="https://linkuei0425.github.io/KohSamui/" class="inline-flex items-center px-3 py-1.5 text-sm font-medium text-gray-600 bg-white/60 hover:bg-white hover:text-gray-900 rounded-full border border-gray-200 shadow-sm transition-all duration-300 hover:shadow-md hover:-translate-x-1">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        回到首頁
      </a>
    </div>

    <div class="max-w-6xl mx-auto px-4 pb-6 pt-2">
      <div class="flex items-center justify-center space-x-3 mb-2">
        <div id="title-icon-left" class="animate-pulse"></div>
        <h1 class="text-2xl md:text-3xl font-bold text-gray-800 transition-colors duration-500">
          蘇梅島度假勝地導覽
        </h1>
        <div id="title-icon-right" class="animate-pulse"></div>
      </div>
      <p class="text-center text-gray-500 text-sm md:text-base">
        精選查汶、拉邁、波普、西海岸等絕美<span id="category-text">海灘</span>勝地
      </p>
    </div>

    <!-- Category Toggle -->
    <div class="flex justify-center mb-4">
      <div class="bg-gray-100/80 backdrop-blur-sm p-1.5 rounded-full inline-flex border border-gray-200 shadow-inner">
        <button id="btn-beach" class="flex items-center px-5 py-2 rounded-full text-sm font-bold transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
          陽光海灘
        </button>
        <button id="btn-attraction" class="flex items-center px-5 py-2 rounded-full text-sm font-bold transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          特色景點
        </button>
      </div>
    </div>
    
    <!-- Navigation Tabs -->
    <div class="max-w-4xl mx-auto px-4 pb-4">
      <div id="tabs-container" class="flex overflow-x-auto hide-scrollbar space-x-2 md:justify-center py-2">
        <!-- Tabs injected by JS -->
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-4 mt-8">
    <div class="mb-6 flex items-center space-x-2 transition-colors duration-500" id="section-title-container">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
      <h2 id="section-title" class="text-2xl font-bold border-b-2 pb-1 pr-4 inline-block transition-colors duration-500">
        查汶區 精選景點
      </h2>
    </div>

    <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Cards injected by JS -->
    </div>
  </main>
  
  <!-- Footer -->
  <footer class="max-w-6xl mx-auto px-4 mt-16 text-center text-gray-400 text-sm">
    <p id="footer-text">※ 泰國為熱帶氣候，雨季多落於10至12月，建議出發前查詢當地天氣狀況以安排最佳行程。</p>
  </footer>

  <script>
    const beachesData = {
      '查汶區': [
        { name: '查汶海灘 (Chaweng Beach)', feature: '蘇梅島最長、最熱鬧的海灘，擁有細白如粉的沙灘與清澈見底的海水。周邊水上活動豐富，夜晚更有精彩的火舞表演與熱鬧的沙灘酒吧派對，是島上最具活力的區域。', transport: '從蘇梅島機場搭乘計程車或雙條車（Songthaew）約 10-15 分鐘即可抵達。' },
        { name: '查汶小海灘 (Chaweng Noi)', feature: '相較於熱鬧的主海灘，這裡更為寧靜且隱蔽。水質極佳，海面平靜，非常適合游泳與放鬆，周圍多為高級度假村，能享受較高品質的度假氛圍。', transport: '位於查汶海灘以南，沿著環島公路（4169號）搭乘雙條車即可抵達。' }
      ],
      '拉邁區': [
        { name: '拉邁海灘 (Lamai Beach)', feature: '島上第二大度假海灘，氛圍比查汶悠閒許多。海水較深，非常適合游泳，沙灘旁有許多平價美味的海鮮餐廳與小酒吧，是歐美旅客極度喜愛的放鬆勝地。', transport: '從查汶區搭乘雙條車往南行駛，車程約 15-20 分鐘可達。' },
        { name: '水晶灣 (Crystal Bay)', feature: '又稱銀海灘 (Silver Beach)，這是一處隱藏在巨石之間的絕美小海灣。水質清澈見底，退潮時可以在海床上漫步，更是浮潛看熱帶小魚的絕佳秘境。', transport: '位於查汶與拉邁之間，需留意路邊「Silver Beach Resort」的招牌進入。' }
      ],
      '波普 / 湄南': [
        { name: '波普海灘 (Bophut Beach)', feature: '以平靜的海面與濃厚的復古風情聞名，沙粒雖較粗，但環境清幽。緊鄰著名的「漁夫村」，傍晚時分在海灘旁享用晚餐或漫步非常有情調。', transport: '從蘇梅島機場出發約 15 分鐘車程，位於島嶼北部環島公路上。' },
        { name: '湄南海灘 (Mae Nam Beach)', feature: '擁有長達4公里的寧靜海岸線，隔著海灣可以遠眺對岸的帕岸島（Koh Phangan）。這裡是享受遠離喧囂、安靜閱讀或做日光浴的絕佳地點。', transport: '位於波普海灘以西，搭乘雙條車沿北部環島公路行駛可達。' }
      ],
      '西海岸 / 南部': [
        { name: '塔林甘海灘 (Taling Ngam)', feature: '被譽為蘇梅島最美的落日觀賞地。這裡保留了極度原始靜謐的環境，遠離東岸的商業區，能享受真正的避世感，五星級豪華度假村林立。', transport: '位於島嶼西南部，建議租借機車或包車前往，從查汶出發約需 45 分鐘車程。' },
        { name: '利巴諾伊海灘 (Lipa Noi)', feature: '沙質細膩且海床沒有銳利的礁石，海水非常淺，非常適合帶小孩的家庭前往戲水。這裡同樣擁有極佳的視野，是賞夕陽的好去處。', transport: '靠近納通碼頭以南，交通較為不便，建議騎乘機車或包車前往。' }
      ]
    };

    const attractionsData = {
      '查汶區': [
        { name: '查汶觀景台 (Chaweng Viewpoint)', feature: '位於查汶與拉邁之間的沿海公路上，地勢較高，可180度俯瞰蔚藍的泰國灣與查汶海灘的絕美海岸線，是環島時不可錯過的拍照打卡熱門點。', transport: '騎乘機車或開車沿 4169 環島公路往南行駛，留意路邊的觀景台停車區標誌。' },
        { name: '尚泰蘇梅島購物中心', feature: '島上最大、最現代化的露天購物中心 (Central Festival)。擁有眾多國際品牌、特色餐廳與夜市攤位，設計融合了熱帶花園風格，是避暑逛街首選。', transport: '位於查汶海灘大街中心點，周邊飯店步行即可到達，或搭乘雙條車前往。' }
      ],
      '拉邁區': [
        { name: '祖父祖母石 (Hin Ta Hin Yai)', feature: '蘇梅島最著名的自然奇觀，由天然風化形成的奇岩怪石，造型酷似男女生殖器官，令人會心一笑。周邊的海水十分清澈，入口處還有販賣椰子冰淇淋的市集。', transport: '位於拉邁海灘南端，從環島公路轉入小徑步行可達，沿途皆有明確指標。' },
        { name: '納芒瀑布 (Na Muang Waterfall)', feature: '島上最壯觀的瀑布群，隱藏在茂密熱帶雨林中。分為一號（較低易達）與二號（較高需健行）瀑布，可在天然的水池中泡水消暑，感受大自然氣息。', transport: '位於島嶼中南部，沿 4169 公路有明顯指標，轉入後需步行或搭乘園區接駁車。' },
        { name: '關帝神廟 (Guan Yu Shrine)', feature: '巨大的青銅關公像高達16公尺，是島上華人信仰的中心。充滿濃厚的中國風情與歷史感，周圍也有許多傳統的中式小吃。', transport: '位於拉邁以南的環島公路旁，騎車經過時非常顯眼，必定不會錯過。' }
      ],
      '波普 / 湄南': [
        { name: '大佛寺 (Wat Phra Yai)', feature: '蘇梅島最具代表性的地標，一尊高達 12 公尺的金色大佛端坐在小島上，莊嚴肅穆。爬上階梯後，可登高360度俯瞰周邊壯麗海景與機場飛機起降。', transport: '位於東北角芬島上，有堤道與本島相連，從波普區騎車約 10 分鐘可達。' },
        { name: '漁夫村步行街 (Fisherman\'s Village)', feature: '保留了傳統木造中葡式建築，充滿復古風情。每週一、三、五晚上的夜市熱鬧非凡，充滿特色手工藝品與街頭美食，是島上最好逛的夜市之一。', transport: '位於波普海灘旁，北部環島公路上，搭乘雙條車至波普區入口步行進入。' },
        { name: '千手觀音廟 (Wat Plai Laem)', feature: '融合了泰式與中式風格的寺廟，建於寧靜的湖面上。最吸睛的是巨大且色彩鮮豔的十八臂觀音像與彌勒佛像，湖中還可餵食鯉魚與鯰魚。', transport: '距離大佛寺僅約 5 分鐘車程，通常旅客會將兩者安排在同一半日遊行程中。' }
      ],
      '西海岸 / 南部': [
        { name: '納通鎮 (Nathon Town)', feature: '蘇梅島的行政與交通中心，主要渡輪碼頭所在地。這裡保留了老舊的木造建築，有許多便宜道地的在地小吃，更是欣賞絕美海上夕陽的最佳地點。', transport: '位於島嶼西海岸，任何一條主要雙條車路線的終點或起點皆會經過此地。' },
        { name: '蘇梅島大象保護區', feature: '島上首個提倡道德對待大象的保護區。這裡嚴禁騎乘大象，遊客可以透過餵食、跟著大象在叢林散步與泥漿浴，進行友善互動，深具保育教育意義。', transport: '位於波普與湄南之間的山林中，通常需預訂官方半日遊行程，包含專車接送。' }
      ]
    };

    // 狀態
    let activeCategory = 'beaches';
    let activeTab = '查汶區';

    // SVG 圖示
    const svgSun = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`;
    const svgMap = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>`;
    const svgSparkles = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-400 mr-2 flex-shrink-0 mt-0.5"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>`;
    const svgTransport = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500 mr-2 flex-shrink-0 mt-0.5"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>`;

    const themeConfig = {
      beaches: {
        bg: 'bg-sky-50', selection: 'selection:bg-sky-300', textMain: 'text-sky-500',
        borderMain: 'border-sky-100', tabActive: 'bg-sky-500 text-white shadow-md transform scale-105',
        tabHover: 'bg-white text-gray-600 hover:bg-sky-100 hover:text-sky-600', iconH2: 'text-sky-600', borderH2: 'border-sky-200',
        cardGradient: 'from-sky-300 via-sky-400 to-sky-300 group-hover:from-sky-400 group-hover:to-sky-500',
        numberBg: 'bg-sky-100 text-sky-600', transportBg: 'bg-sky-50',
        btnActive: 'bg-white text-sky-500 shadow-sm transform scale-105',
        btnInactive: 'text-gray-500 hover:text-sky-400 hover:bg-white/50',
        transportIconColor: 'text-sky-500'
      },
      attractions: {
        bg: 'bg-emerald-50', selection: 'selection:bg-emerald-300', textMain: 'text-emerald-500',
        borderMain: 'border-emerald-100', tabActive: 'bg-emerald-500 text-white shadow-md transform scale-105',
        tabHover: 'bg-white text-gray-600 hover:bg-emerald-100 hover:text-emerald-600', iconH2: 'text-emerald-600', borderH2: 'border-emerald-200',
        cardGradient: 'from-emerald-300 via-emerald-400 to-emerald-300 group-hover:from-emerald-400 group-hover:to-emerald-500',
        numberBg: 'bg-emerald-100 text-emerald-600', transportBg: 'bg-emerald-50',
        btnActive: 'bg-white text-emerald-500 shadow-sm transform scale-105',
        btnInactive: 'text-gray-500 hover:text-emerald-400 hover:bg-white/50',
        transportIconColor: 'text-emerald-500'
      }
    };

    function updateTheme() {
      const t = themeConfig[activeCategory];
      
      // Body & Header
      document.getElementById('app-body').className = `min-h-screen font-sans pb-12 transition-colors duration-500 text-gray-800 ${t.bg} ${t.selection} selection:text-white`;
      document.getElementById('app-header').className = `bg-white/80 backdrop-blur-md sticky top-0 z-10 shadow-sm border-b transition-colors duration-500 ${t.borderMain}`;
      
      // Icons & Text
      const iconSvg = activeCategory === 'beaches' ? svgSun : svgMap;
      document.getElementById('title-icon-left').innerHTML = iconSvg;
      document.getElementById('title-icon-right').innerHTML = iconSvg;
      document.getElementById('title-icon-left').className = `animate-pulse ${t.textMain}`;
      document.getElementById('title-icon-right').className = `animate-pulse ${t.textMain}`;
      
      document.getElementById('category-text').innerText = activeCategory === 'beaches' ? '陽光海灘' : '特色景點';

      // Section Title
      document.getElementById('section-title-container').className = `mb-6 flex items-center space-x-2 transition-colors duration-500 ${t.iconH2}`;
      document.getElementById('section-title').className = `text-2xl font-bold border-b-2 pb-1 pr-4 inline-block transition-colors duration-500 ${t.borderH2}`;

      // Toggle Buttons
      document.getElementById('btn-beach').className = `flex items-center px-5 py-2 rounded-full text-sm font-bold transition-all duration-300 ${activeCategory === 'beaches' ? t.btnActive : t.btnInactive}`;
      document.getElementById('btn-attraction').className = `flex items-center px-5 py-2 rounded-full text-sm font-bold transition-all duration-300 ${activeCategory === 'attractions' ? t.btnActive : t.btnInactive}`;
    }

    function renderTabs() {
      const t = themeConfig[activeCategory];
      const data = activeCategory === 'beaches' ? beachesData : attractionsData;
      const cities = Object.keys(data);
      const container = document.getElementById('tabs-container');
      
      // Ensure the active tab exists in the new category
      if (!cities.includes(activeTab)) {
        activeTab = cities[0];
      }

      container.innerHTML = cities.map(city => `
        <button
          onclick="setTab('${city}')"
          class="flex-shrink-0 px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-300 ease-in-out ${activeTab === city ? t.tabActive : t.tabHover}"
        >
          ${city}
        </button>
      `).join('');
    }

    function renderCards() {
      const t = themeConfig[activeCategory];
      const data = activeCategory === 'beaches' ? beachesData : attractionsData;
      const spots = data[activeTab];
      
      document.getElementById('section-title').innerText = `${activeTab} 精選景點`;

      const transportIconStyled = svgTransport.replace('text-blue-500', t.transportIconColor);

      const container = document.getElementById('cards-container');
      container.innerHTML = spots.map((spot, index) => `
        <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-shadow duration-300 overflow-hidden border border-gray-50 flex flex-col h-full group">
          <div class="h-2 w-full bg-gradient-to-r transition-colors duration-500 ${t.cardGradient}"></div>
          <div class="p-6 flex-grow flex flex-col">
            <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-start">
              <span class="rounded-full w-6 h-6 flex items-center justify-center text-sm mr-2 flex-shrink-0 mt-0.5 transition-colors duration-500 ${t.numberBg}">
                ${index + 1}
              </span>
              ${spot.name}
            </h3>
            
            <div class="mb-6 flex-grow">
              <div class="flex items-start text-gray-600 mb-1">
                ${svgSparkles}
                <span class="font-semibold text-gray-700">景點特色</span>
              </div>
              <p class="text-gray-600 leading-relaxed pl-7 text-sm">
                ${spot.feature}
              </p>
            </div>

            <div class="rounded-xl p-4 mt-auto transition-colors duration-500 ${t.transportBg}">
              <div class="flex items-start text-gray-700 mb-1">
                ${transportIconStyled}
                <span class="font-semibold">交通方式</span>
              </div>
              <p class="text-gray-600 text-sm pl-7 leading-relaxed">
                ${spot.transport}
              </p>
            </div>
          </div>
        </div>
      `).join('');
    }

    // 事件與更新邏輯
    function setCategory(category) {
      if (activeCategory === category) return;
      activeCategory = category;
      updateTheme();
      renderTabs();
      renderCards();
    }

    function setTab(tab) {
      if (activeTab === tab) return;
      activeTab = tab;
      renderTabs();
      renderCards();
    }

    document.getElementById('btn-beach').addEventListener('click', () => setCategory('beaches'));
    document.getElementById('btn-attraction').addEventListener('click', () => setCategory('attractions'));

    // 初始化
    updateTheme();
    renderTabs();
    renderCards();
  </script>
</body>
</html>
