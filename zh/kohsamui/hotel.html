            "westcoast": {
                name: "西海岸/塔林甘 (West Coast)",
                categories: {
                    "絕美夕陽秘境": [
                        { name: "Conrad Koh Samui (蘇梅島康萊德酒店)", feature: "懸崖地理位置，全房型夕陽景觀。", address: "49/8-9 Moo 4, Hillcrest Road, Taling Ngam", url: "https://hk.trip.com/hotels/koh-samui-hotel-detail-1007041/conrad-koh-samui/?Allianceid=7913725&SID=303108709&trip_sub1=&trip_sub3=D14573897" },
                        { name: "InterContinental Koh Samui Resort (蘇梅島洲際度假酒店)", feature: "白沙灘與懸崖景觀，極致避世感。", address: "279 Moo 3, Taling Ngam", url: "https://hk.trip.com/hotels/koh-samui-hotel-detail-1503695/intercontinental-koh-samui-resort/?Allianceid=7913725&SID=303108709&trip_sub1=&trip_sub3=D14573897" }
                    ],
                    "高CP值與便利": [
                        { name: "Rajapruek Samui Resort (拉查普魯克蘇梅島度假村)", feature: "位於利巴諾伊海灘，浪平沙細，夕陽迷人。", address: "124/1 Moo 2, Lipa Noi", url: "https://hk.trip.com/hotels/koh-samui-hotel-detail-687081/rajapruek-samui-resort/?Allianceid=7913725&SID=303108709&trip_sub1=&trip_sub3=D14573897" }
                    ]
                }
            },
            "phangan": {
                name: "帕岸島 (Koh Phangan)",
                categories: {
                    "頂級奢華海景": [
                        { name: "Santhiya Koh Phangan Resort & Spa (帕岸島桑提亞水療度假村)", feature: "傳統泰式柚木雕刻，依山傍海。", address: "22/7 Moo 5 Bantai", url: "https://hk.trip.com/hotels/koh-phangan-hotel-detail-712154/santhiya-koh-phangan-resort/?Allianceid=7913725&SID=303108709&trip_sub1=&trip_sub3=D14573897" },
                        { name: "Anantara Rasananda Koh Phangan Villas (帕岸島安納塔拉拉沙南達別墅度假村)", feature: "帕岸島奢華指標，隱密性極高。", address: "5/5 Moo 5 Thong Nai Pan Noi", url: "https://hk.trip.com/hotels/koh-phangan-hotel-detail-711145/anantara-rasananda-koh-phangan-villas/?Allianceid=7913725&SID=303108709&trip_sub1=&trip_sub3=D14573897" }
                    ],
                    "高CP值與便利": [
                        { name: "Explorar Koh Phangan (帕岸島探索者酒店)", feature: "成人限定，時尚海灘俱樂部風。", address: "44/133 Moo 6, Haad Rin", url: "https://hk.trip.com/hotels/koh-phangan-hotel-detail-1405275/the-coast-resort-koh-phangan/?Allianceid=7913725&SID=303108709&trip_sub1=&trip_sub3=D14573897" },
                        { name: "Cocohut Beach Resort & Spa (可可小屋海灘水療度假村)", feature: "近滿月派對區域，擁有私人沙灘。", address: "130/20 Moo 6, Haad Rin Nai", url: "https://hk.trip.com/hotels/koh-phangan-hotel-detail-712054/cocohut-beach-resort/?Allianceid=7913725&SID=303108709&trip_sub1=&trip_sub3=D14573897" }
                    ]
                }
            },
            "kohtao": {
                name: "龜島 (Koh Tao)",
                categories: {
                    "頂級奢華海景": [
                        { name: "Jamahkiri Resort & Spa (龜島加馬基里水療度假村)", feature: "豪華懸崖度假村，潛水客的奢華首選。", address: "21/2 Moo 3 Thian Og Bay", url: "https://hk.trip.com/hotels/koh-tao-hotel-detail-709189/jamahkiri-resort/?Allianceid=7913725&SID=303108709&trip_sub1=&trip_sub3=D14573897" },
                        { name: "Haadtien Beach Resort (哈天海灘度假村)", feature: "位於鯊魚灣，出門即可浮潛看海龜。", address: "19/9 Moo 3, Shark Bay", url: "https://hk.trip.com/hotels/koh-tao-hotel-detail-709185/haadtien-beach-resort/?Allianceid=7913725&SID=303108709&trip_sub1=&trip_sub3=D14573897" }
                    ],
                    "高CP值與便利": [
                        { name: "Sairee Hut Resort Koh Tao (龜島塞麗小屋度假村)", feature: "位於最熱鬧的塞麗海灘, 機能絕佳。", address: "14/45 Moo 1, Sairee Beach", url: "https://hk.trip.com/hotels/koh-tao-hotel-detail-709236/sairee-hut-resort/?Allianceid=7913725&SID=303108709&trip_sub1=&trip_sub3=D14573897" },
                        { name: "Simple Life Resort (簡單生活度假村)", feature: "深受潛水客喜愛，CP值極高。", address: "14/11 Moo 1, Sairee Beach", url: "https://hk.trip.com/hotels/koh-tao-hotel-detail-2133803/simple-life-resort-koh-tao/?Allianceid=7913725&SID=303108709&trip_sub1=&trip_sub3=D14573897" }
                    ]
                }
            }
        };

        const districtContainer = document.getElementById('district-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const contentArea = document.getElementById('content-area');
        let currentDistrictKey = null;
        let currentCategoryName = null;

        function initDistrictButtons() {
            Object.keys(hotelData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `snap-center whitespace-nowrap px-4 sm:px-6 py-2 sm:py-2.5 rounded-full font-bold text-sm sm:text-base transition-all duration-300 border area-btn-inactive shadow-sm flex-shrink-0 focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-offset-1`;
                btn.innerHTML = `<i class="fa-solid fa-map-pin mr-1.5 opacity-70"></i>${hotelData[key].name}`;
                btn.onclick = () => selectDistrict(key, btn);
                districtContainer.appendChild(btn);
            });
        }

        function scrollDistricts(direction) {
            const scrollAmount = 250;
            if (direction === 'left') {
                districtContainer.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
            } else {
                districtContainer.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            }
        }

        function selectDistrict(key, activeBtn) {
            currentDistrictKey = key;
            const allBtns = districtContainer.querySelectorAll('button');
            allBtns.forEach(btn => { btn.classList.remove('area-btn-active'); btn.classList.add('area-btn-inactive'); });
            activeBtn.classList.remove('area-btn-inactive');
            activeBtn.classList.add('area-btn-active');
            categoryContainer.classList.remove('hidden');
            renderCategoryButtons();
        }

        function renderCategoryButtons() {
            categoryContainer.innerHTML = '';
            const currentCategories = Object.keys(hotelData[currentDistrictKey].categories);
            currentCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-4 sm:px-5 py-2 rounded-xl font-bold text-sm sm:text-base transition-all duration-300 border cat-btn-inactive shadow-sm focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:ring-offset-1`;
                btn.innerText = cat;
                btn.onclick = () => selectCategory(cat, btn);
                categoryContainer.appendChild(btn);
            });
            const firstCatBtn = categoryContainer.querySelector('button');
            if(firstCatBtn) selectCategory(currentCategories[0], firstCatBtn);
        }

        function selectCategory(categoryName, activeBtn) {
            currentCategoryName = categoryName;
            const allBtns = categoryContainer.querySelectorAll('button');
            allBtns.forEach(btn => { btn.classList.remove('cat-btn-active'); btn.classList.add('cat-btn-inactive'); });
            activeBtn.classList.remove('cat-btn-inactive');
            activeBtn.classList.add('cat-btn-active');
            renderHotels();
        }

        function renderHotels() {
            const districtData = hotelData[currentDistrictKey];
            const hotels = districtData.categories[currentCategoryName] || [];
            
            let htmlContent = `
                <div class="flex flex-col sm:flex-row sm:items-center mb-6 border-b pb-4 border-cyan-100 animate-fade-in">
                    <h2 class="text-xl sm:text-2xl font-bold text-cyan-900 mr-3 mb-2 sm:mb-0"><i class="fa-solid fa-location-dot mr-2 text-cyan-500"></i>${districtData.name}</h2>
                    <span class="inline-block px-3 py-1 bg-cyan-100 text-cyan-700 text-xs sm:text-sm font-bold rounded-full border border-cyan-200 self-start sm:self-auto"><i class="fa-solid fa-tag mr-1"></i>${currentCategoryName}</span>
                </div>`;
                
            if (hotels.length === 0) {
                htmlContent += `
                    <div class="py-16 text-center animate-fade-in">
                        <i class="fa-solid fa-magnifying-glass text-4xl text-cyan-200 mb-4"></i>
                        <p class="text-slate-500 text-lg">此分類目前無推薦資料。</p>
                    </div>`;
            } else {
                htmlContent += `<div class="grid grid-cols-1 md:grid-cols-2 gap-5 sm:gap-6">`;
                hotels.forEach((hotel, index) => {
                    const linkTagHTML = hotel.url ? `
                        <a href="${hotel.url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center px-4 py-2.5 mt-4 rounded-xl text-sm font-bold bg-[#ff5b00] text-white hover:bg-[#e05000] transition-colors shadow-sm cursor-pointer w-full focus:outline-none focus:ring-2 focus:ring-[#ff5b00] focus:ring-offset-2">
                            <i class="fa-solid fa-magnifying-glass mr-1.5"></i>查看訂房優惠
                        </a>` : '';
                        
                    // 導入 Schema.org (Microdata) 以優化 GEO / AAO / AEO 抓取    
                    htmlContent += `
                        <article itemscope itemtype="https://schema.org/LodgingBusiness" class="bg-[#f8ffff] border border-cyan-50 p-5 sm:p-6 lg:p-7 rounded-2xl hover:shadow-lg transition-all duration-300 animate-fade-in flex flex-col h-full" style="animation-delay: ${index * 0.05}s;">
                            <div class="flex-grow">
                                <h3 itemprop="name" class="text-lg sm:text-xl font-extrabold text-cyan-900 flex items-start leading-snug mb-4">
                                    <span class="text-white bg-cyan-400/90 shadow-sm rounded-full w-6 h-6 sm:w-7 sm:h-7 flex items-center justify-center text-sm font-bold mr-2.5 flex-shrink-0 mt-0.5">${index + 1}</span>
                                    ${hotel.name}
                                </h3>
                                
                                <div class="space-y-3 sm:pl-9">
                                    <div class="flex items-start">
                                        <span class="font-bold text-cyan-800 bg-cyan-100 border border-cyan-200 px-2 py-0.5 rounded mr-2.5 flex-shrink-0 text-xs mt-0.5 tracking-wide"><i class="fa-solid fa-star mr-1"></i>亮點</span>
                                        <span itemprop="description" class="text-sm sm:text-base text-slate-700 leading-relaxed font-medium">${hotel.feature}</span>
                                    </div>
                                    <div itemprop="address" itemscope itemtype="https://schema.org/PostalAddress" class="flex items-start">
                                        <span class="font-bold text-cyan-800 bg-cyan-100 border border-cyan-200 px-2 py-0.5 rounded mr-2.5 flex-shrink-0 text-xs mt-0.5 tracking-wide"><i class="fa-solid fa-map-pin mr-1"></i>位置</span>
                                        <span itemprop="streetAddress" class="text-sm sm:text-base text-slate-700 leading-relaxed font-medium">${hotel.address}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="sm:pl-9 mt-auto">
                                ${linkTagHTML}
                            </div>
                        </article>
                    `;
                });
                htmlContent += `</div>`;
            }
            contentArea.innerHTML = htmlContent;
        }

        document.addEventListener('DOMContentLoaded', () => {
            initDistrictButtons();
            const firstDistrictBtn = districtContainer.querySelector('button');
            if(firstDistrictBtn) selectDistrict('chaweng', firstDistrictBtn);
        });
    </script>
