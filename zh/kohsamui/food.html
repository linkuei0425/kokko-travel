                        { name: "Smile House Restaurant", feature: "位於漁夫村內的庭園式泰式餐廳。提供傳統道地的泰國南部料理，綠咖哩與打拋豬非常下飯，環境被熱帶植物環繞。", address: "Fisherman's Village, Bophut<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 交通方式：</span>漁夫村步行街內。" }
                    ],
                    "seafood": [
                        { name: "Happy Elephant", feature: "漁夫村內知名的老字號海鮮餐廳。提供半露天的海景座位，龍蝦、螃蟹等海產豐富新鮮，晚上常有現場音樂演奏。", address: "Fisherman's Village, Bophut<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 交通方式：</span>漁夫村主街靠海側。" },
                        { name: "Krua Bophut Thai Restaurant", feature: "傳統泰式木造建築的海濱餐廳。除了海鮮，這裡的泰式酸辣湯(冬蔭功)極為道地，坐在沙灘座位上用餐非常浪漫。", address: "Fisherman's Village, Bophut<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 交通方式：</span>漁夫村主街靠海側。" }
                    ],
                    "cafe_dessert": [
                        { name: "Karma Resort Cafe", feature: "充滿波希米亞風格的海濱度假村咖啡廳。設計極美，非常適合拍網美照，提供精緻的法式甜點與特調飲品。", address: "182/3 Moo 1, Bophut<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 交通方式：</span>位於波普海灘旁，建議騎車或搭計程車。" }
                    ],
                    "fine_dining": [
                        { name: "Supattra Thai Dining", feature: "屢獲殊榮的頂級泰菜私人廚房。沒有固定菜單，主廚依照當天採買的最新鮮海產來設計餐點，服務無微不至（需提前預約）。", address: "32/6 Moo 4, Santhitham Rd, Bophut<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 交通方式：</span>位於波普區內陸街道，建議搭計程車前往。", recommend: true },
                        { name: "Zazen Restaurant", feature: "連續多年被評為泰國最佳餐廳之一。融合了法式精緻與泰式香料，紅色的燈光與海風營造出極致浪漫的氛圍。", address: "177, Moo 1, Bophut (Zazen Boutique Resort)<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 交通方式：</span>位於波普海灘西側。" }
                    ],
                    "nightlife": [
                        { name: "Coco Tam's", feature: "蘇梅島目前最火紅的沙灘酒吧！擁有網美必拍的懶骨頭沙發與海上網床，每晚壯觀的「沙灘火舞表演」更是島上必看節目。", address: "62 Moo 1, Bophut (漁夫村入口旁)<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 交通方式：</span>漁夫村步行街入口處，非常顯眼。", recommend: true }
                    ]
                }
            },
            "west_coast": {
                name: "西海岸/納通 (West Coast)",
                categories: {
                    "thai_local": [
                        { name: "納通夜市 (Nathon Night Market)", feature: "主要服務在地人與等船旅客的夜市。物價比查汶、波普便宜許多，泰式炸雞、青木瓜沙拉與各式泰式便當道地又美味。", address: "Nathon Pier 周邊廣場<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 交通方式：</span>位於納通碼頭旁廣場，傍晚開始營業。" }
                    ],
                    "seafood": [
                        { name: "Krua Savoey Seafood", feature: "納通鎮上的老牌海鮮餐廳，許多在地人也會來吃。提供剛從漁船卸下的新鮮漁獲，價格公道，可以看著碼頭海景用餐。", address: "Nathon Town 沿海公路旁<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 交通方式：</span>納通碼頭沿海邊步行即可抵達。" }
                    ],
                    "cafe_dessert": [
                        { name: "The Mud", feature: "位於西海岸的泥屋主題度假村附屬咖啡廳。建築非常有特色，擁有無敵的夕陽海景，適合傍晚來喝杯冰茶賞日落。", address: "Moo 5, Ban Bang Makham, Nathon<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 交通方式：</span>納通以北的公路上，建議騎車自駕前往。" }
                    ],
                    "fine_dining": [
                        { name: "Jahn (Conrad Koh Samui)", feature: "蘇梅島最頂級的景觀餐廳之一。位於康萊德酒店的懸崖上，提供超豪華的牛排與泰式分子料理，擁有令人屏息的西海岸夕陽絕景。", address: "49/8-9 Moo 4, Hillcrest Road, Taling Ngam<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 交通方式：</span>位於極南邊的塔林甘區山崖上，建議搭乘計程車。", recommend: true },
                        { name: "Virgin Coast Restaurant", feature: "隱蔽在西海岸的浪漫海濱餐廳。以竹子與茅草搭建，提供精緻的泰式與海鮮料理，是遠離喧囂、安靜賞夕陽的秘境。", address: "Taling Ngam Beach<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 交通方式：</span>塔林甘海灘旁，需騎車或自駕。" }
                    ],
                    "nightlife": [
                        { name: "Nikki Beach Club", feature: "全球知名的奢華海灘俱樂部。西海岸最時髦的派對地點，擁有純白色的躺椅、泳池、DJ音樂，週末的早午餐派對非常受歡迎。", address: "96/3 Moo 2, Lipa Noi<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 交通方式：</span>位於利巴諾伊海灘，建議包車前往。" }
                    ]
                }
            }
        };

        const categoriesMap = {
            "thai_local": { name: "🍛 道地泰菜與街邊小吃", color: "bg-orange-50 text-orange-800 hover:bg-orange-500 hover:text-white border-orange-200" },
            "seafood": { name: "🦞 海鮮大餐與燒烤", color: "bg-blue-50 text-blue-800 hover:bg-blue-500 hover:text-white border-blue-200" },
            "cafe_dessert": { name: "🥥 海景咖啡廳與甜點", color: "bg-emerald-50 text-emerald-800 hover:bg-emerald-500 hover:text-white border-emerald-200" },
            "fine_dining": { name: "🍷 浪漫景觀餐廳", color: "bg-purple-50 text-purple-800 hover:bg-purple-500 hover:text-white border-purple-200" },
            "nightlife": { name: "🍹 沙灘酒吧與夜生活", color: "bg-pink-50 text-pink-800 hover:bg-pink-500 hover:text-white border-pink-200" }
        };

        let currentRegion = "";
        let currentCategory = "";

        const regionContainer = document.getElementById('region-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const categorySection = document.getElementById('category-section');
        const contentArea = document.getElementById('content-area');

        function initRegions() {
            Object.keys(db).forEach(key => {
                const btn = document.createElement('button');
                btn.className = "snap-center whitespace-nowrap px-4 sm:px-6 py-2 sm:py-2.5 text-sm sm:text-base rounded-full border border-slate-200 bg-white text-slate-600 font-bold hover:bg-teal-600 hover:text-white hover:border-teal-600 transition-all shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-1";
                btn.innerText = db[key].name;
                btn.onclick = () => selectRegion(key, btn);
                regionContainer.appendChild(btn);
            });
        }

        function initCategories() {
            Object.keys(categoriesMap).forEach(key => {
                const config = categoriesMap[key];
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-3 sm:px-5 py-2 text-sm sm:text-base rounded-full border transition-all font-bold focus:outline-none focus:ring-2 focus:ring-offset-1 ${config.color}`;
                btn.innerText = config.name;
                btn.onclick = () => selectCategory(key, btn);
                categoryContainer.appendChild(btn);
            });
        }

        function selectRegion(regionKey, clickedBtn) {
            currentRegion = regionKey;
            
            Array.from(regionContainer.children).forEach(btn => {
                btn.classList.remove('bg-teal-600', 'text-white', 'border-teal-600');
                btn.classList.add('bg-white', 'text-slate-600');
            });
            clickedBtn.classList.remove('bg-white', 'text-slate-600');
            clickedBtn.classList.add('bg-teal-600', 'text-white', 'border-teal-600');

            categorySection.classList.remove('hidden');
            categorySection.classList.add('fade-in');
            
            Array.from(categoryContainer.children).forEach(btn => {
                const catKey = Object.keys(categoriesMap).find(k => categoriesMap[k].name === btn.innerText);
                if (db[regionKey].categories[catKey]) {
                    btn.style.display = "block";
                } else {
                    btn.style.display = "none";
                }
            });

            if(!currentCategory || !db[regionKey].categories[currentCategory]) {
                const availableCat = Object.keys(categoriesMap).find(k => db[regionKey].categories[k]);
                if (availableCat) {
                    const targetBtn = Array.from(categoryContainer.children).find(btn => btn.innerText === categoriesMap[availableCat].name);
                    selectCategory(availableCat, targetBtn);
                } else {
                    contentArea.innerHTML = `<p class="col-span-full text-center py-12 text-slate-500">此區域目前無美食資料</p>`;
                }
            } else {
                const targetBtn = Array.from(categoryContainer.children).find(btn => btn.innerText === categoriesMap[currentCategory].name);
                selectCategory(currentCategory, targetBtn);
            }
        }

        function selectCategory(catKey, clickedBtn) {
            currentCategory = catKey;

            Array.from(categoryContainer.children).forEach(btn => {
                btn.classList.remove('shadow-md', 'scale-105', 'opacity-100');
                btn.classList.add('opacity-60');
            });
            if (clickedBtn) {
                clickedBtn.classList.remove('opacity-60');
                clickedBtn.classList.add('shadow-md', 'scale-105', 'opacity-100');
            }

            renderContent();
        }

        function renderContent() {
            contentArea.innerHTML = '';
            const items = db[currentRegion].categories[currentCategory];

            if(!items || items.length === 0) {
                contentArea.innerHTML = `
                    <div class="col-span-full text-center py-16 sm:py-20 text-slate-500 bg-white/50 rounded-3xl border border-dashed border-teal-200">
                        <p class="text-lg sm:text-xl font-bold tracking-wide">此分類目前無推薦名單，去探索其他美食吧！</p>
                    </div>`;
                return;
            }

            items.forEach((item, index) => {
                const pureAddress = item.address.split('<br>')[0];
                const encodedQuery = encodeURIComponent(`${item.name} 蘇梅島 Thailand ${pureAddress}`);
                const mapsUrl = `https://www-d-google-d-com-s-gmn.v.tuangouai.com/maps/search/?api=1&query=${encodedQuery}`;

                const badgeHtml = item.recommend ? `<span class="bg-red-500 text-white text-xs px-2.5 py-0.5 rounded-md ml-2 align-middle shadow-sm font-medium tracking-widest whitespace-nowrap">🔥 強烈推薦</span>` : '';

                const bookingBtnHtml = item.bookingLink ? `
                    <a href="${item.bookingLink}" target="_blank" rel="noopener noreferrer" class="w-full flex items-center justify-center gap-2 bg-[#ff5b00] hover:bg-[#e05000] text-white py-3 sm:py-3.5 rounded-xl font-bold transition-all duration-300 shadow-sm hover:shadow-md text-sm sm:text-base">
                        <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
                        </svg>
                        線上預訂專屬優惠
                    </a>
                ` : '';

                const card = document.createElement('div');
                // 替換原有的 DIV，使用 Microdata article 以優化 AEO / GEO 結構化抓取
                card.innerHTML = `
                    <article itemscope itemtype="https://schema.org/FoodEstablishment" class="bg-white rounded-2xl shadow-sm border border-teal-100/60 overflow-hidden flex flex-col h-full fade-in hover:shadow-xl transition-all duration-300 transform group">
                        <div class="p-5 sm:p-6 lg:p-7 flex-grow flex flex-col">
                            <div class="flex justify-between items-start mb-4">
                                <h3 itemprop="name" class="text-xl sm:text-2xl font-extrabold text-slate-800 leading-snug flex items-center flex-wrap gap-y-2">
                                    ${item.name} ${badgeHtml}
                                </h3>
                            </div>
                            
                            <div class="mb-6 flex-grow">
                                <p itemprop="description" class="text-slate-600 text-sm sm:text-base leading-relaxed tracking-wide">
                                    <span class="font-bold text-teal-700 bg-teal-50 px-2 py-0.5 rounded border border-teal-100 mr-1.5 shadow-sm inline-block mb-1">特色</span>
                                    ${item.feature}
                                </p>
                            </div>
                            
                            <div itemprop="address" itemscope itemtype="https://schema.org/PostalAddress" class="bg-slate-50 p-4 sm:p-5 rounded-xl flex items-start gap-3 border border-slate-100 group-hover:border-teal-100 transition-colors mt-auto">
                                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6 text-teal-600 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                                <div class="text-sm sm:text-base text-slate-600 leading-relaxed font-medium">
                                    <span class="font-bold text-teal-800">地址：</span>
                                    <span itemprop="streetAddress">${item.address}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div class="px-5 sm:px-6 lg:px-7 pb-5 sm:pb-6 lg:pb-7 flex flex-col gap-3">
                            ${bookingBtnHtml}
                            <a href="${mapsUrl}" target="_blank" rel="noopener noreferrer" class="w-full flex items-center justify-center gap-2 btn-nav text-white py-3 sm:py-3.5 rounded-xl font-bold transition-all duration-300 shadow-sm hover:shadow-md text-sm sm:text-base focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2">
                                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" viewBox="0 0 20 20" fill="currentColor">
                                    <path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z" clip-rule="evenodd" />
                                </svg>
                                開啟 Google Maps 導航
                            </a>
                        </div>
                    </article>
                `;
                // Extract inner article and append correctly
                card.style.animationDelay = `${index * 0.08}s`;
                // We use outerHTML replacement or just appending the node.
                // Since `card` is a `div`, it's better to just set its class to `h-full` and omit the wrapping div to keep HTML semantic.
                const articleWrap = document.createElement('div');
                articleWrap.className = "h-full";
                articleWrap.innerHTML = card.innerHTML;
                contentArea.appendChild(articleWrap.firstElementChild); 
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initRegions();
            initCategories();
        });

    </script>
</body>
</html>
