                        { q: "參加長尾船半日遊通常包含什麼項目？", a: "一般套裝行程會包含飯店來回接送、長尾船資、基本浮潛用具、飲用水以及豬島的登島費用。" }
                    ],
                    items: [
                        { title: '豬島 (Koh Mudsum) 與丹島 (Koh Tan) 一日遊', description: '蘇梅島最新爆紅行程！前往「豬島」與沙灘上慵懶的野豬們互動拍照，並前往丹島周邊享受清靜的浮潛時光。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E8%B1%AC%E5%B3%B6%20%E4%B8%B9%E5%B3%B6&aid=116515' },
                        { title: '豬島私人長尾船包船半日遊', description: '搭乘極具泰國傳統風情的木造長尾船出海，避開人潮，獨享無人打擾的湛藍海景與沙灘小豬。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E8%B1%AC%E5%B3%B6%20%E5%8C%85%E8%BB%8A&aid=116515' }
                    ]
                }
            },
            '南緣島': {
                '一日遊': {

                    ],
                    items: [
                        { title: '南緣島、龜島全日浮潛之旅', description: '探索南緣島最著名的標誌性「人字型沙灘」！退潮時沙洲浮現，連接著三座小島，美景絕對讓您快門按不停。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E5%8D%97%E7%B7%A3%E5%B3%B6&aid=116515' }

                    faq: [
                        { q: "帕岸島一日遊適合帶小朋友參加嗎？", a: "白天的帕岸島環島行程多為海灘休閒與瀑布戲水，只要避開南方的滿月派對區域與期間，是非常適合親子家庭前往的秘境島嶼。" }
                    ],
                    items: [
                        { title: '帕岸島探索與沙灘一日遊', description: '除了滿月派對，帕岸島的白天也非常寧靜美麗！騎著機車環島，探索未開發的原始海灘與瀑布秘境。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E5%B8%95%E5%B2%B8%E5%B3%B6%20%E4%B8%80%E6%97%A5%E9%81%8A&aid=116515' }

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('蘇梅島');
            const [selectedCategory, setSelectedCategory] = useState('一日遊');
            const [openFaqIndex, setOpenFaqIndex] = useState(null); // 用於 React 控制的 FAQ 手風琴

            const regionNavRef = useRef(null);

            // 取得目前選定組合的資料
            const currentDataObj = itineraryData[selectedRegion]?.[selectedCategory] || null;
            const currentItems = currentDataObj?.items || [];
            const currentTldr = currentDataObj?.tldr || '';
            const currentFaq = currentDataObj?.faq || [];

            // AEO/GEO 優化：動態注入 Schema.org FAQPage 結構
            useEffect(() => {
                const container = document.getElementById('dynamic-schema-container');
                if (!container) {
                    const newContainer = document.createElement('div');
                    newContainer.id = 'dynamic-schema-container';
                    document.body.appendChild(newContainer);
                }
                
                const targetContainer = document.getElementById('dynamic-schema-container');
                targetContainer.innerHTML = '';

                if (currentFaq.length > 0) {
                    const faqSchema = {
                        "@context": "https://schema.org",
                        "@type": "FAQPage",
                        "mainEntity": currentFaq.map(item => ({
                            "@type": "Question",
                            "name": item.q,
                            "acceptedAnswer": {
                                "@type": "Answer",
                                "text": item.a
                            }
                        }))
                    };
                    const scriptTag = document.createElement('script');
                    scriptTag.type = 'application/ld+json';
                    scriptTag.text = JSON.stringify(faqSchema);
                    targetContainer.appendChild(scriptTag);
                }
            }, [selectedRegion, selectedCategory]);

            // 重置 FAQ 展開狀態
            useEffect(() => {
                setOpenFaqIndex(null);
            }, [selectedRegion, selectedCategory]);

            const scrollNav = (direction) => {
                const scrollAmount = 250;
                if (regionNavRef.current) {
                    if (direction === 'left') {
                        regionNavRef.current.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
                    } else {
                        regionNavRef.current.scrollBy({ left: scrollAmount, behavior: 'smooth' });
                    }
                }
            };

            const toggleFaq = (index) => {
                setOpenFaqIndex(openFaqIndex === index ? null : index);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    
                    {/* 頂部導覽列 */}
                    <header className="bg-white/95 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-emerald-100/60">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                            <div className="flex items-center justify-between gap-3 mb-4">
                                <div className="flex items-center gap-2 sm:gap-3">
                                    <MapPin className="text-emerald-500 w-6 h-6 sm:w-8 sm:h-8 flex-shrink-0" />
                                    <h1 className="text-xl sm:text-2xl md:text-3xl font-black text-slate-800 tracking-wide">
                                        蘇梅島跳島與行程推薦
                                    </h1>
                                </div>
                                <a
                                    href="https://kokko-travel.com/zh/kohsamui/trip.html"
                                    aria-label="回到首頁"
                                    className="hidden sm:flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-300 bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm hover:shadow-md hover:-translate-x-1 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2"
                                >
                                    <Home className="w-4 h-4" /> 回到首頁
                                </a>
                            </div>
                            
                            {/* 地區選擇器 */}
                            <div className="relative group w-full">
                                <div className="absolute left-0 top-0 bottom-0 w-12 z-10 flex items-center justify-start nav-gradient-left opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none sm:pointer-events-auto hidden sm:flex">
                                    <button onClick={() => scrollNav('left')} aria-label="向左滾動" className="bg-white/90 hover:bg-white text-emerald-700 p-2 rounded-full shadow-md border border-emerald-100 -ml-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 pointer-events-auto">
                                        <ChevronLeft className="w-5 h-5" />
                                    </button>
                                </div>

                                <nav ref={regionNavRef} aria-label="地區選擇" className="flex gap-2 sm:gap-3 overflow-x-auto pb-2 px-1 scrollbar-hide snap-x">
                                    <a href="https://kokko-travel.com/zh/kohsamui/trip.html" aria-label="回到首頁" className="sm:hidden snap-center flex items-center justify-center gap-1.5 whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-300 bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
                                        <Home className="w-4 h-4" /> 首頁
                                    </a>
                                    {REGIONS.map((region) => (
                                        <button
                                            key={region}
                                            onClick={() => setSelectedRegion(region)}
                                            aria-pressed={selectedRegion === region}
                                            className={`snap-center whitespace-nowrap px-5 sm:px-6 py-2.5 rounded-full text-sm sm:text-base font-bold transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-1 ${
                                                selectedRegion === region
                                                ? 'bg-emerald-600 text-white shadow-md transform scale-105 border border-emerald-600'
                                                : 'bg-white text-slate-600 border border-slate-200 hover:bg-emerald-50 hover:text-emerald-700 hover:border-emerald-200'
                                            }`}
                                        >
                                            {region}
                                        </button>
                                    ))}
                                </nav>

                                <div className="absolute right-0 top-0 bottom-0 w-12 z-10 flex items-center justify-end nav-gradient-right opacity-0 group-hover:opacity-100 transition-opacity duration-300 pointer-events-none sm:pointer-events-auto hidden sm:flex">
                                    <button onClick={() => scrollNav('right')} aria-label="向右滾動" className="bg-white/90 hover:bg-white text-emerald-700 p-2 rounded-full shadow-md border border-emerald-100 -mr-2 focus:outline-none focus:ring-2 focus:ring-emerald-500 pointer-events-auto">
                                        <ChevronRight className="w-5 h-5" />
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-10">
                        
                        {/* 分類標籤 */}
                        <nav aria-label="行程分類選擇" className="flex flex-wrap gap-2.5 sm:gap-3 mb-8 sm:mb-10">
                            {CATEGORIES.map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    aria-pressed={selectedCategory === id}
                                    className={`flex items-center justify-center gap-1.5 px-5 sm:px-6 py-2.5 sm:py-3 rounded-full border text-sm sm:text-base font-bold transition-all duration-300 shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-1 ${
                                        selectedCategory === id
                                        ? 'border-emerald-500 bg-emerald-500 text-white transform scale-105'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4 sm:w-5 sm:h-5" />
                                    {id}
                                </button>
                            ))}
                        </nav>

                        {/* 內容區：當有資料時顯示 */}
                        {currentDataObj ? (
                            <div className="flex flex-col gap-6 sm:gap-8 fade-in-up" key={`${selectedRegion}-${selectedCategory}`}>
                                
                                {/* AI 總結區 TLDR */}
                                <aside className="bg-gradient-to-br from-emerald-50 to-teal-50 rounded-2xl p-5 sm:p-6 border border-emerald-200 ai-glow relative overflow-hidden bg-white">
                                    <div className="absolute top-0 right-0 p-4 opacity-10">
                                        <Robot className="w-24 h-24 text-emerald-900" />
                                    </div>
                                    <h3 className="text-emerald-800 font-bold text-sm sm:text-base mb-2 flex items-center gap-2 relative z-10">
                                        <Sparkles className="w-5 h-5 text-amber-500" /> AI 快速總結 (TL;DR)
                                    </h3>
                                    <p className="text-slate-700 text-base sm:text-lg font-medium leading-relaxed relative z-10">
                                        {currentTldr}
                                    </p>
                                </aside>

                                {/* 卡片列表 */}
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 xl:grid-cols-2 gap-5 sm:gap-6 min-h-[300px]">
                                    {currentItems.map((item, index) => (
                                        <article 
                                            key={index} 
                                            itemScope 
                                            itemType="https://schema.org/TouristTrip"
                                            className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-7 flex flex-col justify-between hover:shadow-xl transition-all duration-300 transform group"
                                        >
                                            <div className="flex-grow">
                                                <h3 itemProp="name" className="text-xl sm:text-2xl font-black text-slate-800 mb-4 leading-snug flex items-start gap-2">
                                                    <span className="text-emerald-500 mt-0.5 flex-shrink-0"><MapPin className="w-5 h-5 sm:w-6 sm:h-6"/></span>
                                                    {item.title}
                                                </h3>
                                                <p itemProp="description" className="text-slate-600 text-sm sm:text-base mb-6 leading-relaxed font-medium bg-slate-50 p-4 rounded-xl border border-slate-100">
                                                    {item.description}
                                                </p>
                                            </div>
                                            
                                            <div className="mt-auto pt-5 border-t border-slate-100">
                                                <a
                                                    href={item.link}
                                                    itemProp="url"
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    className="w-full flex items-center justify-center gap-2 bg-[#ff5b00] hover:bg-[#e05000] text-white font-bold py-3.5 px-6 rounded-xl transition-all duration-300 shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-[#ff5b00] focus:ring-offset-2"
                                                >
                                                    <Ticket className="w-5 h-5" />
                                                    <span className="text-sm sm:text-base">查看詳細行程與線上預訂</span>
                                                    <ExternalLink className="w-4 h-4 ml-1 opacity-80" />
                                                </a>
                                            </div>
                                        </article>
                                    ))}
                                </div>

                                {/* 動態 常見問題 (FAQ) - 使用 React 狀態控制的手風琴 */}
                                {currentFaq.length > 0 && (
                                    <section className="bg-white rounded-2xl p-5 sm:p-8 shadow-sm border border-slate-200 mt-2" itemScope itemType="https://schema.org/FAQPage">
                                        <h3 className="text-xl sm:text-2xl font-black text-slate-800 mb-6 flex items-center gap-2">
                                            <Info className="w-6 h-6 text-emerald-600" /> 旅客行程常見問題 (FAQ)
                                        </h3>
                                        <div className="flex flex-col gap-3">
                                            {currentFaq.map((faq, idx) => (
                                                <div key={idx} className="border-b border-slate-100 last:border-0 relative">
                                                    <button 
                                                        onClick={() => toggleFaq(idx)}
                                                        className="w-full flex justify-between items-center py-4 text-left cursor-pointer group focus:outline-none"
                                                        aria-expanded={openFaqIndex === idx}
                                                    >
                                                        <span className="font-bold text-slate-700 text-sm sm:text-base group-hover:text-emerald-600 transition-colors pr-4">Q：{faq.q}</span>
                                                        <ChevronDown className={`w-5 h-5 text-slate-400 transition-transform duration-300 flex-shrink-0 ${openFaqIndex === idx ? 'transform rotate-180 text-emerald-600' : ''}`} />
                                                    </button>
                                                    <div 
                                                        className={`overflow-hidden transition-all duration-400 ease-in-out ${openFaqIndex === idx ? 'max-h-[500px] opacity-100 pb-4' : 'max-h-0 opacity-0'}`}
                                                    >
                                                        <div className="text-slate-600 text-sm sm:text-base leading-relaxed pl-1 sm:pl-2">
                                                            <span className="font-black text-emerald-600 mr-1">A：</span>{faq.a}
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                )}

                            </div>
                        ) : (
                            <div className="bg-white rounded-3xl border border-dashed border-slate-300 p-12 sm:p-20 text-center flex flex-col items-center justify-center shadow-sm fade-in-up min-h-[400px]">
                                <MapPin className="w-16 h-16 sm:w-20 sm:h-20 text-slate-300 mb-4 sm:mb-6" />
                                <h3 className="text-lg sm:text-xl font-bold text-slate-700 mb-3 tracking-wide">
                                    此分類目前無推薦行程
                                </h3>
                                <p className="text-slate-500 text-sm sm:text-base">請嘗試切換其他分類，或探索不同的島嶼區域。</p>
                            </div>
                        )}

                        {/* 全局探索按鈕 */}
                        <div className="mt-12 sm:mt-16 flex justify-center fade-in-up" style={{ animationDelay: '0.2s' }}>
                            <a 
                                href={`https://www.klook.com/zh-TW/search/result/?query=${encodeURIComponent(selectedRegion)}&aid=116515`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-4 px-8 sm:px-12 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2"
                            >
                                <span className="tracking-wide text-base sm:text-lg">在 Klook 探索更多 {selectedRegion} 優惠</span>
                                <ExternalLink className="w-5 h-5 sm:w-6 sm:h-6 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="border-t-[6px] border-emerald-600 mt-auto pt-10 pb-12 bg-slate-800 text-slate-300">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center flex flex-col space-y-3">
                            <p className="text-sm sm:text-base font-bold tracking-wide text-slate-200">Copyright &copy; 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
                            <p className="text-xs sm:text-sm text-slate-400">版權所有，未經授權禁止轉載、翻印或任何商業用途。</p>
                            <p className="text-xs sm:text-sm text-slate-400">本站包含之圖片、文字內容及程式碼均受法律保護，並已進行嚴格的 SEO 與 AEO 結構化優化。</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
