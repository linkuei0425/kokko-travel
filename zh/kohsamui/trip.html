<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蘇梅島行程推薦指南 | Koh Samui Trip Guide</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 隱藏水平捲軸但保留滾動功能 */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- 導覽圖示 ---
        const MapPin = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const Ticket = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>;
        const Sun = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const Sparkles = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
        const TrainFront = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3.1V7a4 4 0 0 0 8 0V3.1"/><path d="M9 15h6"/><path d="M14 19.5l3-3-3-3"/><path d="M10 19.5l-3-3 3-3"/><path d="M4 22v-3.5"/><path d="M20 22v-3.5"/><rect width="16" height="16" x="4" y="3" rx="2"/></svg>;
        const ExternalLink = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>;
        const Info = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const Home = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;

        const REGIONS = ['蘇梅島', '龜島', '豬島與丹島', '南緣島', '帕岸島'];
        const CATEGORIES = [
            { id: '一日遊', icon: Sun },
            { id: '體驗與娛樂', icon: Sparkles },
            { id: '交通及網路', icon: TrainFront },
            { id: '景點門票', icon: Ticket }
        ];

        // --- 蘇梅島與周邊跳島資料庫 ---
        const itineraryData = {
            '蘇梅島': {
                '一日遊': [
                    { title: '安通國家海洋公園一日遊', description: '蘇梅島必訪！可選搭乘快艇或大型柚木船，穿梭於42個群島之間，包含浮潛、獨木舟與絕美山頂觀景台。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E5%AE%89%E9%80%9A%E5%9C%8B%E5%AE%B6%E6%B5%B7%E6%B4%8B%E5%85%AC%E5%9C%92&aid=116515' },
                    { title: '蘇美島半日城市亮點導覽', description: '專車輕鬆遊覽島上地標！行程涵蓋大佛寺、關羽雕像、阿公阿嬤石、千手觀音廟與納蒙瀑布，快速認識蘇梅島。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E8%98%87%E7%BE%8E%E5%B3%B6%E5%8D%8A%E6%97%A5&aid=116515' },
                    { title: '蘇美島秘境尋訪 & 四驅車叢林探險之旅', description: '乘坐刺激的4x4越野車深入蘇梅島秘境山林，欣賞全景海島風光，並探訪神秘密境花園。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E8%98%87%E7%BE%8E%E5%B3%B6%20%E5%9B%9B%E9%A9%85%E8%BB%8A&aid=116515' },
                    { title: '蘇美島 Absolute Sanctuary 健康一日遊', description: '主打身心靈放鬆的極致體驗！在頂級度假村內享受專業SPA、瑜珈課程與健康美食，重煥活力。', link: 'https://www.klook.com/zh-TW/search/result/?query=Absolute%20Sanctuary&aid=116515' }
                ],
                '體驗與娛樂': [
                    { title: '蘇梅島叢林飛索體驗', description: '化身泰山穿梭在熱帶雨林之中！體驗多條刺激的高空滑索，以獨特的高空視角俯瞰蘇梅島茂密叢林。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E8%98%87%E6%A2%85%E5%B3%B6%20%E5%8F%A2%E6%9E%97%E9%A3%9B%E7%B4%A2&aid=116515' },
                    { title: '蘇梅島 ATV 四輪驅動越野車探險', description: '親自駕駛 ATV 越野車，挑戰泥濘小徑與顛簸山路，享受在熱帶叢林中奔馳的腎上腺素飆升快感。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E8%98%87%E6%A2%85%E5%B3%B6%20ATV&aid=116515' },
                    { title: '大象王國 (Elephant Kingdom) 友善體驗', description: '拒絕騎乘！提倡人道的大象庇護所。您將親自為大象準備食物、餵食，並觀察牠們在泥漿浴中的可愛模樣。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E8%98%87%E7%BE%8E%E5%B3%B6%20%E5%A4%A7%E8%B1%A1&aid=116515' },
                    { title: '蘇美島日出 / 日落 SUP 立式划槳體驗', description: '在平靜的海面上划著 SUP，迎接第一道曙光或是浪漫夕陽，非常適合喜歡安靜享受海島氛圍的旅客。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E8%98%87%E7%BE%8E%E5%B3%B6%20SUP&aid=116515' },
                    { title: '私人雙體帆船夕陽巡航體驗', description: '包船出海的最奢華選擇！與親友獨享寬敞的雙體帆船，在海中央品飲香檳，度過難忘的海島假期。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E8%98%87%E7%BE%8E%E5%B3%B6%20%E5%B8%8C%E8%88%B9&aid=116515' }
                ],
                '景點門票': [
                    { title: '蘇梅島國際泰拳體育館門票', description: '感受熱血沸騰的在地文化！在現場觀賞拳拳到肉的道地泰拳比賽，體驗全場觀眾齊聲吶喊的震撼。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E8%98%87%E6%A2%85%E5%B3%B6%20%E6%B3%B0%E6%8B%B3&aid=116515' }
                ],
                '交通及網路': [
                    { title: '蘇美島機場（USM）至島上飯店接送服務', description: '免去落地後與當地計程車議價的煩惱！專車司機舉牌接機，直接送您舒舒服服抵達度假村。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E8%98%87%E7%BE%8E%E5%B3%B6%E6%A9%9F%E5%A0%B4%E6%8E%A5%E9%80%81&aid=116515' },
                    { title: '蘇美島私人包車城市巡禮', description: '行程完全自己作主！想去哪間網美咖啡廳或秘境海灘，專屬司機都能載您安全抵達，包車最省事。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E8%98%87%E7%BE%8E%E5%B3%B6%20%E5%8C%85%E8%BB%8A&aid=116515' },
                    { title: '泰國 eSIM / 實體 SIM 卡 上網吃到飽', description: '掃描 QR Code 即可開通上網，免換實體卡超方便。網速穩定，讓您在島上導航、發限動不卡卡。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E6%B3%B0%E5%9C%8B%20esim&aid=116515' }
                ]
            },
            '龜島': {
                '一日遊': [
                    { title: '龜島與南園島快艇一日遊', description: '泰國灣潛水天堂！從蘇梅島搭乘快艇出發，享受世界級的清澈水質，與五彩斑斕的熱帶魚和珊瑚礁共游。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E9%BE%9C%E5%B3%B6%20%E5%8D%97%E5%9C%92%E5%B3%B6&aid=116515' }
                ],
                '體驗與娛樂': [
                    { title: '龜島 PADI 潛水體驗 / 考證課程', description: '全球發放潛水執照最多的聖地！水況極佳且價格親民，無論是無經驗體驗潛水或考取初級證照都非常適合。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E9%BE%9C%E5%B3%B6%20%E6%BD%9B%E6%B0%B4&aid=116515' }
                ],
                '交通及網路': [
                    { title: '蘇梅島 ⇌ 龜島 渡輪船票 (Lomprayah提供)', description: '往返兩島最穩定的高速雙體船。建議提前購票確保座位，輕鬆展開您的離島潛水之旅。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E8%98%87%E6%A2%85%E5%B3%B6%20%E9%BE%9C%E5%B3%B6%20%E8%88%B9%E7%A5%A8&aid=116515' }
                ]
            },
            '豬島與丹島': {
                '一日遊': [
                    { title: '豬島 (Koh Mudsum) 與丹島 (Koh Tan) 一日遊', description: '蘇梅島最新爆紅行程！前往「豬島」與沙灘上慵懶的野豬們互動拍照，並前往丹島周邊享受清靜的浮潛時光。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E8%B1%AC%E5%B3%B6%20%E4%B8%B9%E5%B3%B6&aid=116515' },
                    { title: '豬島私人長尾船包船半日遊', description: '搭乘極具泰國傳統風情的木造長尾船出海，避開人潮，獨享無人打擾的湛藍海景與沙灘小豬。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E8%B1%AC%E5%B3%B6%20%E5%8C%85%E8%BB%8A&aid=116515' }
                ]
            },
            '南緣島': {
                '一日遊': [
                    { title: '南緣島、龜島全日浮潛之旅', description: '探索南緣島最著名的標誌性「人字型沙灘」！退潮時沙洲浮現，連接著三座小島，美景絕對讓您快門按不停。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E5%8D%97%E7%B7%A3%E5%B3%B6&aid=116515' }
                ]
            },
            '帕岸島': {
                '交通及網路': [
                    { title: '蘇梅島 ⇌ 帕岸島 高速渡輪船票', description: '前往世界三大狂歡派對「Full Moon Party 滿月派對」的必備交通票券！派對期間船票極度搶手，務必提早預訂。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E5%B8%95%E5%B2%B8%E5%B3%B6%20%E8%88%B9%E7%A5%A8&aid=116515' }
                ],
                '一日遊': [
                    { title: '帕岸島探索與沙灘一日遊', description: '除了滿月派對，帕岸島的白天也非常寧靜美麗！騎著機車環島，探索未開發的原始海灘與瀑布秘境。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E5%B8%95%E5%B2%B8%E5%B3%B6%20%E4%B8%80%E6%97%A5%E9%81%8A&aid=116515' }
                ]
            }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('蘇梅島');
            const [selectedCategory, setSelectedCategory] = useState('一日遊'); // 預設改為一日遊比較符合海島屬性

            const currentData = itineraryData[selectedRegion]?.[selectedCategory] || [];

            return (
                <div className="min-h-screen bg-[#f0fdf4] font-sans text-slate-800 pb-12">
                    {/* 頂部導覽列 */}
                    <header className="bg-white shadow-sm sticky top-0 z-10 border-b border-emerald-100">
                        <div className="max-w-7xl mx-auto px-4 py-4 md:py-6">
                            <div className="flex items-center justify-between gap-2 mb-4">
                                <div className="flex items-center gap-2">
                                    <MapPin className="text-emerald-600 w-6 h-6 md:w-8 md:h-8" />
                                    <h1 className="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-600 to-teal-500">
                                        蘇梅島及周邊跳島推薦
                                    </h1>
                                </div>
                                <a
                                    href="https://linkuei0425.github.io/KohSamui/"
                                    className="hidden md:flex items-center gap-1.5 px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm"
                                >
                                    <Home className="w-4 h-4" />
                                    回到首頁
                                </a>
                            </div>
                            
                            {/* 地區選擇 */}
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                <a
                                    href="https://linkuei0425.github.io/KohSamui/"
                                    className="md:hidden flex items-center justify-center gap-1.5 whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm"
                                >
                                    <Home className="w-4 h-4" />
                                    首頁
                                </a>
                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => setSelectedRegion(region)}
                                        className={`whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 ${
                                            selectedRegion === region
                                            ? 'bg-teal-600 text-white shadow-md'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-teal-50 hover:text-teal-700'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {/* 分類標籤 */}
                        <div className="flex flex-wrap gap-2 md:gap-3 mb-8">
                            {CATEGORIES.map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 px-4 py-2.5 rounded-lg border text-sm font-bold transition-all ${
                                        selectedCategory === id
                                        ? 'border-emerald-500 bg-emerald-50 text-emerald-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4" />
                                    {id}
                                </button>
                            ))}
                        </div>

                        {/* 內容區標題 */}
                        <div className="mb-6 flex items-center gap-2">
                            <h2 className="text-2xl font-bold text-slate-800">
                                {selectedRegion} - {selectedCategory} <span className="text-emerald-600">精選推薦</span>
                            </h2>
                        </div>

                        {/* 卡片列表 */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4 md:gap-6">
                                {currentData.map((item, index) => (
                                    <div 
                                        key={index} 
                                        className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col justify-between hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 animate-fade-in"
                                        style={{ animationDelay: `${index * 0.05}s` }}
                                    >
                                        <div>
                                            <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-3 leading-tight flex items-start gap-2">
                                                <span className="text-emerald-500 mt-1"><Sparkles className="w-5 h-5"/></span>
                                                {item.title}
                                            </h3>
                                            <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed font-medium">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-4 border-t border-slate-100 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-[#ff5b00] hover:bg-[#e05000] text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-sm hover:shadow-md w-full sm:w-auto"
                                            >
                                                <Info className="w-4 h-4" />
                                                <span>詳細說明</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-80" />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl border border-dashed border-slate-300 p-12 text-center flex flex-col items-center justify-center">
                                <h3 className="text-lg font-medium text-slate-700 mb-2">
                                    此區域目前無對應項目的資料
                                </h3>
                                <p className="text-slate-500">請嘗試選擇其他分類或分頁。</p>
                            </div>
                        )}

                        {/* 全局探索按鈕 */}
                        <div className="mt-12 flex justify-center">
                            <a 
                                href={`https://www.klook.com/zh-TW/search/result/?query=${encodeURIComponent(selectedRegion)}&aid=116515`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1"
                            >
                                <span className="tracking-wide">前往探索更多 {selectedRegion} 行程</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
