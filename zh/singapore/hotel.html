        const districtContainer = document.getElementById('district-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const categorySection = document.getElementById('category-section');
        const contentArea = document.getElementById('content-area');
        
        let currentDistrictKey = null;
        let currentCategoryName = null;

        // 1. 初始化區域按鈕
        function initDistrictButtons() {
            Object.keys(hotelData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap flex-shrink-0 md:flex-shrink w-auto md:w-full px-5 py-2.5 md:py-3 rounded-full md:rounded-xl font-bold text-sm md:text-base transition-all duration-200 border area-btn-inactive`;
                btn.innerText = hotelData[key].name;
                btn.setAttribute('aria-pressed', 'false');
                btn.onclick = () => selectDistrict(key, btn);
                districtContainer.appendChild(btn);
            });
        }

        // 2. 選擇區域
        function selectDistrict(key, activeBtn) {
            currentDistrictKey = key;

            // Highlight active region (A11y ARIA update)
            const allBtns = districtContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('area-btn-active');
                btn.classList.add('area-btn-inactive');
                btn.setAttribute('aria-pressed', 'false');
            });
            activeBtn.classList.remove('area-btn-inactive');
            activeBtn.classList.add('area-btn-active');
            activeBtn.setAttribute('aria-pressed', 'true');

            // 顯示分類區塊
            categorySection.classList.remove('hidden');
            renderCategoryButtons();
        }

        // 3. 渲染分類按鈕
        function renderCategoryButtons() {
            categoryContainer.innerHTML = '';
            const currentCategories = Object.keys(hotelData[currentDistrictKey].categories);
            
            currentCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `flex-1 min-w-[100px] px-4 py-2.5 md:py-3 rounded-lg font-bold text-sm md:text-base transition-all duration-200 border cat-btn-inactive`;
                btn.innerText = cat;
                btn.setAttribute('aria-pressed', 'false');
                btn.onclick = () => selectCategory(cat, btn);
                categoryContainer.appendChild(btn);
            });

            // 預設選擇第一個分類
            const firstCatBtn = categoryContainer.querySelector('button');
            if(firstCatBtn) {
                selectCategory(currentCategories[0], firstCatBtn);
            }
        }

        // 4. 選擇分類
        function selectCategory(categoryName, activeBtn) {
            currentCategoryName = categoryName;

            // Highlight active category (A11y ARIA update)
            const allBtns = categoryContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('cat-btn-active');
                btn.classList.add('cat-btn-inactive');
                btn.setAttribute('aria-pressed', 'false');
            });
            activeBtn.classList.remove('cat-btn-inactive');
            activeBtn.classList.add('cat-btn-active');
            activeBtn.setAttribute('aria-pressed', 'true');

            renderHotels();
        }

        // 5. 渲染飯店資料 (注入 GEO/AEO/AAO 語意化標籤)
        function renderHotels() {
            const districtData = hotelData[currentDistrictKey];
            const hotels = districtData.categories[currentCategoryName] || [];

            let htmlContent = `
                <div class="flex flex-col sm:flex-row sm:items-center mb-5 md:mb-6 border-b pb-3 md:pb-4 border-emerald-100 fade-in">
                    <h2 class="text-xl md:text-2xl font-bold text-emerald-900 mr-3">📍 ${districtData.name}</h2>
                    <span class="inline-block self-start mt-2 sm:mt-0 px-3 py-1 bg-emerald-100 text-emerald-800 text-xs md:text-sm font-bold rounded-full">${currentCategoryName}</span>
                </div>
            `;

            if (hotels.length === 0) {
                htmlContent += `<p class="text-slate-500 py-10 text-center text-sm md:text-base fade-in">此分類目前無推薦資料。</p>`;
            } else {
                htmlContent += `<div class="space-y-4 md:space-y-5">`;
                
                hotels.forEach((hotel, index) => {
                    const linkTagHTML = hotel.url 
                        ? `<a href="${hotel.url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center px-4 py-2 md:py-1.5 mt-3 sm:mt-0 rounded-xl md:rounded-full text-sm md:text-xs font-bold bg-emerald-600 text-white hover:bg-emerald-700 transition-colors shadow-sm cursor-pointer ml-0 sm:ml-auto w-full sm:w-auto" aria-label="前往 Trip.com 查看 ${hotel.name} 優惠">
                               <svg class="mr-1 h-4 w-4 md:h-3.5 md:w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                               點我看飯店說明與優惠
                           </a>`
                        : `<span class="inline-flex items-center justify-center px-4 py-2 md:py-1.5 mt-3 sm:mt-0 rounded-xl md:rounded-md text-sm md:text-xs font-bold bg-slate-200 text-slate-500 ml-0 sm:ml-auto w-full sm:w-auto">
                               點我看飯店說明
                           </span>`;

                    // 使用 article 與 itemscope 標記結構化資料以優化 AI 解析
                    htmlContent += `
                        <article itemscope itemtype="https://schema.org/Hotel" class="bg-[#f8fffa] border border-emerald-50 p-4 md:p-6 rounded-2xl hover:shadow-lg transition-all duration-300 group fade-in" style="animation-delay: ${index * 0.08}s;">
                            <meta itemprop="addressCountry" content="SG">
                            <div class="flex flex-col sm:flex-row sm:items-start md:items-center justify-between mb-3 md:mb-4">
                                <h3 class="text-lg md:text-xl font-bold text-emerald-900 flex items-start md:items-center leading-tight" itemprop="name">
                                    <span class="text-emerald-500 font-mono text-base md:text-lg mr-2 mt-0.5 md:mt-0 flex-shrink-0">${index + 1}.</span> 
                                    <span>${hotel.name}</span>
                                </h3>
                                ${linkTagHTML}
                            </div>
                            <div class="pl-0 sm:pl-7 space-y-3">
                                <p class="text-sm md:text-base text-slate-600 leading-relaxed tracking-wide">
                                    <span class="inline-block font-bold text-emerald-800 bg-emerald-50 px-2 py-0.5 rounded-md mr-1 mb-1 md:mb-0">特色亮點</span> 
                                    <span itemprop="description">${hotel.feature}</span>
                                </p>
                                <p class="text-sm md:text-base text-slate-600 leading-relaxed tracking-wide" itemprop="address" itemscope itemtype="https://schema.org/PostalAddress">
                                    <span class="inline-block font-bold text-emerald-800 bg-emerald-50 px-2 py-0.5 rounded-md mr-1 mb-1 md:mb-0">地址交通</span> 
                                    <span itemprop="streetAddress">${hotel.address}</span>
                                </p>
                            </div>
                        </article>
                    `;
                });
                
                htmlContent += `</div>`;
            }

            contentArea.innerHTML = htmlContent;
        }

        document.addEventListener('DOMContentLoaded', () => {
            initDistrictButtons();
            // 預設載入濱海灣
            const firstDistrictBtn = districtContainer.querySelector('button');
            if(firstDistrictBtn) {
                selectDistrict('marinabay', firstDistrictBtn);
            }
        });
    </script>
</body>
</html>
