        // Function to render cards based on selected category

            const container = document.getElementById('shop-container');
            container.innerHTML = ''; // Clear existing content

            const filteredData = shopData.filter(item => {
                const itemCats = Array.isArray(item.cat) ? item.cat : [item.cat];
                return itemCats.includes(category);
            });

                container.innerHTML = `<div class="col-span-full text-center text-gray-500 py-10 font-medium">此分類目前無推薦資料。</div>`;
                return;
            }

            filteredData.forEach((shop, index) => {
                const delay = index * 50; // Simple cascading animation delay
                
                // Generate Google Maps URL (Appending 'Singapore' for accuracy)
                const pureName = shop.name.split('(')[0].trim();

                const card = document.createElement('article');
                card.className = `bg-white rounded-2xl shadow-sm border border-gray-100 p-5 sm:p-6 flex flex-col justify-between hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 animate-fade-in`;
                card.style.animationDelay = `${delay}ms`;
                
                card.innerHTML = `
                    <div>
                        <div class="flex items-start justify-between mb-4">
                            <h3 class="text-lg sm:text-xl font-bold text-gray-800">${shop.name}</h3>
                        </div>
                        <div class="space-y-4">
                            <div class="flex items-start">
                                <i class="fa-solid fa-star text-yellow-400 mt-1 mr-3 w-4 text-center shrink-0"></i>
                                <div>
                                    <p class="text-[11px] sm:text-xs text-gray-400 font-bold mb-1 tracking-wider">特色亮點</p>
                                    <p class="text-sm text-gray-700 leading-relaxed font-medium">${shop.feature}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <i class="fa-solid fa-location-dot text-emerald-400 mt-1 mr-3 w-4 text-center shrink-0"></i>
                                <div>
                                    <p class="text-[11px] sm:text-xs text-gray-400 font-bold mb-1 tracking-wider">詳細地址 / 購買地</p>
                                    <p class="text-sm text-gray-700 font-medium">${shop.loc}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <i class="fa-solid fa-train-subway text-emerald-500 mt-1 mr-3 w-4 text-center shrink-0"></i>
                                <div>
                                    <p class="text-[11px] sm:text-xs text-gray-400 font-bold mb-1 tracking-wider">交通方式</p>
                                    <span class="inline-block bg-emerald-50 text-emerald-700 text-xs px-2.5 py-1.5 rounded-lg font-bold text-left leading-normal">${shop.transit}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Navigation Button Area -->
                    <div class="mt-5 pt-5 border-t border-gray-100">
                        <a href="${mapUrl}" target="_blank" rel="noopener noreferrer" 
                           class="w-full flex items-center justify-center gap-2 px-4 py-3 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white btn-maps focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-transform active:scale-95" aria-label="導航至 ${shop.name}">
                            <i class="fa-solid fa-map-location-dot text-base sm:text-lg"></i>
                            開啟 Google Map 導航
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Category Tab Click Handler
        function filterCategory(category, btnElement) {
            // Remove active state from all buttons
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));

            // Add active state to clicked button
            btnElement.classList.add('active');

            // Render relevant data
            renderCards(category);
        }

        // Add simple fade-in animation CSS
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
                animation: fadeIn 0.4s ease-out forwards;
                opacity: 0;
            }
        `;
        document.head.appendChild(style);

        // Initial load shows first category (Must Buys)
        window.onload = () => {
            const firstBtn = document.querySelector('.tab-btn');
            filterCategory('mustbuy', firstBtn);
        };
    </script>
</body>
</html>
