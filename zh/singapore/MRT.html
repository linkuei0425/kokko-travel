                { c: "TE5", n: "倫多", e: "Lentor", a: "" },
                { c: "TE6", n: "美華", e: "Mayflower", a: "" },
                { c: "TE7", n: "光明山", e: "Bright Hill", a: "光明山普覺禪寺" },
                { c: "TE8", n: "上湯申", e: "Upper Thomson", a: "湯申路咖啡廳一條街" },
                { c: "TE9", n: "加利谷", e: "Caldecott", a: "麥里芝蓄水池" },
                { c: "TE11", n: "史蒂芬", e: "Stevens", a: "" },
                { c: "TE12", n: "納比雅", e: "Napier", a: "新加坡植物園 (東陵門入口)、格倫伊格爾斯醫院" },
                { c: "TE13", n: "烏節大道", e: "Orchard Boulevard", a: "烏節路西側商圈、各國大使館區" },
                { c: "TE14", n: "烏節", e: "Orchard", a: "烏節路商圈核心" },
                { c: "TE15", n: "大世界", e: "Great World", a: "世界城購物中心 (Great World City)" },
                { c: "TE16", n: "合樂", e: "Havelock", a: "新加坡河畔飯店區、中峇魯市場 (步行)" },
                { c: "TE17", n: "歐南園", e: "Outram Park", a: "恭錫路壁畫與酒吧、新加坡中央醫院" },
                { c: "TE18", n: "麥士威", e: "Maxwell", a: "麥士威熟食中心 (天天海南雞飯出站即達)" },
                { c: "TE19", n: "珊頓道", e: "Shenton Way", a: "中央商業區 (CBD)、老巴剎美食廣場" },
                { c: "TE20", n: "濱海灣", e: "Marina Bay", a: "濱海灣金融中心" },
                { c: "TE22", n: "濱海灣花園", e: "Gardens by the Bay", a: "濱海灣花園、濱海堤壩 (Marina Barrage)" },
                { c: "TE23", n: "丹戎禺", e: "Tanjong Rhu", a: "新加坡室內體育館 (步行過橋)" },
                { c: "TE24", n: "加東公園", e: "Katong Park", a: "加東公園" },
                { c: "TE25", n: "丹戎加東", e: "Tanjong Katong", a: "" },
                { c: "TE26", n: "馬林百列", e: "Marine Parade", a: "馬林百列商圈、東海岸公園、加東區 (娘惹文化)" },
                { c: "TE27", n: "馬林台", e: "Marine Terrace", a: "" },
                { c: "TE28", n: "實乞納", e: "Siglap", a: "實乞納美食街" },
                { c: "TE29", n: "碧灣", e: "Bayshore", a: "東海岸公園" }
            ]
        };

        const lineColors = {
            NS: { bg: 'bg-red-500', text: 'text-red-600', name: '南北線 (紅線)' },
            EW: { bg: 'bg-green-500', text: 'text-green-600', name: '東西線 (綠線)' },
            CG: { bg: 'bg-emerald-600', text: 'text-emerald-700', name: '樟宜支線 (綠線)' },
            NE: { bg: 'bg-purple-600', text: 'text-purple-600', name: '東北線 (紫線)' },
            CC: { bg: 'bg-yellow-500', text: 'text-yellow-600', name: '環線 (黃線)' },
            CE: { bg: 'bg-yellow-600', text: 'text-yellow-700', name: '濱海灣支線 (黃線)' },
            DT: { bg: 'bg-blue-600', text: 'text-blue-600', name: '濱海市區線 (藍線)' },
            TE: { bg: 'bg-amber-700', text: 'text-amber-800', name: '湯申-東海岸線 (棕線)' }
        };

        let allStationsMap = {};
        let allStationsList = [];
        let uniquePhysicalStations = {}; 

        Object.keys(mrtData).forEach(lineKey => {
            mrtData[lineKey].forEach(st => {
                allStationsMap[st.c] = { ...st, line: lineKey };
                allStationsList.push(allStationsMap[st.c]);

                if (!uniquePhysicalStations[st.n]) {
                    uniquePhysicalStations[st.n] = { name: st.n, en: st.e, codes: [], attractions: st.a };
                }
                uniquePhysicalStations[st.n].codes.push(st.c);
                if (st.a && !uniquePhysicalStations[st.n].attractions.includes(st.a)) {
                    uniquePhysicalStations[st.n].attractions += (uniquePhysicalStations[st.n].attractions ? "、" : "") + st.a;
                }
            });
        });

        const graph = {};
        const RIDE_TIME = 3;
        const TRANSFER_TIME = 5;

        function addEdge(u, v, weight, type, line) {
            if (!graph[u]) graph[u] = [];
            graph[u].push({ node: v, weight, type, line });
        }

        Object.keys(mrtData).forEach(lineKey => {
            const lineArr = mrtData[lineKey];
            for (let i = 0; i < lineArr.length - 1; i++) {
                addEdge(lineArr[i].c, lineArr[i+1].c, RIDE_TIME, 'ride', lineKey);
                addEdge(lineArr[i+1].c, lineArr[i].c, RIDE_TIME, 'ride', lineKey);
            }
        });

        addEdge("EW4", "CG1", RIDE_TIME, 'ride', 'CG');
        addEdge("CG1", "EW4", RIDE_TIME, 'ride', 'CG');
        addEdge("CC4", "CE1", RIDE_TIME, 'ride', 'CE');
        addEdge("CE1", "CC4", RIDE_TIME, 'ride', 'CE');

        Object.values(uniquePhysicalStations).forEach(station => {
            if (station.codes.length > 1) {
                for (let i = 0; i < station.codes.length; i++) {
                    for (let j = i + 1; j < station.codes.length; j++) {
                        addEdge(station.codes[i], station.codes[j], TRANSFER_TIME, 'transfer', null);
                        addEdge(station.codes[j], station.codes[i], TRANSFER_TIME, 'transfer', null);
                    }
                }
            }
        });

        // --- 2. 核心演算法 Dijkstra (維持不變) ---
        function findShortestPath(startName, endName) {
            if (startName === endName) return null;

            const startCodes = uniquePhysicalStations[startName].codes;
            const endCodes = uniquePhysicalStations[endName].codes;

            const dist = {};
            const prev = {};
            const pq = [];

            Object.keys(allStationsMap).forEach(node => {
                dist[node] = Infinity;
                prev[node] = null;
            });

            startCodes.forEach(code => {
                dist[code] = 0;
                pq.push({ node: code, dist: 0 });
            });

            while (pq.length > 0) {
                pq.sort((a, b) => a.dist - b.dist);
                const { node, dist: currentDist } = pq.shift();

                if (dist[node] < currentDist) continue;
                if (endCodes.includes(node)) {
                    return reconstructPath(prev, node);
                }

                if (graph[node]) {
                    graph[node].forEach(edge => {
                        const alt = currentDist + edge.weight;
                        if (alt < dist[edge.node]) {
                            dist[edge.node] = alt;
                            prev[edge.node] = { node: node, edgeFromPrev: edge };
                            pq.push({ node: edge.node, dist: alt });
                        }
                    });
                }
            }
            return null;
        }

        function reconstructPath(prev, endNode) {
            const path = [];
            let curr = endNode;
            
            while (curr) {
                const step = prev[curr];
                if (step) {
                    path.unshift({ node: curr, edge: step.edgeFromPrev });
                    curr = step.node;
                } else {
                    path.unshift({ node: curr, edge: null }); 
                    curr = null;
                }
            }

            const legs = [];
            if (path.length < 2) return [];

            let currentLeg = { 
                type: path[1].edge.type, 
                line: path[1].edge.line, 
                nodes: [path[0].node, path[1].node],
                time: path[1].edge.weight,
                stops: path[1].edge.type === 'ride' ? 1 : 0
            };

            for (let i = 2; i < path.length; i++) {
                const edge = path[i].edge;
                if (edge.type === currentLeg.type && edge.line === currentLeg.line) {
                    currentLeg.nodes.push(path[i].node);
                    currentLeg.time += edge.weight;
                    if(edge.type === 'ride') currentLeg.stops += 1;
                } else {
                    legs.push(currentLeg);
                    currentLeg = { 
                        type: edge.type, 
                        line: edge.line, 
                        nodes: [path[i-1].node, path[i].node],
                        time: edge.weight,
                        stops: edge.type === 'ride' ? 1 : 0
                    };
                }
            }
            legs.push(currentLeg);
            return legs;
        }

        // --- 3. React 元件 ---
        const { useState, useEffect } = React;

        const App = () => {
            const [startStation, setStartStation] = useState("牛車水");
            const [endStation, setEndStation] = useState("海灣舫");
            const [route, setRoute] = useState(null);

            // 確保每次重新渲染時，Lucide icons 都能正確載入
            useEffect(() => {
                lucide.createIcons();
            });

            useEffect(() => {
                if(startStation && endStation && startStation !== endStation) {
                    const legs = findShortestPath(startStation, endStation);
                    setRoute(legs);
                } else {
                    setRoute(null);
                }
            }, [startStation, endStation]);

            const handleSwap = () => {
                const temp = startStation;
                setStartStation(endStation);
                setEndStation(temp);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Header: 加入響應式 Padding 與 15. 回到首頁按鈕 */}
                    <header className="bg-slate-900 text-white shadow-md pt-8 pb-10 px-4 sm:px-6 relative">
                        {/* 15. 回到首頁按鈕 */}
                        <div className="max-w-3xl mx-auto mb-4">
                            <a href="https://kokko-travel.com/zh/singapore/" 
                               className="inline-flex items-center gap-1.5 text-sm font-medium text-slate-300 hover:text-white transition-colors aria-label='回到 Kokko Travel 首頁'">
                                <i data-lucide="home" className="w-4 h-4"></i>
                                回到首頁
                            </a>
                        </div>
                        
                        <div className="text-center max-w-3xl mx-auto">
                            <h1 className="text-2xl sm:text-3xl md:text-4xl font-bold tracking-tight mb-2 flex items-center justify-center gap-2 sm:gap-3">
                                <i data-lucide="train" className="w-7 h-7 sm:w-9 sm:h-9 text-blue-400"></i>
                                新加坡捷運導航
                            </h1>
                            <p className="text-slate-400 text-sm sm:text-base">快速查詢路線、搭乘時間與景點指南</p>
                        </div>
                    </header>

                    {/* Main Content: 14. 適合多裝置閱讀的 Max Width 設定 */}
                    <main className="flex-grow w-full max-w-3xl mx-auto px-4 sm:px-6 -mt-6 pb-12" role="main">
                        {/* Search Box */}
                        <div className="bg-white rounded-2xl shadow-xl p-5 sm:p-7 mb-8 relative border border-slate-100">
                            <form aria-label="捷運路線查詢表單" className="flex flex-col gap-5" onSubmit={(e) => e.preventDefault()}>
                                <div className="relative">
                                    <label htmlFor="startStation" className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">出發站 (Start)</label>
                                    <select 
                                        id="startStation"
                                        aria-label="選擇出發站"
                                        className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-base sm:text-lg rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3.5 sm:p-4 pr-10 truncate font-medium appearance-none transition-colors hover:bg-slate-100 cursor-pointer"
                                        value={startStation}
                                        onChange={(e) => setStartStation(e.target.value)}
                                    >
                                        {Object.keys(mrtData).map(lineKey => (
                                            <optgroup key={`start-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                {mrtData[lineKey].map(st => (
                                                    <option key={`start-${st.c}`} value={st.n}>
                                                        [{st.c}] {st.n} ({st.e}){st.a ? ` 📍 ${st.a}` : ''}
                                                    </option>
                                                ))}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 bottom-0 top-7 flex items-center px-4 text-slate-400">
                                        <i data-lucide="chevron-down" className="w-5 h-5"></i>
                                    </div>
                                </div>

                                <div className="relative flex justify-center -my-4 z-10">
                                    <button 
                                        type="button"
                                        onClick={handleSwap}
                                        aria-label="反轉出發與抵達站"
                                        className="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-full shadow-lg transition-transform hover:scale-110 active:scale-95 border-4 border-white"
                                        title="反轉路線"
                                    >
                                        <i data-lucide="arrow-down-up" className="w-5 h-5"></i>
                                    </button>
                                </div>

                                <div className="relative mt-1">
                                    <label htmlFor="endStation" className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">抵達站 (Destination)</label>
                                    <select 
                                        id="endStation"
                                        aria-label="選擇抵達站"
                                        className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-base sm:text-lg rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3.5 sm:p-4 pr-10 truncate font-medium appearance-none transition-colors hover:bg-slate-100 cursor-pointer"
                                        value={endStation}
                                        onChange={(e) => setEndStation(e.target.value)}
                                    >
                                        {Object.keys(mrtData).map(lineKey => (
                                            <optgroup key={`end-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                {mrtData[lineKey].map(st => (
                                                    <option key={`end-${st.c}`} value={st.n}>
                                                        [{st.c}] {st.n} ({st.e}){st.a ? ` 📍 ${st.a}` : ''}
                                                    </option>
                                                ))}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 bottom-0 top-7 flex items-center px-4 text-slate-400">
                                        <i data-lucide="chevron-down" className="w-5 h-5"></i>
                                    </div>
                                </div>
                            </form>
                        </div>

                        {/* Route Results */}
                        <section aria-live="polite">
                            {startStation === endStation ? (
                                <div className="bg-amber-50 text-amber-800 p-5 rounded-xl text-center shadow-sm border border-amber-100 font-medium">
                                    📍 起點與終點相同，不需搭乘捷運唷！
                                </div>
                            ) : route ? (
                                <RouteTimeline legs={route} destName={endStation} />
                            ) : (
                                <div className="text-center text-slate-500 py-10 flex flex-col items-center gap-3">
                                    <i data-lucide="loader-2" className="w-8 h-8 animate-spin text-blue-400"></i>
                                    正在計算最佳路線...
                                </div>
                            )}
                        </section>
                    </main>

                    {/* 12. 版權宣告 Footer (完全遵照要求內容) */}
                    <footer className="bg-slate-900 text-slate-400 text-xs sm:text-sm py-8 sm:py-10 mt-auto border-t border-slate-800" role="contentinfo">
                        <div className="max-w-3xl mx-auto px-6 text-center flex flex-col gap-1.5 leading-relaxed">
                            <p>Copyright © 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
                            <p>版權所有，未經授權禁止轉載、翻印或任何商業用途。</p>
                            <p>本站包含之圖片、文字內容及程式碼均受法律保護。</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const RouteTimeline = ({ legs, destName }) => {
            const totalTime = legs.reduce((acc, leg) => acc + leg.time, 0);
            const totalTransfers = legs.filter(l => l.type === 'transfer').length;
            
            const destInfo = uniquePhysicalStations[destName];

            return (
                <article className="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                    <header className="bg-slate-50 border-b border-slate-100 p-5 sm:p-6 flex justify-between items-center">
                        <div>
                            <h2 className="text-xs sm:text-sm font-bold text-slate-500 mb-1 tracking-wide">預估時間</h2>
                            <p className="text-3xl sm:text-4xl font-black text-slate-800 tracking-tight">
                                {totalTime} <span className="text-base sm:text-lg font-medium text-slate-500">分鐘</span>
                            </p>
                        </div>
                        <div className="text-right">
                            <h2 className="text-xs sm:text-sm font-bold text-slate-500 mb-1 tracking-wide">轉乘次數</h2>
                            <p className="text-xl sm:text-2xl font-bold text-slate-700">
                                {totalTransfers} <span className="text-sm sm:text-base font-medium text-slate-500">次</span>
                            </p>
                        </div>
                    </header>

                    <div className="p-5 sm:p-7">
                        <div className="relative border-l-2 border-slate-200 ml-4 sm:ml-5 pb-2">
                            {legs.map((leg, idx) => (
                                <LegItem key={idx} leg={leg} isLast={idx === legs.length - 1} destName={destName} />
                            ))}
                        </div>
                        
                        {/* Destination Marker */}
                        <div className="relative pl-10 sm:pl-12 mt-4 sm:mt-6">
                            <div className="absolute left-[-5px] top-1.5 w-3.5 h-3.5 bg-red-500 rounded-full border-2 border-white shadow-md"></div>
                            <div className="absolute left-[-11px] top-0 w-6 h-6 bg-red-100 rounded-full opacity-60 z-[-1]"></div>
                            
                            <h3 className="text-lg sm:text-xl font-bold text-slate-900">
                                {destName} <span className="text-sm font-normal text-slate-500 ml-1.5">{destInfo.en}</span>
                            </h3>
                            <p className="text-sm text-slate-500 mb-2 mt-0.5 font-medium">抵達目的地 (Arrive)</p>
                            
                            {destInfo.attractions && (
                                <div className="mt-3 bg-indigo-50 border border-indigo-100/60 rounded-xl p-3.5 sm:p-4 text-sm flex gap-3 shadow-sm">
                                    <i data-lucide="map-pin" className="w-5 h-5 text-indigo-500 shrink-0 mt-0.5"></i>
                                    <div>
                                        <span className="font-bold text-indigo-900 block mb-1">周邊景點推薦：</span>
                                        <span className="text-indigo-800 leading-relaxed">{destInfo.attractions}</span>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </article>
            );
        };

        const LegItem = ({ leg, isLast, destName }) => {
            const startNodeCode = leg.nodes[0];
            const endNodeCode = leg.nodes[leg.nodes.length - 1];
            const startStation = allStationsMap[startNodeCode];
            const endStation = allStationsMap[endNodeCode];

            if (leg.type === 'transfer') {
                return (
                    <div className="relative pl-6 sm:pl-8 pb-8 sm:pb-10">
                        <div className="absolute left-[-11px] top-2 bg-white rounded-full p-1 border border-slate-200 shadow-sm">
                            <i data-lucide="footprints" className="w-3.5 h-3.5 text-slate-400"></i>
                        </div>
                        <div className="bg-slate-50 border border-slate-200/60 rounded-xl p-3.5 sm:p-4 inline-block shadow-sm">
                            <p className="text-sm sm:text-base font-medium text-slate-700">
                                在 <strong className="text-slate-900 font-bold">{startStation.n}</strong> 站內轉乘
                            </p>
                            <p className="text-xs sm:text-sm text-slate-500 mt-1.5 flex items-center gap-1.5 font-medium">
                                <i data-lucide="clock" className="w-3.5 h-3.5"></i> 步行約 {leg.time} 分鐘
                            </p>
                        </div>
                    </div>
                );
            }

            const lineTheme = lineColors[leg.line] || { bg: 'bg-slate-500', text: 'text-slate-600', name: leg.line };
            
            return (
                <div className="relative pl-6 sm:pl-8 pb-8 sm:pb-10">
                    <div className={`absolute left-[-7px] top-1.5 w-4 h-4 rounded-full border-[3px] border-white shadow-md z-10 ${lineTheme.bg}`}></div>
                    
                    <div className="mb-2.5">
                        <h3 className="text-base sm:text-lg font-bold text-slate-900">
                            {startStation.n} <span className="text-sm font-normal text-slate-500 ml-1.5">{startStation.e}</span>
                        </h3>
                        
                        {startStation.a && (
                            <p className="text-xs sm:text-sm text-indigo-600 mt-1.5 flex items-start gap-1.5 font-medium">
                                <i data-lucide="star" className="w-3.5 h-3.5 sm:w-4 sm:h-4 mt-0.5 shrink-0 fill-indigo-100"></i>
                                <span className="leading-tight">{startStation.a}</span>
                            </p>
                        )}
                    </div>

                    <div className={`mt-3.5 border-l-4 rounded-r-xl p-3.5 sm:p-4 ${lineTheme.bg.replace('bg-', 'border-').replace('500','400')} bg-white shadow-sm border-y border-r border-slate-100`}>
                        <div className="flex items-center gap-2 mb-2">
                            <span className={`${lineTheme.bg} text-white text-[10px] sm:text-xs font-bold px-2 py-0.5 rounded uppercase tracking-wider`}>
                                {startNodeCode}
                            </span>
                            <span className={`text-sm sm:text-base font-bold ${lineTheme.text}`}>搭乘 {lineTheme.name}</span>
                        </div>
                        <p className="text-xs sm:text-sm text-slate-600 flex items-center gap-2 mt-2.5 font-medium">
                            <span>前往 <strong className="text-slate-800">{endStation.n}</strong></span>
                            <span className="text-slate-300">|</span>
                            <span>{leg.stops} 站</span>
                            <span className="text-slate-300">|</span>
                            <span>約 {leg.time} 分鐘</span>
                        </p>
                        
                        <div className="mt-3 text-xs text-slate-400 bg-slate-50 p-2 rounded-lg border border-slate-100 leading-relaxed">
                            途經: {leg.nodes.slice(1, -1).map(c => allStationsMap[c].n).join(' ➔ ') || '無中途站'}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
