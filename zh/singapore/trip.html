        function App() {

            const [selectedCategory, setSelectedCategory] = useState('門票');

                        <div className="max-w-5xl mx-auto px-4 py-4 md:py-6">

                                </h1>

                                >

                                    <span className="hidden sm:inline">回到首頁</span>
                                    <span className="sm:hidden">首頁</span>

                                    <button
                                        key={region}
                                        onClick={() => {
                                            setSelectedRegion(region);
                                            const allowed = getAvailableCategoryIds(region);
                                            if (!allowed.includes(selectedCategory)) {
                                                setSelectedCategory(allowed[0]);
                                            }
                                        }}
                                        aria-pressed={selectedRegion === region}
                                        className={`whitespace-nowrap px-4 sm:px-5 py-2 sm:py-2.5 rounded-full text-xs sm:text-sm font-bold transition-all duration-200 active:scale-95 ${
                                            selectedRegion === region
                                            ? 'bg-emerald-600 text-white shadow-md'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'

                                        {region}

                        </div>
                    </header>

                        {/* 分類標籤 */}
                        <nav className="flex flex-wrap gap-2 md:gap-3 mb-6 sm:mb-8" aria-label="分類標籤選單">
                            {CATEGORIES.filter(cat => getAvailableCategoryIds(selectedRegion).includes(cat.id)).map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    aria-pressed={selectedCategory === id}
                                    className={`flex items-center gap-1.5 px-3.5 sm:px-4 py-2 rounded-xl border text-xs sm:text-sm font-bold transition-all active:scale-95 ${
                                        selectedCategory === id
                                        ? 'border-emerald-500 bg-emerald-50 text-emerald-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4" />
                                    {id}
                                </button>
                            ))}
                        </nav>

                        {/* 內容區標題 */}
                        <div className="mb-6">
                            <h2 className="text-lg sm:text-xl font-bold text-slate-800 flex items-center gap-2">
                                {selectedRegion} - {selectedCategory} 精選推薦
                            </h2>
                        </div>

                        {/* 卡片列表 */}
                        <section aria-live="polite">
                            {currentData.length > 0 ? (
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6">
                                    {currentData.map((item, index) => (
                                        <article 
                                            key={index} 
                                            className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 md:p-6 flex flex-col justify-between hover:shadow-lg transition-shadow animate-fade-in"
                                        >
                                            <div>
                                                <h3 className="text-base sm:text-lg md:text-xl font-bold text-slate-800 mb-3 leading-tight">
                                                    {item.title}
                                                </h3>
                                                <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed font-medium">
                                                    {item.description}
                                                </p>
                                            </div>
                                            
                                            <div className="mt-auto pt-5 border-t border-slate-50 flex justify-end">
                                                <a
                                                    href={item.link}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    className="inline-flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 sm:py-2.5 px-5 rounded-xl transition-transform active:scale-95 w-full sm:w-auto text-sm sm:text-base"
                                                    aria-label={`查看 ${item.title} 詳細說明與預訂`}
                                                >
                                                    <Info className="w-4 h-4" />
                                                    <span>詳細說明與預訂</span>
                                                    <ExternalLink className="w-4 h-4 ml-1 opacity-70" />
                                                </a>
                                            </div>
                                        </article>
                                    ))}
                                </div>
                            ) : (
                                <div className="bg-white rounded-2xl border border-dashed border-slate-300 p-10 sm:p-12 text-center flex flex-col items-center justify-center">
                                    <h3 className="text-base sm:text-lg font-bold text-slate-700 mb-2">
                                        此區域目前無對應項目的資料
                                    </h3>
                                    <p className="text-sm sm:text-base text-slate-500 font-medium">請嘗試選擇其他分類或分頁。</p>
                                </div>
                            )}
                        </section>

                        {/* Klook 全局探索按鈕 */}
                        <div className="mt-10 sm:mt-12 flex justify-center">
                            <a 
                                href="https://www.klook.com/zh-TW/search/result/?query=%E6%96%B0%E5%8A%A0%E5%9D%A1&aid=115830" 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3.5 px-8 rounded-full shadow-lg transition-transform active:scale-95 text-sm sm:text-base w-full sm:w-auto"
                            >
                                <span className="tracking-wide">前往 Klook 探索更多新加坡行程</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>

                    <footer className="bg-slate-900 text-slate-400 text-xs sm:text-sm py-8 sm:py-10 mt-auto border-t border-slate-800" role="contentinfo">
                        <div className="max-w-5xl mx-auto px-6 text-center flex flex-col gap-1.5 leading-relaxed">
                            <p>Copyright © 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
                            <p>版權所有，未經授權禁止轉載、翻印或任何商業用途。</p>
                            <p>本站包含之圖片、文字內容及程式碼均受法律保護。</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
