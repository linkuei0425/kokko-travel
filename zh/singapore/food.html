                        { name: "珍寶海鮮 (ION Orchard店)", feature: "如果行程主要在烏節路血拼，可以直接到 ION 百貨內的珍寶海鮮。環境現代舒適，辣椒螃蟹與海鮮炒飯水準依舊。", address: "2 Orchard Turn, #04-09/10 ION Orchard<br><span class='text-orange-600 font-bold mt-1.5 inline-block'>🚇 自由行交通：</span>搭乘地鐵 🔴紅線至「烏節站 (NS22/TE14)」E出口，直接連接 ION Orchard 購物中心 4樓。" },
                        { name: "海鮮共和國 (Seafood Republic)", feature: "由新加坡四家知名海鮮餐廳聯手打造，雖然主要在聖淘沙，但在市區百貨也有快閃或分店，一次能吃到各家招牌特色。", address: "烏節路商圈周邊分店<br><span class='text-orange-600 font-bold mt-1.5 inline-block'>🚇 自由行交通：</span>(若為聖淘沙本店，請搭乘 🟣紫/🟡黃線至「港灣站 (NE1/CC29)」轉乘聖淘沙捷運)。" }
                    ],
                    "nanyang": [
                        { name: "Food Republic (313@Somerset)", feature: "烏節路逛街時的最佳平價選擇！大食代美食街內裝潢復古，裡面有一攤非常道地的叻沙(Laksa)與炒福建麵，值得一試。", address: "313 Orchard Rd, Level 5, 313@Somerset<br><span class='text-orange-600 font-bold mt-1.5 inline-block'>🚇 自由行交通：</span>搭乘地鐵 🔴紅線至「索美塞站 (NS23)」B出口，商場直達 5 樓大食代。" },
                        { name: "Violet Oon (國家美術館/烏節分店)", feature: "新加坡頂級娘惹菜餐廳，裝潢極度奢華優雅。小金杯、黑果雞與乾咖哩牛肉(Beef Rendang)是必點，體驗土生華人的精緻飲食。", address: "ION Orchard 內設有分店或周邊<br><span class='text-orange-600 font-bold mt-1.5 inline-block'>🚇 自由行交通：</span>搭乘地鐵 🔴紅線至「烏節站 (NS22/TE14)」E出口，進入 ION Orchard 3樓。" },
                        { name: "泰豐 (炒粿條)", feature: "百貨美食街內常見的連鎖品牌，他們家的「炒粿條」鑊氣十足，加入黑醬油、鮮蛤與臘腸大火快炒，鹹甜交織非常邪惡。", address: "ION Orchard 等大型百貨美食街 B4<br><span class='text-orange-600 font-bold mt-1.5 inline-block'>🚇 自由行交通：</span>搭乘地鐵 🔴紅線至「烏節站 (NS22/TE14)」E出口，進入 ION 百貨地下4樓美食街。" }
                    ],
                    "kopitiam": [
                        { name: "Bacha Coffee (ION Orchard)", feature: "位於 ION 百貨一樓的旗艦店，整面牆的咖啡罐與精緻甜點櫃極度吸睛。走累了來一杯精品手沖配上覆盆子可頌，非常享受。", address: "2 Orchard Turn, #01-15/16 ION Orchard<br><span class='text-orange-600 font-bold mt-1.5 inline-block'>🚇 自由行交通：</span>搭乘地鐵 🔴紅線至「烏節站 (NS22/TE14)」E出口，搭電扶梯至 ION Orchard 1樓精品區。" },
                        { name: "PS.Cafe (Paragon)", feature: "新加坡最知名的網美咖啡廳之一！隱身在百貨公司內卻擁有大片綠意植栽。必點「松露薯條」，份量極大且香氣濃郁。", address: "290 Orchard Rd, #03-41/42 Paragon<br><span class='text-orange-600 font-bold mt-1.5 inline-block'>🚇 自由行交通：</span>搭乘地鐵 🔴紅線至「烏節站 (NS22/TE14)」A出口，沿烏節路步行約5分鐘至百麗宮商場 3樓。" },
                        { name: "亞坤 (313@Somerset)", feature: "位於 Somerset 站樓上，不管是當早餐還是下午茶都適合。買完東西提著大包小包，來一份咖椰吐司休息一下最剛好。", address: "313 Orchard Rd, #01-32/33 313@Somerset<br><span class='text-orange-600 font-bold mt-1.5 inline-block'>🚇 自由行交通：</span>搭乘地鐵 🔴紅線至「索美塞站 (NS23)」B出口，位於 313商場 1 樓外側徒步區。" }
                    ],
                    "dessert": [
                        { name: "詹爺爺 街頭冰淇淋推車", feature: "烏節路義安城(Ngee Ann City)外最著名的紅色推車！各大旅遊節目採訪過，切塊冰淇淋夾彩色麵包，好吃又便宜的代表。", address: "391 Orchard Rd, 義安城外人行道<br><span class='text-orange-600 font-bold mt-1.5 inline-block'>🚇 自由行交通：</span>搭乘地鐵 🔴紅線至「烏節站 (NS22)」或「索美塞站 (NS23)」B出口，步行5分鐘至義安城/高島屋門口。" },
                        { name: "Mr. Coconut", feature: "新加坡近年爆紅的椰子飲料專賣店！招牌「椰子冰沙」加入新鮮椰肉打成，清涼退火且不會太甜，烏節路人手一杯。", address: "烏節路各大百貨地下室皆有分店<br><span class='text-orange-600 font-bold mt-1.5 inline-block'>🚇 自由行交通：</span>搭乘地鐵 🔴紅線至「索美塞站 (NS23)」前往 313@Somerset 等商場地下樓層即可找到。" },
                        { name: "街頭現切水果攤", feature: "在烏節路街頭常可見到推車販售現切的冰涼西瓜、哈密瓜或紅毛丹。一袋新幣一塊多，是逛街時最天然的消暑聖品。", address: "烏節路沿線人行道<br><span class='text-orange-600 font-bold mt-1.5 inline-block'>🚇 自由行交通：</span>搭乘地鐵至「烏節站 (NS22)」或「索美塞站 (NS23)」，沿著烏節路人行道散步即可看到。" }
                    ]
                }
            }
        };

        // Custom Categories adapted for Singapore
        const categoriesMap = {
            "hainanese": { name: "🍗 海南雞與肉骨茶", color: "bg-orange-100 text-orange-800 hover:bg-orange-600 hover:text-white border-orange-400" },
            "seafood": { name: "🦀 辣椒螃蟹與海鮮", color: "bg-red-100 text-red-800 hover:bg-red-600 hover:text-white border-red-400" },
            "nanyang": { name: "🍜 叻沙與娘惹風味", color: "bg-amber-100 text-amber-800 hover:bg-amber-600 hover:text-white border-amber-400" },
            "kopitiam": { name: "☕ 咖椰吐司與咖啡", color: "bg-emerald-100 text-emerald-800 hover:bg-emerald-600 hover:text-white border-emerald-400" },
            "dessert": { name: "🍧 街頭甜品與小吃", color: "bg-sky-100 text-sky-800 hover:bg-sky-600 hover:text-white border-sky-400" }
        };

        let currentRegion = "";
        let currentCategory = "";

        // Elements
        const regionContainer = document.getElementById('region-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const categorySection = document.getElementById('category-section');
        const contentArea = document.getElementById('content-area');

        // Render Regions
        function initRegions() {
            Object.keys(db).forEach(key => {
                const btn = document.createElement('button');
                btn.className = "whitespace-nowrap px-4 py-2 md:px-5 md:py-2.5 rounded-full border border-gray-300 bg-white text-gray-700 font-medium hover:bg-orange-600 hover:text-white hover:border-orange-600 transition-colors shadow-sm text-sm md:text-base";
                btn.innerText = db[key].name;
                btn.setAttribute('aria-pressed', 'false');
                btn.onclick = () => selectRegion(key, btn);
                regionContainer.appendChild(btn);
            });
        }

        // Render Categories
        function initCategories() {
            Object.keys(categoriesMap).forEach(key => {
                const config = categoriesMap[key];
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-4 py-2 md:px-5 md:py-2.5 rounded-full border transition-all font-medium text-sm md:text-base ${config.color}`;
                btn.innerText = config.name;
                btn.setAttribute('aria-pressed', 'false');
                btn.onclick = () => selectCategory(key, btn);
                categoryContainer.appendChild(btn);
            });
        }

        function selectRegion(regionKey, clickedBtn) {
            currentRegion = regionKey;
            
            // Highlight active region (A11y ARIA update)
            Array.from(regionContainer.children).forEach(btn => {
                btn.classList.remove('bg-orange-600', 'text-white', 'border-orange-600');
                btn.classList.add('bg-white', 'text-gray-700');
                btn.setAttribute('aria-pressed', 'false');
            });
            clickedBtn.classList.remove('bg-white', 'text-gray-700', 'hover:bg-orange-600');
            clickedBtn.classList.add('bg-orange-600', 'text-white', 'border-orange-600');
            clickedBtn.setAttribute('aria-pressed', 'true');

            // Show category section
            categorySection.classList.remove('hidden');
            categorySection.classList.add('fade-in');
            
            // Auto select first category if none selected
            if(!currentCategory) {
                const firstCatBtn = categoryContainer.children[0];
                selectCategory('hainanese', firstCatBtn);
            } else {
                renderContent();
            }
        }

        function selectCategory(catKey, clickedBtn) {
            currentCategory = catKey;

            // Highlight active category (A11y ARIA update)
            Array.from(categoryContainer.children).forEach(btn => {
                btn.classList.remove('ring-2', 'ring-offset-2', 'ring-orange-500', 'shadow-md', 'scale-105');
                btn.style.opacity = "0.6";
                btn.setAttribute('aria-pressed', 'false');
            });
            clickedBtn.classList.add('ring-2', 'ring-offset-2', 'ring-orange-500', 'shadow-md', 'scale-105');
            clickedBtn.style.opacity = "1";
            clickedBtn.setAttribute('aria-pressed', 'true');

            renderContent();
        }

        // [GEO/AEO/AAO Optimization] 在動態生成的卡片中加入 Schema.org 語意化屬性 (itemscope, itemprop)
        function renderContent() {
            contentArea.innerHTML = '';
            const items = db[currentRegion].categories[currentCategory];

            if(!items || items.length === 0) {
                contentArea.innerHTML = `<p class="col-span-full text-center py-8 text-gray-500 text-sm md:text-base">此分類目前無資料</p>`;
                return;
            }

            items.forEach((item, index) => {
                // Generate Google Maps URL (加入 Singapore 關鍵字提升準確度，並用 split 濾掉交通指南的 HTML 標籤)
                const pureAddress = item.address.split('<br>')[0];
                const encodedQuery = encodeURIComponent(`${item.name} Singapore ${pureAddress}`);
                const mapsUrl = `https://www-d-google-d-com-s-gmn.v.tuangouai.com/maps/search/?api=1&query=${encodedQuery}`;

                // Semantic HTML structure with Microdata for search engines and AI agents
                const card = document.createElement('article');
                card.className = "bg-white rounded-2xl shadow-sm border border-orange-100 overflow-hidden flex flex-col fade-in hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1";
                card.style.animationDelay = `${index * 0.08}s`;
                card.setAttribute('itemscope', '');
                card.setAttribute('itemtype', 'https://schema.org/Restaurant');

                card.innerHTML = `
                    <div class="p-5 md:p-6 flex-grow">
                        <!-- AI 抓取專用語意標籤 -->
                        <meta itemprop="servesCuisine" content="Singaporean/Asian">
                        
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-lg md:text-xl font-bold text-gray-800 leading-tight" itemprop="name">${item.name}</h3>
                        </div>
                        <p class="text-gray-600 text-sm md:text-base mb-4 md:mb-5 leading-relaxed tracking-wide" itemprop="description">
                            <span class="font-bold text-orange-700 bg-orange-100 px-2 py-0.5 rounded mr-1 inline-block mb-1 md:mb-0">特色</span>
                            ${item.feature}
                        </p>
                        
                        <div class="bg-orange-50/50 p-3 md:p-3.5 rounded-xl flex items-start gap-2 md:gap-3 border border-orange-100" itemprop="address" itemscope itemtype="https://schema.org/PostalAddress">
                            <meta itemprop="addressCountry" content="SG">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-orange-600 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <p class="text-xs md:text-sm text-gray-600 leading-tight font-medium">
                                <span class="font-bold text-orange-800">地址：</span>
                                <span itemprop="streetAddress">${item.address}</span>
                            </p>
                        </div>
                    </div>
                    
                    <div class="px-5 pb-5 md:px-6 md:pb-6 mt-auto flex flex-col gap-3">
                        <!-- Google Maps 導航按鈕 (單一大按鈕更適合新加坡) -->
                        <a href="${mapsUrl}" target="_blank" rel="noopener noreferrer" class="w-full flex items-center justify-center gap-2 btn-nav text-white py-3 md:py-3.5 rounded-xl font-bold transition-colors shadow-sm hover:shadow-md text-sm md:text-base" aria-label="開啟 Google Maps 導航前往 ${item.name}">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 md:h-6 md:w-6" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                                <path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z" clip-rule="evenodd" />
                            </svg>
                            開啟 Google Maps 導航
                        </a>
                    </div>
                `;
                contentArea.appendChild(card);
            });
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            initRegions();
            initCategories();
        });

    </script>
</body>
</html>
