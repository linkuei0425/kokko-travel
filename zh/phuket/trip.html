                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 sm:py-5">
                            <div className="flex items-center justify-between gap-3 mb-4 sm:mb-5">
                                <div className="flex items-center gap-2 sm:gap-3">
                                    <MapPin className="text-emerald-500 w-6 h-6 sm:w-8 sm:h-8 flex-shrink-0" />
                                    <h1 className="text-xl sm:text-2xl md:text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-emerald-600 to-teal-500 tracking-wide">
                                        蘇梅島及周邊跳島推薦
                                    </h1>
                                </div>
                                {/* 15. 回到首頁連結更新 */}
                                <a
                                    href="https://kokko-travel.com/zh/kohsamui/"
                                    aria-label="回到首頁"
                                    className="hidden sm:flex items-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-300 bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm hover:shadow-md hover:-translate-x-1 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2"
                                >
                                    <Home className="w-4 h-4" />
                                    回到首頁
                                </a>
                            </div>
                            
                            {/* 地區選擇 - 加入 snap-x 優化手機端滑動 */}
                            <nav aria-label="地區選擇" className="flex gap-2 sm:gap-3 overflow-x-auto pb-2 scrollbar-hide snap-x">
                                <a
                                    href="https://kokko-travel.com/zh/kohsamui/"
                                    aria-label="回到首頁"
                                    className="sm:hidden snap-center flex items-center justify-center gap-1.5 whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-300 bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500"
                                >
                                    <Home className="w-4 h-4" />
                                    首頁
                                </a>
                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => setSelectedRegion(region)}
                                        aria-pressed={selectedRegion === region}
                                        className={`snap-center whitespace-nowrap px-5 py-2.5 rounded-full text-sm sm:text-base font-bold transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-1 ${
                                            selectedRegion === region
                                            ? 'bg-teal-600 text-white shadow-md'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-teal-50 hover:text-teal-700 hover:border-teal-200'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-10">
                        {/* 分類標籤 */}
                        <nav aria-label="行程分類選擇" className="flex flex-wrap gap-2 sm:gap-3 mb-8 sm:mb-10">
                            {CATEGORIES.map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    aria-pressed={selectedCategory === id}
                                    className={`flex items-center justify-center gap-1.5 px-4 sm:px-5 py-2.5 sm:py-3 rounded-xl border text-sm sm:text-base font-bold transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-1 ${
                                        selectedCategory === id
                                        ? 'border-emerald-500 bg-emerald-50 text-emerald-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4 sm:w-5 sm:h-5" />
                                    {id}
                                </button>
                            ))}
                        </nav>

                        {/* 內容區標題 */}
                        <div className="mb-6 sm:mb-8 flex items-center gap-2">
                            <h2 className="text-2xl sm:text-3xl font-extrabold text-slate-800 tracking-wide border-l-[4px] border-emerald-500 pl-3">
                                {selectedRegion} - {selectedCategory} <span className="text-emerald-600">精選推薦</span>
                            </h2>
                        </div>

                        {/* 卡片列表 */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-5 sm:gap-6 lg:gap-8">
                                {currentData.map((item, index) => (
                                    // AEO / GEO 微資料標籤 (Microdata) 置入
                                    <article 
                                        key={index} 
                                        itemScope 
                                        itemType="https://schema.org/TouristTrip"
                                        className="bg-white rounded-2xl shadow-sm border border-slate-200/80 p-5 sm:p-7 flex flex-col justify-between hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1 animate-fade-in group"
                                        style={{ animationDelay: `${index * 0.05}s` }}
                                    >
                                        <div className="flex-grow">
                                            <h3 itemProp="name" className="text-xl sm:text-2xl font-bold text-slate-800 mb-4 leading-snug flex items-start gap-2">
                                                <span className="text-emerald-500 mt-1 flex-shrink-0"><Sparkles className="w-5 h-5 sm:w-6 sm:h-6"/></span>
                                                {item.title}
                                            </h3>
                                            <p itemProp="description" className="text-slate-600 text-sm sm:text-base mb-6 leading-relaxed font-medium">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-5 border-t border-slate-100 flex justify-end">
                                            <a
                                                href={item.link}
                                                itemProp="url"
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-[#ff5b00] hover:bg-[#e05000] text-white font-bold py-3 sm:py-3.5 px-6 rounded-xl transition-all duration-300 shadow-sm hover:shadow-md w-full sm:w-auto focus:outline-none focus:ring-2 focus:ring-[#ff5b00] focus:ring-offset-2"
                                            >
                                                <Info className="w-4 h-4 sm:w-5 sm:h-5" />
                                                <span className="text-sm sm:text-base">詳細說明與預訂</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-80" />
                                            </a>
                                        </div>
                                    </article>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-3xl border border-dashed border-slate-300 p-12 sm:p-16 text-center flex flex-col items-center justify-center shadow-sm">
                                <h3 className="text-lg sm:text-xl font-bold text-slate-700 mb-3 tracking-wide">
                                    此區域目前無對應項目的資料
                                </h3>
                                <p className="text-slate-500 text-sm sm:text-base">請嘗試選擇其他分類或切換不同島嶼區域探索。</p>
                            </div>
                        )}

                        {/* 全局探索按鈕 */}
                        <div className="mt-12 sm:mt-16 flex justify-center">
                            <a 
                                href={`https://www.klook.com/zh-TW/search/result/?query=${encodeURIComponent(selectedRegion)}&aid=116515`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-4 px-8 sm:px-12 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-2"
                            >
                                <span className="tracking-wide text-base sm:text-lg">前往探索更多 {selectedRegion} 行程</span>
                                <ExternalLink className="w-5 h-5 sm:w-6 sm:h-6 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>

                    {/* 12. Footer: 加入版權警語與 RWD 排版 */}
                    <footer className="border-t border-emerald-200/60 mt-auto pt-8 pb-10 sm:pt-10 sm:pb-12 bg-white/50">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center flex flex-col space-y-3">
                            <p className="text-sm sm:text-base font-bold tracking-wide text-slate-500">Copyright &copy; 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
                            <p className="text-xs sm:text-sm text-slate-400">版權所有，未經授權禁止轉載、翻印或任何商業用途。</p>
                            <p className="text-xs sm:text-sm text-slate-400">本站包含之圖片、文字內容及程式碼均受法律保護。</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
