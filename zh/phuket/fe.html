  <script>

      '查汶區': [
        { name: '查汶海灘 (Chaweng Beach)', feature: '蘇梅島最長、最熱鬧的海灘，擁有細白如粉的沙灘與清澈見底的海水。周邊水上活動豐富，夜晚更有精彩的火舞表演與熱鬧的沙灘酒吧派對，是島上最具活力的區域。', transport: '從蘇梅島機場搭乘計程車或雙條車（Songthaew）約 10-15 分鐘即可抵達。' },

      ],
      '波普 / 湄南': [
        { name: '波普海灘 (Bophut Beach)', feature: '以平靜的海面與濃厚的復古風情聞名，沙粒雖較粗，但環境清幽。緊鄰著名的「漁夫村」，傍晚時分在海灘旁享用晚餐或漫步非常有情調。', transport: '從蘇梅島機場出發約 15 分鐘車程，位於島嶼北部環島公路上。' },

    const attractionsData = {
      '查汶區': [
        { name: '查汶觀景台 (Chaweng Viewpoint)', feature: '位於查汶與拉邁之間的沿海公路上，地勢較高，可180度俯瞰蔚藍的泰國灣與查汶海灘的絕美海岸線，是環島時不可錯過的拍照打卡熱門點。', transport: '騎乘機車或開車沿 4169 環島公路往南行駛，留意路邊的觀景台停車區標誌。' },
        { name: '尚泰蘇梅島購物中心', feature: '島上最大、最現代化的露天購物中心 (Central Festival)。擁有眾多國際品牌、特色餐廳與夜市攤位，設計融合了熱帶花園風格，是避暑逛街首選。', transport: '位於查汶海灘大街中心點，周邊飯店步行即可到達，或搭乘雙條車前往。' }

      '拉邁區': [
        { name: '祖父祖母石 (Hin Ta Hin Yai)', feature: '蘇梅島最著名的自然奇觀，由天然風化形成的奇岩怪石，造型酷似男女生殖器官，令人會心一笑。周邊的海水十分清澈，入口處還有販賣椰子冰淇淋的市集。', transport: '位於拉邁海灘南端，從環島公路轉入小徑步行可達，沿途皆有明確指標。' },
        { name: '納芒瀑布 (Na Muang Waterfall)', feature: '島上最壯觀的瀑布群，隱藏在茂密熱帶雨林中。分為一號（較低易達）與二號（較高需健行）瀑布，可在天然的水池中泡水消暑，感受大自然氣息。', transport: '位於島嶼中南部，沿 4169 公路有明顯指標，轉入後需步行或搭乘園區接駁車。' },
        { name: '關帝神廟 (Guan Yu Shrine)', feature: '巨大的青銅關公像高達16公尺，是島上華人信仰的中心。充滿濃厚的中國風情與歷史感，周圍也有許多傳統的中式小吃。', transport: '位於拉邁以南的環島公路旁，騎車經過時非常顯眼，必定不會錯過。' }

      '波普 / 湄南': [

        { name: '漁夫村步行街 (Fisherman\'s Village)', feature: '保留了傳統木造中葡式建築，充滿復古風情。每週一、三、五晚上的夜市熱鬧非凡，充滿特色手工藝品與街頭美食，是島上最好逛的夜市之一。', transport: '位於波普海灘旁，北部環島公路上，搭乘雙條車至波普區入口步行進入。' },
        { name: '千手觀音廟 (Wat Plai Laem)', feature: '融合了泰式與中式風格的寺廟，建於寧靜的湖面上。最吸睛的是巨大且色彩鮮豔的十八臂觀音像與彌勒佛像，湖中還可餵食鯉魚與鯰魚。', transport: '距離大佛寺僅約 5 分鐘車程，通常旅客會將兩者安排在同一半日遊行程中。' }
      ],
      '西海岸 / 南部': [
        { name: '納通鎮 (Nathon Town)', feature: '蘇梅島的行政與交通中心，主要渡輪碼頭所在地。這裡保留了老舊的木造建築，有許多便宜道地的在地小吃，更是欣賞絕美海上夕陽的最佳地點。', transport: '位於島嶼西海岸，任何一條主要雙條車路線的終點或起點皆會經過此地。' },
        { name: '蘇梅島大象保護區', feature: '島上首個提倡道德對待大象的保護區。這裡嚴禁騎乘大象，遊客可以透過餵食、跟著大象在叢林散步與泥漿浴，進行友善互動，深具保育教育意義。', transport: '位於波普與湄南之間的山林中，通常需預訂官方半日遊行程，包含專車接送。' }
      ]
    };

    // 狀態
    let activeCategory = 'beaches';
    let activeTab = '查汶區';

    // SVG 圖示
    const svgSun = `<svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>`;
    const svgMap = `<svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>`;
    const svgSparkles = `<svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-400 mr-2 flex-shrink-0 mt-0.5"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>`;
    const svgTransport = `<svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500 mr-2 flex-shrink-0 mt-0.5"><path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2"/><circle cx="7" cy="17" r="2"/><path d="M9 17h6"/><circle cx="17" cy="17" r="2"/></svg>`;

    const themeConfig = {
      beaches: {
        bg: 'bg-sky-50', selection: 'selection:bg-sky-300', textMain: 'text-sky-500',
        borderMain: 'border-sky-100', tabActive: 'bg-sky-500 text-white shadow-md transform scale-105',
        tabHover: 'bg-white text-gray-600 hover:bg-sky-100 hover:text-sky-600', iconH2: 'text-sky-600', borderH2: 'border-sky-200',
        cardGradient: 'from-sky-300 via-sky-400 to-sky-300 group-hover:from-sky-400 group-hover:to-sky-500',
        numberBg: 'bg-sky-100 text-sky-600', transportBg: 'bg-sky-50',
        btnActive: 'bg-white text-sky-500 shadow-md transform scale-105 border-sky-200',
        btnInactive: 'text-gray-500 hover:text-sky-500 hover:bg-white/60 border-transparent',
        transportIconColor: 'text-sky-500'
      },
      attractions: {
        bg: 'bg-emerald-50', selection: 'selection:bg-emerald-300', textMain: 'text-emerald-500',
        borderMain: 'border-emerald-100', tabActive: 'bg-emerald-500 text-white shadow-md transform scale-105',
        tabHover: 'bg-white text-gray-600 hover:bg-emerald-100 hover:text-emerald-600', iconH2: 'text-emerald-600', borderH2: 'border-emerald-200',
        cardGradient: 'from-emerald-300 via-emerald-400 to-emerald-300 group-hover:from-emerald-400 group-hover:to-emerald-500',
        numberBg: 'bg-emerald-100 text-emerald-600', transportBg: 'bg-emerald-50',
        btnActive: 'bg-white text-emerald-500 shadow-md transform scale-105 border-emerald-200',
        btnInactive: 'text-gray-500 hover:text-emerald-500 hover:bg-white/60 border-transparent',
        transportIconColor: 'text-emerald-500'
      }
    };

    function updateTheme() {
      const t = themeConfig[activeCategory];
      
      // Body & Header
      document.getElementById('app-body').className = `min-h-screen font-sans pb-12 transition-colors duration-500 text-gray-800 antialiased ${t.bg} ${t.selection} selection:text-white`;
      document.getElementById('app-header').className = `bg-white/90 backdrop-blur-md sticky top-0 z-50 shadow-sm border-b transition-colors duration-500 ${t.borderMain}`;
      
      // Icons & Text
      const iconSvg = activeCategory === 'beaches' ? svgSun : svgMap;
      document.getElementById('title-icon-left').innerHTML = iconSvg;
      document.getElementById('title-icon-right').innerHTML = iconSvg;
      document.getElementById('title-icon-left').className = `animate-pulse flex-shrink-0 ${t.textMain}`;
      document.getElementById('title-icon-right').className = `animate-pulse flex-shrink-0 ${t.textMain}`;
      
      document.getElementById('category-text').innerText = activeCategory === 'beaches' ? '陽光海灘' : '特色景點';
      document.getElementById('category-text').className = `font-semibold ${t.textMain}`;

      // Section Title
      document.getElementById('section-title-container').className = `mb-6 sm:mb-8 flex items-center space-x-2.5 transition-colors duration-500 ${t.iconH2}`;
      document.getElementById('section-title').className = `text-2xl sm:text-3xl font-extrabold border-b-[3px] pb-1.5 pr-6 inline-block transition-colors duration-500 tracking-wide ${t.borderH2}`;

      // Toggle Buttons (ARIA state update)
      const btnBeach = document.getElementById('btn-beach');
      const btnAttraction = document.getElementById('btn-attraction');
      
      btnBeach.className = `flex-1 flex justify-center items-center px-3 sm:px-5 py-2.5 rounded-full text-sm sm:text-base font-bold transition-all duration-300 border focus:outline-none focus:ring-2 focus:ring-sky-500 focus:ring-offset-1 ${activeCategory === 'beaches' ? t.btnActive : t.btnInactive}`;
      btnBeach.setAttribute('aria-pressed', activeCategory === 'beaches');

      btnAttraction.className = `flex-1 flex justify-center items-center px-3 sm:px-5 py-2.5 rounded-full text-sm sm:text-base font-bold transition-all duration-300 border focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-1 ${activeCategory === 'attractions' ? t.btnActive : t.btnInactive}`;
      btnAttraction.setAttribute('aria-pressed', activeCategory === 'attractions');
    }

    function renderTabs() {
      const t = themeConfig[activeCategory];
      const data = activeCategory === 'beaches' ? beachesData : attractionsData;
      const cities = Object.keys(data);
      const container = document.getElementById('tabs-container');
      
      if (!cities.includes(activeTab)) {
        activeTab = cities[0];
      }

      container.innerHTML = cities.map(city => `
        <button
          onclick="setTab('${city}')"
          class="snap-center flex-shrink-0 px-4 sm:px-6 py-2 sm:py-2.5 rounded-full text-sm sm:text-base font-medium transition-all duration-300 ease-in-out whitespace-nowrap focus:outline-none focus:ring-2 focus:ring-offset-2 ${activeCategory === 'beaches' ? 'focus:ring-sky-500' : 'focus:ring-emerald-500'} ${activeTab === city ? t.tabActive : t.tabHover}"
          aria-selected="${activeTab === city}"
        >
          ${city}
        </button>
      `).join('');
    }

    function renderCards() {
      const t = themeConfig[activeCategory];
      const data = activeCategory === 'beaches' ? beachesData : attractionsData;
      const spots = data[activeTab];
      
      document.getElementById('section-title').innerText = `${activeTab} 精選景點`;

      const transportIconStyled = svgTransport.replace('text-blue-500', t.transportIconColor);

      const container = document.getElementById('cards-container');
      // 加入 Microdata (itemscope, itemtype, itemprop) 以利 GEO / AAO 抓取內容
      container.innerHTML = spots.map((spot, index) => `
        <article itemscope itemtype="https://schema.org/TouristAttraction" class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-shadow duration-300 overflow-hidden border border-gray-100 flex flex-col h-full group">
          <div class="h-2 w-full bg-gradient-to-r transition-colors duration-500 ${t.cardGradient}"></div>
          <div class="p-5 sm:p-6 lg:p-8 flex-grow flex flex-col">
            <h3 itemprop="name" class="text-xl sm:text-2xl font-bold text-gray-800 mb-4 sm:mb-5 flex items-start leading-tight">
              <span class="rounded-full w-7 h-7 flex items-center justify-center text-sm font-bold mr-3 flex-shrink-0 mt-0.5 transition-colors duration-500 ${t.numberBg}">
                ${index + 1}
              </span>
              ${spot.name}
            </h3>
            
            <div class="mb-6 flex-grow">
              <div class="flex items-center text-gray-700 mb-2">
                ${svgSparkles}
                <span class="font-bold tracking-wide">景點特色</span>
              </div>
              <p itemprop="description" class="text-gray-600 leading-relaxed sm:leading-loose pl-8 text-sm sm:text-base">
                ${spot.feature}
              </p>
            </div>

            <div class="rounded-xl p-4 sm:p-5 mt-auto transition-colors duration-500 ${t.transportBg} border border-transparent group-hover:border-white/50">
              <div class="flex items-center text-gray-800 mb-2">
                ${transportIconStyled}
                <span class="font-bold tracking-wide">交通方式</span>
              </div>
              <p class="text-gray-600 text-sm sm:text-base pl-8 leading-relaxed">
                ${spot.transport}
              </p>
            </div>
          </div>
        </article>
      `).join('');
    }

    // 事件與更新邏輯
    function setCategory(category) {
      if (activeCategory === category) return;
      activeCategory = category;
      updateTheme();
      renderTabs();
      renderCards();
      // 切換分類時，讓畫面平滑滾動回標題處 (手機端體驗較佳)
      document.getElementById('section-title-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function setTab(tab) {
      if (activeTab === tab) return;
      activeTab = tab;
      renderTabs();
      renderCards();
    }

    document.getElementById('btn-beach').addEventListener('click', () => setCategory('beaches'));
    document.getElementById('btn-attraction').addEventListener('click', () => setCategory('attractions'));

    // 初始化
    updateTheme();
    renderTabs();
    renderCards();
  </script>
</body>
</html>
