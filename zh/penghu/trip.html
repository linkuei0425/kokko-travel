                    { title: '台灣 4G / 5G 網卡 (eSIM / 實體卡)', description: '澎湖跳島必備！網速穩定覆蓋全島，導航、發限動不卡卡，提供實體卡與免換卡的 eSIM 選擇。', link: 'https://www.klook.com/zh-TW/activity/99115-4g-5g-sim-taiwan/?spm=SearchResult.SearchResult_LIST&clickId=e1ec311d3b&aid=117093' }
                ]
            },
            '東海跳島': {
                '體驗與娛樂': [
                    { title: '東海龍蝦島 抓龍蝦烤鮮蚵體驗', description: '澎湖超夯海人體驗！跟著專業船長到東海無人島抓龍蝦、敲石蚵，中午還能大啖超豪華的痛風海鮮大餐。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E6%9D%B1%E6%B5%B7%E9%BE%8D%E8%9D%A6%E5%B3%B6&aid=117093' }
                ],
                '一日遊': [
                    { title: '東海無人島跳島一日遊 (澎澎灘)', description: '探訪會隨潮汐移動的白色貝殼沙洲「澎澎灘」，並進行潮間帶生態導覽與體驗刺激的海上溜滑梯。', link: 'https://www.klook.com/zh-TW/activity/82222-penghu-islands-nature-experience/?spm=SearchResult.SearchResult_LIST&clickId=be0467b33d&aid=117093' }
                ],
                '交通及網路': [
                    { title: '台灣 4G / 5G 網卡 (eSIM / 實體卡)', description: '澎湖跳島必備！網速穩定覆蓋全島，導航、發限動不卡卡，提供實體卡與免換卡的 eSIM 選擇。', link: 'https://www.klook.com/zh-TW/activity/99115-4g-5g-sim-taiwan/?spm=SearchResult.SearchResult_LIST&clickId=e1ec311d3b&aid=117093' }
                ]
            }
        };

            <footer className="bg-slate-800 text-slate-300 py-8 md:py-10 mt-auto border-t-4 border-emerald-600 w-full">
                <div className="max-w-7xl mx-auto px-4 text-center flex flex-col gap-2 text-xs md:text-sm lg:text-base leading-relaxed">
                    <p className="font-bold text-white mb-1">Copyright &copy; 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
                    <p>版權所有，未經授權禁止轉載、翻印或任何商業用途。</p>
                    <p>本站包含之圖片、文字內容及程式碼均受法律保護。</p>
                </div>
            </footer>
        );

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('澎湖本島');
            const [selectedCategory, setSelectedCategory] = useState('一日遊'); 

            const currentData = itineraryData[selectedRegion]?.[selectedCategory] || [];

            return (
                <div className="flex flex-col min-h-screen w-full">
                    {/* 頂部導覽列 */}
                    <header className="bg-white shadow-sm sticky top-0 z-50 border-b border-emerald-100 transition-all">
                        <div className="max-w-7xl mx-auto px-4 py-4 md:py-5">
                            <div className="flex items-center justify-between gap-3 mb-4">
                                <div className="flex items-center gap-2 md:gap-3">
                                    <MapPin className="text-emerald-600 w-6 h-6 md:w-8 md:h-8 flex-shrink-0" />
                                    <h1 className="text-xl md:text-2xl lg:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-600 to-teal-500 tracking-wide">
                                        澎湖及周邊跳島推薦
                                    </h1>
                                </div>
                                <a
                                    href="https://kokko-travel.com/zh/penghu/"
                                    className="hidden sm:flex items-center justify-center gap-1.5 px-4 md:px-5 py-2 md:py-2.5 rounded-full text-xs md:text-sm font-bold transition-all duration-200 bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:ring-offset-2 whitespace-nowrap"
                                >
                                    <Home className="w-4 h-4" />
                                    回到首頁
                                </a>
                            </div>
                            
                            {/* 地區選擇 (Scrollable) */}
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide snap-x scroll-smooth">
                                <a
                                    href="https://kokko-travel.com/zh/penghu/"
                                    className="sm:hidden flex items-center justify-center gap-1.5 whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm snap-start flex-shrink-0"
                                >
                                    <Home className="w-4 h-4" />
                                    首頁
                                </a>
                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => setSelectedRegion(region)}
                                        className={`snap-start whitespace-nowrap px-4 md:px-5 py-2 md:py-2.5 rounded-full text-sm md:text-base font-bold transition-all duration-200 flex-shrink-0 focus:outline-none focus:ring-2 focus:ring-teal-500 ${
                                            selectedRegion === region
                                            ? 'bg-teal-600 text-white shadow-md'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-teal-50 hover:text-teal-700'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-10 w-full">
                        {/* 分類標籤 */}
                        <div className="flex flex-wrap gap-2 md:gap-3 mb-8 md:mb-10">
                            {CATEGORIES.map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 px-3 py-2 md:px-4 md:py-2.5 rounded-lg border text-sm md:text-base font-bold transition-all focus:outline-none focus:ring-2 focus:ring-emerald-400 ${
                                        selectedCategory === id
                                        ? 'border-emerald-500 bg-emerald-50 text-emerald-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4 md:w-5 md:h-5" />
                                    {id}
                                </button>
                            ))}
                        </div>

                        {/* 內容區標題 */}
                        <div className="mb-6 md:mb-8 flex items-center gap-2">
                            <h2 className="text-xl md:text-2xl font-bold text-slate-800">
                                {selectedRegion} - {selectedCategory} <span className="text-emerald-600">精選推薦</span>
                            </h2>
                        </div>

                        {/* 卡片列表 (Deep RWD Grid) */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-6 lg:gap-8">
                                {currentData.map((item, index) => (
                                    <article 
                                        key={index} 
                                        className="bg-white rounded-2xl shadow-sm border border-emerald-50 p-5 md:p-6 lg:p-7 flex flex-col justify-between hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 animate-fade-in h-full"
                                        style={{ animationDelay: `${index * 0.05}s` }}
                                    >
                                        <div className="flex-grow">
                                            <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-3 md:mb-4 leading-tight flex items-start gap-2">
                                                <span className="text-emerald-500 mt-1 flex-shrink-0"><Sparkles className="w-5 h-5"/></span>
                                                {item.title}
                                            </h3>
                                            <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed font-medium">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-4 md:pt-5 border-t border-slate-100 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-[#ff5b00] hover:bg-[#e05000] text-white font-bold py-2.5 md:py-3 px-5 md:px-6 rounded-xl transition-colors shadow-sm hover:shadow-md w-full sm:w-auto text-sm md:text-base focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#ff5b00]"
                                            >
                                                <Info className="w-4 h-4 md:w-5 md:h-5" />
                                                <span>詳細說明</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-80" />
                                            </a>
                                        </div>
                                    </article>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-2xl border border-dashed border-slate-300 p-12 md:p-20 text-center flex flex-col items-center justify-center">
                                <h3 className="text-lg md:text-xl font-bold text-slate-700 mb-2">
                                    此區域目前無對應項目的資料
                                </h3>
                                <p className="text-sm md:text-base text-slate-500">請嘗試選擇其他分類或分頁。</p>
                            </div>
                        )}

                        {/* 全局探索按鈕 */}
                        <div className="mt-10 md:mt-16 mb-6 flex justify-center">
                            <a 
                                href={`https://www.klook.com/zh-TW/search/result/?query=${encodeURIComponent(selectedRegion)}&aid=117093`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3.5 md:py-4 px-8 md:px-12 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1 text-sm md:text-base focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 w-full sm:w-auto"
                            >
                                <span className="tracking-wide">前往探索更多 {selectedRegion} 行程</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>

                    {/* 版權宣告 Footer */}
                    <Footer />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
