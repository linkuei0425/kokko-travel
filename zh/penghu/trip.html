                                        selectedCategory === id
                                        ? 'border-emerald-500 bg-emerald-50 text-emerald-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4" />
                                    {id}
                                </button>
                            ))}
                        </div>

                        {/* 內容區標題 */}
                        <div className="mb-6 flex items-center gap-2">
                            <h2 className="text-2xl font-bold text-slate-800">
                                {selectedRegion} - {selectedCategory} <span className="text-emerald-600">精選推薦</span>
                            </h2>
                        </div>

                        {/* 卡片列表 */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4 md:gap-6">
                                {currentData.map((item, index) => (
                                    <div 
                                        key={index} 
                                        className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col justify-between hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 animate-fade-in"
                                        style={{ animationDelay: `${index * 0.05}s` }}
                                    >
                                        <div>
                                            <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-3 leading-tight flex items-start gap-2">
                                                <span className="text-emerald-500 mt-1"><Sparkles className="w-5 h-5"/></span>
                                                {item.title}
                                            </h3>
                                            <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed font-medium">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-4 border-t border-slate-100 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-[#ff5b00] hover:bg-[#e05000] text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-sm hover:shadow-md w-full sm:w-auto"
                                            >
                                                <Info className="w-4 h-4" />
                                                <span>詳細說明</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-80" />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl border border-dashed border-slate-300 p-12 text-center flex flex-col items-center justify-center">
                                <h3 className="text-lg font-medium text-slate-700 mb-2">
                                    此區域目前無對應項目的資料
                                </h3>
                                <p className="text-slate-500">請嘗試選擇其他分類或分頁。</p>
                            </div>
                        )}

                        {/* 全局探索按鈕 */}
                        <div className="mt-12 flex justify-center">
                            <a 
                                href={`https://www.klook.com/zh-TW/search/result/?query=${encodeURIComponent(selectedRegion)}&aid=117093`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1"
                            >
                                <span className="tracking-wide">前往探索更多 {selectedRegion} 行程</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
