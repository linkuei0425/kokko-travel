      return `${hh.toString().padStart(2, '0')}:${mm.toString().padStart(2, '0')}`;

        if (selectedIds.length === 0) return [];

        let idsToSchedule = [...selectedIds];
        idsToSchedule = [...new Set(idsToSchedule)];

        // 排序權重定義 (確保城市分群與時間合理性)
        const getPriority = (item) => {
            if (item.id === 'ret') return 999;
            if (item.type === '起點') return 10;
            if (item.type === '機場') return 15;
            if (item.type === '住宿區域') return 20; 
            
            let win = item.timeWindow || [9.5, 21.5];

            // 晚上才去的行程排後面
            const isNight = ['夜生活', '商圈'].includes(item.type) && win[0] >= 16;
            if (isNight) return 90; 
            
            // 跳島行程通常佔用一整天白天
            if (item.region === 20 && item.stay >= 5) return 25;

            // 一般白天景點
            if (win[1] <= 18) return 30; 
            
            return 50; 
        };

        const sorted = idsToSchedule
          .map(id => ATTRACTIONS.find(a => a.id === id))
          .filter(a => a)
          .sort((a, b) => {
            const getSortKey = (item) => {
              let sk = getPriority(item);
              // 強制將同區域的資料分群
              let cityGroup = CITIES.findIndex(c => c.id === item.city);
              return cityGroup * 100000 + sk * 1000; 
            };
            return getSortKey(a) - getSortKey(b);
          });

        let remaining = [...sorted];
        let days = [];
        
        // ★ 第一天從 13:00 開始 (假設過午抵達或放完行李)
        let curDay = { items: [], dayCity: 'magong', dayType: null, currentTime: 13.0 }; 
        let lCity = 'magong', lReg = 11;
        let prevItemObj = null; 

        // 交通時間計算 (針對澎湖)
        const getTTime = (isNewDay, fCity, tCity, fReg, tReg) => {
            // 跳島來回時間
            if (fReg === 20 && tReg !== 20) return 1.5; 
            if (tReg === 20 && fReg !== 20) return 1.5;
            
            if (isNewDay) return 0.5; 

            // 跨區域移動
            if (fCity && tCity && fCity !== tCity) {
                return 0.7; // 澎湖跨區車程稍遠
            }
            // 同區域移動
            return 0.3; 
        };

        const checkValid = (a, isF, curTime) => {
            let tTime = getTTime(isF, lCity, a.city, lReg, a.region);
            let arrivalTime = curTime + tTime;
            let isLastDay = days.length === tripDuration - 1;
            
            if (!isF) {
                let isBasic = ['住宿區域', '機場', '起點'].includes(a.type);
                if (!isBasic) {
                    // 同區域景點排同一天：強制鎖定同區域
                    if (a.city !== lCity) {
                        // 如果還有同區域景點尚未安排，不允許換區
                        let hasSameCityLeft = remaining.some(r => r.city === lCity && !['住宿區域', '機場', '起點'].includes(r.type));
                        if (hasSameCityLeft) return false; 
                        
                        // 如果時間已經過中午後，寧願換天也不要跨區奔波 (除非是去夜市)
                        if (curTime > 15 && a.type !== '商圈' && a.type !== '夜生活') return false;
                    }
                }
            }

            let win = a.timeWindow || [8, 22]; 
            if (['住宿區域', '機場'].includes(a.type)) win = [0, 24];

            let waitTime = 0;
            if (arrivalTime < win[0]) {
                waitTime = win[0] - arrivalTime;
                if (waitTime > 2.0 && !isF) return false; // 等太久跳過
            }

            let actStart = arrivalTime + waitTime;
            let actEnd = actStart + a.stay;

            // 抵達時已過營業時間
            if (actStart >= win[1] - 0.5) return false; 
            
            // 跳島行程不能排在抵達的下午
            if (a.region === 20 && a.stay >= 5 && actStart > 10) return false;

            // 最後一天的時間鎖死 (接 14:00 去機場)
            if (isLastDay) {
                let retTFromA = getTTime(false, a.city, 'magong', a.region, 10);
                let maxEndTime = 14.0 - 2.5 - retTFromA; 
                if (actEnd > maxEndTime) return false;
            } else {
                if (!isF && actEnd > 24.0) return false; 
            }

            return { valid: true, tTime, waitTime, actStart, actEnd };
        };

        while (remaining.length > 0) {
            const isF = curDay.items.length === 0;
            let chosenIdx = -1;
            let chosenStats = null;

            // 尋找最適合的行程
            let validCands = [];
            for (let i = 0; i < remaining.length; i++) {
                let stats = checkValid(remaining[i], isF, curDay.currentTime);
                if (stats && stats.valid) {
                    validCands.push({ a: remaining[i], idx: i, prio: getPriority(remaining[i]), stats });
                }
            }

            if (validCands.length > 0) {
                // 排序: 1.同區優先 2.優先權 3.車程 4.營業結束時間早的先去 5.原始區域分群順序
                validCands.sort((ca, cb) => {
                    let isSameCityA = ca.a.city === lCity ? 1 : 0;
                    let isSameCityB = cb.a.city === lCity ? 1 : 0;
                    if (isSameCityA !== isSameCityB) return isSameCityB - isSameCityA;

                    if (ca.prio !== cb.prio) return ca.prio - cb.prio;
                    if (ca.stats.tTime !== cb.stats.tTime) return ca.stats.tTime - cb.stats.tTime;
                    let winA = ca.a.timeWindow || [8, 22];
                    let winB = cb.a.timeWindow || [8, 22];
                    if (winA[1] !== winB[1]) return winA[1] - winB[1];
                    
                    return ca.idx - cb.idx;
                });
                chosenIdx = validCands[0].idx;
                chosenStats = validCands[0].stats;
            }

            // 本日塞不下了，強制換天
            if (chosenIdx === -1) {
                days.push(curDay);
                if (days.length >= tripDuration) break; // 天數已滿
                
                curDay = { items: [], dayCity: remaining[0].city, dayType: null, currentTime: 9.0 };
                continue;
            }

            const a = remaining.splice(chosenIdx, 1)[0];
            const { tTime, waitTime, actStart, actEnd } = chosenStats;

            if (isF && days.length === 0) prevItemObj = { id: 'origin', city: 'magong', name: '機場/抵達點', type: '起點' };
            if (isF && days.length > 0) prevItemObj = { id: 'acc_hotel', city: a.city, name: `住宿地 (${CITIES.find(c=>c.id===a.city)?.name || '馬公'})`, type: '住宿區域' }; 

            let sTime = curDay.currentTime;
            let aTime = sTime + tTime;
            let finalWaitTime = actStart - aTime; 

            let transitMsg = getSmartTransit(prevItemObj, a);
            if(a.transport) transitMsg += `\n📍 路線指南：${a.transport}`;
            
            let win = a.timeWindow || [8, 22];
            if (finalWaitTime > 0 && win[0] > 0 && !['住宿區域', '機場'].includes(a.type)) {
                transitMsg += `\n💡 建議：此景點建議 ${win[0]}:00 後開始，預計 ${formatTime(aTime)} 抵達，可於周邊稍作休息。`;
            }

            let isFirstAirport = (days.length === 0 && isF && a.type === '機場');

            curDay.items.push({
                ...a, tTime: tTime.toFixed(1), prevName: prevItemObj.name, transitTransport: transitMsg,
                tStr: `${formatTime(sTime)} - ${formatTime(aTime)}`,
                sStr: isFirstAirport ? '抵達通關' : `${formatTime(actStart)} - ${formatTime(actEnd)}`,
                isFirstAirport,
                endTime: actEnd
            });

            curDay.currentTime = actEnd;
            lCity = a.city; lReg = a.region; prevItemObj = a;
            if (isF) curDay.dayCity = a.city;
        }
        
        if (curDay.items.length > 0 && days.length < tripDuration) {
            days.push(curDay);
        }
        while (days.length < tripDuration) {
            days.push({ items: [], dayCity: lCity, dayType: null, currentTime: 9.0 });
        }

        // ================= ★ 壓軸機場 (強制定死在最後一天 14:00) =================
        let lastD = days[days.length-1];
        if (!lastD) {
            lastD = { items: [], dayCity: 'magong', dayType: null, currentTime: 9.0 };
            days.push(lastD);
        }
        
        let retT = getTTime(lastD.items.length === 0, lCity, 'magong', lReg, 10);

        // 如果最後一天加上前往機場的時間超過了 14:00，把超過限制的行程吐掉
        while (lastD.items.length > 0) {
            let lastItem = lastD.items[lastD.items.length-1];
            let testRetT = getTTime(false, lastItem.city, 'magong', lastItem.region, 10);
            if (lastItem.endTime > (14.0 - 2.5 - testRetT)) {
                lastD.items.pop();
            } else {
                break;
            }
        }

        if (lastD.items.length > 0) {
            let lastItem = lastD.items[lastD.items.length-1];
            lastD.currentTime = lastItem.endTime;
            lCity = lastItem.city;
            lReg = lastItem.region;
            prevItemObj = lastItem;
        } else {
            lastD.currentTime = 9.0;
            lReg = 11;
            prevItemObj = { name: '住宿地', city: lCity };
        }
        
        retT = getTTime(lastD.items.length === 0, lCity, 'magong', lReg, 10);
        let startTransit = 14.0 - 2.5 - retT;
        let transitMsg = '🚐 歸還租賃車輛，搭乘計程車或民宿專車前往澎湖機場 (MZG) / 馬公港 報到。';
        
        if (lastD.currentTime < startTransit) {
            transitMsg = `💡 距離前往機場還有空檔時間，建議於 ${formatTime(startTransit)} 準備出發。\n🚐 搭乘車輛前往機場/碼頭。`;
        }
        
        let retPrev = prevItemObj || {name: '住宿地', city: 'magong'};
        lastD.items.push({
            id: 'ret', city: 'magong', name: '結束旅程前往機場/碼頭', stay: 2.5, region: 999, regionName: '機場/碼頭', type: '機場',
            desc: '帶著滿滿的菊島回憶準備返家！提早前往機場或碼頭報到、購買最後的伴手禮。', transport: '於最後行程地點搭車或騎車前往機場/碼頭。',
            tTime: retT.toFixed(1), prevName: retPrev.name, transitTransport: transitMsg,
            tStr: `${formatTime(startTransit)} - ${formatTime(14.0 - 2.5)}`,
            sStr: `${formatTime(14.0 - 2.5)} - 14:00`,
            isFirstAirport: false,
            endTime: 14.0
        });
        
        lastD.currentTime = 14.0;

        return days.map((d, i) => {
          const base = (i === 0 && d.items[0]?.isFirstAirport ? 13.0 : (i === 0 ? 13.0 : 9.0));
          const end = d.currentTime;
          return { dayNum: i+1, totalH: (end - base > 0 ? (end - base).toFixed(1) : "0.0"), cityName: CITIES.find(c => c.id === d.dayCity)?.name || '馬公', items: d.items };
        });
      }, [selectedIds, tripDuration]);

      // 版權宣告元件
      const CopyrightFooter = () => (
        <footer className="bg-slate-800 text-slate-300 py-8 md:py-10 mt-auto border-t-4 border-teal-600 w-full print-hidden">
            <div className="container mx-auto px-4 text-center flex flex-col gap-2 text-xs md:text-sm lg:text-base leading-relaxed">
                <p className="font-bold text-white mb-1">Copyright &copy; 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
                <p>版權所有，未經授權禁止轉載、翻印或任何商業用途。</p>
                <p>本站包含之圖片、文字內容及程式碼均受法律保護。</p>
            </div>
        </footer>
      );

      if (showPrintView) {
        return (
          <div className="min-h-screen bg-white flex flex-col">
            <div className="flex-grow p-4 sm:p-8">
              <div className="max-w-3xl mx-auto border-2 border-slate-800 p-4 sm:p-8 rounded-2xl">
                <div className="text-center mb-10"><h1 className="text-2xl sm:text-3xl font-bold">🌴 專屬澎湖度假 行程表</h1><p className="mt-2 text-slate-500 text-sm">智慧排程系統自動為您計算海島交通與建議時段</p></div>
                {itineraryDays.map(d => (
                  <div key={d.dayNum} className="mb-10 print-break-avoid">
                    <h2 className="text-xl font-bold border-b-2 pb-2 mb-6">🌞 第 {d.dayNum} 天 - 【{d.cityName} 區域】 ({d.totalH}h)</h2>
                    <div className="space-y-6 ml-2 sm:ml-4 border-l-2 pl-4 sm:pl-6 border-slate-300">
                      {d.items.map((it, idx) => (
                        <div key={`${it.id}-${idx}`} className="relative mb-8">
                          {!it.isFirstAirport && (
                            <div className="mb-4 bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs sm:text-sm">
                               <div className="font-bold mb-2">{it.prevName} ➔ {it.name}</div>
                               <div className="flex gap-3 mb-2"><span className="bg-white px-2 py-1 rounded border font-mono text-teal-500"><i className="fa-regular fa-clock"></i> {it.tStr}</span><span>車程/船程估計：{it.tTime}h</span></div>
                               <div className="whitespace-pre-wrap text-slate-600">{it.transitTransport}</div>
                            </div>
                          )}
                          <div className="relative">
                            <div className="absolute -left-[23px] sm:-left-[31px] top-1 w-3 h-3 bg-teal-500 rounded-full border-2 border-white"></div>
                            <div className="font-bold text-xs sm:text-sm text-slate-500 mb-1"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : '停留：'}{it.sStr}</div>
                            <h4 className="text-lg sm:text-xl font-bold text-slate-900">{it.name}</h4>
                            <p className="text-xs sm:text-sm text-slate-600 my-2 leading-relaxed">{it.desc}</p>
                            {it.bookingLinks && <div className="mt-3 flex gap-2 flex-wrap print:hidden">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" rel="noopener noreferrer" className="bg-[#ff5b00] text-white text-xs px-2.5 py-1.5 rounded font-bold hover:bg-[#e05000]"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
                <div className="mt-10 text-center flex flex-col sm:flex-row justify-center gap-4 print-hidden">
                  <button onClick={() => setShowPrintView(false)} className="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-700">返回編輯</button>
                  <button onClick={() => window.print()} className="bg-teal-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-teal-500">列印行程 / 儲存 PDF</button>
                </div>
              </div>
            </div>
            <CopyrightFooter />
          </div>
        );
      }

      const grouped = ATTRACTIONS.filter(a => a.city === activeCity && !a.id.startsWith('acc_')).reduce((acc, c) => { (acc[c.type] = acc[c.type] || []).push(c); return acc; }, {});

      return (
        <div className="min-h-screen bg-slate-50 flex flex-col">
          <header className="bg-white p-4 shadow-sm flex flex-wrap justify-between items-center sticky top-0 z-20 border-b gap-3">
            <div className="flex items-center gap-4">
              <h1 className="font-bold text-xl flex items-center gap-2"><i className="fa-solid fa-umbrella-beach text-teal-500"></i>澎湖行程魔法師</h1>
              {/* RWD 調整：回到首頁在手機版也顯示，連結更新 */}
              <a 
                href="https://kokko-travel.com/zh/penghu/" 
                className="flex items-center gap-1.5 text-xs md:text-sm font-bold text-slate-500 hover:text-teal-600 bg-slate-100 hover:bg-teal-50 px-3 py-1.5 md:py-2 rounded-full transition-colors border border-slate-200"
              >
                <i className="fa-solid fa-house"></i> 回到首頁
              </a>
            </div>
            <div className="flex items-center gap-3">
              {selectedIds.length > 0 && (
                <button 
                  onClick={() => setSelectedIds([])} 
                  className="text-xs md:text-sm font-bold text-red-500 hover:text-white border border-red-500 hover:bg-red-500 px-3 md:px-4 py-1.5 md:py-2 rounded-full shadow-sm transition-colors flex items-center gap-1.5 cursor-pointer"
                  title="清空所有已選景點"
                >
                  <i className="fa-solid fa-trash-can"></i> 清空
                </button>
              )}
              <div className="text-xs md:text-sm font-bold bg-slate-800 text-white px-3 md:px-4 py-1.5 md:py-2 rounded-full shadow-sm">已選 {selectedIds.length} 站</div>
            </div>
          </header>
          
          <main className="flex-grow w-full max-w-7xl mx-auto p-4 flex flex-col lg:flex-row gap-6 mt-2 mb-8">
            
            {/* 左側：景點選擇 */}
            <div className="lg:w-1/2 flex flex-col gap-4">
              <div className="bg-white p-2 rounded-xl flex gap-2 overflow-x-auto shadow-sm custom-scrollbar">
                {CITIES.map(c => <button key={c.id} onClick={() => setActiveCity(c.id)} className={`px-4 md:px-5 py-2 md:py-2.5 rounded-lg text-sm md:text-base font-bold whitespace-nowrap transition-all duration-200 ${activeCity === c.id ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 hover:bg-slate-200 text-slate-600'}`}>{c.name}</button>)}
              </div>
              
              <div className="bg-white rounded-xl shadow-sm p-4 border border-slate-200">
                <h2 className="text-sm font-bold flex items-center gap-2 mb-1.5">
                  <i className="fa-solid fa-circle-info text-teal-500"></i>
                  智慧排程提示
                </h2>
                <p className="text-xs md:text-sm text-slate-500 leading-relaxed">
                  系統會自動將<strong className="text-orange-500 mx-0.5">需搭船的跳島行程</strong>排在白天，並將<strong className="text-indigo-500 mx-0.5">夜釣小管/免稅店/市區老街</strong>妥善分配。<br/>跨區域（如北環、南環）會自動為您計算合理的騎車/開車時間！
                </p>
              </div>

              <div className="max-h-[65vh] overflow-y-auto space-y-6 pr-2 custom-scrollbar">
                {Object.entries(grouped).map(([type, items]) => (
                  <div key={type} className="mb-6">
                    <h3 className="font-bold text-slate-700 text-base md:text-lg mb-3 sticky top-0 bg-slate-50/90 py-2 backdrop-blur-sm z-10 border-b border-slate-200">{type}</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4">
                      {items.map(it => (
                        <div key={it.id} onClick={() => toggleAttr(it.id)} className={`p-4 rounded-xl cursor-pointer border-2 transition-all duration-200 ${selectedIds.includes(it.id) ? 'bg-teal-50 border-teal-500 scale-[1.02] shadow-md' : 'bg-white border-transparent shadow-sm hover:border-slate-300'}`}>
                          <div className="font-bold text-slate-900 text-sm md:text-base leading-tight mb-2">{it.name}</div>
                          <div className="text-[10px] md:text-xs flex flex-wrap gap-2 mb-2">
                            <span className="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600 font-medium"><i className="fa-regular fa-clock mr-1"></i>{it.stay}h</span>
                            <span className={`px-1.5 py-0.5 rounded border font-medium ${getCityColor(it.city)}`}><i className="fa-solid fa-location-dot mr-1"></i>{it.regionName}</span>
                          </div>
                          <p className="text-xs text-slate-500 line-clamp-2 leading-relaxed">{it.desc}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* 右側：自動生成的行程表 */}
            <div className="lg:w-1/2">
              {/* RWD 調整：移除手機版的 sticky，僅在 lg(電腦版) 保持 sticky top-24 */}
              <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col lg:max-h-[85vh] lg:sticky lg:top-24 mt-4 lg:mt-0">
                <div className="bg-slate-800 text-white p-5 lg:p-6 shrink-0">
                  <h2 className="text-xl md:text-2xl font-bold flex items-center gap-2"><i className="fa-regular fa-calendar-check text-teal-400"></i>您的行程表</h2>
                  <p className="text-xs md:text-sm opacity-80 mt-1.5">💡 若行程過多，系統會依營業時間與交通為您自動分天數</p>
                  
                  <div className="flex flex-col sm:flex-row flex-wrap gap-3 mt-5">
                    <div className="flex gap-3 w-full sm:w-auto">
                      <select 
                        value={tripDuration} 
                        onChange={(e) => setTripDuration(Number(e.target.value))}
                        className="flex-1 sm:flex-none bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-3 md:px-4 rounded-xl outline-none cursor-pointer transition-colors shadow-lg border border-slate-600 text-sm md:text-base"
                        title="選擇旅遊總天數"
                      >
                        <option value={3}>3 日遊</option>
                        <option value={4}>4 日遊</option>
                        <option value={5}>5 日遊</option>
                        <option value={6}>6 日遊</option>
                      </select>
                      <button 
                        onClick={() => setSelectedIds([])} 
                        className={`flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-4 py-3 rounded-xl font-bold shadow-lg transition-all cursor-pointer text-sm md:text-base ${selectedIds.length > 0 ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-slate-600 text-slate-400 hover:bg-slate-500 hover:text-white'}`}
                        title="清空並重新輸入行程"
                      >
                        <i className="fa-solid fa-rotate-right"></i>
                        <span>重設</span>
                      </button>
                    </div>
                    <button onClick={() => setShowPrintView(true)} disabled={itineraryDays.length === 0} className="w-full sm:flex-1 bg-teal-500 hover:bg-teal-600 py-3 px-4 rounded-xl font-bold shadow-lg transition-all disabled:opacity-30 disabled:cursor-not-allowed text-white text-sm md:text-base cursor-pointer">
                      產出詳細行程
                    </button>
                  </div>
                </div>
                
                {/* RWD 調整：在手機版放開高度限制，在電腦版維持滾動條 */}
                <div className="p-5 lg:p-6 lg:overflow-y-auto flex-1 custom-scrollbar bg-slate-50/50">
                  {itineraryDays.length === 0 ? <div className="text-center text-slate-400 py-16 lg:py-24 flex flex-col items-center gap-4"><i className="fa-solid fa-plane-departure text-6xl opacity-10"></i><p className="text-sm md:text-base font-medium">尚未選擇任何景點，請從左側點選加入</p></div> : 
                    itineraryDays.map(d => (
                      <div key={d.dayNum} className="mb-10">
                        <h3 className="font-bold text-lg md:text-xl mb-4 border-b-2 border-slate-200 pb-2 flex items-center gap-2 text-slate-800">
                          <i className="fa-solid fa-sun text-orange-500"></i> 第 {d.dayNum} 天 - 【{d.cityName}】 
                          <span className="text-xs md:text-sm font-normal text-slate-500 ml-auto bg-slate-100 px-2 py-1 rounded-md">總計: {d.totalH}h</span>
                        </h3>
                        <div className="space-y-5 border-l-[3px] border-slate-200 ml-4 pl-6 md:pl-7 relative pb-4">
                          {d.items.map((it, idx) => (
                            <div key={`${it.id}-${idx}`} className="relative mb-6">
                              {!it.isFirstAirport && (
                                <div className="mb-4 relative">
                                  <div className="absolute -left-[36px] md:-left-[40px] top-1/2 -translate-y-1/2 w-4 h-4 bg-slate-100 rounded-full border-2 border-slate-300 flex items-center justify-center shadow-sm z-10"><i className="fa-solid fa-arrow-down text-[8px] text-slate-400"></i></div>
                                  <div className={`rounded-xl p-3.5 text-xs md:text-sm border shadow-sm ${it.transitTransport.includes('跨區') || it.transitTransport.includes('出海') ? 'bg-orange-50/70 border-orange-100' : 'bg-teal-50/70 border-teal-100'}`}>
                                    <div className={`font-bold mb-2 ${it.transitTransport.includes('跨區') || it.transitTransport.includes('出海') ? 'text-orange-800' : 'text-teal-800'}`}>{it.prevName} ➔ {it.name}</div>
                                    <div className="flex items-center flex-wrap gap-2 mb-2">
                                      <span className={`bg-white px-2 py-0.5 rounded border font-mono shadow-sm ${it.transitTransport.includes('跨區') || it.transitTransport.includes('出海') ? 'border-orange-200 text-orange-600' : 'border-teal-200 text-teal-600'}`}>
                                        <i className="fa-regular fa-clock mr-1"></i> {it.tStr}
                                      </span>
                                      <span className={`font-medium ${it.transitTransport.includes('跨區') || it.transitTransport.includes('出海') ? 'text-orange-600' : 'text-teal-600'}`}>車/船程 {it.tTime}h</span>
                                    </div>
                                    <div className="text-slate-600 whitespace-pre-wrap leading-relaxed">{it.transitTransport}</div>
                                  </div>
                                </div>
                              )}
                              <div className="bg-white p-4 md:p-5 rounded-xl border border-slate-200 shadow-sm relative hover:shadow-md transition-shadow">
                                <div className="absolute -left-[33px] md:-left-[37px] top-4 md:top-5 w-4.5 h-4.5 bg-teal-500 rounded-full border-[3px] border-white shadow-sm z-10"></div>
                                <div className="text-xs md:text-sm font-bold text-slate-400 mb-1.5"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : '停留: '}{it.sStr}</div>
                                <h4 className="font-bold text-base md:text-lg mb-1.5 text-slate-800">{it.name}</h4>
                                <p className="text-xs md:text-sm text-slate-500 leading-relaxed mb-3">{it.desc}</p>
                                {it.bookingLinks && <div className="flex gap-2 flex-wrap">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" rel="noopener noreferrer" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-[10px] md:text-xs px-3 py-1.5 rounded-lg font-bold transition-colors shadow-sm focus:ring-2 focus:ring-[#ff5b00] focus:ring-offset-1"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))
                  }
                </div>
              </div>
            </div>
          </main>
          
          <CopyrightFooter />
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
