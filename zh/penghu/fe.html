      beaches: {
        bg: 'bg-sky-50', selection: 'selection:bg-sky-300', textMain: 'text-sky-500',
        borderMain: 'border-sky-100', tabActive: 'bg-sky-500 text-white shadow-md transform scale-105',
        tabHover: 'bg-white text-gray-600 hover:bg-sky-100 hover:text-sky-600', iconH2: 'text-sky-600', borderH2: 'border-sky-200',
        cardGradient: 'from-sky-300 via-sky-400 to-sky-300 group-hover:from-sky-400 group-hover:to-sky-500',
        numberBg: 'bg-sky-100 text-sky-600', transportBg: 'bg-sky-50',
        btnActive: 'bg-white text-sky-500 shadow-md transform scale-105 ring-2 ring-sky-200',
        btnInactive: 'text-gray-500 hover:text-sky-500 hover:bg-white/70',
        transportIconColor: 'text-sky-500'
      },
      attractions: {
        bg: 'bg-emerald-50', selection: 'selection:bg-emerald-300', textMain: 'text-emerald-500',
        borderMain: 'border-emerald-100', tabActive: 'bg-emerald-500 text-white shadow-md transform scale-105',
        tabHover: 'bg-white text-gray-600 hover:bg-emerald-100 hover:text-emerald-600', iconH2: 'text-emerald-600', borderH2: 'border-emerald-200',
        cardGradient: 'from-emerald-300 via-emerald-400 to-emerald-300 group-hover:from-emerald-400 group-hover:to-emerald-500',
        numberBg: 'bg-emerald-100 text-emerald-600', transportBg: 'bg-emerald-50',
        btnActive: 'bg-white text-emerald-500 shadow-md transform scale-105 ring-2 ring-emerald-200',
        btnInactive: 'text-gray-500 hover:text-emerald-500 hover:bg-white/70',
        transportIconColor: 'text-emerald-500'
      }
    };

    function updateTheme() {
      const t = themeConfig[activeCategory];
      
      // Body & Header
      document.getElementById('app-body').className = `min-h-screen font-sans pb-12 transition-colors duration-500 text-gray-800 ${t.bg} ${t.selection} selection:text-white`;
      document.getElementById('app-header').className = `bg-white/80 backdrop-blur-md sticky top-0 z-10 shadow-sm border-b transition-colors duration-500 ${t.borderMain}`;
      
      // Icons & Text
      const iconSvg = activeCategory === 'beaches' ? svgSun : svgMap;
      document.getElementById('title-icon-left').innerHTML = iconSvg;
      document.getElementById('title-icon-right').innerHTML = iconSvg;
      document.getElementById('title-icon-left').className = `animate-pulse ${t.textMain}`;
      document.getElementById('title-icon-right').className = `animate-pulse ${t.textMain}`;
      
      document.getElementById('category-text').innerText = activeCategory === 'beaches' ? '陽光海灘' : '特色景點';

      // Section Title
      document.getElementById('section-title-container').className = `mb-6 sm:mb-8 flex items-center space-x-3 transition-colors duration-500 ${t.iconH2}`;
      document.getElementById('section-title').className = `text-2xl sm:text-3xl font-bold border-b-[3px] pb-1.5 pr-6 inline-block transition-colors duration-500 ${t.borderH2}`;

      // Toggle Buttons
      document.getElementById('btn-beach').className = `flex items-center px-4 sm:px-6 py-2.5 rounded-full text-sm sm:text-base font-bold transition-all duration-300 focus:outline-none ${activeCategory === 'beaches' ? t.btnActive : t.btnInactive}`;
      document.getElementById('btn-attraction').className = `flex items-center px-4 sm:px-6 py-2.5 rounded-full text-sm sm:text-base font-bold transition-all duration-300 focus:outline-none ${activeCategory === 'attractions' ? t.btnActive : t.btnInactive}`;
    }

    function renderTabs() {
      const t = themeConfig[activeCategory];
      const data = activeCategory === 'beaches' ? beachesData : attractionsData;
      const cities = Object.keys(data);
      const container = document.getElementById('tabs-container');
      
      // Ensure the active tab exists in the new category
      if (!cities.includes(activeTab)) {
        activeTab = cities[0];
      }

      container.innerHTML = cities.map(city => `
        <button
          onclick="setTab('${city}')"
          class="flex-shrink-0 px-5 sm:px-6 py-2.5 sm:py-3 rounded-full text-sm sm:text-base font-medium transition-all duration-300 ease-in-out focus:outline-none ${activeTab === city ? t.tabActive : t.tabHover}"
          aria-pressed="${activeTab === city}"
        >
          ${city}
        </button>
      `).join('');
    }

    function renderCards() {
      const t = themeConfig[activeCategory];
      const data = activeCategory === 'beaches' ? beachesData : attractionsData;
      const spots = data[activeTab];
      
      document.getElementById('section-title').innerText = `${activeTab} 精選景點`;

      const transportIconStyled = svgTransport.replace('text-blue-500', t.transportIconColor);

      const container = document.getElementById('cards-container');
      // 深度 RWD: 卡片內容的內距 (padding) 與字體大小針對行動裝置優化
      container.innerHTML = spots.map((spot, index) => `
        <article class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden border border-gray-100 flex flex-col h-full group hover:-translate-y-1">
          <div class="h-2 w-full bg-gradient-to-r transition-colors duration-500 ${t.cardGradient}"></div>
          <div class="p-5 sm:p-7 flex-grow flex flex-col">
            <h3 class="text-xl sm:text-2xl font-bold text-gray-800 mb-4 sm:mb-5 flex items-start leading-tight">
              <span class="rounded-full w-7 h-7 sm:w-8 sm:h-8 flex items-center justify-center text-sm sm:text-base font-bold mr-3 flex-shrink-0 mt-0.5 transition-colors duration-500 ${t.numberBg}">
                ${index + 1}
              </span>
              ${spot.name}
            </h3>
            
            <div class="mb-6 flex-grow">
              <div class="flex items-center text-gray-700 mb-2">
                ${svgSparkles}
                <span class="font-bold text-base sm:text-lg">景點特色</span>
              </div>
              <p class="text-gray-600 leading-relaxed pl-7 sm:pl-8 text-sm sm:text-base">
                ${spot.feature}
              </p>
            </div>

            <div class="rounded-xl p-4 sm:p-5 mt-auto transition-colors duration-500 border border-transparent group-hover:border-black/5 ${t.transportBg}">
              <div class="flex items-center text-gray-800 mb-2">
                ${transportIconStyled}
                <span class="font-bold text-base sm:text-lg">交通方式</span>
              </div>
              <p class="text-gray-600 text-sm sm:text-base pl-7 sm:pl-8 leading-relaxed">
                ${spot.transport}
              </p>
            </div>
          </div>
        </article>
      `).join('');
    }

    // 事件與更新邏輯
    function setCategory(category) {
      if (activeCategory === category) return;
      activeCategory = category;
      updateTheme();
      renderTabs();
      renderCards();
    }

    function setTab(tab) {
      if (activeTab === tab) return;
      activeTab = tab;
      renderTabs();
      renderCards();
    }

    document.getElementById('btn-beach').addEventListener('click', () => setCategory('beaches'));
    document.getElementById('btn-attraction').addEventListener('click', () => setCategory('attractions'));

    // 初始化
    updateTheme();
    renderTabs();
    renderCards();
  </script>
</body>
</html>
