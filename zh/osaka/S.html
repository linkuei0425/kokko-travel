    // --- 核心交通與排程邏輯區 ---
    const formatTime = (h) => {
      let hh = Math.floor(h) % 24;
      let mm = Math.round((h - Math.floor(h)) * 60);
      if (mm === 60) { hh++; mm = 0; }
      return `${hh.toString().padStart(2, '0')}:${mm.toString().padStart(2, '0')}`;
    };

    const getCityColor = (cityId) => {
      const colors = { osaka: 'blue', kyoto: 'emerald', miyama: 'fuchsia', nara: 'amber', uji: 'teal', kobe: 'indigo', himeji: 'rose' };
      const c = colors[cityId] || 'slate';
      return `text-${c}-600 bg-${c}-100 border-${c}-200`;
    };

    const getSmartTransit = (prev, curr) => {
      if (curr.id === 'ret') return '✈️ 【準備回國】搭乘 JR Haruka 或南海電鐵前往關西國際機場 (KIX) 報到。';

      if (curr.region === 26) return `🚆 【郊區長途移動】前往京都北部的海之京都 (天橋立/伊根)，搭乘特急列車與巴士約需 2~2.5 小時。\n💡 建議：購買關西廣域鐵路周遊券(JR Kansai Wide Area Pass)最划算！`;
      if (curr.id === 'koyasan') return `🚆 【近郊長途移動】搭乘南海電鐵特急前往極樂橋，轉乘纜車上高野山 (約 2 小時)。`;
      if (curr.id === 'kumano') return `🚆 【近郊長途移動】前往熊野古道搭乘 JR 特急黑潮號約需 3.5-4 小時。\n💡 建議：路途遙遠，強烈建議安排兩天一夜並使用 JR Pass。`;

      if (!prev || prev.id.startsWith('acc_') || prev.type === '起點') {
        if (curr.type === '機場') return `🛬 【抵達關西】搭乘南海電鐵、利木津巴士或 JR 前往市區 ${curr.name}。`;
        return `🏨 【出發前往】搭乘大眾運輸前往 ${curr.name}。`;
      }

      if (prev.city !== curr.city && prev.id !== 'osaka_origin') {
         let text = '';
         const route = `${prev.city}-${curr.city}`;
         if (route.includes('miyama')) text = '搭乘 JR 轉乘南丹市營巴士，或租車自駕 (約 1.5~2 小時)。';
         else if (route === 'osaka-kyoto' || route === 'kyoto-osaka') text = '搭乘 JR京都線新快速 或 阪急/京阪本線 (約 30-45 分)。';
         else if (route === 'osaka-nara' || route === 'nara-osaka') text = '搭乘 近鐵奈良線 或 JR大和路線 (約 40-50 分)。';
         else if (route === 'osaka-kobe' || route === 'kobe-osaka') text = '搭乘 JR神戶線新快速 或 阪急/阪神本線 (約 25-35 分)。';
         else if (route === 'osaka-himeji' || route === 'himeji-osaka') text = '搭乘 JR神戶線新快速 或 新幹線 (約 30-65 分)。';
         else if (route === 'kyoto-nara' || route === 'nara-kyoto') text = '搭乘 近鐵京都線 或 JR奈良線 (約 35-45 分)。';
         else text = `搭乘 JR 或 地區私鐵進行跨城移動。`;
         return `🚄 【跨縣市轉乘】${text}\n💡 建議：可善用周遊卡或交通神券。`;
      }

      return `🚇 【市區移動】從 ${prev.name} 轉乘電車或公車前往 ${curr.name}。`;
    };

    // --- 主應用程式 ---
    function App() {
      const [activeCity, setActiveCity] = useState('osaka');
      const [selectedIds, setSelectedIds] = useState([]);
      const [showPrintView, setShowPrintView] = useState(false);
      const [tripDuration, setTripDuration] = useState(5);

      const toggleAttr = (id) => setSelectedIds(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

      const itineraryDays = useMemo(() => {
        if (selectedIds.length === 0) return [];

        let idsToSchedule = [...selectedIds];
        
        // 綁定邏輯：如果選了東大寺或春日大社，自動帶入奈良公園
        if (idsToSchedule.includes('todaiji') || idsToSchedule.includes('kasuga')) {
            if (!idsToSchedule.includes('nara_park')) idsToSchedule.push('nara_park');
        }
        idsToSchedule = [...new Set(idsToSchedule)];

        // 排序權重定義 (確保城市分群與時間合理性)
        const getPriority = (item) => {
            if (item.id === 'ret') return 999;
            if (item.type === '起點') return 10;
            if (item.type === '機場') return 15;
            if (item.type === '住宿區域') return 20; 
            
            let win = item.timeWindow || [9.5, 21.5];

            // 晚上才去的行程排後面 (營業到較晚的商圈或特定夜景)
            const isNight = (['商圈', '溫泉泡湯'].includes(item.type) && win[1] >= 19) || item.id === 'maya' || item.id === 'harukas' || item.id === 'teamlab_botanical';
            if (isNight) return 90; 
            
            // 寺廟、歷史人文、動物園優先排白天 (因為通常 17:00 關門)
            if (win[1] <= 17.5) return 30; 
            
            return 50; 
        };

        const sorted = idsToSchedule
          .map(id => ATTRACTIONS.find(a => a.id === id))
          .filter(a => a)
          .sort((a, b) => {
            const getSortKey = (item) => {
              let sk = getPriority(item);
              // 強制將同城市的資料分群
              let cityGroup = CITIES.findIndex(c => c.id === item.city);
              return cityGroup * 100000 + sk * 1000; 
            };
            return getSortKey(a) - getSortKey(b);
          });

        let remaining = [...sorted];
        let days = [];
        
        // ★ 第一天強制從 12:00 開始 (假設中午抵達關西機場或放完行李)
        let curDay = { items: [], dayCity: 'osaka', dayType: null, currentTime: 12.0 }; 
        let lCity = 'osaka', lReg = 12;
        let prevItemObj = null; 

        // 交通時間計算 (針對關西地區)
        const getTTime = (isNewDay, fCity, tCity, fReg, tReg) => {
            // 針對長途近郊景點的額外交通時間
            let extraFarTime = 0;
            if ((fReg === 17 && tReg !== 17) || (tReg === 17 && fReg !== 17)) extraFarTime += 1.5; // 高野山、熊野古道
            if ((fReg === 26 && tReg !== 26) || (tReg === 26 && fReg !== 26)) extraFarTime += 1.5; // 天橋立、伊根
            
            // 處理天橋立與伊根之間的微轉乘
            if (fReg === 26 && tReg === 26 && fCity === tCity && !isNewDay) return 0.8;

            // 跨城市移動
            if (fCity && tCity && fCity !== tCity) {
                if (fCity === 'miyama' || tCity === 'miyama') return 2.0 + extraFarTime;
                const pair = [fCity, tCity].sort().join('-');
                if (pair === 'himeji-osaka') return 1.5 + extraFarTime;
                if (pair === 'kobe-kyoto') return 1.5 + extraFarTime;
                return 1.0 + extraFarTime; // 一般跨城 (大阪-京都, 大阪-奈良)
            }
            if (isNewDay) return 0.5 + extraFarTime; // 新的一天出發
            return (fReg !== tReg ? 0.8 : 0.3) + extraFarTime; // 同城市跨區 vs 同區域
        };

        const checkValid = (a, isF, curTime) => {
            let tTime = getTTime(isF, lCity, a.city, lReg, a.region);
            let arrivalTime = curTime + tTime;
            let isLastDay = days.length === tripDuration - 1;
            
            if (!isF) {
                let isBasic = ['住宿區域', '機場', '起點'].includes(a.type);
                if (!isBasic) {
                    // 同城市景點排同一天：強制鎖定同城市
                    if (a.city !== lCity) {
                        // 1. 檢查是否還有同城市的景點尚未安排
                        let hasSameCityLeft = remaining.some(r => r.city === lCity && !['住宿區域', '機場', '起點'].includes(r.type));
                        if (hasSameCityLeft) return false; // 如果還有同城市景點，絕對不允許換城市
                        
                        // 2. 如果同城市已排完，但時間已經過中午後，寧願換天也不要跨城奔波
                        if (curTime > 14) return false;
                    }
                }
            }

            let win = a.timeWindow || [9, 21.5]; 
            if (['住宿區域', '機場'].includes(a.type)) win = [0, 24];

            let waitTime = 0;
            if (arrivalTime < win[0]) {
                waitTime = win[0] - arrivalTime;
                if (waitTime > 2.0 && !isF) return false; // 等太久跳過
            }

            let actStart = arrivalTime + waitTime;
            let actEnd = actStart + a.stay;

            // 抵達時已過營業時間 (關西很多寺廟 17:00 關門)
            if (actStart >= win[1] - 0.5) return false; 
            
            // 最後一天的時間鎖死 (接 14:00 去機場)
            if (isLastDay) {
                let retTFromA = getTTime(false, a.city, 'osaka', a.region, 10);
                let maxEndTime = 14.0 - 2.5 - retTFromA; 
                if (actEnd > maxEndTime) return false;
            } else {
                if (!isF && actEnd > 22.0) return false; // 每天不超過晚上 10 點
            }

            return { valid: true, tTime, waitTime, actStart, actEnd };
        };

        while (remaining.length > 0) {
            const isF = curDay.items.length === 0;
            let chosenIdx = -1;
            let chosenStats = null;

            // 尋找最適合的行程
            let validCands = [];
            for (let i = 0; i < remaining.length; i++) {
                let stats = checkValid(remaining[i], isF, curDay.currentTime);
                if (stats && stats.valid) {
                    validCands.push({ a: remaining[i], idx: i, prio: getPriority(remaining[i]), stats });
                }
            }

            if (validCands.length > 0) {
                // 排序: 1.同城市優先 2.優先權 3.車程 4.營業結束時間早的先去 5.原始城市分群順序
                validCands.sort((ca, cb) => {
                    let isSameCityA = ca.a.city === lCity ? 1 : 0;
                    let isSameCityB = cb.a.city === lCity ? 1 : 0;
                    if (isSameCityA !== isSameCityB) return isSameCityB - isSameCityA;

                    if (ca.prio !== cb.prio) return ca.prio - cb.prio;
                    if (ca.stats.tTime !== cb.stats.tTime) return ca.stats.tTime - cb.stats.tTime;
                    let winA = ca.a.timeWindow || [9, 21.5];
                    let winB = cb.a.timeWindow || [9, 21.5];
                    if (winA[1] !== winB[1]) return winA[1] - winB[1];
                    
                    return ca.idx - cb.idx; // 保留原始的城市分群排序，避免跨天時城市亂跳
                });
                chosenIdx = validCands[0].idx;
                chosenStats = validCands[0].stats;
            }

            // 本日塞不下了，強制換天
            if (chosenIdx === -1) {
                days.push(curDay);
                if (days.length >= tripDuration) break; // 天數已滿
                
                curDay = { items: [], dayCity: remaining[0].city, dayType: null, currentTime: 9.0 };
                continue;
            }

            const a = remaining.splice(chosenIdx, 1)[0];
            const { tTime, waitTime, actStart, actEnd } = chosenStats;

            if (isF && days.length === 0) prevItemObj = { id: 'osaka_origin', city: 'osaka', name: '機場/抵達點', type: '起點' };
            if (isF && days.length > 0) prevItemObj = { id: 'acc_osaka', city: a.city, name: `住宿地 (${CITIES.find(c=>c.id===a.city)?.name || '大阪'})`, type: '住宿區域' }; 

            let sTime = curDay.currentTime;
            let aTime = sTime + tTime;
            let finalWaitTime = actStart - aTime; 

            let transitMsg = getSmartTransit(prevItemObj, a);
            transitMsg += `\n📍 路線指南：${a.transport}`;
            
            let win = a.timeWindow || [9, 21.5];
            if (finalWaitTime > 0 && win[0] > 0 && !['住宿區域', '機場'].includes(a.type)) {
                transitMsg += `\n💡 建議：此景點建議 ${win[0]}:00 後開始，預計 ${formatTime(aTime)} 抵達，可於周邊稍作休息。`;
            }

            let isFirstAirport = (days.length === 0 && isF && a.type === '機場');

            curDay.items.push({
                ...a, tTime: tTime, prevName: prevItemObj.name, transitTransport: transitMsg,
                tStr: `${formatTime(sTime)} - ${formatTime(aTime)}`,
                sStr: isFirstAirport ? '抵達通關' : `${formatTime(actStart)} - ${formatTime(actEnd)}`,
                isFirstAirport,
                endTime: actEnd
            });

            curDay.currentTime = actEnd;
            lCity = a.city; lReg = a.region; prevItemObj = a;
            if (isF) curDay.dayCity = a.city;
        }
        
        if (curDay.items.length > 0 && days.length < tripDuration) {
            days.push(curDay);
        }
        while (days.length < tripDuration) {
            days.push({ items: [], dayCity: lCity, dayType: null, currentTime: 9.0 });
        }

        // ================= ★ 壓軸機場 (強制定死在最後一天 14:00) =================
        let lastD = days[days.length-1];
        if (!lastD) {
            lastD = { items: [], dayCity: 'osaka', dayType: null, currentTime: 9.0 };
            days.push(lastD);
        }
        
        let retT = getTTime(lastD.items.length === 0, lCity, 'osaka', lReg, 10);

        // 如果最後一天加上前往機場的時間超過了 14:00，把超過限制的行程吐掉
        while (lastD.items.length > 0) {
            let lastItem = lastD.items[lastD.items.length-1];
            let testRetT = getTTime(false, lastItem.city, 'osaka', lastItem.region, 10);
            if (lastItem.endTime > (14.0 - 2.5 - testRetT)) {
                lastD.items.pop();
            } else {
                break;
            }
        }

        if (lastD.items.length > 0) {
            let lastItem = lastD.items[lastD.items.length-1];
            lastD.currentTime = lastItem.endTime;
            lCity = lastItem.city;
            lReg = lastItem.region;
            prevItemObj = lastItem;
        } else {
            lastD.currentTime = 9.0;
            lReg = 12;
            prevItemObj = { name: '住宿地', city: lCity };
        }
        
        retT = getTTime(lastD.items.length === 0, lCity, 'osaka', lReg, 10);
        let startTransit = 14.0 - 2.5 - retT;
        let transitMsg = '🚐 搭乘 JR Haruka、南海電鐵 或 利木津巴士 前往關西機場 (KIX) 報到。';
        
        if (lastD.currentTime < startTransit) {
            transitMsg = `💡 距離前往機場還有空檔時間，建議於 ${formatTime(startTransit)} 準備出發。\n🚐 搭乘大眾運輸前往機場。`;
        }
        
        let retPrev = prevItemObj || {name: '住宿地', city: 'osaka'};
        lastD.items.push({
            id: 'ret', city: 'osaka', name: '結束旅程前往機場回國', stay: 2.5, region: 999, regionName: '機場', type: '機場',
            desc: '祝您有趟完美的關西回憶！請務必提早報到，還能在機場免稅店做最後採購。', transport: '於最後行程地點搭乘電車直達或轉乘至關西機場。',
            tTime: retT, prevName: retPrev.name, transitTransport: transitMsg,
            tStr: `${formatTime(startTransit)} - ${formatTime(14.0 - 2.5)}`,
            sStr: `${formatTime(14.0 - 2.5)} - 14:00`,
            isFirstAirport: false,
            endTime: 14.0
        });
        
        lastD.currentTime = 14.0;

        return days.map((d, i) => {
          const base = (i === 0 && d.items[0]?.isFirstAirport ? 12.0 : (i === 0 ? 12.0 : 9.0));
          const end = d.currentTime;
          return { dayNum: i+1, totalH: (end - base > 0 ? (end - base).toFixed(1) : "0.0"), cityName: CITIES.find(c => c.id === d.dayCity)?.name || '大阪', items: d.items };
        });
      }, [selectedIds, tripDuration]);

      if (showPrintView) {
        return (
          <div className="min-h-screen bg-white p-4 sm:p-8">
            <div className="max-w-3xl mx-auto border-2 border-slate-800 p-4 sm:p-8 rounded-2xl">
              <div className="text-center mb-10"><h1 className="text-2xl sm:text-3xl font-bold">⛩️ 專屬關西自由行 行程表</h1><p className="mt-2 text-slate-500 text-sm">智慧排程系統自動為您計算跨區交通與寺廟營業時間</p></div>
              {itineraryDays.map(d => (
                <div key={d.dayNum} className="mb-10 print-break-avoid">
                  <h2 className="text-xl font-bold border-b-2 pb-2 mb-6">🌞 第 {d.dayNum} 天 - 【{d.cityName} 區域】 ({d.totalH}h)</h2>
                  <div className="space-y-6 ml-2 sm:ml-4 border-l-2 pl-4 sm:pl-6 border-slate-300">
                    {d.items.map((it, idx) => (
                      <div key={`${it.id}-${idx}`} className="relative mb-8">
                        {!it.isFirstAirport && (
                          <div className="mb-4 bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs sm:text-sm">
                             <div className="font-bold mb-2">{it.prevName} ➔ {it.name}</div>
                             <div className="flex gap-3 mb-2"><span className="bg-white px-2 py-1 rounded border font-mono text-blue-500"><i className="fa-regular fa-clock"></i> {it.tStr}</span><span>車程估計：{it.tTime}h</span></div>
                             <div className="whitespace-pre-wrap text-slate-600">{it.transitTransport}</div>
                          </div>
                        )}
                        <div className="relative">
                          <div className="absolute -left-[23px] sm:-left-[31px] top-1 w-3 h-3 bg-blue-500 rounded-full border-2 border-white"></div>
                          <div className="font-bold text-xs sm:text-sm text-slate-500 mb-1"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : '停留：'}{it.sStr}</div>
                          <h4 className="text-lg sm:text-xl font-bold text-slate-900">{it.name}</h4>
                          <p className="text-xs sm:text-sm text-slate-600 my-2 leading-relaxed">{it.desc}</p>
                          {it.bookingLinks && <div className="mt-3 flex gap-2 flex-wrap print:hidden">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" className="bg-[#ff5b00] text-white text-xs px-2.5 py-1.5 rounded font-bold hover:bg-[#e05000]"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              <div className="mt-10 text-center flex flex-col sm:flex-row justify-center gap-4 print-hidden">
                <button onClick={() => setShowPrintView(false)} className="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-700 transition-colors">返回編輯</button>
                <button onClick={() => window.print()} className="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-500 transition-colors">列印行程 / 儲存 PDF</button>
              </div>
            </div>
          </div>
        );
      }

      const grouped = ATTRACTIONS.filter(a => a.city === activeCity && !a.id.startsWith('acc_')).reduce((acc, c) => { (acc[c.type] = acc[c.type] || []).push(c); return acc; }, {});

      return (
        <div className="min-h-screen bg-slate-50 pb-10 flex flex-col flex-grow">
          <header className="bg-white p-4 shadow-sm flex flex-wrap justify-between items-center sticky top-0 z-30 border-b gap-3">
            <div className="flex items-center gap-3 sm:gap-4">
              <h1 className="font-bold text-lg sm:text-xl flex items-center gap-2"><i className="fa-solid fa-train-tram text-blue-600"></i>關西行程魔法師</h1>
              {/* 回到首頁連結優化：支援所有裝置顯示 */}
              <a 
                href="https://kokko-travel.com/zh/osaka/" 
                className="flex items-center gap-1.5 text-xs font-bold text-slate-500 hover:text-blue-600 bg-slate-100 hover:bg-blue-50 px-3 py-1.5 rounded-full transition-colors border border-slate-200 shadow-sm"
              >
                <i className="fa-solid fa-house"></i> <span className="hidden sm:inline">回到首頁</span>
              </a>
            </div>
            <div className="flex items-center gap-2 sm:gap-3">
              {selectedIds.length > 0 && (
                <button 
                  onClick={() => setSelectedIds([])} 
                  className="text-xs font-bold text-red-500 hover:text-white border border-red-500 hover:bg-red-500 px-3 py-1.5 rounded-full shadow-sm transition-colors flex items-center gap-1 cursor-pointer"
                  title="清空所有已選景點"
                >
                  <i className="fa-solid fa-trash-can"></i> 清空
                </button>
              )}
              <div className="text-xs font-bold bg-slate-800 text-white px-3 py-1.5 rounded-full shadow-sm">已選 {selectedIds.length} 站</div>
            </div>
          </header>
          
          <main className="max-w-7xl mx-auto p-4 flex flex-col lg:flex-row gap-6 mt-2 flex-grow w-full">
            
            {/* 左側：景點選擇 */}
            <div className="lg:w-1/2 flex flex-col gap-4">
              <div className="bg-white p-2 rounded-xl flex gap-2 overflow-x-auto shadow-sm custom-scrollbar snap-x">
                {CITIES.map(c => <button key={c.id} onClick={() => setActiveCity(c.id)} className={`snap-start px-5 py-2.5 rounded-lg text-sm font-bold whitespace-nowrap transition-all duration-200 ${activeCity === c.id ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 hover:bg-slate-200 text-slate-600'}`}>{c.name}</button>)}
              </div>
              
              <div className="bg-white rounded-xl shadow-sm p-4 border border-slate-200">
                <h2 className="text-sm font-bold flex items-center gap-2 mb-1">
                  <i className="fa-solid fa-circle-info text-blue-500"></i>
                  智慧排程提示
                </h2>
                <p className="text-xs text-slate-500">
                  系統會自動將<strong className="text-orange-500">傍晚關門的寺廟</strong>排在白天，並將<strong className="text-indigo-500">商圈/夜景</strong>排在晚上。<br/>跨城市(如大阪去京都)會自動計算交通時間！
                </p>
              </div>

              <div className="max-h-[55vh] sm:max-h-[60vh] lg:max-h-[75vh] overflow-y-auto space-y-6 pr-2 custom-scrollbar">
                {Object.entries(grouped).map(([type, items]) => (
                  <div key={type} className="mb-6">
                    <h3 className="font-bold text-slate-700 mb-3 sticky top-0 bg-slate-50/90 py-2 backdrop-blur-sm z-10 border-b border-slate-200">{type}</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      {items.map(it => (
                        <div key={it.id} onClick={() => toggleAttr(it.id)} className={`p-4 rounded-xl cursor-pointer border-2 transition-all duration-200 ${selectedIds.includes(it.id) ? 'bg-blue-50 border-blue-500 scale-[1.02] shadow-md' : 'bg-white border-transparent shadow-sm hover:border-slate-300'}`}>
                          <div className="font-bold text-slate-900 leading-tight mb-2">{it.name}</div>
                          <div className="text-[10px] flex gap-2 mb-2">
                            <span className="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600"><i className="fa-regular fa-clock mr-1"></i>{it.stay}h</span>
                            <span className={`px-1.5 py-0.5 rounded border ${getCityColor(it.city)}`}><i className="fa-solid fa-location-dot"></i> {it.regionName}</span>
                          </div>
                          <p className="text-xs text-slate-500 line-clamp-2">{it.desc}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* 右側：自動生成的行程表 */}
            <div className="lg:w-1/2">
              <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col h-full lg:max-h-[85vh] lg:sticky lg:top-24">
                <div className="bg-slate-800 text-white p-5 lg:p-6 z-10 shadow-sm">
                  <h2 className="text-xl font-bold flex items-center gap-2"><i className="fa-regular fa-calendar-check text-blue-400"></i>您的行程表</h2>
                  <p className="text-xs opacity-80 mt-1.5">💡 若行程過多，系統會依營業時間與交通為您自動分天數</p>
                  
                  {/* 行動版友善：調整為 flex-wrap 以免按鈕被擠壓無法點擊 */}
                  <div className="flex flex-wrap sm:flex-nowrap gap-2 mt-4">
                    <select 
                      value={tripDuration} 
                      onChange={(e) => setTripDuration(Number(e.target.value))}
                      className="w-full sm:w-auto bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-4 rounded-xl outline-none cursor-pointer transition-colors shadow-sm border border-slate-600"
                      title="選擇旅遊總天數"
                    >
                      <option value={4}>4 日遊</option>
                      <option value={5}>5 日遊</option>
                      <option value={6}>6 日遊</option>
                      <option value={7}>7 日遊</option>
                      <option value={8}>8 日遊</option>
                    </select>
                    <button 
                      onClick={() => setSelectedIds([])} 
                      className={`flex-1 flex items-center justify-center gap-1.5 px-4 py-3 rounded-xl font-bold shadow-sm transition-all cursor-pointer ${selectedIds.length > 0 ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-slate-600 text-slate-400 hover:bg-slate-500 hover:text-white'}`}
                      title="清空並重新輸入行程"
                    >
                      <i className="fa-solid fa-rotate-right"></i>
                      <span>重設</span>
                    </button>
                    <button onClick={() => setShowPrintView(true)} disabled={itineraryDays.length === 0} className="w-full sm:flex-1 bg-blue-500 hover:bg-blue-600 py-3 px-4 rounded-xl font-bold shadow-sm transition-all disabled:opacity-30 disabled:cursor-not-allowed text-white text-sm sm:text-base cursor-pointer">
                      產出詳細行程
                    </button>
                  </div>
                </div>
                
                <div className="p-4 sm:p-6 overflow-y-auto flex-1 custom-scrollbar bg-slate-50/50 min-h-[300px]">
                  {itineraryDays.length === 0 ? <div className="text-center text-slate-400 py-16 sm:py-24 flex flex-col items-center gap-4"><i className="fa-brands fa-fort-awesome text-5xl sm:text-6xl opacity-10"></i><p>尚未選擇任何景點</p></div> : 
                    itineraryDays.map(d => (
                      <div key={d.dayNum} className="mb-10">
                        <h3 className="font-bold text-base sm:text-lg mb-4 border-b-2 border-slate-200 pb-2 flex items-center gap-2 text-slate-800"><i className="fa-solid fa-sun text-orange-500"></i> 第 {d.dayNum} 天 - 【{d.cityName}】 <span className="text-xs font-normal text-slate-400 ml-auto">總計: {d.totalH}h</span></h3>
                        <div className="space-y-5 border-l-[3px] border-slate-200 ml-3 sm:ml-4 pl-5 sm:pl-7 relative pb-4">
                          {d.items.map((it, idx) => (
                            <div key={`${it.id}-${idx}`} className="relative mb-6">
                              {!it.isFirstAirport && (
                                <div className="mb-4 relative">
                                  <div className="absolute -left-[32px] sm:-left-[40px] top-1/2 -translate-y-1/2 w-4 h-4 bg-slate-100 rounded-full border-2 border-slate-300 flex items-center justify-center shadow-sm z-10"><i className="fa-solid fa-arrow-down text-[8px] text-slate-400"></i></div>
                                  <div className={`rounded-lg p-3 text-[11px] sm:text-xs border shadow-sm ${it.transitTransport.includes('跨縣市') ? 'bg-red-50/70 border-red-100' : 'bg-blue-50/70 border-blue-100'}`}>
                                    <div className={`font-bold mb-1.5 ${it.transitTransport.includes('跨縣市') ? 'text-red-800' : 'text-blue-800'}`}>{it.prevName} ➔ {it.name}</div>
                                    <div className="flex items-center gap-3 mb-1.5">
                                      <span className={`bg-white px-2 py-0.5 rounded border font-mono shadow-sm ${it.transitTransport.includes('跨縣市') ? 'border-red-200 text-red-600' : 'border-blue-200 text-blue-600'}`}>
                                        <i className="fa-regular fa-clock mr-1"></i> {it.tStr}
                                      </span>
                                      <span className={`font-medium ${it.transitTransport.includes('跨縣市') ? 'text-red-600' : 'text-blue-600'}`}>車程 {it.tTime}h</span>
                                    </div>
                                    <div className="text-slate-600 whitespace-pre-wrap leading-relaxed">{it.transitTransport}</div>
                                  </div>
                                </div>
                              )}
                              <div className="bg-white p-3.5 sm:p-4 rounded-xl border border-slate-200 shadow-sm relative hover:shadow-md transition-shadow">
                                <div className="absolute -left-[29px] sm:-left-[37px] top-4 w-4 h-4 sm:w-4.5 sm:h-4.5 bg-blue-500 rounded-full border-[3px] border-white shadow-sm z-10"></div>
                                <div className="text-[11px] sm:text-xs font-bold text-slate-400 mb-1"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : '停留: '}{it.sStr}</div>
                                <h4 className="font-bold text-sm sm:text-base mb-1">{it.name}</h4>
                                <p className="text-[11px] sm:text-xs text-slate-500 leading-relaxed">{it.desc}</p>
                                {it.bookingLinks && <div className="mt-3 flex gap-1.5 flex-wrap">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-[9px] sm:text-[10px] px-2.5 py-1 rounded-lg font-bold transition-colors shadow-sm"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))
                  }
                </div>
              </div>
            </div>
          </main>
          
          {/* Footer: 版權宣告區塊 */}
          <footer className="w-full bg-white border-t border-slate-200 mt-auto py-8 relative z-10 print-hidden">
            <div className="container mx-auto px-4 text-center">
              <div className="text-xs sm:text-sm text-slate-500 space-y-1.5 font-medium leading-relaxed">
                <p className="font-bold text-slate-600 text-sm sm:text-base">Copyright © 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
                <p>版權所有，未經授權禁止轉載、翻印或任何商業用途。</p>
                <p>本站包含之圖片、文字內容及程式碼均受法律保護。</p>
              </div>
            </div>
          </footer>
        </div>
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
