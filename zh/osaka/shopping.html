                        { n: "成城石井 (PIOLE 姬路)", f: "走高級路線的進口超市，可以買到極高品質的果醬、進口起司與精緻零食。", a: "姬路市豆腐町222 (PIOLE內)", t: "JR姬路站直結" },
                        { n: "山陽百貨 地下食品街", f: "最高級的超市體驗，各式老字號和菓子、天婦羅與和牛便當令人垂涎。", a: "姬路市南町1", t: "山陽姬路站直結" },
                        { n: "大國藥妝 百元零食區", f: "雖然是藥妝店，但門口的100日圓零食區超好買，軟糖、果凍與餅乾都是銅板價。", a: "姬路市站前町商圈", t: "JR姬路站步行4分" },
                        { n: "Kaldi Coffee Farm (姬路)", f: "除了販售各種烘焙咖啡豆，店內進口的獨特沾醬、起司與各國異國零食也大受歡迎。", a: "姬路市內商場", t: "JR姬路站周邊" }
                    ]
                },
                '動漫雜貨': {
                    tldr: "【AI 快速提要】姬路的阿宅補給站麻雀雖小五臟俱全！『EDION』提供吹風機與相機等免稅神物；喜愛文具生活小物的，『Tokyu Hands』與『Loft』保證讓您逛到捨不得離開；當然也少不了『安利美特』，讓動漫迷補齊最新周邊。",
                    faqs: [
                        { q: "Tokyu Hands (台隆手創館) 和 Loft 有什麼差別？", a: "雖然兩者都是大型生活雜貨店，但『Tokyu Hands』更偏向實用性，提供許多高品質的廚房用具、DIY 手作素材與旅行用品；而『Loft』則更偏向「流行設計」，販售超多網紅文具、創意貼紙與可愛的聯名美妝小物。" },
                        { q: "在姬路想買便宜的家用雜貨去哪裡好？", a: "推薦去車站前商圈的『DAISO 大創』或是地下街內的『Seria』。特別是 Seria，以高質感、極簡風的碗盤與迪士尼聯名商品聞名，每件商品通通只要 100 日圓（未稅），CP 值極高。" }
                    ],
                    items: [
                        { n: "EDION 愛電王 (姬路店)", f: "大型免稅家電量販，吹風機、美容儀與各類相機備貨充足，還有玩具模型區。", a: "姬路市內", t: "JR姬路站周邊轉乘巴士", cLink: "https://www.klook.com/zh-TW/activity/83114-edion-tourist-discount-coupon/?aid=116515", cName: "EDION 免稅優惠券" },
                        { n: "Animate 安利美特 (姬路)", f: "姬路動漫迷集散地！最新動漫周邊、漫畫、畫冊與同人誌應有盡有，新品更新快。", a: "姬路市東站前町", t: "JR姬路站步行5分" },
                        { n: "Tokyu Hands (PIOLE 姬路)", f: "文具控必訪！高質感的日本文具、創意生活小物與旅行雜貨一次買齊。", a: "姬路市豆腐町222 (PIOLE內)", t: "JR姬路站直結" },
                        { n: "Joshin 上新電機 (姬路)", f: "關西老牌電器行，價格時常比其他連鎖店更殺，Kids Land 模型玩具區很大。", a: "姬路市內", t: "JR姬路站周邊轉乘巴士" },
                        { n: "Loft (姬路店)", f: "流行雜貨與創意禮品指標，美妝、文具與各類聯名卡通周邊設計感十足。", a: "姬路市內百貨", t: "JR姬路站周邊" },
                        { n: "DAISO 大創 (姬路站前)", f: "百元店霸主，臨時缺各種旅行小物或想買平價伴手禮超方便，規模極大。", a: "姬路市站前商圈", t: "JR姬路站步行3分" },
                        { n: "Seria (姬路地下街)", f: "以「高質感、日系雜貨風」聞名的百元店，餐具、迪士尼聯名與手作素材極為精緻。", a: "姬路市地下街 FESTA 內", t: "JR姬路站地下直結" },
                        { n: "駿河屋 (姬路店)", f: "尋找二手公仔、一番賞景品與懷舊遊戲的寶庫，動漫迷與遊戲迷挖寶必去。", a: "姬路市站前町", t: "JR姬路站步行5分" },
                        { n: "Kiddy Land (姬路)", f: "專賣各式可愛卡通角色周邊 (史努比、角落生物、吉卜力)，少女心噴發。", a: "姬路市內商場", t: "JR姬路站周邊" },
                        { n: "Nitori 宜得利 (姬路)", f: "日本國民家居品牌，販售高CP值的保暖毛毯、輕量保溫杯與和風餐盤。", a: "姬路市區商場", t: "JR姬路站轉乘巴士" }
                    ]
                }
            }
        };

        const catsMap = {
            '必買名產': { icon: <GiftIcon className="w-5 h-5" />, bg: "bg-rose-50 text-rose-700 hover:bg-rose-600 hover:text-white border-rose-200" },
            '百貨服飾': { icon: <ShoppingBagIcon className="w-5 h-5" />, bg: "bg-fuchsia-50 text-fuchsia-700 hover:bg-fuchsia-600 hover:text-white border-fuchsia-200" },
            '藥妝美妝': { icon: <PillIcon className="w-5 h-5" />, bg: "bg-sky-50 text-sky-700 hover:bg-sky-600 hover:text-white border-sky-200" },
            '超市零食': { icon: <ShoppingCartIcon className="w-5 h-5" />, bg: "bg-emerald-50 text-emerald-700 hover:bg-emerald-600 hover:text-white border-emerald-200" },
            '動漫雜貨': { icon: <GamepadIcon className="w-5 h-5" />, bg: "bg-amber-50 text-amber-700 hover:bg-amber-600 hover:text-white border-amber-200" }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('大阪');
            const [selectedCategory, setSelectedCategory] = useState('必買名產');

            const currentDataNode = shopDatabase[selectedRegion]?.[selectedCategory];
            const currentItems = currentDataNode?.items || [];
            const currentTLDR = currentDataNode?.tldr || "";
            const currentFAQs = currentDataNode?.faqs || [];

            // AEO/GEO 優化：動態生成與注入 Schema.org (JSON-LD)
            useEffect(() => {
                if (currentItems.length === 0 && currentFAQs.length === 0) return;

                const schemaData = {
                    "@context": "https://schema.org",
                    "@graph": [
                        {
                            "@type": "ItemList",
                            "name": `${selectedRegion} ${selectedCategory} 推薦清單`,
                            "itemListElement": currentItems.map((item, index) => ({
                                "@type": "ListItem",
                                "position": index + 1,
                                "item": {
                                    "@type": "Store",
                                    "name": item.n,
                                    "description": item.f,
                                    "address": {
                                        "@type": "PostalAddress",
                                        "streetAddress": item.a.split('<br>')[0],
                                        "addressRegion": selectedRegion,
                                        "addressCountry": "JP"
                                    }
                                }
                            }))
                        },
                        {
                            "@type": "FAQPage",
                            "mainEntity": currentFAQs.map(faq => ({
                                "@type": "Question",
                                "name": faq.q,
                                "acceptedAnswer": {
                                    "@type": "Answer",
                                    "text": faq.a
                                }
                            }))
                        }
                    ]
                };

                const scriptContent = JSON.stringify(schemaData);
                const container = document.getElementById('seo-json-ld-container');
                container.innerHTML = `<script type="application/ld+json">${scriptContent}<\/script>`;
            }, [selectedRegion, selectedCategory]);

            // 確保含有優惠券的項目排在前面
            const sortedItems = [...currentItems].sort((a, b) => {
                if (a.cLink && !b.cLink) return -1;
                if (!a.cLink && b.cLink) return 1;
                return 0;
            });

            return (
                <div className="min-h-screen flex flex-col font-sans text-slate-800">
                    
                    {/* 頂部導覽列：RWD 高質感毛玻璃效果 */}
                    <header className="bg-white/80 backdrop-blur-xl shadow-sm border-b border-indigo-100 sticky top-0 z-50 transition-all">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 md:py-4">
                            <div className="flex justify-between items-center mb-4 md:mb-5">
                                <div className="flex items-center gap-2 md:gap-3">
                                    <div className="p-2 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl shadow-md">
                                        <ShoppingBagIcon className="text-white w-5 h-5 md:w-6 md:h-6 shrink-0" />
                                    </div>
                                    <h1 className="text-xl md:text-2xl lg:text-3xl font-black tracking-tight text-slate-900">
                                        Kansai Shopping <span className="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-500">關西購物地圖</span>
                                    </h1>
                                </div>
                                <a
                                    href="https://kokko-travel.com/zh/osaka/"
                                    className="hidden md:flex items-center justify-center gap-2 px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-300 bg-slate-900 text-white hover:bg-indigo-600 shadow-md hover:shadow-lg active:scale-95 shrink-0"
                                >
                                    <HomeIcon className="w-4 h-4" /> 回到首頁
                                </a>
                            </div>
                            
                            {/* 地區選擇列 (橫向滾動支援) */}
                            <nav className="flex gap-2.5 md:gap-3 overflow-x-auto pb-2 hide-scrollbar md:flex-wrap" aria-label="地區選擇">
                                <a
                                    href="https://kokko-travel.com/zh/osaka/"
                                    className="md:hidden flex items-center gap-1.5 whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 bg-slate-100 text-slate-700 border border-slate-200 shrink-0 active:scale-95"
                                >
                                    <HomeIcon className="w-4 h-4" /> 首頁
                                </a>

                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => setSelectedRegion(region)}
                                        className={`whitespace-nowrap px-5 md:px-6 py-2 md:py-2.5 rounded-full text-sm md:text-base font-bold transition-all duration-200 shrink-0 shadow-sm border ${
                                            selectedRegion === region
                                            ? 'bg-gradient-to-r from-indigo-700 to-purple-600 text-white border-transparent'
                                            : 'bg-white text-slate-600 border-slate-200 hover:bg-indigo-50 hover:text-indigo-700 hover:border-indigo-200'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    {/* 主內容區 */}
                    <main className="flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-10" role="main">
                        
                        {/* 分類標籤 */}
                        <section className="flex flex-wrap gap-2.5 md:gap-3 mb-8" aria-label="購物分類選擇">
                            {Object.keys(catsMap).map((catName) => {
                                const config = catsMap[catName];
                                return (
                                    <button
                                        key={catName}
                                        onClick={() => setSelectedCategory(catName)}
                                        className={`flex items-center gap-1.5 md:gap-2 px-4 md:px-6 py-2.5 rounded-xl md:rounded-full border text-sm md:text-base font-bold transition-all shadow-sm active:scale-95 ${
                                            selectedCategory === catName
                                            ? 'bg-indigo-600 text-white border-indigo-600 ring-2 ring-indigo-200 shadow-md'
                                            : `bg-white text-slate-600 border-slate-200 hover:${config.bg.split(' ')[0]} hover:text-slate-800` // 簡化hover效果以保持乾淨
                                        }`}
                                    >
                                        {config.icon} {catName}
                                    </button>
                                );
                            })}
                        </section>

                        <header className="mb-6 md:mb-8 flex flex-col md:flex-row md:items-end justify-between gap-4">
                            <div className="border-l-4 border-indigo-500 pl-3 md:pl-4">
                                <h2 className="text-2xl md:text-3xl font-black text-slate-800 tracking-tight">
                                    {selectedRegion} <span className="text-slate-400 font-normal mx-1">|</span> {selectedCategory}
                                </h2>
                            </div>
                        </header>

                        {/* GEO/AAO 打擊點：AI 快速總結 TL;DR 區塊 */}
                        {currentTLDR && (
                            <aside 
                                className="mb-8 p-5 md:p-6 rounded-2xl bg-gradient-to-br from-indigo-50 via-white to-purple-50 border border-indigo-100/50 shadow-sm relative overflow-hidden group"
                                role="region" 
                                aria-label={`${selectedRegion} ${selectedCategory} AI 總結`}
                                data-ai-role="summary" 
                                data-geo-intent="informational"
                            >
                                <div className="absolute top-0 left-0 w-1.5 h-full bg-gradient-to-b from-indigo-500 to-purple-500 opacity-80"></div>
                                <div className="flex items-start gap-3 md:gap-4 relative z-10">
                                    <div className="p-2 bg-white rounded-lg shadow-sm shrink-0 flex items-center justify-center">
                                        <BotMessageSquareIcon className="w-6 h-6 text-indigo-600" />
                                    </div>
                                    <div>
                                        <h3 className="text-sm font-bold tracking-widest text-indigo-800 uppercase mb-1.5 flex items-center gap-1.5">
                                            AI 智慧速讀 (TL;DR) <SparklesIcon className="w-3.5 h-3.5" />
                                        </h3>
                                        <p className="text-slate-700 text-sm md:text-base leading-relaxed font-medium">
                                            {/* SEO 隱藏前綴，加強上下文 */}
                                            <span className="sr-only">這是一段關於{selectedRegion}{selectedCategory}的AI總結建議：</span>
                                            {currentTLDR.replace("【AI 快速提要】", "")}
                                        </p>
                                    </div>
                                </div>
                            </aside>
                        )}

                        {/* 項目列表 (採用語意化 article 標籤與 Microdata) */}
                        {sortedItems.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 md:gap-6 lg:gap-8 mb-12">
                                {sortedItems.map((item, index) => {
                                    // 產生 Google Maps 搜尋連結
                                    const encodedQuery = encodeURIComponent(`${item.n} 日本 ${item.a}`);
                                    const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;
                                    
                                    return (
                                        <article 
                                            key={index} 
                                            itemScope 
                                            itemType="https://schema.org/Store"
                                            className={`bg-white rounded-2xl shadow-sm border ${item.cLink ? 'border-rose-300 ring-1 ring-rose-100' : 'border-slate-200/80'} p-5 md:p-7 flex flex-col justify-between hover:shadow-xl hover:border-indigo-300 transition-all duration-300 transform hover:-translate-y-1.5 group`}
                                        >
                                            <div className="mb-6 flex-grow">
                                                <div className="flex flex-col sm:flex-row sm:items-start justify-between mb-4 gap-3">
                                                    <h3 itemProp="name" className="text-lg md:text-xl font-bold text-slate-800 leading-tight group-hover:text-indigo-600 transition-colors flex items-start">
                                                        {item.n}
                                                        {item.cLink && <span className="ml-2 bg-gradient-to-r from-rose-500 to-red-500 text-white text-xs px-2 py-1 rounded-md shadow-sm whitespace-nowrap flex-shrink-0 animate-pulse">優惠券</span>}
                                                    </h3>
                                                </div>
                                                <div className="space-y-3">
                                                    <p itemProp="description" className="text-slate-600 text-sm md:text-base leading-relaxed">
                                                        <span className="font-bold text-indigo-700 bg-indigo-50 px-2 py-0.5 rounded mr-1.5 shadow-sm border border-indigo-100">亮點</span>{item.f}
                                                    </p>
                                                    <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 mt-3">
                                                        <p className="text-sm text-slate-600 flex items-start gap-2 mb-1.5">
                                                            <MapPinIcon className="w-4 h-4 text-indigo-500 shrink-0 mt-0.5" />
                                                            <span itemProp="address">{item.a}</span>
                                                        </p>
                                                        <p className="text-sm text-slate-500 flex items-start gap-2">
                                                            <TrainIcon className="w-4 h-4 text-indigo-500 shrink-0 mt-0.5" />
                                                            <span className="font-medium">{item.t}</span>
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className="mt-auto pt-5 border-t border-slate-100 flex flex-col gap-3">
                                                {item.cLink && (
                                                    <a
                                                        href={item.cLink}
                                                        target="_blank"
                                                        rel="noopener noreferrer"
                                                        className="w-full flex items-center justify-center gap-2 bg-rose-50 hover:bg-rose-100 text-rose-700 border border-rose-300 font-bold py-2.5 md:py-3 px-4 rounded-xl transition-all active:scale-95 shadow-sm"
                                                    >
                                                        <TicketIcon className="w-4 h-4 md:w-5 md:h-5" />
                                                        領取：{item.cName}
                                                    </a>
                                                )}
                                                <a
                                                    href={mapsUrl}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    className="w-full flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 md:py-3 px-4 rounded-xl transition-all active:scale-95 shadow-sm"
                                                >
                                                    <MapNavigateIcon className="w-4 h-4 md:w-5 md:h-5" />
                                                    開啟 Google Maps 導航
                                                </a>
                                            </div>
                                        </article>
                                    );
                                })}
                            </div>
                        ) : (
                            <div className="bg-white rounded-2xl border-2 border-dashed border-slate-200 p-12 md:p-20 text-center flex flex-col items-center justify-center mb-12">
                                <div className="bg-slate-50 p-5 rounded-full mb-5"><SparklesIcon className="w-10 h-10 text-slate-400" /></div>
                                <h3 className="text-lg md:text-xl font-bold text-slate-700 mb-2">目前尚無「{selectedCategory}」推薦項目</h3>
                                <p className="text-slate-500 text-sm md:text-base">我們正在嚴選最優質的關西購物清單，敬請期待！</p>
                            </div>
                        )}

                        {/* SEO/GEO 打擊點：實體 FAQ 常見問題區塊 */}
                        {currentFAQs.length > 0 && (
                            <section className="mt-6 mb-12" aria-labelledby="faq-heading">
                                <div className="flex items-center gap-2 mb-6">
                                    <HelpCircleIcon className="w-6 h-6 text-indigo-500" />
                                    <h2 id="faq-heading" className="text-xl md:text-2xl font-black text-slate-800">
                                        購物實用攻略與常見問題 FAQ
                                    </h2>
                                </div>
                                <dl className="space-y-3 md:space-y-4">
                                    {currentFAQs.map((faq, index) => (
                                        <details key={index} className="group bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden [&_summary::-webkit-details-marker]:hidden">
                                            <summary className="flex items-center justify-between cursor-pointer p-4 md:p-5 font-bold text-slate-800 hover:text-indigo-600 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500/50">
                                                <dt className="text-sm md:text-base pr-4">{faq.q}</dt>
                                                <span className="shrink-0 bg-slate-50 p-1.5 rounded-full group-open:bg-indigo-50 group-open:text-indigo-600 transition-colors">
                                                    <ChevronDownIcon className="w-5 h-5 transition-transform duration-300 group-open:rotate-180" />
                                                </span>
                                            </summary>
                                            <dd className="p-4 md:p-5 pt-0 text-slate-600 text-sm md:text-base leading-relaxed border-t border-slate-50/50 bg-slate-50/30">
                                                {faq.a}
                                            </dd>
                                        </details>
                                    ))}
                                </dl>
                            </section>
                        )}
                    </main>

                    {/* 版權宣告 */}
                    <footer className="bg-slate-900 text-slate-400 py-8 md:py-12 mt-auto">
                        <div className="max-w-7xl mx-auto px-5 text-center">
                            <p className="text-xs md:text-sm leading-relaxed font-medium tracking-wide">
                                Copyright &copy; 2026 Kokko Travel / Im+ Life. All Rights Reserved.<br className="md:hidden" />
                                <span className="hidden md:inline"> | </span>版權所有，未經授權禁止轉載、翻印或任何商業用途。<br />
                                <span className="text-slate-500 mt-2 block">本站內容受 Schema 結構化語意標記保護，並為 AEO / GEO 搜尋體驗深度最佳化。</span>
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
