                    { title: '姬路與岡山：瀨戶內海經典風光二日遊', description: '結合姬路城與岡山後樂園的兩日行程，慢節奏地享受瀨戶內海溫暖的氣候與新鮮的海產。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E5%A7%AC%E8%B7%AF%20%E5%B2%A1%E5%B1%B1%20%E4%BA%8C%E6%97%A5%E9%81%8A&aid=116515' },
                    { title: '姬路賞櫻/賞楓季節限定專車包車遊', description: '不想人擠人？包下專車帶您前往姬路周邊較少外國觀光客知道的賞櫻/賞楓秘境，享受專屬的美景。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E5%A7%AC%E8%B7%AF%20%E5%8C%85%E8%BB%8A%20%E8%B3%9E%E6%AB%BB&aid=116515' }
                ],
                '體驗與娛樂': [
                    { title: '姬路城下町 和服與忍者服裝體驗', description: '換上美麗的和服或是帥氣的忍者裝，以最純白的姬路城為背景，拍下一系列充滿穿越感的紀念照。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E5%A7%AC%E8%B7%AF%E5%9F%8E%20%E5%92%8C%E6%9C%8D%E7%A7%9F%E5%80%9F&aid=116515' }
                ],
                '交通及網路': [
                    { title: 'JR 關西廣域鐵路周遊券 (JR Kansai Wide Area Pass)', description: '搭乘新幹線前往姬路的最強神券！只要約30分鐘就能從新大阪直達姬路，是票價最划算的選擇。', link: 'https://www.klook.com/zh-TW/activity/3277-5-day-kansai-wide-area-jr-pass/?aid=116515' },
                    { title: '關西周遊卡 Kansai Thru Pass', description: '若您選擇搭乘山陽電車慢慢欣賞沿途風景前往姬路，這張暢遊關西私鐵的交通卡絕對必備。', link: 'https://www.klook.com/zh-TW/activity/1329-kansai-thru-pass-osaka/?aid=116515' },
                    { title: '大阪/機場至姬路私人包車接送', description: '距離大阪較遠，若有長輩同行或大件行李，直接包車從機場或飯店出發是舒適度最高的奢華選擇。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E5%A7%AC%E8%B7%AF%20%E5%8C%85%E8%BB%8A%E6%8E%A5%E9%80%81&aid=116515' },
                    { title: '姬路港至小豆島 渡輪船票', description: '想跳島遊瀨戶內海？從姬路港搭乘渡輪前往盛產橄欖的小豆島，展開一場充滿浪漫風情的海島之旅。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E5%B0%8F%E8%B1%86%E5%B3%B6%20%E6%B8%A1%E8%BC%AA&aid=116515' }
                ]
            }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('大阪');
            const [selectedCategory, setSelectedCategory] = useState('景點門票');

            // AAO & GEO: 動態生成結構化資料 (JSON-LD)
            useEffect(() => {
                const schema = {
                    "@context": "https://schema.org",
                    "@type": ["WebPage", "CollectionPage"],
                    "mainEntity": {
                        "@type": "ItemList",
                        "name": "日本關西行程與旅遊票券推薦",
                        "description": "關西地區大阪、京都、奈良、神戶、宇治、美山與姬路的精選景點門票、一日遊與交通票券導覽",
                        "itemListElement": []
                    }
                };
                
                let position = 1;
                for (const [region, categories] of Object.entries(itineraryData)) {
                    for (const [cat, items] of Object.entries(categories)) {
                        items.forEach(item => {
                            schema.mainEntity.itemListElement.push({
                                "@type": "ListItem",
                                "position": position++,
                                "item": {
                                    "@type": "TouristAttraction",
                                    "name": `${region} - ${item.title}`,
                                    "description": item.description,
                                    "url": item.link
                                }
                            });
                        });
                    }
                }

                const scriptId = 'aao-geo-schema';
                let script = document.getElementById(scriptId);
                if (!script) {
                    script = document.createElement('script');
                    script.id = scriptId;
                    script.type = 'application/ld+json';
                    document.head.appendChild(script);
                }
                script.text = JSON.stringify(schema);
                
                return () => {
                    const existingScript = document.getElementById(scriptId);
                    if (existingScript) document.head.removeChild(existingScript);
                };
            }, []);

            const currentData = itineraryData[selectedRegion]?.[selectedCategory] || [];

            return (
                <div className="min-h-screen bg-[#f0fdf4] font-sans text-slate-800 flex flex-col">
                    {/* 頂部導覽列 */}
                    <header className="bg-white shadow-sm sticky top-0 z-20 border-b border-emerald-100">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 sm:py-4 md:py-6">
                            <div className="flex flex-wrap items-center justify-between gap-3 mb-4">
                                <div className="flex items-center gap-2">
                                    <MapPin className="text-emerald-600 w-5 h-5 sm:w-6 sm:h-6 md:w-8 md:h-8" />
                                    <h1 className="text-xl sm:text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-600 to-teal-500">
                                        關西行程推薦指南
                                    </h1>
                                </div>
                                {/* 桌面版/平板版回到首頁 */}
                                <a
                                    href="https://kokko-travel.com/zh/osaka/"
                                    className="hidden sm:flex items-center gap-1.5 px-4 sm:px-5 py-2 sm:py-2.5 rounded-full text-xs sm:text-sm font-bold transition-all duration-200 bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500"
                                >
                                    <Home className="w-4 h-4" />
                                    回到首頁
                                </a>
                            </div>
                            
                            {/* 地區選擇 */}
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide snap-x snap-mandatory overscroll-x-contain">
                                {/* 手機版回到首頁 */}
                                <a
                                    href="https://kokko-travel.com/zh/osaka/"
                                    className="sm:hidden flex items-center justify-center gap-1.5 whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm snap-center flex-shrink-0"
                                >
                                    <Home className="w-4 h-4" />
                                    首頁
                                </a>
                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => setSelectedRegion(region)}
                                        className={`whitespace-nowrap px-4 sm:px-5 py-2 sm:py-2.5 rounded-full text-sm font-bold transition-all duration-200 snap-center flex-shrink-0 ${
                                            selectedRegion === region
                                            ? 'bg-teal-600 text-white shadow-md'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-teal-50 hover:text-teal-700'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 flex-grow w-full">
                        {/* 分類標籤 */}
                        <div className="flex flex-wrap gap-2 md:gap-3 mb-8">
                            {CATEGORIES.map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 px-3 sm:px-4 py-2 sm:py-2.5 rounded-lg border text-xs sm:text-sm font-bold transition-all flex-shrink-0 ${
                                        selectedCategory === id
                                        ? 'border-emerald-500 bg-emerald-50 text-emerald-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-3.5 h-3.5 sm:w-4 sm:h-4" />
                                    {id}
                                </button>
                            ))}
                        </div>

                        {/* 內容區標題 */}
                        <div className="mb-6 flex items-center gap-2">
                            <h2 className="text-xl sm:text-2xl font-bold text-slate-800">
                                {selectedRegion} - {selectedCategory} <span className="text-emerald-600">精選推薦</span>
                            </h2>
                        </div>

                        {/* 卡片列表 (深層 RWD 優化) */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 md:gap-6 lg:gap-8 pb-8">
                                {currentData.map((item, index) => (
                                    <div 
                                        key={index} 
                                        className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 sm:p-6 flex flex-col h-full justify-between hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 animate-fade-in"
                                        style={{ animationDelay: `${index * 0.05}s` }}
                                    >
                                        <div className="flex-grow mb-6">
                                            <h3 className="text-lg sm:text-xl font-bold text-slate-800 mb-3 leading-tight flex items-start gap-2">
                                                <span className="text-emerald-500 mt-1 flex-shrink-0"><Sparkles className="w-5 h-5"/></span>
                                                {item.title}
                                            </h3>
                                            <p className="text-slate-600 text-sm sm:text-base leading-relaxed font-medium">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-4 border-t border-slate-100 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-[#ff5b00] hover:bg-[#e05000] text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-sm hover:shadow-md w-full sm:w-auto focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-[#ff5b00]"
                                            >
                                                <Info className="w-4 h-4" />
                                                <span>詳細說明</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-80" />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl border border-dashed border-slate-300 p-12 text-center flex flex-col items-center justify-center min-h-[300px]">
                                <h3 className="text-lg font-medium text-slate-700 mb-2">
                                    此區域目前無對應項目的資料
                                </h3>
                                <p className="text-slate-500">請嘗試選擇其他分類或分頁。</p>
                            </div>
                        )}

                        {/* 全局探索按鈕 */}
                        <div className="mt-8 sm:mt-12 mb-10 flex justify-center">
                            <a 
                                href={`https://www.klook.com/zh-TW/search/result/?query=${encodeURIComponent(selectedRegion)}&aid=116515`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3.5 sm:py-4 px-8 sm:px-10 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1 w-full sm:w-auto text-sm sm:text-base focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500"
                            >
                                <span className="tracking-wide">前往探索更多 {selectedRegion} 行程</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>

                    {/* Footer: 版權宣告區塊 (Updated Task 12) */}
                    <footer className="w-full bg-white border-t border-emerald-100 mt-auto py-8">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                            <div className="text-xs sm:text-sm text-slate-500 space-y-2 font-medium leading-relaxed">
                                <p className="font-bold text-slate-600 text-sm sm:text-base">Copyright © 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
                                <p>版權所有，未經授權禁止轉載、翻印或任何商業用途。</p>
                                <p>本站包含之圖片、文字內容及程式碼均受法律保護。</p>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
