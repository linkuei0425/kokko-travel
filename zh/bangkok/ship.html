<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>曼谷水運交通 (快船與運河) 全線指南</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f0f9ff; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. 曼谷水運交通資料庫 (完整航線) ---
        const mrtData = {
            CPE_ORG: [ // 昭披耶河快船 (橘旗) - 所有碼頭
                { c: "N30", n: "暖武里", e: "Nonthaburi (Pibul 3)", a: "暖武里市場、舊市政廳" },
                { c: "N29/1", n: "帕南告橋", e: "Phra Nangklao Bridge", a: "轉乘 MRT 紫線" },
                { c: "N28", n: "Wat Khien 寺", e: "Wat Khien", a: "" },
                { c: "N24", n: "拉瑪七世橋", e: "Rama 7 Bridge", a: "北曼谷國立科技大學" },
                { c: "N23", n: "Wat Soi Thong 寺", e: "Wat Soi Thong", a: "" },
                { c: "N22", n: "拉瑪六世橋", e: "Rama 6 Bridge", a: "" },
                { c: "N21", n: "Kiak Kai", e: "Kiak Kai", a: "新議會大廈" },
                { c: "N20", n: "Kheaw Khai Ka", e: "Kheaw Khai Ka", a: "" },
                { c: "N18", n: "巴亞", e: "Payap", a: "素可泰塔瑪提拉開放大學" },
                { c: "N15", n: "特威", e: "Thewet", a: "特威花卉市場" },
                { c: "N13", n: "帕阿提", e: "Phra Arthit", a: "考山路、蘭布泰路" },
                { c: "N12", n: "帕賓克勞橋", e: "Phra Pin Klao Bridge", a: "國立博物館" },
                { c: "N11", n: "吞武里火車站", e: "Thonburi Railway", a: "詩里拉吉醫院" },
                { c: "N10", n: "普拉諾克", e: "Prannok (Wang Lang)", a: "王朗市場、詩里拉吉醫院" },
                { c: "N9", n: "塔張 (大皇宮)", e: "Tha Chang", a: "大皇宮、玉佛寺" },
                { c: "N8", n: "塔田", e: "Tha Tien", a: "臥佛寺、鄭王廟接駁渡輪" },
                { c: "N6/1", n: "尤匹曼", e: "Yodpiman", a: "帕空花市" },
                { c: "N6", n: "紀念橋", e: "Memorial Bridge (Saphan Phut)", a: "夜市" },
                { c: "N5", n: "拉差翁 (唐人街)", e: "Rachawongse", a: "耀華力路唐人街、三聘批發市場" },
                { c: "N4", n: "海事局", e: "Marine Department", a: "噠叻仔藝術街 (Talat Noi)" },
                { c: "N3", n: "四披耶", e: "Si Phraya", a: "River City 購物中心、Warehouse 30" },
                { c: "N1", n: "東方酒店", e: "Oriental", a: "文華東方酒店" },
                { c: "CEN", n: "沙吞 (中央碼頭)", e: "Sathorn (Central Pier)", a: "轉乘 BTS Saphan Taksin 站" },
                { c: "S1", n: "Wat Sawetachat 寺", e: "Wat Sawetachat", a: "" },
                { c: "S2", n: "Wat Worachanyawas 寺", e: "Wat Worachanyawas", a: "在地按摩街" },
                { c: "S3", n: "Wat Rajsingkorn 寺", e: "Wat Rajsingkorn", a: "河濱碼頭夜市 (Asiatique)" }
            ],
            CPE_BLU: [ // 昭披耶河觀光船 (藍旗)
                { c: "TB1", n: "帕阿提", e: "Phra Arthit", a: "考山路" },
                { c: "TB2", n: "塔張", e: "Tha Chang", a: "大皇宮" },
                { c: "TB3", n: "塔田", e: "Tha Tien", a: "臥佛寺" },
                { c: "TB4", n: "帕空花市", e: "Pak Khlong Talat", a: "花卉市場" },
                { c: "TB5", n: "拉差翁", e: "Rachawongse", a: "唐人街" },
                { c: "TB6", n: "鄭王廟", e: "Wat Arun", a: "黎明寺" },
                { c: "TB7", n: "暹羅天地", e: "ICONSIAM", a: "頂級購物中心" },
                { c: "CEN_B", n: "沙吞", e: "Sathorn (Central Pier)", a: "BTS Saphan Taksin" },
                { c: "TB8", n: "河濱碼頭夜市", e: "Asiatique", a: "夜市" }
            ],
            KSS_WES: [ // 盛桑運河快船 (西線)
                { c: "W1", n: "潘法利拉", e: "Panfa Leelard", a: "金山寺 (Wat Saket)、金屬宮殿" },
                { c: "W2", n: "寶馬市場", e: "Talad Bo-Bae", a: "平價成衣市場" },
                { c: "W3", n: "沙潘查隆波", e: "Sapan Charoen Pol", a: "" },
                { c: "W4", n: "班夸努", e: "Baan Krua Nua", a: "金湯普森博物館" },
                { c: "W5", n: "沙潘華昌", e: "Sapan Hua Chang", a: "暹羅商圈 (Siam)、MBK Center" },
                { c: "W6", n: "水門 (總站)", e: "Pratunam (Central Hub)", a: "中央世界 (CentralWorld)、白金廣場" }
            ],
            KSS_EAS: [ // 盛桑運河快船 (東線)
                { c: "E1", n: "水門 (總站)", e: "Pratunam (Central Hub)", a: "換乘西線往金山寺" },
                { c: "E2", n: "奇隆", e: "Chidlom", a: "Central Chidlom、Mercury Ville" },
                { c: "E3", n: "無線路", e: "Wireless", a: "大使館區" },
                { c: "E4", n: "那那努", e: "Nana Nua", a: "素坤逸路三巷" },
                { c: "E4/1", n: "那那查德", e: "Nana Chard", a: "" },
                { c: "E5", n: "阿索克-碧武里", e: "Asoke-Petchaburi", a: "轉乘 MRT Phetchaburi / ARL Makkasan" },
                { c: "E6", n: "普拉山密", e: "Prasanmit", a: "詩納卡寧威羅大學 (SWU)" },
                { c: "E7", n: "義大利泰大廈", e: "Italthai", a: "Italthai Tower" },
                { c: "E8", n: "Wat Mai Chonglom 寺", e: "Wat Mai Chonglom", a: "" },
                { c: "E9", n: "班東匯狂", e: "Baan Don Huay Kwang", a: "" },
                { c: "E10", n: "通羅巷口", e: "Soi Thonglo", a: "通羅設計街區" },
                { c: "E10/1", n: "查恩依沙拉", e: "Charn Issara", a: "" },
                { c: "E11", n: "維吉特學校", e: "Vijit School", a: "" },
                { c: "E12", n: "沙潘空坦", e: "Sapan Klong Tun", a: "" },
                { c: "E13", n: "蘭甘亨商場", e: "The Mall Ramkhamhaeng", a: "購物中心" },
                { c: "E14", n: "Wat Noi 寺", e: "Wat Noi", a: "" },
                { c: "E15", n: "蘭甘亨29", e: "Ramkhamhaeng 29", a: "" },
                { c: "E16", n: "Wat Tepleela 寺", e: "Wat Tepleela", a: "" },
                { c: "E17", n: "蘭甘亨53", e: "Ramkhamhaeng 53", a: "" },
                { c: "E18", n: "馬哈泰", e: "Mahadthai", a: "" },
                { c: "E19", n: "Wat Klang 寺", e: "Wat Klang", a: "" },
                { c: "E20", n: "邦卡皮商場", e: "The Mall Bangkapi", a: "Bangkapi 購物中心" },
                { c: "E21", n: "邦卡皮市場", e: "Bang Kapi", a: "在地傳統市場" },
                { c: "E22", n: "Wat Sriboonreung 寺", e: "Wat Sriboonreung", a: "東線最終站" }
            ]
        };

        const lineColors = {
            CPE_ORG: { bg: 'bg-orange-500', border: 'border-orange-500', text: 'text-orange-700', name: '🟠 昭披耶河快船 (橘旗)' },
            CPE_BLU: { bg: 'bg-blue-600', border: 'border-blue-600', text: 'text-blue-700', name: '🔵 昭披耶河觀光船 (藍旗)' },
            KSS_WES: { bg: 'bg-slate-500', border: 'border-slate-500', text: 'text-slate-600', name: '🚣 盛桑運河快船 (西線)' },
            KSS_EAS: { bg: 'bg-slate-600', border: 'border-slate-600', text: 'text-slate-700', name: '🚣 盛桑運河快船 (東線)' }
        };

        const aliasMap = {
            "Sathorn (Central Pier Hub)": "沙吞 (中央碼頭)",
            "Pratunam (Canal Transfer Hub)": "水門 (運河轉運樞紐)",
            "Phra Arthit / Khaosan": "帕阿提 / 考山路",
            "Tha Chang (Grand Palace)": "塔張 (大皇宮)",
            "Rachawongse (Chinatown)": "拉差翁 (唐人街)",
            "Tha Tien (Wat Pho)": "塔田 (臥佛寺)"
        };

        let allStationsMap = {};
        let uniquePhysicalStations = {}; 

        Object.keys(mrtData).forEach(lineKey => {
            mrtData[lineKey].forEach(st => {
                allStationsMap[st.c] = { ...st, line: lineKey };
                // 使用中文名或對應的 alias
                let baseName = aliasMap[st.e] || st.n;

                if (!uniquePhysicalStations[baseName]) {
                    uniquePhysicalStations[baseName] = { name: baseName, en: st.e, codes: [], attractions: st.a };
                }
                uniquePhysicalStations[baseName].codes.push(st.c);
                if (st.a && !uniquePhysicalStations[baseName].attractions.includes(st.a)) {
                    uniquePhysicalStations[baseName].attractions += (uniquePhysicalStations[baseName].attractions ? "、" : "") + st.a;
                }
            });
        });

        const graph = {};
        const RIDE_TIME = 3; 
        const TRANSFER_TIME = 5; 

        function addEdge(u, v, weight, type, line) {
            if (!graph[u]) graph[u] = [];
            graph[u].push({ node: v, weight, type, line });
        }

        Object.keys(mrtData).forEach(lineKey => {
            const lineArr = mrtData[lineKey];
            for (let i = 0; i < lineArr.length - 1; i++) {
                addEdge(lineArr[i].c, lineArr[i+1].c, RIDE_TIME, 'ride', lineKey);
                addEdge(lineArr[i+1].c, lineArr[i].c, RIDE_TIME, 'ride', lineKey);
            }
        });

        Object.values(uniquePhysicalStations).forEach(station => {
            if (station.codes.length > 1) {
                for (let i = 0; i < station.codes.length; i++) {
                    for (let j = i + 1; j < station.codes.length; j++) {
                        let tTime = (station.name.includes('水門')) ? 3 : TRANSFER_TIME; 
                        addEdge(station.codes[i], station.codes[j], tTime, 'transfer', null);
                        addEdge(station.codes[j], station.codes[i], tTime, 'transfer', null);
                    }
                }
            }
        });

        function findShortestPath(startBaseName, endBaseName) {
            if (startBaseName === endBaseName) return null;
            const startCodes = uniquePhysicalStations[startBaseName].codes;
            const endCodes = uniquePhysicalStations[endBaseName].codes;
            const dist = {};
            const prev = {};
            const pq = [];

            Object.keys(allStationsMap).forEach(node => {
                dist[node] = Infinity;
                prev[node] = null;
            });
            startCodes.forEach(code => {
                dist[code] = 0;
                pq.push({ node: code, dist: 0 });
            });
            while (pq.length > 0) {
                pq.sort((a, b) => a.dist - b.dist);
                const { node, dist: currentDist } = pq.shift();
                if (dist[node] < currentDist) continue;
                if (endCodes.includes(node)) return reconstructPath(prev, node);
                if (graph[node]) {
                    graph[node].forEach(edge => {
                        const alt = currentDist + edge.weight;
                        if (alt < dist[edge.node]) {
                            dist[edge.node] = alt;
                            prev[edge.node] = { node: node, edgeFromPrev: edge };
                            pq.push({ node: edge.node, dist: alt });
                        }
                    });
                }
            }
            return null;
        }

        function reconstructPath(prev, endNode) {
            const path = [];
            let curr = endNode;
            while (curr) {
                const step = prev[curr];
                if (step) {
                    path.unshift({ node: curr, edge: step.edgeFromPrev });
                    curr = step.node;
                } else {
                    path.unshift({ node: curr, edge: null }); 
                    curr = null;
                }
            }
            const legs = [];
            if (path.length < 2) return [];
            let currentLeg = { 
                type: path[1].edge.type, 
                line: path[1].edge.line, 
                nodes: [path[0].node, path[1].node],
                time: path[1].edge.weight,
                stops: path[1].edge.type === 'ride' ? 1 : 0
            };
            for (let i = 2; i < path.length; i++) {
                const edge = path[i].edge;
                if (edge.type === currentLeg.type && edge.line === currentLeg.line) {
                    currentLeg.nodes.push(path[i].node);
                    currentLeg.time += edge.weight;
                    if(edge.type === 'ride') currentLeg.stops += 1;
                } else {
                    legs.push(currentLeg);
                    currentLeg = { 
                        type: edge.type, 
                        line: edge.line, 
                        nodes: [path[i-1].node, path[i].node],
                        time: edge.weight,
                        stops: edge.type === 'ride' ? 1 : 0
                    };
                }
            }
            legs.push(currentLeg);
            return legs;
        }

        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current) {
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    if (className) i.setAttribute('class', className);
                    spanRef.current.innerHTML = '';
                    spanRef.current.appendChild(i);
                    lucide.createIcons({ root: spanRef.current });
                }
            }, [name, className]);
            return <span ref={spanRef} style={{ display: 'contents' }}></span>;
        };

        const App = () => {
            const [startStation, setStartStation] = useState("沙吞 (中央碼頭)");
            const [endStation, setEndStation] = useState("塔張 (大皇宮)");
            const [route, setRoute] = useState(null);

            useEffect(() => {
                if(startStation && endStation && startStation !== endStation) {
                    const legs = findShortestPath(startStation, endStation);
                    setRoute(legs);
                } else {
                    setRoute(null);
                }
            }, [startStation, endStation]);

            const handleSwap = () => {
                const temp = startStation;
                setStartStation(endStation);
                setEndStation(temp);
            };

            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-blue-900 text-white shadow-md pt-12 pb-8 px-6 text-center">
                        <div className="flex items-center justify-center gap-4 mb-3">
                            <a href="https://linkuei0425.github.io/BANGKOK/index.html" title="回到首頁" className="inline-flex items-center justify-center text-blue-200 hover:text-white bg-blue-800 hover:bg-blue-700 p-2.5 rounded-full transition-colors shadow-sm">
                                <Icon name="home" className="w-5 h-5" />
                            </a>
                            <h1 className="text-3xl font-bold tracking-tight flex items-center gap-2">
                                <Icon name="ship" className="w-8 h-8 text-sky-400" />
                                曼谷水運交通指南
                            </h1>
                        </div>
                        <p className="text-blue-300 text-sm font-medium">完整航網指引：河道快船與運河交通</p>
                    </header>

                    <main className="max-w-2xl mx-auto px-4 -mt-6">
                        <div className="bg-white rounded-2xl shadow-xl p-6 mb-8 relative">
                            <div className="flex flex-col gap-4">
                                <div className="relative">
                                    <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">出發碼頭 (Start)</label>
                                    <select 
                                        className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-base rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3.5 pr-8 truncate font-medium appearance-none"
                                        value={startStation}
                                        onChange={(e) => setStartStation(e.target.value)}
                                    >
                                        {Object.keys(mrtData).map(lineKey => (
                                            <optgroup key={`start-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                {mrtData[lineKey].map(st => {
                                                    const baseName = aliasMap[st.e] || st.n;
                                                    return (
                                                        <option key={`start-${st.c}`} value={baseName}>
                                                            [{st.c}] {st.n} ({st.e}){st.a ? ` 📍 ${st.a.split('、')[0]}` : ''}
                                                        </option>
                                                    );
                                                })}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 top-6 flex items-center px-3 text-slate-500">
                                        <Icon name="chevron-down" className="w-5 h-5" />
                                    </div>
                                </div>

                                <div className="relative flex justify-center -my-3 z-10">
                                    <button onClick={handleSwap} className="bg-sky-600 hover:bg-sky-700 text-white p-2.5 rounded-full shadow-md transition-transform hover:scale-105">
                                        <Icon name="arrow-down-up" className="w-5 h-5" />
                                    </button>
                                </div>

                                <div className="relative">
                                    <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">抵達碼頭 (Destination)</label>
                                    <select 
                                        className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-base rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3.5 pr-8 truncate font-medium appearance-none"
                                        value={endStation}
                                        onChange={(e) => setEndStation(e.target.value)}
                                    >
                                        {Object.keys(mrtData).map(lineKey => (
                                            <optgroup key={`end-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                {mrtData[lineKey].map(st => {
                                                    const baseName = aliasMap[st.e] || st.n;
                                                    return (
                                                        <option key={`end-${st.c}`} value={baseName}>
                                                            [{st.c}] {st.n} ({st.e}){st.a ? ` 📍 ${st.a.split('、')[0]}` : ''}
                                                        </option>
                                                    );
                                                })}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 top-6 flex items-center px-3 text-slate-500">
                                        <Icon name="chevron-down" className="w-5 h-5" />
                                    </div>
                                </div>
                            </div>
                        </div>

                        {startStation === endStation ? (
                            <div className="bg-yellow-50 text-yellow-800 p-4 rounded-xl text-center shadow-sm font-medium">
                                📍 起點與終點位於同一個碼頭唷。
                            </div>
                        ) : route ? (
                            <RouteTimeline legs={route} destName={endStation} />
                        ) : (
                            <div className="text-center text-slate-500 py-8">
                                正在尋找最佳航行路線...
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const RouteTimeline = ({ legs, destName }) => {
            const totalTime = legs.reduce((acc, leg) => acc + leg.time, 0);
            const totalTransfers = legs.filter(l => l.type === 'transfer').length;
            const destInfo = uniquePhysicalStations[destName];

            return (
                <div className="bg-white rounded-2xl shadow-xl overflow-hidden">
                    <div className="bg-sky-50 border-b border-sky-100 p-5 flex justify-between items-center">
                        <div>
                            <p className="text-sm font-semibold text-sky-600 mb-1">預估航行時間</p>
                            <p className="text-3xl font-bold text-slate-800">
                                {totalTime} <span className="text-base font-normal text-slate-500">分鐘</span>
                            </p>
                        </div>
                        <div className="text-right">
                            <p className="text-sm font-semibold text-sky-600 mb-1">換船次數</p>
                            <p className="text-lg font-bold text-slate-700">
                                {totalTransfers} <span className="text-sm font-normal text-slate-500">次</span>
                            </p>
                        </div>
                    </div>

                    <div className="p-6">
                        <div className="ml-4">
                            {legs.map((leg, idx) => (
                                <LegItem key={idx} leg={leg} isLast={idx === legs.length - 1} destName={destName} />
                            ))}
                        </div>
                        
                        <div className="relative pl-8 border-l-4 border-transparent">
                            <div className="absolute left-[-10px] top-1 w-4 h-4 bg-slate-800 rounded-full border-4 border-white shadow-sm z-10"></div>
                            <div className="absolute left-[-16px] top-[-5px] w-7 h-7 bg-sky-200 rounded-full opacity-50 z-0 animate-pulse"></div>
                            <h3 className="text-lg font-bold text-slate-800">{destInfo.name}</h3>
                            <p className="text-sm text-slate-500 mb-2">抵達 (碼頭)</p>
                            {destInfo.attractions && (
                                <div className="mt-2 bg-blue-50 border border-blue-100 rounded-lg p-3 text-sm flex gap-2">
                                    <Icon name="anchor" className="w-5 h-5 text-blue-500 shrink-0" />
                                    <div>
                                        <span className="font-semibold text-blue-900 block mb-0.5">周邊景點：</span>
                                        <span className="text-blue-800">{destInfo.attractions}</span>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const LegItem = ({ leg, isLast, destName }) => {
            const startNodeCode = leg.nodes[0];
            const endNodeCode = leg.nodes[leg.nodes.length - 1];
            const startStation = allStationsMap[startNodeCode];
            const endStation = allStationsMap[endNodeCode];

            if (leg.type === 'transfer') {
                return (
                    <div className="relative pl-8 pb-8 border-l-4 border-dashed border-slate-300">
                        <div className="absolute left-[-14px] top-1 w-6 h-6 bg-white rounded-full border-2 border-slate-300 z-10 flex items-center justify-center">
                            <Icon name="footprints" className="w-3.5 h-3.5 text-slate-500" />
                        </div>
                        <div className="bg-slate-50 border border-slate-200 rounded-lg p-3 inline-block">
                            <p className="text-sm font-semibold text-slate-700">
                                於 <span className="text-slate-900">{aliasMap[startStation.e] || startStation.n}</span> 換乘
                            </p>
                            <p className="text-xs text-slate-500 mt-1 flex items-center gap-1">
                                <Icon name="clock" className="w-3 h-3" /> 約 {leg.time} 分鐘
                            </p>
                        </div>
                    </div>
                );
            }

            const lineTheme = lineColors[leg.line] || { bg: 'bg-slate-500', border: 'border-slate-500', text: 'text-slate-600', name: leg.line };
            
            return (
                <div className={`relative pl-8 pb-8 border-l-4 ${lineTheme.border}`}>
                    <div className={`absolute left-[-10px] top-1 w-4 h-4 rounded-full border-4 border-white shadow-sm z-10 ${lineTheme.bg}`}></div>
                    <div className="mb-2">
                        <h3 className="text-base font-bold text-slate-800">{startStation.n}</h3>
                        {startStation.a && (
                            <p className="text-xs text-blue-600 mt-1 flex items-start gap-1">
                                <Icon name="star" className="w-3.5 h-3.5 mt-0.5 shrink-0" />
                                <span>{startStation.a}</span>
                            </p>
                        )}
                    </div>
                    <div className={`mt-3 border-l-4 rounded-r-lg p-4 bg-white shadow-sm border-y border-r border-slate-100 ${lineTheme.border}`}>
                        <div className="flex items-center gap-2 mb-1">
                            <span className={`${lineTheme.bg} text-white text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider`}>{startNodeCode}</span>
                            <span className={`text-sm font-semibold ${lineTheme.text}`}>{lineTheme.name}</span>
                        </div>
                        <p className="text-xs text-slate-500 flex items-center gap-2 mt-2">
                            <span>前往 <strong>{endStation.n}</strong></span>
                            <span className="text-slate-300">|</span>
                            <span>{leg.stops} 站</span>
                            <span className="text-slate-300">|</span>
                            <span>約 {leg.time} 分鐘</span>
                        </p>
                        <div className="mt-2 text-xs text-slate-400">
                            途經: {leg.nodes.slice(1, -1).map(c => allStationsMap[c].n).join(' ➔ ') || '直達'}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
