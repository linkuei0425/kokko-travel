      { id: 'acc_kohchang', city: 'kohchang', name: '住宿: 象島', stay: 1, region: 71, regionName: '西岸', type: '住宿區域', desc: '西岸各沙灘度假村。', transport: '抵達象島碼頭後，搭乘島上雙條車前往西岸飯店。' },

      { id: 'klong_plu', city: 'kohchang', name: '孔拋瀑布', stay: 2.5, region: 71, regionName: '西岸', type: '戶外絕景', desc: '容易抵達的深潭瀑布。', transport: '於孔拋海灘區的岔路轉入，騎機車或包雙條車前往。' },

      { id: 'bang_bao', city: 'kohchang', name: '邦寶漁村', stay: 2, region: 72, regionName: '南端', type: '近郊特色', desc: '海上傳統木造高腳屋。', transport: '搭乘雙條車至西岸公路最南端盡頭下車。' },
      { id: 'koh_rang', city: 'kohchang', name: '朗島浮潛', stay: 5, region: 74, regionName: '外海', type: '海島休閒', desc: '透明度極高的浮潛地。', transport: '於邦寶碼頭 (Bang Bao) 報名跳島行程搭船出發。' },
      { id: 'koh_wai', city: 'kohchang', name: '威島 (Koh Wai) 跳島', stay: 4, region: 74, regionName: '外海', type: '海島休閒', desc: '清澈原始秘境島。', transport: '於邦寶碼頭搭乘快艇或參加跳島行程前往。' }
    ];

    const CITIES = [
      { id: 'bangkok', name: '曼谷', color: 'blue' },
      { id: 'pattaya', name: '芭達雅', color: 'rose' },
      { id: 'ayutthaya', name: '大城', color: 'amber' },
      { id: 'huahin', name: '華欣', color: 'teal' },
      { id: 'kanchanaburi', name: '北碧府', color: 'emerald' },
      { id: 'rayong', name: '羅勇/沙美', color: 'indigo' },
      { id: 'kohchang', name: '象島', color: 'sky' }
    ];

    // --- 核心交通邏輯區 ---
    const formatTime = (h) => {
      let hh = Math.floor(h) % 24;
      let mm = Math.round((h - Math.floor(h)) * 60);
      if (mm === 60) { hh++; mm = 0; }
      return `${hh.toString().padStart(2, '0')}:${mm.toString().padStart(2, '0')}`;
    };

    const getCityColor = (cityId) => {
      const colors = { bangkok: 'blue', pattaya: 'rose', ayutthaya: 'amber', huahin: 'teal', kanchanaburi: 'emerald', rayong: 'indigo', kohchang: 'sky' };
      const c = colors[cityId] || 'slate';
      return `text-${c}-600 bg-${c}-100 border-${c}-200`;
    };

    const getSmartTransit = (prev, curr) => {
      if (curr.id === 'ret') return '✈️ 【準備回國】搭乘機場快線(ARL)、機場巴士或預約專車前往機場報到。';

      if (!prev || prev.id === 'accommodation' || prev.type === '起點') {
        if (curr.type === '機場') return `🛬 【抵達泰國】搭乘專車或機場快線/巴士前往市區 ${curr.name}。`;
        return `🏨 【出發前往】出發前往 ${curr.name}。`;
      }

      if (prev.city !== curr.city && prev.id !== 'bangkok_origin') {
         let text = '';
         if (prev.city === 'bangkok' && curr.city === 'ayutthaya') text = '搭乘火車，或搭乘 Minivan，亦可線上預約包車直達 (車程約 1.5~2 小時)。';
         else if (prev.city === 'bangkok' && curr.city === 'pattaya') text = '前往 Ekkamai 東部巴士總站搭乘大巴，或線上預約包車直達 (車程約 2.5 小時)。';
         else if (prev.city === 'bangkok' && curr.city === 'huahin') text = '前往南部巴士總站 / Mochit 搭乘 Minivan，或線上預約專車直達 (車程約 3~4 小時)。';
         else if (prev.city === 'bangkok' && curr.city === 'kanchanaburi') text = '於吞武里火車站搭火車，或於南部巴士總站搭 Minivan (車程約 2.5~3 小時)。';
         else if (prev.city === 'bangkok' && curr.city === 'rayong') text = '前往 Ekkamai 東部巴士總站搭乘大巴士至羅勇 (車程約 3~3.5 小時)。';
         else if (prev.city === 'bangkok' && curr.city === 'kohchang') text = '搭乘大巴前往達叻府 (Trat) 碼頭，再轉乘渡輪登島 (總車程約 5.5 小時)。';
         else text = `搭乘跨府大巴、Minivan 或預約專車，從 ${CITIES.find(c=>c.id===prev.city)?.name} 前往 ${CITIES.find(c=>c.id===curr.city)?.name}。`;
         return `🚐 【跨府長途轉乘】${text}\n💡 建議：跨城移動請提早確認班次或預約接送。`;
      }

      return `🚖 【市區交通銜接】從 ${prev.name} 前往 ${curr.name}。`;
    };

    // --- 主應用程式 ---
    function App() {
      const [activeCity, setActiveCity] = useState('bangkok');
      const [selectedIds, setSelectedIds] = useState([]);
      const [showPrintView, setShowPrintView] = useState(false);
      const [tripDuration, setTripDuration] = useState(5);

      const toggleAttr = (id) => setSelectedIds(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

      const itineraryDays = useMemo(() => {
        if (selectedIds.length === 0) return [];

        let idsToSchedule = [...selectedIds];
        // 綁定邏輯 (丹能沙朵 & 美功)
        if (idsToSchedule.includes('damnoen_saduak') || idsToSchedule.includes('maeklong')) {
            if (!idsToSchedule.includes('damnoen_saduak')) idsToSchedule.push('damnoen_saduak');
            if (!idsToSchedule.includes('maeklong')) idsToSchedule.push('maeklong');
        }
        idsToSchedule = [...new Set(idsToSchedule)];

        // 基礎分類判斷
        // 古城不視為「近郊」防綁定
        const isSuburb = (a) => a && a.id !== 'ancient_city' && (['近郊特色'].includes(a.type) || ['damnoen_saduak', 'maeklong', 'amphawa', 'koh_kret'].includes(a.id) || a.regionName.includes('郊'));
        const isNightMarket = (a) => a && (a.type === '熱門市集' || a.type === '夜市區' || a.name.includes('夜市') || a.id === 'yaowarat' || a.id === 'khaosan' || a.name.includes('中國城') || a.id === 'asiatique');

        // 排序權重定義 (確保城市分群與換匯強制首段行程)
        const getPriority = (item) => {
            if (item.id === 'ret') return 999;
            if (item.type === '起點') return 10;
            if (item.type === '機場') return 15;
            if (item.type === '換匯推薦' && item.region === 10) return 18; // 機場換匯：排在機場後
            if (item.type === '住宿區域') return 20; // 住宿地
            if (item.type === '換匯推薦' && item.region !== 10) return 25; // 市區換匯：強制接在住宿放行李後
            
            if (isNightMarket(item)) return 90; // 夜市強制排最後
            
            let win = item.timeWindow || [9.5, 21.5];
            if (win[1] <= 12) return 30; // 早市
            if (isSuburb(item)) return 40; // 郊區
            
            return 50; // 一般景點
        };

        const sorted = idsToSchedule
          .map(id => ATTRACTIONS.find(a => a.id === id))
          .filter(a => a)
          .sort((a, b) => {
            const getSortKey = (item) => {
              let r = item.region || 50; 
              let sk = getPriority(item);
              // 若為外府行程，用 City Index 強制將同城市的資料分群綁定
              let cityGroup = item.city !== 'bangkok' ? 50 + CITIES.findIndex(c => c.id === item.city) : Math.floor(r / 10);
              return cityGroup * 100000 + sk * 1000 + r; 
            };
            return getSortKey(a) - getSortKey(b);
          });

        let remaining = [...sorted];
        let days = [];
        
        // ★ 第一天強制從 12:00 開始
        let curDay = { items: [], dayCity: 'bangkok', dayType: null, currentTime: 12.0 }; 
        let lCity = 'bangkok', lReg = 14;
        let prevItemObj = null; 
        let forceNextId = null;

        // 交通時間計算 (精準修正近郊車程 1.5h)
        const getTTime = (isNewDay, fCity, tCity, fReg, tReg) => {
            // 跨城市移動
            if (fCity && tCity && fCity !== tCity) {
                if (tCity === 'kohchang' || fCity === 'kohchang') return 5.5;
                if (tCity === 'rayong' || fCity === 'rayong') return 3.5;
                if (tCity === 'huahin' || fCity === 'huahin') return 3.5;
                if (tCity === 'kanchanaburi' || fCity === 'kanchanaburi') return 2.5;
                if (tCity === 'pattaya' || fCity === 'pattaya') return 2.5;
                if (tCity === 'ayutthaya' || fCity === 'ayutthaya') return 1.5;
                return 2.5;
            }
            
            // 同一天行程之間的移動
            if (fReg === 40 || tReg === 40) return 2.0;
            // 曼谷市區與近郊(水上市場區/陶瓷島)之間移動 -> 精準 1.5h
            if (fReg === 16 || tReg === 16) {
                if (fReg === 16 && tReg === 16) return 0.5; // 丹能沙朵 -> 美功 (0.5h)
                return 1.5; // 曼谷市區 <-> 水上市場 (1.5h)
            }
            
            if (isNewDay) {
                if (tReg === 19) return 1.0; 
                if (tReg === 52 || tReg === 53 || tReg === 54 || tReg === 55) return 1.0; 
                return 0.5; 
            }
            
            return (fReg !== tReg ? 1.0 : 0.5);
        };

        const checkValid = (a, isF, curTime) => {
            // 第一天強制不可排近郊景點
            if (days.length === 0 && (isSuburb(a) || a.id === 'ancient_city')) return false;

            let tTime = getTTime(isF, lCity, a.city, lReg, a.region);
            let arrivalTime = curTime + tTime;
            let isLastDay = days.length === tripDuration - 1;
            
            if (!isF) {
                let isBasic = ['住宿區域', '機場', '起點', '換匯推薦'].includes(a.type);
                if (!isBasic) {
                    // 同城市強制排同天，不夠才排到隔天
                    if (a.city !== curDay.dayCity) return false; 
                    
                    // 近郊獨立一天：若今天是曼谷市區日，不可插近郊
                    if (isSuburb(a) && curDay.dayType === 'city') return false; 
                    
                    // 若今天是近郊日，允許插入「17:00後」的夜市或按摩行程 (有空檔補曼谷)
                    if (curDay.dayType === 'suburb' && !isSuburb(a)) {
                        let win = a.timeWindow || [9.5, 21.5];
                        if (win[0] < 17 && a.type !== '泰式按摩') return false; 
                    }
                }
            }

            let win = a.timeWindow || [9.5, 21.5]; 
            if (['住宿區域', '機場', '換匯推薦'].includes(a.type)) win = [0, 24];

            let waitTime = 0;
            if (arrivalTime < win[0]) {
                waitTime = win[0] - arrivalTime;
                // 一般行程等太久就先跳過 (換匯除外)
                if (waitTime > 3.0 && !isF && a.type !== '換匯推薦') return false; 
            }

            let actStart = arrivalTime + waitTime;
            let actEnd = actStart + a.stay;

            if (actStart >= win[1]) return false; // 抵達時已過營業時間
            
            // 最後一天的時間必須鎖死，確保能接上 14:00 結束
            if (isLastDay) {
                let retTFromA = getTTime(false, a.city, 'bangkok', a.region, 10);
                let maxEndTime = 14.0 - 2.5 - retTFromA; 
                if (actEnd > maxEndTime) return false;
            } else {
                if (!isF && actEnd > 21.5) return false; // 每天不超過 21:30
            }

            return { valid: true, tTime, waitTime, actStart, actEnd };
        };

        while (remaining.length > 0) {
            const isF = curDay.items.length === 0;
            let chosenIdx = -1;
            let chosenStats = null;

            // 1. 強制連動 
            if (forceNextId) {
                let fIdx = remaining.findIndex(a => a.id === forceNextId);
                if (fIdx !== -1) {
                    let stats = checkValid(remaining[fIdx], isF, curDay.currentTime);
                    if (stats && stats.valid) {
                        chosenIdx = fIdx;
                        chosenStats = stats;
                    }
                }
                forceNextId = null; 
            }

            // 2. 全域智慧搜尋 (尋找最適合的行程)
            if (chosenIdx === -1) {
                let validCands = [];
                for (let i = 0; i < remaining.length; i++) {
                    let stats = checkValid(remaining[i], isF, curDay.currentTime);
                    if (stats && stats.valid) {
                        validCands.push({ a: remaining[i], idx: i, prio: getPriority(remaining[i]), stats });
                    }
                }

                if (validCands.length > 0) {
                    // 排序: 1.優先權 2.車程 3.營業結束時間
                    validCands.sort((ca, cb) => {
                        if (ca.prio !== cb.prio) return ca.prio - cb.prio;
                        if (ca.stats.tTime !== cb.stats.tTime) return ca.stats.tTime - cb.stats.tTime;
                        let winA = ca.a.timeWindow || [9.5, 21.5];
                        let winB = cb.a.timeWindow || [9.5, 21.5];
                        return winA[1] - winB[1];
                    });
                    chosenIdx = validCands[0].idx;
                    chosenStats = validCands[0].stats;
                }
            }

            // 3. 本日真的塞不下了，強制換天
            if (chosenIdx === -1) {
                days.push(curDay);
                // 智慧刪除邏輯：若天數已滿，直接中斷
                if (days.length >= tripDuration) break;
                
                curDay = { items: [], dayCity: remaining[0].city, dayType: null, currentTime: 9.5 };
                continue;
            }

            const a = remaining.splice(chosenIdx, 1)[0];
            const { tTime, waitTime, actStart, actEnd } = chosenStats;

            // 設定綁定下一個行程
            if (a.id === 'terminal21') forceNextId = 'lets_relax';
            if (a.id === 'lets_relax') forceNextId = 'terminal21';
            if (a.id === 'damnoen_saduak') forceNextId = 'maeklong';
            if (a.id === 'maeklong') forceNextId = 'damnoen_saduak';

            if (isF && days.length === 0) prevItemObj = { id: 'bangkok_origin', city: 'bangkok', name: '曼谷市區 (預設出發地)', type: '起點' };
            if (isF && days.length > 0) prevItemObj = { id: 'accommodation', city: a.city, name: '住宿地', type: '住宿區域' }; 

            let finalTTime = tTime;
            // 若為同商場免車程
            if (prevItemObj && ((a.id === 'lets_relax' && prevItemObj.id === 'central_world') || (a.id === 'central_world' && prevItemObj.id === 'lets_relax'))) {
                finalTTime = 0; 
            }

            let sTime = curDay.currentTime;
            let aTime = sTime + finalTTime;
            let finalWaitTime = actStart - aTime; 

            let transitMsg = getSmartTransit(prevItemObj, a);
            transitMsg += `\n📍 路線指南：${a.transport}`;
            
            let win = a.timeWindow || [9.5, 21.5];
            if (finalWaitTime > 0 && win[0] > 0 && !['住宿區域', '機場', '換匯推薦'].includes(a.type)) {
                transitMsg += `\n💡 建議：此行程建議 ${win[0]}:00 後開始，預計 ${formatTime(aTime)} 抵達，可於周邊稍作休息。`;
            } else if (a.type === '換匯推薦' && finalWaitTime > 0) {
                transitMsg += `\n💡 建議：預計 ${formatTime(aTime)} 抵達，若尚未開始營業可先於附近等待。`;
            }

            if (finalTTime === 0 && prevItemObj && prevItemObj.id.includes('central_world')) {
                transitMsg = '📍 位於同一百貨內，無須車程，直接步行前往。';
            }

            let isFirstAirport = (days.length === 0 && isF && a.type === '機場');

            curDay.items.push({
                ...a, tTime: finalTTime, prevName: prevItemObj.name, transitTransport: transitMsg,
                tStr: `${formatTime(sTime)} - ${formatTime(aTime)}`,
                sStr: isFirstAirport ? '到達曼谷' : `${formatTime(actStart)} - ${formatTime(actEnd)}`,
                isFirstAirport,
                endTime: actEnd
            });

            curDay.currentTime = actEnd;
            lCity = a.city; lReg = a.region; prevItemObj = a;
            
            if (isF) curDay.dayCity = a.city;
            if (isSuburb(a)) curDay.dayType = 'suburb'; 
            else if (!['住宿區域','機場','換匯推薦'].includes(a.type)) curDay.dayType = 'city';
        }
        
        // 如果天數還沒滿，繼續把空天數塞進去
        if (curDay.items.length > 0 && days.length < tripDuration) {
            days.push(curDay);
        }
        while (days.length < tripDuration) {
            days.push({ items: [], dayCity: lCity, dayType: null, currentTime: 9.5 });
        }

        // ================= ★ 壓軸機場 (強制定死在最後一天 14:00) =================
        let lastD = days[days.length-1];
        if (!lastD) {
            lastD = { items: [], dayCity: 'bangkok', dayType: null, currentTime: 9.5 };
            days.push(lastD);
        }
        
        let retT = getTTime(lastD.items.length === 0, lCity, 'bangkok', lReg, 10);

        // 如果最後一天加上前往機場的時間超過了 14:00，把超過限制的行程吐掉
        while (lastD.items.length > 0) {
            let lastItem = lastD.items[lastD.items.length-1];
            let testRetT = getTTime(false, lastItem.city, 'bangkok', lastItem.region, 10);
            if (lastItem.endTime > (14.0 - 2.5 - testRetT)) {
                lastD.items.pop();
            } else {
                break;
            }
        }

        if (lastD.items.length > 0) {
            let lastItem = lastD.items[lastD.items.length-1];
            lastD.currentTime = lastItem.endTime;
            lCity = lastItem.city;
            lReg = lastItem.region;
            prevItemObj = lastItem;
        } else {
            lastD.currentTime = 9.5;
            lReg = 14;
            prevItemObj = { name: '住宿地', city: lCity };
        }
        
        retT = getTTime(lastD.items.length === 0, lCity, 'bangkok', lReg, 10);
        let startTransit = 14.0 - 2.5 - retT;
        let transitMsg = '🚐 搭乘機場快線、機場巴士或預約專車前往機場報到。';
        
        if (lastD.currentTime < startTransit) {
            transitMsg = `💡 距離前往機場還有空檔時間，建議於 ${formatTime(startTransit)} 準備出發。\n🚐 搭乘機場快線、機場巴士或預約專車前往機場。`;
        }
        
        let retPrev = prevItemObj || {name: '住宿地', city: 'bangkok'};
        lastD.items.push({
            id: 'ret', city: 'bangkok', name: '結束旅程前往機場回國', stay: 2.5, region: 999, regionName: '機場', type: '機場',
            desc: '祝您有趟完美的泰國回憶！請務必提早報到。', transport: '於飯店或最後行程地點搭乘機場快線或預約專車。',
            tTime: retT, prevName: retPrev.name, transitTransport: transitMsg,
            tStr: `${formatTime(startTransit)} - ${formatTime(14.0 - 2.5)}`,
            sStr: `${formatTime(14.0 - 2.5)} - 14:00`,
            isFirstAirport: false,
            endTime: 14.0
        });
        
        lastD.currentTime = 14.0;

        return days.map((d, i) => {
          const base = (i === 0 && d.items[0]?.isFirstAirport ? 12.0 : (i === 0 ? 12.0 : 9.5));
          const end = d.currentTime;
          return { dayNum: i+1, totalH: (end - base > 0 ? (end - base).toFixed(1) : "0.0"), cityName: CITIES.find(c => c.id === d.dayCity)?.name || '曼谷', items: d.items };
        });
      }, [selectedIds, tripDuration]);

      if (showPrintView) {
        return (
          <div className="min-h-screen bg-white p-8">
            <div className="max-w-3xl mx-auto border-2 border-slate-800 p-8 rounded-2xl">
              <div className="text-center mb-10"><h1 className="text-3xl font-bold">🇹🇭 專屬泰國自由行 行程表</h1><p className="mt-2 text-slate-500">選擇您想去的行程再選擇天數</p></div>
              {itineraryDays.map(d => (
                <div key={d.dayNum} className="mb-10 print-break-avoid">
                  <h2 className="text-xl font-bold border-b-2 pb-2 mb-6">🌞 第 {d.dayNum} 天 - 【{d.cityName}】 ({d.totalH}h)</h2>
                  <div className="space-y-6 ml-4 border-l-2 pl-6 border-slate-300">
                    {d.items.map((it, idx) => (
                      <div key={`${it.id}-${idx}`} className="relative mb-8">
                        {!it.isFirstAirport && (
                          <div className="mb-4 bg-slate-50 border border-slate-200 rounded-lg p-3 text-sm">
                             <div className="font-bold mb-2">{it.prevName} ➔ {it.name}</div>
                             <div className="flex gap-3 mb-2"><span className="bg-white px-2 py-1 rounded border font-mono text-blue-500"><i className="fa-regular fa-clock"></i> {it.tStr}</span><span>車程：{it.tTime}h</span></div>
                             <div className="whitespace-pre-wrap text-slate-600">{it.transitTransport}</div>
                          </div>
                        )}
                        <div className="relative">
                          <div className="absolute -left-[31px] top-1 w-3 h-3 bg-blue-500 rounded-full border-2 border-white"></div>
                          <div className="font-bold text-sm text-slate-500 mb-1"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : '停留：'}{it.sStr}</div>
                          <h4 className="text-xl font-bold text-slate-900">{it.name}</h4>
                          <p className="text-sm text-slate-600 my-2 leading-relaxed">{it.desc}</p>
                          {it.bookingLinks && <div className="mt-3 flex gap-2 flex-wrap print:hidden">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" className="bg-[#ff5b00] text-white text-xs px-2.5 py-1.5 rounded font-bold hover:bg-[#e05000]">🎟️ {l.text}</a>)}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              <div className="mt-10 text-center print-hidden">
                <button onClick={() => setShowPrintView(false)} className="bg-slate-800 text-white px-6 py-2 rounded-xl font-bold mr-4 hover:bg-slate-700">返回編輯</button>
                <button onClick={() => window.print()} className="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold hover:bg-blue-500">列印行程</button>
              </div>
            </div>
          </div>
        );
      }

      const grouped = ATTRACTIONS.filter(a => a.city === activeCity).reduce((acc, c) => { (acc[c.type] = acc[c.type] || []).push(c); return acc; }, {});

      return (
        <div className="min-h-screen bg-slate-50 pb-10">
          <header className="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-20 border-b">
            <div className="flex items-center gap-4">
              <h1 className="font-bold text-xl flex items-center gap-2"><i className="fa-solid fa-plane-departure text-blue-600"></i>泰國行程魔法師</h1>
              <a href="https://linkuei0425.github.io/BANGKOK/" className="flex items-center gap-1.5 text-xs font-bold text-slate-500 hover:text-blue-600 bg-slate-100 hover:bg-blue-50 px-3 py-1.5 rounded-full transition-colors border border-slate-200 hover:border-blue-200 shadow-sm">
                <i className="fa-solid fa-house"></i><span>回到首頁</span>
              </a>
            </div>
            <div className="text-xs font-bold bg-slate-800 text-white px-3 py-1 rounded-full shadow-sm">已選 {selectedIds.length} 站</div>
          </header>
          <main className="max-w-7xl mx-auto p-4 flex flex-col lg:flex-row gap-6">
            <div className="lg:w-1/2 flex flex-col gap-4">
              <div className="bg-white p-2 rounded-xl flex gap-2 overflow-x-auto shadow-sm custom-scrollbar">
                {CITIES.map(c => <button key={c.id} onClick={() => setActiveCity(c.id)} className={`px-5 py-2.5 rounded-lg text-sm font-bold whitespace-nowrap transition-all duration-200 ${activeCity === c.id ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 hover:bg-slate-200 text-slate-600'}`}>{c.name}</button>)}
              </div>
              <div className="max-h-[70vh] overflow-y-auto space-y-6 pr-2 custom-scrollbar">
                {Object.entries(grouped).map(([type, items]) => (
                  <div key={type} className="mb-6">
                    <h3 className="font-bold text-slate-700 mb-3 sticky top-0 bg-slate-50/90 py-2 backdrop-blur-sm z-10 border-b border-slate-200">{type}</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      {items.map(it => (
                        <div key={it.id} onClick={() => toggleAttr(it.id)} className={`p-4 rounded-xl cursor-pointer border-2 transition-all duration-200 ${selectedIds.includes(it.id) ? 'bg-blue-50 border-blue-500 scale-[1.02] shadow-md' : 'bg-white border-transparent shadow-sm hover:border-slate-300'}`}>
                          <div className="font-bold text-slate-900 leading-tight mb-2">{it.name}</div>
                          <div className="text-[10px] flex gap-2"><span className="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600"><i className="fa-regular fa-clock mr-1"></i>{it.stay}h</span><span className={`px-1.5 py-0.5 rounded border ${getCityColor(it.city)}`}><i className="fa-solid fa-location-dot"></i> {it.regionName}</span></div>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div className="lg:w-1/2">
              <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col max-h-[85vh] sticky top-24">
                <div className="bg-slate-800 text-white p-5 lg:p-6">
                  <h2 className="text-xl font-bold flex items-center gap-2"><i className="fa-regular fa-calendar-check text-blue-400"></i>您的行程表</h2>
                  <p className="text-xs opacity-80 mt-1.5">💡 已啟用智慧排程：若行程過多將為您自動刪減以符合天數</p>
                  
                  <div className="flex flex-row gap-2 mt-4">
                    <select 
                      value={tripDuration} 
                      onChange={(e) => setTripDuration(Number(e.target.value))}
                      className="bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-4 rounded-xl outline-none cursor-pointer transition-colors shadow-lg border border-slate-600"
                      title="選擇旅遊總天數"
                    >
                      <option value={4}>4 日遊</option>
                      <option value={5}>5 日遊</option>
                      <option value={6}>6 日遊</option>
                      <option value={7}>7 日遊</option>
                    </select>
                    <button onClick={() => setShowPrintView(true)} disabled={itineraryDays.length === 0} className="flex-1 bg-blue-500 hover:bg-blue-600 py-3 rounded-xl font-bold shadow-lg transition-all disabled:opacity-30 disabled:cursor-not-allowed text-white">產出詳細行程 (包含線上優惠)</button>
                  </div>
                </div>
                <div className="p-6 overflow-y-auto flex-1 custom-scrollbar bg-slate-50/50">
                  {itineraryDays.length === 0 ? <div className="text-center text-slate-400 py-24 flex flex-col items-center gap-4"><i className="fa-solid fa-map text-6xl opacity-10"></i><p>尚未選擇任何景點</p></div> : 
                    itineraryDays.map(d => (
                      <div key={d.dayNum} className="mb-10">
                        <h3 className="font-bold text-lg mb-4 border-b-2 border-slate-200 pb-2 flex items-center gap-2 text-slate-800"><i className="fa-solid fa-sun text-orange-500"></i> 第 {d.dayNum} 天 - 【{d.cityName}】 <span className="text-xs font-normal text-slate-400 ml-auto">總計: {d.totalH}h</span></h3>
                        <div className="space-y-5 border-l-[3px] border-slate-200 ml-4 pl-7 relative pb-4">
                          {d.items.map((it, idx) => (
                            <div key={`${it.id}-${idx}`} className="relative mb-6">
                              {!it.isFirstAirport && (
                                <div className="mb-4 relative">
                                  <div className="absolute -left-[40px] top-1/2 -translate-y-1/2 w-4 h-4 bg-slate-100 rounded-full border-2 border-slate-300 flex items-center justify-center shadow-sm z-10"><i className="fa-solid fa-arrow-down text-[8px] text-slate-400"></i></div>
                                  <div className="bg-blue-50/70 rounded-lg p-3 text-[11px] border border-blue-100 shadow-sm">
                                    <div className="font-bold text-blue-800 mb-1.5">{it.prevName} ➔ {it.name}</div>
                                    <div className="flex items-center gap-3 mb-1.5"><span className="bg-white px-2 py-0.5 rounded border border-blue-200 font-mono text-blue-600 shadow-sm"><i className="fa-regular fa-clock mr-1"></i> {it.tStr}</span><span className="text-blue-600 font-medium">車程 {it.tTime}h</span></div>
                                    <div className="text-slate-600 whitespace-pre-wrap leading-relaxed">{it.transitTransport}</div>
                                  </div>
                                </div>
                              )}
                              <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative hover:shadow-md transition-shadow">
                                <div className="absolute -left-[37px] top-4 w-4.5 h-4.5 bg-blue-500 rounded-full border-[3px] border-white shadow-sm z-10"></div>
                                <div className="text-xs font-bold text-slate-400 mb-1"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : '停留: '}{it.sStr}</div>
                                <h4 className="font-bold text-base mb-1">{it.name}</h4>
                                <p className="text-xs text-slate-500 leading-relaxed">{it.desc}</p>
                                {it.bookingLinks && <div className="mt-3 flex gap-1.5 flex-wrap">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-[9px] px-2.5 py-1 rounded-lg font-bold transition-colors shadow-sm"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))
                  }
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
