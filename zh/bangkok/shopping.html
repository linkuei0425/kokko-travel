        // 負責渲染卡片的函數
        function renderCards(category) {
            const container = document.getElementById('shop-container');
            container.innerHTML = ''; // 清空現有內容

            const filteredData = shopData.filter(item => item.cat === category);

            filteredData.forEach((shop, index) => {
                const delay = index * 50; // 簡單的進場動畫延遲
                
                const card = document.createElement('div');
                card.className = `bg-white rounded-2xl shadow-sm border border-gray-100 p-6 hover:shadow-lg transition-shadow duration-300 transform hover:-translate-y-1 animate-fade-in`;
                card.style.animationDelay = `${delay}ms`;
                
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-4">
                        <h3 class="text-xl font-bold text-gray-800">${shop.name}</h3>
                    </div>
                    <div class="space-y-3">
                        <div class="flex items-start">
                            <i class="fa-solid fa-star text-yellow-400 mt-1 mr-3 w-4 text-center"></i>
                            <div>
                                <p class="text-xs text-gray-400 font-semibold mb-1">特色商品</p>
                                <p class="text-sm text-gray-700">${shop.feature}</p>
                            </div>
                        </div>
                        <div class="flex items-start">
                            <i class="fa-solid fa-location-dot text-red-400 mt-1 mr-3 w-4 text-center"></i>
                            <div>
                                <p class="text-xs text-gray-400 font-semibold mb-1">購買地點</p>
                                <p class="text-sm text-gray-700 font-medium">${shop.loc}</p>
                            </div>
                        </div>
                        <div class="flex items-start">
                            <i class="fa-solid fa-train-subway text-indigo-400 mt-1 mr-3 w-4 text-center"></i>
                            <div>
                                <p class="text-xs text-gray-400 font-semibold mb-1">交通方式</p>
                                <span class="inline-block bg-indigo-50 text-indigo-700 text-xs px-2 py-1 rounded-md font-medium">${shop.transit}</span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 點擊分類按鈕的處理邏輯
        function filterCategory(category, btnElement) {
            // 移除所有按鈕的 active 狀態
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));

            // 為當前點擊的按鈕加上 active 狀態
            btnElement.classList.add('active');

            // 渲染對應的資料
            renderCards(category);
        }

        // 新增簡單的進場動畫 CSS
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
                animation: fadeIn 0.5s ease-out forwards;
                opacity: 0;
            }
        `;
        document.head.appendChild(style);

        // 初始載入時顯示第一類 (潮牌推薦)
        window.onload = () => {
            const firstBtn = document.querySelector('.tab-btn');
            filterCategory('streetwear', firstBtn);
        };
    </script>
