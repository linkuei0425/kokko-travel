                        { name: "Kanom Krok Bai Toey", feature: "恰圖恰人氣攤位，現烤的香蘭葉綠色傳統小糕點，帶微焦邊緣。", address: "Section 22, Chatuchak Market / BTS Mo Chit 站步行 8 分。" }
                    ],
                    "cafe": [
                        { name: "Nana Coffee Roasters Ari", feature: "屢獲殊榮老屋改造熱帶花園，陽光穿透樹葉灑落紅磚建築。", address: "24/2 Ari 4 Fang Tai Alley / BTS Ari 站步行 8 分。" },
                        { name: "Porcupine Café", feature: "白色洞穴風格設計，搭配溫潤木質傢俱與乾燥花，充滿波希米亞風。", address: "48 Ari 4 Fang Nua Alley / BTS Ari 站步行 7 分。" },
                        { name: "Bar Storia del Caffè", feature: "歐式復古綠色外牆，坐在戶外座位區彷彿置身於歐洲街頭。", address: "13 Ari 4 Fang Nua Alley / BTS Ari 站步行 7 分。" },
                        { name: "Yellow Lane", feature: "結合早午餐與庭院的慢活風格，大片草皮非常適合放鬆。", address: "2/16 Phahon Yothin 5 Alley / BTS Ari 站步行 8 分。" }
                    ],
                    "rooftop_seafood": [
                        { name: "Blue Sky Rooftop Bar", feature: "俯瞰恰圖恰公園的巨大綠地與曼谷北部的遼闊天際線，視野震撼。", address: "24th Floor, Centara Grand Ladprao, 1695 Phahon Yothin Rd / BTS Ha Yaek Lat Phrao 站步行 3 分。" },
                        { name: "Dumbo Jazz & Vinyl Bar", feature: "美式復古爵士酒吧，黑膠與霓虹燈交織，平視 BTS 列車駛過。", address: "6th Floor, INN-Office Building, Phahon Yothin Rd / BTS Saphan Khwai 站步行 2 分。" },
                        { name: "Best Beef (Saphan Khwai 吃到飽)", feature: "高品質肉類與帶殼海鮮、新鮮活蝦烤肉吃到飽，平價且氣氛熱鬧。", address: "1530 Phahon Yothin Rd / BTS Saphan Khwai 站步行 5 分。" },
                        { name: "Or Tor Kor Seafood Center", feature: "曼谷最乾淨貴婦市場，眾多提供頂級烤大蝦、蟹肉與生蠔的現點現吃攤位。", address: "Or Tor Kor Market, Kamphaeng Phet Rd / MRT Kamphaeng Phet 站步行 2 分。" }
                    ]
                }
            }
        };

        const categoriesMap = {
            "michelin": { name: "🌟 米其林推薦", color: "bg-red-100 text-red-700 hover:bg-red-500 hover:text-white border-red-500" },
            "greenbowl": { name: "🟢 綠碗公認證", color: "bg-green-100 text-green-700 hover:bg-green-500 hover:text-white border-green-500" },
            "dessert": { name: "🍧 甜點飲料", color: "bg-pink-100 text-pink-700 hover:bg-pink-500 hover:text-white border-pink-500" },
            "cafe": { name: "☕ 咖啡廳", color: "bg-amber-100 text-amber-700 hover:bg-amber-500 hover:text-white border-amber-500" },
            "rooftop_seafood": { name: "🍸 高空酒吧&海鮮", color: "bg-purple-100 text-purple-700 hover:bg-purple-500 hover:text-white border-purple-500" }
        };

        let currentRegion = "";
        let currentCategory = "";

        // Elements
        const regionContainer = document.getElementById('region-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const categorySection = document.getElementById('category-section');
        const contentArea = document.getElementById('content-area');

        // Render Regions
        function initRegions() {
            Object.keys(db).forEach(key => {
                const btn = document.createElement('button');
                btn.className = "whitespace-nowrap px-4 py-2 rounded-full border border-gray-300 bg-white text-gray-700 font-medium hover:bg-blue-500 hover:text-white hover:border-blue-500 transition-colors";
                btn.innerText = db[key].name;
                btn.onclick = () => selectRegion(key, btn);
                regionContainer.appendChild(btn);
            });
        }

        // Render Categories
        function initCategories() {
            Object.keys(categoriesMap).forEach(key => {
                const config = categoriesMap[key];
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-4 py-2 rounded-full border transition-colors font-medium ${config.color}`;
                btn.innerText = config.name;
                btn.onclick = () => selectCategory(key, btn);
                categoryContainer.appendChild(btn);
            });
        }

        function selectRegion(regionKey, clickedBtn) {
            currentRegion = regionKey;
            
            // Highlight active region
            Array.from(regionContainer.children).forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
                btn.classList.add('bg-white', 'text-gray-700');
            });
            clickedBtn.classList.remove('bg-white', 'text-gray-700', 'hover:bg-blue-500');
            clickedBtn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');

            // Show category section
            categorySection.classList.remove('hidden');
            categorySection.classList.add('fade-in');
            
            // Auto select first category if none selected
            if(!currentCategory) {
                const firstCatBtn = categoryContainer.children[0];
                selectCategory('michelin', firstCatBtn);
            } else {
                renderContent();
            }
        }

        function selectCategory(catKey, clickedBtn) {
            currentCategory = catKey;

            // Highlight active category
            Array.from(categoryContainer.children).forEach(btn => {
                btn.classList.remove('ring-2', 'ring-offset-2', 'ring-blue-500', 'shadow-md');
                btn.style.opacity = "0.6";
            });
            clickedBtn.classList.add('ring-2', 'ring-offset-2', 'ring-blue-500', 'shadow-md');
            clickedBtn.style.opacity = "1";

            renderContent();
        }

        function renderContent() {
            contentArea.innerHTML = '';
            const items = db[currentRegion].categories[currentCategory];

            if(!items || items.length === 0) {
                contentArea.innerHTML = `<p class="col-span-full text-center py-8 text-gray-500">此分類目前無資料</p>`;
                return;
            }

            items.forEach((item, index) => {
                // Generate Google Maps URL
                const encodedQuery = encodeURIComponent(`${item.name} ${item.address.split('/')[0]}`);
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;

                const card = document.createElement('div');
                card.className = "bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col fade-in hover:shadow-md transition-shadow";
                card.style.animationDelay = `${index * 0.05}s`;

                card.innerHTML = `
                    <div class="p-5 flex-grow">
                        <div class="flex justify-between items-start mb-2">
                            <h3 class="text-lg font-bold text-gray-800 leading-tight">${item.name}</h3>
                        </div>
                        <p class="text-gray-600 text-sm mb-4 leading-relaxed"><span class="font-semibold text-gray-700">特色：</span>${item.feature}</p>
                        
                        <div class="bg-gray-50 p-3 rounded-lg flex items-start gap-2 mb-4">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <p class="text-sm text-gray-600 leading-tight">${item.address}</p>
                        </div>
                    </div>
                    
                    <div class="px-5 pb-5 mt-auto">
                        <a href="${mapsUrl}" target="_blank" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 text-white py-2.5 rounded-lg font-medium transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z" clip-rule="evenodd" />
                            </svg>
                            開啟導航
                        </a>
                    </div>
                `;
                contentArea.appendChild(card);
            });
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            initRegions();
            initCategories();
        });

    </script>
</body>
</html>
