                    { name: "Sky Bar at Lebua", feature: "《醉後大丈夫2》拍攝地，標誌性金色圓頂，曼谷最奢華高空酒吧。", address: "63rd Floor, State Tower / BTS Saphan Taksin 站步行 10 分。" }
                ]

        },
        "chinatown": {
            name: "耀華力中國城",
            categories: {
                "michelin": [
                    { name: "胖子粿汁", feature: "乳白色的重胡椒高湯配上捲曲的粿條與酥脆炸燒肉。", address: "408 Yaowarat Rd / MRT Wat Mangkon 站步行 5 分。" }
                ],
                "greenbowl": [
                    { name: "色莫高脆皮燒肉飯", feature: "金黃酥脆的脆皮豬與紅潤叉燒鋪滿白飯，淋上濃稠的紅醬汁。", address: "80 Sukon 1 Alley / MRT Hua Lamphong 站步行 5 分。" }
                ],
                "dessert": [

                ],
                "cafe": [
                    { name: "Lhong Tou Cafe (龍頭)", feature: "創意雙層梯子港式茶樓設計座位，中國城最知名的打卡點。", address: "538 Yaowarat Rd / MRT Wat Mangkon 站步行 4 分。" }
                ],
                "rooftop_seafood": [
                    { name: "T&K Seafood", feature: "中國城最火爆的海鮮攤。炭火直烤的大頭蝦與咖哩炒蟹。", address: "49 Phadung Dao Rd / MRT Wat Mangkon 站步行 5 分。" }
                ]
            }
        },
        "ratchada": {
            name: "拉差達與匯狂區",
            categories: {
                "michelin": [
                    { name: "建興酒家 (拉差達店)", feature: "招牌「咖哩炒蟹」，滑嫩的黃色蛋汁與紅油蟹肉交織，拌飯誘惑力強。", address: "MRT Huai Khwang 站 3 號出口即達。" }
                ],
                "greenbowl": [
                    { name: "光海鮮 (Kuang Seafood)", feature: "大蒜蒸烤生蠔或咖哩炒蟹氣勢驚人，水族箱活跳跳海鮮。", address: "Soi Ratchadaphisek 10 / MRT Huai Khwang 站步行 8 分。" }
                ],
                "dessert": [
                    { name: "Bua Loy Parinya", feature: "匯狂夜市湯圓，七彩爆漿芝麻湯圓浸泡在熱鮮奶中。", address: "Pracha Songkhro Rd / MRT Huai Khwang 站步行 4 分。" }
                ],
                "cafe": [
                    { name: "Casa Lapin", feature: "曼谷知名精品咖啡，木質工業風設計，提供高品質義式咖啡。", address: "Central Plaza Rama 9 / MRT Rama 9 站步行 2 分。" }
                ],
                "rooftop_seafood": [
                    { name: "Vela Rooftop", feature: "高架捷運旁的頂樓露天酒吧，現場 Live Band 演出氣氛熱烈。", address: "BTS Sanam Pao 站步行 1 分。" }
                ]
            }
        },
        "chatuchak": {
            name: "恰圖恰與阿里區",
            categories: {
                "michelin": [
                    { name: "Ong Tong Khao Soi", feature: "黃澄澄椰奶咖哩湯底，頂著金黃酥脆炸麵條，裝在木質餐具中。", address: "BTS Ari 站步行 5 分。" }
                ],
                "greenbowl": [
                    { name: "Thanee Khao Moo Daeng", feature: "阿里區傳奇燒肉，櫥窗裡厚實脆皮豬，切開時清晰可見酥脆層。", address: "BTS Ari 站步行 5 分。" }
                ],
                "dessert": [
                    { name: "Coco JJ", feature: "恰圖恰市集必吃！裝在半殼椰子裡的椰奶冰淇淋，附清涼椰子水。", address: "Chatuchak Market Section 1 / MRT Kamphaeng Phet 站。" }
                ],
                "cafe": [
                    { name: "Nana Coffee Roasters Ari", feature: "屢獲殊榮老屋改造熱帶花園，陽光穿透樹葉灑落紅磚建築。", address: "BTS Ari 站步行 8 分。" }
                ],
                "rooftop_seafood": [
                    { name: "Blue Sky Rooftop Bar", feature: "俯瞰恰圖恰公園巨大綠地與曼谷北部的遼闊天際線，視野震撼。", address: "BTS Ha Yaek Lat Phrao 站步行 3 分。" }
                ]
            }
        }
    };

    const categoriesMap = {
        "michelin": { name: "🌟 米其林推薦", color: "bg-red-100 text-red-700 border-red-500" },
        "greenbowl": { name: "🟢 綠碗公認證", color: "bg-green-100 text-green-700 border-green-500" },
        "dessert": { name: "🍧 甜點飲料", color: "bg-pink-100 text-pink-700 border-pink-500" },
        "cafe": { name: "☕ 咖啡廳", color: "bg-amber-100 text-amber-700 border-amber-500" },
        "rooftop_seafood": { name: "🍸 高空&海鮮", color: "bg-purple-100 text-purple-700 border-purple-500" }
    };

    let currentRegion = "";
    let currentCategory = "";

    const regionContainer = document.getElementById('region-buttons');
    const categoryContainer = document.getElementById('category-buttons');
    const categorySection = document.getElementById('category-section');
    const contentArea = document.getElementById('content-area');

    // 核心功能 1：為 LLM 與爬蟲動態產生語義化隱藏文字 (GEO Optimization)
    function injectSEOAndAAOData() {
        // 注入 AAO 用的 JSON
        document.getElementById('aao-data-source').textContent = JSON.stringify(db);

        // 注入 LLM 用的純文字 HTML 樹狀結構
        const seoContainer = document.getElementById('seo-ai-content-feed');
        let htmlStr = "<ul>";
        Object.keys(db).forEach(regionKey => {
            const region = db[regionKey];
            htmlStr += `<li><h3>${region.name}</h3><ul>`;
            Object.keys(region.categories).forEach(catKey => {
                const catName = categoriesMap[catKey].name;
                htmlStr += `<li><h4>${catName}</h4><ul>`;
                region.categories[catKey].forEach(item => {
                    htmlStr += `<li><strong>${item.name}</strong> - 介紹: ${item.feature} | 地址: ${item.address}</li>`;
                });
                htmlStr += `</ul></li>`;
            });
            htmlStr += `</ul></li>`;
        });
        htmlStr += "</ul>";
        seoContainer.innerHTML += htmlStr;

        // 注入 Schema.org JSON-LD 給傳統 Googlebot
        const schemaData = {
            "@context": "https://schema.org",
            "@type": "ItemList",
            "name": "曼谷必吃美食指南",
            "description": "精選曼谷各區米其林、綠碗公及特色咖啡廳推薦。",
            "itemListElement": []
        };
        
        let position = 1;
        Object.values(db).forEach(region => {
            Object.values(region.categories).forEach(catArray => {
                catArray.forEach(item => {
                    schemaData.itemListElement.push({
                        "@type": "ListItem",
                        "position": position++,
                        "item": {
                            "@type": "Restaurant",
                            "name": item.name,
                            "description": item.feature,
                            "address": {
                                "@type": "PostalAddress",
                                "streetAddress": item.address,
                                "addressLocality": "Bangkok",
                                "addressCountry": "TH"
                            }
                        }
                    });
                });
            });
        });

        const script = document.createElement('script');
        script.type = 'application/ld+json';
        script.text = JSON.stringify(schemaData);
        document.head.appendChild(script);
    }

    // 初始化 UI 元件
    function initRegions() {
        Object.keys(db).forEach(key => {
            const btn = document.createElement('button');
            btn.className = "whitespace-nowrap px-4 py-2 rounded-full border border-gray-300 bg-white text-gray-700 font-medium hover:bg-blue-500 hover:text-white transition-colors focus:outline-none focus:ring-2 focus:ring-blue-500";
            btn.innerText = db[key].name;
            btn.setAttribute('role', 'tab');
            btn.setAttribute('aria-selected', 'false');
            btn.onclick = () => selectRegion(key, btn);
            regionContainer.appendChild(btn);
        });
    }

    function initCategories() {
        Object.keys(categoriesMap).forEach(key => {
            const config = categoriesMap[key];
            const btn = document.createElement('button');
            btn.className = `whitespace-nowrap px-4 py-2 rounded-full border transition-colors font-medium ${config.color} focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-${config.color.split('-')[1]}-500`;
            btn.innerText = config.name;
            btn.setAttribute('role', 'tab');
            btn.setAttribute('aria-selected', 'false');
            btn.onclick = () => selectCategory(key, btn);
            categoryContainer.appendChild(btn);
        });
    }

    function selectRegion(regionKey, clickedBtn) {
        currentRegion = regionKey;
        // 重置狀態
        Array.from(regionContainer.children).forEach(btn => {
            btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
            btn.classList.add('bg-white', 'text-gray-700');
            btn.setAttribute('aria-selected', 'false');
        });
        // 啟用狀態
        clickedBtn.classList.remove('bg-white', 'text-gray-700');
        clickedBtn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');
        clickedBtn.setAttribute('aria-selected', 'true');
        
        categorySection.classList.remove('hidden');
        if(!currentCategory) selectCategory('michelin', categoryContainer.children[0]);
        else renderContent();
    }

    function selectCategory(catKey, clickedBtn) {
        currentCategory = catKey;
        // 重置狀態
        Array.from(categoryContainer.children).forEach(btn => {
            btn.classList.remove('ring-2', 'ring-offset-2', 'shadow-md', 'scale-105');
            btn.style.opacity = "0.6";
            btn.setAttribute('aria-selected', 'false');
        });
        // 啟用狀態
        clickedBtn.classList.add('ring-2', 'ring-offset-2', 'shadow-md', 'scale-105');
        clickedBtn.style.opacity = "1";
        clickedBtn.setAttribute('aria-selected', 'true');
        
        renderContent();
    }

    function renderContent() {
        contentArea.innerHTML = '';
        const items = db[currentRegion].categories[currentCategory];
        
        if(!items || items.length === 0) {
            contentArea.innerHTML = `<p class="col-span-full text-center py-8 text-gray-500 font-medium">此分類目前無資料，請選擇其他類別探索。</p>`;
            return;
        }

        // 生成高語義化 HTML (Semantic HTML + Microdata)
        items.forEach((item, index) => {
            const encodedQuery = encodeURIComponent(`${item.name} Bangkok`);
            const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;
            
            // 使用 article 標籤包裹單一實體，並加入 Microdata 屬性
            const card = document.createElement('article');
            card.className = "bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden flex flex-col fade-in hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1";
            card.style.animationDelay = `${index * 0.05}s`;
            card.setAttribute("itemscope", "");
            card.setAttribute("itemtype", "https://schema.org/Restaurant");
            
            card.innerHTML = `
                <div class="p-5 flex-grow">
                    <header>
                        <h3 class="text-lg font-bold text-gray-800 mb-2" itemprop="name">${item.name}</h3>
                    </header>
                    <p class="text-gray-600 text-sm mb-4 leading-relaxed" itemprop="description">
                        <span class="font-semibold text-gray-700">特色：</span>${item.feature}
                    </p>
                    <address class="bg-gray-50 p-3 rounded-lg flex items-start gap-2 mb-2 not-italic" itemprop="address" itemscope itemtype="https://schema.org/PostalAddress">
                        <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-red-500 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <span class="text-[12px] text-gray-600 leading-tight" itemprop="streetAddress">${item.address}</span>
                    </address>
                </div>
                <div class="px-5 pb-5">
                    <a href="${mapsUrl}" target="_blank" rel="noopener noreferrer" class="w-full flex items-center justify-center gap-2 bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 text-white py-2.5 rounded-lg text-sm font-medium transition-colors" aria-label="在 Google 地圖上開啟 ${item.name} 的導航">
                        <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                        </svg>
                        開啟地圖導航
                    </a>
                </div>
            `;
            contentArea.appendChild(card);
        });
    }

    document.addEventListener('DOMContentLoaded', () => {
        injectSEOAndAAOData(); // 優先注入 SEO/GEO 資料
        initRegions();
        initCategories();
    });
</script>
</body>
</html>
