        const districtContainer = document.getElementById('district-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const contentArea = document.getElementById('content-area');
        let currentDistrictKey = null;
        let currentCategoryName = null;
        const categoriesList = ["五星飯店", "平價飯店", "青年旅館"];

        function initDistrictButtons() {
            Object.keys(hotelData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `px-3 py-2.5 sm:px-4 sm:py-3 rounded-lg font-bold text-[12px] sm:text-sm transition-all duration-200 border area-btn-inactive`;
                btn.innerText = hotelData[key].name;
                btn.onclick = () => selectDistrict(key, btn);
                districtContainer.appendChild(btn);
            });
        }

        function selectDistrict(key, activeBtn) {
            currentDistrictKey = key;
            districtContainer.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('area-btn-active');
                btn.classList.add('area-btn-inactive');
            });
            activeBtn.classList.remove('area-btn-inactive');
            activeBtn.classList.add('area-btn-active');
            categoryContainer.classList.remove('hidden');
            renderCategoryButtons();
        }

        function renderCategoryButtons() {
            categoryContainer.innerHTML = '';
            categoriesList.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-2 py-2 rounded-lg font-bold text-[11px] sm:text-sm transition-all duration-200 border cat-btn-inactive`;
                btn.innerText = cat;
                btn.onclick = () => selectCategory(cat, btn);
                categoryContainer.appendChild(btn);
            });
            selectCategory(categoriesList[0], categoryContainer.querySelector('button'));
        }

        function selectCategory(categoryName, activeBtn) {
            currentCategoryName = categoryName;
            categoryContainer.querySelectorAll('button').forEach(btn => {
                btn.classList.remove('cat-btn-active');
                btn.classList.add('cat-btn-inactive');
            });
            activeBtn.classList.remove('cat-btn-inactive');
            activeBtn.classList.add('cat-btn-active');
            renderHotels();
        }

        function renderHotels() {
            const districtData = hotelData[currentDistrictKey];
            const hotels = districtData.categories[currentCategoryName] || [];
            let htmlContent = `
                <div class="flex flex-col sm:flex-row sm:items-center mb-6 border-b pb-4 border-slate-200 gap-2 fade-in">
                    <h2 class="text-xl sm:text-2xl font-bold text-slate-800">📍 ${districtData.name}</h2>
                    <span class="inline-block w-fit px-3 py-1 bg-blue-100 text-blue-800 text-xs font-bold rounded-full">${currentCategoryName}</span>
                </div>
            `;
            if (hotels.length === 0) {
                htmlContent += `<p class="text-slate-500 py-10 text-center fade-in">此分類目前無推薦資料。</p>`;
            } else {
                htmlContent += `<div class="space-y-4 fade-in">`;
                hotels.forEach((hotel, index) => {
                    const linkTagHTML = hotel.url 
                        ? `<a href="${hotel.url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center px-3 py-1 mt-2 sm:mt-0 rounded-md text-[10px] sm:text-xs font-bold bg-blue-600 text-white hover:bg-blue-700 transition-colors shadow-sm ml-0 sm:ml-3">
                                <svg class="mr-1 h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                                點我看飯店說明
                           </a>`
                        : `<span class="inline-flex items-center px-3 py-1 mt-2 sm:mt-0 rounded-md text-[10px] sm:text-xs font-bold bg-slate-200 text-slate-500 ml-0 sm:ml-3">
                                點我看飯店說明
                           </span>`;
                    htmlContent += `
                        <div class="bg-slate-50 border border-slate-200 p-4 sm:p-5 rounded-lg hover:shadow-md transition-shadow duration-200 group">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-start mb-3">
                                <h4 class="text-base sm:text-lg font-bold text-slate-800 flex items-center">
                                    <span class="text-blue-500 font-mono text-sm sm:text-base mr-2">${index + 1}.</span> 
                                    ${hotel.name}
                                </h4>
                                ${linkTagHTML}
                            </div>
                            <div class="pl-2 sm:pl-6 space-y-2.5">
                                <p class="text-xs sm:text-sm text-slate-600 leading-relaxed">
                                    <span class="font-bold text-slate-700 bg-blue-50 px-1.5 py-0.5 rounded mr-1">特色</span> ${hotel.feature}
                                </p>
                                <p class="text-xs sm:text-sm text-slate-600 leading-relaxed">
                                    <span class="font-bold text-slate-700 bg-slate-200 px-1.5 py-0.5 rounded mr-1">交通</span> ${hotel.address}
                                </p>
                            </div>
                        </div>
                    `;
                });
                htmlContent += `</div>`;
            }
            contentArea.innerHTML = htmlContent;
        }

        document.addEventListener('DOMContentLoaded', () => {
            initDistrictButtons();
            const firstDistrictBtn = districtContainer.querySelector('button');
            if(firstDistrictBtn) selectDistrict('siam', firstDistrictBtn);
        });
    </script>
</body>
</html>
