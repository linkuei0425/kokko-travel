        const TRIP_ALLIANCE_ID = "7913725"; 
        const TRIP_SID = "297495871";         
        const KLOOK_AID = "114993";

        // ==========================================
        // 2. 智慧型防掉單 Deep Link 產生器
        // ==========================================
        function buildTrackingUrl(originalUrl, districtKey, categoryName, index) {
            if (!originalUrl) return "";
            
            try {
                let urlObj = new URL(originalUrl);
                const host = urlObj.hostname;
                
                // 動態生成精準的追蹤碼 (例如：bkk_siam_五星飯店_1)
                const customTracker = `bkk_${districtKey}_${categoryName}_${index + 1}`;
                
                // 判斷是否為 Trip.com 連結
                if (host.includes("trip.com")) {
                    urlObj.searchParams.set('allianceid', TRIP_ALLIANCE_ID);
                    urlObj.searchParams.set('sid', TRIP_SID);
                    urlObj.searchParams.set('ouid', customTracker);
                } 
                // 判斷是否為 Klook 連結
                else if (host.includes("klook.com")) {
                    urlObj.searchParams.set('aid', KLOOK_AID);
                    urlObj.searchParams.set('aff_ext', customTracker);
                    urlObj.searchParams.set('krt', 's22'); 
                }

                return urlObj.toString();
            } catch (e) {
                return originalUrl; // 解析失敗則退回原網址
            }
        }

        // ==========================================
        // 3. 社群內建瀏覽器 (IG/LINE) 阻擋機制

        function checkInAppBrowser() {

            const isThreads = ua.indexOf("Threads") > -1;

                `;
                document.body.insertBefore(banner, document.body.firstChild);
            }
        }

                    "五星飯店": [
                        { name: "Centara Grand at Central Plaza Ladprao", feature: "與大型商場 Central Ladprao 共構，購物覓食極其方便，房間能俯瞰廣大的恰圖恰公園。", address: "1695 Phahonyothin Rd / BTS Ha Yaek Lat Phrao 站步行 2 分鐘。", url: "https://hk.trip.com/hotels/bangkok-hotel-detail-701050/centara-grand-at-central-plaza-ladprao-bangkok/?Allianceid=7913725&SID=297495871&trip_sub1=&trip_sub3=D18632364" },
                        { name: "The Quarter Ari by UHG", feature: "阿里區的地標級四星飯店，頂樓的無邊際高空泳池與健身房視野極佳，時尚且現代。", address: "428 Phahonyothin Rd / BTS Ari 站步行 8 分鐘。", url: "https://hk.trip.com/hotels/bangkok-hotel-detail-22135305/the-quarter-ari-by-uhg/?Allianceid=7913725&SID=297495871&trip_sub1=&trip_sub3=D18632364" },
                        { name: "Best Western Chatuchak", feature: "鄰近洽圖洽市集的新穎連鎖飯店，設備非常乾淨現代，是批貨或週末逛市集首選。", address: "104 Phahonyothin Rd / MRT Kamphaeng Phet 站步行 2 分鐘。", url: "https://hk.trip.com/hotels/bangkok-hotel-detail-105245955/best-western-chatuchak/?Allianceid=7913725&SID=297495871&trip_sub1=&trip_sub3=D18632364" },
                        { name: "Josh Hotel", feature: "曼谷網美必訪的復古風精品飯店！薄荷綠的泳池與周邊的美式復古裝潢，隨處皆可拍。", address: "19/2 Ari Soi 4 (Nua) / BTS Ari 站步行 8 分鐘。", url: "https://hk.trip.com/hotels/bangkok-hotel-detail-6372871/josh-hotel/?Allianceid=7913725&SID=297495871&trip_sub1=&trip_sub3=D18632364" },
                        { name: "Vibe Hotel Bangkok", feature: "充滿活力的年輕品牌，色彩繽紛且設計感十足，離洽圖洽與 BTS 站非常近。", address: "59 Phahonyothin Rd / BTS Sena Nikhom 站步行 5 分鐘。", url: "https://hk.trip.com/hotels/bangkok-hotel-detail-124225015/riva-vibe-hotel-bangkok-by-pcl/?Allianceid=7913725&SID=297495871&trip_sub1=&trip_sub3=D18632364" }
                    ],
                    "平價飯店": [
                        { name: "The Yard Bangkok (提供私人房型)", feature: "原本是知名青旅，其私人房型利用貨櫃屋打造，被庭院的綠植包圍，氣氛超級Chill。", address: "51 Phahonyothin Soi 5 / BTS Ari 站步行 8 分鐘。", url: "https://hk.trip.com/hotels/bangkok-hotel-detail-2070037/the-yard-hostel/?Allianceid=7913725&SID=297495871&trip_sub1=&trip_sub3=D18632364" },
                        { name: "Craftsman Bangkok", feature: "雖為平價預算，但具備極高質感的裝潢與絕美泳池，底下的 Baby Bar 也是熱門打卡點。", address: "34-36 Phahonyothin Soi 11 / 建議搭乘嘟嘟車或計程車抵達。", url: "https://hk.trip.com/hotels/bangkok-hotel-detail-22118795/craftsman-bangkok/?Allianceid=7913725&SID=297495871&trip_sub1=&trip_sub3=D18632364" }
                    ],
                    "青年旅館": [
                        { name: "Bed to Bangkok", feature: "走路就能去逛洽圖洽市集！純白極簡的設計風格，並設有舒適的公共閱讀與辦公區。", address: "1021/1 Phahonyothin Rd / BTS Mo Chit 站步行 5 分鐘。", url: "https://hk.trip.com/hotels/bangkok-hotel-detail-10931191/bed-to-bangkok/?Allianceid=7913725&SID=297495871&trip_sub1=&trip_sub3=D18632364" },
                        { name: "Udee Bangkok Hostel", feature: "老宅改建的溫馨青旅，提供簡單卻美味的泰式自製早餐，像住進當地朋友家一樣。", address: "49 Pradiphat Soi 19 / BTS Saphan Khwai 站步行 12 分鐘。", url: "https://hk.trip.com/hotels/bangkok-hotel-detail-8415913/udee-bangkok-hostel/?Allianceid=7913725&SID=297495871&trip_sub1=&trip_sub3=D18632364" }
                    ]
                }
            }
        };

        const districtContainer = document.getElementById('district-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const contentArea = document.getElementById('content-area');
        
        let currentDistrictKey = null;
        let currentCategoryName = null;

        const categoriesList = ["五星飯店", "平價飯店", "青年旅館"];

        // 1. 初始化區域按鈕
        function initDistrictButtons() {
            Object.keys(hotelData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-3 rounded-lg font-bold text-sm transition-all duration-200 border area-btn-inactive`;
                btn.innerText = hotelData[key].name;
                btn.onclick = () => selectDistrict(key, btn);
                districtContainer.appendChild(btn);
            });
        }

        // 2. 選擇區域
        function selectDistrict(key, activeBtn) {
            currentDistrictKey = key;

            // 更新區域按鈕外觀
            const allBtns = districtContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('area-btn-active');
                btn.classList.add('area-btn-inactive');
            });
            activeBtn.classList.remove('area-btn-inactive');
            activeBtn.classList.add('area-btn-active');

            // 顯示第二層的分類按鈕
            categoryContainer.classList.remove('hidden');
            renderCategoryButtons();
        }

        // 3. 渲染分類按鈕
        function renderCategoryButtons() {
            categoryContainer.innerHTML = '';
            
            categoriesList.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-lg font-bold text-sm transition-all duration-200 border cat-btn-inactive`;
                btn.innerText = cat;
                btn.onclick = () => selectCategory(cat, btn);
                categoryContainer.appendChild(btn);
            });

            // 預設點擊該區第一個分類 (五星飯店)
            const firstCatBtn = categoryContainer.querySelector('button');
            if(firstCatBtn) {
                selectCategory(categoriesList[0], firstCatBtn);
            }
        }

        // 4. 選擇分類並渲染飯店清單
        function selectCategory(categoryName, activeBtn) {
            currentCategoryName = categoryName;

            // 更新分類按鈕外觀
            const allBtns = categoryContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('cat-btn-active');
                btn.classList.add('cat-btn-inactive');
            });
            activeBtn.classList.remove('cat-btn-inactive');
            activeBtn.classList.add('cat-btn-active');

            renderHotels();
        }

        // 5. 渲染飯店資料到畫面
        function renderHotels() {
            const districtData = hotelData[currentDistrictKey];
            const hotels = districtData.categories[currentCategoryName] || [];

            let htmlContent = `
                <div class="flex items-center mb-6 border-b pb-4 border-slate-200">
                    <h2 class="text-2xl font-bold text-slate-800 mr-3">📍 ${districtData.name}</h2>
                    <span class="px-3 py-1 bg-blue-100 text-blue-800 text-sm font-bold rounded-full">${currentCategoryName}</span>
                </div>
            `;

            if (hotels.length === 0) {
                htmlContent += `<p class="text-slate-500 py-10 text-center">此分類目前無推薦資料。</p>`;
            } else {
                htmlContent += `<div class="space-y-4">`;
                
                hotels.forEach((hotel, index) => {
                    
                    // 動態產生帶有追蹤碼的專屬分潤連結
                    const trackingUrl = buildTrackingUrl(hotel.url, currentDistrictKey, currentCategoryName, index);

                    // 根據是否有提供 URL 決定 [飯店說明] 標籤的樣式
                    const linkTagHTML = trackingUrl 
                        ? `<a href="${trackingUrl}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center px-3 py-1 mt-1 sm:mt-0 rounded-md text-xs font-bold bg-blue-600 text-white hover:bg-blue-700 transition-colors shadow-sm cursor-pointer ml-0 sm:ml-3">
                               <svg class="mr-1 h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                               點我看飯店說明
                           </a>`
                        : `<span class="inline-flex items-center px-3 py-1 mt-1 sm:mt-0 rounded-md text-xs font-bold bg-slate-200 text-slate-500 ml-0 sm:ml-3">
                               點我看飯店說明
                           </span>`;

                    htmlContent += `
                        <div class="bg-slate-50 border border-slate-200 p-5 rounded-lg hover:shadow-md transition-shadow duration-200 group">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-start mb-4">
                                <h4 class="text-lg font-bold text-slate-800 flex items-center">
                                    <span class="text-blue-500 font-mono text-base mr-2">${index + 1}.</span> 
                                    ${hotel.name}
                                </h4>
                                ${linkTagHTML}
                            </div>
                            <div class="pl-6 space-y-3">
                                <p class="text-sm text-slate-600 leading-relaxed">
                                    <span class="font-bold text-slate-700 bg-blue-50 px-1.5 py-0.5 rounded mr-1">特色</span> ${hotel.feature}
                                </p>
                                <p class="text-sm text-slate-600 leading-relaxed">
                                    <span class="font-bold text-slate-700 bg-slate-200 px-1.5 py-0.5 rounded mr-1">地址/交通</span> ${hotel.address}
                                </p>
                            </div>
                        </div>
                    `;
                });
                
                htmlContent += `</div>`;
            }

            contentArea.innerHTML = htmlContent;
        }

        // 頁面載入完成後初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkInAppBrowser();
            initDistrictButtons();
            
            // 預設展開第一個區域 (Siam)
            const firstDistrictBtn = districtContainer.querySelector('button');
            if(firstDistrictBtn) {
                selectDistrict('siam', firstDistrictBtn);
            }
        });
    </script>
</body>
</html>
