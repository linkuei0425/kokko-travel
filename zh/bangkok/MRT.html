                    uniquePhysicalStations[baseName] = { name: baseName, en: st.e, codes: [], attractions: st.a };
                }
                uniquePhysicalStations[baseName].codes.push(st.c);
                if (st.a && !uniquePhysicalStations[baseName].attractions.includes(st.a)) {

                }
            });
        });

        // 建立圖 (Graph)
        const graph = {};
        const RIDE_TIME = 2;
        const TRANSFER_TIME = 6;

        function addEdge(u, v, weight, type, line) {
            if (!graph[u]) graph[u] = [];
            graph[u].push({ node: v, weight, type, line });
        }

        Object.keys(mrtData).forEach(lineKey => {
            const lineArr = mrtData[lineKey];
            for (let i = 0; i < lineArr.length - 1; i++) {
                addEdge(lineArr[i].c, lineArr[i+1].c, RIDE_TIME, 'ride', lineKey);
                addEdge(lineArr[i+1].c, lineArr[i].c, RIDE_TIME, 'ride', lineKey);
            }
        });

        Object.values(uniquePhysicalStations).forEach(station => {
            if (station.codes.length > 1) {
                for (let i = 0; i < station.codes.length; i++) {
                    for (let j = i + 1; j < station.codes.length; j++) {
                        let tTime = (station.name.includes('暹羅') || station.name.includes('塔帕')) ? 2 : TRANSFER_TIME; 
                        addEdge(station.codes[i], station.codes[j], tTime, 'transfer', null);
                        addEdge(station.codes[j], station.codes[i], tTime, 'transfer', null);
                    }
                }
            }
        });

        // Dijkstra
        function findShortestPath(startBaseName, endBaseName) {
            if (startBaseName === endBaseName) return null;
            const startCodes = uniquePhysicalStations[startBaseName].codes;
            const endCodes = uniquePhysicalStations[endBaseName].codes;
            const dist = {}; const prev = {}; const pq = [];
            Object.keys(allStationsMap).forEach(node => { dist[node] = Infinity; prev[node] = null; });
            startCodes.forEach(code => { dist[code] = 0; pq.push({ node: code, dist: 0 }); });

            while (pq.length > 0) {
                pq.sort((a, b) => a.dist - b.dist);
                const { node, dist: currentDist } = pq.shift();
                if (dist[node] < currentDist) continue;
                if (endCodes.includes(node)) return reconstructPath(prev, node);
                if (graph[node]) {
                    graph[node].forEach(edge => {
                        const alt = currentDist + edge.weight;
                        if (alt < dist[edge.node]) { dist[edge.node] = alt; prev[edge.node] = { node: node, edgeFromPrev: edge }; pq.push({ node: edge.node, dist: alt }); }
                    });
                }
            }
            return null;
        }

        function reconstructPath(prev, endNode) {
            const path = []; let curr = endNode;
            while (curr) {
                const step = prev[curr];
                if (step) { path.unshift({ node: curr, edge: step.edgeFromPrev }); curr = step.node; }
                else { path.unshift({ node: curr, edge: null }); curr = null; }
            }
            const legs = []; if (path.length < 2) return [];
            let currentLeg = { type: path[1].edge.type, line: path[1].edge.line, nodes: [path[0].node, path[1].node], time: path[1].edge.weight, stops: path[1].edge.type === 'ride' ? 1 : 0 };
            for (let i = 2; i < path.length; i++) {
                const edge = path[i].edge;
                if (edge.type === currentLeg.type && edge.line === currentLeg.line) {
                    currentLeg.nodes.push(path[i].node); currentLeg.time += edge.weight;
                    if(edge.type === 'ride') currentLeg.stops += 1;
                } else {
                    legs.push(currentLeg);
                    currentLeg = { type: edge.type, line: edge.line, nodes: [path[i-1].node, path[i].node], time: edge.weight, stops: edge.type === 'ride' ? 1 : 0 };
                }
            }
            legs.push(currentLeg); return legs;
        }

        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current) {
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    if (className) i.setAttribute('class', className);
                    spanRef.current.innerHTML = '';
                    spanRef.current.appendChild(i);
                    lucide.createIcons({ root: spanRef.current });
                }
            }, [name, className]);
            return <span ref={spanRef} style={{ display: 'contents' }}></span>;
        };

        const App = () => {
            const [startStation, setStartStation] = useState("暹羅");
            const [endStation, setEndStation] = useState("素萬那普機場");
            const [route, setRoute] = useState(null);

            useEffect(() => {
                if(startStation && endStation && startStation !== endStation) {
                    const legs = findShortestPath(startStation, endStation);
                    setRoute(legs);
                } else { setRoute(null); }
            }, [startStation, endStation]);

            const handleSwap = () => { const t = startStation; setStartStation(endStation); setEndStation(t); };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-slate-900 text-white shadow-md pt-12 pb-8 px-6 text-center">
                        <div className="flex items-center justify-center gap-4 mb-3">
                            <a href="https://kokko-travel.com/zh/bangkok/index.html" title="回到首頁" className="inline-flex items-center justify-center text-slate-300 hover:text-white bg-slate-800 hover:bg-slate-700 p-2.5 rounded-full transition-colors">
                                <Icon name="home" className="w-5 h-5" />
                            </a>
                            <h1 className="text-2xl md:text-3xl font-bold tracking-tight flex items-center gap-2">
                                <Icon name="tram-front" className="w-8 h-8 text-yellow-400" />
                                曼谷交通助手
                            </h1>
                        </div>
                        <p className="text-slate-400 text-sm">BTS / MRT / ARL 精準轉乘規劃</p>
                    </header>

                    <main className="flex-1 max-w-4xl w-full mx-auto px-4 -mt-6">
                        <div className="bg-white rounded-2xl shadow-xl p-6 mb-8 border border-slate-100">
                            <div className="grid grid-cols-1 md:grid-cols-[1fr_auto_1fr] items-center gap-4">
                                <div className="relative">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase mb-1 block">出發站 (Start)</label>
                                    <select className="w-full bg-slate-50 border border-slate-200 text-slate-800 p-3 rounded-xl appearance-none font-medium" value={startStation} onChange={(e)=>setStartStation(e.target.value)}>
                                        {Object.keys(mrtData).map(k => (
                                            <optgroup key={`s-${k}`} label={lineColors[k].name}>
                                                {mrtData[k].map(st => <option key={`s-${st.c}`} value={aliasMap[st.n]||st.n}>[{st.c}] {st.n}</option>)}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="absolute right-3 top-8 pointer-events-none text-slate-400"><Icon name="chevron-down" className="w-4 h-4"/></div>
                                </div>
                                <div className="flex justify-center">
                                    <button onClick={handleSwap} className="bg-blue-600 text-white p-3 rounded-full shadow-lg hover:scale-105 active:scale-95 transition-all">
                                        <Icon name="arrow-left-right" className="w-5 h-5 hidden md:block" />
                                        <Icon name="arrow-up-down" className="w-5 h-5 md:hidden" />
                                    </button>
                                </div>
                                <div className="relative">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase mb-1 block">抵達站 (Destination)</label>
                                    <select className="w-full bg-slate-50 border border-slate-200 text-slate-800 p-3 rounded-xl appearance-none font-medium" value={endStation} onChange={(e)=>setEndStation(e.target.value)}>
                                        {Object.keys(mrtData).map(k => (
                                            <optgroup key={`e-${k}`} label={lineColors[k].name}>
                                                {mrtData[k].map(st => <option key={`e-${st.c}`} value={aliasMap[st.n]||st.n}>[{st.c}] {st.n}</option>)}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="absolute right-3 top-8 pointer-events-none text-slate-400"><Icon name="chevron-down" className="w-4 h-4"/></div>
                                </div>
                            </div>
                        </div>

                        {route ? <RouteTimeline legs={route} destName={endStation} /> : 
                        <div className="text-center py-10 bg-white rounded-2xl shadow-sm border border-slate-100 text-slate-400 font-medium">
                            <Icon name="map" className="w-12 h-12 mx-auto mb-4 opacity-20" />
                            請選擇起點與終點以計算路徑
                        </div>}
                    </main>

                    <footer className="mt-12 mb-8 text-center text-[11px] text-slate-400 leading-relaxed px-6 max-w-2xl mx-auto">
                        <p>Copyright &copy; 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
                        <p>版權所有，未經授權禁止轉載、翻印或任何商業用途。</p>
                        <p>本站包含之圖片、文字內容及程式碼均受法律保護。</p>
                    </footer>
                </div>
            );
        };

        const RouteTimeline = ({ legs, destName }) => {
            const totalTime = legs.reduce((acc, leg) => acc + leg.time, 0);
            const totalTransfers = legs.filter(l => l.type === 'transfer').length;
            const destInfo = uniquePhysicalStations[destName];

            return (
                <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100 animate-in slide-in-from-bottom-4 duration-500">
                    <div className="bg-slate-50/50 border-b border-slate-100 p-6 flex justify-between items-center">
                        <div>
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">乘車時間</p>
                            <p className="text-3xl font-black text-slate-800">{totalTime} <span className="text-sm font-normal">MIN</span></p>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">轉乘次數</p>
                            <p className="text-xl font-bold text-slate-700">{totalTransfers} <span className="text-sm font-normal">次</span></p>
                        </div>
                    </div>
                    <div className="p-6">
                        {legs.map((leg, idx) => <LegItem key={idx} leg={leg} />)}
                        <div className="relative pl-10 border-l-4 border-transparent mt-2">
                            <div className="absolute left-[-12px] top-1 w-5 h-5 bg-slate-900 rounded-full border-4 border-white shadow-md z-10"></div>
                            <h3 className="text-lg font-black text-slate-800">{destInfo.name}</h3>
                            <p className="text-xs text-slate-400">{destInfo.en} (目的地 Arrived)</p>
                            {destInfo.attractions && (
                                <div className="mt-3 bg-blue-50 border border-blue-100 rounded-xl p-3 text-xs text-blue-700 flex gap-2">
                                    <Icon name="map-pin" className="w-4 h-4 shrink-0" />
                                    <span><strong>周邊熱點：</strong> {destInfo.attractions}</span>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const LegItem = ({ leg }) => {
            const startStation = allStationsMap[leg.nodes[0]];
            const endStation = allStationsMap[leg.nodes[leg.nodes.length-1]];

            if (leg.type === 'transfer') {
                return (
                    <div className="relative pl-10 pb-10 border-l-4 border-dashed border-slate-200">
                        <div className="absolute left-[-12px] top-1 w-5 h-5 bg-white rounded-full border-2 border-slate-300 z-10 flex items-center justify-center">
                            <Icon name="footprints" className="w-2.5 h-2.5 text-slate-400" />
                        </div>
                        <div className="bg-slate-50 rounded-lg p-3 inline-block border border-slate-100">
                            <p className="text-xs font-bold text-slate-600">站內轉乘：約 {leg.time} 分鐘</p>
                        </div>
                    </div>
                );
            }

            const theme = lineColors[leg.line] || { bg: 'bg-slate-500', border: 'border-slate-500', text: 'text-slate-600', name: '未知線路' };
            return (
                <div className={`relative pl-10 pb-10 border-l-4 ${theme.border}`}>
                    <div className={`absolute left-[-12px] top-1 w-5 h-5 rounded-full border-4 border-white shadow-md z-10 ${theme.bg}`}></div>
                    <div className="mb-4">
                        <h3 className="text-base font-black text-slate-800">{startStation.n}</h3>
                        <p className="text-[10px] text-slate-400 uppercase">{startStation.e}</p>
                    </div>
                    <div className={`bg-white border p-4 rounded-xl shadow-sm ${theme.border} border-opacity-30`}>
                        <div className="flex items-center gap-2 mb-2">
                            <span className={`${theme.bg} text-white text-[9px] font-black px-2 py-0.5 rounded`}>{leg.nodes[0]}</span>
                            <span className={`text-xs font-bold ${theme.text}`}>{theme.name}</span>
                        </div>
                        <div className="flex items-center gap-4 text-[11px] text-slate-500">
                            <span className="flex items-center gap-1"><Icon name="arrow-right-circle" className="w-3 h-3"/> 往 {endStation.n}</span>
                            <span className="text-slate-200">|</span>
                            <span className="flex items-center gap-1"><Icon name="navigation" className="w-3 h-3"/> {leg.stops} 站</span>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
