                                {n:"Indigo Cat", f:"沙壩非常知名的公平貿易手工藝品店，提供品質極高的藍染布料、精美刺繡服飾與文創小物。", a:"46 Fansipan, Sa Pa", t:"🚶 從廣場往纜車站方向步行。"},
                                {n:"特色銀飾工作坊", f:"洋人街上有幾家由當地工匠開設的銀飾店，販售純銀打造的少數民族圖騰項鍊與手環。", a:"Đường Cầu Mây, Sa Pa", t:"🚶 步行於洋人街。"},
                                {n:"Hmong Art Crafts", f:"專賣苗族傳統藝術品，包括手作樂器(口簧琴)、木雕娃娃與傳統編織帶。", a:"Khu vực trung tâm Sa Pa", t:"🚶 廣場周邊。"}
                            ]
                        }
                    }
                }
            }
        };

        // 類別設定檔 (AEO/UI 共用)
        const catsMap = {
            souvenir: { icon: "🛍️", name: "必買伴手禮", bg: "bg-rose-50 text-rose-700 hover:bg-rose-600 hover:text-white border-rose-200" },
            fashion:  { icon: "🏬", name: "服飾百貨", bg: "bg-fuchsia-50 text-fuchsia-700 hover:bg-fuchsia-600 hover:text-white border-fuchsia-200" },
            beauty:   { icon: "💊", name: "藥妝與保養", bg: "bg-sky-50 text-sky-700 hover:bg-sky-600 hover:text-white border-sky-200" },
            mart:     { icon: "🛒", name: "超市與零食", bg: "bg-emerald-50 text-emerald-700 hover:bg-emerald-600 hover:text-white border-emerald-200" },
            hobby:    { icon: "🧸", name: "文創雜貨", bg: "bg-amber-50 text-amber-700 hover:bg-amber-600 hover:text-white border-amber-200" }
        };

        // 全域狀態管理
        let currentRegion = "hanoi";
        let currentCity = "hoan_kiem"; // 這裡的 City 代表 District (郡/區)
        let currentCat = "souvenir"; 

        const regionContainer = document.getElementById('region-container');
        const cityContainer = document.getElementById('city-container');
        const categoryContainer = document.getElementById('category-container');
        const shopContainer = document.getElementById('shop-container');

        // 平滑滾動功能 (UI 增強)
        function scrollNav(containerId, offset) {
            const container = document.getElementById(containerId);
            if (container) {
                container.scrollBy({ left: offset, behavior: 'smooth' });
            }
        }

        // 系統初始化
        function initUI() {
            renderRegions();
            renderCategories();
            // 初次載入
            updateDistricts();
        }

        // 渲染第一層：大區域 (河內/下龍/沙壩)
        function renderRegions() {
            regionContainer.innerHTML = '';
            Object.keys(regionsDb).forEach(regionKey => {
                const r = regionsDb[regionKey];
                const btn = document.createElement('button');
                btn.className = `region-btn whitespace-nowrap px-6 py-3 rounded-full border border-rose-200 bg-white text-rose-800 font-extrabold text-base md:text-lg hover:bg-rose-50 shadow-sm flex items-center ${regionKey === currentRegion ? 'active' : ''}`;
                btn.innerHTML = `<i class="fa-solid ${r.icon} mr-2"></i> ${r.name}`;
                // 語意化/無障礙標籤
                btn.setAttribute('role', 'tab');
                btn.setAttribute('aria-selected', regionKey === currentRegion);
                btn.setAttribute('aria-controls', 'city-container');
                
                btn.onclick = () => {
                    document.querySelectorAll('.region-btn').forEach(b => {
                        b.classList.remove('active');
                        b.setAttribute('aria-selected', 'false');
                    });
                    btn.classList.add('active');
                    btn.setAttribute('aria-selected', 'true');
                    
                    currentRegion = regionKey;
                    // 切換大區域時，預設選取該區域的第一個子區域
                    currentCity = Object.keys(regionsDb[regionKey].districts)[0];
                    updateDistricts();
                };
                regionContainer.appendChild(btn);
            });
        }

        // 渲染第二層：子區域/商圈 (動態隨大區域改變)
        function updateDistricts() {
            cityContainer.innerHTML = '';
            const districts = regionsDb[currentRegion].districts;
            
            Object.keys(districts).forEach(cityKey => {
                const btn = document.createElement('button');
                btn.className = `city-btn whitespace-nowrap px-5 py-2 md:px-6 md:py-2.5 rounded-full border border-slate-200 bg-white text-slate-700 font-bold hover:bg-slate-50 shadow-sm text-sm md:text-base ${cityKey === currentCity ? 'active' : ''}`;
                btn.innerText = districts[cityKey].name;
                
                btn.setAttribute('role', 'tab');
                btn.setAttribute('aria-selected', cityKey === currentCity);
                
                btn.onclick = () => {
                    document.querySelectorAll('.city-btn').forEach(b => {
                        b.classList.remove('active');
                        b.setAttribute('aria-selected', 'false');
                    });
                    btn.classList.add('active');
                    btn.setAttribute('aria-selected', 'true');
                    
                    currentCity = cityKey;
                    renderContent();
                };
                cityContainer.appendChild(btn);
            });
            // 重繪內容
            renderContent();
        }

        // 渲染第三層：類別選單 (靜態不變)
        function renderCategories() {
            categoryContainer.innerHTML = '';
            Object.keys(catsMap).forEach(catKey => {
                const c = catsMap[catKey];
                const btn = document.createElement('button');
                btn.className = `tab-btn whitespace-nowrap px-5 py-2.5 rounded-full border transition-all font-bold shadow-sm flex items-center text-sm md:text-base ${c.bg} ${catKey === currentCat ? 'active' : ''}`;
                btn.innerHTML = `<span class="mr-2 text-lg" aria-hidden="true">${c.icon}</span> ${c.name}`;
                
                btn.setAttribute('role', 'tab');
                btn.setAttribute('aria-selected', catKey === currentCat);
                
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => {
                        b.classList.remove('active');
                        b.setAttribute('aria-selected', 'false');
                    });
                    btn.classList.add('active');
                    btn.setAttribute('aria-selected', 'true');
                    
                    currentCat = catKey;
                    renderContent();
                };
                categoryContainer.appendChild(btn);
            });
        }

        // 渲染核心：生成商品/店家卡片 (GEO/SEO 優化版 HTML 結構)
        function renderContent() {
            shopContainer.innerHTML = '';
            
            // 防呆處理
            if (!regionsDb[currentRegion] || !regionsDb[currentRegion].districts[currentCity]) return;
            
            const items = regionsDb[currentRegion].districts[currentCity].cat[currentCat];

            if(!items || items.length === 0) {
                shopContainer.innerHTML = `<div class="col-span-full text-center py-16 text-slate-400 text-lg font-bold bg-white rounded-2xl border border-dashed border-slate-200">此分類目前積極收錄中，敬請期待！</div>`;
                return;
            }

            items.forEach((item, index) => {
                // 智慧生成 Google Maps 搜尋字串 (GEO 優化)
                const pureAddress = item.a.split('<br>')[0];
                const regionName = regionsDb[currentRegion].name.split(' ')[0]; // 取 "河內市", "下龍市"
                const encodedQuery = encodeURIComponent(`${item.n} 越南 ${regionName} ${pureAddress}`);
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;

                const card = document.createElement('section');
                card.className = `bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8 flex flex-col justify-between hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1.5 animate-fade-in group`;
                card.style.animationDelay = `${index * 0.08}s`;
                // AEO 語意標籤
                card.setAttribute('aria-label', `推薦購物點：${item.n}`);
                
                card.innerHTML = `
                    <div>
                        <div class="mb-5 border-b border-slate-50 pb-4">
                            <h3 class="text-xl md:text-2xl font-extrabold text-slate-800 flex items-center group-hover:text-rose-700 transition-colors">
                                ${item.n}
                            </h3>
                        </div>
                        <div class="space-y-5">
                            <div class="flex items-start">
                                <div class="bg-amber-100 text-amber-600 rounded-full p-1.5 mr-3 mt-0.5 flex-shrink-0">
                                    <i class="fa-solid fa-star text-sm w-4 text-center" aria-hidden="true"></i>
                                </div>
                                <div>
                                    <p class="text-xs text-amber-600 font-extrabold mb-1 uppercase tracking-wider">亮點特色</p>
                                    <p class="text-sm md:text-base text-slate-600 leading-relaxed font-medium">${item.f}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <div class="bg-rose-100 text-rose-600 rounded-full p-1.5 mr-3 mt-0.5 flex-shrink-0">
                                    <i class="fa-solid fa-location-dot text-sm w-4 text-center" aria-hidden="true"></i>
                                </div>
                                <div>
                                    <p class="text-xs text-rose-600 font-extrabold mb-1 uppercase tracking-wider">地址</p>
                                    <p class="text-sm md:text-base text-slate-600 font-medium">${item.a}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <div class="bg-sky-100 text-sky-600 rounded-full p-1.5 mr-3 mt-0.5 flex-shrink-0">
                                    <i class="fa-solid fa-route text-sm w-4 text-center" aria-hidden="true"></i>
                                </div>
                                <div>
                                    <p class="text-xs text-sky-600 font-extrabold mb-1.5 uppercase tracking-wider">交通指南</p>
                                    <span class="inline-block bg-slate-50 border border-slate-200 text-slate-700 text-xs md:text-sm px-3 py-1.5 rounded-lg font-bold text-left leading-normal">${item.t}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-8 pt-5 border-t border-slate-100">
                        <a href="${mapsUrl}" target="_blank" rel="noopener noreferrer" 
                           class="w-full flex items-center justify-center gap-2 px-4 py-3.5 bg-slate-800 hover:bg-rose-600 rounded-xl shadow-sm text-sm md:text-base font-bold text-white focus:outline-none focus:ring-4 focus:ring-rose-200 transition-all duration-300"
                           aria-label="在 Google Maps 開啟 ${item.n} 的位置">
                            <i class="fa-solid fa-map-location-dot text-lg" aria-hidden="true"></i>
                            開啟 Google Maps 導航
                        </a>
                    </div>
                `;
                shopContainer.appendChild(card);
            });
        }

        // 啟動應用程式
        window.onload = initUI;
    </script>
</body>
</html>
