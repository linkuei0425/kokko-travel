                '交通及網路': [
                    { title: '河內至沙壩 豪華臥鋪巴士 / VIP 臥鋪艙', description: '平躺前往高山秘境！體驗越南特有豪華臥鋪巴士，長途旅行也能很舒適。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E6%B2%B3%E5%85%A7%20%E6%B2%99%E5%A3%A9%20%E5%B7%B4%E5%A3%AB&aid=117191' },
                    { title: '河內至沙壩 豪華臥鋪火車體驗', description: '體驗復古風情的高級夜間臥鋪火車，清晨醒來即抵達老街省。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E6%B2%B3%E5%85%A7%20%E6%B2%99%E5%A3%A9%20%E7%81%AB%E8%BB%8A&aid=117191' }
                ]
            }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('河內市區');
            const [selectedCategory, setSelectedCategory] = useState('景點門票');

            const currentData = itineraryData[selectedRegion]?.[selectedCategory] || [];

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800 flex flex-col">
                    {/* 語意化頂部導覽列 (SEO/AAO 優化) */}
                    <header className="bg-white/95 backdrop-blur-md shadow-sm sticky top-0 z-50 border-b border-rose-100" role="banner">
                        <nav className="max-w-7xl mx-auto px-4 py-4 md:py-5" aria-label="主要導覽">
                            <div className="flex items-center justify-between gap-2 mb-4 md:mb-5">
                                <div className="flex items-center gap-2 md:gap-3">
                                    <MapPin className="text-rose-600 w-6 h-6 md:w-8 md:h-8" />
                                    <h1 className="text-2xl md:text-3xl font-extrabold text-slate-800 tracking-tight">
                                        北越行程<span className="text-rose-600">推薦指南</span>
                                    </h1>
                                </div>
                                <a
                                    href="https://kokko-travel.com/zh/hanoi/"
                                    className="hidden md:flex items-center gap-1.5 px-6 py-2.5 rounded-full text-sm font-bold transition-all duration-300 bg-rose-600 text-white hover:bg-rose-700 shadow-sm hover:shadow-md focus:outline-none focus:ring-2 focus:ring-rose-500 focus:ring-offset-2"
                                    aria-label="回到 Kokko Travel 越南首頁"
                                >
                                    <Home className="w-4 h-4" />
                                    回到首頁
                                </a>
                            </div>
                            
                            {/* 地區選擇 (Tab List) */}
                            <div className="flex gap-2.5 overflow-x-auto pb-2 scrollbar-hide items-center" role="tablist" aria-label="城市選擇區">
                                <a
                                    href="https://kokko-travel.com/zh/hanoi/"
                                    className="md:hidden flex-shrink-0 flex items-center justify-center gap-1.5 whitespace-nowrap px-4 py-2.5 rounded-full text-sm font-bold transition-all duration-200 bg-rose-600 text-white hover:bg-rose-700 shadow-sm"
                                    aria-label="回到 Kokko Travel 首頁"
                                >
                                    <Home className="w-4 h-4" />
                                    首頁
                                </a>
                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        role="tab"
                                        aria-selected={selectedRegion === region}
                                        aria-controls="content-panel"
                                        onClick={() => {
                                            setSelectedRegion(region);
                                            if (!itineraryData[region]?.[selectedCategory]) {
                                                const availableCategories = Object.keys(itineraryData[region] || {});
                                                if (availableCategories.length > 0) {
                                                    setSelectedCategory(availableCategories[0]);
                                                }
                                            }
                                        }}
                                        className={`flex-shrink-0 whitespace-nowrap px-5 py-2.5 rounded-full text-sm md:text-base font-bold transition-all duration-300 ${
                                            selectedRegion === region
                                            ? 'bg-rose-700 text-white shadow-md border-transparent'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-rose-50 hover:text-rose-700'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </div>
                        </nav>
                    </header>

                    {/* 語意化主要內容區 */}
                    <main className="flex-grow max-w-7xl mx-auto px-4 py-8 w-full" role="main" id="content-panel">
                        {/* 分類標籤 (Filter Categories) */}
                        <section className="mb-8 md:mb-10" aria-label="行程分類過濾器">
                            <div className="flex flex-wrap gap-2 md:gap-3" role="tablist">
                                {CATEGORIES.map(({ id, icon: Icon }) => (
                                    <button
                                        key={id}
                                        role="tab"
                                        aria-selected={selectedCategory === id}
                                        onClick={() => setSelectedCategory(id)}
                                        className={`flex items-center gap-2 px-4 md:px-5 py-2.5 md:py-3 rounded-xl border text-sm md:text-base font-bold transition-all duration-200 ${
                                            selectedCategory === id
                                            ? 'border-rose-500 bg-rose-50 text-rose-700 shadow-sm'
                                            : 'border-slate-200 bg-white text-slate-600 hover:border-rose-200 hover:bg-rose-50/50 hover:text-rose-600'
                                        }`}
                                    >
                                        <Icon className="w-4 h-4 md:w-5 md:h-5" />
                                        {id}
                                    </button>
                                ))}
                            </div>
                        </section>

                        {/* 內容區標題 (AEO 動態標題) */}
                        <header className="mb-6 flex items-center gap-2 border-l-4 border-rose-500 pl-3">
                            <h2 className="text-xl md:text-2xl font-extrabold text-slate-800 tracking-wide">
                                {selectedRegion} <span className="text-slate-400 mx-1">|</span> <span className="text-rose-600">{selectedCategory}</span> 精選推薦
                            </h2>
                        </header>

                        {/* 卡片列表 (Responsive Grid System) */}
                        <section aria-live="polite">
                            {currentData.length > 0 ? (
                                <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 md:gap-6 lg:gap-8">
                                    {currentData.map((item, index) => (
                                        <article 
                                            key={index} 
                                            className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8 flex flex-col justify-between hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1.5 animate-fade-in group"
                                            style={{ animationDelay: `${index * 0.08}s` }}
                                            aria-label={`推薦項目：${item.title}`}
                                        >
                                            <div>
                                                <h3 className="text-lg md:text-xl font-extrabold text-slate-800 mb-4 leading-snug flex items-start gap-2.5 group-hover:text-rose-700 transition-colors">
                                                    <span className="text-orange-500 mt-0.5 bg-orange-50 p-1.5 rounded-lg shrink-0">
                                                        <Sparkles className="w-4 h-4 md:w-5 md:h-5"/>
                                                    </span>
                                                    <span>{item.title}</span>
                                                </h3>
                                                <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed font-medium">
                                                    {item.description}
                                                </p>
                                            </div>
                                            
                                            <div className="mt-auto pt-5 border-t border-slate-100/80">
                                                <a
                                                    href={item.link}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    className="inline-flex items-center justify-center gap-2 bg-slate-800 hover:bg-rose-600 text-white font-bold py-3.5 px-6 rounded-xl transition-all duration-300 shadow-sm hover:shadow-md w-full focus:outline-none focus:ring-4 focus:ring-rose-200"
                                                    aria-label={`查看 ${item.title} 的詳細說明與預訂`}
                                                >
                                                    <Info className="w-4 h-4 md:w-5 md:h-5" />
                                                    <span className="text-sm md:text-base tracking-wide">查看詳細資訊</span>
                                                    <ExternalLink className="w-4 h-4 md:w-5 md:h-5 ml-1 opacity-80" />
                                                </a>
                                            </div>
                                        </article>
                                    ))}
                                </div>
                            ) : (
                                <div className="bg-white rounded-2xl border-2 border-dashed border-slate-200 p-12 md:p-16 text-center flex flex-col items-center justify-center animate-fade-in">
                                    <div className="bg-slate-50 p-4 rounded-full mb-4">
                                        <Info className="w-8 h-8 text-slate-400" />
                                    </div>
                                    <h3 className="text-lg md:text-xl font-bold text-slate-700 mb-2">
                                        此區域目前無對應分類的資料
                                    </h3>
                                    <p className="text-slate-500 text-sm md:text-base font-medium">我們正持續擴充更多優質行程，請嘗試選擇其他分類或城市。</p>
                                </div>
                            )}
                        </section>

                        {/* 全局探索按鈕 (Global Call to Action) */}
                        <nav className="mt-12 md:mt-16 flex justify-center" aria-label="全域探索">
                            <a 
                                href={`https://www.klook.com/zh-TW/search/result/?query=${encodeURIComponent(selectedRegion === '河內市區' ? '河內' : selectedRegion)}&aid=117191`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-rose-700 via-rose-600 to-orange-600 hover:from-rose-800 hover:via-rose-700 hover:to-orange-700 text-white font-extrabold py-4 px-8 md:px-12 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-rose-300"
                                aria-label={`前往探索更多 ${selectedRegion} 的相關行程`}
                            >
                                <span className="tracking-widest text-sm md:text-base">探索更多 {selectedRegion} 行程</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </nav>
                    </main>

                    {/* 語意化頁尾與版權宣告 (Footer) */}
                    <footer className="bg-slate-900 text-slate-300 py-12 md:py-16 mt-8 border-t-4 border-rose-700" role="contentinfo">
                        <div className="max-w-7xl mx-auto px-4 text-center flex flex-col items-center">
                            <div className="mb-6 bg-slate-800 p-4 rounded-full inline-flex">
                                <Plane className="w-8 h-8 md:w-10 md:h-10 text-rose-500" />
                            </div>
                            <p className="text-sm md:text-base leading-loose md:leading-relaxed text-slate-400 font-medium tracking-wide">
                                Copyright © 2026 Kokko Travel / Im+ Life. All Rights Reserved.<br className="hidden md:block" />
                                版權所有，未經授權禁止轉載、翻印或任何商業用途。<br className="hidden md:block" />
                                本站包含之圖片、文字內容及程式碼均受法律保護。
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
