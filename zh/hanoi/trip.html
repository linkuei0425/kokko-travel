<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>河內市行程推薦指南 | Hanoi Trip Guide</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* 隱藏水平捲軸但保留滾動功能 */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- 導覽圖示 ---
        const MapPin = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const Ticket = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>;
        const Sun = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const Sparkles = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
        const TrainFront = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3.1V7a4 4 0 0 0 8 0V3.1"/><path d="M9 15h6"/><path d="M14 19.5l3-3-3-3"/><path d="M10 19.5l-3-3 3-3"/><path d="M4 22v-3.5"/><path d="M20 22v-3.5"/><rect width="16" height="16" x="4" y="3" rx="2"/></svg>;
        const ExternalLink = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>;
        const Info = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const Home = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;

        const REGIONS = ['河內市區', '下龍灣', '寧平 (陸龍灣)', '沙壩 (Sapa)'];
        const CATEGORIES = [
            { id: '景點門票', icon: Ticket },
            { id: '一日遊', icon: Sun },
            { id: '體驗與娛樂', icon: Sparkles },
            { id: '交通及網路', icon: TrainFront }
        ];

        // --- 河內行程資料 ---
        const itineraryData = {
            '河內市區': {
                '景點門票': [
                    { title: '樂天觀景台門票 (Lotte Observation Deck)', description: '登上河內樂天中心65樓，從絕佳的制高點360度無死角俯瞰河內市天際線與美麗的西湖景緻。', link: 'https://www.klook.com/zh-TW/activity/22529-lotte-observation-deck-ticket-hanoi/?spm=SearchResult.SearchResult_LIST&clickId=f8658be8f4&aid=117191' },
                    { title: '昇龍水上木偶戲門票', description: '來到北越絕不能錯過的傳統國粹！生動活潑的水上木偶結合傳統樂器伴奏，充滿濃濃的在地文化風情。', link: 'https://www.klook.com/zh-TW/activity/35653-thang-long-water-puppet-show-ticket-hanoi/?spm=Activity.SearchSuggest_LIST&clickId=d679a5e359&aid=117191' },
                    { title: '河內隨上隨下觀光巴士車票', description: '搭乘敞篷雙層巴士，輕鬆遊覽河內大劇院、昇龍皇城、胡志明陵寢與文廟等著名歷史地標。', link: 'https://www.klook.com/zh-TW/activity/87164-hanoi-hop-on-off-sightseeing-tour/?spm=SearchResult.SearchResult_LIST&clickId=c9d0a0cd39&aid=117191' }
                ],
                '一日遊': [
                    { title: '河內市區機車美食半日遊', description: '最接地的玩法！由在地嚮導帶路穿梭巷弄，品嚐烤肉米線、蛋咖啡等河內經典美食。', link: 'https://www.klook.com/zh-TW/activity/8469-sightseeing-motorbike-tour-hanoi-halong-bay/?spm=SearchResult.SearchResult_LIST&clickId=fce1bdd40d&aid=117191' },
                    { title: '河內舊城區傳統三輪車體驗', description: '乘坐越南傳統 Cyclo 三輪車，以慢步調遊覽還劍湖周邊與熱鬧的三十六古街。', link: 'https://www.klook.com/zh-TW/activity/8459-street-food-walking-tour-cyclo-hanoi-halong-bay/?spm=SearchResult.SearchResult_LIST&clickId=0b6816f7b9&aid=117191' },
                    { title: '河內市區精華景點一日遊', description: '由專業導遊帶領，一次走訪胡志明陵寢、文廟、鎮國寺等核心歷史景點。', link: 'https://www.klook.com/zh-TW/activity/27858-hanoi-city-tour-vietnam-ethnology-museum/?spm=SearchResult.SearchResult_LIST&clickId=ec1bb8c64c&aid=117191' }
                ],
                '體驗與娛樂': [
                    { title: '河內越式洗頭與頂級 SPA 按摩體驗', description: '來到越南必試！包含洗臉、洗髮、頭部按摩的全套越式放鬆服務，徹底消除旅行疲憊。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E6%B2%B3%E5%85%A7%20SPA&aid=117191' },
                    { title: '河內在地料理烹飪課與市場採買', description: '跟著當地主廚走進傳統市場挑選香料，並親手製作越式春捲、烤肉米線等經典北越美食。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E6%B2%B3%E5%85%A7%20%E7%83%B9%E9%A3%AA%E8%AA%B2&aid=117191' }
                ],
                '交通及網路': [
                    { title: '內排國際機場 (HAN) 至河內市區私人接送', description: '免去機場外喊價困擾，專車司機舉牌接機，讓您安全、舒適且快速地直達飯店。', link: 'https://www.klook.com/zh-TW/airport-transfers/?flightDirection=1&code=HAN&aid=117191' },
                    { title: '內排國際機場（HAN）VIP 快速通關服務', description: '避開大排長龍的入境隊伍！由專人引導使用尊榮 VIP 通道，節省寶貴的旅行時間。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E5%85%A7%E6%8E%92%E6%A9%9F%E5%A0%B4%20VIP&aid=117191' },
                    { title: '5G eSIM 越南｜吃到飽、不穩就退', description: '掃描 QR Code 即可開通上網，免換實體卡超方便。網速穩定，導航打卡必備。', link: 'https://www.klook.com/zh-TW/activity/123902-vietnam-esim-high-speed-internet-qr-code-voucher/?aid=117191' },
                    { title: '越南 4G 上網 SIM 卡（內排機場領取）', description: '抵達機場即可領取並有專人協助開通。網路穩定不斷線，導航打卡最安心。', link: 'https://www.klook.com/zh-TW/activity/84066-3g-4g-sim-card-vietnam-noi-bai-airport/?spm=Mobility_Aggregate.SearchSuggest_LIST&clickId=209c995c02&aid=117191' },
                    { title: '河內私人包車 一日/半日遊', description: '行程完全由您作主！專屬司機帶您輕鬆穿梭市區或近郊陶瓷村等景點。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E6%B2%B3%E5%85%A7%20%E5%8C%85%E8%BB%8A&aid=117191' }
                ]
            },
            '下龍灣': {
                '一日遊': [
                    { title: '下龍灣豪華遊船一日遊 (河內出發)', description: '乘坐豪華遊輪穿梭於壯麗的石灰岩小島間，參觀驚訝洞並體驗獨木舟。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E4%B8%8B%E9%BE%8D%E7%81%A3&aid=117191' },
                    { title: '下龍灣豪華遊船 2 天 1 夜遊', description: '睡在世界自然遺產裡！在五星級遊輪上欣賞日落、夜釣小管，享受極致海上度假。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E4%B8%8B%E9%BE%8D%E7%81%A32%E5%A4%A91%E5%A4%9C&needQueryIdentification=true&spm=SearchResult.SearchSuggest_LIST&clickId=9fef9306ed&aid=117191' },
                    { title: '下龍灣豪華遊船 3 天 2 夜遊', description: '深度探索蘭夏灣或吉婆島，享受更靜謐、未受破壞的海灣風光與深度活動。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E4%B8%8B%E9%BE%8D%E7%81%A33%E5%A4%A92%E5%A4%9C&aid=117191' }
                ],
                '體驗與娛樂': [
                    { title: '太陽世界下龍公園門票', description: '搭乘跨海女皇纜車，挑戰充滿刺激的遊樂設施，欣賞絕美海景。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E4%B8%8B%E9%BE%8D%E7%81%A3%20%E5%A4%AA%E9%99%BD%E4%B8%96%E7%95%8C&aid=117191' }
                ],
                '交通及網路': [
                    { title: '河內至下龍灣 私人包車/共乘豪華巴士', description: '舒適便捷的接駁服務，帶您從河內市區直達下龍灣碼頭，輕鬆開啟行程。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E6%B2%B3%E5%85%A7%20%E4%B8%8B%E9%BE%8D%E7%81%A3%20%E6%8E%A5%E9%80%81&aid=117191' }
                ]
            },
            '寧平 (陸龍灣)': {
                '一日遊': [
                    { title: '華閭＆長安名勝群一日遊', description: '探索古都並搭乘手搖船穿梭於長安生態保護區的喀斯特地形與水上溶洞中。', link: 'https://www.klook.com/zh-TW/activity/39366-ninh-binh-sightseeing-day-tour-local-experiences-hanoi/?aid=117191' },
                    { title: '拜頂寺、長安與臥龍山一日遊', description: '參觀東南亞最大佛寺「拜頂寺」，挑戰攀登臥龍山俯瞰壯闊的寧平全景。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E5%AF%A7%E5%B9%B3%20%E7%99%BD%E4%BA%AD%E5%AF%BA&aid=117191' },
                    { title: '華閭、三谷與臥龍山一日遊', description: '乘船遊覽群山環繞的「三谷」稻田，攀登臥龍山捕捉絕美風景照。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E5%AF%A7%E5%B9%B3%20%E4%B8%89%E8%B0%B7&aid=117191' }
                ],
                '交通及網路': [
                    { title: '河內至寧平 私人包車/共乘豪華巴士', description: '舒適專車直達寧平各大著名景區，省去轉車煩惱。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E6%B2%B3%E5%85%A7%20%E5%AF%A7%E5%B9%B3%20%E4%BA%A4%E9%80%9A&aid=117191' }
                ]
            },
            '沙壩 (Sapa)': {
                '景點門票': [
                    { title: '太陽世界番西邦山傳奇纜車門票', description: '搭乘世界最長三索纜車，征服「中南半島屋脊」番西邦峰，欣賞壯麗雲海。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E7%95%AA%E8%A5%BF%E9%82%A6%E5%B3%B0&aid=117191' },
                    { title: '沙壩玻璃天空步道門票 (Rong May Glass Bridge)', description: '挑戰海拔兩千公尺高的透明玻璃棧道！漫步雲端感受震撼美景。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E6%B2%99%E5%A3%A9%20%E7%8E%BB%E7%92%83%E6%A9%8B&aid=117191' }
                ],
                '一日遊': [
                    { title: '沙壩 2 天 1 夜 / 3 天 2 夜 徒步探索之旅', description: '深入沙壩梯田絕景，走訪黑苗族與紅瑤族村落，體驗純樸高山風情。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E6%B2%99%E5%A3%A9&aid=117191' },
                    { title: '貓貓村 (Cat Cat Village) 與踏梅村健行體驗', description: '穿梭於翠綠梯田，深入著名的貓貓村，近距離感受當地少數民族文化。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E6%B2%99%E5%A3%A9%20%E5%81%A5%E8%A1%8C&aid=117191' }
                ],
                '交通及網路': [
                    { title: '河內至沙壩 豪華臥鋪巴士 / VIP 臥鋪艙', description: '平躺前往高山秘境！體驗越南特有豪華臥鋪巴士，長途旅行也能很舒適。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E6%B2%B3%E5%85%A7%20%E6%B2%99%E5%A3%A9%20%E5%B7%B4%E5%A3%AB&aid=117191' },
                    { title: '河內至沙壩 豪華臥鋪火車體驗', description: '體驗復古風情的高級夜間臥鋪火車，清晨醒來即抵達老街省。', link: 'https://www.klook.com/zh-TW/search/result/?query=%E6%B2%B3%E5%85%A7%20%E6%B2%99%E5%A3%A9%20%E7%81%AB%E8%BB%8A&aid=117191' }
                ]
            }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('河內市區');
            const [selectedCategory, setSelectedCategory] = useState('景點門票');

            const currentData = itineraryData[selectedRegion]?.[selectedCategory] || [];

            return (
                <div className="min-h-screen bg-rose-50 font-sans text-slate-800 pb-12">
                    {/* 頂部導覽列 */}
                    <header className="bg-white shadow-sm sticky top-0 z-10 border-b border-rose-100">
                        <div className="max-w-7xl mx-auto px-4 py-4 md:py-6">
                            <div className="flex items-center justify-between gap-2 mb-4">
                                <div className="flex items-center gap-2">
                                    <MapPin className="text-rose-600 w-6 h-6 md:w-8 md:h-8" />
                                    <h1 className="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-rose-600 to-orange-500">
                                        河內市行程推薦指南
                                    </h1>
                                </div>
                                <a
                                    href="https://linkuei0425.github.io/Hanoi/"
                                    className="hidden md:flex items-center gap-1.5 px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 bg-rose-600 text-white hover:bg-rose-700 shadow-sm"
                                >
                                    <Home className="w-4 h-4" />
                                    回到首頁
                                </a>
                            </div>
                            
                            {/* 地區選擇 */}
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                <a
                                    href="https://linkuei0425.github.io/Hanoi/"
                                    className="md:hidden flex items-center justify-center gap-1.5 whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 bg-rose-600 text-white hover:bg-rose-700 shadow-sm"
                                >
                                    <Home className="w-4 h-4" />
                                    首頁
                                </a>
                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => {
                                            setSelectedRegion(region);
                                            if (!itineraryData[region]?.[selectedCategory]) {
                                                const availableCategories = Object.keys(itineraryData[region] || {});
                                                if (availableCategories.length > 0) {
                                                    setSelectedCategory(availableCategories[0]);
                                                }
                                            }
                                        }}
                                        className={`whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 ${
                                            selectedRegion === region
                                            ? 'bg-orange-500 text-white shadow-md'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-orange-50 hover:text-orange-600'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {/* 分類標籤 */}
                        <div className="flex flex-wrap gap-2 md:gap-3 mb-8">
                            {CATEGORIES.map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 px-4 py-2.5 rounded-lg border text-sm font-bold transition-all ${
                                        selectedCategory === id
                                        ? 'border-rose-500 bg-rose-50 text-rose-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4" />
                                    {id}
                                </button>
                            ))}
                        </div>

                        {/* 內容區標題 */}
                        <div className="mb-6 flex items-center gap-2">
                            <h2 className="text-2xl font-bold text-slate-800">
                                {selectedRegion} - {selectedCategory} <span className="text-rose-600">精選推薦</span>
                            </h2>
                        </div>

                        {/* 卡片列表 */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4 md:gap-6">
                                {currentData.map((item, index) => (
                                    <div 
                                        key={index} 
                                        className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col justify-between hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 animate-fade-in"
                                        style={{ animationDelay: `${index * 0.05}s` }}
                                    >
                                        <div>
                                            <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-3 leading-tight flex items-start gap-2">
                                                <span className="text-orange-500 mt-1"><Sparkles className="w-5 h-5"/></span>
                                                {item.title}
                                            </h3>
                                            <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed font-medium">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-4 border-t border-slate-100 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-sm hover:shadow-md w-full sm:w-auto"
                                            >
                                                <Info className="w-4 h-4" />
                                                <span>詳細說明</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-80" />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl border border-dashed border-slate-300 p-12 text-center flex flex-col items-center justify-center">
                                <h3 className="text-lg font-medium text-slate-700 mb-2">
                                    此區域目前無對應項目的資料
                                </h3>
                                <p className="text-slate-500">請嘗試選擇其他分類或分頁。</p>
                            </div>
                        )}

                        {/* 全局探索按鈕 */}
                        <div className="mt-12 flex justify-center">
                            <a 
                                href={`https://www.klook.com/zh-TW/search/result/?query=${encodeURIComponent(selectedRegion === '河內市區' ? '河內' : selectedRegion)}&aid=117191`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-rose-600 to-orange-500 hover:from-rose-700 hover:to-orange-600 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1"
                            >
                                <span className="tracking-wide">前往探索更多 {selectedRegion} 行程</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
