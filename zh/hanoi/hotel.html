        const cityContainer = document.getElementById('city-buttons');
        const districtContainer = document.getElementById('district-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const contentArea = document.getElementById('content-area');
        const districtTitle = document.getElementById('district-title');
        
        let currentCityKey = null;
        let currentDistrictKey = null;
        let currentCategoryName = null;

        // 1. 初始化城市按鈕 (第一層)
        function initCityButtons() {
            Object.keys(hotelData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-6 py-2.5 rounded-full font-bold text-sm md:text-base transition-all duration-300 city-btn-inactive flex items-center focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-1`;
                btn.innerHTML = `<i class="fa-solid ${hotelData[key].icon} mr-2" aria-hidden="true"></i>${hotelData[key].name}`;
                btn.setAttribute('role', 'tab');
                btn.onclick = () => selectCity(key, btn);
                cityContainer.appendChild(btn);
            });
        }

        // 2. 選擇城市
        function selectCity(key, activeBtn) {
            currentCityKey = key;

            const allBtns = cityContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('city-btn-active');
                btn.classList.add('city-btn-inactive');
                btn.setAttribute('aria-selected', 'false');
            });
            activeBtn.classList.remove('city-btn-inactive');
            activeBtn.classList.add('city-btn-active');
            activeBtn.setAttribute('aria-selected', 'true');

            // 更新第二層標題
            districtTitle.innerText = `選擇 ${hotelData[key].name.split(' ')[0]} 區域`;
            
            renderDistrictButtons();
        }

        // 3. 渲染區域按鈕 (第二層)
        function renderDistrictButtons() {
            districtContainer.innerHTML = '';
            const districts = hotelData[currentCityKey].districts;
            const districtKeys = Object.keys(districts);
            
            districtKeys.forEach(key => {
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-5 md:px-6 py-2 md:py-2.5 rounded-full font-bold text-sm md:text-base transition-all duration-200 border area-btn-inactive shadow-sm flex-shrink-0 snap-center focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-1`;
                btn.innerHTML = `<i class="fa-solid fa-map-pin mr-1.5 opacity-70" aria-hidden="true"></i>${districts[key].name}`;
                btn.setAttribute('role', 'tab');
                btn.onclick = () => selectDistrict(key, btn);
                districtContainer.appendChild(btn);
            });

            // 預設選擇該城市的第一個區域
            if (districtKeys.length > 0) {
                const firstBtn = districtContainer.querySelector('button');
                selectDistrict(districtKeys[0], firstBtn);
            }
        }

        // 4. 選擇區域
        function selectDistrict(key, activeBtn) {
            currentDistrictKey = key;

            const allBtns = districtContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('area-btn-active');
                btn.classList.add('area-btn-inactive');
                btn.setAttribute('aria-selected', 'false');
            });
            activeBtn.classList.remove('area-btn-inactive');
            activeBtn.classList.add('area-btn-active');
            activeBtn.setAttribute('aria-selected', 'true');

            renderCategoryButtons();
        }

        // 5. 渲染分類按鈕 (第三層)
        function renderCategoryButtons() {
            categoryContainer.innerHTML = '';
            const categoriesObj = hotelData[currentCityKey].districts[currentDistrictKey].categories;
            const categoryNames = Object.keys(categoriesObj);
            
            categoryNames.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-5 md:px-6 py-2 md:py-2.5 rounded-xl font-bold text-sm md:text-base transition-all duration-200 border cat-btn-inactive shadow-sm flex-shrink-0 focus:outline-none focus:ring-2 focus:ring-teal-500 focus:ring-offset-1`;
                btn.innerText = cat;
                btn.setAttribute('role', 'tab');
                btn.onclick = () => selectCategory(cat, btn);
                categoryContainer.appendChild(btn);
            });

            // 預設選擇第一個分類
            if (categoryNames.length > 0) {
                const firstBtn = categoryContainer.querySelector('button');
                selectCategory(categoryNames[0], firstBtn);
            }
        }

        // 6. 選擇分類
        function selectCategory(categoryName, activeBtn) {
            currentCategoryName = categoryName;

            const allBtns = categoryContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('cat-btn-active', 'transform', 'scale-105');
                btn.classList.add('cat-btn-inactive');
                btn.setAttribute('aria-selected', 'false');
            });
            activeBtn.classList.remove('cat-btn-inactive');
            activeBtn.classList.add('cat-btn-active', 'transform', 'scale-105');
            activeBtn.setAttribute('aria-selected', 'true');

            renderHotels();
        }

        // 7. 渲染飯店資料 (AEO 語義化結構)
        function renderHotels() {
            const districtData = hotelData[currentCityKey].districts[currentDistrictKey];
            const hotels = districtData.categories[currentCategoryName] || [];

            let htmlContent = `
                <header class="flex flex-col sm:flex-row sm:items-center justify-between mb-8 border-b pb-4 border-teal-100/80 animate-fade-in">
                    <h2 class="text-2xl md:text-3xl font-extrabold text-teal-900 mr-3 tracking-wide flex items-center">
                        <i class="fa-solid fa-location-dot mr-2.5 text-teal-500" aria-hidden="true"></i>${districtData.name}
                    </h2>
                    <span class="inline-block mt-3 sm:mt-0 px-3.5 py-1.5 bg-teal-50 text-teal-800 text-sm md:text-base font-bold rounded-full border border-teal-200 shadow-sm whitespace-nowrap">
                        <i class="fa-solid fa-tag mr-1.5 text-teal-600" aria-hidden="true"></i>${currentCategoryName}
                    </span>
                </header>
            `;

            if (hotels.length === 0) {
                htmlContent += `<p class="text-slate-500 py-12 md:py-16 text-center text-lg animate-fade-in font-medium">此分類目前無推薦資料。</p>`;
            } else {
                htmlContent += `<div class="grid grid-cols-1 md:grid-cols-2 gap-6 lg:gap-8">`;
                
                hotels.forEach((hotel, index) => {
                    // 直接使用您提供的 Trip.com 聯盟連結
                    let targetUrl = hotel.url || "#";
                    
                    const linkTagHTML = `
                        <a href="${targetUrl}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center px-4 md:px-5 py-2.5 mt-4 md:mt-5 rounded-xl text-sm md:text-base font-bold bg-[#ff5b00] text-white hover:bg-[#e05000] transition-all duration-300 shadow-sm hover:shadow-md hover:-translate-y-0.5 cursor-pointer w-full focus:outline-none focus:ring-2 focus:ring-orange-500 focus:ring-offset-2">
                            <i class="fa-solid fa-hotel mr-2" aria-hidden="true"></i>線上看房與訂房優惠
                        </a>
                    `;

                    // 使用 <article> 提升 AEO 結構
                    htmlContent += `
                        <article class="bg-white border border-teal-100/80 p-6 md:p-8 rounded-3xl hover:shadow-2xl transition-all duration-300 transform hover:-translate-y-1.5 animate-fade-in group flex flex-col h-full" style="animation-delay: ${index * 0.05}s;">
                            <div class="flex-grow">
                                <h3 class="text-xl md:text-2xl font-extrabold text-teal-900 flex items-start leading-tight mb-5">
                                    <span class="text-white bg-teal-600 rounded-full w-7 h-7 md:w-8 md:h-8 inline-flex items-center justify-center text-sm md:text-base font-bold mr-3 flex-shrink-0 shadow-sm mt-0.5">${index + 1}</span> 
                                    ${hotel.name}
                                </h3>
                                
                                <div class="space-y-4 md:space-y-5">
                                    <div class="bg-teal-50/50 p-4 rounded-2xl flex items-start border border-teal-100/50 transition-colors group-hover:bg-teal-50">
                                        <span class="font-bold text-teal-800 bg-teal-100 px-2.5 py-0.5 rounded-md mr-3.5 flex-shrink-0 text-xs md:text-sm mt-0.5 border border-teal-200"><i class="fa-solid fa-star mr-1.5 text-amber-500"></i>亮點</span> 
                                        <ul class="list-disc pl-4 m-0 text-sm md:text-base text-slate-700 leading-relaxed font-medium space-y-2 w-full">
                                            ${hotel.feature.map(item => `<li>${item}</li>`).join('')}
                                        </ul>
                                    </div>
                                    <div class="bg-teal-50/50 p-4 rounded-2xl flex items-start border border-teal-100/50 transition-colors group-hover:bg-teal-50">
                                        <span class="font-bold text-teal-800 bg-teal-100 px-2.5 py-0.5 rounded-md mr-3.5 flex-shrink-0 text-xs md:text-sm mt-0.5 border border-teal-200"><i class="fa-solid fa-map-pin mr-1.5 text-red-500"></i>位置</span> 
                                        <span class="text-sm md:text-base text-slate-700 leading-relaxed font-medium pt-0.5">${hotel.address}</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="mt-auto pt-2">
                                ${linkTagHTML}
                            </div>
                        </article>
                    `;
                });
                
                htmlContent += `</div>`;
            }

            contentArea.innerHTML = htmlContent;
        }

        // 區域左右滑動控制 (增強平滑度)
        function scrollDistricts(direction) {
            const container = document.getElementById('district-buttons');
            const scrollAmount = window.innerWidth > 768 ? 400 : 250;
            if (direction === 'left') {
                container.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
            } else {
                container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            }
        }

        // 初始化整個應用
        document.addEventListener('DOMContentLoaded', () => {
            initCityButtons();
            
            // 預設選擇第一個城市 (河內)
            const firstCityKey = Object.keys(hotelData)[0];
            const firstCityBtn = cityContainer.querySelector('button');
            if(firstCityBtn) {
                selectCity(firstCityKey, firstCityBtn);
            }
        });
    </script>
</body>
</html>
