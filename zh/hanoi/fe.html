          ],
          '巴亭郡': [
            { name: '樂天觀景台 (Lotte Observation Deck)', feature: '位於樂天中心65樓，可以360度俯瞰整個河內市區。最受歡迎的是底層透明的「天空步道」，絕對能拍出驚險刺激的打卡照。', transport: '🚗 【Grab】從老城區出發車程約 20-30 分鐘，建議直接搭 Grab。<br>🚇 【捷運/輕軌】未來捷運 3 號線全線通車後可直達，目前暫時以 Grab 或搭乘公車（09A、12號）為主。' }
          ]
        },
        '下龍市': {
          '精選景點': [
            { name: '太陽世界下龍公園 (Sun World)', feature: '大型綜合主題樂園。最著名的設施是「女皇雙層纜車」，可容納230人，跨越海灣景色壯麗。山上還有日式庭園與巨大摩天輪。', transport: '🚌 【長途客運】從河內搭乘長途巴士至下龍市拜雀 (Bai Chay) 區下車。<br>🚗 【當地交通】下龍市區範圍大且無捷運，前往遊樂園強烈建議使用 Grab 叫車，或搭乘當地排班計程車。' }
          ]
        },
        '沙壩': {
          '精選景點': [
            { name: '番西邦峰纜車 (Fansipan Legend)', feature: '通往「中南半島第一高峰」的必經之路。擁有世界最長的三索纜車系統，沿途可俯瞰壯麗的黃連山脈與梯田絕景。', transport: '🚆 【高山輕軌】從沙壩鎮中心的太陽廣場搭乘「芒花登山列車」（類似高山捷運），車程約 10 分鐘至纜車底站。<br>🚠 【纜車】轉乘三索纜車至接近山頂處，最後可選擇步行百階或加購「山頂小火車」輕鬆攻頂。' },
            { name: '沙壩太陽廣場 (Sun Plaza Sapa)', feature: '沙壩鎮上最顯眼的地標，外觀為亮眼的鮮黃色法式鐘樓建築。這裡是商場、飯店也是前往番西邦峰纜車的起站，極具歐洲風情。', transport: '🚶 【步行】位於沙壩鎮正中心，所有市區道路交匯處，搭乘客運或從老街火車站轉乘公車抵達沙壩後，步行即可輕鬆抵達。' },
            { name: 'Moana Sapa 網美景點', feature: '專為拍照打卡設計的園區，內有峇里島風的「天堂之門」、巨型女孩雕像、無邊際水池等造景，以遠方的番西邦峰為背景，非常夢幻。', transport: '🚗 【當地交通】距離鎮中心約 1.5 公里，因沙壩山區起伏大且無市區公車，建議在鎮上搭乘排班的觀光電動車或 Grab / 計程車前往。' }
          ]
        }
      }
    };

    // 狀態管理
    let activeCategory = 'history';
    let activeRegion = '河內';
    let activeDistrict = '還劍郡';

    // SVG 圖示
    const svgMonument = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M2 22h20"/><path d="M12 2v20"/><path d="m4 12 8-8 8 8"/><path d="M6 22v-6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v6"/></svg>`;
    const svgCamera = `<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>`;
    const svgSparkles = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-400 mr-2.5 flex-shrink-0 mt-0.5" aria-hidden="true"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>`;
    const svgMapPin = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500 mr-2.5 flex-shrink-0 mt-0.5" aria-hidden="true"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>`;

    // 色彩主題設定
    const themeConfig = {
      history: {
        bg: 'bg-amber-50', selection: 'selection:bg-amber-300', textMain: 'text-amber-700',
        borderMain: 'border-amber-100', tabActive: 'bg-amber-600 text-white shadow-lg transform scale-105 border-transparent',
        tabHover: 'bg-white text-gray-700 hover:bg-amber-100 hover:text-amber-800 border border-gray-200', 
        iconH2: 'text-amber-600', borderH2: 'border-amber-300',
        cardGradient: 'from-amber-300 via-amber-400 to-amber-300 group-hover:from-amber-400 group-hover:to-amber-500',
        numberBg: 'bg-amber-100 text-amber-800 border border-amber-200', transportBg: 'bg-amber-50/80 border border-amber-100/50',
        btnActive: 'bg-white text-amber-700 shadow-md transform scale-105 border-transparent ring-2 ring-amber-500 ring-offset-1',
        btnInactive: 'text-gray-600 hover:text-amber-600 hover:bg-white/60 border-transparent'
      },
      trendy: {
        bg: 'bg-teal-50', selection: 'selection:bg-teal-300', textMain: 'text-teal-700',
        borderMain: 'border-teal-100', tabActive: 'bg-teal-600 text-white shadow-lg transform scale-105 border-transparent',
        tabHover: 'bg-white text-gray-700 hover:bg-teal-100 hover:text-teal-800 border border-gray-200', 
        iconH2: 'text-teal-600', borderH2: 'border-teal-300',
        cardGradient: 'from-teal-300 via-teal-400 to-teal-300 group-hover:from-teal-400 group-hover:to-teal-500',
        numberBg: 'bg-teal-100 text-teal-800 border border-teal-200', transportBg: 'bg-teal-50/80 border border-teal-100/50',
        btnActive: 'bg-white text-teal-700 shadow-md transform scale-105 border-transparent ring-2 ring-teal-500 ring-offset-1',
        btnInactive: 'text-gray-600 hover:text-teal-600 hover:bg-white/60 border-transparent'
      }
    };

    function updateTheme() {
      const t = themeConfig[activeCategory];
      
      document.getElementById('app-body').className = `min-h-screen font-sans pb-12 transition-colors duration-500 text-gray-800 ${t.bg} ${t.selection} selection:text-gray-900 antialiased`;
      document.getElementById('app-header').className = `bg-white/85 backdrop-blur-lg sticky top-0 z-20 shadow-sm border-b transition-colors duration-500 ${t.borderMain}`;
      
      const iconSvg = activeCategory === 'history' ? svgMonument : svgCamera;
      document.getElementById('title-icon-left').innerHTML = iconSvg;
      document.getElementById('title-icon-right').innerHTML = iconSvg;
      document.getElementById('title-icon-left').className = `animate-pulse flex-shrink-0 ${t.textMain}`;
      document.getElementById('title-icon-right').className = `animate-pulse flex-shrink-0 hidden sm:block ${t.textMain}`;
      
      document.getElementById('season-text').innerText = activeCategory === 'history' ? '歷史' : '打卡';

      document.getElementById('section-title-container').className = `mb-6 md:mb-8 flex items-center space-x-2 sm:space-x-3 transition-colors duration-500 ${t.iconH2}`;
      document.getElementById('section-title').className = `text-2xl sm:text-3xl md:text-4xl font-bold border-b-4 pb-1.5 pr-4 sm:pr-6 inline-block transition-colors duration-500 tracking-wide ${t.borderH2}`;

      const btnHistory = document.getElementById('btn-history');
      const btnTrendy = document.getElementById('btn-trendy');
      btnHistory.className = `flex-shrink-0 flex items-center px-4 md:px-6 py-2 md:py-2.5 rounded-full text-sm md:text-base font-bold transition-all duration-300 focus:outline-none ${activeCategory === 'history' ? t.btnActive : t.btnInactive}`;
      btnHistory.setAttribute('aria-pressed', activeCategory === 'history');
      btnTrendy.className = `flex-shrink-0 flex items-center px-4 md:px-6 py-2 md:py-2.5 rounded-full text-sm md:text-base font-bold transition-all duration-300 focus:outline-none ${activeCategory === 'trendy' ? t.btnActive : t.btnInactive}`;
      btnTrendy.setAttribute('aria-pressed', activeCategory === 'trendy');
    }

    function renderRegions() {
      const regions = Object.keys(placesData[activeCategory]);
      if (!regions.includes(activeRegion)) {
        activeRegion = regions[0];
      }
      const t = themeConfig[activeCategory];
      const container = document.getElementById('region-tabs-container');
      
      container.innerHTML = regions.map(region => `
        <button
          onclick="setRegion('${region}')"
          class="flex-shrink-0 px-5 py-2 rounded-lg text-sm md:text-base font-bold transition-all duration-300 focus:outline-none ${activeRegion === region ? t.tabActive : 'bg-white text-gray-500 hover:bg-gray-50 hover:text-gray-800 border border-gray-200'}"
        >
          ${region}
        </button>
      `).join('');

      renderDistricts();
    }

    function renderDistricts() {
      const districtsObj = placesData[activeCategory][activeRegion];
      const districts = Object.keys(districtsObj);
      
      if (!districts.includes(activeDistrict)) {
        activeDistrict = districts[0];
      }

      const container = document.getElementById('district-tabs-container');
      const t = themeConfig[activeCategory];

      // 如果該區域（如：下龍、沙壩）只有一個「精選景點」子項，則隱藏次選單列使畫面乾淨
      if (districts.length <= 1 && districts[0] === '精選景點') {
        container.style.display = 'none';
      } else {
        container.style.display = 'flex';
        container.innerHTML = districts.map(district => `
          <button
            onclick="setDistrict('${district}')"
            class="flex-shrink-0 px-4 py-1.5 md:px-6 md:py-2 rounded-full text-sm md:text-base font-medium transition-all duration-300 focus:outline-none ${activeDistrict === district ? t.tabActive : t.tabHover}"
          >
            ${district}
          </button>
        `).join('');
      }

      renderCards();
    }

    function renderCards() {
      const t = themeConfig[activeCategory];
      const spots = placesData[activeCategory][activeRegion][activeDistrict];
      
      // 動態更新 H2 標題
      const titleText = activeRegion === '河內' 
        ? `${activeDistrict} 精選景點` 
        : `${activeRegion} 精選景點`;
      document.getElementById('section-title').innerText = titleText;

      const container = document.getElementById('cards-container');
      container.innerHTML = spots.map((spot, index) => `
        <article class="bg-white rounded-3xl shadow-sm hover:shadow-2xl transition-all duration-300 overflow-hidden border border-gray-100 flex flex-col h-full group transform hover:-translate-y-1">
          <div class="h-2.5 w-full bg-gradient-to-r transition-colors duration-500 ${t.cardGradient}" aria-hidden="true"></div>
          <div class="p-6 md:p-8 flex-grow flex flex-col">
            <h3 class="text-xl md:text-2xl font-bold text-gray-800 mb-5 flex items-start leading-tight">
              <span class="rounded-full w-7 h-7 md:w-8 md:h-8 flex items-center justify-center text-sm md:text-base font-bold mr-3 flex-shrink-0 mt-0.5 transition-colors duration-500 shadow-sm ${t.numberBg}">
                ${index + 1}
              </span>
              ${spot.name}
            </h3>
            
            <div class="mb-8 flex-grow">
              <div class="flex items-center text-gray-700 mb-2.5">
                ${svgSparkles}
                <h4 class="font-bold text-base md:text-lg">景點特色</h4>
              </div>
              <p class="text-gray-600 leading-relaxed pl-8 md:pl-9 text-sm md:text-base">
                ${spot.feature}
              </p>
            </div>

            <div class="rounded-2xl p-5 mt-auto transition-colors duration-500 ${t.transportBg}">
              <div class="flex items-center text-gray-800 mb-3">
                ${svgMapPin}
                <h4 class="font-bold text-base md:text-lg">交通指南</h4>
              </div>
              <div class="text-gray-600 text-sm md:text-base pl-8 md:pl-9 leading-relaxed space-y-2">
                ${spot.transport}
              </div>
            </div>
          </div>
        </article>
      `).join('');
    }

    // 事件控制
    function setCategory(category) {
      if (activeCategory === category) return;
      activeCategory = category;
      updateTheme();
      renderRegions();
    }

    function setRegion(region) {
      if (activeRegion === region) return;
      activeRegion = region;
      // 切換大區域時，預設選取第一個子項目
      activeDistrict = Object.keys(placesData[activeCategory][activeRegion])[0];
      renderRegions();
    }

    function setDistrict(district) {
      if (activeDistrict === district) return;
      activeDistrict = district;
      renderDistricts();
    }

    document.getElementById('btn-history').addEventListener('click', () => setCategory('history'));
    document.getElementById('btn-trendy').addEventListener('click', () => setCategory('trendy'));

    // 初始化
    updateTheme();
    renderRegions();
  </script>
</body>
</html>
