<body class="antialiased text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. 資料庫建置 (河內市 + 北越長途) ---
        const mrtData = {
            L2A: [ // 河內捷運 2A 線
                { c: "2A-01", n: "吉靈", e: "Cát Linh", a: "文廟 (步行可達)、轉乘捷運 3 號線" },
                { c: "2A-02", n: "羅城", e: "La Thành", a: "" },
                { c: "2A-03", n: "泰河", e: "Thái Hà", a: "" },
                { c: "2A-04", n: "廊", e: "Láng", a: "" },
                { c: "2A-05", n: "上亭", e: "Thượng Đình", a: "Vincom Mega Mall Royal City" },
                { c: "2A-06", n: "三環", e: "Vành Đai 3", a: "" },
                { c: "2A-07", n: "馮珖", e: "Phùng Khoang", a: "" },
                { c: "2A-08", n: "文館", e: "Văn Quán", a: "" },
                { c: "2A-09", n: "河東", e: "Hà Đông", a: "" },
                { c: "2A-10", n: "羅溪", e: "La Khê", a: "" },
                { c: "2A-11", n: "安義", e: "Yên Nghĩa", a: "安義客運總站 (長途巴士樞紐)" }
            ],
            L3: [ // 河內捷運 3 號線
                { c: "3-01", n: "呠", e: "Nhổn", a: "" },
                { c: "3-02", n: "明開", e: "Minh Khai", a: "" },
                { c: "3-03", n: "富演", e: "Phú Diễn", a: "" },
                { c: "3-04", n: "橋演", e: "Cầu Diễn", a: "" },
                { c: "3-05", n: "黎德壽", e: "Lê Đức Thọ", a: "美亭國家體育場" },
                { c: "3-06", n: "國家大學", e: "Đại Học Quốc Gia", a: "越南國家大學" },
                { c: "3-07", n: "河寺", e: "Chùa Hà", a: "" },
                { c: "3-08", n: "紙橋", e: "Cầu Giấy", a: "紙橋公園" },
                { c: "3-09", n: "金馬", e: "Kim Mã", a: "樂天中心 (Lotte Center)、巴亭廣場" },
                { c: "3-10", n: "吉靈", e: "Cát Linh", a: "轉乘捷運 2A 線" },
                { c: "3-11", n: "文廟", e: "Văn Miếu", a: "文廟-國子監" },
                { c: "3-12", n: "河內火車站", e: "Ga Hà Nội", a: "河內火車站、轉乘機場巴士 86 線" }
            ],
            B86: [ // 機場巴士 86 路線
                { c: "B86-01", n: "河內火車站", e: "Ga Hà Nội", a: "轉乘捷運 3 號線" },
                { c: "B86-02", n: "還劍湖/郵政總局", e: "Bưu Điện / Hoàn Kiếm", a: "還劍湖、三十六古街、大劇院" },
                { c: "B86-03", n: "龍編", e: "Long Biên", a: "龍編橋、同春市場" },
                { c: "B86-04", n: "內排機場 T1", e: "Nội Bài T1", a: "國內航廈" },
                { c: "B86-05", n: "內排機場 T2", e: "Nội Bài T2", a: "國際航廈" }
            ],
            IC_HL: [ // 長途：河內 - 下龍市
                { c: "HL-01", n: "河內老城區 (接駁)", e: "Hanoi Old Quarter", a: "各大飯店接送出發" },
                { c: "HL-02", n: "下龍市 (拜雀/巡洲島)", e: "Halong (Bai Chay/Tuan Chau)", a: "下龍灣遊船碼頭、太陽世界樂園" }
            ],
            IC_SP_T: [ // 長途：河內 - 沙壩 (火車)
                { c: "SPT-01", n: "河內火車站", e: "Ga Hà Nội", a: "搭乘夜間臥鋪觀光火車" },
                { c: "SPT-02", n: "老街火車站", e: "Ga Lào Cai", a: "出站轉乘中型巴士上山" },
                { c: "SPT-03", n: "沙壩市區", e: "Sapa Town", a: "沙壩廣場、洋人街" }
            ],
            IC_SP_B: [ // 長途：河內 - 沙壩 (巴士)
                { c: "SPB-01", n: "安義客運站", e: "Bến Xe Yên Nghĩa", a: "轉乘直達臥鋪巴士" },
                { c: "SPB-02", n: "沙壩市區", e: "Sapa Town", a: "沙壩廣場、洋人街" }
            ]
        };

        const lineColors = {
            L2A: { bg: 'bg-green-600', border: 'border-green-600', text: 'text-green-700', name: '🚇 捷運 2A 線' },
            L3: { bg: 'bg-red-600', border: 'border-red-600', text: 'text-red-700', name: '🚇 捷運 3 號線' },
            B86: { bg: 'bg-orange-500', border: 'border-orange-500', text: 'text-orange-600', name: '✈️ 機場巴士 86 線' },
            IC_HL: { bg: 'bg-cyan-600', border: 'border-cyan-600', text: 'text-cyan-700', name: '🚌 長途巴士 (下龍市)' },
            IC_SP_T: { bg: 'bg-indigo-600', border: 'border-indigo-600', text: 'text-indigo-700', name: '🚆 臥鋪火車 (沙壩)' },
            IC_SP_B: { bg: 'bg-violet-600', border: 'border-violet-600', text: 'text-violet-700', name: '🚌 臥鋪巴士 (沙壩)' }
        };

        // 解決同站不同名/地理位置相近的跨線轉乘綁定
        const aliasMap = {
            "河內老城區 (接駁)": "還劍湖/郵政總局", // 讓下龍市接駁與機場巴士的老城區站綁定
            "安義客運站": "安義" // 讓沙壩臥鋪巴士起點與捷運2A線的安義站綁定
            // "河內火車站" 及 "沙壩市區" 因站名完全相同，系統會自動歸類綁定
        };

        // 扁平化所有站點，建立 graph 與選單資料
        let allStationsMap = {};
        let allStationsList = [];
        let uniquePhysicalStations = {}; 

        Object.keys(mrtData).forEach(lineKey => {
            mrtData[lineKey].forEach(st => {
                allStationsMap[st.c] = { ...st, line: lineKey };
                allStationsList.push(allStationsMap[st.c]);

                let baseName = aliasMap[st.n] || st.n;

                if (!uniquePhysicalStations[baseName]) {
                    uniquePhysicalStations[baseName] = { name: baseName, en: st.e, codes: [], attractions: st.a };
                }
                uniquePhysicalStations[baseName].codes.push(st.c);
                if (st.a && !uniquePhysicalStations[baseName].attractions.includes(st.a)) {
                    uniquePhysicalStations[baseName].attractions += (uniquePhysicalStations[baseName].attractions ? "、" : "") + st.a;
                }
            });
        });

        // 建立圖 (Graph)
        const graph = {};
        const RIDE_TIME = 4; // 市區搭乘一站約抓4分鐘
        const TRANSFER_TIME = 8; // 站外/站內步行轉乘時間

        function addEdge(u, v, weight, type, line) {
            if (!graph[u]) graph[u] = [];
            graph[u].push({ node: v, weight, type, line });
        }

        // 1. 同線相鄰站連線 (加入長途時間設定)
        Object.keys(mrtData).forEach(lineKey => {
            const lineArr = mrtData[lineKey];
            for (let i = 0; i < lineArr.length - 1; i++) {
                let weight = RIDE_TIME;
                // 設定長途交通預估時間 (分鐘)
                if (lineKey === 'IC_HL') weight = 150; // 河內-下龍約 2.5 小時
                else if (lineKey === 'IC_SP_T') weight = (i === 0) ? 480 : 60; // 河內-老街火車 8 小時，老街-沙壩巴士 1 小時
                else if (lineKey === 'IC_SP_B') weight = 360; // 河內-沙壩巴士約 6 小時

                addEdge(lineArr[i].c, lineArr[i+1].c, weight, 'ride', lineKey);
                addEdge(lineArr[i+1].c, lineArr[i].c, weight, 'ride', lineKey);
            }
        });

        // 2. 轉乘站連線 (合併站點間建立互通邊)
        Object.values(uniquePhysicalStations).forEach(station => {
            if (station.codes.length > 1) {
                for (let i = 0; i < station.codes.length; i++) {
                    for (let j = i + 1; j < station.codes.length; j++) {
                        addEdge(station.codes[i], station.codes[j], TRANSFER_TIME, 'transfer', null);
                        addEdge(station.codes[j], station.codes[i], TRANSFER_TIME, 'transfer', null);
                    }
                }
            }
        });

        // --- 2. 核心演算法 Dijkstra ---
        function findShortestPath(startBaseName, endBaseName) {
            if (startBaseName === endBaseName) return null;

            const startCodes = uniquePhysicalStations[startBaseName].codes;
            const endCodes = uniquePhysicalStations[endBaseName].codes;

            const dist = {};
            const prev = {};
            const pq = [];

            Object.keys(allStationsMap).forEach(node => {
                dist[node] = Infinity;
                prev[node] = null;
            });

            startCodes.forEach(code => {
                dist[code] = 0;
                pq.push({ node: code, dist: 0 });
            });

            while (pq.length > 0) {
                pq.sort((a, b) => a.dist - b.dist);
                const { node, dist: currentDist } = pq.shift();

                if (dist[node] < currentDist) continue;
                if (endCodes.includes(node)) {
                    return reconstructPath(prev, node);
                }

                if (graph[node]) {
                    graph[node].forEach(edge => {
                        const alt = currentDist + edge.weight;
                        if (alt < dist[edge.node]) {
                            dist[edge.node] = alt;
                            prev[edge.node] = { node: node, edgeFromPrev: edge };
                            pq.push({ node: edge.node, dist: alt });
                        }
                    });
                }
            }
            return null;
        }

        function reconstructPath(prev, endNode) {
            const path = [];
            let curr = endNode;
            
            while (curr) {
                const step = prev[curr];
                if (step) {
                    path.unshift({ node: curr, edge: step.edgeFromPrev });
                    curr = step.node;
                } else {
                    path.unshift({ node: curr, edge: null }); 
                    curr = null;
                }
            }

            const legs = [];
            if (path.length < 2) return [];

            let currentLeg = { 
                type: path[1].edge.type, 
                line: path[1].edge.line, 
                nodes: [path[0].node, path[1].node],
                time: path[1].edge.weight,
                stops: path[1].edge.type === 'ride' ? 1 : 0
            };

            for (let i = 2; i < path.length; i++) {
                const edge = path[i].edge;
                if (edge.type === currentLeg.type && edge.line === currentLeg.line) {
                    currentLeg.nodes.push(path[i].node);
                    currentLeg.time += edge.weight;
                    if(edge.type === 'ride') currentLeg.stops += 1;
                } else {
                    legs.push(currentLeg);
                    currentLeg = { 
                        type: edge.type, 
                        line: edge.line, 
                        nodes: [path[i-1].node, path[i].node],
                        time: edge.weight,
                        stops: edge.type === 'ride' ? 1 : 0
                    };
                }
            }
            legs.push(currentLeg);
            return legs;
        }

        // --- 3. React 元件 ---
        const { useState, useEffect } = React;

        const App = () => {
            // 預設為尋找機場到沙壩的深度旅遊路線
            const [startStation, setStartStation] = useState("內排機場 T2");
            const [endStation, setEndStation] = useState("沙壩市區");
            const [route, setRoute] = useState(null);

            useEffect(() => {
                lucide.createIcons();
            });

            useEffect(() => {
                if(startStation && endStation && startStation !== endStation) {
                    const legs = findShortestPath(startStation, endStation);
                    setRoute(legs);
                } else {
                    setRoute(null);
                }
            }, [startStation, endStation]);

            const handleSwap = () => {
                const temp = startStation;
                setStartStation(endStation);
                setEndStation(temp);
            };

            return (
                <div className="min-h-screen pb-12 flex flex-col font-sans">
                    {/* Header: Semantic Tag */}
                    <header role="banner" className="bg-teal-900 text-white shadow-md pt-10 pb-8 px-4 sm:px-6 text-center">
                        <div className="flex flex-wrap items-center justify-center gap-3 md:gap-4 mb-3">
                            <a href="https://kokko-travel.com/zh/hanoi/" aria-label="回到首頁" title="回到首頁" className="inline-flex items-center justify-center text-teal-100 hover:text-white bg-teal-800 hover:bg-teal-700 p-2 md:p-2.5 rounded-full transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-400">
                                <i data-lucide="home" className="w-5 h-5 md:w-6 md:h-6"></i>
                            </a>
                            <h1 className="text-xl sm:text-2xl md:text-3xl font-bold tracking-tight flex items-center gap-2">
                                <i data-lucide="map" className="w-6 h-6 md:w-8 md:h-8 text-yellow-400 shrink-0"></i>
                                河內與北越交通導航
                            </h1>
                        </div>
                        <p className="text-teal-200 text-xs sm:text-sm max-w-lg mx-auto">涵蓋河內市區捷運、機場巴士，及前往下龍市、沙壩長途路線查詢</p>
                    </header>

                    <main role="main" className="flex-grow max-w-3xl md:max-w-4xl mx-auto w-full px-4 sm:px-6 lg:px-8 -mt-6">
                        {/* Search Box */}
                        <section aria-label="搜尋路線" className="bg-white rounded-2xl shadow-xl p-5 md:p-7 mb-8 relative">
                            <div className="flex flex-col gap-5">
                                <div className="relative">
                                    <label htmlFor="start-station" className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5 block">出發站 (Start)</label>
                                    <select 
                                        id="start-station"
                                        className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-base md:text-lg rounded-xl focus:ring-teal-500 focus:border-teal-500 block p-3.5 md:p-4 pr-10 truncate font-medium appearance-none cursor-pointer transition-colors hover:bg-slate-100"
                                        value={startStation}
                                        onChange={(e) => setStartStation(e.target.value)}
                                        aria-label="選擇出發站點"
                                    >
                                        {Object.keys(mrtData).map(lineKey => (
                                            <optgroup key={`start-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                {mrtData[lineKey].map(st => {
                                                    const baseName = aliasMap[st.n] || st.n;
                                                    return (
                                                        <option key={`start-${st.c}`} value={baseName}>
                                                            [{st.c}] {st.n} ({st.e})
                                                        </option>
                                                    );
                                                })}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 bottom-0 top-7 flex items-center px-4 text-slate-400">
                                        <i data-lucide="chevron-down" className="w-5 h-5"></i>
                                    </div>
                                </div>

                                <div className="relative flex justify-center -my-4 z-10">
                                    <button 
                                        onClick={handleSwap}
                                        className="bg-teal-600 hover:bg-teal-700 text-white p-3 md:p-3.5 rounded-full shadow-lg transition-transform hover:scale-110 focus:outline-none focus:ring-4 focus:ring-teal-200"
                                        aria-label="反轉起終點路線"
                                        title="反轉起終點路線"
                                    >
                                        <i data-lucide="arrow-down-up" className="w-5 h-5 md:w-6 md:h-6"></i>
                                    </button>
                                </div>

                                <div className="relative">
                                    <label htmlFor="end-station" className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5 block">抵達站 (Destination)</label>
                                    <select 
                                        id="end-station"
                                        className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-base md:text-lg rounded-xl focus:ring-teal-500 focus:border-teal-500 block p-3.5 md:p-4 pr-10 truncate font-medium appearance-none cursor-pointer transition-colors hover:bg-slate-100"
                                        value={endStation}
                                        onChange={(e) => setEndStation(e.target.value)}
                                        aria-label="選擇抵達站點"
                                    >
                                        {Object.keys(mrtData).map(lineKey => (
                                            <optgroup key={`end-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                {mrtData[lineKey].map(st => {
                                                    const baseName = aliasMap[st.n] || st.n;
                                                    return (
                                                        <option key={`end-${st.c}`} value={baseName}>
                                                            [{st.c}] {st.n} ({st.e})
                                                        </option>
                                                    );
                                                })}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 bottom-0 top-7 flex items-center px-4 text-slate-400">
                                        <i data-lucide="chevron-down" className="w-5 h-5"></i>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Route Results */}
                        <section aria-live="polite">
                            {startStation === endStation ? (
                                <div className="bg-yellow-50 text-yellow-800 p-5 rounded-2xl text-center shadow-sm border border-yellow-200 font-medium md:text-lg">
                                    📍 起點與終點位於同一個站點或轉乘區唷！
                                </div>
                            ) : route ? (
                                <RouteTimeline legs={route} destName={endStation} />
                            ) : (
                                <div className="text-center text-slate-500 py-10 flex flex-col items-center">
                                    <i data-lucide="loader" className="w-8 h-8 animate-spin text-teal-500 mb-3"></i>
                                    <span className="font-medium text-lg">正在計算最佳路線...</span>
                                </div>
                            )}
                        </section>
                        
                        {/* AEO / GEO Context block - Helps AI understand the tool */}
                        <section className="mt-10 bg-white p-5 md:p-7 rounded-2xl shadow-sm text-slate-600 text-sm leading-relaxed border border-slate-100" aria-labelledby="seo-desc">
                            <h2 id="seo-desc" className="font-bold text-base md:text-lg text-slate-800 mb-3 flex items-center gap-2">
                                <i data-lucide="info" className="w-5 h-5 text-teal-600"></i>
                                關於河內與北越交通導航系統
                            </h2>
                            <p className="mb-2">本系統專為越南自由行旅客設計，提供河內市區捷運 (Metro 2A 吉靈-河東線、Metro 3 呠-河內火車站線)、內排機場巴士 (86號) 的路線查詢與自動轉乘計算。</p>
                            <p><strong>2026年全新升級：</strong>新增北越長途交通導航，完美涵蓋從河內出發至<strong>下龍市 (Halong Bay)</strong> 的豪華客運接駁，以及前往<strong>沙壩 (Sapa)</strong> 的夜間臥鋪火車與直達臥鋪巴士路線。透過本工具，您可以輕鬆規劃從機場到市區，再延伸至各大知名景點的無縫旅程。</p>
                        </section>

                    </main>

                    {/* Footer */}
                    <footer role="contentinfo" className="w-full mt-12 md:mt-16 pt-8 pb-12 border-t border-slate-200 text-center px-4">
                        <div className="max-w-4xl mx-auto text-xs sm:text-sm text-slate-400 space-y-2 leading-relaxed">
                            <p className="font-bold text-slate-500 text-sm sm:text-base mb-3">Copyright &copy; 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
                            <p>版權所有，未經授權禁止轉載、翻印或任何商業用途。</p>
                            <p>本站包含之圖片、文字內容及程式碼均受法律保護。</p>
                        </div>
                    </footer>
                </div>
            );
        };

        const RouteTimeline = ({ legs, destName }) => {
            const totalTime = legs.reduce((acc, leg) => acc + leg.time, 0);
            const totalTransfers = legs.filter(l => l.type === 'transfer').length;
            const destInfo = uniquePhysicalStations[destName];
            
            // Format time helper (convert mins to hours and mins)
            const formatTime = (mins) => {
                if (mins < 60) return `${mins} 分鐘`;
                const h = Math.floor(mins / 60);
                const m = mins % 60;
                return m > 0 ? `${h} 小時 ${m} 分鐘` : `${h} 小時`;
            };

            return (
                <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                    <div className="bg-slate-50 border-b border-slate-200 p-5 md:p-6 flex justify-between items-center">
                        <div>
                            <p className="text-xs md:text-sm font-bold text-slate-500 uppercase tracking-widest mb-1">預估總時間</p>
                            <p className="text-2xl md:text-3xl font-extrabold text-teal-800">
                                {formatTime(totalTime)}
                            </p>
                        </div>
                        <div className="text-right border-l border-slate-200 pl-4 md:pl-6">
                            <p className="text-xs md:text-sm font-bold text-slate-500 uppercase tracking-widest mb-1">轉乘次數</p>
                            <p className="text-xl md:text-2xl font-bold text-slate-700">
                                {totalTransfers} <span className="text-base font-medium text-slate-500">次</span>
                            </p>
                        </div>
                    </div>

                    <div className="p-5 md:p-8">
                        <div className="ml-3 md:ml-5">
                            {legs.map((leg, idx) => (
                                <LegItem key={idx} leg={leg} isLast={idx === legs.length - 1} destName={destName} formatTime={formatTime} />
                            ))}
                        </div>
                        
                        {/* Destination Marker */}
                        <div className="relative pl-8 md:pl-10 border-l-4 border-transparent">
                            <div className="absolute left-[-12px] md:left-[-12px] top-1 w-5 h-5 bg-slate-800 rounded-full border-4 border-white shadow-sm z-10"></div>
                            <div className="absolute left-[-18px] md:left-[-18px] top-[-5px] w-8 h-8 bg-slate-200 rounded-full opacity-50 z-0 animate-pulse"></div>
                            <h3 className="text-lg md:text-xl font-extrabold text-slate-800 flex items-center flex-wrap gap-x-2">
                                {destInfo.name} 
                                <span className="text-sm md:text-base font-normal text-slate-500">{destInfo.en}</span>
                            </h3>
                            <p className="text-sm font-medium text-teal-600 mt-1 mb-2 tracking-wide">🏁 抵達目的地 (Arrival)</p>
                            
                            {destInfo.attractions && (
                                <div className="mt-3 bg-teal-50 border border-teal-100 rounded-xl p-3 md:p-4 text-sm md:text-base flex gap-3 shadow-sm">
                                    <i data-lucide="map-pin" className="w-5 h-5 md:w-6 md:h-6 text-teal-600 shrink-0 mt-0.5"></i>
                                    <div>
                                        <span className="font-bold text-teal-900 block mb-1">地標與景點推薦：</span>
                                        <span className="text-teal-800 leading-relaxed block">{destInfo.attractions}</span>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const LegItem = ({ leg, isLast, destName, formatTime }) => {
            const startNodeCode = leg.nodes[0];
            const endNodeCode = leg.nodes[leg.nodes.length - 1];
            const startStation = allStationsMap[startNodeCode];
            const endStation = allStationsMap[endNodeCode];

            if (leg.type === 'transfer') {
                return (
                    <div className="relative pl-8 md:pl-10 pb-8 md:pb-10 border-l-4 border-dashed border-slate-300">
                        <div className="absolute left-[-16px] md:left-[-16px] top-1 w-7 h-7 bg-white rounded-full border-2 border-slate-300 z-10 flex items-center justify-center shadow-sm">
                            <i data-lucide="footprints" className="w-4 h-4 text-slate-500"></i>
                        </div>
                        <div className="bg-slate-50 border border-slate-200 rounded-xl p-3 md:p-4 inline-block shadow-sm">
                            <p className="text-sm md:text-base font-bold text-slate-700">
                                於 <span className="text-slate-900 mx-1">{aliasMap[startStation.n] || startStation.n}</span> 步行轉乘
                            </p>
                            <p className="text-xs md:text-sm text-slate-500 mt-1.5 flex items-center gap-1.5 font-medium">
                                <i data-lucide="clock" className="w-3.5 h-3.5 md:w-4 md:h-4"></i> 步行約 {formatTime(leg.time)}
                            </p>
                        </div>
                    </div>
                );
            }

            // Ride Type
            const lineTheme = lineColors[leg.line] || { bg: 'bg-slate-500', border: 'border-slate-500', text: 'text-slate-600', name: leg.line };
            
            return (
                <div className={`relative pl-8 md:pl-10 pb-8 md:pb-10 border-l-4 ${lineTheme.border}`}>
                    {/* Circle Node */}
                    <div className={`absolute left-[-12px] md:left-[-12px] top-1 w-5 h-5 rounded-full border-4 border-white shadow-sm z-10 ${lineTheme.bg}`}></div>
                    
                    {/* Leg Start Info */}
                    <div className="mb-3">
                        <h3 className="text-base md:text-lg font-bold text-slate-800 flex items-center flex-wrap gap-x-2">
                            {startStation.n} 
                            <span className="text-sm font-normal text-slate-500">{startStation.e}</span>
                        </h3>
                        
                        {startStation.a && (
                            <p className="text-xs md:text-sm text-teal-600 mt-1.5 flex items-start gap-1.5 bg-teal-50/50 inline-block px-2 py-1 rounded-md border border-teal-100 font-medium">
                                <i data-lucide="star" className="w-3.5 h-3.5 mt-0.5 shrink-0 inline"></i>
                                <span className="inline">{startStation.a}</span>
                            </p>
                        )}
                    </div>

                    {/* Line Details Card */}
                    <div className={`mt-4 md:mt-5 border-l-4 rounded-r-xl p-4 md:p-5 bg-white shadow-md border-y border-r border-slate-100 transition-transform hover:-translate-y-0.5 ${lineTheme.border}`}>
                        <div className="flex flex-wrap items-center gap-2.5 mb-2">
                            <span className={`${lineTheme.bg} text-white text-[10px] md:text-xs font-bold px-2 md:px-2.5 py-1 rounded md:rounded-md uppercase tracking-wider shadow-sm`}>
                                {startNodeCode}
                            </span>
                            <span className={`text-sm md:text-base font-bold ${lineTheme.text}`}>搭乘 {lineTheme.name}</span>
                        </div>
                        <div className="text-sm md:text-base text-slate-600 flex flex-wrap items-center gap-2 md:gap-3 mt-3 font-medium bg-slate-50 p-2 md:p-3 rounded-lg border border-slate-100">
                            <span>前往 <strong className="text-slate-800 text-base md:text-lg mx-1">{endStation.n}</strong></span>
                            <span className="text-slate-300 hidden sm:inline">|</span>
                            <span className="bg-white px-2 py-0.5 rounded shadow-sm border border-slate-200 text-xs md:text-sm">{leg.stops} 站</span>
                            <span className="text-slate-300 hidden sm:inline">|</span>
                            <span className="text-slate-500 flex items-center gap-1">
                                <i data-lucide="clock" className="w-3.5 h-3.5"></i>約 {formatTime(leg.time)}
                            </span>
                        </div>
                        
                        {/* Pass through stations */}
                        {leg.nodes.length > 2 && (
                            <div className="mt-3 text-xs md:text-sm text-slate-400 leading-relaxed px-1">
                                途經: {leg.nodes.slice(1, -1).map(c => allStationsMap[c].n).join(' ➔ ')}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
