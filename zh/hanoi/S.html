      { id: 'sp_ta_van', city: 'sapa', name: '踏梅村 & 左彎村健行', stay: 4, timeWindow: [8, 17], region: 31, regionName: '沙壩近郊', type: '歷史人文', desc: '深入芒花山谷的梯田秘境，遠離喧囂，體驗最道地的少數民族村落風光與深度健行樂趣。', transport: '建議包車或參加當地健行導覽團前往。' },

      // ================= 寧平 (Ninh Binh) =================
      { id: 'ninh_binh', city: 'ninh_binh', name: '寧平 陸龍灣 (長安/三谷)', stay: 8, timeWindow: [8, 19], region: 21, regionName: '寧平', type: '歷史人文', desc: '有「陸上下龍灣」之稱。乘坐手搖小船穿梭於奇特喀斯特地形與水上石灰岩洞穴中。', transport: '距離河內約 2 小時車程，建議參加當地一日遊行程。', bookingLinks: [
        {url: 'https://www.klook.com/zh-TW/activity/39366-ninh-binh-sightseeing-day-tour-local-experiences-hanoi/?aid=117191', text: '華閭＆長安名勝群一日遊'}
      ] }
    ];

    // 更新城市主選單 (標示更明確的「河內市區景點」)
    const CITIES = [
      { id: 'hanoi', name: '📍 河內市區景點', color: 'blue' },
      { id: 'ha_long', name: '下龍灣 (世界遺產)', color: 'cyan' },
      { id: 'sapa', name: '沙壩 (山城梯田)', color: 'purple' },
      { id: 'ninh_binh', name: '寧平 (陸龍灣)', color: 'orange' }
    ];

    // --- 核心交通與排程邏輯區 ---
    const formatTime = (h) => {
      let hh = Math.floor(h) % 24;
      let mm = Math.round((h - Math.floor(h)) * 60);
      if (mm === 60) { hh++; mm = 0; }
      return `${hh.toString().padStart(2, '0')}:${mm.toString().padStart(2, '0')}`;
    };

    // 根據標籤名稱(regionName) 給予專屬顏色，讓河內市各區標籤具有辨識度
    const getTagColor = (cityId, regionName) => {
      const colorMap = {
        '還劍郡': 'blue',
        '巴亭郡': 'fuchsia',
        '西湖郡': 'emerald',
        '棟多郡': 'amber',
        '機場': 'slate',
        '下龍灣': 'cyan',
        '沙壩': 'purple',
        '沙壩近郊': 'purple',
        '寧平': 'orange'
      };
      
      const c = colorMap[regionName] || (cityId === 'hanoi' ? 'blue' : 'slate');
      return `text-${c}-600 bg-${c}-100 border-${c}-200`;
    };

    const getSmartTransit = (prev, curr) => {
      if (curr.id === 'ret') return '✈️ 【準備回國】搭乘 Grab、計程車 或 機場巴士前往內排國際機場 (HAN) 報到。';

      if (!prev || prev.id.startsWith('acc_') || prev.type === '起點') {
        if (curr.type === '機場') return `🛬 【抵達河內】搭乘 Grab 或 86 號機場巴士前往市區 ${curr.name}。`;
        return `🏨 【出發前往】搭乘 Grab 叫車或步行前往 ${curr.name}。`;
      }

      // 沙壩跨城
      if (curr.city === 'sapa' || (prev && prev.city === 'sapa')) {
          if (prev && prev.city === curr.city) return `🚗 【市內移動】在沙壩山城內步行或搭計程車前往 ${curr.name}。`;
          return `🚐 【跨城移動】搭乘臥鋪火車或直達臥鋪巴士往返沙壩 (單程約 5.5 - 7 小時車程)。`;
      }

      // 下龍灣跨城
      if (curr.city === 'ha_long' || (prev && prev.city === 'ha_long')) {
          if (prev && prev.city === curr.city) return `🚗 【市內移動】在下龍市區內搭乘 Grab 前往 ${curr.name}。`;
          return `🚐 【跨城移動】搭乘豪華巴士或旅行社專車往返下龍灣 (單程約 2.5 小時車程)。`;
      }
      
      // 寧平跨城
      if (curr.city === 'ninh_binh' || (prev && prev.city === 'ninh_binh')) {
          if (prev && prev.city === curr.city) return `🚗 【市內移動】在寧平市區內搭乘 Grab 前往 ${curr.name}。`;
          return `🚐 【跨城移動】搭乘巴士或旅行社專車往返寧平陸龍灣 (單程約 2 小時車程)。`;
      }

      // 河內跨區移動 (同為 hanoi 但不同行政區)
      if (prev.city === 'hanoi' && curr.city === 'hanoi' && prev.regionName !== curr.regionName && !prev.id.startsWith('acc_') && prev.id !== 'hcmc_origin') {
          return `🚗 【跨區移動】搭乘 Grab 叫車或計程車從 ${prev.regionName} 前往 ${curr.regionName} (約 10-15 分)。`;
      }

      // 其他一般跨城防呆
      if (prev.city !== curr.city && prev.id !== 'hcmc_origin') {
         return `🚗 【跨城移動】搭乘長途客運或專車進行跨城移動。`;
      }

      return `🚶 【市內移動】從 ${prev.name} 步行，或搭乘短程 Grab 前往 ${curr.name}。`;
    };

    const getTTime = (isNewDay, fCity, tCity, fReg, tReg) => {
        let extraFarTime = 0;
        
        // 前往機場時間較長
        if (fReg === 10 || tReg === 10 || fReg === 999 || tReg === 999) return 0.8; 

        // 處理跨城的巨大交通時間差異
        if ((fCity === 'sapa' && tCity !== 'sapa') || (tCity === 'sapa' && fCity !== 'sapa')) {
            extraFarTime += 6.0; 
        } else if ((fCity === 'ha_long' && tCity !== 'ha_long') || (tCity === 'ha_long' && fCity !== 'ha_long')) {
            extraFarTime += 2.5; 
        } else if ((fCity === 'ninh_binh' && tCity !== 'ninh_binh') || (tCity === 'ninh_binh' && fCity !== 'ninh_binh')) {
            extraFarTime += 2.0;
        }
        
        if (fCity && tCity && fCity !== tCity) {
            // 如果牽涉到跨城，基礎時間略加一些緩衝
            if (fCity === 'ha_long' || tCity === 'ha_long' || fCity === 'sapa' || tCity === 'sapa' || fCity === 'ninh_binh' || tCity === 'ninh_binh') return 0.5 + extraFarTime;
            return 0.4 + extraFarTime;
        }
        
        // 同城市但不同區域 (例如 河內市內的 還劍郡 到 巴亭郡)
        if (fCity === tCity && fReg !== tReg) {
            return 0.3 + extraFarTime;
        }
        
        if (isNewDay) return 0.3 + extraFarTime;
        return 0.2 + extraFarTime;
    };

    // --- 主應用程式 ---
    function App() {
      const [activeCity, setActiveCity] = useState('hanoi'); // 預設河內市
      const [selectedIds, setSelectedIds] = useState([]);
      const [showPrintView, setShowPrintView] = useState(false);
      const [tripDuration, setTripDuration] = useState(5);

      const toggleAttr = (id) => setSelectedIds(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

      // 判斷是否選擇了沙壩景點
      const hasSapaSelected = selectedIds.some(id => {
          const attr = ATTRACTIONS.find(a => a.id === id);
          return attr && attr.city === 'sapa';
      });

      const itineraryDays = useMemo(() => {
        if (selectedIds.length === 0) return [];
        let idsToSchedule = [...new Set(selectedIds)];

        const getPriority = (item) => {
            if (item.id === 'ret') return 999;
            if (item.type === '起點') return 10;
            if (item.type === '機場') return 15;
            if (item.type === '住宿區域') return 20; 
            let win = item.timeWindow || [9.5, 21.5];
            const isNight = (['商圈'].includes(item.type) && win[1] >= 22) || item.id === 'ta_hien' || item.id === 'lotte_center' || item.id === 'hoan_kiem_lake' || item.id === 'night_market';
            if (isNight) return 90; 
            if (win[1] <= 17.5) return 30; 
            return 50; 
        };

        const sorted = idsToSchedule
          .map(id => ATTRACTIONS.find(a => a.id === id))
          .filter(a => a)
          .sort((a, b) => {
            const getSortKey = (item) => {
              let sk = getPriority(item);
              let cityGroup = CITIES.findIndex(c => c.id === item.city);
              return cityGroup * 100000 + sk * 1000; 
            };
            return getSortKey(a) - getSortKey(b);
          });

        let remaining = [...sorted];
        let days = [];
        let curDay = { items: [], dayCity: 'hanoi', dayType: null, currentTime: 13.0 }; 
        let lCity = 'hanoi', lReg = 11, prevItemObj = null; 

        const checkValid = (a, isF, curTime) => {
            let tTime = getTTime(isF, lCity, a.city, lReg, a.region);
            let arrivalTime = curTime + tTime;
            let isLastDay = days.length === tripDuration - 1;
            if (!isF) {
                if (!['住宿區域', '機場', '起點'].includes(a.type)) {
                    if (a.city !== lCity) {
                        if (remaining.some(r => r.city === lCity && !['住宿區域', '機場', '起點'].includes(r.type))) return false;
                        if (curTime > 15) return false;
                    }
                }
            }
            let win = a.timeWindow || [9, 22]; 
            if (['住宿區域', '機場'].includes(a.type)) win = [0, 24];
            let waitTime = arrivalTime < win[0] ? win[0] - arrivalTime : 0;
            if (waitTime > 2.0 && !isF) return false;
            let actStart = arrivalTime + waitTime;
            let actEnd = actStart + a.stay;
            if (actStart >= win[1] - 0.5) return false; 
            if (isLastDay) {
                let retTFromA = getTTime(false, a.city, 'hanoi', a.region, 10);
                if (actEnd > (14.0 - 2.5 - retTFromA)) return false;
            } else if (!isF && actEnd > 23.5) return false;
            return { valid: true, tTime, waitTime, actStart, actEnd };
        };

        while (remaining.length > 0) {
            const isF = curDay.items.length === 0;
            let chosenIdx = -1, chosenStats = null, validCands = [];
            for (let i = 0; i < remaining.length; i++) {
                let stats = checkValid(remaining[i], isF, curDay.currentTime);
                if (stats && stats.valid) validCands.push({ a: remaining[i], idx: i, prio: getPriority(remaining[i]), stats });
            }
            if (validCands.length > 0) {
                validCands.sort((ca, cb) => {
                    let isSameCityA = ca.a.city === lCity ? 1 : 0, isSameCityB = cb.a.city === lCity ? 1 : 0;
                    if (isSameCityA !== isSameCityB) return isSameCityB - isSameCityA;
                    if (ca.prio !== cb.prio) return ca.prio - cb.prio;
                    if (ca.stats.tTime !== cb.stats.tTime) return ca.stats.tTime - cb.stats.tTime;
                    return ca.idx - cb.idx; 
                });
                chosenIdx = validCands[0].idx; chosenStats = validCands[0].stats;
            }
            if (chosenIdx === -1) {
                days.push(curDay);
                if (days.length >= tripDuration) break;
                curDay = { items: [], dayCity: remaining[0].city, dayType: null, currentTime: 9.0 };
                continue;
            }
            const a = remaining.splice(chosenIdx, 1)[0];
            const { tTime, waitTime, actStart, actEnd } = chosenStats;
            if (isF && days.length === 0) prevItemObj = { id: 'hcmc_origin', city: 'hanoi', name: '機場/抵達點', type: '起點' };
            if (isF && days.length > 0) prevItemObj = { id: 'acc_hanoi', city: a.city, name: `住宿地 (${CITIES.find(c=>c.id===a.city)?.name || '市區'})`, type: '住宿區域' }; 
            let sTime = curDay.currentTime, aTime = sTime + tTime;
            let transitMsg = getSmartTransit(prevItemObj, a) + `\n📍 路線指南：${a.transport}`;
            let win = a.timeWindow || [9, 22];
            if (actStart - aTime > 0 && win[0] > 0 && !['住宿區域', '機場'].includes(a.type)) transitMsg += `\n💡 建議：此景點建議 ${win[0]}:00 後開始，預計 ${formatTime(aTime)} 抵達，可稍作休息。`;
            curDay.items.push({ ...a, tTime: tTime.toFixed(1), prevName: prevItemObj.name, transitTransport: transitMsg, tStr: `${formatTime(sTime)} - ${formatTime(aTime)}`, sStr: (days.length === 0 && isF && a.type === '機場') ? '抵達通關' : `${formatTime(actStart)} - ${formatTime(actEnd)}`, isFirstAirport: (days.length === 0 && isF && a.type === '機場'), endTime: actEnd });
            curDay.currentTime = actEnd; lCity = a.city; lReg = a.region; prevItemObj = a;
            if (isF) curDay.dayCity = a.city;
        }
        if (curDay.items.length > 0 && days.length < tripDuration) days.push(curDay);
        while (days.length < tripDuration) days.push({ items: [], dayCity: lCity, dayType: null, currentTime: 9.0 });
        
        let lastD = days[days.length-1];
        if (!lastD) { lastD = { items: [], dayCity: 'hanoi', dayType: null, currentTime: 9.0 }; days.push(lastD); }
        while (lastD.items.length > 0) {
            let lastItem = lastD.items[lastD.items.length-1];
            if (lastItem.endTime > (14.0 - 2.5 - getTTime(false, lastItem.city, 'hanoi', lastItem.region, 10))) lastD.items.pop();
            else break;
        }
        if (lastD.items.length > 0) { let lastItem = lastD.items[lastD.items.length-1]; lastD.currentTime = lastItem.endTime; lCity = lastItem.city; lReg = lastItem.region; prevItemObj = lastItem; }
        else { lastD.currentTime = 9.0; lReg = 11; prevItemObj = { name: '住宿地', city: lCity }; }
        let retT = getTTime(lastD.items.length === 0, lCity, 'hanoi', lReg, 10), startTransit = 14.0 - 2.5 - retT;
        let transitMsg = lastD.currentTime < startTransit ? `💡 距離前往機場還有空檔時間，建議於 ${formatTime(startTransit)} 準備出發。\n🚐 搭乘 Grab 前往機場。` : '🚐 搭乘 Grab 或 86 號機場巴士 前往內排機場 (HAN) 報到。';
        lastD.items.push({ id: 'ret', city: 'hanoi', name: '結束旅程前往機場回國', stay: 2.5, region: 999, regionName: '機場', type: '機場', desc: '祝您有趟完美的越南回憶！河內機場出境人潮眾多，請務必提早報到。', transport: '搭乘 Grab 直達機場。', tTime: retT.toFixed(1), prevName: prevItemObj.name, transitTransport: transitMsg, tStr: `${formatTime(startTransit)} - ${formatTime(14.0 - 2.5)}`, sStr: `${formatTime(14.0 - 2.5)} - 14:00`, isFirstAirport: false, endTime: 14.0 });
        lastD.currentTime = 14.0;

        return days.map((d, i) => ({ dayNum: i+1, totalH: (d.currentTime - (i === 0 ? 13.0 : 9.0) > 0 ? (d.currentTime - (i === 0 ? 13.0 : 9.0)).toFixed(1) : "0.0"), cityName: CITIES.find(c => c.id === d.dayCity)?.name.replace('📍 ','') || '河內市', items: d.items }));
      }, [selectedIds, tripDuration]);

      if (showPrintView) {
        return (
          <div className="min-h-screen bg-white p-4 sm:p-8">
            <div className="max-w-3xl mx-auto border-2 border-slate-800 p-4 sm:p-8 rounded-2xl">
              <div className="text-center mb-10"><h1 className="text-2xl sm:text-3xl font-bold">🇻🇳 專屬北越自由行 行程表</h1><p className="mt-2 text-slate-500 text-sm">智慧排程系統自動為您計算跨區交通與景點營業時間</p></div>
              
              {hasSapaSelected && (
                <div className="mb-8 bg-purple-50 border border-purple-200 p-4 sm:p-5 rounded-xl print-break-avoid">
                  <h4 className="font-bold text-purple-800 text-sm sm:text-base mb-3 flex items-center gap-2">
                    <i className="fa-solid fa-bus"></i> 💡 溫馨提示：您已安排沙壩行程，建議提早預訂長途交通
                  </h4>
                  <div className="flex flex-col sm:flex-row gap-3 print-hidden">
                    <a href="https://www.klook.com/zh-TW/activity/133909-hanoi-sapa-sleeper-bus-by-hk-buslines/?spm=SearchResult.SearchResult_LIST&clickId=48e013a366&aid=117191" target="_blank" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-xs sm:text-sm px-3 py-2.5 rounded-lg font-bold transition-colors shadow-sm flex items-center justify-center gap-2 flex-1">
                      <i className="fa-solid fa-ticket"></i> 河內 - 沙壩 HK Buslines 臥鋪巴士
                    </a>
                    <a href="https://www.klook.com/zh-TW/activity/22928-viet-nam-rail-deluxe-train-sapa-hanoi/?spm=SearchResult.SearchResult_LIST&clickId=1217ceaafc&aid=117191" target="_blank" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-xs sm:text-sm px-3 py-2.5 rounded-lg font-bold transition-colors shadow-sm flex items-center justify-center gap-2 flex-1">
                      <i className="fa-solid fa-ticket"></i> 越南河內 - 沙壩臥鋪火車票
                    </a>
                  </div>
                  <div className="hidden print:block text-xs text-slate-600 space-y-1">
                    <p>• 河內 - 沙壩 HK Buslines 臥鋪巴士 (請至 Klook 搜尋)</p>
                    <p>• 越南河內 - 沙壩臥鋪火車票 (請至 Klook 搜尋)</p>
                  </div>
                </div>
              )}

              {itineraryDays.map(d => (
                <div key={d.dayNum} className="mb-10 print-break-avoid">
                  <h2 className="text-xl font-bold border-b-2 pb-2 mb-6">🌞 第 {d.dayNum} 天 - 【{d.cityName} 區域】 ({d.totalH}h)</h2>
                  <div className="space-y-6 ml-2 sm:ml-4 border-l-2 pl-4 sm:pl-6 border-slate-300">
                    {d.items.map((it, idx) => (
                      <div key={`${it.id}-${idx}`} className="relative mb-8">
                        {!it.isFirstAirport && (
                          <div className="mb-4 bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs sm:text-sm">
                             <div className="font-bold mb-2">{it.prevName} ➔ {it.name}</div>
                             <div className="flex gap-3 mb-2"><span className="bg-white px-2 py-1 rounded border font-mono text-blue-500"><i className="fa-regular fa-clock"></i> {it.tStr}</span><span>車程估計：{it.tTime}h</span></div>
                             <div className="whitespace-pre-wrap text-slate-600">{it.transitTransport}</div>
                          </div>
                        )}
                        <div className="relative">
                          <div className="absolute -left-[23px] sm:-left-[31px] top-1 w-3 h-3 bg-blue-500 rounded-full border-2 border-white"></div>
                          <div className="font-bold text-xs sm:text-sm text-slate-500 mb-1"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : '停留：'}{it.sStr}</div>
                          <h4 className="text-lg sm:text-xl font-bold text-slate-900">{it.name}</h4>
                          <p className="text-xs sm:text-sm text-slate-600 my-2 leading-relaxed">{it.desc}</p>
                          {it.bookingLinks && <div className="mt-3 flex gap-2 flex-wrap print:hidden">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" className="bg-[#ff5b00] text-white text-xs px-2.5 py-1.5 rounded font-bold hover:bg-[#e05000]"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              <div className="mt-10 text-center flex flex-col sm:flex-row justify-center gap-4 print-hidden">
                <button onClick={() => setShowPrintView(false)} className="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-700">返回編輯</button>
                <button onClick={() => window.print()} className="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-500">列印行程 / 儲存 PDF</button>
              </div>
            </div>
          </div>
        );
      }

      const grouped = ATTRACTIONS.filter(a => a.city === activeCity && !a.id.startsWith('acc_')).reduce((acc, c) => { (acc[c.type] = acc[c.type] || []).push(c); return acc; }, {});

      return (
        <div className="min-h-screen bg-slate-50 pb-10 flex flex-col">
          <header role="banner" className="bg-white p-4 shadow-sm flex flex-wrap justify-between items-center sticky top-0 z-30 border-b gap-3">
            <div className="flex items-center gap-4">
              <h1 className="font-bold text-lg md:text-xl flex items-center gap-2"><i className="fa-solid fa-wand-magic-sparkles text-blue-600"></i>北越自由行魔法師</h1>
              <a href="https://kokko-travel.com/zh/hanoi/" aria-label="回到首頁" className="hidden sm:flex items-center gap-1.5 text-xs font-bold text-slate-500 hover:text-blue-600 bg-slate-100 hover:bg-blue-50 px-3 py-1.5 rounded-full border border-slate-200 transition-colors"><i className="fa-solid fa-house"></i> 回到首頁</a>
            </div>
            <div className="flex items-center gap-2 md:gap-3">
              <a href="https://kokko-travel.com/zh/hanoi/" aria-label="回到首頁" className="sm:hidden flex items-center justify-center text-slate-500 hover:text-blue-600 bg-slate-100 w-8 h-8 rounded-full border border-slate-200"><i className="fa-solid fa-house text-sm"></i></a>
              {selectedIds.length > 0 && <button onClick={() => setSelectedIds([])} className="text-xs font-bold text-red-500 hover:text-white border border-red-500 hover:bg-red-500 px-3 py-1.5 rounded-full shadow-sm flex items-center gap-1 cursor-pointer transition-colors"><i className="fa-solid fa-trash-can"></i> 清空</button>}
              <div className="text-xs font-bold bg-slate-800 text-white px-3 py-1.5 rounded-full shadow-sm">已選 {selectedIds.length} 站</div>
            </div>
          </header>
          
          <main role="main" className="flex-grow max-w-7xl mx-auto w-full p-4 flex flex-col lg:flex-row gap-6 mt-2">
            
            {/* 左側：景點選擇區 */}
            <section aria-label="景點選擇" className="lg:w-1/2 flex flex-col gap-4">
              <div className="bg-white p-2 rounded-xl flex gap-2 overflow-x-auto shadow-sm custom-scrollbar scroll-smooth snap-x">
                {CITIES.map(c => <button key={c.id} onClick={() => setActiveCity(c.id)} className={`touch-target px-5 py-2 md:py-2.5 rounded-lg text-sm font-bold whitespace-nowrap transition-all snap-center ${activeCity === c.id ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 hover:bg-slate-200 text-slate-600'}`}>{c.name}</button>)}
              </div>
              
              <article aria-label="排程提示" className="bg-white rounded-xl shadow-sm p-4 border border-slate-200">
                <h2 className="text-sm font-bold flex items-center gap-2 mb-1.5"><i className="fa-solid fa-circle-info text-blue-500"></i>智慧排程提示</h2>
                <p className="text-xs md:text-sm text-slate-500 leading-relaxed">系統會自動將<strong className="text-orange-500">歷史古蹟</strong>排白天，<strong className="text-indigo-500">夜景商圈</strong>排晚上。跨越下龍灣、沙壩等跨城移動將自動計算長途交通時間 (如沙壩 6H)！</p>
              </article>

              <div className="max-h-[50vh] lg:max-h-[65vh] overflow-y-auto space-y-6 pr-2 custom-scrollbar">
                {Object.entries(grouped).map(([type, items]) => (
                  <div key={type} className="mb-6">
                    <h3 className="font-bold text-slate-700 mb-3 sticky top-0 bg-slate-50/95 py-2 backdrop-blur-sm z-10 border-b border-slate-200">{type}</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4">
                      {items.map(it => (
                        <div key={it.id} onClick={() => toggleAttr(it.id)} className={`p-4 md:p-5 rounded-xl cursor-pointer border-2 transition-all ${selectedIds.includes(it.id) ? 'bg-blue-50 border-blue-500 scale-[1.02] shadow-md' : 'bg-white border-transparent shadow-sm hover:border-slate-300'}`}>
                          <div className="font-bold text-slate-900 mb-2 md:text-lg">{it.name}</div>
                          <div className="text-[10px] md:text-xs flex flex-wrap gap-2 mb-2">
                            <span className="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600 font-medium"><i className="fa-regular fa-clock mr-1"></i>{it.stay}h</span>
                            <span className={`px-1.5 py-0.5 rounded border font-medium ${getTagColor(it.city, it.regionName)}`}><i className="fa-solid fa-location-dot mr-1"></i>{it.regionName}</span>
                          </div>
                          <p className="text-xs md:text-sm text-slate-500 line-clamp-2 leading-relaxed">{it.desc}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </section>

            {/* 右側：行程結果區 */}
            <section aria-label="生成的行程表" className="lg:w-1/2">
              <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col max-h-[75vh] lg:max-h-[85vh] lg:sticky lg:top-24">
                <div className="bg-slate-800 text-white p-5 md:p-6 z-20">
                  <h2 className="text-xl font-bold flex items-center gap-2"><i className="fa-regular fa-calendar-check text-blue-400"></i>您的專屬行程表</h2>
                  <div className="flex flex-wrap gap-2 mt-4">
                    <select aria-label="選擇旅遊天數" value={tripDuration} onChange={(e) => setTripDuration(Number(e.target.value))} className="flex-1 sm:flex-none bg-slate-700 text-white font-bold py-3 px-3 rounded-xl border border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none">
                      <option value={3}>3 日遊</option><option value={4}>4 日遊</option><option value={5}>5 日遊</option><option value={6}>6 日遊</option><option value={7}>7 日遊</option>
                    </select>
                    <button onClick={() => setSelectedIds([])} className={`touch-target flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-4 py-3 rounded-xl font-bold shadow-sm transition-colors ${selectedIds.length > 0 ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-slate-600 text-slate-400 cursor-not-allowed'}`} disabled={selectedIds.length === 0}><i className="fa-solid fa-rotate-right"></i><span>重設</span></button>
                    <button onClick={() => setShowPrintView(true)} disabled={itineraryDays.length === 0} className="touch-target w-full sm:flex-1 bg-blue-600 hover:bg-blue-500 py-3 px-2 rounded-xl font-bold text-white text-sm sm:text-base cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed transition-colors shadow-md">產出詳細行程 & PDF</button>
                  </div>
                </div>
                <div className="p-5 md:p-6 overflow-y-auto flex-1 custom-scrollbar bg-slate-50/50">
                  
                  {hasSapaSelected && (
                    <div className="mb-6 bg-purple-50 border border-purple-200 p-4 rounded-xl shadow-sm">
                      <h4 className="font-bold text-purple-800 text-sm md:text-base mb-3 flex items-center gap-2">
                        <i className="fa-solid fa-bus"></i> 💡 沙壩長途交通預訂推薦
                      </h4>
                      <div className="flex flex-col gap-2.5">
                        <a href="https://www.klook.com/zh-TW/activity/133909-hanoi-sapa-sleeper-bus-by-hk-buslines/?spm=SearchResult.SearchResult_LIST&clickId=48e013a366&aid=117191" target="_blank" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-xs md:text-sm px-3.5 py-2.5 rounded-lg font-bold transition-colors shadow-sm flex items-center gap-2">
                          <i className="fa-solid fa-ticket"></i> 河內 (Hanoi) - 沙壩 (Sapa) HK Buslines 臥鋪巴士
                        </a>
                        <a href="https://www.klook.com/zh-TW/activity/22928-viet-nam-rail-deluxe-train-sapa-hanoi/?spm=SearchResult.SearchResult_LIST&clickId=1217ceaafc&aid=117191" target="_blank" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-xs md:text-sm px-3.5 py-2.5 rounded-lg font-bold transition-colors shadow-sm flex items-center gap-2">
                          <i className="fa-solid fa-ticket"></i> 越南河內 - 沙壩臥鋪火車票
                        </a>
                      </div>
                    </div>
                  )}

                  {itineraryDays.length === 0 ? <div className="text-center text-slate-400 py-20 flex flex-col items-center gap-4"><i className="fa-brands fa-fort-awesome text-6xl opacity-10"></i><p className="font-medium text-lg">請從左側點選您感興趣的景點</p></div> : 
                    itineraryDays.map(d => (
                      <article key={d.dayNum} className="mb-10">
                        <h3 className="font-bold text-lg md:text-xl mb-5 border-b-2 border-slate-200 pb-2 flex items-center gap-2 text-slate-800"><i className="fa-solid fa-sun text-orange-500"></i> 第 {d.dayNum} 天 - 【{d.cityName}】 <span className="text-xs font-normal text-slate-400 ml-auto bg-white px-2 py-1 rounded shadow-sm">總計: {d.totalH}h</span></h3>
                        <div className="space-y-6 border-l-[3px] border-slate-200 ml-4 pl-6 md:pl-8 relative pb-4">
                          {d.items.map((it, idx) => (
                            <div key={`${it.id}-${idx}`} className="relative mb-6">
                              {!it.isFirstAirport && (
                                <div className="mb-4 relative">
                                  <div className="absolute -left-[35px] md:-left-[43px] top-1/2 -translate-y-1/2 w-4 h-4 md:w-5 md:h-5 bg-slate-100 rounded-full border-2 border-slate-300 flex items-center justify-center shadow-sm z-10"><i className="fa-solid fa-arrow-down text-[8px] md:text-[10px] text-slate-400"></i></div>
                                  <div className={`rounded-xl p-3.5 md:p-4 text-xs md:text-sm border shadow-sm ${it.transitTransport.includes('跨城') || it.transitTransport.includes('近郊') || it.transitTransport.includes('跨區') ? 'bg-red-50/80 border-red-100' : 'bg-blue-50/80 border-blue-100'}`}>
                                    <div className={`font-bold mb-2 md:text-base ${it.transitTransport.includes('跨城') || it.transitTransport.includes('近郊') || it.transitTransport.includes('跨區') ? 'text-red-800' : 'text-blue-800'}`}>{it.prevName} ➔ {it.name}</div>
                                    <div className="flex flex-wrap items-center gap-2 mb-2">
                                      <span className={`bg-white px-2 py-0.5 rounded border font-mono shadow-sm ${it.transitTransport.includes('跨城') || it.transitTransport.includes('近郊') || it.transitTransport.includes('跨區') ? 'border-red-200 text-red-600' : 'border-blue-200 text-blue-600'}`}><i className="fa-regular fa-clock mr-1"></i> {it.tStr}</span>
                                      <span className={`font-medium bg-white px-2 py-0.5 rounded shadow-sm ${it.transitTransport.includes('跨城') || it.transitTransport.includes('近郊') || it.transitTransport.includes('跨區') ? 'text-red-600' : 'text-blue-600'}`}>車程 {it.tTime}h</span>
                                    </div>
                                    <div className="text-slate-600 whitespace-pre-wrap leading-relaxed mt-1.5">{it.transitTransport}</div>
                                  </div>
                                </div>
                              )}
                              <div className="bg-white p-4 md:p-5 rounded-2xl border border-slate-200 shadow-sm relative hover:shadow-md transition-shadow">
                                <div className="absolute -left-[33px] md:-left-[41px] top-4 md:top-5 w-4 h-4 md:w-5 md:h-5 bg-blue-500 rounded-full border-[3px] border-white shadow-sm z-10"></div>
                                <div className="text-xs md:text-sm font-bold text-slate-400 mb-1.5"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : '停留: '}{it.sStr}</div>
                                <h4 className="font-bold text-base md:text-lg mb-1.5 text-slate-800">{it.name}</h4>
                                <p className="text-xs md:text-sm text-slate-500 leading-relaxed">{it.desc}</p>
                                {it.bookingLinks && <div className="mt-3.5 flex gap-2 flex-wrap">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-[10px] md:text-xs px-2.5 py-1.5 rounded-lg font-bold transition-colors shadow-sm"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                              </div>
                            </div>
                          ))}
                        </div>
                      </article>
                    ))
                  }
                </div>
              </div>
            </section>
          </main>
          
          {/* Footer 版權宣告 */}
          <footer role="contentinfo" className="w-full mt-10 pt-8 pb-12 border-t border-slate-200 text-center px-4">
            <div className="max-w-4xl mx-auto text-xs sm:text-sm text-slate-400 space-y-2 leading-relaxed">
              <p className="font-bold text-slate-500 text-sm sm:text-base mb-3">Copyright &copy; 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
              <p>版權所有，未經授權禁止轉載、翻印或任何商業用途。</p>
              <p>本站包含之圖片、文字內容及程式碼均受法律保護。</p>
            </div>
          </footer>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
