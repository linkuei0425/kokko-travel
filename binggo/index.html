    <script type="text/babel">
        const { useState, useEffect } = React;

        const defaultPilioData = `115010750 02, 03, 06, 09, 14, 24, 27, 31, 32, 36, 38, 39, 45, 52, 53, 57, 59, 69, 71, 74

        const IconDatabase = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></svg>;

        const IconRefreshCw = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>;
        const IconCloudDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 17l4 4 4-4"/><path d="M12 12v9"/><path d="M20.88 18.09A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.29"/></svg>;

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error: error };
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="p-5 text-red-600 bg-red-50 min-h-screen">
                            <h2 className="text-xl font-bold mb-2">⚠️ React 渲染器遭遇錯誤</h2>
                            <p className="text-sm">系統在顯示畫面時發生例外狀況，請聯絡開發者或重新整理網頁。</p>
                            <pre className="text-xs bg-white p-3 mt-4 border border-red-200 rounded overflow-auto">
                                {this.state.error && this.state.error.toString()}
                            </pre>
                        </div>
                    );
                }
                return this.props.children; 
            }
        }

        const NumberBadge = ({ num, source, size = "normal" }) => {
            if (!num) return null; 
            const sizeClass = size === "small" ? "w-7 h-7 text-xs" : "w-10 h-10 text-base";
            let colorClass = "bg-slate-700 text-white";
            if (source === 'N1') colorClass = "bg-red-500 shadow-red-200";
            else if (source === 'N2') colorClass = "bg-cyan-500 shadow-cyan-200";
            else if (source === 'N3') colorClass = "bg-green-500 shadow-green-200";
            else if (source === 'N4') colorClass = "bg-purple-500 shadow-purple-200";
            else if (source === 'N5') colorClass = "bg-orange-500 shadow-orange-200";
            else if (source === 'N6') colorClass = "bg-slate-400 shadow-slate-200";
            else if (source === 'N7') colorClass = "bg-rose-600 shadow-rose-200";
            else if (source === 'N8') colorClass = "bg-fuchsia-600 shadow-fuchsia-200";
            return (
                <span className={`inline-flex items-center justify-center rounded-full font-bold shadow-md text-white ${colorClass} ${sizeClass} relative`}>
                    {num.toString().padStart(2, '0')}
                    {source && size !== "small" && <span className="absolute -top-2 -right-2 text-[8px] bg-white text-gray-800 px-1 rounded-full shadow border">{source}</span>}
                </span>
            );
        };

        // 支援顯示 set1 (組合A) 與 set2 (組合B)
        const StarRow = ({ stars, data, customDesc }) => (
            <div className="bg-white p-4 rounded-xl shadow-sm border mb-4 animate-fade-in">
                <div className="mb-3 border-b pb-2">
                    <h4 className="font-bold text-gray-800 text-lg">{stars} 星精準推薦</h4>
                    <p className="text-xs text-gray-500 mt-1">{customDesc}</p>
                </div>
                <div>
                    {['set1', 'set2'].map(setKey => {
                        const set = data[setKey];
                        if (!set) return null;
                        return (
                            <div key={setKey} className={setKey === 'set2' ? "mt-4 pt-4 border-t border-dashed border-gray-200" : ""}>
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded">
                                        {data.set2 ? (setKey === 'set1' ? '組合 A' : '組合 B') : '主力組合'}
                                    </span>
                                    <div className="flex gap-1 text-[10px] font-medium flex-wrap justify-end">
                                        {set.breakdown.n1 > 0 && <span className="text-red-500">核心:{set.breakdown.n1}</span>}
                                        {set.breakdown.n2 > 0 && <span className="text-cyan-500">回歸:{set.breakdown.n2}</span>}
                                        {set.breakdown.n5 > 0 && <span className="text-orange-500">破冰:{set.breakdown.n5}</span>}
                                        {set.breakdown.n3 > 0 && <span className="text-green-500">拖號:{set.breakdown.n3}</span>}
                                        {set.breakdown.n4 > 0 && <span className="text-purple-500">共伴:{set.breakdown.n4}</span>}
                                        {set.breakdown.n6 > 0 && <span className="text-slate-500">未開小號:{set.breakdown.n6}</span>}
                                        {set.breakdown.n7 > 0 && <span className="text-rose-500">5熱:{set.breakdown.n7}</span>}
                                        {set.breakdown.n8 > 0 && <span className="text-fuchsia-600">強尾:{set.breakdown.n8}</span>}
                                    </div>
                                </div>
                                <div className="flex flex-wrap gap-x-2 gap-y-3">
                                    {set.numbers.map((n, i) => <NumberBadge key={`${stars}-${setKey}-${n}-${i}`} num={n} source={set.sources[n]} />)}
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>
        );

        function App() {
            const [activeTab, setActiveTab] = useState('input');
            const [rawText, setRawText] = useState(defaultPilioData);
            const [stats, setStats] = useState(null);
            const [parsedCount, setParsedCount] = useState(0);
            const [isUpdating, setIsUpdating] = useState(false);
            const [parsedDetails, setParsedDetails] = useState([]);
            const [singleNumbers, setSingleNumbers] = useState('');

            const parseData = (input) => {
                let text = input.replace(/['"]/g, ' ')
                                .replace(/\d{2,4}[-/\.]\d{1,2}[-/\.]\d{1,2}/g, ' ')
                                .replace(/\d{1,2}:\d{2}(:\d{2})?/g, ' ')
                                .replace(/\([一二三四五六日]\)/g, ' ')
                                .replace(/[期別數開獎時間號碼連莊球大小單雙－\t\n第超級猜-]/g, ' ')
                                .replace(/(\d{40})/g, (match) => match.match(/.{2}/g).join(' '));
                
                text = text.replace(/\b\d{1,4}[-/\.]\d{1,2}[-/\.]\d{1,2}\b/g, ' '); 
                text = text.replace(/\b\d{1,2}[-/\.]\d{1,2}\b/g, ' '); 
                
                let details = []; 
                let parts = text.split(/\b(\d{8,10})\b/);
                
                if (parts[0]) {
                    let nums = parts[0].match(/\b\d+\b/g);
                    if (nums) {
                        let validNums = nums.map(Number).filter(n => n >= 1 && n <= 80);
                        let currentDraw = new Set();
                        for (let n of validNums) {
                            currentDraw.add(n);
                            if (currentDraw.size === 20) {
                                details.push({ period: "未知", numbers: Array.from(currentDraw).sort((a, b) => a - b) });
                                currentDraw = new Set();
                            }
                        }
                    }
                }

                if (parts.length > 1) {
                    for (let i = 1; i < parts.length; i += 2) {
                        let period = parts[i];
                        let block = parts[i+1];
                        let nums = block.match(/\b\d+\b/g);
                        if (!nums) continue;
                        let validNums = nums.map(Number).filter(n => n >= 1 && n <= 80);
                        let uniqueNums = Array.from(new Set(validNums));
                        if (uniqueNums.length >= 20) {
                            details.push({ period, numbers: uniqueNums.slice(0, 20).sort((a, b) => a - b) });
                        }
                    }
                }
                
                let uniqueMap = new Map();
                details.forEach(d => {
                    uniqueMap.set(d.period !== "未知" ? d.period : d.numbers.join(','), d);
                });
                details = Array.from(uniqueMap.values());
                
                let hasValidPeriod = details.some(d => d.period !== "未知");
                if (hasValidPeriod) {
                    details.sort((a, b) => (parseInt(a.period) || 0) - (parseInt(b.period) || 0));
                } else {
                    details.reverse();
                }
                
                if (details.length > 200) {
                    details = details.slice(-200);
                }
                return { array: details.map(d => d.numbers), details: details }; 
            };

            const calculateStats = (drawData) => {
                if (drawData.length < 15) return null; 

                let gaps = Array(81).fill(0);
                
                let recent10DrawsN1 = drawData.slice(-10);
                let recent10Freqs = Array(81).fill(0);
                recent10DrawsN1.forEach(d => d.forEach(n => recent10Freqs[n]++));

                let recent5Draws = drawData.slice(-5);
                let recent5Freqs = Array(81).fill(0);
                recent5Draws.forEach(d => d.forEach(n => recent5Freqs[n]++));

                let lastSeen = Array(81).fill(-1);
                drawData.forEach((draw, index) => {
                    draw.forEach(n => { lastSeen[n] = index; });
                });
                for (let i = 1; i <= 80; i++) {
                    gaps[i] = lastSeen[i] !== -1 ? drawData.length - 1 - lastSeen[i] : drawData.length;
                }

                let cov = Array(81).fill(0).map(() => Array(81).fill(0));
                drawData.forEach(draw => {
                    for (let i = 0; i < draw.length; i++) {
                        for (let j = i + 1; j < draw.length; j++) {
                            cov[draw[i]][draw[j]]++;
                            cov[draw[j]][draw[i]]++;
                        }
                    }
                });

                let trail = Array(81).fill(0).map(() => Array(81).fill(0));
                for (let i = 0; i < drawData.length - 1; i++) {
                    let currentDraw = drawData[i];
                    let nextDraw = drawData[i + 1];
                    currentDraw.forEach(m => {
                        nextDraw.forEach(n => { trail[m][n]++; });
                    });
                }

                let latestDraw = drawData[drawData.length - 1];
                let prevDraw = drawData.length >= 2 ? drawData[drawData.length - 2] : [];
                let trailScores = Array(81).fill(0);
                latestDraw.forEach(m => {
                    for (let n = 1; n <= 80; n++) trailScores[n] += trail[m][n];
                });

                let hot15 = [...Array(80).keys()].map(i => i + 1).map(num => ({ num, count: recent10Freqs[num] })).filter(x => x.count > 0).sort((a, b) => b.count - a.count).slice(0, 15);
                let cold15 = [...Array(80).keys()].map(i => i + 1).map(num => ({ num, gap: gaps[num] })).filter(x => x.gap > 0).sort((a, b) => b.gap - a.gap).slice(0, 15);

                let pairCandidates = [];
                for (let i = 1; i < 80; i++) {
                    let score = trailScores[i] + trailScores[i+1] + (cov[i][i+1] * 1.5); 
                    pairCandidates.push({ n1: i, n2: i+1, score: score });
                }
                pairCandidates.sort((a, b) => b.score - a.score);
                let topPairs = [];
                let usedNumsForPairs = new Set();
                for (let p of pairCandidates) {
                    if (!usedNumsForPairs.has(p.n1) && !usedNumsForPairs.has(p.n2)) {
                        topPairs.push(p);
                        usedNumsForPairs.add(p.n1);
                        usedNumsForPairs.add(p.n2);
                        if (topPairs.length === 2) break; 
                    }
                }

                let n3Counts = Array(81).fill(0);
                latestDraw.forEach(m => {
                    let sortedTrails = [...Array(80).keys()].map(i => i + 1)
                        .filter(n => n !== m)
                        .sort((a, b) => trail[m][b] - trail[m][a]);
                    let secondHighest = sortedTrails[1]; 
                    if (secondHighest) n3Counts[secondHighest]++;
                });
                let n3Candidates = [...Array(80).keys()].map(i => i + 1).sort((a, b) => n3Counts[b] - n3Counts[a] || trailScores[b] - trailScores[a]);
                
                let n2Candidates = [...Array(80).keys()].map(i => i + 1).filter(i => recent10Freqs[i] === 2 && gaps[i] > 1).sort((a, b) => gaps[b] - gaps[a]); 
                if (n2Candidates.length < 2) {
                    let extra = [...Array(80).keys()].map(i => i + 1).sort((a, b) => gaps[b] - gaps[a]).filter(x => !n2Candidates.includes(x));
                    n2Candidates = [...n2Candidates, ...extra.slice(0, 2)];
                }
                let icebreakerCandidates = [...Array(80).keys()].map(i => i + 1).sort((a, b) => gaps[b] - gaps[a]);
                let hot5Candidates = [...Array(80).keys()].map(i => i + 1).sort((a, b) => recent5Freqs[b] - recent5Freqs[a]);
                
                let notOpenedLast2_1to10_Candidates = [...Array(10).keys()].map(i => i + 1)
                    .filter(n => !latestDraw.includes(n) && !prevDraw.includes(n))
                    .sort((a, b) => gaps[b] - gaps[a]);

                let warmPool = [...Array(80).keys()].map(i => i + 1).filter(i => recent10Freqs[i] >= 2 && recent10Freqs[i] <= 3);
                let coreIntersectionPicks = warmPool.sort((a, b) => trailScores[b] - trailScores[a]);
                if (coreIntersectionPicks.length < 5) {
                    let needed = 5 - coreIntersectionPicks.length;
                    let extraN3 = n3Candidates.filter(num => !coreIntersectionPicks.includes(num)).slice(0, needed);
                    coreIntersectionPicks = [...coreIntersectionPicks, ...extraN3];
                }

                let recent10Draws = drawData.slice(-10);
                let tailCounts = Array(10).fill(0);
                recent10Draws.forEach(draw => {
                    draw.forEach(n => tailCounts[n % 10]++);
                });
                let strongTails = [];
                let maxTailPossible = recent10Draws.length * 8; 
                for (let i = 0; i < 10; i++) {
                    let ratio = tailCounts[i] / maxTailPossible;
                    if (ratio >= 0.25 && ratio <= 0.30) {
                        strongTails.push({ tail: i, count: tailCounts[i], percentage: Math.round(ratio * 100) });
                    }
                }
                strongTails.sort((a, b) => b.percentage - a.percentage);

                let validTails = strongTails.map(t => t.tail);
                let n8Candidates = [...Array(80).keys()].map(i => i + 1)
                    .filter(num => recent5Freqs[num] > 0 && recent5Freqs[num] < 5)
                    .filter(num => validTails.includes(num % 10))
                    .sort((a, b) => recent5Freqs[b] - recent5Freqs[a]);

                // --- 提前計算牽引號相關資料，方便星級產生時取用 ---
                let trailDetails = latestDraw.map(num => {
                    let sortedTrails = [...Array(80).keys()].map(i => i + 1)
                        .filter(i => i !== num)
                        .map(target => ({ target, count: trail[num][target] || 0 }))
                        .sort((a, b) => b.count - a.count);
                    
                    return { 
                        source: num, 
                        top1: sortedTrails[0] ? sortedTrails[0].target : null, 
                        top1Count: sortedTrails[0] ? sortedTrails[0].count : 0,
                        top2: sortedTrails[1] ? sortedTrails[1].target : null,
                        top2Count: sortedTrails[1] ? sortedTrails[1].count : 0
                    };
                }).sort((a, b) => a.source - b.source);

                let pullCounts = {};
                trailDetails.forEach(item => {
                    if (item.top1) pullCounts[item.top1] = (pullCounts[item.top1] || 0) + 1;
                    if (item.top2) pullCounts[item.top2] = (pullCounts[item.top2] || 0) + 1;
                });
                let multiPulled = Object.keys(pullCounts)
                    .map(Number)
                    .map(num => ({ num, count: pullCounts[num] }))
                    .filter(item => item.count >= 2)
                    .sort((a, b) => b.count - a.count)
                    .slice(0, 5);

                let multiPulledCandidates = multiPulled.map(item => item.num);
                // 防呆：若該期無多重牽引號，則備用取自一般拖號
                if (multiPulledCandidates.length === 0) {
                    multiPulledCandidates = [...n3Candidates]; 
                }
                // ------------------------------------------------

                const generateStars = (targetStars) => {
                    let selected = new Set();
                    let sources = {};
                    let breakdown = { n1: 0, n2: 0, n3: 0, n4: 0, n5: 0, n6: 0, n7: 0, n8: 0 };
                    
                    const getSafe = (list, srcType) => {
                        let found = list.find(x => !selected.has(x));
                        if (found !== undefined) {
                            selected.add(found);
                            sources[found] = srcType;
                            breakdown[srcType.toLowerCase()]++;
                        } else {
                            let fallback = [...Array(80).keys()].map(i=>i+1).find(x => !selected.has(x));
                            if (fallback) {
                                selected.add(fallback);
                                sources[fallback] = srcType;
                                breakdown[srcType.toLowerCase()]++;
                            }
                        }
                    };

                    const pickByCount = (list, srcType, count) => {
                        for(let i=0; i<count; i++) getSafe(list, srcType);
                    };

                    const pickN8WithDeduplication = () => {
                        let usedTails = new Set(Array.from(selected).map(n => n % 10));
                        let availableTails = strongTails.map(t => t.tail).filter(t => !usedTails.has(t));
                        
                        if (availableTails.length > 0) {
                            let idealN8 = [...Array(80).keys()].map(i => i + 1)
                                .filter(n => !selected.has(n))
                                .filter(n => availableTails.includes(n % 10))
                                .filter(n => recent5Freqs[n] > 0 && recent5Freqs[n] < 5)
                                .sort((a, b) => recent5Freqs[b] - recent5Freqs[a]);
                                
                            if (idealN8.length > 0) {
                                getSafe(idealN8, 'N8');
                                return true;
                            } else {
                                let fallbackN8 = [...Array(80).keys()].map(i => i + 1)
                                    .filter(n => !selected.has(n))
                                    .filter(n => availableTails.includes(n % 10))
                                    .sort((a, b) => recent5Freqs[b] - recent5Freqs[a]);
                                if (fallbackN8.length > 0) {
                                    getSafe(fallbackN8, 'N8');
                                    return true;
                                }
                            }
                        }
                        return false;
                    };

                    let baseCores = coreIntersectionPicks.slice(0, 2);
                    
                    if (targetStars === 2) {
                        baseCores.forEach(n => { selected.add(n); sources[n] = 'N1'; breakdown.n1++; });
                    } 
                    // ====== 3星組合 A與B ======
                    else if (targetStars === '3-1') {
                        pickByCount(icebreakerCandidates, 'N5', 1);
                        pickByCount(hot5Candidates, 'N7', 2);
                    }
                    else if (targetStars === '3-2') {
                        // 新公式: 拖號(2) + 多重牽引號(1)
                        pickByCount(n3Candidates, 'N3', 2);
                        pickByCount(multiPulledCandidates, 'N3', 1);
                    }
                    // ====== 4星組合 A與B ======
                    else if (targetStars === '4-1') {
                        pickByCount(coreIntersectionPicks, 'N1', 2);
                        pickByCount(hot5Candidates, 'N7', 1);
                        pickByCount(icebreakerCandidates, 'N5', 1);
                    }
                    else if (targetStars === '4-2') {
                        // 新公式: 多重牽引號(1) + 拖號(2) + 核心(1)
                        pickByCount(multiPulledCandidates, 'N3', 1);
                        pickByCount(n3Candidates, 'N3', 2);
                        pickByCount(coreIntersectionPicks, 'N1', 1);
                    }
                    // ==============================================
                    else if (targetStars === 5) {
                        pickByCount(hot5Candidates, 'N7', 2);

                            getSafe(n3Candidates, 'N3');
                        }
                        pickByCount(n3Candidates, 'N3', 2);
                    }
                    else if (targetStars === 6) {
                        pickByCount(hot5Candidates, 'N7', 2);
                        pickByCount(n3Candidates, 'N3', 1);
                        if (!pickN8WithDeduplication()) {
                            getSafe(n3Candidates, 'N3'); 
                        }
                        let c1 = [...Array(80).keys()].map(i => i + 1).sort((a, b) => Array.from(selected).reduce((sum, s) => sum + cov[s][b], 0) - Array.from(selected).reduce((sum, s) => sum + cov[s][a], 0));
                        getSafe(c1, 'N4'); 
                        pickByCount(icebreakerCandidates, 'N5', 1); 
                    }
                    else if (targetStars === 7) {
                        pickByCount(n3Candidates, 'N3', 2);
                        pickByCount(icebreakerCandidates, 'N5', 2);
                        pickByCount(notOpenedLast2_1to10_Candidates, 'N6', 1);
                        let c1 = [...Array(80).keys()].map(i => i + 1).sort((a, b) => Array.from(selected).reduce((sum, s) => sum + cov[s][b], 0) - Array.from(selected).reduce((sum, s) => sum + cov[s][a], 0));
                        pickByCount(c1, 'N4', 2);

                    else if (targetStars === 8) {
                        pickByCount(n3Candidates, 'N3', 2);
                        pickByCount(icebreakerCandidates, 'N5', 2);
                        pickByCount(notOpenedLast2_1to10_Candidates, 'N6', 1);
                        pickByCount(hot5Candidates, 'N7', 1);
                        let c1 = [...Array(80).keys()].map(i => i + 1).sort((a, b) => Array.from(selected).reduce((sum, s) => sum + cov[s][b], 0) - Array.from(selected).reduce((sum, s) => sum + cov[s][a], 0));
                        pickByCount(c1, 'N4', 1);
                        pickByCount(coreIntersectionPicks, 'N1', 1);
                    }
                    else if (targetStars === 9) {
                        pickByCount(n3Candidates, 'N3', 2);
                        pickByCount(icebreakerCandidates, 'N5', 2);
                        pickByCount(notOpenedLast2_1to10_Candidates, 'N6', 2);
                        pickByCount(hot5Candidates, 'N7', 2);
                        let c1 = [...Array(80).keys()].map(i => i + 1).sort((a, b) => Array.from(selected).reduce((sum, s) => sum + cov[s][b], 0) - Array.from(selected).reduce((sum, s) => sum + cov[s][a], 0));
                        pickByCount(c1, 'N4', 1);

                    else if (targetStars === 10) {

                        pickByCount(hot5Candidates, 'N7', 1);
                        
                        let c1 = [...Array(80).keys()].map(i => i + 1).sort((a, b) => Array.from(selected).reduce((sum, s) => sum + cov[s][b], 0) - Array.from(selected).reduce((sum, s) => sum + cov[s][a], 0));
                        pickByCount(c1, 'N4', 2);

                        let rest = [...Array(80).keys()].map(i => i + 1).sort((a, b) => trailScores[b] - trailScores[a]);
                        while(selected.size < 10) getSafe(rest, 'N3');

                    return { set1: { numbers: Array.from(selected).filter(n => n).sort((a, b) => a - b), sources, breakdown } };
                };

                let recent20Draws = drawData.slice(-20);
                let recent20Freqs = Array(81).fill(0);

                let hot20_top3 = [...Array(80).keys()].map(i => i + 1)
                    .map(num => ({ num, count: recent20Freqs[num] }))

                    let current = draws100[i];

                        let traits = {};

                            if(!num) return;
                            let topTrails = [...Array(80).keys()].map(i => i + 1).filter(i => i !== num).sort((a, b) => trail[num][b] - trail[num][a]).slice(0, 3);
                            let topCovs = [...Array(80).keys()].map(i => i + 1).filter(i => i !== num).sort((a, b) => cov[num][b] - cov[num][a]).slice(0, 3);
                            traits[num] = { trails: topTrails, covs: topCovs };
                        });
                        return traits;
                    })(),
                    hot15, cold15, topPairs,
                    hot20_top3, cold_top3, jump2_top3, jump3_top3, trailDetails, multiPulled,
                    hot5_top5, strongTails
                };
            };

            const handleProcessData = () => {
                try {
                    const parsed = parseData(rawText);
                    setParsedCount(parsed.array.length);
                    setParsedDetails(parsed.details);
                    if (parsed.array.length >= 15) {
                        setStats(calculateStats(parsed.array));

            const handleAddSingleDraw = () => {
                if (!singleNumbers.trim()) {

                }

                let cleanText = singleNumbers.replace(/['"]/g, ' ')
                                             .replace(/\d{2,4}[-/\.]\d{1,2}[-/\.]\d{1,2}/g, ' ') 
                                             .replace(/\d{1,2}:\d{2}(:\d{2})?/g, ' ') 
                                             .replace(/\([一二三四五六日]\)/g, ' ') 
                                             .replace(/[期別數開獎時間號碼連莊球大小單雙－\t\n第超級猜-]/g, ' ') 
                                             .replace(/(\d{40})/g, (match) => match.match(/.{2}/g).join(' ')); 

                let newDetails = [];

                let parts = cleanText.split(/\b(\d{8,10})\b/);
                
                if (parts[0]) {
                    let nums = parts[0].match(/\b\d+\b/g);
                    if (nums) {
                        let validNums = nums.map(Number).filter(n => n >= 1 && n <= 80);
                        let currentDraw = new Set();
                        for (let n of validNums) {
                            currentDraw.add(n);
                            if (currentDraw.size === 20) {
                                newDetails.push({ period: "未知", numbers: Array.from(currentDraw).sort((a, b) => a - b) });
                                currentDraw = new Set();
                            }
                        }
                    }
                }

                if (parts.length > 1) {
                    for (let i = 1; i < parts.length; i += 2) {
                        let period = parts[i];
                        let block = parts[i+1];
                        let nums = block.match(/\b\d+\b/g);
                        if (nums) {
                            let validNums = nums.map(Number).filter(n => n >= 1 && n <= 80);
                            let uniqueNums = Array.from(new Set(validNums));
                            if (uniqueNums.length >= 20) {
                                newDetails.push({ period, numbers: uniqueNums.slice(0, 20).sort((a, b) => a - b) });
                            }
                        }
                    }
                }

                if (newDetails.length === 0) {
                    alert('找不到足夠的有效號碼，請確認內容！(每期需包含20個不重複的開出號碼)');
                    return;
                }

                let maxPeriod = 0;
                if (parsedDetails.length > 0) {
                    maxPeriod = Math.max(...parsedDetails.map(d => parseInt(d.period) || 0));
                }
                
                let currentNextPeriod = maxPeriod > 0 ? maxPeriod + 1 : 1;
                for (let i = newDetails.length - 1; i >= 0; i--) {
                    if (newDetails[i].period === "未知") {
                        newDetails[i].period = currentNextPeriod.toString();
                        currentNextPeriod++;
                    }
                }

                const newEntriesString = newDetails.map(d => `${d.period} ${d.numbers.map(n => n.toString().padStart(2, '0')).join(', ')}`).join('\n');
                const updatedText = newEntriesString + '\n' + rawText;
                setRawText(updatedText);
                
                try {
                    const parsed = parseData(updatedText);
                    setParsedCount(parsed.array.length);
                    setParsedDetails(parsed.details);
                    if (parsed.array.length >= 15) {
                        setStats(calculateStats(parsed.array));
                        alert(`✅ 成功寫入 ${newDetails.length} 期資料！`);
                        setSingleNumbers('');
                    } else {
                        alert(`已寫入 ${newDetails.length} 期資料，但總期數 (${parsed.array.length}) 仍不足 15 期以進行分析。`);
                        setSingleNumbers(''); 
                    }
                } catch (error) {
                    alert(`❌ 解析錯誤：${error.message}`);
                }
            };

            const handleAutoUpdate = async () => {
                setIsUpdating(true);
                try {
                    const extractedId = "1YCp4fwiSdvYvs7Nt7s04Vg3ZcswlqO2Ta2cf16L5lZg";
                    const sheetTabName = "歷史紀錄";
                    const timestamp = new Date().getTime();
                    
                    const directGvizUrl = `https://docs.google.com/spreadsheets/d/${extractedId}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetTabName)}&t=${timestamp}`;
                    const directExportUrl = `https://docs.google.com/spreadsheets/d/${extractedId}/export?format=csv&t=${timestamp}`;
                    
                    const fetchWithTimeout = (url, options, timeout = 8000) => {
                        return Promise.race([
                            fetch(url, options),
                            new Promise((_, reject) => setTimeout(() => reject(new Error('連線逾時')), timeout))
                        ]);
                    };

                    const fetchSources = [
                        { url: directGvizUrl, type: 'direct' },
                        { url: directExportUrl, type: 'direct' },
                        { url: `https://corsproxy.io/?${encodeURIComponent(directGvizUrl)}`, type: 'proxy' },
                        { url: `https://api.allorigins.win/raw?url=${encodeURIComponent(directGvizUrl)}`, type: 'proxy' },
                        { url: `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(directExportUrl)}`, type: 'proxy' }
                    ];
                    
                    let bestParsedLength = 0;
                    let bestText = null;
                    let lastError = null;

                    for (const source of fetchSources) {
                        try {
                            const options = source.type === 'direct' ? { cache: 'no-store', credentials: 'omit' } : { cache: 'no-store' };
                            const response = await fetchWithTimeout(source.url, options, 8000);
                            
                            if (response.ok) {
                                let tempText = await response.text();
                                if (tempText && !tempText.includes("<html") && !tempText.includes("<!DOCTYPE") && !tempText.includes("Sign in")) {
                                    let tempParsed = parseData(tempText);
                                    if (tempParsed.array.length > bestParsedLength) {
                                        bestParsedLength = tempParsed.array.length;
                                        bestText = tempText;
                                    }
                                    if (bestParsedLength >= 150) break;
                                } else {
                                    throw new Error("抓到無效內容 (可能要求登入)");
                                }
                            }
                        } catch (e) { 
                            lastError = e;
                            console.warn(`[${source.type}] 連線失敗:`, source.url, e.message); 
                        }
                    }

                    if (!bestText) {
                        throw new Error("Google 拒絕了我們的連線請求 🛑\n\n這通常是因為「權限大門未開啟」。\n\n👉 解決步驟：\n1. 請在您的 Google 試算表右上角點擊「共用」，並將存取權改成【知道連結的任何人】。\n2. 點擊「檔案」>「共用」>【發布到網路】(選擇CSV格式)。\n3. 完成後再點一次雲端同步。");
                    }
                    
                    setRawText(bestText);
                    const parsed = parseData(bestText);
                    setParsedCount(parsed.array.length);
                    setParsedDetails(parsed.details);
                    
                    if (parsed.array.length >= 15) {
                        setStats(calculateStats(parsed.array));
                        alert(`✅ 雲端資料同步完成！\n本次為您找回並載入了 ${parsed.array.length} 期開獎記錄。\n\n⚠️ 如果數量仍不如預期，請務必進入 Google 試算表，把「歷史紀錄」這張活頁【拖曳到最左邊的第一個位置】。`);
                        setActiveTab('picks');
                    } else {
                        alert(`⚠️ 雲端資料已載入，但只解析到 ${parsed.array.length} 期。\n若數量異常，請檢查試算表格式。`);
                    }
                } catch (error) {
                    alert(`${error.message}`);
                } finally { setIsUpdating(false); }
            };

            useEffect(() => {
                try {
                    const parsed = parseData(rawText);
                    setParsedCount(parsed.array.length);
                    setParsedDetails(parsed.details);
                    if (parsed.array.length >= 15) setStats(calculateStats(parsed.array));
                } catch(e) {}
            }, []);

            return (
                <div className="min-h-screen pb-20 bg-slate-50">
                    <div className="bg-slate-900 text-white p-5 rounded-b-3xl sticky top-0 z-50 shadow-md">

                        </div>
                    </div>

                    <div className="max-w-md mx-auto p-4">

                                        <IconPlus /> 手動寫入最新開獎

                                    <div className="mb-3">

                                        <IconPlus /> 寫入並重新分析

                                         <textarea className="w-full h-20 p-2 border rounded-lg text-xs bg-slate-50 font-mono text-gray-400" value={rawText} onChange={(e) => setRawText(e.target.value)} placeholder="可直接貼上多期開獎數據（支援直式/橫式/各大網站複製格式）..." />

                                {parsedCount > 0 && (

                                        {[...parsedDetails].reverse().slice(0, 2).map((record, idx) => (

                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {activeTab === 'logic' && (

                                    <div className="space-y-4 text-sm text-gray-600">
                                        <div className="bg-slate-50 p-3 rounded-lg border border-slate-100">
                                            <h3 className="font-bold text-slate-800 mb-2">代號與選號指標</h3>
                                            <ul className="space-y-1 text-xs">
                                                <li><strong className="text-red-500">N1 溫熱:</strong> 近30期高機率(出現3~4次)的號碼。</li>
                                                <li><strong className="text-cyan-500">N2 回歸:</strong> 近10期出現2次且近期未開，具備回歸潛力。</li>
                                                <li><strong className="text-green-500">N3 拖號 (次高頻):</strong> 根據最新一期開出20個號碼，追蹤歷史中下一期「次高頻」出現的號碼。</li>
                                                <li><strong className="text-purple-500">N4 共伴:</strong> 與當下已選核心號碼有極高共伴率的組合。</li>
                                                <li><strong className="text-orange-500">N5 破冰:</strong> 遺漏期數最長(連續最久未開)的極冷號。</li>
                                                <li><strong className="text-slate-500">N6 未開小號:</strong> 近2期皆未開出，且範圍鎖定在 1~10 之間的號碼。</li>
                                                <li><strong className="text-rose-500">N7 5熱:</strong> 近 10 期內出現頻率極高，短線極度強勢的號碼。</li>
                                                <li><strong className="text-fuchsia-600">N8 強尾:</strong> 近5期高頻(小於5次)且符合尾數強勢(佔比25%~30%)的號碼。若強尾與已選號碼同尾數，則從其他強尾中不限條件遞補。</li>
                                            </ul>
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-lg border border-slate-100">
                                            <h3 className="font-bold text-slate-800 mb-2">各星級配號公式</h3>
                                            <ul className="space-y-2 text-xs">
                                                <li className="border-b border-slate-200 pb-1"><strong>2星:</strong> 核心(2)</li>
                                                <li className="border-b border-slate-200 pb-1">
                                                    <strong>3星:</strong> <br/>
                                                    <span className="pl-2 text-gray-500">組合A: 破冰(1) + 5熱(2)</span><br/>
                                                    <span className="pl-2 text-gray-500">組合B: 拖號(2) + 多重牽引號(1)</span>
                                                </li>
                                                <li className="border-b border-slate-200 pb-1">
                                                    <strong>4星:</strong> <br/>
                                                    <span className="pl-2 text-gray-500">組合A: 核心(2) + 5熱(1) + 破冰(1)</span><br/>
                                                    <span className="pl-2 text-gray-500">組合B: 多重牽引號(1) + 拖號(2) + 核心(1)</span>
                                                </li>
                                                <li className="border-b border-slate-200 pb-1"><strong>5星:</strong> 5熱(2) + 強尾(1) + 拖號(2)</li>
                                                <li className="border-b border-slate-200 pb-1"><strong>6星:</strong> 5熱(2) + 拖號(1) + 強尾(1) + 共伴(1) + 破冰(1)</li>
                                                <li className="border-b border-slate-200 pb-1"><strong>7星:</strong> 拖號(2) + 破冰(2) + 共伴(2) + 近2期未開小號(1)</li>
                                                <li className="border-b border-slate-200 pb-1"><strong>8星:</strong> 拖號(2) + 破冰(2) + 共伴(1) + 近2期未開小號(1) + 5熱(1) + 核心(1)</li>
                                                <li className="border-b border-slate-200 pb-1"><strong>9星:</strong> 拖號(2) + 破冰(2) + 共伴(1) + 近2期未開小號(2) + 5熱(2)</li>
                                                <li className=""><strong>10星:</strong> 核心(2) + 回歸(1) + 破冰(1) + 共伴(2) + 拖號(2) + 未開小號(1) + 5熱(1)</li>
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'picks' && stats && (
                            <div className="animate-fade-in">
                                <StarRow stars={2} data={stats.star2} customDesc="2星推薦核心號(2)。" />
                                <StarRow stars={3} data={stats.star3} customDesc="組合A: 破冰(1) + 5熱(2) | 組合B: 拖號(2) + 多重牽引號(1)。" />
                                <StarRow stars={4} data={stats.star4} customDesc="組合A: 核心(2) + 5熱(1) + 破冰(1) | 組合B: 多重牽引號(1) + 拖號(2) + 核心(1)。" />
                                <StarRow stars={5} data={stats.star5} customDesc="5期熱門(2) + 尾數強勢號(1) + 次高頻拖號(2)。" />
                                <StarRow stars={6} data={stats.star6} customDesc="5期熱門(2) + 次高頻拖號(1) + 尾數強勢號(1) + 共伴(1) + 破冰(1)。" />
                                <StarRow stars={7} data={stats.star7} customDesc="次高頻拖號(2) + 破冰(2) + 共伴(2) + 近2期未開小號(1)。" />
                                <StarRow stars={8} data={stats.star8} customDesc="次高頻拖號(2) + 破冰(2) + 共伴(1) + 近2期未開小號(1) + 5期熱門(1) + 核心(1)。" />
                                <StarRow stars={9} data={stats.star9} customDesc="次高頻拖號(2) + 破冰(2) + 共伴(1) + 近2期未開小號(2) + 5期熱門(2)。" />
                                <StarRow stars={10} data={stats.star10} customDesc="核心(2) + 回歸(1) + 破冰(1) + 共伴(2) + 次高頻拖號(2) + 未開小號(1) + 5熱(1)。" />
                            </div>
                        )}

                        {activeTab === 'trends' && stats && (
                            <div className="animate-fade-in space-y-4">
                                <div className="bg-white p-4 rounded-xl border shadow-sm">
                                    <h3 className="font-bold text-rose-600 mb-3 border-b pb-2">🔥 近 5 期高頻號 (小於5次, Top 5)</h3>
                                    <div className="flex flex-wrap gap-3">
                                        {stats.hot5_top5.map(item => (
                                            <div key={item.num} className="flex flex-col items-center">
                                                <NumberBadge num={item.num} size="small" source="N7" />
                                                <span className="text-[10px] text-gray-500 mt-1">{item.count}次</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border shadow-sm">
                                    <h3 className="font-bold text-teal-600 mb-3 border-b pb-2">🧲 多重牽引號 (Top1+Top2 重疊指向)</h3>
                                    {stats.multiPulled && stats.multiPulled.length > 0 ? (
                                        <div className="flex flex-wrap gap-3">
                                            {stats.multiPulled.map(item => (
                                                <div key={item.num} className="flex flex-col items-center">
                                                    <NumberBadge num={item.num} size="small" source="N3" />
                                                    <span className="text-[10px] text-gray-500 mt-1">被指向 {item.count} 次</span>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="text-xs text-gray-400 py-2">本期無明顯重疊的多重牽引號碼</div>
                                    )}
                                </div>
                                <div className="bg-white p-4 rounded-xl border shadow-sm">
                                    <h3 className="font-bold text-amber-600 mb-3 border-b pb-2">🎯 尾數強勢號 (10局佔比 25%~30%)</h3>
                                    {stats.strongTails.length > 0 ? (
                                        <div className="flex flex-wrap gap-3">
                                            {stats.strongTails.map(item => (
                                                <div key={item.tail} className="flex flex-col items-center justify-center bg-amber-50 w-14 h-14 rounded-lg border border-amber-200 shadow-sm">
                                                    <span className="text-lg font-bold text-amber-600">{item.tail}尾</span>
                                                    <span className="text-[9px] text-amber-800/70">{item.percentage}%</span>
                                                </div>
                                            ))}
                                        </div>
                                    ) : (
                                        <div className="text-xs text-gray-400 py-2">近期無符合區間的強勢尾數</div>
                                    )}
                                </div>
                                <div className="bg-white p-4 rounded-xl border shadow-sm">
                                    <h3 className="font-bold text-red-600 mb-3 border-b pb-2">🔥 近 20 期高頻號 (Top 3)</h3>
                                    <div className="flex flex-wrap gap-3">
                                        {stats.hot20_top3.map(item => (
                                            <div key={item.num} className="flex flex-col items-center">
                                                <NumberBadge num={item.num} size="small" />
                                                <span className="text-[10px] text-gray-500 mt-1">{item.count}次</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border shadow-sm">
                                    <h3 className="font-bold text-blue-600 mb-3 border-b pb-2">❄️ 最長遺漏極冷號 (Top 3)</h3>
                                    <div className="flex flex-wrap gap-3">
                                        {stats.cold_top3.map(item => (
                                            <div key={item.num} className="flex flex-col items-center">
                                                <NumberBadge num={item.num} size="small" />
                                                <span className="text-[10px] text-gray-500 mt-1">漏{item.gap}期</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="bg-white p-4 rounded-xl border shadow-sm">
                                    <h3 className="font-bold text-purple-600 mb-3 border-b pb-2">🦘 近 100 期高頻跳期號</h3>
                                    <div className="space-y-4">
                                        <div>
                                            <div className="text-xs font-bold text-gray-600 mb-2">2期跳 (間隔1期)</div>
                                            <div className="flex flex-wrap gap-3">
                                                {stats.jump2_top3.map(item => (
                                                    <div key={item.num} className="flex flex-col items-center">
                                                        <NumberBadge num={item.num} size="small" />
                                                        <span className="text-[10px] text-gray-500 mt-1">{item.count}次</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <div className="text-xs font-bold text-gray-600 mb-2">3期跳 (間隔2期)</div>
                                            <div className="flex flex-wrap gap-3">
                                                {stats.jump3_top3.map(item => (
                                                    <div key={item.num} className="flex flex-col items-center">
                                                        <NumberBadge num={item.num} size="small" />
                                                        <span className="text-[10px] text-gray-500 mt-1">{item.count}次</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'details' && stats && (
                            <div className="animate-fade-in space-y-3">
                                <div className="bg-indigo-50 p-3 rounded-lg border border-indigo-100 mb-2">
                                    <h3 className="text-sm font-bold text-indigo-800">最新期號碼牽引預測</h3>
                                    <p className="text-[10px] text-indigo-600 mt-1">取最新一期開出的20個號碼，分別列出歷史資料中，該號碼開出後下一期「最高頻」與「次高頻」的拖號。</p>
                                </div>
                                <div className="grid grid-cols-1 gap-3">
                                    {stats.trailDetails.map((item) => (
                                        <div key={item.source} className="bg-white p-3 rounded-xl border-l-4 border-l-teal-500 shadow-sm flex items-center justify-between">
                                            <div className="flex flex-col items-center border-r border-gray-100 pr-4 mr-2">
                                                <span className="text-[10px] text-gray-400 font-bold mb-1">本期號碼</span>
                                                <NumberBadge num={item.source} size="normal" />
                                            </div>
                                            <div className="flex-1 flex flex-col gap-1.5">
                                                <div className="flex justify-between items-center bg-gray-50 px-2 py-1.5 rounded">
                                                    <span className="text-[10px] text-teal-700 font-bold flex items-center gap-1">🥇 最高頻</span>
                                                    <div className="flex items-center gap-2">
                                                        <NumberBadge num={item.top1} size="small" source="N3" />
                                                        <span className="text-[10px] text-gray-400 w-7 text-right">{item.top1Count}次</span>
                                                    </div>
                                                </div>
                                                <div className="flex justify-between items-center bg-gray-50 px-2 py-1.5 rounded">
                                                    <span className="text-[10px] text-teal-600 font-semibold flex items-center gap-1">🥈 次高頻</span>
                                                    <div className="flex items-center gap-2">
                                                        <NumberBadge num={item.top2} size="small" source="N3" />
                                                        <span className="text-[10px] text-gray-400 w-7 text-right">{item.top2Count}次</span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="fixed bottom-0 w-full bg-white border-t flex justify-around p-1 pb-safe shadow-[0_-10px_20px_-10px_rgba(0,0,0,0.1)] z-50">
                        <button onClick={() => setActiveTab('input')} className={`flex flex-col items-center gap-1 w-1/5 py-2 ${activeTab === 'input' ? 'text-blue-600 font-bold' : 'text-gray-400'}`}>
                            <IconDatabase /><span className="text-[10px] whitespace-nowrap">資料庫</span>
                        </button>
                        <button onClick={() => setActiveTab('picks')} className={`flex flex-col items-center gap-1 w-1/5 py-2 ${activeTab === 'picks' ? 'text-blue-600 font-bold' : 'text-gray-400'}`}>
                            <IconTarget /><span className="text-[10px] whitespace-nowrap">推薦</span>
                        </button>
                        <button onClick={() => setActiveTab('logic')} className={`flex flex-col items-center gap-1 w-1/5 py-2 ${activeTab === 'logic' ? 'text-blue-600 font-bold' : 'text-gray-400'}`}>
                            <IconBookOpen /><span className="text-[10px] whitespace-nowrap">邏輯</span>
                        </button>
                        <button onClick={() => setActiveTab('trends')} className={`flex flex-col items-center gap-1 w-1/5 py-2 ${activeTab === 'trends' ? 'text-indigo-600 font-bold' : 'text-gray-400'}`}>
                            <IconTrendingUp /><span className="text-[10px] whitespace-nowrap">趨勢</span>
                        </button>
                        <button onClick={() => setActiveTab('details')} className={`flex flex-col items-center gap-1 w-1/5 py-2 ${activeTab === 'details' ? 'text-teal-600 font-bold' : 'text-gray-400'}`}>
                            <IconNetwork /><span className="text-[10px] whitespace-nowrap">牽引</span>
                        </button>
                        <a href="https://kokko-travel.com/binggo/money.html" target="_blank" rel="noopener noreferrer" className="flex flex-col items-center gap-1 w-1/5 py-2 text-amber-500 hover:text-amber-600 font-bold">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M12 18V6"></path><path d="M9 14.5c0 1.5 1.5 2.5 3 2.5s3-1 3-2.5-1.5-2.5-3-2.5-3-1-3-2.5 1.5-2.5 3-2.5 3 1 3 2.5"></path></svg>
                            <span className="text-[10px] whitespace-nowrap">招財指南</span>
                        </a>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <ErrorBoundary>
                <App />
            </ErrorBoundary>
        );
    </script>
</body>
</html>
