<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kokko Travel 旅遊手札</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Babel 來在瀏覽器中即時編譯 React JSX 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <link rel="icon" href="https://kokko-travel.com/logo.png">
  <style>
    /* 隱藏捲軸但可滾動的小工具類別 */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-pink-50 min-h-screen">

  <!-- React 應用程式的掛載點 -->
  <div id="root"></div>

  <!-- 使用 Babel 與 Module 模式載入並執行 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      PlaneTakeoff, PlaneLanding, CalendarHeart, MapPin, 
      Camera, DollarSign, Clock, ChevronRight, Printer, 
      Plus, Trash2, Navigation, Heart, Coffee, Star, Map,
      Image as ImageIcon, Settings, Save, Home, FolderHeart, ImagePlus, Share2
    } from 'https://esm.sh/lucide-react@0.292.0';

    import { initializeApp } from 'https://www-d-gstatic-d-com-s-gmn.v.tuangouai.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from 'https://www-d-gstatic-d-com-s-gmn.v.tuangouai.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from 'https://www-d-gstatic-d-com-s-gmn.v.tuangouai.com/firebasejs/11.6.1/firebase-firestore.js';

    // --- Firebase Setup ---
    // 注意：若要在自己的網頁空間使用雲端功能，請將此處的設定替換為你自己 Firebase 專案的 Config！
    let app, auth, db;
    try {
      const defaultFirebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
      };
      
      const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : defaultFirebaseConfig;
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    } catch (e) {
      console.warn("尚未設定正確的 Firebase 參數，雲端功能將暫時無法使用。請至 Firebase 後台取得金鑰並替換。");
    }
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

    // --- Helper Functions ---
    const airlineMap = {
      'BR': '長榮航空', 'CI': '中華航空', 'JX': '星宇航空', 'IT': '台灣虎航',
      'CX': '國泰航空', 'JL': '日本航空', 'NH': '全日空', 'MM': '樂桃航空',
      'TR': '酷航', 'UO': '香港快運', 'GK': '捷星日本', 'TW': '德威航空',
      'ZE': '易斯達航空', '7C': '濟州航空', 'LJ': '真航空', 'TG': '泰國航空'
    };

    const getAirline = (flightNum) => {
      if (!flightNum) return '';
      const code = flightNum.trim().substring(0, 2).toUpperCase();
      return airlineMap[code] || '';
    };

    const generateDates = (startStr, endStr) => {
      const dates = [];
      const curr = new Date(startStr);
      const end = new Date(endStr);
      while (curr <= end) {
        const yyyy = curr.getFullYear();
        const mm = String(curr.getMonth() + 1).padStart(2, '0');
        const dd = String(curr.getDate()).padStart(2, '0');
        dates.push(`${yyyy}-${mm}-${dd}`);
        curr.setDate(curr.getDate() + 1);
      }
      return dates;
    };

    const formatDate = (dateString) => {
      const date = new Date(dateString);
      return `${date.getMonth() + 1}/${date.getDate()} (${['日', '一', '二', '三', '四', '五', '六'][date.getDay()]})`;
    };

    const getCategoryIcon = (type) => {
      const icons = { attraction: '🌸', food: '🍔', hotel: '🏨', transport: '🚂', shopping: '🛍️', other: '✨' };
      return icons[type] || '✨';
    };

    // --- Image Compression Helpers ---
    const resizeImage = (file) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
          const img = new Image();
          img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800; // 壓縮最大寬度
            const MAX_HEIGHT = 800;
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            } else {
              if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7)); // 壓縮品質 70%
          };
          img.onerror = (err) => reject(err);
        };
      });
    };

    // --- Main App Component ---
    function App() {
      const [view, setView] = useState('dashboard'); // 'dashboard', 'setup', 'planner', 'summary'
      const [savedTrips, setSavedTrips] = useState([]);
      const [currentTripId, setCurrentTripId] = useState(null);
      const [user, setUser] = useState(null);
      
      // Trip Info State
      const [tripInfo, setTripInfo] = useState({
        title: '我的可愛小旅行 🌸',
        startDate: '',
        endDate: '',
        outboundFlight: { number: '', time: '' },
        returnFlight: { number: '', time: '' },
        flightCost: ''
      });

      const [itinerary, setItinerary] = useState({});
      const [dates, setDates] = useState([]);
      const [activeDateIndex, setActiveDateIndex] = useState(0);
      const [isStandalone, setIsStandalone] = useState(true);

      // --- Firebase Auth & Data Fetching ---
      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.error("Auth error:", error);
          }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !db) {
          setSavedTrips([]);
          return;
        }
        
        try {
          const tripsRef = collection(db, 'artifacts', appId, 'users', user.uid, 'trips');
          const unsubscribe = onSnapshot(tripsRef, (snapshot) => {
            const loadedTrips = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            loadedTrips.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
            setSavedTrips(loadedTrips);
          }, (error) => {
            console.error("讀取旅程失敗:", error);
          });
          return () => unsubscribe();
        } catch(e) {
          console.error(e);
        }
      }, [user]);

      // PWA 相關偵測
      useEffect(() => {
        setIsStandalone(window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true);
      }, []);

      // --- Actions ---
      const createNewTrip = () => {
        setCurrentTripId(null);
        setTripInfo({
          title: '我的可愛小旅行 🌸', startDate: '', endDate: '',
          outboundFlight: { number: '', time: '' }, returnFlight: { number: '', time: '' }, flightCost: ''
        });
        setItinerary({});
        setDates([]);
        setView('setup');
      };

      const openTrip = (trip) => {
        setCurrentTripId(trip.id);
        setTripInfo(trip.tripInfo);
        setItinerary(trip.itinerary);
        setDates(trip.dates);
        setActiveDateIndex(0);
        setView('planner');
      };

      const deleteTrip = async (id, e) => {
        e.stopPropagation();
        if(window.confirm("確定要刪除這趟旅程嗎？刪除後無法恢復喔！")) {
          if (!user || !db) return;
          try {
            await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'trips', id));
          } catch (error) {
            console.error("刪除失敗", error);
            alert("刪除失敗，請重試！");
          }
        }
      };

      const handleStart = () => {
        if (!tripInfo.startDate || !tripInfo.endDate) {
          alert("請選擇開始與結束日期唷！");
          return;
        }
        const generatedDates = generateDates(tripInfo.startDate, tripInfo.endDate);
        setDates(generatedDates);
        
        const newItinerary = { ...itinerary };
        generatedDates.forEach(date => {
          if (!newItinerary[date]) newItinerary[date] = [];
        });
        setItinerary(newItinerary);
        setView('planner');
      };

      const handleSaveTrip = async () => {
        if (!user || !db) {
          alert("雲端連線失敗！請確認程式碼中的 Firebase 參數是否已正確填寫。");
          return;
        }
        
        const tripId = currentTripId || Date.now().toString();
        const tripData = {
          tripInfo,
          itinerary,
          dates,
          updatedAt: Date.now()
        };
        
        try {
          const tripRef = doc(db, 'artifacts', appId, 'users', user.uid, 'trips', tripId);
          await setDoc(tripRef, tripData);
          if (!currentTripId) setCurrentTripId(tripId);
          alert("🎉 旅程已成功儲存至雲端！");
        } catch (error) {
          console.error("儲存失敗", error);
          alert("儲存失敗：請檢查容量上限或是網路連線。");
        }
      };

      const handleShareTrip = () => {
        let shareText = `🌸 ${tripInfo.title} 🌸\n`;
        shareText += `📅 日期: ${tripInfo.startDate.replace(/-/g, '/')} ~ ${tripInfo.endDate.replace(/-/g, '/')}\n`;
        if(tripInfo.outboundFlight.number) shareText += `🛫 去程: ${tripInfo.outboundFlight.number} (${tripInfo.outboundFlight.time || '未定'})\n`;
        if(tripInfo.returnFlight.number) shareText += `🛬 回程: ${tripInfo.returnFlight.number} (${tripInfo.returnFlight.time || '未定'})\n`;
        shareText += `\n✨ 行程總覽 ✨\n`;

        dates.forEach((date, idx) => {
          const dayActs = itinerary[date] || [];
          if(dayActs.length > 0) {
            shareText += `\n[Day ${idx + 1} - ${formatDate(date)}]\n`;
            dayActs.forEach(act => {
              const icon = getCategoryIcon(act.type);
              shareText += `${act.time} ${icon} ${act.title}\n`;
              if(act.location) shareText += `   📍 ${act.location}\n`;
            });
          }
        });

        shareText += `\n🐥 來自 Kokko Travel 可愛旅遊手札`;

        if (navigator.share) {
          navigator.share({
            title: tripInfo.title,
            text: shareText
          }).catch((err) => {
            console.log('Share canceled or failed', err);
          });
        } else {
          const textArea = document.createElement("textarea");
          textArea.value = shareText;
          document.body.appendChild(textArea);
          textArea.select();
          try {
            document.execCommand('copy');
            alert("📋 行程文字已複製到剪貼簿！");
          } catch (err) {}
          document.body.removeChild(textArea);
        }
      };

      const addActivity = (date, activity) => {
        setItinerary(prev => ({
          ...prev,
          [date]: [...prev[date], { ...activity, id: Date.now().toString() }].sort((a, b) => a.time.localeCompare(b.time))
        }));
      };

      const deleteActivity = (date, id) => {
        setItinerary(prev => ({
          ...prev,
          [date]: prev[date].filter(act => act.id !== id)
        }));
      };

      const getTotalCost = (targetTripInfo = tripInfo, targetItinerary = itinerary) => {
        let total = Number(targetTripInfo.flightCost) || 0;
        Object.values(targetItinerary).forEach(day => {
          day.forEach(act => {
            total += Number(act.cost) || 0;
          });
        });
        return total;
      };

      return (
        <div className="min-h-screen bg-pink-50 font-sans text-slate-800 flex flex-col">
          {/* Dashboard View */}
          {view === 'dashboard' && (
            <div className="max-w-4xl mx-auto w-full p-4 md:p-6 flex-grow">
              {!isStandalone && (
                <div className="bg-pink-100 text-pink-600 text-xs md:text-sm px-4 py-3 rounded-2xl mb-4 flex items-center justify-center gap-2 font-bold shadow-sm border border-pink-200">
                  <span className="text-lg animate-bounce">💡</span> 
                  <span>小提示：在手機瀏覽器點擊「加到主畫面」，就能變成專屬 APP 喔！</span>
                </div>
              )}
              <div className="flex justify-between items-center mb-8 mt-4 flex-wrap gap-4">
                <div className="flex items-center gap-3">
                  <div className="w-12 h-12 rounded-full overflow-hidden shadow-sm border-2 border-pink-200 bg-white">
                    <img src="https://kokko-travel.com/logo.png" alt="Logo" className="w-full h-full object-cover" onError={(e)=>{e.target.style.display='none'}} />
                  </div>
                  <h1 className="text-2xl font-bold text-pink-600">我的旅程庫</h1>
                </div>
                <button 
                  onClick={createNewTrip}
                  className="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-full font-bold shadow-md flex items-center gap-2 transition-transform hover:scale-105"
                >
                  <Plus className="w-5 h-5" /> <span className="hidden sm:inline">新增旅程</span>
                </button>
              </div>

              {savedTrips.length === 0 ? (
                <div className="bg-white rounded-3xl p-10 text-center shadow-sm border-2 border-dashed border-pink-200 mt-10">
                  <FolderHeart className="w-16 h-16 text-pink-300 mx-auto mb-4" />
                  <h2 className="text-xl font-bold text-slate-600 mb-2">還沒有任何旅程紀錄喔！</h2>
                  <p className="text-slate-400 mb-6">開始規劃你的第一趟專屬旅行吧 ✈️</p>
                  <button 
                    onClick={createNewTrip}
                    className="bg-pink-100 text-pink-600 px-6 py-3 rounded-full font-bold hover:bg-pink-200 transition-colors inline-flex items-center gap-2"
                  >
                    <PlaneTakeoff className="w-5 h-5" /> 立即建立新旅程
                  </button>
                </div>
              ) : (
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">
                  {savedTrips.map(trip => (
                    <div 
                      key={trip.id} 
                      onClick={() => openTrip(trip)}
                      className="bg-white rounded-3xl p-5 shadow-sm hover:shadow-md transition-shadow border border-pink-100 cursor-pointer relative group"
                    >
                      <button 
                        onClick={(e) => deleteTrip(trip.id, e)}
                        className="absolute top-4 right-4 text-slate-300 hover:text-red-500 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity bg-white/80 p-1 rounded-full"
                        title="刪除旅程"
                      >
                        <Trash2 className="w-5 h-5" />
                      </button>
                      <CalendarHeart className="w-8 h-8 text-pink-400 mb-3" />
                      <h3 className="font-bold text-lg text-slate-800 mb-1 pr-6 truncate">{trip.tripInfo.title}</h3>
                      <p className="text-sm text-slate-500 mb-3">
                        {trip.tripInfo.startDate.replace(/-/g, '/')} ~ {trip.tripInfo.endDate.replace(/-/g, '/')}
                      </p>
                      <div className="flex justify-between items-center text-xs border-t border-slate-50 pt-3 mt-2">
                        <span className="text-slate-400">{trip.dates.length} 天行程</span>
                        <span className="font-bold text-orange-400">NT$ {getTotalCost(trip.tripInfo, trip.itinerary).toLocaleString()}</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Setup View */}
          {view === 'setup' && (
            <div className="flex flex-col items-center justify-center flex-grow p-4 md:p-6 print:hidden">
              <div className="w-full max-w-lg md:max-w-2xl flex justify-start mb-4">
                <button onClick={() => setView('dashboard')} className="text-pink-500 font-bold flex items-center gap-1 hover:bg-pink-100 px-3 py-1.5 rounded-full transition-colors">
                  <Home className="w-4 h-4" /> 回首頁
                </button>
              </div>
              <div className="bg-white rounded-[2rem] shadow-xl p-6 md:p-8 w-full max-w-lg md:max-w-2xl border-4 border-pink-200 relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-4 bg-gradient-to-r from-pink-300 via-purple-300 to-blue-300"></div>
                
                <div className="text-center mb-6 md:mb-8 mt-4">
                  <div className="w-32 h-32 md:w-40 md:h-40 mx-auto mb-4 rounded-full overflow-hidden shadow-md border-4 border-pink-100 flex items-center justify-center bg-slate-50">
                    <img 
                      src="https://kokko-travel.com/logo.png" 
                      alt="Kokko Travel Logo" 
                      className="w-full h-full object-cover"
                      onError={(e) => { e.target.onerror = null; e.target.src = "https://placehold.co/400x400/ffe4e6/ec4899?text=Logo"; }}
                    />
                  </div>
                  <h1 className="text-2xl font-bold text-pink-600">{currentTripId ? '修改旅程設定 ⚙️' : '建立新旅程 ✈️'}</h1>
                  <p className="text-slate-400 text-sm mt-2">記錄你的美好回憶</p>
                </div>

                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-bold text-pink-500 mb-1">旅行名稱</label>
                    <input 
                      type="text" 
                      className="w-full bg-pink-50 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-400 border border-pink-100"
                      value={tripInfo.title}
                      onChange={e => setTripInfo({...tripInfo, title: e.target.value})}
                      placeholder="例如：東京浪漫之旅"
                    />
                  </div>

                  <div className="flex flex-col sm:flex-row gap-4">
                    <div className="flex-1">
                      <label className="block text-sm font-bold text-pink-500 mb-1">出發日期</label>
                      <input 
                        type="date" 
                        className="w-full bg-pink-50 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-400 border border-pink-100 text-slate-600"
                        value={tripInfo.startDate}
                        onChange={e => setTripInfo({...tripInfo, startDate: e.target.value})}
                      />
                    </div>
                    <div className="flex-1">
                      <label className="block text-sm font-bold text-pink-500 mb-1">回程日期</label>
                      <input 
                        type="date" 
                        className="w-full bg-pink-50 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-400 border border-pink-100 text-slate-600"
                        value={tripInfo.endDate}
                        min={tripInfo.startDate}
                        onChange={e => setTripInfo({...tripInfo, endDate: e.target.value})}
                      />
                    </div>
                  </div>

                  <div className="flex flex-col sm:flex-row gap-4">
                    <div className="flex-1">
                      <label className="block text-sm font-bold text-pink-500 mb-1">去程航班 🛫</label>
                      <div className="space-y-2">
                        <div className="relative">
                          <input 
                            type="text" 
                            className="w-full bg-pink-50 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-400 border border-pink-100"
                            value={tripInfo.outboundFlight.number}
                            onChange={e => setTripInfo({...tripInfo, outboundFlight: { ...tripInfo.outboundFlight, number: e.target.value.toUpperCase() }})}
                            placeholder="航班代號 (例: BR192)"
                          />
                          {getAirline(tripInfo.outboundFlight.number) && (
                            <span className="absolute right-3 top-3 text-xs font-bold text-blue-600 bg-blue-100 px-2 py-1 rounded-lg shadow-sm">
                              {getAirline(tripInfo.outboundFlight.number)}
                            </span>
                          )}
                        </div>
                        <input 
                          type="text" 
                          className="w-full bg-pink-50 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-400 border border-pink-100 text-sm"
                          value={tripInfo.outboundFlight.time}
                          onChange={e => setTripInfo({...tripInfo, outboundFlight: { ...tripInfo.outboundFlight, time: e.target.value }})}
                          placeholder="時間 (例: 08:30 - 12:45)"
                        />
                      </div>
                    </div>
                    <div className="flex-1">
                      <label className="block text-sm font-bold text-pink-500 mb-1">回程航班 🛬</label>
                      <div className="space-y-2">
                        <div className="relative">
                          <input 
                            type="text" 
                            className="w-full bg-pink-50 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-400 border border-pink-100"
                            value={tripInfo.returnFlight.number}
                            onChange={e => setTripInfo({...tripInfo, returnFlight: { ...tripInfo.returnFlight, number: e.target.value.toUpperCase() }})}
                            placeholder="航班代號 (例: JX801)"
                          />
                          {getAirline(tripInfo.returnFlight.number) && (
                            <span className="absolute right-3 top-3 text-xs font-bold text-purple-600 bg-purple-100 px-2 py-1 rounded-lg shadow-sm">
                              {getAirline(tripInfo.returnFlight.number)}
                            </span>
                          )}
                        </div>
                        <input 
                          type="text" 
                          className="w-full bg-pink-50 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-400 border border-pink-100 text-sm"
                          value={tripInfo.returnFlight.time}
                          onChange={e => setTripInfo({...tripInfo, returnFlight: { ...tripInfo.returnFlight, time: e.target.value }})}
                          placeholder="時間 (例: 14:00 - 16:30)"
                        />
                      </div>
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm font-bold text-pink-500 mb-1">機票總花費 (NT$)</label>
                    <div className="relative">
                      <DollarSign className="absolute left-3 top-3.5 w-5 h-5 text-pink-400" />
                      <input 
                        type="number" 
                        className="w-full bg-pink-50 rounded-xl pl-10 pr-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-400 border border-pink-100"
                        value={tripInfo.flightCost}
                        onChange={e => setTripInfo({...tripInfo, flightCost: e.target.value})}

        time: '10:00', type: 'attraction', title: '', location: '', cost: '', notes: '', photoUrl: null
      });

      const handlePhotoUpload = async (e) => {
        const file = e.target.files[0];
        if (file) {
          try {
            const compressedBase64 = await resizeImage(file);
            setNewAct({ ...newAct, photoUrl: compressedBase64 });
          } catch (err) {
            alert('照片讀取失敗，請重新嘗試！');
          }

      const submitActivity = () => {
        if (!newAct.title) { alert("請輸入行程名稱！"); return; }

        setNewAct({ time: '12:00', type: 'attraction', title: '', location: '', cost: '', notes: '', photoUrl: null });
      };

      const getCurrentLocation = () => {
        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition(
            (position) => { setNewAct(prev => ({ ...prev, location: `${position.coords.latitude}, ${position.coords.longitude}` })); },
            () => alert("無法取得定位，請確認已允許瀏覽器定位權限。")
          );

          alert("您的瀏覽器不支援定位功能。");

                      </div>
                    ) : (
                      <div className="py-4 md:py-6 flex flex-col items-center">
                        <div className="bg-white p-3 rounded-full shadow-sm mb-2"><ImagePlus className="w-6 h-6 md:w-8 md:h-8 text-pink-400" /></div>
                        <span className="text-sm md:text-base text-pink-500 font-bold">點擊選擇：拍照 / 相簿</span>
                        <span className="text-[10px] md:text-xs text-pink-300 mt-1">系統會自動壓縮優化儲存空間</span>
                      </div>
                    )}
                    <input type="file" ref={fileInputRef} className="hidden" accept="image/*" onChange={handlePhotoUpload} />
                  </div>
                </div>

                <div className="flex gap-2 md:gap-3 pt-2">
                  <button onClick={() => setIsAdding(false)} className="flex-1 py-2 md:py-3 rounded-xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors text-sm md:text-base">取消</button>
                  <button onClick={submitActivity} className="flex-1 py-2 md:py-3 rounded-xl font-bold text-white bg-pink-500 hover:bg-pink-600 transition-colors shadow-lg shadow-pink-200 text-sm md:text-base">確定新增</button>
                </div>
              </div>
            </div>
          ) : (
            <button onClick={() => setIsAdding(true)} className="w-full py-3 md:py-4 border-2 border-dashed border-pink-300 rounded-2xl md:rounded-3xl text-pink-500 font-bold flex items-center justify-center gap-2 hover:bg-pink-100/50 transition-colors text-sm md:text-base">
              <Plus className="w-4 h-4 md:w-5 md:h-5" /> 新增下一個行程
            </button>
          )}
        </div>
      );
    }

    // 將 App 渲染到頁面上
    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
