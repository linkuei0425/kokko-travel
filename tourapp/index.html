<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kokko 愛旅行-旅遊手札</title>
  
  <!-- === 網頁分享 (Open Graph) 標籤 === -->
  <meta property="og:title" content="Kokko Travel 旅遊手札">
  <meta property="og:description" content="Kokko 愛旅行，輕鬆記錄專屬你的美好旅遊回憶！">
  <meta property="og:image" content="https://kokko-travel.com/tourapp/1.png">
  <meta property="og:image:secure_url" content="https://kokko-travel.com/tourapp/1.png">
  <meta property="og:url" content="https://kokko-travel.com/">
  <meta property="og:type" content="website">

  <!-- === 加入主畫面 (PWA / 桌面圖示) === -->
  <link rel="apple-touch-icon" href="https://kokko-travel.com/tourapp/1.png">
  <link rel="icon" type="image/png" sizes="192x192" href="https://kokko-travel.com/tourapp/1.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="旅遊手札">
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Babel 來在瀏覽器中即時編譯 React JSX 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- 引入 html2canvas 支援轉圖分享 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- 引入 html2pdf 支援 PDF 下載 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <link rel="icon" href="https://kokko-travel.com/logo.png">
  <style>
    /* 隱藏捲軸但可滾動的小工具類別 */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    /* Checkbox 樣式調整 */
    input[type="checkbox"] { accent-color: #f472b6; }
  </style>
</head>
<body class="bg-pink-50 min-h-screen">

  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      PlaneTakeoff, PlaneLanding, CalendarHeart, MapPin, 
      Camera, DollarSign, Clock, ChevronRight, Printer, 
      Plus, Trash2, Navigation, Heart, Coffee, Star, Map,
      Image as ImageIcon, Settings, Save, Home, FolderHeart, ImagePlus, Share2, Users, Download, Upload,
      Pencil, FileDown, ImageIcon as FileImage, Receipt, WalletCards, X, CheckSquare
    } from 'https://esm.sh/lucide-react@0.292.0';

    // --- Helper Functions ---
    const airlineMap = {
      'BR': '長榮航空', 'CI': '中華航空', 'JX': '星宇航空', 'IT': '台灣虎航',
      'CX': '國泰航空', 'JL': '日本航空', 'NH': '全日空', 'MM': '樂桃航空',
      'TR': '酷航', 'UO': '香港快運', 'GK': '捷星日本', 'TW': '德威航空',
      'ZE': '易斯達航空', '7C': '濟州航空', 'LJ': '真航空', 'TG': '泰國航空'
    };

    const getAirline = (flightNum) => {
      if (!flightNum) return '';
      const code = flightNum.trim().substring(0, 2).toUpperCase();
      return airlineMap[code] || '';
    };

    const generateDates = (startStr, endStr) => {
      const dates = [];
      const curr = new Date(startStr);
      const end = new Date(endStr);
      while (curr <= end) {
        const yyyy = curr.getFullYear();
        const mm = String(curr.getMonth() + 1).padStart(2, '0');
        const dd = String(curr.getDate()).padStart(2, '0');
        dates.push(`${yyyy}-${mm}-${dd}`);
        curr.setDate(curr.getDate() + 1);
      }
      return dates;
    };

    const formatDate = (dateString) => {
      const date = new Date(dateString);
      return `${date.getMonth() + 1}/${date.getDate()} (${['日', '一', '二', '三', '四', '五', '六'][date.getDay()]})`;
    };

    const getCategoryIcon = (type) => {
      const icons = { attraction: '🌸', food: '🍔', hotel: '🏨', transport: '🚂', shopping: '🛍️', other: '✨' };
      return icons[type] || '✨';
    };

    const resizeImage = (file) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
          const img = new Image();
          img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800; const MAX_HEIGHT = 800;
            let width = img.width; let height = img.height;
            if (width > height) {
              if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            } else {
              if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
            }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7)); 
          };
          img.onerror = (err) => reject(err);
        };
      });
    };

    // --- Main App Component ---
    function App() {
      const [view, setView] = useState('dashboard');
      const [savedTrips, setSavedTrips] = useState([]);
      const [currentTripId, setCurrentTripId] = useState(null);
      
      // Trip Info State
      const [tripInfo, setTripInfo] = useState({
        title: '我的可愛小旅行 🌸',
        startDate: '', endDate: '',
        outboundFlight: { number: '', time: '' }, returnFlight: { number: '', time: '' },
        flightCost: '',
        flightPayer: '我', 
        companions: ['我'] 
      });

      const [itinerary, setItinerary] = useState({});
      const [dates, setDates] = useState([]);
      const [activeDateIndex, setActiveDateIndex] = useState(0);
      const [isStandalone, setIsStandalone] = useState(true);
      
      // 分帳視窗與計算結果，新增 personInstructions 來儲存每個人的詳細轉帳指示
      const [showSplitModal, setShowSplitModal] = useState(false);
      const [splitResult, setSplitResult] = useState({ balances: {}, details: {}, transactions: [], personInstructions: {} });

      const [newCompanion, setNewCompanion] = useState('');

      useEffect(() => {
        try {
          const localData = JSON.parse(localStorage.getItem('kokko_trips') || '[]');
          setSavedTrips(localData.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)));
        } catch(e) {
          setSavedTrips([]);
        }
      }, [view]);

      useEffect(() => {
        setIsStandalone(window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true);
      }, []);

      const createNewTrip = () => {
        setCurrentTripId(null);
        setTripInfo({
          title: '我的可愛小旅行 🌸', startDate: '', endDate: '',
          outboundFlight: { number: '', time: '' }, returnFlight: { number: '', time: '' }, 
          flightCost: '', flightPayer: '我', companions: ['我']
        });
        setItinerary({}); setDates([]); setView('setup');
      };

      const openTrip = (trip) => {
        setCurrentTripId(trip.id);
        setTripInfo({
          ...trip.tripInfo,
          companions: trip.tripInfo.companions || ['我'],
          flightPayer: trip.tripInfo.flightPayer || '我'
        });
        setItinerary(trip.itinerary || {});
        setDates(trip.dates);
        setActiveDateIndex(0);
        setView('planner');
      };

      const deleteTrip = (id, e) => {
        e.stopPropagation();
        if(window.confirm("確定要刪除這趟專屬旅程嗎？刪除後無法恢復喔！")) {
          let localData = JSON.parse(localStorage.getItem('kokko_trips') || '[]');
          localData = localData.filter(t => t.id !== id);
          localStorage.setItem('kokko_trips', JSON.stringify(localData));
          setSavedTrips(localData);
        }
      };

      const handleSaveTrip = (showMsg = true, latestItinerary = itinerary) => {
        const tripId = currentTripId || Date.now().toString();
        const tripData = { id: tripId, tripInfo, itinerary: latestItinerary, dates, updatedAt: Date.now() };
        try {
          let localData = JSON.parse(localStorage.getItem('kokko_trips') || '[]');
          const idx = localData.findIndex(t => t.id === tripId);
          if (idx >= 0) localData[idx] = tripData; else localData.unshift(tripData);
          localStorage.setItem('kokko_trips', JSON.stringify(localData));
          if (!currentTripId) setCurrentTripId(tripId);
          if (showMsg) alert("✅ 旅程已成功儲存！");
        } catch(e) {
          if (showMsg) alert("儲存失敗：瀏覽器空間不足，請嘗試刪除舊照片。");
        }
      };

      const handleStart = () => {
        if (!tripInfo.startDate || !tripInfo.endDate) return alert("請選擇開始與結束日期唷！");
        if (tripInfo.companions.length === 0) return alert("請至少加入一位旅伴（例如「我」）！");

        const generatedDates = generateDates(tripInfo.startDate, tripInfo.endDate);
        setDates(generatedDates);
        
        const newItinerary = { ...itinerary };
        generatedDates.forEach(date => { if (!newItinerary[date]) newItinerary[date] = []; });
        setItinerary(newItinerary);
        setView('planner');
        setTimeout(() => handleSaveTrip(false, newItinerary), 500);
      };

      const handleDownloadPDF = async () => {
        const element = document.getElementById('trip-summary-content');
        if (!element) return;
        alert("正在為您產製 PDF 檔，這可能需要幾秒鐘的時間...");
        const opt = {
          margin: [10, 5, 10, 5], filename: `${tripInfo.title}_行程表.pdf`,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true, allowTaint: true },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        try { await window.html2pdf().set(opt).from(element).save(); } 
        catch (error) { alert("PDF 匯出時發生錯誤，請稍後再試！"); }
      };

      const handleShareAsImage = async () => {
        const element = document.getElementById('trip-summary-content');
        if (!element) return;
        alert("正在準備您的行程美圖，請稍等喔...");
        try {
          const canvas = await html2canvas(element, { useCORS: true, scale: 2, allowTaint: true });
          canvas.toBlob(async (blob) => {
            if (!blob) return;
            const file = new File([blob], `${tripInfo.title}.png`, { type: 'image/png' });
            if (navigator.share) {
              try { await navigator.share({ title: tripInfo.title, text: '來看看我的旅遊行程！✨', files: [file] }); return; } 
              catch (e) { console.log("使用者取消分享或失敗", e); }
            }
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `${tripInfo.title}_行程總覽.png`;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
            alert("您的裝置/瀏覽器不支援直接分享圖片，已自動為您下載行程長圖！");
          }, 'image/png');
        } catch (error) { alert("圖片產生失敗，請確認行程照片格式是否正確。"); }
      };

      const addActivity = (date, activity) => {
        const newDayActs = [...(itinerary[date] || []), { ...activity, id: Date.now().toString() }].sort((a, b) => a.time.localeCompare(b.time));
        const newItinerary = { ...itinerary, [date]: newDayActs };
        setItinerary(newItinerary); handleSaveTrip(false, newItinerary);
      };

      const editActivity = (date, updatedAct) => {
        const newDayActs = itinerary[date].map(act => act.id === updatedAct.id ? updatedAct : act);
        newDayActs.sort((a, b) => a.time.localeCompare(b.time));
        const newItinerary = { ...itinerary, [date]: newDayActs };
        setItinerary(newItinerary); handleSaveTrip(false, newItinerary);
      };

      const deleteActivity = (date, id) => {
        const newDayActs = itinerary[date].filter(act => act.id !== id);
        const newItinerary = { ...itinerary, [date]: newDayActs };
        setItinerary(newItinerary); handleSaveTrip(false, newItinerary);
      };

      const getTotalCost = (targetTripInfo = tripInfo, targetItinerary = itinerary) => {
        let total = Number(targetTripInfo.flightCost) || 0;
        Object.values(targetItinerary).forEach(day => {
          day.forEach(act => { total += Number(act.cost) || 0; });
        });
        return total;
      };

      // --- 新增/移除旅伴邏輯 ---
      const handleAddCompanion = () => {
        const name = newCompanion.trim();
        if (!name) return;
        if (tripInfo.companions.includes(name)) {
          alert('旅伴名稱不能重複喔！'); return;
        }
        setTripInfo({ ...tripInfo, companions: [...tripInfo.companions, name] });
        setNewCompanion('');
      };
      
      const handleRemoveCompanion = (name) => {
        if (tripInfo.companions.length <= 1) {
          alert('至少要保留一位旅伴喔！'); return;
        }
        const updated = tripInfo.companions.filter(c => c !== name);
        const newFlightPayer = tripInfo.flightPayer === name ? updated[0] : tripInfo.flightPayer;
        setTripInfo({ ...tripInfo, companions: updated, flightPayer: newFlightPayer });
      };

      // --- 強化版分帳計算邏輯 (確保每人都有狀態) ---
      const calculateSplit = () => {
        const balances = {};
        const details = {}; 
        
        // --- 1. 初始化資料與兩兩結算矩陣 ---
        const pairwise = {};
        tripInfo.companions.forEach(c => {
          balances[c] = 0;
          details[c] = { paid: 0, share: 0, balance: 0 }; 
          pairwise[c] = {};
          tripInfo.companions.forEach(c2 => {
            pairwise[c][c2] = 0;
          });
        });

        // --- 2. 計算機票分帳 ---
        if (tripInfo.flightCost && !isNaN(tripInfo.flightCost) && Number(tripInfo.flightCost) > 0 && tripInfo.flightPayer !== 'none') {
          const cost = Number(tripInfo.flightCost);
          // 防呆：確保 payer 還在名單內
          const payer = tripInfo.companions.includes(tripInfo.flightPayer) ? tripInfo.flightPayer : tripInfo.companions[0];
          const perPerson = cost / tripInfo.companions.length;
          
          if (balances[payer] !== undefined) {
            balances[payer] += cost;
            details[payer].paid += cost;
          }
          tripInfo.companions.forEach(c => {
            if (balances[c] !== undefined) {
              balances[c] -= perPerson;
              details[c].share += perPerson;
              // 記錄兩兩欠款：c 欠 payer
              if (c !== payer) pairwise[c][payer] += perPerson;
            }
          });
        }

        // --- 3. 計算行程內各項活動分帳 ---
        Object.values(itinerary).forEach(day => {
          day.forEach(act => {
            if (act.cost && !isNaN(act.cost) && Number(act.cost) > 0 && act.payer !== 'none') {
              const cost = Number(act.cost);
              // 防呆：確保 payer 還在名單內
              const payer = tripInfo.companions.includes(act.payer) ? act.payer : tripInfo.companions[0];
              
              let splitWith = (act.splitWith && act.splitWith.length > 0) ? act.splitWith : tripInfo.companions;
              // 防呆：過濾掉已經不在名單內的參與者，避免死帳
              splitWith = splitWith.filter(c => tripInfo.companions.includes(c));
              
              if (splitWith.length > 0) {
                const perPerson = cost / splitWith.length;
                if (balances[payer] !== undefined) {
                  balances[payer] += cost;
                  details[payer].paid += cost;
                }
                splitWith.forEach(c => {
                  if (balances[c] !== undefined) {
                    balances[c] -= perPerson;
                    details[c].share += perPerson;
                    // 記錄兩兩欠款：c 欠 payer
                    if (c !== payer) pairwise[c][payer] += perPerson;
                  }
                });
              }
            }
          });
        });

        Object.keys(details).forEach(c => {
          details[c].balance = balances[c];
        });

        // --- 4. 兩兩結算 (Pairwise Netting) 取代原本的 Greedy 演算法 ---
        // 這樣就能保留「A 欠 B，就由 A 還 B」的直覺邏輯，不隨便將債務轉移給第三方
        const transactions = [];
        const processedPairs = new Set();

        tripInfo.companions.forEach(c1 => {
          tripInfo.companions.forEach(c2 => {
            if (c1 === c2) return;
            // 確保 c1-c2 和 c2-c1 被視為同一對，只處理一次
            const pairKey = [c1, c2].sort().join('-'); 
            if (processedPairs.has(pairKey)) return;
            processedPairs.add(pairKey);

            const c1OwesC2 = pairwise[c1][c2];
            const c2OwesC1 = pairwise[c2][c1];
            // 計算這兩個人之間的淨差額
            const net = c1OwesC2 - c2OwesC1;

            if (net > 0.01) {
              // c1 欠 c2 比較多
              transactions.push({ from: c1, to: c2, amount: Math.round(net) });
            } else if (net < -0.01) {
              // c2 欠 c1 比較多
              transactions.push({ from: c2, to: c1, amount: Math.round(Math.abs(net)) });
            }
          });
        });
        
        // 5. 產生每個人的詳細轉帳指示
        const personInstructions = {};
        tripInfo.companions.forEach(c => {
          personInstructions[c] = { pay: [], receive: [], isSettled: true };
        });

        transactions.forEach(tx => {
          if (personInstructions[tx.from]) {
             personInstructions[tx.from].pay.push({ to: tx.to, amount: tx.amount });
             personInstructions[tx.from].isSettled = false;
          }
          if (personInstructions[tx.to]) {
             personInstructions[tx.to].receive.push({ from: tx.from, amount: tx.amount });
             personInstructions[tx.to].isSettled = false;
          }
        });

        setSplitResult({ balances, details, transactions, personInstructions });
      };

      const handleOpenSplitModal = () => {
        calculateSplit();
        setShowSplitModal(true);
      };

      const renderSplitSummary = () => {
        calculateSplit(); // 確保資料是最新的
        return (
          <div className="bg-orange-50 rounded-2xl md:rounded-3xl p-5 md:p-8 mt-8 border border-orange-100 break-inside-avoid shadow-sm print:bg-white print:border-2">
            <h3 className="text-xl md:text-2xl font-bold text-orange-600 mb-6 flex items-center gap-2">
              <Receipt className="w-6 h-6" /> 分帳結算表
            </h3>
            
            {tripInfo.companions.length <= 1 ? (
              <p className="text-slate-500">這是一趟獨旅，不需要分帳喔！</p>
            ) : (
              <div className="space-y-6">
                <div>
                  <h4 className="text-sm font-bold text-slate-500 mb-3 border-b border-orange-200 pb-2">每人最終收支明細</h4>
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                    {Object.entries(splitResult.details).map(([person, stat]) => (
                      <div key={person} className="bg-white p-4 rounded-xl shadow-sm border border-orange-100 flex flex-col justify-between">
                        <div className="text-base text-slate-700 font-bold mb-3 border-b border-orange-50 pb-2">{person}</div>
                        <div className="space-y-1.5 mb-3 text-sm">
                          <div className="flex justify-between text-slate-500">
                            <span>代墊總額:</span>
                            <span className="font-bold text-slate-600">NT$ {Math.round(stat.paid)}</span>
                          </div>
                          <div className="flex justify-between text-slate-500">
                            <span>應攤總額:</span>
                            <span className="font-bold text-slate-600">NT$ {Math.round(stat.share)}</span>
                          </div>
                        </div>
                        <div className={`text-lg font-bold flex justify-between items-center pt-2 border-t border-orange-50 ${stat.balance > 0.01 ? 'text-green-500' : stat.balance < -0.01 ? 'text-red-500' : 'text-slate-400'}`}>
                          <span className="text-xs text-slate-400 font-normal">結算結果</span>
                          <span>{stat.balance > 0.01 ? `應收 ${Math.round(stat.balance)}` : stat.balance < -0.01 ? `需付 ${Math.abs(Math.round(stat.balance))}` : '結清'}</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div>
                  <h4 className="text-sm font-bold text-slate-500 mb-3 border-b border-orange-200 pb-2 flex items-center gap-1"><CheckSquare className="w-4 h-4"/> 最佳轉帳路徑 (誰要轉給誰)</h4>
                  <div className="space-y-3">
                    {splitResult.transactions.length === 0 ? (
                      <div className="text-slate-400 text-sm">✨ 帳目已結清，無須轉帳</div>
                    ) : (
                      splitResult.transactions.map((tx, idx) => (
                        <div key={idx} className="bg-orange-50/80 px-4 py-3 rounded-xl border border-orange-200 flex items-center justify-between shadow-sm">
                          <div className="flex items-center gap-2 md:gap-3">
                            <span className="font-bold text-red-600 bg-red-100 px-2 py-1 rounded-lg text-sm">{tx.from}</span>
                            <span className="text-slate-500 text-xs md:text-sm font-medium">需轉帳給</span>
                            <span className="font-bold text-green-600 bg-green-100 px-2 py-1 rounded-lg text-sm">{tx.to}</span>
                          </div>
                          <div className="font-black text-slate-700 text-lg flex items-center">
                            <DollarSign className="w-4 h-4 text-orange-500 mr-0.5"/> {tx.amount}
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                </div>
              </div>
            )}
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-pink-50 font-sans text-slate-800 flex flex-col relative">
          {/* Dashboard View */}
          {view === 'dashboard' && (
            <div className="max-w-4xl mx-auto w-full p-4 md:p-6 flex-grow relative">
              {!isStandalone && (
                <div className="bg-pink-100 text-pink-600 text-xs md:text-sm px-4 py-3 rounded-2xl mb-4 flex items-center justify-center gap-2 font-bold shadow-sm border border-pink-200">
                  <span className="text-lg animate-bounce">💡</span> 
                  <span>小提示：在手機瀏覽器點擊「加到主畫面」，就能變成專屬 APP 喔！</span>
                </div>
              )}
              <div className="flex justify-between items-center mb-8 mt-4 flex-wrap gap-4">

                        <div className="text-[10px] md:text-xs text-blue-400 font-bold">去程航班</div>
                        <div className="font-bold text-slate-700 text-sm md:text-base">
                          {tripInfo.outboundFlight.number || '未提供'}
                          {getAirline(tripInfo.outboundFlight.number) && <span className="ml-1 text-xs md:text-sm text-blue-600">({getAirline(tripInfo.outboundFlight.number)})</span>}
                        </div>
                        {tripInfo.outboundFlight.time && <div className="text-[10px] md:text-xs text-slate-500 mt-0.5">{tripInfo.outboundFlight.time}</div>}
                      </div>
                    </div>
                    <div className="bg-purple-50 px-4 md:px-6 py-3 rounded-2xl flex items-center gap-3 w-full sm:w-auto border border-purple-100">
                      <PlaneLanding className="w-5 h-5 md:w-6 md:h-6 text-purple-400 flex-shrink-0" />
                      <div className="text-left">
                        <div className="text-[10px] md:text-xs text-purple-400 font-bold">回程航班</div>
                        <div className="font-bold text-slate-700 text-sm md:text-base">
                          {tripInfo.returnFlight.number || '未提供'}
                          {getAirline(tripInfo.returnFlight.number) && <span className="ml-1 text-xs md:text-sm text-purple-600">({getAirline(tripInfo.returnFlight.number)})</span>}
                        </div>
                        {tripInfo.returnFlight.time && <div className="text-[10px] md:text-xs text-slate-500 mt-0.5">{tripInfo.returnFlight.time}</div>}
                      </div>
                    </div>
                    <div className="bg-orange-50 px-4 md:px-6 py-3 rounded-2xl flex items-center gap-3 w-full sm:w-auto border border-orange-100">
                      <DollarSign className="w-5 h-5 md:w-6 md:h-6 text-orange-400 flex-shrink-0" />
                      <div className="text-left">
                        <div className="text-[10px] md:text-xs text-orange-400 font-bold">總預算/花費</div>
                        <div className="font-bold text-slate-700 text-sm md:text-base">NT$ {getTotalCost().toLocaleString()}</div>
                        {tripInfo.flightCost && (
                          <div className="text-[10px] md:text-[11px] text-slate-500 mt-0.5">
                            (機票: NT$ {Number(tripInfo.flightCost).toLocaleString()})
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                </div>

                <div className="space-y-8 md:space-y-10">
                  {dates.map((date, idx) => {
                    const dayActivities = itinerary[date] || [];
                    if (dayActivities.length === 0) return null;
                    return (
                      <div key={date} className="break-inside-avoid px-2 md:px-0 mb-8">
                        <h2 className="text-lg md:text-2xl font-bold text-white bg-pink-400 inline-block px-4 md:px-6 py-2 rounded-r-2xl rounded-tl-2xl mb-6 shadow-sm">
                          Day {idx + 1} - {formatDate(date)}
                        </h2>
                        <div className="relative border-l-2 md:border-l-4 border-pink-100 ml-3 md:ml-6 pl-6 md:pl-8 space-y-6 md:space-y-8">
                          {dayActivities.map((act) => (
                            <div key={act.id} className="relative break-inside-avoid">
                              <div className="absolute -left-[30px] md:-left-[42px] top-1 w-4 h-4 md:w-6 md:h-6 bg-white border-2 md:border-4 border-pink-400 rounded-full"></div>
                              <div className="flex flex-col sm:flex-row gap-2 md:gap-4">
                                <div className="w-auto sm:w-20 pt-0 sm:pt-1 font-bold text-pink-500 sm:text-slate-500 flex-shrink-0 text-sm md:text-base">{act.time}</div>
                                <div className="flex-1 bg-slate-50 p-3 md:p-4 rounded-2xl border border-slate-100 print:border-slate-300">
                                  <div className="flex flex-col justify-between items-start mb-2 gap-2">
                                    <div className="flex items-center justify-between w-full">
                                      <h3 className="font-bold text-base md:text-lg text-slate-800 flex items-center gap-2">
                                        <span>{getCategoryIcon(act.type)}</span> <span className="break-words">{act.title}</span>
                                      </h3>
                                      {act.cost && (
                                        <div className="flex flex-col items-end">
                                          <span className="text-orange-500 font-bold text-xs md:text-sm bg-orange-100 px-2 py-1 rounded-lg">NT$ {act.cost}</span>
                                          {tripInfo.companions.length > 1 && act.payer !== 'none' && (
                                            <span className="text-[10px] text-slate-400 mt-1">代墊: {tripInfo.companions.includes(act.payer) ? act.payer : tripInfo.companions[0]}</span>
                                          )}
                                          {tripInfo.companions.length > 1 && act.payer === 'none' && (
                                            <span className="text-[10px] text-slate-400 mt-1">各自付清</span>
                                          )}
                                        </div>
                                      )}
                                    </div>
                                  </div>
                                  {act.location && (
                                    <div className="text-xs md:text-sm text-blue-500 mb-2 flex items-start md:items-center gap-1 break-words">
                                      <MapPin className="w-3 h-3 md:w-4 md:h-4 mt-0.5 md:mt-0 flex-shrink-0" /> <span className="line-clamp-2 md:line-clamp-1">{act.location}</span>
                                    </div>
                                  )}
                                  {act.notes && <p className="text-xs md:text-sm text-slate-600 mb-3 bg-white p-2 md:p-3 rounded-xl border border-slate-200 break-words whitespace-pre-wrap">{act.notes}</p>}
                                  {act.photoUrls && act.photoUrls.length > 0 && (
                                    <div className={`mt-3 grid gap-2 ${act.photoUrls.length === 1 ? 'grid-cols-1' : 'grid-cols-2'}`}>
                                      {act.photoUrls.map((url, i) => (
                                        <div key={i} className="rounded-xl overflow-hidden border-2 border-white shadow-sm bg-slate-50">
                                          <img src={url} alt={`照片 ${i}`} className="w-full h-auto max-h-[300px] object-cover" />
                                        </div>
                                      ))}
                                    </div>
                                  )}
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* 顯示結算報表 (如果有多人) */}
                {tripInfo.companions && tripInfo.companions.length > 1 && renderSplitSummary()}
              </div>
            </div>
          )}
          
          {/* Footer */}
          <footer className="w-full text-center py-6 md:py-8 px-4 text-[10px] md:text-xs text-slate-400 mt-auto bg-transparent border-t border-pink-100/50 print:mt-10 print:border-none">
            <p className="mb-1">Copyright © 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
          </footer>
        </div>
      );
    }

    // --- Subcomponent: Daily Planner ---
    function DailyPlanner({ date, activities, companions, onAddActivity, onEditActivity, onDeleteActivity, resizeImage }) {
      const [isAdding, setIsAdding] = useState(false);
      const [editingId, setEditingId] = useState(null);
      
      const emptyAct = { 
        time: '10:00', type: 'attraction', title: '', location: '', cost: '', notes: '', photoUrls: [],
        payer: companions && companions.length > 0 ? companions[0] : '我', 
        splitWith: companions || ['我']
      };
      
      const [newAct, setNewAct] = useState(emptyAct);
      const fileInputRef = useRef(null);

      useEffect(() => {
        if (companions && companions.length > 0 && !isAdding && !editingId) {
           setNewAct(prev => ({ ...prev, payer: companions[0], splitWith: companions }));
        }
      }, [companions, isAdding, editingId]);

      const handlePhotoUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;
        if ((newAct.photoUrls || []).length + files.length > 5) return alert('最多只能上傳 5 張照片喔！');
        try {
          const compressedImages = await Promise.all(files.map(file => resizeImage(file)));
          setNewAct(prev => ({ ...prev, photoUrls: [...(prev.photoUrls || []), ...compressedImages].slice(0, 5) }));
        } catch (err) { alert('部分照片讀取失敗，請重新嘗試！'); }
        if(fileInputRef.current) fileInputRef.current.value = '';
      };

      const removePhoto = (index) => setNewAct(prev => ({ ...prev, photoUrls: (prev.photoUrls || []).filter((_, i) => i !== index) }));

      const submitActivity = () => {
        if (!newAct.title) return alert("請輸入行程名稱！");
        if (newAct.cost && newAct.payer !== 'none' && newAct.splitWith.length === 0) return alert("有花費的話，請至少選擇一位要分攤的旅伴！");
        
        if (editingId) { onEditActivity(newAct); setEditingId(null); } 
        else { onAddActivity(newAct); setIsAdding(false); }
        setNewAct({ ...emptyAct, payer: companions[0], splitWith: companions }); // 重置
      };

      const cancelEditOrAdd = () => { setIsAdding(false); setEditingId(null); setNewAct({ ...emptyAct, payer: companions[0], splitWith: companions }); }
      
      const startEdit = (act) => {
        setIsAdding(false); setEditingId(act.id);
        setNewAct({
          ...act,
          payer: act.payer || companions[0],
          splitWith: act.splitWith && act.splitWith.length > 0 ? act.splitWith : companions
        }); 
      };

      const getCurrentLocation = () => {
        if (navigator.geolocation) {
          setNewAct(prev => ({ ...prev, location: '📍 定位與尋找地標中...' }));
          navigator.geolocation.getCurrentPosition(
            async (position) => {
              const lat = position.coords.latitude; const lon = position.coords.longitude;
              try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`, { headers: { 'Accept-Language': 'zh-TW,zh;q=0.9,en;q=0.8' } });
                const data = await response.json();
                let placeName = '';
                if (data.name) placeName = data.name;
                else if (data.address) placeName = [data.address.city || data.address.town, data.address.road].filter(Boolean).join(' ');
                if (!placeName) placeName = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
                setNewAct(prev => ({ ...prev, location: placeName }));
              } catch (error) { setNewAct(prev => ({ ...prev, location: `${lat.toFixed(5)}, ${lon.toFixed(5)}` })); }
            },
            () => { alert("無法取得定位，請確認已允許瀏覽器定位權限。"); setNewAct(prev => ({ ...prev, location: '' })); },
            { enableHighAccuracy: true, timeout: 10000 }
          );
        } else { alert("您的瀏覽器不支援定位功能。"); }
      };

      const handleSplitWithToggle = (person) => {
        setNewAct(prev => {
          const current = prev.splitWith || [];
          if (current.includes(person)) return { ...prev, splitWith: current.filter(p => p !== person) };
          else return { ...prev, splitWith: [...current, person] };
        });
      };

      const renderForm = () => (
        <div className="space-y-4">
          <div className="flex flex-col sm:flex-row gap-3">
            <div className="w-full sm:w-1/3">
              <label className="block text-xs font-bold text-slate-400 mb-1">時間</label>
              <input type="time" className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-pink-400 outline-none" value={newAct.time} onChange={e => setNewAct({...newAct, time: e.target.value})} />
            </div>
            <div className="w-full sm:w-2/3">
              <label className="block text-xs font-bold text-slate-400 mb-1">類別</label>
              <select className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-pink-400 outline-none appearance-none" value={newAct.type} onChange={e => setNewAct({...newAct, type: e.target.value})}>
                <option value="attraction">🌸 景點</option><option value="food">🍔 美食</option>
                <option value="hotel">🏨 住宿</option><option value="transport">🚂 交通</option>
                <option value="shopping">🛍️ 購物</option><option value="other">✨ 其他活動</option>
              </select>
            </div>
          </div>

          <div>
            <label className="block text-xs font-bold text-slate-400 mb-1">名稱 *</label>
            <input type="text" placeholder="例如：東京鐵塔、一蘭拉麵..." className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-pink-400 outline-none" value={newAct.title} onChange={e => setNewAct({...newAct, title: e.target.value})} />
          </div>

          <div>
            <label className="block text-xs font-bold text-slate-400 mb-1">地點 / Google Maps</label>
            <div className="flex gap-2">
              <input type="text" placeholder="輸入地標，或右側打卡" className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-pink-400 outline-none" value={newAct.location} onChange={e => setNewAct({...newAct, location: e.target.value})} />
              <button onClick={getCurrentLocation} className="bg-blue-100 text-blue-600 p-2 rounded-xl hover:bg-blue-200 transition-colors flex-shrink-0"><Navigation className="w-5 h-5" /></button>
            </div>
          </div>

          <div className={`flex flex-col sm:flex-row gap-3 ${companions && companions.length > 1 ? 'bg-orange-50 p-3 rounded-xl border border-orange-100' : ''}`}>
            <div className="flex-1">
              <label className="block text-xs font-bold text-slate-400 mb-1">花費預算 (NT$)</label>
              <input type="number" placeholder="0" className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-orange-400 outline-none" value={newAct.cost} onChange={e => setNewAct({...newAct, cost: e.target.value})} />
            </div>
            
            {companions && companions.length > 1 && (
              <>
                <div className="w-full sm:w-1/3">
                  <label className="block text-xs font-bold text-orange-500 mb-1">代墊人</label>
                  <select className="w-full bg-white rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-orange-400 outline-none border border-orange-100" value={newAct.payer} onChange={e => setNewAct({...newAct, payer: e.target.value})}>
                    <option value="none">無 (各自付清)</option>
                    {companions.map((c, i) => <option key={i} value={c}>{c}</option>)}
                  </select>
                </div>
                {newAct.payer !== 'none' && (
                  <div className="w-full sm:w-1/3">
                    <label className="block text-xs font-bold text-orange-500 mb-1">參與分攤</label>
                    <div className="bg-white rounded-xl p-2 border border-orange-100 max-h-24 overflow-y-auto space-y-1">
                      {companions.map((c, i) => (
                        <label key={i} className="flex items-center gap-2 text-sm cursor-pointer hover:bg-orange-50 p-1 rounded">
                          <input type="checkbox" className="rounded text-orange-500 focus:ring-orange-400" checked={(newAct.splitWith || []).includes(c)} onChange={() => handleSplitWithToggle(c)} />
                          <span className="text-slate-600 truncate">{c}</span>
                        </label>
                      ))}
                    </div>
                  </div>
                )}
              </>
            )}
          </div>

          <div>
            <label className="block text-xs font-bold text-slate-400 mb-1">備註 / 心情</label>
            <textarea placeholder="寫點什麼..." className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-pink-400 outline-none min-h-[80px] resize-y" value={newAct.notes} onChange={e => setNewAct({...newAct, notes: e.target.value})}></textarea>
          </div>

          <div>
            <label className="block text-xs font-bold text-slate-400 mb-1">照片 (最多 5 張)</label>
            <div className="flex flex-wrap gap-3 p-3 bg-pink-50 rounded-xl border-2 border-dashed border-pink-200">
              {(newAct.photoUrls || []).map((url, idx) => (
                <div key={idx} className="relative w-20 h-20 rounded-lg overflow-hidden border-2 border-white shadow-sm">
                  <img src={url} alt="preview" className="w-full h-full object-cover" />
                  <button onClick={() => removePhoto(idx)} className="absolute top-1 right-1 bg-red-500/80 hover:bg-red-600 text-white rounded-full p-1"><Trash2 className="w-3 h-3" /></button>
                </div>
              ))}
              {(newAct.photoUrls || []).length < 5 && (
                <div className="w-20 h-20 border-2 border-dashed border-pink-300 bg-white rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-pink-50" onClick={() => fileInputRef.current?.click()}>
                  <ImagePlus className="w-6 h-6 text-pink-300 mb-1" />
                  <span className="text-[10px] text-pink-400 font-bold">加入照片</span>
                </div>
              )}
              <input type="file" ref={fileInputRef} className="hidden" accept="image/*" multiple onChange={handlePhotoUpload} />
            </div>
          </div>
          
          <div className="flex gap-2 md:gap-3 pt-2">
            <button onClick={cancelEditOrAdd} className="flex-1 py-2 md:py-3 rounded-xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors text-sm md:text-base">取消</button>
            <button onClick={submitActivity} className="flex-1 py-2 md:py-3 rounded-xl font-bold text-white bg-pink-500 hover:bg-pink-600 transition-colors shadow-lg shadow-pink-200 text-sm md:text-base">儲存行程</button>
          </div>
        </div>
      );

      return (
        <div className="space-y-4">
          {activities.map((act) => {
            if (editingId === act.id) {
              return (
                <div key={act.id} className="bg-white rounded-2xl md:rounded-3xl p-4 md:p-6 shadow-lg border-2 border-orange-300">
                  <h3 className="font-bold text-orange-500 mb-4 flex items-center gap-2 text-sm md:text-base"><Pencil className="w-4 h-4 bg-orange-100 rounded-full p-0.5" /> 正在修改此行程</h3>
                  {renderForm()}
                </div>
              )
            }
            return (
              <div key={act.id} className="bg-white rounded-2xl md:rounded-3xl p-4 md:p-5 shadow-sm border border-pink-50 relative overflow-hidden group transition-all hover:shadow-md">
                <div className="flex justify-between items-start mb-3 gap-2">
                  <div className="flex flex-wrap items-center gap-2 md:gap-3 w-full pr-16">
                    <div className="bg-pink-100 text-pink-600 font-bold py-1 px-2 md:px-3 rounded-full text-xs md:text-sm flex items-center gap-1 flex-shrink-0">
                      <Clock className="w-3 h-3 md:w-4 md:h-4" /> {act.time}
                    </div>
                    <div className="text-lg md:text-2xl flex-shrink-0">{getCategoryIcon(act.type)}</div>
                    <h3 className="font-bold text-base md:text-lg text-slate-700 break-words">{act.title}</h3>
                  </div>
                  <div className="absolute right-2 top-2 md:static flex items-center gap-1">
                    <button onClick={() => startEdit(act)} className="text-slate-300 hover:text-orange-400 transition-colors p-2" title="修改行程"><Pencil className="w-4 h-4" /></button>
                    <button onClick={() => onDeleteActivity(act.id)} className="text-slate-300 hover:text-red-400 transition-colors p-2" title="刪除行程"><Trash2 className="w-4 h-4" /></button>
                  </div>
                </div>

                <div className="pl-1 space-y-2">
                  {act.location && (
                    <div className="flex items-start md:items-center gap-1 md:gap-2 text-xs md:text-sm text-blue-500 bg-blue-50 hover:bg-blue-100 cursor-pointer w-fit max-w-full px-3 py-1.5 rounded-2xl md:rounded-full transition-colors break-words" onClick={() => window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(act.location)}`)}>
                      <MapPin className="w-3 h-3 mt-0.5 md:mt-0 flex-shrink-0" /> <span className="line-clamp-2 md:line-clamp-1">{act.location}</span> 
                    </div>
                  )}
                  {act.cost && (
                    <div className="flex flex-wrap items-center gap-2 text-xs md:text-sm">
                      <span className="text-orange-500 font-bold bg-orange-50 px-2 py-1 rounded border border-orange-100 flex items-center gap-1">
                        <DollarSign className="w-3 h-3" /> NT$ {act.cost}
                      </span>
                      {companions && companions.length > 1 && act.payer !== 'none' && (
                        <span className="text-slate-400 text-xs flex items-center gap-1">
                           <Users className="w-3 h-3" /> {companions.includes(act.payer) ? act.payer : companions[0]} 代墊 
                           {(act.splitWith && act.splitWith.length > 0 && act.splitWith.length < companions.length) && `(部分分攤)`}
                        </span>
                      )}
                      {companions && companions.length > 1 && act.payer === 'none' && (
                        <span className="text-slate-400 text-xs flex items-center gap-1">
                           <Users className="w-3 h-3" /> 各自付清
                        </span>
                      )}
                    </div>
                  )}
                  {act.notes && <div className="text-xs md:text-sm text-slate-500 bg-slate-50 p-3 rounded-xl mt-2 break-words whitespace-pre-wrap">{act.notes}</div>}
                  {act.photoUrls && act.photoUrls.length > 0 && (
                    <div className={`mt-3 grid gap-2 ${act.photoUrls.length === 1 ? 'grid-cols-1' : 'grid-cols-2'}`}>
                      {act.photoUrls.map((url, idx) => (
                        <div key={idx} className="relative rounded-xl overflow-hidden border-2 border-white shadow-sm bg-slate-50">
                          <img src={url} alt="行程照片" className="w-full h-auto max-h-[300px] object-cover" />
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          })}

          {activities.length === 0 && !isAdding && (
            <div className="text-center py-10 px-4 bg-white/50 rounded-3xl border-2 border-dashed border-pink-200">
              <Star className="w-12 h-12 text-pink-200 mx-auto mb-3" />
              <p className="text-pink-400 font-bold text-sm md:text-base">這天還沒有排行程唷！</p>
            </div>
          )}

          {isAdding && !editingId && (
            <div className="bg-white rounded-2xl md:rounded-3xl p-4 md:p-6 shadow-lg border-2 border-pink-300">
              <h3 className="font-bold text-pink-500 mb-4 flex items-center gap-2 text-sm md:text-base"><Plus className="w-4 h-4 bg-pink-100 rounded-full p-0.5" /> 新增行程</h3>
              {renderForm()}
            </div>
          )}
          
          {!isAdding && !editingId && (
            <button onClick={() => setIsAdding(true)} className="w-full py-3 md:py-4 border-2 border-dashed border-pink-300 rounded-2xl md:rounded-3xl text-pink-500 font-bold flex items-center justify-center gap-2 hover:bg-pink-100/50 transition-colors mt-2">
              <Plus className="w-5 h-5" /> 新增下一個行程
            </button>
          )}
        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
