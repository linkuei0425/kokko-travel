<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kokko 愛旅行-旅遊手札  </title>
  
  <!-- === 網頁分享 (Open Graph) 標籤 === -->
  <meta property="og:title" content="Kokko Travel 旅遊手札">
  <meta property="og:description" content="Kokko 愛旅行，輕鬆記錄專屬你的美好旅遊回憶！">
  <meta property="og:image" content="https://kokko-travel.com/tourapp/1.png">
  <meta property="og:image:secure_url" content="https://kokko-travel.com/tourapp/1.png">
  <meta property="og:url" content="https://kokko-travel.com/">
  <meta property="og:type" content="website">

  <!-- === Twitter Card 標籤 (增加跨平台相容性) === -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Kokko Travel 旅遊手札">
  <meta name="twitter:description" content="Kokko 愛旅行，輕鬆記錄專屬你的美好旅遊回憶！">
  <meta name="twitter:image" content="https://kokko-travel.com/tourapp/1.png">

  <!-- === 加入主畫面 (PWA / 桌面圖示) === -->
  <link rel="apple-touch-icon" href="https://kokko-travel.com/tourapp/1.png">
  <link rel="icon" type="image/png" sizes="192x192" href="https://kokko-travel.com/tourapp/1.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="旅遊手札">
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- 引入 Babel 來在瀏覽器中即時編譯 React JSX 語法 -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- 引入 html2canvas 支援轉圖分享 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- 引入 html2pdf 支援 PDF 下載 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  
  <link rel="icon" href="https://kokko-travel.com/logo.png">
  <style>
    /* 隱藏捲軸但可滾動的小工具類別 */
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-pink-50 min-h-screen">

  <!-- React 應用程式的掛載點 -->
  <div id="root"></div>

  <!-- 使用 Babel 與 Module 模式載入並執行 -->
  <script type="text/babel" data-type="module">
    import React, { useState, useRef, useEffect } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      PlaneTakeoff, PlaneLanding, CalendarHeart, MapPin, 
      Camera, DollarSign, Clock, ChevronRight, Printer, 
      Plus, Trash2, Navigation, Heart, Coffee, Star, Map,
      Image as ImageIcon, Settings, Save, Home, FolderHeart, ImagePlus, Share2, Users, Download, Upload,
      Pencil, FileDown, ImageIcon as FileImage
    } from 'https://esm.sh/lucide-react@0.292.0';

    // --- Helper Functions ---
    const airlineMap = {
      'BR': '長榮航空', 'CI': '中華航空', 'JX': '星宇航空', 'IT': '台灣虎航',
      'CX': '國泰航空', 'JL': '日本航空', 'NH': '全日空', 'MM': '樂桃航空',
      'TR': '酷航', 'UO': '香港快運', 'GK': '捷星日本', 'TW': '德威航空',
      'ZE': '易斯達航空', '7C': '濟州航空', 'LJ': '真航空', 'TG': '泰國航空'
    };

    const getAirline = (flightNum) => {
      if (!flightNum) return '';
      const code = flightNum.trim().substring(0, 2).toUpperCase();
      return airlineMap[code] || '';
    };

    const generateDates = (startStr, endStr) => {
      const dates = [];
      const curr = new Date(startStr);
      const end = new Date(endStr);
      while (curr <= end) {
        const yyyy = curr.getFullYear();
        const mm = String(curr.getMonth() + 1).padStart(2, '0');
        const dd = String(curr.getDate()).padStart(2, '0');
        dates.push(`${yyyy}-${mm}-${dd}`);
        curr.setDate(curr.getDate() + 1);
      }
      return dates;
    };

    const formatDate = (dateString) => {
      const date = new Date(dateString);
      return `${date.getMonth() + 1}/${date.getDate()} (${['日', '一', '二', '三', '四', '五', '六'][date.getDay()]})`;
    };

    const getCategoryIcon = (type) => {
      const icons = { attraction: '🌸', food: '🍔', hotel: '🏨', transport: '🚂', shopping: '🛍️', other: '✨' };
      return icons[type] || '✨';
    };

    // --- Image Compression Helpers ---
    const resizeImage = (file) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
          const img = new Image();
          img.src = e.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const MAX_WIDTH = 800; // 壓縮最大寬度
            const MAX_HEIGHT = 800;
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
            } else {
              if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7)); // 壓縮品質 70%
          };
          img.onerror = (err) => reject(err);
        };
      });
    };

    // --- Main App Component ---
    function App() {
      const [view, setView] = useState('dashboard'); // 'dashboard', 'setup', 'planner', 'summary'
      const [savedTrips, setSavedTrips] = useState([]);
      const [currentTripId, setCurrentTripId] = useState(null);
      
      // Trip Info State
      const [tripInfo, setTripInfo] = useState({
        title: '我的可愛小旅行 🌸',
        startDate: '',
        endDate: '',
        outboundFlight: { number: '', time: '' },
        returnFlight: { number: '', time: '' },
        flightCost: ''
      });

      const [itinerary, setItinerary] = useState({});
      const [dates, setDates] = useState([]);
      const [activeDateIndex, setActiveDateIndex] = useState(0);
      const [isStandalone, setIsStandalone] = useState(true);

      // --- 讀取本機端旅程資料 ---
      useEffect(() => {
        try {
          const localData = JSON.parse(localStorage.getItem('kokko_trips') || '[]');
          setSavedTrips(localData.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0)));
        } catch(e) {
          setSavedTrips([]);
        }
      }, [view]);

      // PWA 相關偵測
      useEffect(() => {
        setIsStandalone(window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true);
      }, []);

      // --- Actions ---
      const createNewTrip = () => {
        setCurrentTripId(null);
        setTripInfo({
          title: '我的可愛小旅行 🌸', startDate: '', endDate: '',
          outboundFlight: { number: '', time: '' }, returnFlight: { number: '', time: '' }, flightCost: ''
        });
        setItinerary({});
        setDates([]);
        setView('setup');
      };

      const openTrip = (trip) => {
        setCurrentTripId(trip.id);
        setTripInfo(trip.tripInfo);
        setItinerary(trip.itinerary || trip.itinerary); // 相容舊格式
        setDates(trip.dates);
        setActiveDateIndex(0);
        setView('planner');
      };

      const deleteTrip = (id, e) => {
        e.stopPropagation();
        if(window.confirm("確定要刪除這趟專屬旅程嗎？刪除後無法恢復喔！")) {
          let localData = JSON.parse(localStorage.getItem('kokko_trips') || '[]');
          localData = localData.filter(t => t.id !== id);
          localStorage.setItem('kokko_trips', JSON.stringify(localData));
          setSavedTrips(localData);
        }
      };

      const handleSaveTrip = (showMsg = true, latestItinerary = itinerary) => {
        const tripId = currentTripId || Date.now().toString();
        const tripData = { id: tripId, tripInfo, itinerary: latestItinerary, dates, updatedAt: Date.now() };
        
        try {
          let localData = JSON.parse(localStorage.getItem('kokko_trips') || '[]');
          const idx = localData.findIndex(t => t.id === tripId);
          if (idx >= 0) {
            localData[idx] = tripData;
          } else {
            localData.unshift(tripData);
          }
          localStorage.setItem('kokko_trips', JSON.stringify(localData));
          if (!currentTripId) setCurrentTripId(tripId);
          if (showMsg) alert("✅ 旅程已成功儲存！");
        } catch(e) {
          if (showMsg) alert("儲存失敗：瀏覽器空間不足 (照片過多)，請嘗試清理。");
        }
      };

      const handleStart = () => {
        if (!tripInfo.startDate || !tripInfo.endDate) {
          alert("請選擇開始與結束日期唷！");
          return;
        }
        const generatedDates = generateDates(tripInfo.startDate, tripInfo.endDate);
        setDates(generatedDates);
        
        const newItinerary = { ...itinerary };
        generatedDates.forEach(date => {
          if (!newItinerary[date]) newItinerary[date] = [];
        });
        setItinerary(newItinerary);
        setView('planner');
        
        // 自動靜默存檔以產生 ID
        setTimeout(() => handleSaveTrip(false, newItinerary), 500);
      };

      // --- 匯出資料檔 (JSON) ---
      const handleExportTripData = () => {
        const tripData = { id: currentTripId, tripInfo, itinerary, dates, updatedAt: Date.now() };
        const blob = new Blob([JSON.stringify(tripData)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${tripInfo.title || 'trip'}_data.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      };

      // --- 匯出 PDF (已修復與強化機制) ---
      const handleDownloadPDF = async () => {
        const element = document.getElementById('trip-summary-content');
        if (!element) return;
        
        alert("正在為您產製 PDF 檔，這可能需要幾秒鐘的時間...");
        
        const opt = {
          margin:       [10, 5, 10, 5],
          filename:     `${tripInfo.title || 'trip'}_行程表.pdf`,
          image:        { type: 'jpeg', quality: 0.98 },
          html2canvas:  { scale: 2, useCORS: true, allowTaint: true }, // allowTaint 幫助跨網域圖片加載
          jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        try {
          await window.html2pdf().set(opt).from(element).save();
        } catch (error) {
          console.error("PDF 匯出失敗:", error);
          alert("PDF 匯出時發生錯誤，請稍後再試！");
        }
      };

      // --- 分享/下載圖片 (圖文並茂) ---
      const handleShareAsImage = async () => {
        const element = document.getElementById('trip-summary-content');
        if (!element) return;

        alert("正在準備您的行程美圖，請稍等喔...");

        try {
          const canvas = await html2canvas(element, { useCORS: true, scale: 2, allowTaint: true });
          canvas.toBlob(async (blob) => {
            if (!blob) return;
            const file = new File([blob], `${tripInfo.title}.png`, { type: 'image/png' });
            
            // 嘗試呼叫原生分享
            if (navigator.share) {
              try {
                await navigator.share({
                  title: tripInfo.title,
                  text: '來看看我的旅遊行程！✨',
                  files: [file]
                });
                return; // 分享成功就結束
              } catch (e) {
                console.log("使用者取消分享或失敗", e);
                // 失敗的話繼續往下走 (變成下載)
              }
            }

            // Fallback：無法原生分享，改用下載圖片
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${tripInfo.title}_行程總覽.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            alert("您的裝置/瀏覽器不支援直接分享圖片，已自動為您下載行程長圖！");

          }, 'image/png');
        } catch (error) {
          console.error("圖片產生失敗", error);
          alert("圖片產生失敗，請確認行程照片格式是否正確。");
        }
      };

      // --- 增刪改 Activities ---
      const addActivity = (date, activity) => {
        const newDayActs = [...(itinerary[date] || []), { ...activity, id: Date.now().toString() }].sort((a, b) => a.time.localeCompare(b.time));
        const newItinerary = { ...itinerary, [date]: newDayActs };
        setItinerary(newItinerary);
        handleSaveTrip(false, newItinerary); // 自動存檔
      };

      const editActivity = (date, updatedAct) => {
        const newDayActs = itinerary[date].map(act => act.id === updatedAct.id ? updatedAct : act);
        newDayActs.sort((a, b) => a.time.localeCompare(b.time));
        const newItinerary = { ...itinerary, [date]: newDayActs };
        setItinerary(newItinerary);
        handleSaveTrip(false, newItinerary); // 自動存檔
      };

      const deleteActivity = (date, id) => {
        const newDayActs = itinerary[date].filter(act => act.id !== id);
        const newItinerary = { ...itinerary, [date]: newDayActs };
        setItinerary(newItinerary);
        handleSaveTrip(false, newItinerary); // 自動存檔
      };

      const getTotalCost = (targetTripInfo = tripInfo, targetItinerary = itinerary) => {
        let total = Number(targetTripInfo.flightCost) || 0;
        Object.values(targetItinerary).forEach(day => {
          day.forEach(act => { total += Number(act.cost) || 0; });
        });
        return total;
      };

      return (
        <div className="min-h-screen bg-pink-50 font-sans text-slate-800 flex flex-col">
          {/* Dashboard View */}
          {view === 'dashboard' && (
            <div className="max-w-4xl mx-auto w-full p-4 md:p-6 flex-grow relative">
              {!isStandalone && (
                <div className="bg-pink-100 text-pink-600 text-xs md:text-sm px-4 py-3 rounded-2xl mb-4 flex items-center justify-center gap-2 font-bold shadow-sm border border-pink-200">
                  <span className="text-lg animate-bounce">💡</span> 
                  <span>小提示：在手機瀏覽器點擊「加到主畫面」，就能變成專屬 APP 喔！</span>
                </div>
              )}
              <div className="flex justify-between items-center mb-8 mt-4 flex-wrap gap-4">
                <div className="flex items-center gap-3">
                  <div className="w-12 h-12 rounded-full overflow-hidden shadow-sm border-2 border-pink-200 bg-white">
                    <img src="https://kokko-travel.com/logo.png" alt="Logo" className="w-full h-full object-cover" onError={(e)=>{e.target.style.display='none'}} />
                  </div>
                  <div>
                    <h1 className="text-2xl font-bold text-pink-600">Kokko 愛旅行-旅遊手札</h1>
                    <p className="text-xs text-slate-400 mt-1">📱 本機儲存模式 (最高隱私)</p>
                  </div>
                </div>
                <div className="flex flex-wrap gap-2">
                  <button 
                    onClick={createNewTrip}
                    className="bg-pink-500 hover:bg-pink-600 text-white px-4 py-2 rounded-full font-bold shadow-md flex items-center gap-2 transition-transform hover:scale-105"
                  >
                    <Plus className="w-5 h-5" /> <span className="hidden sm:inline">新增旅程</span>
                  </button>
                </div>
              </div>

              {savedTrips.length === 0 ? (
                <div className="bg-white rounded-3xl p-10 text-center shadow-sm border-2 border-dashed border-pink-200 mt-10">
                  <FolderHeart className="w-16 h-16 text-pink-300 mx-auto mb-4" />
                  <h2 className="text-xl font-bold text-slate-600 mb-2">還沒有任何旅程紀錄喔！</h2>
                  <p className="text-slate-400 mb-6">開始規劃你的第一趟專屬旅行 ✈️</p>
                  <div className="flex justify-center gap-3 flex-wrap">
                    <button 
                      onClick={createNewTrip}
                      className="bg-pink-100 text-pink-600 px-6 py-3 rounded-full font-bold hover:bg-pink-200 transition-colors inline-flex items-center gap-2"
                    >
                      <PlaneTakeoff className="w-5 h-5" /> 立即建立新旅程
                    </button>
                  </div>
                </div>
              ) : (
                <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">
                  {savedTrips.map(trip => (
                    <div 
                      key={trip.id} 
                      onClick={() => openTrip(trip)}
                      className="bg-white rounded-3xl p-5 shadow-sm hover:shadow-md transition-shadow border border-pink-100 cursor-pointer relative group pt-8"
                    >
                      <button 
                        onClick={(e) => deleteTrip(trip.id, e)}
                        className="absolute top-4 right-4 text-slate-300 hover:text-red-500 opacity-100 md:opacity-0 md:group-hover:opacity-100 transition-opacity bg-white/80 p-1 rounded-full"
                        title="刪除旅程"
                      >
                        <Trash2 className="w-5 h-5" />
                      </button>
                      <CalendarHeart className="w-8 h-8 text-pink-400 mb-3 mt-2" />
                      <h3 className="font-bold text-lg text-slate-800 mb-1 pr-6 truncate">{trip.title || trip.tripInfo?.title}</h3>
                      <p className="text-sm text-slate-500 mb-3">
                        {trip.startDate ? trip.startDate.replace(/-/g, '/') : trip.tripInfo?.startDate.replace(/-/g, '/')} ~ {trip.endDate ? trip.endDate.replace(/-/g, '/') : trip.tripInfo?.endDate.replace(/-/g, '/')}
                      </p>
                      {trip.tripInfo && (
                        <div className="flex justify-between items-center text-xs border-t border-slate-50 pt-3 mt-2">
                          <span className="text-slate-400">{trip.dates?.length} 天行程</span>
                          <span className="font-bold text-orange-400">NT$ {getTotalCost(trip.tripInfo, trip.itinerary).toLocaleString()}</span>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Setup View */}
          {view === 'setup' && (
            <div className="flex flex-col items-center justify-center flex-grow p-4 md:p-6 print:hidden">
              <div className="w-full max-w-lg md:max-w-2xl flex justify-start mb-4">
                <button onClick={() => setView('dashboard')} className="text-pink-500 font-bold flex items-center gap-1 hover:bg-pink-100 px-3 py-1.5 rounded-full transition-colors">
                  <Home className="w-4 h-4" /> 回首頁
                </button>
              </div>
              <div className="bg-white rounded-[2rem] shadow-xl p-6 md:p-8 w-full max-w-lg md:max-w-2xl border-4 border-pink-200 relative overflow-hidden">
                <div className="absolute top-0 left-0 w-full h-4 bg-gradient-to-r from-pink-300 via-purple-300 to-blue-300"></div>
                
                <div className="text-center mb-6 md:mb-8 mt-4">
                  <div className="w-32 h-32 md:w-40 md:h-40 mx-auto mb-4 rounded-full overflow-hidden shadow-md border-4 border-pink-100 flex items-center justify-center bg-slate-50">
                    <img 
                      src="https://kokko-travel.com/logo.png" 
                      alt="Kokko Travel Logo" 
                      className="w-full h-full object-cover"
                      onError={(e) => { e.target.onerror = null; e.target.src = "https://placehold.co/400x400/ffe4e6/ec4899?text=Logo"; }}
                    />
                  </div>
                  <h1 className="text-2xl font-bold text-pink-600">{currentTripId ? '修改旅程設定 ⚙️' : '建立新旅程 ✈️'}</h1>
                  <p className="text-slate-400 text-sm mt-2">記錄你的美好回憶</p>
                </div>

                <div className="space-y-4">
                  <div>
                    <label className="block text-sm font-bold text-pink-500 mb-1">旅行名稱</label>
                    <input 
                      type="text" 
                      className="w-full bg-pink-50 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-400 border border-pink-100"
                      value={tripInfo.title}
                      onChange={e => setTripInfo({...tripInfo, title: e.target.value})}
                      placeholder="例如：東京浪漫之旅"
                    />
                  </div>

                  <div className="flex flex-col sm:flex-row gap-4">
                    <div className="flex-1">
                      <label className="block text-sm font-bold text-pink-500 mb-1">出發日期</label>
                      <input 
                        type="date" 
                        className="w-full bg-pink-50 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-400 border border-pink-100 text-slate-600"
                        value={tripInfo.startDate}
                        onChange={e => setTripInfo({...tripInfo, startDate: e.target.value})}
                      />
                    </div>
                    <div className="flex-1">
                      <label className="block text-sm font-bold text-pink-500 mb-1">回程日期</label>
                      <input 
                        type="date" 
                        className="w-full bg-pink-50 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-400 border border-pink-100 text-slate-600"
                        value={tripInfo.endDate}
                        min={tripInfo.startDate}
                        onChange={e => setTripInfo({...tripInfo, endDate: e.target.value})}
                      />
                    </div>
                  </div>

                  <div className="flex flex-col sm:flex-row gap-4">
                    <div className="flex-1">
                      <label className="block text-sm font-bold text-pink-500 mb-1">去程航班 🛫</label>
                      <div className="space-y-2">
                        <div className="relative">
                          <input 
                            type="text" 
                            className="w-full bg-pink-50 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-pink-400 border border-pink-100"
                            value={tripInfo.outboundFlight.number}
                            onChange={e => setTripInfo({...tripInfo, outboundFlight: { ...tripInfo.outboundFlight, number: e.target.value.toUpperCase() }})}
                            placeholder="航班代號 (例: BR192)"
                          />
                          {getAirline(tripInfo.outboundFlight.number) && (
                            <span className="absolute right-3 top-3 text-xs font-bold text-blue-600 bg-blue-100 px-2 py-1 rounded-lg shadow-sm">
                              {getAirline(tripInfo.outboundFlight.number)}
                            </span>
                          )}
                        </div>
                        <input 
                          type="text"

    // --- Subcomponent: Daily Planner ---
    function DailyPlanner({ date, activities, onAddActivity, onEditActivity, onDeleteActivity, resizeImage }) {
      const [isAdding, setIsAdding] = useState(false);
      const [editingId, setEditingId] = useState(null); // 紀錄當前正在修改的活動 ID
      
      const emptyAct = { time: '10:00', type: 'attraction', title: '', location: '', cost: '', notes: '', photoUrls: [] };
      const [newAct, setNewAct] = useState(emptyAct);
      const fileInputRef = useRef(null);

      const handlePhotoUpload = async (e) => {
        const files = Array.from(e.target.files);
        if (!files.length) return;

        if ((newAct.photoUrls || []).length + files.length > 5) {
          alert('最多只能上傳 5 張照片喔！');
          return;
        }

        try {
          const compressedImages = await Promise.all(files.map(file => resizeImage(file)));
          setNewAct(prev => ({ ...prev, photoUrls: [...(prev.photoUrls || []), ...compressedImages].slice(0, 5) }));
        } catch (err) {
          alert('部分照片讀取失敗，請重新嘗試！');
        }
        if(fileInputRef.current) fileInputRef.current.value = '';
      };

      const removePhoto = (index) => {
        setNewAct(prev => ({
          ...prev,
          photoUrls: (prev.photoUrls || []).filter((_, i) => i !== index)
        }));
      };

      const submitActivity = () => {
        if (!newAct.title) { alert("請輸入行程名稱！"); return; }
        
        if (editingId) {
          // 修改模式
          onEditActivity(newAct);
          setEditingId(null);
        } else {
          // 新增模式
          onAddActivity(newAct);
          setIsAdding(false);
        }
        setNewAct(emptyAct);
      };

      const cancelEditOrAdd = () => {
        setIsAdding(false);
        setEditingId(null);
        setNewAct(emptyAct);
      }

      const startEdit = (act) => {
        setIsAdding(false);
        setEditingId(act.id);
        setNewAct(act); // 將目標資料填入表單
      };

      const getCurrentLocation = () => {
        if (navigator.geolocation) {
          setNewAct(prev => ({ ...prev, location: '📍 定位與尋找地標中...' }));
          navigator.geolocation.getCurrentPosition(
            async (position) => {
              const lat = position.coords.latitude;
              const lon = position.coords.longitude;
              try {
                // 使用 OpenStreetMap Nominatim API 進行反向地理編碼取得地標/街道名稱
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`, {
                  headers: { 'Accept-Language': 'zh-TW,zh;q=0.9,en;q=0.8' }
                });
                const data = await response.json();
                
                let placeName = '';
                // 嘗試拿取最佳名稱
                if (data.name) {
                  placeName = data.name;
                } else if (data.address) {
                  const road = data.address.road || '';
                  const city = data.address.city || data.address.town || data.address.village || '';
                  placeName = [city, road].filter(Boolean).join(' ');
                }
                
                // 找不到名稱才顯示經緯度
                if (!placeName) {
                  placeName = `${lat.toFixed(5)}, ${lon.toFixed(5)}`;
                }

                setNewAct(prev => ({ ...prev, location: placeName }));
              } catch (error) {
                console.error("Geocoding failed", error);
                setNewAct(prev => ({ ...prev, location: `${lat.toFixed(5)}, ${lon.toFixed(5)}` }));
              }
            },
            () => {
              alert("無法取得定位，請確認已允許瀏覽器定位權限。");
              setNewAct(prev => ({ ...prev, location: '' }));
            },
            { enableHighAccuracy: true, timeout: 10000 }
          );
        } else {
          alert("您的瀏覽器不支援定位功能。");
        }
      };

      const openGoogleMaps = (location) => {
        if (!location) return;
        const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(location)}`;
        window.open(url, '_blank');
      };

      return (
        <div className="space-y-4">
          {activities.map((act) => {
            // 如果此活動正在修改中，顯示表單
            if (editingId === act.id) {
              return (
                <div key={act.id} className="bg-white rounded-2xl md:rounded-3xl p-4 md:p-6 shadow-lg border-2 border-orange-300">
                  <h3 className="font-bold text-orange-500 mb-4 flex items-center gap-2 text-sm md:text-base">
                    <Pencil className="w-4 h-4 md:w-5 md:h-5 bg-orange-100 rounded-full p-0.5" /> 正在修改此行程
                  </h3>
                  
                  <div className="space-y-4">
                    <div className="flex flex-col sm:flex-row gap-3">
                      <div className="w-full sm:w-1/3">
                        <label className="block text-xs font-bold text-slate-400 mb-1">時間</label>
                        <input type="time" className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-orange-400 outline-none" value={newAct.time} onChange={e => setNewAct({...newAct, time: e.target.value})} />
                      </div>
                      <div className="w-full sm:w-2/3">
                        <label className="block text-xs font-bold text-slate-400 mb-1">類別</label>
                        <select className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-orange-400 outline-none appearance-none" value={newAct.type} onChange={e => setNewAct({...newAct, type: e.target.value})}>
                          <option value="attraction">🌸 景點</option>
                          <option value="food">🍔 美食</option>
                          <option value="hotel">🏨 住宿</option>
                          <option value="transport">🚂 交通</option>
                          <option value="shopping">🛍️ 購物</option>
                          <option value="other">✨ 其他活動</option>
                        </select>
                      </div>
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1">名稱 *</label>
                      <input type="text" placeholder="例如：東京鐵塔、一蘭拉麵..." className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-orange-400 outline-none" value={newAct.title} onChange={e => setNewAct({...newAct, title: e.target.value})} />
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1">地點 / Google Maps</label>
                      <div className="flex gap-2">
                        <input type="text" placeholder="可直接輸入「地標名」，或點擊右側打卡" className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-orange-400 outline-none" value={newAct.location} onChange={e => setNewAct({...newAct, location: e.target.value})} />
                        <button onClick={getCurrentLocation} className="bg-blue-100 text-blue-600 p-2 rounded-xl hover:bg-blue-200 transition-colors flex-shrink-0" title="取得目前位置地標">
                          <Navigation className="w-5 h-5" />
                        </button>
                      </div>
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1">花費預算 (NT$)</label>
                      <input type="number" placeholder="0" className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-orange-400 outline-none" value={newAct.cost} onChange={e => setNewAct({...newAct, cost: e.target.value})} />
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1">備註 / 心情</label>
                      <textarea placeholder="寫點什麼..." className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-orange-400 outline-none min-h-[80px] resize-y" value={newAct.notes} onChange={e => setNewAct({...newAct, notes: e.target.value})}></textarea>
                    </div>

                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1">記錄美好瞬間 (最多 5 張)</label>
                      <div className="flex flex-wrap gap-3 p-3 bg-orange-50/50 rounded-xl md:rounded-2xl border-2 border-dashed border-orange-200">
                        {(newAct.photoUrls || []).map((url, idx) => (
                          <div key={idx} className="relative w-20 h-20 md:w-24 md:h-24 rounded-lg overflow-hidden border-2 border-white shadow-sm">
                            <img src={url} alt="preview" className="w-full h-full object-cover" />
                            <button onClick={() => removePhoto(idx)} className="absolute top-1 right-1 bg-red-500/80 hover:bg-red-600 text-white rounded-full p-1 transition-colors">
                              <Trash2 className="w-3 h-3 md:w-4 md:h-4" />
                            </button>
                          </div>
                        ))}
                        
                        {(newAct.photoUrls || []).length < 5 && (
                          <div 
                            className="w-20 h-20 md:w-24 md:h-24 border-2 border-dashed border-orange-300 bg-white rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-orange-50 transition-colors"
                            onClick={() => fileInputRef.current?.click()}
                          >
                            <ImagePlus className="w-6 h-6 md:w-8 md:h-8 text-orange-300 mb-1" />
                            <span className="text-[10px] text-orange-400 font-bold">加入照片</span>
                          </div>
                        )}
                        <input type="file" ref={fileInputRef} className="hidden" accept="image/*" multiple onChange={handlePhotoUpload} />
                      </div>
                    </div>

                    <div className="flex gap-2 md:gap-3 pt-2">
                      <button onClick={cancelEditOrAdd} className="flex-1 py-2 md:py-3 rounded-xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors text-sm md:text-base">取消修改</button>
                      <button onClick={submitActivity} className="flex-1 py-2 md:py-3 rounded-xl font-bold text-white bg-orange-500 hover:bg-orange-600 transition-colors shadow-lg shadow-orange-200 text-sm md:text-base">儲存變更</button>
                    </div>
                  </div>
                </div>
              )
            }

            // 正常顯示的活動卡片
            return (
              <div key={act.id} className="bg-white rounded-2xl md:rounded-3xl p-4 md:p-5 shadow-sm border border-pink-50 relative overflow-hidden group transition-all hover:shadow-md">
                <div className="flex justify-between items-start mb-3 gap-2">
                  <div className="flex flex-wrap items-center gap-2 md:gap-3 w-full pr-16">
                    <div className="bg-pink-100 text-pink-600 font-bold py-1 px-2 md:px-3 rounded-full text-xs md:text-sm flex items-center gap-1 flex-shrink-0">
                      <Clock className="w-3 h-3 md:w-4 md:h-4" /> {act.time}
                    </div>
                    <div className="text-lg md:text-2xl flex-shrink-0">
                      {getCategoryIcon(act.type)}
                    </div>
                    <h3 className="font-bold text-base md:text-lg text-slate-700 break-words">{act.title}</h3>
                  </div>
                  
                  {/* 功能操作區：修改 / 刪除 */}
                  <div className="absolute right-2 top-2 md:static flex items-center gap-1">
                    <button onClick={() => startEdit(act)} className="text-slate-300 hover:text-orange-400 transition-colors p-2" title="修改行程">
                      <Pencil className="w-4 h-4 md:w-5 md:h-5" />
                    </button>
                    <button onClick={() => onDeleteActivity(act.id)} className="text-slate-300 hover:text-red-400 transition-colors p-2" title="刪除行程">
                      <Trash2 className="w-4 h-4 md:w-5 md:h-5" />
                    </button>
                  </div>
                </div>

                <div className="pl-1 space-y-2">
                  {act.location && (
                    <div className="flex items-start md:items-center gap-1 md:gap-2 text-xs md:text-sm text-blue-500 bg-blue-50 hover:bg-blue-100 cursor-pointer w-fit max-w-full px-3 py-1.5 rounded-2xl md:rounded-full transition-colors break-words" onClick={() => openGoogleMaps(act.location)}>
                      <MapPin className="w-3 h-3 md:w-4 md:h-4 mt-0.5 md:mt-0 flex-shrink-0" /> 
                      <span className="line-clamp-2 md:line-clamp-1">{act.location}</span> 
                      <ChevronRight className="w-3 h-3 flex-shrink-0 mt-0.5 md:mt-0" />
                    </div>
                  )}
                  {act.cost && (
                    <div className="flex items-center gap-1 md:gap-2 text-xs md:text-sm text-orange-500 font-medium">
                      <DollarSign className="w-3 h-3 md:w-4 md:h-4" /> 花費: NT$ {act.cost}
                    </div>
                  )}
                  {act.notes && (
                    <div className="text-xs md:text-sm text-slate-500 bg-slate-50 p-3 rounded-xl md:rounded-2xl mt-2 break-words whitespace-pre-wrap">
                      {act.notes}
                    </div>
                  )}
                  
                  {act.photoUrl && !act.photoUrls && (
                    <div className="mt-3 relative rounded-xl md:rounded-2xl overflow-hidden border-2 border-white shadow-sm bg-slate-50">
                      <img src={act.photoUrl} alt="行程照片" className="w-full h-auto max-h-[400px] md:max-h-[500px] object-contain" />
                    </div>
                  )}
                  
                  {act.photoUrls && act.photoUrls.length > 0 && (
                    <div className={`mt-3 grid gap-2 ${act.photoUrls.length === 1 ? 'grid-cols-1' : 'grid-cols-2'}`}>
                      {act.photoUrls.map((url, idx) => (
                        <div key={idx} className="relative rounded-xl md:rounded-2xl overflow-hidden border-2 border-white shadow-sm bg-slate-50">
                          <img src={url} alt="行程照片" className="w-full h-auto max-h-[300px] object-cover" />
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            );
          })}

          {activities.length === 0 && !isAdding && (
            <div className="text-center py-10 md:py-12 px-4 bg-white/50 rounded-2xl md:rounded-3xl border-2 border-dashed border-pink-200">
              <Star className="w-10 h-10 md:w-12 md:h-12 text-pink-200 mx-auto mb-2 md:mb-3" />
              <p className="text-pink-400 font-bold text-sm md:text-base">這天還沒有排行程唷！</p>
              <p className="text-xs md:text-sm text-pink-300 mt-1">點擊下方按鈕開始規劃吧</p>
            </div>
          )}

          {isAdding && !editingId && (
            <div className="bg-white rounded-2xl md:rounded-3xl p-4 md:p-6 shadow-lg border-2 border-pink-300">
              <h3 className="font-bold text-pink-500 mb-4 flex items-center gap-2 text-sm md:text-base">
                <Plus className="w-4 h-4 md:w-5 md:h-5 bg-pink-100 rounded-full p-0.5" /> 新增行程
              </h3>
              
              <div className="space-y-4">
                <div className="flex flex-col sm:flex-row gap-3">
                  <div className="w-full sm:w-1/3">
                    <label className="block text-xs font-bold text-slate-400 mb-1">時間</label>
                    <input type="time" className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-pink-400 outline-none" value={newAct.time} onChange={e => setNewAct({...newAct, time: e.target.value})} />
                  </div>
                  <div className="w-full sm:w-2/3">
                    <label className="block text-xs font-bold text-slate-400 mb-1">類別</label>
                    <select className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-pink-400 outline-none appearance-none" value={newAct.type} onChange={e => setNewAct({...newAct, type: e.target.value})}>
                      <option value="attraction">🌸 景點</option>
                      <option value="food">🍔 美食</option>
                      <option value="hotel">🏨 住宿</option>
                      <option value="transport">🚂 交通</option>
                      <option value="shopping">🛍️ 購物</option>
                      <option value="other">✨ 其他活動</option>
                    </select>
                  </div>
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1">名稱 *</label>
                  <input type="text" placeholder="例如：東京鐵塔、一蘭拉麵..." className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-pink-400 outline-none" value={newAct.title} onChange={e => setNewAct({...newAct, title: e.target.value})} />
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1">地點 / Google Maps</label>
                  <div className="flex gap-2">
                    <input type="text" placeholder="可直接輸入「地標名」，或點擊右側打卡" className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-pink-400 outline-none" value={newAct.location} onChange={e => setNewAct({...newAct, location: e.target.value})} />
                    <button onClick={getCurrentLocation} className="bg-blue-100 text-blue-600 p-2 rounded-xl hover:bg-blue-200 transition-colors flex-shrink-0" title="取得目前位置地標">
                      <Navigation className="w-5 h-5" />
                    </button>
                  </div>
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1">花費預算 (NT$)</label>
                  <input type="number" placeholder="0" className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-pink-400 outline-none" value={newAct.cost} onChange={e => setNewAct({...newAct, cost: e.target.value})} />
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1">備註 / 心情</label>
                  <textarea placeholder="寫點什麼..." className="w-full bg-slate-50 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-pink-400 outline-none min-h-[80px] resize-y" value={newAct.notes} onChange={e => setNewAct({...newAct, notes: e.target.value})}></textarea>
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-400 mb-1">記錄美好瞬間 (最多 5 張)</label>
                  <div className="flex flex-wrap gap-3 p-3 bg-pink-50 rounded-xl md:rounded-2xl border-2 border-dashed border-pink-200">
                    {(newAct.photoUrls || []).map((url, idx) => (
                      <div key={idx} className="relative w-20 h-20 md:w-24 md:h-24 rounded-lg overflow-hidden border-2 border-white shadow-sm">
                        <img src={url} alt="preview" className="w-full h-full object-cover" />
                        <button onClick={() => removePhoto(idx)} className="absolute top-1 right-1 bg-red-500/80 hover:bg-red-600 text-white rounded-full p-1 transition-colors">
                          <Trash2 className="w-3 h-3 md:w-4 md:h-4" />
                        </button>
                      </div>
                    ))}
                    
                    {(newAct.photoUrls || []).length < 5 && (
                      <div 
                        className="w-20 h-20 md:w-24 md:h-24 border-2 border-dashed border-pink-300 bg-white rounded-lg flex flex-col items-center justify-center cursor-pointer hover:bg-pink-50 transition-colors"
                        onClick={() => fileInputRef.current?.click()}
                      >
                        <ImagePlus className="w-6 h-6 md:w-8 md:h-8 text-pink-300 mb-1" />
                        <span className="text-[10px] text-pink-400 font-bold">加入照片</span>
                      </div>
                    )}
                    <input type="file" ref={fileInputRef} className="hidden" accept="image/*" multiple onChange={handlePhotoUpload} />
                  </div>
                </div>

                <div className="flex gap-2 md:gap-3 pt-2">
                  <button onClick={cancelEditOrAdd} className="flex-1 py-2 md:py-3 rounded-xl font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 transition-colors text-sm md:text-base">取消</button>
                  <button onClick={submitActivity} className="flex-1 py-2 md:py-3 rounded-xl font-bold text-white bg-pink-500 hover:bg-pink-600 transition-colors shadow-lg shadow-pink-200 text-sm md:text-base">確定新增</button>
                </div>
              </div>
            </div>
          )}
          
          {!isAdding && !editingId && (
            <button onClick={() => setIsAdding(true)} className="w-full py-3 md:py-4 border-2 border-dashed border-pink-300 rounded-2xl md:rounded-3xl text-pink-500 font-bold flex items-center justify-center gap-2 hover:bg-pink-100/50 transition-colors text-sm md:text-base mt-2">
              <Plus className="w-4 h-4 md:w-5 md:h-5" /> 新增下一個行程
            </button>
          )}
        </div>
      );
    }

    // 將 App 渲染到頁面上
    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
