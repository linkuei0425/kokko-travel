<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koh Samui Food Pass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0fdfa; /* 淺孔雀綠背景 teal-50 */
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Custom map button color for Island vibe (Teal) */
        .btn-nav {
            background-color: #0d9488; /* teal-600 */
        }
        .btn-nav:hover {
            background-color: #0f766e; /* teal-700 */
        }
    </style>
</head>
<body class="text-slate-800">

    <!-- Header -->
    <header class="bg-teal-600 text-white sticky top-0 z-50 shadow-md transition-colors duration-300">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Koh Samui Food Map
            </h1>
            <!-- Back to Home Link -->
            <a href="https://linkuei0425.github.io/KohSamui-US/" class="flex items-center gap-1 text-sm md:text-base font-medium bg-teal-700 hover:bg-teal-800 px-3 py-1.5 rounded-lg transition-colors shadow-sm border border-teal-500">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 md:h-5 md:w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" />
                </svg>
                Back to Home
            </a>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6 max-w-5xl">
        <!-- Region Selector -->
        <section class="mb-6">
            <h2 class="text-sm font-bold text-slate-500 mb-3 uppercase tracking-wider">Select Region</h2>
            <div id="region-buttons" class="flex overflow-x-auto gap-2 pb-2 scrollbar-hide">
                <!-- Region buttons injected by JS -->
            </div>
        </section>

        <!-- Category Selector -->
        <section class="mb-8 hidden" id="category-section">
            <h2 class="text-sm font-bold text-slate-500 mb-3 uppercase tracking-wider">Select Category</h2>
            <div id="category-buttons" class="flex flex-wrap gap-2">
                <!-- Category buttons injected by JS -->
            </div>
        </section>

        <!-- Content Area -->
        <section id="content-area" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4">
            <!-- Cards injected by JS -->
            <div class="col-span-full text-center py-12 text-slate-400">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto mb-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                </svg>
                <p class="text-lg">Please select a region and category above to explore Koh Samui's culinary delights.</p>
            </div>
        </section>
    </main>

    <script>
        // Samui Food Database (English)
        const db = {
            "chaweng": {
                name: "Chaweng",
                categories: {
                    "thai_local": [
                        { name: "Khaw Glong Thai Restaurant", feature: "Highly popular authentic Thai restaurant in Chaweng. Cozy decor, friendly service, and incredibly authentic Massaman curry, Tom Yum Goong, and Pad Thai. Early booking recommended.", address: "144, 16 Chaweng Beach Rd, Bo Put<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Located along the Chaweng one-way street, recommended to take a songthaew or walk.", recommend: true },
                        { name: "Phensiri Thai Restaurant", feature: "Features Southern Thai cuisine native to Koh Samui. Famous for crab curry and shrimp glass noodle clay pot. The flavor leans towards authentic Thai sour and spicy—very satisfying.", address: "80/30 Moo 3, Chaweng Beach, Bophut<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Southern part of Chaweng Beach, accessible by foot or taxi." },
                        { name: "Chaweng Night Market", feature: "Bustling food court on Chaweng street. Packed with various Thai snacks, fresh grilled seafood, meat skewers, and Thai banana pancakes. Great place for affordable eats.", address: "14/1 Moo 2, Chaweng Beach Road<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Located in the center of Chaweng street, near Central Festival mall." }
                    ],
                    "seafood": [
                        { name: "Mit Samui Restaurant", feature: "Super popular Chinese-style seafood spot! Offers fresh live seafood weighed to order. Garlic steamed lobster and curry crab are must-tries. Excellent value for money.", address: "Chaweng Beach Road (Near the north end)<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> North side of Chaweng street, accessible by foot or songthaew.", recommend: true },
                        { name: "Crab Tavern Koh Samui", feature: "Famous for giant crabs and premium seafood platters. Indoor air-conditioning makes for a comfortable dining environment, suitable for travelers who prefer to avoid open-air stalls.", address: "166/38 Moo 2, Chaweng Beach Rd<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Located in the middle of Chaweng street." }
                    ],
                    "cafe_dessert": [
                        { name: "Treehouse Silent Beach", feature: "Quiet treehouse cafe hidden on the north side of Chaweng Beach. Offers excellent ocean views and swing seats. Order a fresh coconut or mango smoothie and enjoy a lazy afternoon.", address: "Moo 2 Bophut Chaweng Beach<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Head north from Chaweng Beach; must enter from the beach or a specific small path." },
                        { name: "Thai Banana Pancake (Roti Cart)", feature: "Ubiquitous national dessert carts along Chaweng street. Freshly fried dough filled with fresh bananas, drizzled with condensed milk and chocolate syrup. Crispy, sweet, sinful, but a must-eat.", address: "Randomly appears along Chaweng street<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> You will definitely bump into one while walking on Chaweng street at night." }
                    ],
                    "fine_dining": [
                        { name: "Tree Tops Signature Dining", feature: "One of the most romantic treetop restaurants in Koh Samui. Built above the lush canopy with only a few private booths. Offers premium French-Thai fusion cuisine. Top choice for proposals and anniversaries.", address: "92 / 1 Moo 2 (Anantara Lawana Koh Samui Resort)<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> North side of Chaweng Beach, inside Anantara Lawana Resort.", recommend: true },
                        { name: "The Page (The Library)", feature: "Located inside the highly designed The Library hotel, right next to the iconic red pool and the beach. Offers creative and exquisite Thai and Western dishes.", address: "14/1 Moo 2, Chaweng Beach<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Middle of Chaweng street, inside The Library hotel." }
                    ],
                    "nightlife": [
                        { name: "Ark Bar Beach Resort", feature: "The most iconic beach party bar in Chaweng! Featuring thrilling DJ music and beach fire shows every night. The atmosphere is always at its peak.", address: "159/89 Moo 2, Chaweng Beach<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Enter the beach area through the alleys from Chaweng street." },
                        { name: "The Green Mango Club", feature: "The oldest and largest nightclub on Koh Samui. Boasts a massive open-air dance floor and multiple music zones. It is the heart of the sleepless city for late-night revelry.", address: "Green Mango Soi, Chaweng Beach<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Turn into Green Mango Soi from Chaweng street." }
                    ]
                }
            },
            "lamai": {
                name: "Lamai",
                categories: {
                    "thai_local": [
                        { name: "Lamai Night Plaza", feature: "The central night market in Lamai. Besides clothing and souvenirs, the central area is full of cheap Thai food stalls—meat skewers, Thai noodle soup, and papaya salad are all available.", address: "Lamai Beach Road, Maret<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Central area of Lamai street, easily walkable." },
                        { name: "Hin Ta Hin Yai Coconut Ice Cream", feature: "On the path to the Grandfather and Grandmother Rocks, there are many stalls selling special coconut ice cream served in coconut shells and sprinkled with peanuts. Extremely refreshing.", address: "Hin Ta Hin Yai Entrance, Maret<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Take a songthaew to the entrance of Hin Ta Hin Yai, then walk in." }
                    ],
                    "seafood": [
                        { name: "Sabienglae Restaurant", feature: "Very famous old-established seafood restaurant in Lamai, right next to the beach. Even former Thai Prime Ministers have visited. Highly recommend their deep-fried lemon fish and various giant prawn dishes.", address: "438/82 Moo1, Maret (Near Hin Ta Hin Yai)<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Take a songthaew south from central Lamai for about 5 minutes.", recommend: true }
                    ],
                    "cafe_dessert": [
                        { name: "Annie Sweetery & Cafe", feature: "Highly-rated European-style cafe in Lamai. Handmade cakes and baked goods are excellent, and the coffee is smooth. A cozy place to escape the afternoon tropical sun.", address: "138/1 Moo 4, Maret<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Located in the alleys behind Lamai street." },
                        { name: "Baobab", feature: "French/Thai beach restaurant club located right on Lamai Beach. You can order a fresh smoothie or cocktail from a comfortable lounger and spend a lazy afternoon.", address: "Lamai Beach (Next to Ammatara Pura Pool Villa)<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Walk directly from Lamai Beach." }
                    ],
                    "fine_dining": [
                        { name: "The Cliff Bar and Grill", feature: "Award-winning Mediterranean view restaurant on Koh Samui. Built on the cliff between Chaweng and Lamai, boasting a 180-degree spectacular ocean view. Seafood and steak quality are superb.", address: "124/2 Moo 4, Maret<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Located on the cliff road from Chaweng to Lamai, taxi recommended.", recommend: true }
                    ],
                    "nightlife": [
                        { name: "Rock Bar (Reggae Bar)", feature: "The most distinctive reggae bar on Koh Samui. Built among giant rocks and trees next to Hin Ta Hin Yai, full of raw and wild Jamaican vibes. Very chill.", address: "Hin Ta Hin Yai, Maret<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Next to the seaside inside the Hin Ta Hin Yai scenic area." }
                    ]
                }
            },
            "bophut": {
                name: "Bophut / Fisherman's Village",
                categories: {
                    "thai_local": [
                        { name: "Fisherman's Village Walking Street", feature: "Massive night market open exclusively on Mon, Wed, and Fri nights! The entire retro old street turns into a food paradise with Thai snacks, grilled crocodile meat, and freshly made cocktails.", address: "Bophut Beach Road<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Take a songthaew to the entrance of Fisherman's Village and walk in.", recommend: true },
                        { name: "Smile House Restaurant", feature: "Garden-style Thai restaurant inside Fisherman's Village. Serves authentic Southern Thai cuisine. Green curry and basil pork are great with rice, surrounded by tropical plants.", address: "Fisherman's Village, Bophut<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Inside Fisherman's Village walking street." }
                    ],
                    "seafood": [
                        { name: "Happy Elephant", feature: "Famous old-established seafood restaurant in Fisherman's Village. Offers semi-open ocean view seating. Lobsters and crabs are fresh and abundant. Live music often plays at night.", address: "Fisherman's Village, Bophut<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Ocean side of Fisherman's Village main street." },
                        { name: "Krua Bophut Thai Restaurant", feature: "Beachfront restaurant in traditional Thai wooden architecture. Besides seafood, their Tom Yum Goong is extremely authentic. Dining on the beach seats is very romantic.", address: "Fisherman's Village, Bophut<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Ocean side of Fisherman's Village main street." }
                    ],
                    "cafe_dessert": [
                        { name: "Karma Resort Cafe", feature: "Bohemian-style beachfront resort cafe. The design is stunning and perfect for Instagram photos. Offers exquisite French pastries and specialty drinks.", address: "182/3 Moo 1, Bophut<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Located by Bophut Beach, scooter or taxi recommended." }
                    ],
                    "fine_dining": [
                        { name: "Supattra Thai Dining", feature: "Award-winning premium Thai private kitchen. No fixed menu; the chef designs dishes based on the freshest seafood bought that day. Impeccable service (advance booking required).", address: "32/6 Moo 4, Santhitham Rd, Bophut<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Located on an inland street in Bophut, taxi recommended.", recommend: true },
                        { name: "Zazen Restaurant", feature: "Rated as one of the best restaurants in Thailand for consecutive years. Blends French refinement with Thai spices. Red lighting and sea breeze create an incredibly romantic atmosphere.", address: "177, Moo 1, Bophut (Zazen Boutique Resort)<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> West side of Bophut Beach." }
                    ],
                    "nightlife": [
                        { name: "Coco Tam's", feature: "Currently the hottest beach bar on Koh Samui! Features Instagram-worthy beanbags and over-water hammocks. The spectacular 'beach fire show' every night is a must-watch.", address: "62 Moo 1, Bophut (Next to Fisherman's Village entrance)<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Entrance of Fisherman's Village walking street, very conspicuous.", recommend: true }
                    ]
                }
            },
            "west_coast": {
                name: "West Coast / Nathon",
                categories: {
                    "thai_local": [
                        { name: "Nathon Night Market", feature: "Night market mainly serving locals and passengers waiting for boats. Prices are much lower than Chaweng and Bophut. Thai fried chicken, papaya salad, and various Thai bento boxes are authentic and delicious.", address: "Nathon Pier Surrounding Square<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Located at the square next to Nathon Pier, opens in the evening." }
                    ],
                    "seafood": [
                        { name: "Krua Savoey Seafood", feature: "Old-school seafood restaurant in Nathon town, frequented by many locals. Serves fresh catches straight from fishing boats at fair prices. You can dine while enjoying the pier view.", address: "Along the coastal road of Nathon Town<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Walkable along the coast from Nathon Pier." }
                    ],
                    "cafe_dessert": [
                        { name: "The Mud", feature: "Cafe attached to a mud-house-themed resort on the west coast. The architecture is unique, boasting an unbeatable sunset ocean view. Perfect for an iced tea at dusk.", address: "Moo 5, Ban Bang Makham, Nathon<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> On the road north of Nathon, self-driving/scooter recommended." }
                    ],
                    "fine_dining": [
                        { name: "Jahn (Conrad Koh Samui)", feature: "One of the most premium view restaurants on Koh Samui. Located on the cliff at Conrad Hotel. Offers ultra-luxurious steaks and Thai molecular gastronomy with breathtaking west coast sunset views.", address: "49/8-9 Moo 4, Hillcrest Road, Taling Ngam<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Located on the cliff in the far south Taling Ngam area, taxi recommended.", recommend: true },
                        { name: "Virgin Coast Restaurant", feature: "Romantic beachfront restaurant hidden on the west coast. Built with bamboo and thatch, serving exquisite Thai and seafood dishes. A quiet secret spot away from the hustle and bustle.", address: "Taling Ngam Beach<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Next to Taling Ngam Beach, scooter or self-drive required." }
                    ],
                    "nightlife": [
                        { name: "Nikki Beach Club", feature: "Globally renowned luxury beach club. The most fashionable party spot on the west coast, featuring pure white loungers, a pool, and DJ music. Weekend brunch parties are highly popular.", address: "96/3 Moo 2, Lipa Noi<br><span class='text-teal-600 font-bold mt-1.5 inline-block'>🛵 Transport:</span> Located at Lipa Noi Beach, chartered car recommended." }
                    ]
                }
            }
        };

        // Custom Categories adapted for Koh Samui (English)
        const categoriesMap = {
            "thai_local": { name: "🍛 Local Thai & Street Food", color: "bg-orange-100 text-orange-800 hover:bg-orange-600 hover:text-white border-orange-400" },
            "seafood": { name: "🦞 Seafood & BBQ", color: "bg-blue-100 text-blue-800 hover:bg-blue-600 hover:text-white border-blue-400" },
            "cafe_dessert": { name: "🥥 Ocean View Cafes & Desserts", color: "bg-emerald-100 text-emerald-800 hover:bg-emerald-600 hover:text-white border-emerald-400" },
            "fine_dining": { name: "🍷 Romantic Fine Dining", color: "bg-purple-100 text-purple-800 hover:bg-purple-600 hover:text-white border-purple-400" },
            "nightlife": { name: "🍹 Beach Bars & Nightlife", color: "bg-pink-100 text-pink-800 hover:bg-pink-600 hover:text-white border-pink-400" }
        };

        let currentRegion = "";
        let currentCategory = "";

        // Elements
        const regionContainer = document.getElementById('region-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const categorySection = document.getElementById('category-section');
        const contentArea = document.getElementById('content-area');

        // Render Regions
        function initRegions() {
            Object.keys(db).forEach(key => {
                const btn = document.createElement('button');
                btn.className = "whitespace-nowrap px-5 py-2.5 rounded-full border border-slate-300 bg-white text-slate-700 font-bold hover:bg-teal-600 hover:text-white hover:border-teal-600 transition-colors shadow-sm";
                btn.innerText = db[key].name;
                btn.onclick = () => selectRegion(key, btn);
                regionContainer.appendChild(btn);
            });
        }

        // Render Categories
        function initCategories() {
            Object.keys(categoriesMap).forEach(key => {
                const config = categoriesMap[key];
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-4 py-2 rounded-full border transition-all font-bold ${config.color}`;
                btn.innerText = config.name;
                btn.onclick = () => selectCategory(key, btn);
                categoryContainer.appendChild(btn);
            });
        }

        function selectRegion(regionKey, clickedBtn) {
            currentRegion = regionKey;
            
            // Highlight active region
            Array.from(regionContainer.children).forEach(btn => {
                btn.classList.remove('bg-teal-600', 'text-white', 'border-teal-600');
                btn.classList.add('bg-white', 'text-slate-700');
            });
            clickedBtn.classList.remove('bg-white', 'text-slate-700', 'hover:bg-teal-600');
            clickedBtn.classList.add('bg-teal-600', 'text-white', 'border-teal-600');

            // Show category section
            categorySection.classList.remove('hidden');
            categorySection.classList.add('fade-in');
            
            // Filter categories based on region data
            Array.from(categoryContainer.children).forEach(btn => {
                const catKey = Object.keys(categoriesMap).find(k => categoriesMap[k].name === btn.innerText);
                if (db[regionKey].categories[catKey]) {
                    btn.style.display = "block";
                } else {
                    btn.style.display = "none";
                }
            });

            // Auto select first available category if none selected or current is hidden
            if(!currentCategory || !db[regionKey].categories[currentCategory]) {
                const availableCat = Object.keys(categoriesMap).find(k => db[regionKey].categories[k]);
                if (availableCat) {
                    const targetBtn = Array.from(categoryContainer.children).find(btn => btn.innerText === categoriesMap[availableCat].name);
                    selectCategory(availableCat, targetBtn);
                } else {
                    contentArea.innerHTML = `<p class="col-span-full text-center py-8 text-slate-500">No food data available for this region currently.</p>`;
                }
            } else {
                const targetBtn = Array.from(categoryContainer.children).find(btn => btn.innerText === categoriesMap[currentCategory].name);
                selectCategory(currentCategory, targetBtn);
            }
        }

        function selectCategory(catKey, clickedBtn) {
            currentCategory = catKey;

            // Highlight active category
            Array.from(categoryContainer.children).forEach(btn => {
                btn.classList.remove('ring-2', 'ring-offset-2', 'ring-teal-500', 'shadow-md', 'scale-105');
                btn.style.opacity = "0.5";
            });
            if (clickedBtn) {
                clickedBtn.classList.add('ring-2', 'ring-offset-2', 'ring-teal-500', 'shadow-md', 'scale-105');
                clickedBtn.style.opacity = "1";
            }

            renderContent();
        }

        function renderContent() {
            contentArea.innerHTML = '';
            const items = db[currentRegion].categories[currentCategory];

            if(!items || items.length === 0) {
                contentArea.innerHTML = `<p class="col-span-full text-center py-12 text-slate-500 text-lg font-bold">No recommendations for this category currently. Go explore other foods!</p>`;
                return;
            }

            items.forEach((item, index) => {
                // Generate Google Maps URL
                const pureAddress = item.address.split('<br>')[0];
                const encodedQuery = encodeURIComponent(`${item.name} Koh Samui Thailand ${pureAddress}`);
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;

                const badgeHtml = item.recommend ? `<span class="bg-red-500 text-white text-xs px-2 py-0.5 rounded ml-2 align-middle shadow-sm">🔥 Highly Recommended</span>` : '';

                const bookingBtnHtml = item.bookingLink ? `
                    <a href="${item.bookingLink}" target="_blank" class="w-full flex items-center justify-center gap-2 bg-[#ff5b00] hover:bg-[#e05000] text-white py-3 rounded-xl font-bold transition-colors shadow-sm hover:shadow-md text-base">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
                        </svg>
                        Book Online for Exclusive Offers
                    </a>
                ` : '';

                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-teal-100 overflow-hidden flex flex-col fade-in hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1";
                card.style.animationDelay = `${index * 0.08}s`;

                card.innerHTML = `
                    <div class="p-6 flex-grow">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-xl font-bold text-slate-800 leading-tight flex items-center flex-wrap gap-y-2">${item.name} ${badgeHtml}</h3>
                        </div>
                        <p class="text-slate-600 text-sm mb-5 leading-relaxed tracking-wide"><span class="font-bold text-teal-700 bg-teal-100 px-2 py-0.5 rounded mr-1 shadow-sm">Highlight</span>${item.feature}</p>
                        
                        <div class="bg-teal-50/50 p-4 rounded-xl flex items-start gap-3 border border-teal-100">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-teal-600 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
