        const districtContainer = document.getElementById('district-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const contentArea = document.getElementById('content-area');
        let currentDistrictKey = null;
        let currentCategoryName = null;

        function initDistrictButtons() {
            Object.keys(hotelData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-5 py-2.5 rounded-full font-bold text-sm transition-all duration-200 border area-btn-inactive shadow-sm flex-shrink-0`;
                btn.innerHTML = `<i class="fa-solid fa-map-pin mr-1.5 opacity-70"></i>${hotelData[key].name}`;
                btn.onclick = () => selectDistrict(key, btn);
                districtContainer.appendChild(btn);
            });
        }

        function scrollDistricts(direction) {
            const scrollAmount = 200;
            if (direction === 'left') {
                districtContainer.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
            } else {
                districtContainer.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            }
        }

        function selectDistrict(key, activeBtn) {
            currentDistrictKey = key;
            const allBtns = districtContainer.querySelectorAll('button');
            allBtns.forEach(btn => { btn.classList.remove('area-btn-active'); btn.classList.add('area-btn-inactive'); });
            activeBtn.classList.remove('area-btn-inactive');
            activeBtn.classList.add('area-btn-active');
            categoryContainer.classList.remove('hidden');
            renderCategoryButtons();
        }

        function renderCategoryButtons() {
            categoryContainer.innerHTML = '';
            const currentCategories = Object.keys(hotelData[currentDistrictKey].categories);
            currentCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-5 py-2 rounded-lg font-bold text-sm transition-all duration-200 border cat-btn-inactive shadow-sm`;
                btn.innerText = cat;
                btn.onclick = () => selectCategory(cat, btn);
                categoryContainer.appendChild(btn);
            });
            const firstCatBtn = categoryContainer.querySelector('button');
            if(firstCatBtn) selectCategory(currentCategories[0], firstCatBtn);
        }

        function selectCategory(categoryName, activeBtn) {
            currentCategoryName = categoryName;
            const allBtns = categoryContainer.querySelectorAll('button');
            allBtns.forEach(btn => { btn.classList.remove('cat-btn-active'); btn.classList.add('cat-btn-inactive'); });
            activeBtn.classList.remove('cat-btn-inactive');
            activeBtn.classList.add('cat-btn-active');
            renderHotels();
        }

        function renderHotels() {
            const districtData = hotelData[currentDistrictKey];
            const hotels = districtData.categories[currentCategoryName] || [];
            let htmlContent = `<div class="flex flex-col sm:flex-row sm:items-center mb-6 border-b pb-4 border-cyan-100 animate-fade-in"><h2 class="text-2xl font-bold text-cyan-900 mr-3"><i class="fa-solid fa-location-dot mr-2 text-cyan-500"></i>${districtData.name}</h2><span class="inline-block mt-2 sm:mt-0 px-3 py-1 bg-cyan-100 text-cyan-700 text-sm font-bold rounded-full border border-cyan-200"><i class="fa-solid fa-tag mr-1"></i>${currentCategoryName}</span></div>`;
            if (hotels.length === 0) {
                htmlContent += `<p class="text-slate-500 py-10 text-center animate-fade-in">No data available for this category.</p>`;
            } else {
                htmlContent += `<div class="space-y-5">`;
                hotels.forEach((hotel, index) => {
                    const linkTagHTML = hotel.url ? `<a href="${hotel.url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center px-5 py-2.5 mt-3 sm:mt-0 rounded-xl text-sm font-bold bg-[#ff5b00] text-white hover:bg-[#e05000] transition-colors shadow-sm cursor-pointer sm:ml-auto w-full sm:w-32"><i class="fa-solid fa-magnifying-glass mr-1.5"></i>Details</a>` : '';
                    htmlContent += `<div class="bg-[#f8ffff] border border-cyan-50 p-5 md:p-6 rounded-2xl hover:shadow-md transition-all duration-300 animate-fade-in" style="animation-delay: ${index * 0.05}s;"><div class="flex flex-col sm:flex-row sm:items-start justify-between mb-4 gap-2"><h4 class="text-xl font-bold text-cyan-900 flex items-start leading-tight pt-1"><span class="text-white bg-cyan-400 rounded-full w-6 h-6 inline-flex items-center justify-center text-sm mr-2 flex-shrink-0">${index + 1}</span>${hotel.name}</h4>${linkTagHTML}</div><div class="pl-0 sm:pl-8 space-y-3"><div class="flex items-start"><span class="font-bold text-cyan-800 bg-cyan-100 px-2 py-0.5 rounded mr-2 flex-shrink-0 text-xs mt-0.5"><i class="fa-solid fa-star mr-1"></i>Highlights</span><span class="text-sm text-slate-700 leading-relaxed font-medium">${hotel.feature}</span></div><div class="flex items-start"><span class="font-bold text-cyan-800 bg-cyan-100 px-2 py-0.5 rounded mr-2 flex-shrink-0 text-xs mt-0.5"><i class="fa-solid fa-map-pin mr-1"></i>Location</span><span class="text-sm text-slate-700 leading-relaxed font-medium">${hotel.address}</span></div></div></div>`;
                });
                htmlContent += `</div>`;
            }
            contentArea.innerHTML = htmlContent;
        }

        document.addEventListener('DOMContentLoaded', () => {
            initDistrictButtons();
            const firstDistrictBtn = districtContainer.querySelector('button');
            if(firstDistrictBtn) selectDistrict('chaweng', firstDistrictBtn);
        });
    </script>
</body>
</html>
