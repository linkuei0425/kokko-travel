<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koh Samui Island Hopping Guide</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Hide scrollbar but keep functionality */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Icons ---
        const MapPin = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const Ticket = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>;
        const Sun = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const Sparkles = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
        const TrainFront = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3.1V7a4 4 0 0 0 8 0V3.1"/><path d="M9 15h6"/><path d="M14 19.5l3-3-3-3"/><path d="M10 19.5l-3-3 3-3"/><path d="M4 22v-3.5"/><path d="M20 22v-3.5"/><rect width="16" height="16" x="4" y="3" rx="2"/></svg>;
        const ExternalLink = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>;
        const Info = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const Home = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;

        const REGIONS = ['Koh Samui', 'Koh Tao', 'Koh Mudsum & Tan', 'Koh Nang Yuan', 'Koh Phangan'];
        const CATEGORIES = [
            { id: 'Day Tours', icon: Sun },
            { id: 'Experiences', icon: Sparkles },
            { id: 'Transport & Wi-Fi', icon: TrainFront },
            { id: 'Attractions', icon: Ticket }
        ];

        // --- Koh Samui & Surrounding Islands Database (Translated & English Klook URLs) ---
        const itineraryData = {
            'Koh Samui': {
                'Day Tours': [
                    { title: 'Ang Thong National Marine Park Day Tour', description: 'A must-visit! Choose between a speedboat or a large teak boat to cruise through 42 islands. Includes snorkeling, kayaking, and a stunning viewpoint.', link: 'https://www.klook.com/en-US/search/result/?query=Ang%20Thong%20National%20Marine%20Park&aid=116515' },
                    { title: 'Koh Samui Half Day City Highlights Tour', description: 'Easily explore island landmarks by private car! Covers the Big Buddha, Guan Yu Shrine, Grandfather & Grandmother Rocks, and Na Muang Waterfall.', link: 'https://www.klook.com/en-US/search/result/?query=Koh%20Samui%20Half%20Day&aid=116515' },
                    { title: 'Koh Samui Secret Garden & 4x4 Jungle Safari', description: 'Take a thrilling 4x4 off-road ride deep into the mountains, enjoy panoramic island views, and visit the hidden Magic Garden.', link: 'https://www.klook.com/en-US/search/result/?query=Koh%20Samui%204x4&aid=116515' },
                    { title: 'Koh Samui Absolute Sanctuary Wellness Day', description: 'The ultimate relaxation experience! Enjoy professional SPA treatments, yoga classes, and healthy meals in a top-tier wellness resort.', link: 'https://www.klook.com/en-US/search/result/?query=Absolute%20Sanctuary&aid=116515' }
                ],
                'Experiences': [
                    { title: 'Koh Samui Jungle Zipline Experience', description: 'Channel your inner Tarzan! Glide through multiple thrilling ziplines and overlook the dense tropical rainforest from a unique aerial perspective.', link: 'https://www.klook.com/en-US/search/result/?query=Koh%20Samui%20Zipline&aid=116515' },
                    { title: 'Koh Samui ATV Jungle Safari', description: 'Drive an ATV through muddy trails and bumpy mountain roads, enjoying an adrenaline-pumping ride in the tropical jungle.', link: 'https://www.klook.com/en-US/search/result/?query=Koh%20Samui%20ATV&aid=116515' },
                    { title: 'Elephant Kingdom Sanctuary Experience', description: 'No riding! An ethical elephant sanctuary where you can prepare food, feed the gentle giants, and watch them enjoy their mud bath.', link: 'https://www.klook.com/en-US/search/result/?query=Koh%20Samui%20Elephant&aid=116515' },
                    { title: 'Koh Samui Sunrise / Sunset SUP Experience', description: 'Paddle out on calm waters to catch the first rays of light or a romantic sunset. Perfect for travelers seeking a peaceful island vibe.', link: 'https://www.klook.com/en-US/search/result/?query=Koh%20Samui%20SUP&aid=116515' },
                    { title: 'Private Catamaran Sunset Cruise', description: 'The most luxurious way to set sail! Enjoy a spacious catamaran privately with friends and family, sipping champagne in the middle of the ocean.', link: 'https://www.klook.com/en-US/search/result/?query=Koh%20Samui%20Catamaran&aid=116515' }
                ],
                'Attractions': [
                    { title: 'Koh Samui International Muay Thai Stadium', description: 'Feel the local passion! Watch an authentic, hard-hitting Muay Thai match live and experience the electrifying atmosphere of the cheering crowd.', link: 'https://www.klook.com/en-US/search/result/?query=Koh%20Samui%20Muay%20Thai&aid=116515' }
                ],
                'Transport & Wi-Fi': [
                    { title: 'Koh Samui Airport (USM) to Hotel Transfers', description: 'Skip the hassle of bargaining with local taxis upon arrival! Your driver will greet you with a sign and take you directly to your resort comfortably.', link: 'https://www.klook.com/en-US/search/result/?query=Koh%20Samui%20Airport%20Transfer&aid=116515' },
                    { title: 'Koh Samui Private Car Charter', description: 'Create your own itinerary! Whether it\'s an Instagram-worthy cafe or a hidden beach, your private driver will get you there safely and effortlessly.', link: 'https://www.klook.com/en-US/search/result/?query=Koh%20Samui%20Private%20Car&aid=116515' },
                    { title: 'Thailand eSIM / SIM Card Unlimited Data', description: 'Activate instantly with a QR code. Enjoy stable, high-speed internet for seamless navigation and social media updates on the island.', link: 'https://www.klook.com/en-US/search/result/?query=Thailand%20eSIM&aid=116515' }
                ]
            },
            'Koh Tao': {
                'Day Tours': [
                    { title: 'Koh Tao & Koh Nang Yuan Speedboat Day Tour', description: 'A diving paradise in the Gulf of Thailand! Depart from Koh Samui by speedboat and swim with colorful tropical fish and coral reefs in crystal-clear waters.', link: 'https://www.klook.com/en-US/search/result/?query=Koh%20Tao%20Koh%20Nang%20Yuan&aid=116515' }
                ],
                'Experiences': [
                    { title: 'Koh Tao PADI Discover Scuba Diving / Certification', description: 'The world\'s most popular place to get certified! With excellent water conditions and affordable prices, it\'s perfect for beginners and pros alike.', link: 'https://www.klook.com/en-US/search/result/?query=Koh%20Tao%20Diving&aid=116515' }
                ],
                'Transport & Wi-Fi': [
                    { title: 'Koh Samui ⇌ Koh Tao Ferry Ticket (Lomprayah)', description: 'The most stable high-speed catamaran between the islands. Book early to secure your seat and start your diving adventure with ease.', link: 'https://www.klook.com/en-US/search/result/?query=Koh%20Samui%20Koh%20Tao%20Ferry&aid=116515' }
                ]
            },
            'Koh Mudsum & Tan': {
                'Day Tours': [
                    { title: 'Koh Mudsum (Pig Island) & Koh Tan Day Tour', description: 'The hottest new trend in Koh Samui! Interact and take photos with friendly wild pigs on the beach, followed by a quiet snorkeling session around Koh Tan.', link: 'https://www.klook.com/en-US/search/result/?query=Pig%20Island%20Koh%20Tan&aid=116515' },
                    { title: 'Pig Island Private Longtail Boat Half Day Tour', description: 'Sail out on a traditional Thai wooden longtail boat. Escape the crowds and enjoy uninterrupted blue sea views and the famous beach pigs all to yourself.', link: 'https://www.klook.com/en-US/search/result/?query=Pig%20Island%20Private%20Boat&aid=116515' }
                ]
            },
            'Koh Nang Yuan': {
                'Day Tours': [
                    { title: 'Koh Nang Yuan & Koh Tao Full Day Snorkeling', description: 'Explore the iconic "Y-shaped" sandbar of Koh Nang Yuan! During low tide, the sandbar emerges connecting three small islands—a photographer\'s dream.', link: 'https://www.klook.com/en-US/search/result/?query=Koh%20Nang%20Yuan&aid=116515' }
                ]
            },
            'Koh Phangan': {
                'Transport & Wi-Fi': [
                    { title: 'Koh Samui ⇌ Koh Phangan High-Speed Ferry', description: 'Essential transport to one of the world\'s top three rave parties—the Full Moon Party! Tickets sell out fast during the event, so book well in advance.', link: 'https://www.klook.com/en-US/search/result/?query=Koh%20Phangan%20Ferry&aid=116515' }
                ],
                'Day Tours': [
                    { title: 'Koh Phangan Discovery & Beach Day Tour', description: 'Beyond the Full Moon Party, Koh Phangan is serene and beautiful by day! Rent a scooter and explore untouched pristine beaches and hidden waterfalls.', link: 'https://www.klook.com/en-US/search/result/?query=Koh%20Phangan%20Day%20Tour&aid=116515' }
                ]
            }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('Koh Samui');
            const [selectedCategory, setSelectedCategory] = useState('Day Tours');

            const currentData = itineraryData[selectedRegion]?.[selectedCategory] || [];

            return (
                <div className="min-h-screen bg-[#f0fdf4] font-sans text-slate-800 pb-12">
                    {/* Header Nav */}
                    <header className="bg-white shadow-sm sticky top-0 z-10 border-b border-emerald-100">
                        <div className="max-w-7xl mx-auto px-4 py-4 md:py-6">
                            <div className="flex items-center justify-between gap-2 mb-4">
                                <div className="flex items-center gap-2">
                                    <MapPin className="text-emerald-600 w-6 h-6 md:w-8 md:h-8" />
                                    <h1 className="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-600 to-teal-500">
                                        Koh Samui & Surrounding Islands Guide
                                    </h1>
                                </div>
                                <a
                                    href="https://linkuei0425.github.io/KohSamui-US/"
                                    className="hidden md:flex items-center gap-1.5 px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm"
                                >
                                    <Home className="w-4 h-4" />
                                    Back to Home
                                </a>
                            </div>
                            
                            {/* Region Tabs */}
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                <a
                                    href="https://linkuei0425.github.io/KohSamui-US/"
                                    className="md:hidden flex items-center justify-center gap-1.5 whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm"
                                >
                                    <Home className="w-4 h-4" />
                                    Home
                                </a>
                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => setSelectedRegion(region)}
                                        className={`whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 ${
                                            selectedRegion === region
                                            ? 'bg-teal-600 text-white shadow-md'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-teal-50 hover:text-teal-700'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {/* Category Tags */}
                        <div className="flex flex-wrap gap-2 md:gap-3 mb-8">
                            {CATEGORIES.map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 px-4 py-2.5 rounded-lg border text-sm font-bold transition-all ${
                                        selectedCategory === id
                                        ? 'border-emerald-500 bg-emerald-50 text-emerald-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4" />
                                    {id}
                                </button>
                            ))}
                        </div>

                        {/* Content Title */}
                        <div className="mb-6 flex items-center gap-2">
                            <h2 className="text-2xl font-bold text-slate-800">
                                {selectedRegion} - {selectedCategory} <span className="text-emerald-600">Top Picks</span>
                            </h2>
                        </div>

                        {/* Card List */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4 md:gap-6">
                                {currentData.map((item, index) => (
                                    <div 
                                        key={index} 
                                        className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col justify-between hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 animate-fade-in"
                                        style={{ animationDelay: `${index * 0.05}s` }}
                                    >
                                        <div>
                                            <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-3 leading-tight flex items-start gap-2">
                                                <span className="text-emerald-500 mt-1"><Sparkles className="w-5 h-5"/></span>
                                                {item.title}
                                            </h3>
                                            <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed font-medium">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-4 border-t border-slate-100 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-[#ff5b00] hover:bg-[#e05000] text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-sm hover:shadow-md w-full sm:w-auto"
                                            >
                                                <Info className="w-4 h-4" />
                                                <span>More Details</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-80" />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl border border-dashed border-slate-300 p-12 text-center flex flex-col items-center justify-center">
                                <h3 className="text-lg font-medium text-slate-700 mb-2">
                                    No items found for this category in this region.
                                </h3>
                                <p className="text-slate-500">Please try selecting another category or tab.</p>
                            </div>
                        )}

                        {/* Global Explore Button */}
                        <div className="mt-12 flex justify-center">
                            <a 
                                href={`https://www.klook.com/en-US/search/result/?query=${encodeURIComponent(selectedRegion)}&aid=116515`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1"
                            >
                                <span className="tracking-wide">Explore more activities in {selectedRegion}</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
