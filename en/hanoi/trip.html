<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hanoi Itinerary Guide | Hanoi Trip Guide</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Hide horizontal scrollbar but keep functionality */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Navigation Icons ---
        const MapPin = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const Ticket = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>;
        const Sun = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const Sparkles = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
        const TrainFront = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3.1V7a4 4 0 0 0 8 0V3.1"/><path d="M9 15h6"/><path d="M14 19.5l3-3-3-3"/><path d="M10 19.5l-3-3 3-3"/><path d="M4 22v-3.5"/><path d="M20 22v-3.5"/><rect width="16" height="16" x="4" y="3" rx="2"/></svg>;
        const ExternalLink = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>;
        const Info = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const Home = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;

        const REGIONS = ['Hanoi City', 'Halong Bay', 'Ninh Binh', 'Sapa'];
        const CATEGORIES = [
            { id: 'Attractions', icon: Ticket },
            { id: 'Day Tours', icon: Sun },
            { id: 'Experience', icon: Sparkles },
            { id: 'Transport & SIM', icon: TrainFront }
        ];

        // --- Hanoi Trip Data ---
        const itineraryData = {
            'Hanoi City': {
                'Attractions': [
                    { title: 'Lotte Observation Deck Ticket', description: 'Ascend to the 65th floor of the Lotte Center for a stunning 360-degree view of Hanoi\'s skyline and West Lake.', link: 'https://www.klook.com/en-US/activity/22529-lotte-observation-deck-ticket-hanoi/?spm=SearchResult.SearchResult_LIST&clickId=f8658be8f4&aid=117191' },
                    { title: 'Thang Long Water Puppet Show Ticket', description: 'Experience a traditional Vietnamese art form! Enjoy a live puppet show on water accompanied by a traditional orchestra.', link: 'https://www.klook.com/en-US/activity/35653-thang-long-water-puppet-show-ticket-hanoi/?spm=Activity.SearchSuggest_LIST&clickId=d679a5e359&aid=117191' },
                    { title: 'Hanoi Hop-On Hop-Off Sightseeing Bus', description: 'Easily visit iconic landmarks like the Opera House, Imperial Citadel, Ho Chi Minh Mausoleum, and Temple of Literature with a double-decker bus.', link: 'https://www.klook.com/en-US/activity/87164-hanoi-hop-on-off-sightseeing-tour/?spm=SearchResult.SearchResult_LIST&clickId=c9d0a0cd39&aid=117191' }
                ],
                'Day Tours': [
                    { title: 'Hanoi Street Food Motorbike Tour', description: 'Explore the hidden alleys of the Old Quarter with a local guide. Taste authentic Bun Cha, Egg Coffee, and Banh Mi.', link: 'https://www.klook.com/en-US/activity/8469-sightseeing-motorbike-tour-hanoi-halong-bay/?spm=SearchResult.SearchResult_LIST&clickId=fce1bdd40d&aid=117191' },
                    { title: 'Hanoi Old Quarter Traditional Cyclo Experience', description: 'Ride through the historic streets of the Old Quarter in a traditional Vietnamese cyclo for a slow-paced, atmospheric tour.', link: 'https://www.klook.com/en-US/activity/8459-street-food-walking-tour-cyclo-hanoi-halong-bay/?spm=SearchResult.SearchResult_LIST&clickId=0b6816f7b9&aid=117191' },
                    { title: 'Hanoi Highlights Full Day City Tour', description: 'Visit the Ho Chi Minh Mausoleum, Temple of Literature, and the Museum of Ethnology with a professional guide in one day.', link: 'https://www.klook.com/en-US/activity/27858-hanoi-city-tour-vietnam-ethnology-museum/?spm=SearchResult.SearchResult_LIST&clickId=ec1bb8c64c&aid=117191' }
                ],
                'Experience': [
                    { title: 'Traditional Vietnamese Hair Wash & Premium SPA', description: 'A must-try in Vietnam! Relax with a full service including scalp massage, herbal hair wash, and facial care.', link: 'https://www.klook.com/en-US/search/result/?query=Hanoi%20SPA&aid=117191' },
                    { title: 'Hanoi Local Cooking Class & Market Visit', description: 'Follow a local chef to the traditional market to pick fresh ingredients and learn how to make classic Northern Vietnamese dishes.', link: 'https://www.klook.com/en-US/search/result/?query=Hanoi%20Cooking%20Class&aid=117191' }
                ],
                'Transport & SIM': [
                    { title: 'Noi Bai Airport (HAN) Private Transfer', description: 'Safe and comfortable private transfer from the airport directly to your hotel in the Old Quarter without any hassle.', link: 'https://www.klook.com/en-US/airport-transfers/?flightDirection=1&code=HAN&aid=117191' },
                    { title: 'Noi Bai Airport (HAN) VIP Fast Track', description: 'Skip the long immigration queues! A personal assistant will guide you through the VIP lane to save your precious travel time.', link: 'https://www.klook.com/en-US/search/result/?query=Noi%20Bai%20VIP&aid=117191' },
                    { title: '5G eSIM Vietnam | Unlimited Data', description: 'Stay connected instantly by scanning a QR code. Stable high-speed data for navigating and posting updates.', link: 'https://www.klook.com/en-US/activity/123902-vietnam-esim-high-speed-internet-qr-code-voucher/?aid=117191' },
                    { title: 'Vietnam 4G SIM Card (Airport Pickup)', description: 'Pick up your SIM card at the airport with professional setup assistance. Reliable connection across Vietnam.', link: 'https://www.klook.com/en-US/activity/84066-3g-4g-sim-card-vietnam-noi-bai-airport/?spm=Mobility_Aggregate.SearchSuggest_LIST&clickId=209c995c02&aid=117191' },
                    { title: 'Hanoi Private Car Charter (Day/Half-day)', description: 'Customize your own itinerary. Visit the city or nearby ceramic/silk villages comfortably with a dedicated driver.', link: 'https://www.klook.com/en-US/search/result/?query=Hanoi%20Car%20Charter&aid=117191' }
                ]
            },
            'Halong Bay': {
                'Day Tours': [
                    { title: 'Halong Bay Luxury Day Cruise (from Hanoi)', description: 'Ideal for those with limited time. Sail among limestone islands, visit Surprise Cave, and enjoy kayaking.', link: 'https://www.klook.com/en-US/search/result/?query=Halong%20Bay&aid=117191' },
                    { title: 'Halong Bay Luxury Cruise 2D1N Experience', description: 'Sleep in the heart of a World Heritage site! Enjoy sunset views, night squid fishing, and luxury dining on board.', link: 'https://www.klook.com/en-US/search/result/?query=Halong%20Bay%202D1N&needQueryIdentification=true&spm=SearchResult.SearchSuggest_LIST&clickId=9fef9306ed&aid=117191' },
                    { title: 'Halong Bay Extended Cruise 3D2N Experience', description: 'A deep exploration of Lan Ha Bay or Cat Ba Island. Enjoy quieter waters and more immersive activities.', link: 'https://www.klook.com/en-US/search/result/?query=Halong%20Bay%203D2N&aid=117191' }
                ],
                'Experience': [
                    { title: 'Sun World Halong Complex Ticket', description: 'Ride the record-breaking Queen Cable Car and enjoy the water park or theme park attractions by the bay.', link: 'https://www.klook.com/en-US/search/result/?query=Sun%20World%20Halong&aid=117191' }
                ],
                'Transport & SIM': [
                    { title: 'Hanoi to Halong Bay Private/Shared Transfer', description: 'Comfortable transfer service from Hanoi Old Quarter to the Halong ferry terminal.', link: 'https://www.klook.com/en-US/search/result/?query=Hanoi%20Halong%20Transfer&aid=117191' }
                ]
            },
            'Ninh Binh': {
                'Day Tours': [
                    { title: 'Hoa Lu & Trang An Scenic Day Tour', description: 'Explore the ancient capital and take a rowboat through caves in the UNESCO-protected Trang An landscape.', link: 'https://www.klook.com/en-US/activity/39366-ninh-binh-sightseeing-day-tour-local-experiences-hanoi/?aid=117191' },
                    { title: 'Bai Dinh Pagoda, Trang An & Mua Cave Tour', description: 'Visit Southeast Asia\'s largest Buddhist complex and hike up Mua Cave for a panoramic view of Ninh Binh.', link: 'https://www.klook.com/en-US/search/result/?query=Ninh%20Binh%20Bai%20Dinh&aid=117191' },
                    { title: 'Hoa Lu, Tam Coc & Mua Cave Day Tour', description: 'Cruise through Tam Coc\'s golden rice fields and climb Dragon Mountain for breathtaking scenery.', link: 'https://www.klook.com/en-US/search/result/?query=Tam%20Coc%20Mua%20Cave&aid=117191' }
                ],
                'Transport & SIM': [
                    { title: 'Hanoi to Ninh Binh Private/Shared Transfer', description: 'Reliable door-to-door transportation from your Hanoi hotel to major sites in Ninh Binh.', link: 'https://www.klook.com/en-US/search/result/?query=Hanoi%20Ninh%20Binh%20Transfer&aid=117191' }
                ]
            },
            'Sapa': {
                'Attractions': [
                    { title: 'Sun World Fansipan Legend Cable Car Ticket', description: 'Ride the world\'s longest three-cable system to conquer the "Roof of Indochina" and see the sea of clouds.', link: 'https://www.klook.com/en-US/search/result/?query=Fansipan%20Cable%20Car&aid=117191' },
                    { title: 'Rong May Glass Skywalk Ticket (Sapa)', description: 'Challenge yourself on a transparent glass bridge 2,000 meters above sea level for terrifyingly beautiful views.', link: 'https://www.klook.com/en-US/search/result/?query=Sapa%20Glass%20Bridge&aid=117191' }
                ],
                'Day Tours': [
                    { title: 'Sapa 2D1N / 3D2N Trekking Expedition', description: 'Journey into the heart of Sapa\'s rice terraces and visit ethnic villages like the Black Hmong and Red Dao.', link: 'https://www.klook.com/en-US/search/result/?query=Sapa%20Trekking&aid=117191' },
                    { title: 'Cat Cat Village & Ta Van Trekking Experience', description: 'Walk through emerald terraces and waterfalls into the famous Cat Cat Village to experience ethnic cultures.', link: 'https://www.klook.com/en-US/search/result/?query=Cat%20Cat%20Village&aid=117191' }
                ],
                'Transport & SIM': [
                    { title: 'Hanoi to Sapa Luxury Sleeper Bus / VIP Cabin', description: 'Travel in comfort with a fully reclining bed on a luxury bus—a great way to save on transit time and costs.', link: 'https://www.klook.com/en-US/search/result/?query=Hanoi%20Sapa%20Bus&aid=117191' },
                    { title: 'Hanoi to Sapa Luxury Overnight Train Experience', description: 'Experience the romantic vintage-style sleeper train. Wake up refreshed as you arrive in Lao Cai Province.', link: 'https://www.klook.com/en-US/search/result/?query=Hanoi%20Sapa%20Train&aid=117191' }
                ]
            }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('Hanoi City');
            const [selectedCategory, setSelectedCategory] = useState('Attractions');

            const currentData = itineraryData[selectedRegion]?.[selectedCategory] || [];

            return (
                <div className="min-h-screen bg-rose-50 font-sans text-slate-800 pb-12">
                    {/* Header */}
                    <header className="bg-white shadow-sm sticky top-0 z-10 border-b border-rose-100">
                        <div className="max-w-7xl mx-auto px-4 py-4 md:py-6">
                            <div className="flex items-center justify-between gap-2 mb-4">
                                <div className="flex items-center gap-2">
                                    <MapPin className="text-rose-600 w-6 h-6 md:w-8 md:h-8" />
                                    <h1 className="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-rose-600 to-orange-500">
                                        Hanoi Trip Guide
                                    </h1>
                                </div>
                                <a
                                    href="https://linkuei0425.github.io/Hanoi-US/"
                                    className="hidden md:flex items-center gap-1.5 px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 bg-rose-600 text-white hover:bg-rose-700 shadow-sm"
                                >
                                    <Home className="w-4 h-4" />
                                    Home
                                </a>
                            </div>
                            
                            {/* Region Selection */}
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                <a
                                    href="https://linkuei0425.github.io/Hanoi-US/"
                                    className="md:hidden flex items-center justify-center gap-1.5 whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 bg-rose-600 text-white hover:bg-rose-700 shadow-sm"
                                >
                                    <Home className="w-4 h-4" />
                                    Home
                                </a>
                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => {
                                            setSelectedRegion(region);
                                            if (!itineraryData[region]?.[selectedCategory]) {
                                                const availableCategories = Object.keys(itineraryData[region] || {});
                                                if (availableCategories.length > 0) {
                                                    setSelectedCategory(availableCategories[0]);
                                                }
                                            }
                                        }}
                                        className={`whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 ${
                                            selectedRegion === region
                                            ? 'bg-orange-500 text-white shadow-md'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-orange-50 hover:text-orange-600'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {/* Category Tabs */}
                        <div className="flex flex-wrap gap-2 md:gap-3 mb-8">
                            {CATEGORIES.map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 px-4 py-2.5 rounded-lg border text-sm font-bold transition-all ${
                                        selectedCategory === id
                                        ? 'border-rose-500 bg-rose-50 text-rose-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4" />
                                    {id}
                                </button>
                            ))}
                        </div>

                        {/* Section Header */}
                        <div className="mb-6 flex items-center gap-2">
                            <h2 className="text-2xl font-bold text-slate-800">
                                {selectedRegion} - {selectedCategory} <span className="text-rose-600">Featured</span>
                            </h2>
                        </div>

                        {/* Card List */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4 md:gap-6">
                                {currentData.map((item, index) => (
                                    <div 
                                        key={index} 
                                        className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col justify-between hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 animate-fade-in"
                                        style={{ animationDelay: `${index * 0.05}s` }}
                                    >
                                        <div>
                                            <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-3 leading-tight flex items-start gap-2">
                                                <span className="text-orange-500 mt-1"><Sparkles className="w-5 h-5"/></span>
                                                {item.title}
                                            </h3>
                                            <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed font-medium">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-4 border-t border-slate-100 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-sm hover:shadow-md w-full sm:w-auto"
                                            >
                                                <Info className="w-4 h-4" />
                                                <span>Details</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-80" />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl border border-dashed border-slate-300 p-12 text-center flex flex-col items-center justify-center">
                                <h3 className="text-lg font-medium text-slate-700 mb-2">
                                    No items found for this selection
                                </h3>
                                <p className="text-slate-500">Please try another category or region.</p>
                            </div>
                        )}

                        {/* Global Exploration Button */}
                        <div className="mt-12 flex justify-center">
                            <a 
                                href={`https://www.klook.com/en-US/search/result/?query=${encodeURIComponent(selectedRegion === 'Hanoi City' ? 'Hanoi' : selectedRegion)}&aid=117191`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-rose-600 to-orange-500 hover:from-rose-700 hover:to-orange-600 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1"
                            >
                                <span className="tracking-wide">Explore more {selectedRegion} Tours</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
