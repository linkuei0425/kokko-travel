<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hanoi Itinerary Wizard</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- React & Babel -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover { background-color: #94a3b8; }
    @media print {
      body { background-color: white !important; }
      .print-hidden { display: none !important; }
      .print-break-avoid { page-break-inside: avoid; }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
  
  <div id="root"></div>

  <!-- React Logic -->
  <script type="text/babel">
    const { useState, useMemo } = React;

    // --- Attraction Database (Hanoi) ---
    const ATTRACTIONS = [
      // ================= Airport & Accommodation =================
      { id: 'han_airport', city: 'hoan_kiem', name: 'Noi Bai Int\'l Airport (HAN)', stay: 1.5, region: 10, regionName: 'Airport', type: 'Airport', desc: 'Trip begins! Arrive in Hanoi and go through immigration/visa on arrival. Recommended to have your SIM card and Grab APP ready before departure.', transport: 'Take Grab or Bus 86 to the city.', 
        bookingLinks: [
          { url: 'https://www.klook.com/en-US/airport-transfers/?flightDirection=1&code=HAN&aid=117191', text: 'Noi Bai Airport Transfer' },
          { url: 'https://www.klook.com/en-US/activity/84066-3g-4g-sim-card-vietnam-noi-bai-airport/?spm=Mobility_Aggregate.SearchSuggest_LIST&clickId=209c995c02&aid=117191', text: 'Vietnam 4G SIM Card' },
          { url: 'https://www.klook.com/en-US/activity/123902-vietnam-esim-high-speed-internet-qr-code-voucher/?aid=117191', text: '5G eSIM Unlimited' }
        ] 
      },
      { id: 'acc_hoan_kiem', city: 'hoan_kiem', name: 'Hotel: Hoan Kiem (Old Quarter)', stay: 1, region: 11, regionName: 'City Center', type: 'Accommodation', desc: 'Check in at your hotel and drop off luggage. Hoan Kiem is the most convenient choice for sightseeing and food.', transport: 'Take Grab, taxi, or airport bus depending on hotel location.' },
      { id: 'acc_tay_ho', city: 'tay_ho', name: 'Hotel: Tay Ho (West Lake)', stay: 1, region: 12, regionName: 'West Lake', type: 'Accommodation', desc: 'Check in at your hotel and drop off luggage. Experience the relaxing resort vibe populated by expats.', transport: 'Take Grab or taxi depending on hotel location.' },

      // ================= Hoan Kiem (Old Quarter) =================
      { id: 'st_joseph', city: 'hoan_kiem', name: 'St. Joseph\'s Cathedral', stay: 1, timeWindow: [8, 20], region: 11, regionName: 'Hoan Kiem', type: 'History & Culture', desc: 'Hanoi\'s oldest church, featuring a weathered Neo-Gothic exterior full of history. Many cafes nearby to sit and admire the architecture.', transport: 'Located near the Old Quarter, walk or take Grab.' },
      { id: 'hoa_lo', city: 'hoan_kiem', name: 'Hoa Lo Prison Relic', stay: 1.5, timeWindow: [8, 17], region: 11, regionName: 'Hoan Kiem', type: 'History & Culture', desc: 'Used by French colonists for political prisoners, and for US POWs during the Vietnam War (Hanoi Hilton). Rich exhibits offering a profound historical experience.', transport: 'About 10-15 mins walk from Hoan Kiem Lake.' },
      { id: 'hoan_kiem_lake', city: 'hoan_kiem', name: 'Hoan Kiem Lake & Turtle Tower', stay: 1, timeWindow: [6, 22], region: 11, regionName: 'Hoan Kiem', type: 'Photo Spot', desc: 'The landmark and soul of downtown Hanoi. On weekends, the surrounding streets become a massive pedestrian zone with a joyful atmosphere.', transport: 'Located at the central hub, easily accessible by walking.' },
      { id: 'old_quarter', city: 'hoan_kiem', name: 'Old Quarter (36 Streets)', stay: 2.5, timeWindow: [9, 22], region: 11, regionName: 'Hoan Kiem', type: 'Shopping', desc: 'The most vibrant soul of Hanoi! A maze-like area full of treasure-hunting fun, packed with local street food, boutique shops, and cafes.', transport: 'Highly recommend exploring entirely on foot to experience local life.' },
      { id: 'dong_xuan', city: 'hoan_kiem', name: 'Dong Xuan Market', stay: 1.5, timeWindow: [8, 18], region: 11, regionName: 'Hoan Kiem', type: 'Shopping', desc: 'Hanoi\'s largest indoor traditional market with a century of history. The first floor mainly sells dried goods, souvenirs, and wholesale items.', transport: 'Located north of the Old Quarter, about a 10-min walk.' },
      { id: 'train_street', city: 'hoan_kiem', name: 'Hanoi Train Street', stay: 1.5, timeWindow: [15, 22], region: 11, regionName: 'Hoan Kiem', type: 'Photo Spot', desc: 'A bizarre sight of houses closely hugging the train tracks! Trains passing by up close offer a thrilling experience. Must be escorted by local cafe owners to enter.', transport: 'About a 15-min walk from the Old Quarter, Grab is recommended.' },
      { id: 'water_puppet', city: 'hoan_kiem', name: 'Thang Long Water Puppet Theatre', stay: 1.5, timeWindow: [15, 21], region: 11, regionName: 'Hoan Kiem', type: 'History & Culture', desc: 'Vietnam\'s national traditional art! Puppets controlled over a water pool with traditional instrument performances—an excellent way to understand Vietnamese rural culture.', transport: 'Located north of Hoan Kiem Lake, walkable.', bookingLinks: [{url: 'https://www.klook.com/en-US/activity/35653-thang-long-water-puppet-show-ticket-hanoi/?spm=Activity.SearchSuggest_LIST&clickId=d679a5e359&aid=117191', text: 'Water Puppet Show Ticket'}] },
      { id: 'ta_hien', city: 'hoan_kiem', name: 'Ta Hien Beer Street', stay: 2.5, timeWindow: [19, 24], region: 11, regionName: 'Hoan Kiem', type: 'Shopping', desc: 'The core of Old Quarter nightlife! The street is lined with plastic stools, packed with backpackers drinking Bia Hoi and eating BBQ.', transport: 'Vehicles restricted at night, must walk in.' },

      // ================= Ba Dinh (Historic District) =================
      { id: 'ho_chi_minh_mausoleum', city: 'ba_dinh', name: 'Ho Chi Minh Mausoleum & Ba Dinh Square', stay: 2, timeWindow: [8, 11.5], region: 12, regionName: 'Ba Dinh', type: 'History & Culture', desc: 'Resting place of Vietnamese leader Ho Chi Minh. Solemn atmosphere. Note the dress code; the interior is only open in the mornings.', transport: 'Traffic control is frequent; take Grab nearby and walk in.' },
      { id: 'citadel', city: 'ba_dinh', name: 'Imperial Citadel of Thang Long', stay: 1.5, timeWindow: [8, 17], region: 12, regionName: 'Ba Dinh', type: 'History & Culture', desc: 'UNESCO World Heritage site witnessing centuries of Vietnamese dynasties. The massive stone gates and excavated ruins are spectacular.', transport: 'About a 10-15 min walk from Ho Chi Minh Mausoleum.' },
      { id: 'lotte_center', city: 'ba_dinh', name: 'Lotte Observation Deck', stay: 1.5, timeWindow: [16, 22], region: 12, regionName: 'Ba Dinh', type: 'Photo Spot', desc: 'Located on the 65th floor, offering a 360-degree panoramic view of Hanoi and West Lake. The glass \'Sky Walk\' provides thrilling photo ops.', transport: 'Take Grab directly to Lotte Center.', bookingLinks: [{url: 'https://www.klook.com/en-US/activity/22529-lotte-observation-deck-ticket-hanoi/?spm=SearchResult.SearchResult_LIST&clickId=f8658be8f4&aid=117191', text: 'Observation Deck Ticket'}] },

      // ================= Tay Ho (West Lake) =================
      { id: 'tran_quoc', city: 'tay_ho', name: 'Tran Quoc Pagoda', stay: 1, timeWindow: [8, 17], region: 13, regionName: 'Tay Ho', type: 'History & Culture', desc: 'Hanoi\'s oldest Buddhist temple, over a millennium old. Located on a scenic West Lake peninsula, the towering red pagoda is especially mesmerizing at sunset.', transport: 'Take Grab to Thanh Nien Road at West Lake.' },
      { id: 'west_lake_cafe', city: 'tay_ho', name: 'Tay Ho Lakeside Cafe Street', stay: 1.5, timeWindow: [15, 20], region: 13, regionName: 'Tay Ho', type: 'Photo Spot', desc: 'An area full of French charm and expats. Sipping coconut coffee by the lake while watching the sunset is a highly popular relaxing activity.', transport: 'West Lake is huge; recommend taking Grab to a specific cafe.' },
      { id: 'lotte_mall_west_lake', city: 'tay_ho', name: 'Lotte Mall West Lake', stay: 2.5, timeWindow: [10, 21], region: 13, regionName: 'Tay Ho', type: 'Shopping', desc: 'Hanoi\'s newest and largest mega-mall! Combines indoor shopping, a supermarket, and a stunning aquarium—a perfect escape from the heat.', transport: 'Located on the outskirts of Tay Ho, highly recommend taking Grab directly.' },

      // ================= Dong Da =================
      { id: 'temple_of_literature', city: 'dong_da', name: 'Temple of Literature', stay: 1.5, timeWindow: [8, 17], region: 14, regionName: 'Dong Da', type: 'History & Culture', desc: 'Vietnam\'s first national university, dedicated to Confucius. Perfectly preserved traditional Vietnamese architecture, a sacred place for local students.', transport: 'Take Metro Line 2A to Cat Linh station and walk, or take Grab.' },

      // ================= Outskirts & Heritage =================
      { id: 'ha_long_bay', city: 'ha_long', name: 'Halong Bay (1/Multi-day Tour)', stay: 9, timeWindow: [8, 20], region: 20, regionName: 'Halong Bay', type: 'History & Culture', desc: 'UNESCO World Natural Heritage! Cruise among thousands of spectacular limestone islands, exploring stalactite caves and marine wonders.', transport: 'About 2.5 hours drive from Hanoi. Highly recommend a 1-day or 2-day tour.', bookingLinks: [
        {url: 'https://www.klook.com/en-US/search/result/?query=%E4%B8%8B%E9%BE%8D%E7%81%A3&aid=117191', text: 'Halong Bay 1-Day Luxury Cruise'},
        {url: 'https://www.klook.com/en-US/search/result/?query=%E4%B8%8B%E9%BE%8D%E7%81%A32%E5%A4%A91%E5%A4%9C&needQueryIdentification=true&spm=SearchResult.SearchSuggest_LIST&clickId=9fef9306ed&aid=117191', text: 'Halong Bay 2D1N Cruise'},
        {url: 'https://www.klook.com/en-US/search/result/?query=%E4%B8%8B%E9%BE%8D%E7%81%A33%E5%A4%A92%E5%A4%9C&aid=117191', text: 'Halong Bay 3D2N Cruise'}
      ] },
      { id: 'ninh_binh', city: 'ninh_binh', name: 'Ninh Binh / Trang An (1-Day Tour)', stay: 8, timeWindow: [8, 19], region: 21, regionName: 'Ninh Binh', type: 'History & Culture', desc: 'Known as "Halong Bay on land". Take a traditional rowboat through the spectacular karst landscapes and water caves of Trang An or Tam Coc.', transport: 'About 2 hours drive from Hanoi. Local 1-day tour is recommended.', bookingLinks: [
        {url: 'https://www.klook.com/en-US/activity/39366-ninh-binh-sightseeing-day-tour-local-experiences-hanoi/?aid=117191', text: 'Hoa Lu & Trang An Day Tour'}
      ] }
    ];

    const CITIES = [
      { id: 'hoan_kiem', name: 'Hoan Kiem (Old Quarter)', color: 'blue' },
      { id: 'ba_dinh', name: 'Ba Dinh (Historic)', color: 'fuchsia' },
      { id: 'tay_ho', name: 'Tay Ho (West Lake)', color: 'emerald' },
      { id: 'dong_da', name: 'Dong Da (Temple of Lit.)', color: 'amber' },
      { id: 'ninh_binh', name: 'Ninh Binh (Trang An)', color: 'orange' },
      { id: 'ha_long', name: 'Halong Bay (Heritage)', color: 'cyan' }
    ];

    // --- Core Routing & Transit Logic ---
    const formatTime = (h) => {
      let hh = Math.floor(h) % 24;
      let mm = Math.round((h - Math.floor(h)) * 60);
      if (mm === 60) { hh++; mm = 0; }
      return `${hh.toString().padStart(2, '0')}:${mm.toString().padStart(2, '0')}`;
    };

    const getCityColor = (cityId) => {
      const colors = { hoan_kiem: 'blue', ba_dinh: 'fuchsia', tay_ho: 'emerald', dong_da: 'amber', ha_long: 'cyan', ninh_binh: 'orange' };
      const c = colors[cityId] || 'slate';
      return `text-${c}-600 bg-${c}-100 border-${c}-200`;
    };

    const getSmartTransit = (prev, curr) => {
      if (curr.id === 'ret') return '✈️ [Departure] Take Grab, taxi, or Airport Bus to Noi Bai Int\'l Airport (HAN) for check-in.';

      if (!prev || prev.id.startsWith('acc_') || prev.type === 'Start Point') {
        if (curr.type === 'Airport') return `🛬 [Arrival] Take Grab or Bus 86 to city area ${curr.name}.`;
        return `🏨 [Departure] Take Grab or walk to ${curr.name}.`;
      }

      if (curr.city === 'ha_long' || (prev && prev.city === 'ha_long')) {
          if (prev && prev.city === curr.city) return `🚗 [Local Transit] Take Grab within Halong to ${curr.name}.`;
          return `🚐 [Intercity] Take a luxury bus or tour van to/from Halong Bay (approx. 2.5 hrs one way).`;
      }
      
      if (curr.city === 'ninh_binh' || (prev && prev.city === 'ninh_binh')) {
          if (prev && prev.city === curr.city) return `🚗 [Local Transit] Take Grab within Ninh Binh to ${curr.name}.`;
          return `🚐 [Intercity] Take a bus or tour van to/from Ninh Binh (approx. 2 hrs one way).`;
      }

      if (prev.city !== curr.city && prev.id !== 'hcmc_origin') {
         let text = '';
         const route = `${prev.city}-${curr.city}`;
         if ((route.includes('dong_da') && route.includes('ba_dinh'))) text = 'Take Metro Line 2A, Line 3, or Grab for cross-district transit (approx. 10-15 mins).';
         else text = `Take Grab or a taxi for cross-district transit (approx. 15-20 mins).`;
         return `🚗 [Cross-district] ${text}`;
      }

      return `🚶 [Local Transit] Walk or take a short Grab from ${prev.name} to ${curr.name}.`;
    };

    const getTTime = (isNewDay, fCity, tCity, fReg, tReg) => {
        let extraFarTime = 0;
        if ((fCity === 'ha_long' && tCity !== 'ha_long') || (tCity === 'ha_long' && fCity !== 'ha_long')) {
            extraFarTime += 2.5; 
        } else if ((fCity === 'ninh_binh' && tCity !== 'ninh_binh') || (tCity === 'ninh_binh' && fCity !== 'ninh_binh')) {
            extraFarTime += 2.0;
        }
        if (fCity && tCity && fCity !== tCity) {
            if (fCity === 'ha_long' || tCity === 'ha_long' || fCity === 'ninh_binh' || tCity === 'ninh_binh') return 0.5 + extraFarTime;
            return 0.4 + extraFarTime;
        }
        if (isNewDay) return 0.3 + extraFarTime;
        return 0.2 + extraFarTime;
    };

    // --- Main App Component ---
    function App() {
      const [activeCity, setActiveCity] = useState('hoan_kiem');
      const [selectedIds, setSelectedIds] = useState([]);
      const [showPrintView, setShowPrintView] = useState(false);
      const [tripDuration, setTripDuration] = useState(5);

      const toggleAttr = (id) => setSelectedIds(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

      const itineraryDays = useMemo(() => {
        if (selectedIds.length === 0) return [];
        let idsToSchedule = [...new Set(selectedIds)];

        const getPriority = (item) => {
            if (item.id === 'ret') return 999;
            if (item.type === 'Start Point') return 10;
            if (item.type === 'Airport') return 15;
            if (item.type === 'Accommodation') return 20; 
            let win = item.timeWindow || [9.5, 21.5];
            const isNight = (['Shopping'].includes(item.type) && win[1] >= 22) || item.id === 'ta_hien' || item.id === 'lotte_center' || item.id === 'hoan_kiem_lake';
            if (isNight) return 90; 
            if (win[1] <= 17.5) return 30; 
            return 50; 
        };

        const sorted = idsToSchedule
          .map(id => ATTRACTIONS.find(a => a.id === id))
          .filter(a => a)
          .sort((a, b) => {
            const getSortKey = (item) => {
              let sk = getPriority(item);
              let cityGroup = CITIES.findIndex(c => c.id === item.city);
              return cityGroup * 100000 + sk * 1000; 
            };
            return getSortKey(a) - getSortKey(b);
          });

        let remaining = [...sorted];
        let days = [];
        let curDay = { items: [], dayCity: 'hoan_kiem', dayType: null, currentTime: 13.0 }; 
        let lCity = 'hoan_kiem', lReg = 11, prevItemObj = null; 

        const checkValid = (a, isF, curTime) => {
            let tTime = getTTime(isF, lCity, a.city, lReg, a.region);
            let arrivalTime = curTime + tTime;
            let isLastDay = days.length === tripDuration - 1;
            if (!isF) {
                if (!['Accommodation', 'Airport', 'Start Point'].includes(a.type)) {
                    if (a.city !== lCity) {
                        if (remaining.some(r => r.city === lCity && !['Accommodation', 'Airport', 'Start Point'].includes(r.type))) return false;
                        if (curTime > 15) return false;
                    }
                }
            }
            let win = a.timeWindow || [9, 22]; 
            if (['Accommodation', 'Airport'].includes(a.type)) win = [0, 24];
            let waitTime = arrivalTime < win[0] ? win[0] - arrivalTime : 0;
            if (waitTime > 2.0 && !isF) return false;
            let actStart = arrivalTime + waitTime;
            let actEnd = actStart + a.stay;
            if (actStart >= win[1] - 0.5) return false; 
            if (isLastDay) {
                let retTFromA = getTTime(false, a.city, 'hoan_kiem', a.region, 10);
                if (actEnd > (14.0 - 2.5 - retTFromA)) return false;
            } else if (!isF && actEnd > 23.5) return false;
            return { valid: true, tTime, waitTime, actStart, actEnd };
        };

        while (remaining.length > 0) {
            const isF = curDay.items.length === 0;
            let chosenIdx = -1, chosenStats = null, validCands = [];
            for (let i = 0; i < remaining.length; i++) {
                let stats = checkValid(remaining[i], isF, curDay.currentTime);
                if (stats && stats.valid) validCands.push({ a: remaining[i], idx: i, prio: getPriority(remaining[i]), stats });
            }
            if (validCands.length > 0) {
                validCands.sort((ca, cb) => {
                    let isSameCityA = ca.a.city === lCity ? 1 : 0, isSameCityB = cb.a.city === lCity ? 1 : 0;
                    if (isSameCityA !== isSameCityB) return isSameCityB - isSameCityA;
                    if (ca.prio !== cb.prio) return ca.prio - cb.prio;
                    if (ca.stats.tTime !== cb.stats.tTime) return ca.stats.tTime - cb.stats.tTime;
                    return ca.idx - cb.idx; 
                });
                chosenIdx = validCands[0].idx; chosenStats = validCands[0].stats;
            }
            if (chosenIdx === -1) {
                days.push(curDay);
                if (days.length >= tripDuration) break;
                curDay = { items: [], dayCity: remaining[0].city, dayType: null, currentTime: 9.0 };
                continue;
            }
            const a = remaining.splice(chosenIdx, 1)[0];
            const { tTime, waitTime, actStart, actEnd } = chosenStats;
            if (isF && days.length === 0) prevItemObj = { id: 'hcmc_origin', city: 'hoan_kiem', name: 'Airport / Arrival', type: 'Start Point' };
            if (isF && days.length > 0) prevItemObj = { id: 'acc_hoan_kiem', city: a.city, name: `Hotel (${CITIES.find(c=>c.id===a.city)?.name || 'Hoan Kiem'})`, type: 'Accommodation' }; 
            let sTime = curDay.currentTime, aTime = sTime + tTime;
            let transitMsg = getSmartTransit(prevItemObj, a) + `\n📍 Route Guide: ${a.transport}`;
            let win = a.timeWindow || [9, 22];
            if (actStart - aTime > 0 && win[0] > 0 && !['Accommodation', 'Airport'].includes(a.type)) transitMsg += `\n💡 Tip: It's recommended to start this attraction after ${win[0]}:00. Estimated arrival at ${formatTime(aTime)}, allowing for a short rest.`;
            curDay.items.push({ ...a, tTime: tTime.toFixed(1), prevName: prevItemObj.name, transitTransport: transitMsg, tStr: `${formatTime(sTime)} - ${formatTime(aTime)}`, sStr: (days.length === 0 && isF && a.type === 'Airport') ? 'Arrive & Clear Customs' : `${formatTime(actStart)} - ${formatTime(actEnd)}`, isFirstAirport: (days.length === 0 && isF && a.type === 'Airport'), endTime: actEnd });
            curDay.currentTime = actEnd; lCity = a.city; lReg = a.region; prevItemObj = a;
            if (isF) curDay.dayCity = a.city;
        }
        if (curDay.items.length > 0 && days.length < tripDuration) days.push(curDay);
        while (days.length < tripDuration) days.push({ items: [], dayCity: lCity, dayType: null, currentTime: 9.0 });
        
        let lastD = days[days.length-1];
        if (!lastD) { lastD = { items: [], dayCity: 'hoan_kiem', dayType: null, currentTime: 9.0 }; days.push(lastD); }
        while (lastD.items.length > 0) {
            let lastItem = lastD.items[lastD.items.length-1];
            if (lastItem.endTime > (14.0 - 2.5 - getTTime(false, lastItem.city, 'hoan_kiem', lastItem.region, 10))) lastD.items.pop();
            else break;
        }
        if (lastD.items.length > 0) { let lastItem = lastD.items[lastD.items.length-1]; lastD.currentTime = lastItem.endTime; lCity = lastItem.city; lReg = lastItem.region; prevItemObj = lastItem; }
        else { lastD.currentTime = 9.0; lReg = 11; prevItemObj = { name: 'Hotel', city: lCity }; }
        let retT = getTTime(lastD.items.length === 0, lCity, 'hoan_kiem', lReg, 10), startTransit = 14.0 - 2.5 - retT;
        let transitMsg = lastD.currentTime < startTransit ? `💡 There's some free time before heading to the airport. Recommended departure at ${formatTime(startTransit)}.\n🚐 Take Grab directly to the airport.` : '🚐 Take Grab or Bus 86 to Noi Bai Airport (HAN) for check-in.';
        lastD.items.push({ id: 'ret', city: 'hoan_kiem', name: 'End of Trip - Head to Airport', stay: 2.5, region: 999, regionName: 'Airport', type: 'Airport', desc: 'Wishing you wonderful memories of Vietnam! Hanoi airport departure can be crowded, be sure to check in early.', transport: 'Take Grab directly to the airport.', tTime: retT.toFixed(1), prevName: prevItemObj.name, transitTransport: transitMsg, tStr: `${formatTime(startTransit)} - ${formatTime(14.0 - 2.5)}`, sStr: `${formatTime(14.0 - 2.5)} - 14:00`, isFirstAirport: false, endTime: 14.0 });
        lastD.currentTime = 14.0;

        return days.map((d, i) => ({ dayNum: i+1, totalH: (d.currentTime - (i === 0 ? 13.0 : 9.0) > 0 ? (d.currentTime - (i === 0 ? 13.0 : 9.0)).toFixed(1) : "0.0"), cityName: CITIES.find(c => c.id === d.dayCity)?.name || 'Hoan Kiem', items: d.items }));
      }, [selectedIds, tripDuration]);

      if (showPrintView) {
        return (
          <div className="min-h-screen bg-white p-4 sm:p-8">
            <div className="max-w-3xl mx-auto border-2 border-slate-800 p-4 sm:p-8 rounded-2xl">
              <div className="text-center mb-10"><h1 className="text-2xl sm:text-3xl font-bold">🇻🇳 Exclusive Hanoi Free & Easy Itinerary</h1><p className="mt-2 text-slate-500 text-sm">The smart scheduling system automatically calculates transit times and respects attraction operating hours.</p></div>
              {itineraryDays.map(d => (
                <div key={d.dayNum} className="mb-10 print-break-avoid">
                  <h2 className="text-xl font-bold border-b-2 pb-2 mb-6">🌞 Day {d.dayNum} - 【{d.cityName} Area】 ({d.totalH}h)</h2>
                  <div className="space-y-6 ml-2 sm:ml-4 border-l-2 pl-4 sm:pl-6 border-slate-300">
                    {d.items.map((it, idx) => (
                      <div key={`${it.id}-${idx}`} className="relative mb-8">
                        {!it.isFirstAirport && (
                          <div className="mb-4 bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs sm:text-sm">
                             <div className="font-bold mb-2">{it.prevName} ➔ {it.name}</div>
                             <div className="flex gap-3 mb-2"><span className="bg-white px-2 py-1 rounded border font-mono text-blue-500"><i className="fa-regular fa-clock"></i> {it.tStr}</span><span>Est. transit: {it.tTime}h</span></div>
                             <div className="whitespace-pre-wrap text-slate-600">{it.transitTransport}</div>
                          </div>
                        )}
                        <div className="relative">
                          <div className="absolute -left-[23px] sm:-left-[31px] top-1 w-3 h-3 bg-blue-500 rounded-full border-2 border-white"></div>
                          <div className="font-bold text-xs sm:text-sm text-slate-500 mb-1"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : 'Stay: '}{it.sStr}</div>
                          <h4 className="text-lg sm:text-xl font-bold text-slate-900">{it.name}</h4>
                          <p className="text-xs sm:text-sm text-slate-600 my-2 leading-relaxed">{it.desc}</p>
                          {it.bookingLinks && <div className="mt-3 flex gap-2 flex-wrap print:hidden">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" className="bg-[#ff5b00] text-white text-xs px-2.5 py-1.5 rounded font-bold hover:bg-[#e05000]"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              <div className="mt-10 text-center flex flex-col sm:flex-row justify-center gap-4 print-hidden">
                <button onClick={() => setShowPrintView(false)} className="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-700">Back to Edit</button>
                <button onClick={() => window.print()} className="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-500">Print / Save as PDF</button>
              </div>
            </div>
          </div>
        );
      }

      const grouped = ATTRACTIONS.filter(a => a.city === activeCity && !a.id.startsWith('acc_')).reduce((acc, c) => { (acc[c.type] = acc[c.type] || []).push(c); return acc; }, {});

      return (
        <div className="min-h-screen bg-slate-50 pb-10">
          <header className="bg-white p-4 shadow-sm flex flex-wrap justify-between items-center sticky top-0 z-20 border-b gap-3">
            <div className="flex items-center gap-4">
              <h1 className="font-bold text-xl flex items-center gap-2"><i className="fa-solid fa-wand-magic-sparkles text-blue-600"></i>Hanoi Itinerary Wizard</h1>
              <a href="https://linkuei0425.github.io/Hanoi-US/" className="hidden sm:flex items-center gap-1.5 text-xs font-bold text-slate-500 hover:text-blue-600 bg-slate-100 hover:bg-blue-50 px-3 py-1.5 rounded-full border border-slate-200"><i className="fa-solid fa-house"></i> Back to Home</a>
            </div>
            <div className="flex items-center gap-3">
              {selectedIds.length > 0 && <button onClick={() => setSelectedIds([])} className="text-xs font-bold text-red-500 hover:text-white border border-red-500 hover:bg-red-500 px-3 py-1.5 rounded-full shadow-sm flex items-center gap-1 cursor-pointer"><i className="fa-solid fa-trash-can"></i> Clear</button>}
              <div className="text-xs font-bold bg-slate-800 text-white px-3 py-1.5 rounded-full shadow-sm">{selectedIds.length} Selected</div>
            </div>
          </header>
          
          <main className="max-w-7xl mx-auto p-4 flex flex-col lg:flex-row gap-6 mt-2">
            <div className="lg:w-1/2 flex flex-col gap-4">
              <div className="bg-white p-2 rounded-xl flex gap-2 overflow-x-auto shadow-sm custom-scrollbar">
                {CITIES.map(c => <button key={c.id} onClick={() => setActiveCity(c.id)} className={`px-5 py-2.5 rounded-lg text-sm font-bold whitespace-nowrap transition-all ${activeCity === c.id ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 hover:bg-slate-200 text-slate-600'}`}>{c.name}</button>)}
              </div>
              <div className="bg-white rounded-xl shadow-sm p-4 border border-slate-200">
                <h2 className="text-sm font-bold flex items-center gap-2 mb-1"><i className="fa-solid fa-circle-info text-blue-500"></i>Smart Scheduling Tip</h2>
                <p className="text-xs text-slate-500">The system automatically schedules <strong className="text-orange-500">historic sites</strong> for daytime and <strong className="text-indigo-500">beer streets/night views</strong> for the evening. Cross-district transit via Grab or bus is calculated automatically!</p>
              </div>
              <div className="max-h-[65vh] overflow-y-auto space-y-6 pr-2 custom-scrollbar">
                {Object.entries(grouped).map(([type, items]) => (
                  <div key={type} className="mb-6">
                    <h3 className="font-bold text-slate-700 mb-3 sticky top-0 bg-slate-50/90 py-2 backdrop-blur-sm z-10 border-b border-slate-200">{type}</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      {items.map(it => (
                        <div key={it.id} onClick={() => toggleAttr(it.id)} className={`p-4 rounded-xl cursor-pointer border-2 transition-all ${selectedIds.includes(it.id) ? 'bg-blue-50 border-blue-500 scale-[1.02] shadow-md' : 'bg-white border-transparent shadow-sm hover:border-slate-300'}`}>
                          <div className="font-bold text-slate-900 mb-2">{it.name}</div>
                          <div className="text-[10px] flex gap-2 mb-2"><span className="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600"><i className="fa-regular fa-clock mr-1"></i>{it.stay}h</span><span className={`px-1.5 py-0.5 rounded border ${getCityColor(it.city)}`}><i className="fa-solid fa-location-dot"></i> {it.regionName}</span></div>
                          <p className="text-xs text-slate-500 line-clamp-2">{it.desc}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            <div className="lg:w-1/2">
              <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col max-h-[85vh] sticky top-24">
                <div className="bg-slate-800 text-white p-5 lg:p-6">
                  <h2 className="text-xl font-bold flex items-center gap-2"><i className="fa-regular fa-calendar-check text-blue-400"></i>Your Itinerary</h2>
                  <div className="flex flex-wrap gap-2 mt-4">
                    <select value={tripDuration} onChange={(e) => setTripDuration(Number(e.target.value))} className="flex-1 sm:flex-none bg-slate-700 text-white font-bold py-3 px-3 rounded-xl border border-slate-600"><option value={3}>3 Days</option><option value={4}>4 Days</option><option value={5}>5 Days</option><option value={6}>6 Days</option><option value={7}>7 Days</option></select>
                    <button onClick={() => setSelectedIds([])} className={`flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-4 py-3 rounded-xl font-bold shadow-lg transition-all ${selectedIds.length > 0 ? 'bg-red-500 text-white' : 'bg-slate-600 text-slate-400'}`}><i className="fa-solid fa-rotate-right"></i><span>Reset</span></button>
                    <button onClick={() => setShowPrintView(true)} disabled={itineraryDays.length === 0} className="w-full sm:flex-1 bg-blue-500 py-3 px-2 rounded-xl font-bold text-white text-sm sm:text-base cursor-pointer disabled:opacity-30">Generate Detailed Itinerary</button>
                  </div>
                </div>
                <div className="p-6 overflow-y-auto flex-1 custom-scrollbar bg-slate-50/50">
                  {itineraryDays.length === 0 ? <div className="text-center text-slate-400 py-24 flex flex-col items-center gap-4"><i className="fa-brands fa-fort-awesome text-6xl opacity-10"></i><p>No attractions selected yet</p></div> : 
                    itineraryDays.map(d => (
                      <div key={d.dayNum} className="mb-10">
                        <h3 className="font-bold text-lg mb-4 border-b-2 border-slate-200 pb-2 flex items-center gap-2 text-slate-800"><i className="fa-solid fa-sun text-orange-500"></i> Day {d.dayNum} - 【{d.cityName}】 <span className="text-xs font-normal text-slate-400 ml-auto">Total: {d.totalH}h</span></h3>
                        <div className="space-y-5 border-l-[3px] border-slate-200 ml-4 pl-7 relative pb-4">
                          {d.items.map((it, idx) => (
                            <div key={`${it.id}-${idx}`} className="relative mb-6">
                              {!it.isFirstAirport && (
                                <div className="mb-4 relative">
                                  <div className="absolute -left-[40px] top-1/2 -translate-y-1/2 w-4 h-4 bg-slate-100 rounded-full border-2 border-slate-300 flex items-center justify-center shadow-sm z-10"><i className="fa-solid fa-arrow-down text-[8px] text-slate-400"></i></div>
                                  <div className={`rounded-lg p-3 text-[11px] border shadow-sm ${it.transitTransport.includes('Intercity') || it.transitTransport.includes('Heritage') ? 'bg-red-50/70 border-red-100' : 'bg-blue-50/70 border-blue-100'}`}>
                                    <div className={`font-bold mb-1.5 ${it.transitTransport.includes('Intercity') || it.transitTransport.includes('Heritage') ? 'text-red-800' : 'text-blue-800'}`}>{it.prevName} ➔ {it.name}</div>
                                    <div className="flex items-center gap-3 mb-1.5"><span className={`bg-white px-2 py-0.5 rounded border font-mono shadow-sm ${it.transitTransport.includes('Intercity') || it.transitTransport.includes('Heritage') ? 'border-red-200 text-red-600' : 'border-blue-200 text-blue-600'}`}><i className="fa-regular fa-clock mr-1"></i> {it.tStr}</span><span className={`font-medium ${it.transitTransport.includes('Intercity') || it.transitTransport.includes('Heritage') ? 'text-red-600' : 'text-blue-600'}`}>Est. transit: {it.tTime}h</span></div>
                                    <div className="text-slate-600 whitespace-pre-wrap leading-relaxed">{it.transitTransport}</div>
                                  </div>
                                </div>
                              )}
                              <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative hover:shadow-md transition-shadow">
                                <div className="absolute -left-[37px] top-4 w-4.5 h-4.5 bg-blue-500 rounded-full border-[3px] border-white shadow-sm z-10"></div>
                                <div className="text-xs font-bold text-slate-400 mb-1"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : 'Stay: '}{it.sStr}</div>
                                <h4 className="font-bold text-base mb-1">{it.name}</h4>
                                <p className="text-xs text-slate-500 leading-relaxed">{it.desc}</p>
                                {it.bookingLinks && <div className="mt-3 flex gap-1.5 flex-wrap">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-[9px] px-2.5 py-1 rounded-lg font-bold transition-colors shadow-sm"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))
                  }
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
