      { id: 'acc_tay_ho', city: 'hanoi', name: 'Accommodation: Tay Ho', stay: 1, region: 13, regionName: 'Tay Ho', type: 'Accommodation', desc: 'Check-in and drop off luggage. Experience the relaxing vibe of the expat-friendly West Lake area.', transport: 'Take a Grab or taxi depending on your hotel location.' },

      // ================= Hanoi City (Hoan Kiem, Ba Dinh, Tay Ho, Dong Da) =================
      { id: 'st_joseph', city: 'hanoi', name: "St. Joseph's Cathedral", stay: 1, timeWindow: [8, 20], region: 11, regionName: 'Hoan Kiem', type: 'History & Culture', desc: 'The oldest church in Hanoi with a historic Gothic facade. Surrounded by cafes, perfect for a relaxing break.', transport: 'Located near the Old Quarter, reachable by foot or Grab.' },
      { id: 'hoa_lo', city: 'hanoi', name: 'Hoa Lo Prison Relic', stay: 1.5, timeWindow: [8, 17], region: 11, regionName: 'Hoan Kiem', type: 'History & Culture', desc: 'Used by French colonists and later for US POWs (Hanoi Hilton). Rich exhibits offering a profound historical experience.', transport: 'About 10-15 mins walk from Hoan Kiem Lake.' },
      { id: 'opera_house', city: 'hanoi', name: 'Hanoi Opera House', stay: 1, timeWindow: [8, 22], region: 11, regionName: 'Hoan Kiem', type: 'History & Culture', desc: 'Modeled after the Palais Garnier in Paris. Beautifully illuminated at night, surrounded by upscale restaurants.', transport: 'Southeast of Hoan Kiem Lake. Walk or take a short Grab ride.' },
      { id: 'hoan_kiem_lake', city: 'hanoi', name: 'Hoan Kiem Lake & Turtle Tower', stay: 1, timeWindow: [6, 22], region: 11, regionName: 'Hoan Kiem', type: 'Landmarks', desc: 'The heart and soul of Hanoi. The surrounding streets turn into a massive pedestrian walking street on weekends.', transport: 'Central hub, easily reachable by foot.' },
      { id: 'long_bien_bridge', city: 'hanoi', name: 'Long Bien Bridge', stay: 1, timeWindow: [6, 18], region: 11, regionName: 'Hoan Kiem', type: 'Landmarks', desc: 'A historic iron bridge built by the French. Its industrial and rustic vibe makes it a favorite for photographers.', transport: 'Not far from the Old Quarter, Grab is recommended to reach the bridgehead.' },
      { id: 'old_quarter', city: 'hanoi', name: 'Hanoi Old Quarter', stay: 2.5, timeWindow: [9, 22], region: 11, regionName: 'Hoan Kiem', type: 'Shopping & Nightlife', desc: 'The energetic soul of Hanoi! A maze of 36 streets filled with street food, artisan shops, and hidden cafes.', transport: 'Highly recommended to explore on foot.' },
      { id: 'dong_xuan', city: 'hanoi', name: 'Dong Xuan Market', stay: 1.5, timeWindow: [8, 18], region: 11, regionName: 'Hoan Kiem', type: 'Shopping & Nightlife', desc: 'Hanoi’s largest indoor traditional market with a 100-year history. Sells souvenirs, dried goods, and wholesale items.', transport: 'Located north of the Old Quarter, a 10-min walk.' },
      { id: 'night_market', city: 'hanoi', name: 'Hanoi Weekend Night Market', stay: 2, timeWindow: [18, 23], region: 11, regionName: 'Hoan Kiem', type: 'Shopping & Nightlife', desc: 'Open Fri-Sun nights only! Stretches from Dong Xuan to Hoan Kiem Lake, offering clothes, souvenirs, and street food.', transport: 'Roads are closed to vehicles; walking is required.' },
      { id: 'train_street', city: 'hanoi', name: 'Hanoi Train Street', stay: 1.5, timeWindow: [15, 22], region: 11, regionName: 'Hoan Kiem', type: 'Landmarks', desc: 'Houses built inches from the tracks! Very thrilling when the train passes. Must be escorted by a cafe owner to enter.', transport: 'About 15 mins walk from Old Quarter. Grab is recommended.' },
      { id: 'water_puppet', city: 'hanoi', name: 'Thang Long Water Puppet Theatre', stay: 1.5, timeWindow: [15, 21], region: 11, regionName: 'Hoan Kiem', type: 'History & Culture', desc: 'Vietnam’s national traditional art. Puppets dance on water to traditional live music. Great way to see rural culture.', transport: 'North side of Hoan Kiem Lake, walkable.', bookingLinks: [{url: 'https://www.klook.com/en-US/activity/35653-thang-long-water-puppet-show-ticket-hanoi/?spm=Activity.SearchSuggest_LIST&clickId=d679a5e359&aid=117191', text: 'Water Puppet Ticket'}] },
      { id: 'ta_hien', city: 'hanoi', name: 'Ta Hien Beer Street', stay: 2.5, timeWindow: [19, 24], region: 11, regionName: 'Hoan Kiem', type: 'Shopping & Nightlife', desc: 'The core of nightlife! Streets packed with plastic stools where backpackers drink Bia Hơi and eat BBQ.', transport: 'Roads closed to vehicles at night; walking required.' },

      { id: 'ho_chi_minh_mausoleum', city: 'hanoi', name: 'Ho Chi Minh Mausoleum', stay: 2, timeWindow: [8, 11.5], region: 12, regionName: 'Ba Dinh', type: 'History & Culture', desc: 'Resting place of Vietnam’s iconic leader. Solemn atmosphere with strict dress codes. Interior open mornings only.', transport: 'Frequent traffic controls; take Grab nearby and walk.' },
      { id: 'one_pillar', city: 'hanoi', name: 'One Pillar Pagoda', stay: 0.5, timeWindow: [8, 17], region: 12, regionName: 'Ba Dinh', type: 'History & Culture', desc: 'A historic Buddhist temple built on a single stone pillar resembling a lotus blossom. A must-see iconic site.', transport: 'Next to the Mausoleum, easily visited together.' },
      { id: 'citadel', city: 'hanoi', name: 'Imperial Citadel of Thang Long', stay: 1.5, timeWindow: [8, 17], region: 12, regionName: 'Ba Dinh', type: 'History & Culture', desc: 'A UNESCO World Heritage site reflecting centuries of Vietnamese history with massive stone gates and relics.', transport: 'A 10-15 minute walk from the Mausoleum.' },
      { id: 'lotte_center', city: 'hanoi', name: 'Lotte Center Observation Deck', stay: 1.5, timeWindow: [16, 22], region: 12, regionName: 'Ba Dinh', type: 'Landmarks', desc: 'Located on the 65th floor, offering 360-degree views of Hanoi and West Lake. Features a glass skywalk for thrilling photos.', transport: 'Take a Grab directly to Lotte Center.', bookingLinks: [{url: 'https://www.klook.com/en-US/activity/22529-lotte-observation-deck-ticket-hanoi/?spm=SearchResult.SearchResult_LIST&clickId=f8658be8f4&aid=117191', text: 'Lotte Deck Ticket'}] },

      { id: 'tran_quoc', city: 'hanoi', name: 'Tran Quoc Pagoda', stay: 1, timeWindow: [8, 17], region: 13, regionName: 'Tay Ho', type: 'History & Culture', desc: 'The oldest Buddhist temple in Hanoi (over 1,000 years old). Located on West Lake, stunning during sunset.', transport: 'Take a Grab to Thanh Nien road by West Lake.' },
      { id: 'west_lake_cafe', city: 'hanoi', name: 'West Lake Cafe Street', stay: 1.5, timeWindow: [15, 20], region: 13, regionName: 'Tay Ho', type: 'Landmarks', desc: 'An area with a relaxed, expat vibe. Sipping coconut coffee by the lake while watching the sunset is highly popular.', transport: 'West Lake is huge; Grab directly to a specific cafe is best.' },
      { id: 'lotte_mall_west_lake', city: 'hanoi', name: 'Lotte Mall West Lake', stay: 2.5, timeWindow: [10, 21], region: 13, regionName: 'Tay Ho', type: 'Shopping & Nightlife', desc: 'Hanoi’s newest and largest mall complex! Includes an indoor shopping center, supermarket, and a beautiful aquarium.', transport: 'Located in outer Tay Ho; Grab is highly recommended.' },

      { id: 'temple_of_literature', city: 'hanoi', name: 'Temple of Literature', stay: 1.5, timeWindow: [8, 17], region: 14, regionName: 'Dong Da', type: 'History & Culture', desc: 'Vietnam’s first national university dedicated to Confucius. Well-preserved traditional architecture.', transport: 'Take Metro Line 2A to Cat Linh Station and walk, or take a Grab.' },

      // ================= Halong Bay =================
      { id: 'ha_long_bay', city: 'ha_long', name: 'Halong Bay (Cruise Experience)', stay: 9, timeWindow: [8, 20], region: 20, regionName: 'Halong Bay', type: 'History & Culture', desc: 'UNESCO World Heritage! Sail among thousands of magnificent limestone karsts and islands, exploring magical caves.', transport: 'About 2.5h drive from Hanoi. Joining a 1-day or 2-day tour is highly recommended.', bookingLinks: [
        {url: 'https://www.klook.com/en-US/search/result/?query=halong%20bay&aid=117191', text: 'Halong Bay Luxury Day Cruise'},
        {url: 'https://www.klook.com/en-US/search/result/?query=halong%20bay%202%20days%201%20night&needQueryIdentification=true&spm=SearchResult.SearchSuggest_LIST&clickId=9fef9306ed&aid=117191', text: 'Halong Bay 2D1N Cruise'},
        {url: 'https://www.klook.com/en-US/search/result/?query=halong%20bay%203%20days%202%20nights&aid=117191', text: 'Halong Bay 3D2N Cruise'}
      ] },
      { id: 'sun_world_halong', city: 'ha_long', name: 'Sun World Halong & Cable Car', stay: 4, timeWindow: [9, 21], region: 20, regionName: 'Halong Bay', type: 'Landmarks', desc: 'Ride the world’s largest double-decker cable car to the Sun Wheel and enjoy panoramic night views of the bay.', transport: 'Located in Bai Chay, easily accessible via Grab within Halong City.' },

      // ================= Sapa =================
      { id: 'sp_fansipan', city: 'sapa', name: 'Fansipan Peak', stay: 4, timeWindow: [8, 17], region: 30, regionName: 'Sapa', type: 'Landmarks', desc: 'Ride the spectacular mountain train and cable car to the "Roof of Indochina". The sea of clouds is breathtaking.', transport: 'Take the Muong Hoa funicular from Sun Plaza in Sapa town to the cable car station.' },
      { id: 'sp_cat_cat', city: 'sapa', name: 'Cat Cat Village', stay: 3, timeWindow: [8, 18], region: 30, regionName: 'Sapa', type: 'History & Culture', desc: 'The closest Hmong village to town. Walk down the valley stairs to see terraces, waterfalls, and ethnic culture.', transport: 'Walk from Sapa town (downhill) or take a taxi.' },
      { id: 'sp_square', city: 'sapa', name: 'Sapa Square & Stone Church', stay: 1, timeWindow: [6, 22], region: 30, regionName: 'Sapa', type: 'History & Culture', desc: 'The core landmark of Sapa town. The weekend Love Market gathers here, surrounded by restaurants and cafes.', transport: 'Located right in the center of Sapa town; walk easily.' },
      { id: 'sp_ta_van', city: 'sapa', name: 'Ta Van & Lao Chai Trekking', stay: 4, timeWindow: [8, 17], region: 31, regionName: 'Sapa Suburbs', type: 'History & Culture', desc: 'Deep dive into the Muong Hoa Valley terraces. Escape the noise and experience authentic minority villages and trekking.', transport: 'Recommended to hire a private car or join a local trekking guide.' },

      // ================= Ninh Binh =================
      { id: 'ninh_binh', city: 'ninh_binh', name: 'Ninh Binh (Trang An/Tam Coc)', stay: 8, timeWindow: [8, 19], region: 21, regionName: 'Ninh Binh', type: 'History & Culture', desc: 'Known as the "Halong Bay on land". Ride a traditional rowboat through stunning karst landscapes and water caves.', transport: 'About 2 hours from Hanoi. Joining a local day tour is recommended.', bookingLinks: [
        {url: 'https://www.klook.com/en-US/activity/39366-ninh-binh-sightseeing-day-tour-local-experiences-hanoi/?aid=117191', text: 'Hoa Lu & Trang An Day Tour'}
      ] }
    ];

    // Main City Menu
    const CITIES = [
      { id: 'hanoi', name: '📍 Hanoi City', color: 'blue' },
      { id: 'ha_long', name: 'Halong Bay', color: 'cyan' },
      { id: 'sapa', name: 'Sapa (Terraces)', color: 'purple' },
      { id: 'ninh_binh', name: 'Ninh Binh', color: 'orange' }
    ];

    // --- Core Routing & Scheduling Logic ---
    const formatTime = (h) => {
      let hh = Math.floor(h) % 24;
      let mm = Math.round((h - Math.floor(h)) * 60);
      if (mm === 60) { hh++; mm = 0; }
      return `${hh.toString().padStart(2, '0')}:${mm.toString().padStart(2, '0')}`;
    };

    // Region color mapping for UI
    const getTagColor = (cityId, regionName) => {
      const colorMap = {
        'Hoan Kiem': 'blue',
        'Ba Dinh': 'fuchsia',
        'Tay Ho': 'emerald',
        'Dong Da': 'amber',
        'Airport': 'slate',
        'Halong Bay': 'cyan',
        'Sapa': 'purple',
        'Sapa Suburbs': 'purple',
        'Ninh Binh': 'orange'
      };
      
      const c = colorMap[regionName] || (cityId === 'hanoi' ? 'blue' : 'slate');
      return `text-${c}-600 bg-${c}-100 border-${c}-200`;
    };

    const getSmartTransit = (prev, curr) => {
      if (curr.id === 'ret') return '✈️ [Departure] Take a Grab, taxi, or Airport Bus to Noi Bai Int. Airport (HAN) for check-in.';

      if (!prev || prev.id.startsWith('acc_') || prev.type === 'Starting Point') {
        if (curr.type === 'Airport') return `🛬 [Arrival] Take Grab or Bus 86 to the city: ${curr.name}.`;
        return `🏨 [Heading to] Take a Grab or walk to ${curr.name}.`;
      }

      // Sapa intercity logic
      if (curr.city === 'sapa' || (prev && prev.city === 'sapa')) {
          if (prev && prev.city === curr.city) return `🚗 [Local Transit] Walk or take a taxi within Sapa to ${curr.name}.`;
          return `🚐 [Intercity Transit] Take a sleeper bus or train to/from Sapa (approx. 5.5 - 7 hours one way).`;
      }

      // Halong Bay intercity logic
      if (curr.city === 'ha_long' || (prev && prev.city === 'ha_long')) {
          if (prev && prev.city === curr.city) return `🚗 [Local Transit] Take a Grab within Halong City to ${curr.name}.`;
          return `🚐 [Intercity Transit] Take a luxury bus or tour transfer to/from Halong Bay (approx. 2.5 hours one way).`;
      }
      
      // Ninh Binh intercity logic
      if (curr.city === 'ninh_binh' || (prev && prev.city === 'ninh_binh')) {
          if (prev && prev.city === curr.city) return `🚗 [Local Transit] Take a Grab within Ninh Binh to ${curr.name}.`;
          return `🚐 [Intercity Transit] Take a bus or tour transfer to/from Ninh Binh (approx. 2 hours one way).`;
      }

      // Hanoi inter-district logic
      if (prev.city === 'hanoi' && curr.city === 'hanoi' && prev.regionName !== curr.regionName && !prev.id.startsWith('acc_') && prev.id !== 'hcmc_origin') {
          return `🚗 [Inter-District] Take a Grab or taxi from ${prev.regionName} to ${curr.regionName} (approx. 10-15 mins).`;
      }

      // General intercity fail-safe
      if (prev.city !== curr.city && prev.id !== 'hcmc_origin') {
         return `🚗 [Intercity Transit] Take a long-distance bus or private transfer.`;
      }

      return `🚶 [Local Transit] Walk or take a short Grab ride from ${prev.name} to ${curr.name}.`;
    };

    const getTTime = (isNewDay, fCity, tCity, fReg, tReg) => {
        let extraFarTime = 0;
        
        // Airport transit time
        if (fReg === 10 || tReg === 10 || fReg === 999 || tReg === 999) return 0.8; 

        // Cross-city massive transit gaps
        if ((fCity === 'sapa' && tCity !== 'sapa') || (tCity === 'sapa' && fCity !== 'sapa')) {
            extraFarTime += 6.0; 
        } else if ((fCity === 'ha_long' && tCity !== 'ha_long') || (tCity === 'ha_long' && fCity !== 'ha_long')) {
            extraFarTime += 2.5; 
        } else if ((fCity === 'ninh_binh' && tCity !== 'ninh_binh') || (tCity === 'ninh_binh' && fCity !== 'ninh_binh')) {
            extraFarTime += 2.0;
        }
        
        if (fCity && tCity && fCity !== tCity) {
            if (fCity === 'ha_long' || tCity === 'ha_long' || fCity === 'sapa' || tCity === 'sapa' || fCity === 'ninh_binh' || tCity === 'ninh_binh') return 0.5 + extraFarTime;
            return 0.4 + extraFarTime;
        }
        
        // Same city, different districts
        if (fCity === tCity && fReg !== tReg) {
            return 0.3 + extraFarTime;
        }
        
        if (isNewDay) return 0.3 + extraFarTime;
        return 0.2 + extraFarTime;
    };

    // --- Main Application ---
    function App() {
      const [activeCity, setActiveCity] = useState('hanoi');
      const [selectedIds, setSelectedIds] = useState([]);
      const [showPrintView, setShowPrintView] = useState(false);
      const [tripDuration, setTripDuration] = useState(5);

      const toggleAttr = (id) => setSelectedIds(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

      // Check if Sapa is selected for warning prompts
      const hasSapaSelected = selectedIds.some(id => {
          const attr = ATTRACTIONS.find(a => a.id === id);
          return attr && attr.city === 'sapa';
      });

      const itineraryDays = useMemo(() => {
        if (selectedIds.length === 0) return [];
        let idsToSchedule = [...new Set(selectedIds)];

        const getPriority = (item) => {
            if (item.id === 'ret') return 999;
            if (item.type === 'Starting Point') return 10;
            if (item.type === 'Airport') return 15;
            if (item.type === 'Accommodation') return 20; 
            let win = item.timeWindow || [9.5, 21.5];
            const isNight = (['Shopping & Nightlife'].includes(item.type) && win[1] >= 22) || item.id === 'ta_hien' || item.id === 'lotte_center' || item.id === 'hoan_kiem_lake' || item.id === 'night_market';
            if (isNight) return 90; 
            if (win[1] <= 17.5) return 30; 
            return 50; 
        };

        const sorted = idsToSchedule
          .map(id => ATTRACTIONS.find(a => a.id === id))
          .filter(a => a)
          .sort((a, b) => {
            const getSortKey = (item) => {
              let sk = getPriority(item);
              let cityGroup = CITIES.findIndex(c => c.id === item.city);
              return cityGroup * 100000 + sk * 1000; 
            };
            return getSortKey(a) - getSortKey(b);
          });

        let remaining = [...sorted];
        let days = [];
        let curDay = { items: [], dayCity: 'hanoi', dayType: null, currentTime: 13.0 }; 
        let lCity = 'hanoi', lReg = 11, prevItemObj = null; 

        const checkValid = (a, isF, curTime) => {
            let tTime = getTTime(isF, lCity, a.city, lReg, a.region);
            let arrivalTime = curTime + tTime;
            let isLastDay = days.length === tripDuration - 1;
            if (!isF) {
                if (!['Accommodation', 'Airport', 'Starting Point'].includes(a.type)) {
                    if (a.city !== lCity) {
                        if (remaining.some(r => r.city === lCity && !['Accommodation', 'Airport', 'Starting Point'].includes(r.type))) return false;
                        if (curTime > 15) return false;
                    }
                }
            }
            let win = a.timeWindow || [9, 22]; 
            if (['Accommodation', 'Airport'].includes(a.type)) win = [0, 24];
            let waitTime = arrivalTime < win[0] ? win[0] - arrivalTime : 0;
            if (waitTime > 2.0 && !isF) return false;
            let actStart = arrivalTime + waitTime;
            let actEnd = actStart + a.stay;
            if (actStart >= win[1] - 0.5) return false; 
            if (isLastDay) {
                let retTFromA = getTTime(false, a.city, 'hanoi', a.region, 10);
                if (actEnd > (14.0 - 2.5 - retTFromA)) return false;
            } else if (!isF && actEnd > 23.5) return false;
            return { valid: true, tTime, waitTime, actStart, actEnd };
        };

        while (remaining.length > 0) {
            const isF = curDay.items.length === 0;
            let chosenIdx = -1, chosenStats = null, validCands = [];
            for (let i = 0; i < remaining.length; i++) {
                let stats = checkValid(remaining[i], isF, curDay.currentTime);
                if (stats && stats.valid) validCands.push({ a: remaining[i], idx: i, prio: getPriority(remaining[i]), stats });
            }
            if (validCands.length > 0) {
                validCands.sort((ca, cb) => {
                    let isSameCityA = ca.a.city === lCity ? 1 : 0, isSameCityB = cb.a.city === lCity ? 1 : 0;
                    if (isSameCityA !== isSameCityB) return isSameCityB - isSameCityA;
                    if (ca.prio !== cb.prio) return ca.prio - cb.prio;
                    if (ca.stats.tTime !== cb.stats.tTime) return ca.stats.tTime - cb.stats.tTime;
                    return ca.idx - cb.idx; 
                });
                chosenIdx = validCands[0].idx; chosenStats = validCands[0].stats;
            }
            if (chosenIdx === -1) {
                days.push(curDay);
                if (days.length >= tripDuration) break;
                curDay = { items: [], dayCity: remaining[0].city, dayType: null, currentTime: 9.0 };
                continue;
            }
            const a = remaining.splice(chosenIdx, 1)[0];
            const { tTime, waitTime, actStart, actEnd } = chosenStats;
            if (isF && days.length === 0) prevItemObj = { id: 'hcmc_origin', city: 'hanoi', name: 'Arrival / Start', type: 'Starting Point' };
            if (isF && days.length > 0) prevItemObj = { id: 'acc_hanoi', city: a.city, name: `Lodging (${CITIES.find(c=>c.id===a.city)?.name || 'City'})`, type: 'Accommodation' }; 
            let sTime = curDay.currentTime, aTime = sTime + tTime;
            let transitMsg = getSmartTransit(prevItemObj, a) + `\n📍 Route Guide: ${a.transport}`;
            let win = a.timeWindow || [9, 22];
            if (actStart - aTime > 0 && win[0] > 0 && !['Accommodation', 'Airport'].includes(a.type)) transitMsg += `\n💡 Tip: Recommended to start after ${win[0]}:00. Arriving at ${formatTime(aTime)}, take a short break.`;
            curDay.items.push({ ...a, tTime: tTime.toFixed(1), prevName: prevItemObj.name, transitTransport: transitMsg, tStr: `${formatTime(sTime)} - ${formatTime(aTime)}`, sStr: (days.length === 0 && isF && a.type === 'Airport') ? 'Immigration' : `${formatTime(actStart)} - ${formatTime(actEnd)}`, isFirstAirport: (days.length === 0 && isF && a.type === 'Airport'), endTime: actEnd });
            curDay.currentTime = actEnd; lCity = a.city; lReg = a.region; prevItemObj = a;
            if (isF) curDay.dayCity = a.city;
        }
        if (curDay.items.length > 0 && days.length < tripDuration) days.push(curDay);
        while (days.length < tripDuration) days.push({ items: [], dayCity: lCity, dayType: null, currentTime: 9.0 });
        
        let lastD = days[days.length-1];
        if (!lastD) { lastD = { items: [], dayCity: 'hanoi', dayType: null, currentTime: 9.0 }; days.push(lastD); }
        while (lastD.items.length > 0) {
            let lastItem = lastD.items[lastD.items.length-1];
            if (lastItem.endTime > (14.0 - 2.5 - getTTime(false, lastItem.city, 'hanoi', lastItem.region, 10))) lastD.items.pop();
            else break;
        }
        if (lastD.items.length > 0) { let lastItem = lastD.items[lastD.items.length-1]; lastD.currentTime = lastItem.endTime; lCity = lastItem.city; lReg = lastItem.region; prevItemObj = lastItem; }
        else { lastD.currentTime = 9.0; lReg = 11; prevItemObj = { name: 'Lodging', city: lCity }; }
        let retT = getTTime(lastD.items.length === 0, lCity, 'hanoi', lReg, 10), startTransit = 14.0 - 2.5 - retT;
        let transitMsg = lastD.currentTime < startTransit ? `💡 You have some free time before heading to the airport. Recommended departure: ${formatTime(startTransit)}.\n🚐 Take a Grab to the airport.` : '🚐 Take a Grab or Bus 86 to Noi Bai Airport (HAN) for check-in.';
        lastD.items.push({ id: 'ret', city: 'hanoi', name: 'Journey Ends - Heading to Airport', stay: 2.5, region: 999, regionName: 'Airport', type: 'Airport', desc: 'Hope you had a perfect trip in Vietnam! Hanoi Airport can be crowded, please arrive early.', transport: 'Take a Grab directly to the airport.', tTime: retT.toFixed(1), prevName: prevItemObj.name, transitTransport: transitMsg, tStr: `${formatTime(startTransit)} - ${formatTime(14.0 - 2.5)}`, sStr: `${formatTime(14.0 - 2.5)} - 14:00`, isFirstAirport: false, endTime: 14.0 });
        lastD.currentTime = 14.0;

        return days.map((d, i) => ({ dayNum: i+1, totalH: (d.currentTime - (i === 0 ? 13.0 : 9.0) > 0 ? (d.currentTime - (i === 0 ? 13.0 : 9.0)).toFixed(1) : "0.0"), cityName: CITIES.find(c => c.id === d.dayCity)?.name.replace('📍 ','') || 'Hanoi', items: d.items }));
      }, [selectedIds, tripDuration]);

      if (showPrintView) {
        return (
          <div className="min-h-screen bg-white p-4 sm:p-8">
            <div className="max-w-3xl mx-auto border-2 border-slate-800 p-4 sm:p-8 rounded-2xl">
              <div className="text-center mb-10"><h1 className="text-2xl sm:text-3xl font-bold">🇻🇳 Custom Northern Vietnam Itinerary</h1><p className="mt-2 text-slate-500 text-sm">Smart scheduling system automatically calculates transit and operating hours</p></div>
              
              {hasSapaSelected && (
                <div className="mb-8 bg-purple-50 border border-purple-200 p-4 sm:p-5 rounded-xl print-break-avoid">
                  <h4 className="font-bold text-purple-800 text-sm sm:text-base mb-3 flex items-center gap-2">
                    <i className="fa-solid fa-bus"></i> 💡 Tip: You have Sapa in your itinerary. We recommend booking long-distance transport in advance.
                  </h4>
                  <div className="flex flex-col sm:flex-row gap-3 print-hidden">
                    <a href="https://www.klook.com/en-US/activity/133909-hanoi-sapa-sleeper-bus-by-hk-buslines/?spm=SearchResult.SearchResult_LIST&clickId=48e013a366&aid=117191" target="_blank" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-xs sm:text-sm px-3 py-2.5 rounded-lg font-bold transition-colors shadow-sm flex items-center justify-center gap-2 flex-1">
                      <i className="fa-solid fa-ticket"></i> Hanoi - Sapa Sleeper Bus
                    </a>
                    <a href="https://www.klook.com/en-US/activity/22928-viet-nam-rail-deluxe-train-sapa-hanoi/?spm=SearchResult.SearchResult_LIST&clickId=1217ceaafc&aid=117191" target="_blank" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-xs sm:text-sm px-3 py-2.5 rounded-lg font-bold transition-colors shadow-sm flex items-center justify-center gap-2 flex-1">
                      <i className="fa-solid fa-ticket"></i> Hanoi - Sapa Sleeper Train
                    </a>
                  </div>
                  <div className="hidden print:block text-xs text-slate-600 space-y-1">
                    <p>• Hanoi - Sapa HK Buslines Sleeper Bus (Search on Klook)</p>
                    <p>• Hanoi - Sapa Sleeper Train Tickets (Search on Klook)</p>
                  </div>
                </div>
              )}

              {itineraryDays.map(d => (
                <div key={d.dayNum} className="mb-10 print-break-avoid">
                  <h2 className="text-xl font-bold border-b-2 pb-2 mb-6">🌞 Day {d.dayNum} - 【{d.cityName}】 ({d.totalH}h)</h2>
                  <div className="space-y-6 ml-2 sm:ml-4 border-l-2 pl-4 sm:pl-6 border-slate-300">
                    {d.items.map((it, idx) => (
                      <div key={`${it.id}-${idx}`} className="relative mb-8">
                        {!it.isFirstAirport && (
                          <div className="mb-4 bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs sm:text-sm">
                             <div className="font-bold mb-2">{it.prevName} ➔ {it.name}</div>
                             <div className="flex gap-3 mb-2"><span className="bg-white px-2 py-1 rounded border font-mono text-blue-500"><i className="fa-regular fa-clock"></i> {it.tStr}</span><span>Est. Drive: {it.tTime}h</span></div>
                             <div className="whitespace-pre-wrap text-slate-600">{it.transitTransport}</div>
                          </div>
                        )}
                        <div className="relative">
                          <div className="absolute -left-[23px] sm:-left-[31px] top-1 w-3 h-3 bg-blue-500 rounded-full border-2 border-white"></div>
                          <div className="font-bold text-xs sm:text-sm text-slate-500 mb-1"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : 'Stay: '}{it.sStr}</div>
                          <h4 className="text-lg sm:text-xl font-bold text-slate-900">{it.name}</h4>
                          <p className="text-xs sm:text-sm text-slate-600 my-2 leading-relaxed">{it.desc}</p>
                          {it.bookingLinks && <div className="mt-3 flex gap-2 flex-wrap print:hidden">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" className="bg-[#ff5b00] text-white text-xs px-2.5 py-1.5 rounded font-bold hover:bg-[#e05000]"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              <div className="mt-10 text-center flex flex-col sm:flex-row justify-center gap-4 print-hidden">
                <button onClick={() => setShowPrintView(false)} className="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-700">Back to Editor</button>
                <button onClick={() => window.print()} className="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-500">Print / Save PDF</button>
              </div>
            </div>
          </div>
        );
      }

      const grouped = ATTRACTIONS.filter(a => a.city === activeCity && !a.id.startsWith('acc_')).reduce((acc, c) => { (acc[c.type] = acc[c.type] || []).push(c); return acc; }, {});

      return (
        <div className="min-h-screen bg-slate-50 pb-10 flex flex-col">
          <header role="banner" className="bg-white p-4 shadow-sm flex flex-wrap justify-between items-center sticky top-0 z-30 border-b gap-3">
            <div className="flex items-center gap-4">
              <h1 className="font-bold text-lg md:text-xl flex items-center gap-2"><i className="fa-solid fa-wand-magic-sparkles text-blue-600"></i>Vietnam Itinerary Wizard</h1>
              <a href="https://kokko-travel.com/en/hanoi/" aria-label="Back to Home" className="hidden sm:flex items-center gap-1.5 text-xs font-bold text-slate-500 hover:text-blue-600 bg-slate-100 hover:bg-blue-50 px-3 py-1.5 rounded-full border border-slate-200 transition-colors"><i className="fa-solid fa-house"></i> Home</a>
            </div>
            <div className="flex items-center gap-2 md:gap-3">
              <a href="https://kokko-travel.com/en/hanoi/" aria-label="Back to Home" className="sm:hidden flex items-center justify-center text-slate-500 hover:text-blue-600 bg-slate-100 w-8 h-8 rounded-full border border-slate-200"><i className="fa-solid fa-house text-sm"></i></a>
              {selectedIds.length > 0 && <button onClick={() => setSelectedIds([])} className="text-xs font-bold text-red-500 hover:text-white border border-red-500 hover:bg-red-500 px-3 py-1.5 rounded-full shadow-sm flex items-center gap-1 cursor-pointer transition-colors"><i className="fa-solid fa-trash-can"></i> Clear</button>}
              <div className="text-xs font-bold bg-slate-800 text-white px-3 py-1.5 rounded-full shadow-sm">Selected: {selectedIds.length}</div>
            </div>
          </header>
          
          <main role="main" className="flex-grow max-w-7xl mx-auto w-full p-4 flex flex-col lg:flex-row gap-6 mt-2">
            
            {/* Left Panel: Attraction Selection */}
            <section aria-label="Select Attractions" className="lg:w-1/2 flex flex-col gap-4">
              <div className="bg-white p-2 rounded-xl flex gap-2 overflow-x-auto shadow-sm custom-scrollbar scroll-smooth snap-x">
                {CITIES.map(c => <button key={c.id} onClick={() => setActiveCity(c.id)} className={`touch-target px-5 py-2 md:py-2.5 rounded-lg text-sm font-bold whitespace-nowrap transition-all snap-center ${activeCity === c.id ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 hover:bg-slate-200 text-slate-600'}`}>{c.name}</button>)}
              </div>
              
              <article aria-label="Smart Scheduling Tips" className="bg-white rounded-xl shadow-sm p-4 border border-slate-200">
                <h2 className="text-sm font-bold flex items-center gap-2 mb-1.5"><i className="fa-solid fa-circle-info text-blue-500"></i>Smart Scheduling Tips</h2>
                <p className="text-xs md:text-sm text-slate-500 leading-relaxed">The AI auto-schedules <strong className="text-orange-500">historical sites</strong> for daytime and <strong className="text-indigo-500">nightlife spots</strong> for evening. Intercity travel times (e.g., 6H to Sapa) are automatically calculated and factored in!</p>
              </article>

              <div className="max-h-[50vh] lg:max-h-[65vh] overflow-y-auto space-y-6 pr-2 custom-scrollbar">
                {Object.entries(grouped).map(([type, items]) => (
                  <div key={type} className="mb-6">
                    <h3 className="font-bold text-slate-700 mb-3 sticky top-0 bg-slate-50/95 py-2 backdrop-blur-sm z-10 border-b border-slate-200">{type}</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 md:gap-4">
                      {items.map(it => (
                        <div key={it.id} onClick={() => toggleAttr(it.id)} className={`p-4 md:p-5 rounded-xl cursor-pointer border-2 transition-all ${selectedIds.includes(it.id) ? 'bg-blue-50 border-blue-500 scale-[1.02] shadow-md' : 'bg-white border-transparent shadow-sm hover:border-slate-300'}`}>
                          <div className="font-bold text-slate-900 mb-2 md:text-lg">{it.name}</div>
                          <div className="text-[10px] md:text-xs flex flex-wrap gap-2 mb-2">
                            <span className="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600 font-medium"><i className="fa-regular fa-clock mr-1"></i>{it.stay}h</span>
                            <span className={`px-1.5 py-0.5 rounded border font-medium ${getTagColor(it.city, it.regionName)}`}><i className="fa-solid fa-location-dot mr-1"></i>{it.regionName}</span>
                          </div>
                          <p className="text-xs md:text-sm text-slate-500 line-clamp-2 leading-relaxed">{it.desc}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </section>

            {/* Right Panel: Itinerary Result */}
            <section aria-label="Generated Itinerary" className="lg:w-1/2">
              <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col max-h-[75vh] lg:max-h-[85vh] lg:sticky lg:top-24">
                <div className="bg-slate-800 text-white p-5 md:p-6 z-20">
                  <h2 className="text-xl font-bold flex items-center gap-2"><i className="fa-regular fa-calendar-check text-blue-400"></i>Your Custom Itinerary</h2>
                  <div className="flex flex-wrap gap-2 mt-4">
                    <select aria-label="Select Trip Duration" value={tripDuration} onChange={(e) => setTripDuration(Number(e.target.value))} className="flex-1 sm:flex-none bg-slate-700 text-white font-bold py-3 px-3 rounded-xl border border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none">
                      <option value={3}>3 Days</option><option value={4}>4 Days</option><option value={5}>5 Days</option><option value={6}>6 Days</option><option value={7}>7 Days</option>
                    </select>
                    <button onClick={() => setSelectedIds([])} className={`touch-target flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-4 py-3 rounded-xl font-bold shadow-sm transition-colors ${selectedIds.length > 0 ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-slate-600 text-slate-400 cursor-not-allowed'}`} disabled={selectedIds.length === 0}><i className="fa-solid fa-rotate-right"></i><span>Reset</span></button>
                    <button onClick={() => setShowPrintView(true)} disabled={itineraryDays.length === 0} className="touch-target w-full sm:flex-1 bg-blue-600 hover:bg-blue-500 py-3 px-2 rounded-xl font-bold text-white text-sm sm:text-base cursor-pointer disabled:opacity-40 disabled:cursor-not-allowed transition-colors shadow-md">Generate Detailed PDF</button>
                  </div>
                </div>
                <div className="p-5 md:p-6 overflow-y-auto flex-1 custom-scrollbar bg-slate-50/50">
                  
                  {hasSapaSelected && (
                    <div className="mb-6 bg-purple-50 border border-purple-200 p-4 rounded-xl shadow-sm">
                      <h4 className="font-bold text-purple-800 text-sm md:text-base mb-3 flex items-center gap-2">
                        <i className="fa-solid fa-bus"></i> 💡 Sapa Transport Booking Recommended
                      </h4>
                      <div className="flex flex-col gap-2.5">
                        <a href="https://www.klook.com/en-US/activity/133909-hanoi-sapa-sleeper-bus-by-hk-buslines/?spm=SearchResult.SearchResult_LIST&clickId=48e013a366&aid=117191" target="_blank" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-xs md:text-sm px-3.5 py-2.5 rounded-lg font-bold transition-colors shadow-sm flex items-center gap-2">
                          <i className="fa-solid fa-ticket"></i> Hanoi to Sapa Sleeper Bus
                        </a>
                        <a href="https://www.klook.com/en-US/activity/22928-viet-nam-rail-deluxe-train-sapa-hanoi/?spm=SearchResult.SearchResult_LIST&clickId=1217ceaafc&aid=117191" target="_blank" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-xs md:text-sm px-3.5 py-2.5 rounded-lg font-bold transition-colors shadow-sm flex items-center gap-2">
                          <i className="fa-solid fa-ticket"></i> Hanoi to Sapa Sleeper Train
                        </a>
                      </div>
                    </div>
                  )}

                  {itineraryDays.length === 0 ? <div className="text-center text-slate-400 py-20 flex flex-col items-center gap-4"><i className="fa-brands fa-fort-awesome text-6xl opacity-10"></i><p className="font-medium text-lg">Please select attractions from the left panel.</p></div> : 
                    itineraryDays.map(d => (
                      <article key={d.dayNum} className="mb-10">
                        <h3 className="font-bold text-lg md:text-xl mb-5 border-b-2 border-slate-200 pb-2 flex items-center gap-2 text-slate-800"><i className="fa-solid fa-sun text-orange-500"></i> Day {d.dayNum} - 【{d.cityName}】 <span className="text-xs font-normal text-slate-400 ml-auto bg-white px-2 py-1 rounded shadow-sm">Total: {d.totalH}h</span></h3>
                        <div className="space-y-6 border-l-[3px] border-slate-200 ml-4 pl-6 md:pl-8 relative pb-4">
                          {d.items.map((it, idx) => (
                            <div key={`${it.id}-${idx}`} className="relative mb-6">
                              {!it.isFirstAirport && (
                                <div className="mb-4 relative">
                                  <div className="absolute -left-[35px] md:-left-[43px] top-1/2 -translate-y-1/2 w-4 h-4 md:w-5 md:h-5 bg-slate-100 rounded-full border-2 border-slate-300 flex items-center justify-center shadow-sm z-10"><i className="fa-solid fa-arrow-down text-[8px] md:text-[10px] text-slate-400"></i></div>
                                  <div className={`rounded-xl p-3.5 md:p-4 text-xs md:text-sm border shadow-sm ${it.transitTransport.includes('Intercity') || it.transitTransport.includes('Suburbs') || it.transitTransport.includes('District') ? 'bg-red-50/80 border-red-100' : 'bg-blue-50/80 border-blue-100'}`}>
                                    <div className={`font-bold mb-2 md:text-base ${it.transitTransport.includes('Intercity') || it.transitTransport.includes('Suburbs') || it.transitTransport.includes('District') ? 'text-red-800' : 'text-blue-800'}`}>{it.prevName} ➔ {it.name}</div>
                                    <div className="flex flex-wrap items-center gap-2 mb-2">
                                      <span className={`bg-white px-2 py-0.5 rounded border font-mono shadow-sm ${it.transitTransport.includes('Intercity') || it.transitTransport.includes('Suburbs') || it.transitTransport.includes('District') ? 'border-red-200 text-red-600' : 'border-blue-200 text-blue-600'}`}><i className="fa-regular fa-clock mr-1"></i> {it.tStr}</span>
                                      <span className={`font-medium bg-white px-2 py-0.5 rounded shadow-sm ${it.transitTransport.includes('Intercity') || it.transitTransport.includes('Suburbs') || it.transitTransport.includes('District') ? 'text-red-600' : 'text-blue-600'}`}>Drive {it.tTime}h</span>
                                    </div>
                                    <div className="text-slate-600 whitespace-pre-wrap leading-relaxed mt-1.5">{it.transitTransport}</div>
                                  </div>
                                </div>
                              )}
                              <div className="bg-white p-4 md:p-5 rounded-2xl border border-slate-200 shadow-sm relative hover:shadow-md transition-shadow">
                                <div className="absolute -left-[33px] md:-left-[41px] top-4 md:top-5 w-4 h-4 md:w-5 md:h-5 bg-blue-500 rounded-full border-[3px] border-white shadow-sm z-10"></div>
                                <div className="text-xs md:text-sm font-bold text-slate-400 mb-1.5"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : 'Stay: '}{it.sStr}</div>
                                <h4 className="font-bold text-base md:text-lg mb-1.5 text-slate-800">{it.name}</h4>
                                <p className="text-xs md:text-sm text-slate-500 leading-relaxed">{it.desc}</p>
                                {it.bookingLinks && <div className="mt-3.5 flex gap-2 flex-wrap">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-[10px] md:text-xs px-2.5 py-1.5 rounded-lg font-bold transition-colors shadow-sm"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                              </div>
                            </div>
                          ))}
                        </div>
                      </article>
                    ))
                  }
                </div>
              </div>
            </section>
          </main>
          
          {/* Footer */}
          <footer role="contentinfo" className="w-full mt-10 pt-8 pb-12 border-t border-slate-200 text-center px-4">
            <div className="max-w-4xl mx-auto text-xs sm:text-sm text-slate-400 space-y-2 leading-relaxed">
              <p className="font-bold text-slate-500 text-sm sm:text-base mb-3">Copyright &copy; 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
              <p>All rights reserved. Unauthorized reproduction, modification, or commercial use is prohibited.</p>
              <p>Images, text content, and algorithms on this site are protected by law.</p>
            </div>
          </footer>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
