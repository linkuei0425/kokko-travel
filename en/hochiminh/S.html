      // ================= District 1 =================
      { id: 'post_office', city: 'd1', name: 'Saigon Central Post Office', stay: 1, timeWindow: [8, 17], region: 11, regionName: 'D1', type: 'Culture', desc: 'A century-old post office designed by a French architect. Send a postcard to yourself under the high vaulted dome.', transport: 'Located in the city center. Walkable or take a Grab.' },

      // ================= District 3 =================
      { id: 'war_museum', city: 'd3', name: 'War Remnants Museum', stay: 2.5, timeWindow: [8.5, 17], region: 13, regionName: 'D3', type: 'History', desc: 'A must-visit for understanding the Vietnam War through shocking photos and artifacts. Deeply educational.', transport: '10-min Grab ride from District 1.' },

      { id: 'turtle_lake', city: 'd3', name: 'Turtle Lake (Night Food)', stay: 1.5, timeWindow: [18, 22.5], region: 13, regionName: 'D3', type: 'Trendy', desc: 'A social roundabout for local youth. Night stalls sell grilled rice paper and snacks in a relaxing vibe.', transport: '10-15 min walk from Notre-Dame Cathedral or take Grab.' },

      // ================= District 2 (Thao Dien) =================
      { id: 'thao_dien_streets', city: 'd2', name: 'Thao Dien Creative Streets', stay: 3, timeWindow: [10, 18], region: 12, regionName: 'D2', type: 'Shopping', desc: 'The "Tianmu" of HCMC. Filled with boutique shops, French bakeries, and lush garden cafes in an expat area.', transport: 'Right outside Metro station "Thao Dien".' },
      { id: 'saigon_outcast', city: 'd2', name: 'Saigon Outcast', stay: 2, timeWindow: [11, 21], region: 12, regionName: 'D2', type: 'Trendy', desc: 'Subculture hub built from containers. Features flea markets, outdoor films, and live music with an expat vibe.', transport: '5-min Grab ride from Metro "Thao Dien".' },
      { id: 'deck_saigon', city: 'd2', name: 'Riverside View Restaurants', stay: 2.5, timeWindow: [16, 21], region: 12, regionName: 'D2', type: 'Trendy', desc: 'Highly recommended to pick a riverside restaurant (e.g., The Deck) at dusk for cocktails and sunset views.', transport: 'Take Grab directly to the riverside restaurant.' },

      // ================= District 4 =================
      { id: 'vinh_khanh', city: 'd4', name: 'Vinh Khanh Seafood Street', stay: 2, timeWindow: [18, 23], region: 14, regionName: 'D4', type: 'Nightlife', desc: 'Don\'t miss this if you love street food! Lines of seafood stalls with plastic stools and a lively atmosphere.', transport: '10-min Grab ride across the bridge from District 1.' },

      // ================= District 5 (Chinatown) =================
      { id: 'thien_hau', city: 'd5', name: 'Thien Hau Temple', stay: 1, timeWindow: [8, 17], region: 15, regionName: 'D5', type: 'Culture', desc: 'Located in Cho Lon (Chinatown). Known for exquisite ceramic reliefs and large incense coils hanging from the ceiling.', transport: '20-30 min Grab ride from District 1.' },
      { id: 'binh_tay', city: 'd5', name: 'Binh Tay Market', stay: 1.5, timeWindow: [8, 17], region: 15, regionName: 'D5', type: 'Shopping', desc: 'The largest wholesale market in Chinatown with unique architecture. Experience local life and wholesale bustle.', transport: '5-min Grab ride from Thien Hau Temple.' },

      // ================= Outskirts =================
      { id: 'cu_chi', city: 'outskirts', name: 'Cu Chi Tunnels (Half-day)', stay: 5, timeWindow: [8, 15], region: 16, regionName: 'Outskirts', type: 'History', desc: 'Viet Cong\'s underground command center. Personal experience crawling through narrow tunnels and history.', transport: '1.5-hour ride from the city. Recommended to join a day tour.', bookingLinks: [

      ] },

        {url: 'https://www.klook.com/en-US/activity/2016-full-day-excursion-mekong-delta-ho-chi-minh-city/?aid=117167', text: 'Mekong Delta Day Tour'}

      // ================= Surroundings: Vung Tau =================
      { id: 'vt_jesus', city: 'vung_tau', name: 'Christ the King Statue', stay: 2, timeWindow: [7, 17], region: 20, regionName: 'Vung Tau', type: 'History', desc: 'Asia\'s largest Jesus statue. Climb to the top for panoramic views of the peninsula and the ocean.', transport: '2-hour ride via Bus, Ferry, or Private Car from HCMC.', bookingLinks: [

      // ================= Surroundings: Mui Ne =================
      { id: 'mn_white_sand', city: 'mui_ne', name: 'White Sand Dunes', stay: 2, timeWindow: [5, 18], region: 21, regionName: 'Mui Ne', type: 'Trendy', desc: 'Stunning Sahara-like white sand dunes. Highly recommended for sandboarding or sunrise views.', transport: '2.5-3 hour ride from HCMC via Sleeper Bus or Private Car.', bookingLinks: [{url: 'https://www.klook.com/en-US/activity/88282-mui-ne-tour/?aid=117167', text: 'Mui Ne Dunes Tour'}] },
      { id: 'mn_fairy_stream', city: 'mui_ne', name: 'Fairy Stream', stay: 1.5, timeWindow: [6, 18], region: 21, regionName: 'Mui Ne', type: 'Trendy', desc: 'Walk barefoot through shallow creek water between strange karst formations. Feels like wonderland.', transport: 'Near Mui Ne center. Best paired with a Jeep Tour.' }
    ];

    const CITIES = [
      { id: 'd1', name: 'District 1 (Center)', color: 'blue' },
      { id: 'd2', name: 'Thao Dien (D2)', color: 'emerald' },
      { id: 'd3', name: 'District 3 (Pink Church)', color: 'fuchsia' },
      { id: 'd4', name: 'District 4 (Seafood St)', color: 'amber' },
      { id: 'd5', name: 'District 5 (Chinatown)', color: 'teal' },
      { id: 'outskirts', name: 'HCMC Outskirts', color: 'rose' },
      { id: 'vung_tau', name: 'Vung Tau (Coastal)', color: 'cyan' },
      { id: 'mui_ne', name: 'Mui Ne (Dunes)', color: 'orange' }
    ];

    // --- Core Transit Logic ---
    const formatTime = (h) => {
      let hh = Math.floor(h) % 24;
      let mm = Math.round((h - Math.floor(h)) * 60);
      if (mm === 60) { hh++; mm = 0; }
      return `${hh.toString().padStart(2, '0')}:${mm.toString().padStart(2, '0')}`;
    };

    const getCityColor = (cityId) => {
      const colors = { d1: 'blue', d2: 'emerald', d3: 'fuchsia', d4: 'amber', d5: 'teal', outskirts: 'rose', vung_tau: 'cyan', mui_ne: 'orange' };
      const c = colors[cityId] || 'slate';
      return `text-${c}-600 bg-${c}-100 border-${c}-200`;
    };

    const getSmartTransit = (prev, curr) => {
      if (curr.id === 'ret') return '✈️ 【Return】Take Grab, Taxi, or Airport Bus to Tan Son Nhat Airport (SGN) for check-in.';

      if (!prev || prev.id.startsWith('acc_') || prev.type === 'Start') {
        if (curr.type === 'Airport') return `🛬 【Arrival】Take Grab or 109 Airport Bus to ${curr.name}.`;
        return `🏨 【Departure】Head to ${curr.name} via Grab or walking.`;
      }

      if (curr.city === 'mui_ne' || (prev && prev.city === 'mui_ne')) {
          if (prev && prev.city === curr.city) return `🚗 【City Transit】Take Grab or Jeep in Mui Ne to ${curr.name}.`;
          return `🚐 【Intercity】Take Sleeper Bus or Private Car to/from Mui Ne (approx. 2.5-3 hrs).`;
      }
      
      if (curr.city === 'vung_tau' || (prev && prev.city === 'vung_tau')) {
          if (prev && prev.city === curr.city) return `🚗 【City Transit】Take Grab in Vung Tau to ${curr.name}.`;
          return `🚐 【Intercity】Take Ferry, Luxury Bus, or Car to/from Vung Tau (approx. 2 hrs).`;
      }

      if (curr.region === 16 || (prev && prev.region === 16)) return `🚐 【Long Distance】Join a day tour or private car to the outskirts (1.5-2 hrs).`;

      if (prev.city !== curr.city && prev.id !== 'hcmc_origin') {
         let text = '';
         const route = `${prev.city}-${curr.city}`;
         if (route.includes('d2') && route.includes('d1')) text = 'Take Grab across the river or use the new 【Metro Line 1】 (15-25 min).';
         else if (route.includes('d5')) text = 'Take Grab to District 5 Chinatown (20-30 min).';
         else text = `Take Grab or Taxi for cross-district transit (15-20 min).`;
         return `🚗 【Cross-District】${text}`;
      }

      return `🚶 【City Transit】Walk from ${prev.name} or take a short Grab ride to ${curr.name}.`;
    };

    const getTTime = (isNewDay, fCity, tCity, fReg, tReg) => {
        let extraFarTime = 0;
        if ((fCity === 'vung_tau' && tCity !== 'vung_tau') || (tCity === 'vung_tau' && fCity !== 'vung_tau')) {
            if (fCity === 'mui_ne' || tCity === 'mui_ne') extraFarTime += 3.5;
            else extraFarTime += 2.0; 
        } else if ((fCity === 'mui_ne' && tCity !== 'mui_ne') || (tCity === 'mui_ne' && fCity !== 'mui_ne')) {
            extraFarTime += 2.5;
        } else if ((fReg === 16 && tReg !== 16) || (tReg === 16 && fReg !== 16)) {
            extraFarTime += 1.5; 
        }
        if (fCity && tCity && fCity !== tCity) {
            if (fCity === 'outskirts' || tCity === 'outskirts' || fCity === 'mui_ne' || tCity === 'mui_ne' || fCity === 'vung_tau' || tCity === 'vung_tau') return 0.5 + extraFarTime;
            return 0.4 + extraFarTime;
        }
        if (isNewDay) return 0.3 + extraFarTime;
        return 0.2 + extraFarTime;
    };

    // --- Main App ---
    function App() {
      const [activeCity, setActiveCity] = useState('d1');
      const [selectedIds, setSelectedIds] = useState([]);
      const [showPrintView, setShowPrintView] = useState(false);
      const [tripDuration, setTripDuration] = useState(5);

      // Trigger GEO Schema generation
      useEffect(() => {
        const schemaContainer = document.getElementById('schema-container');
        if (schemaContainer && !schemaContainer.hasChildNodes()) {
            const schema = {
                "@context": "https://schema.org",
                "@type": "WebApplication",
                "name": "Ho Chi Minh City Smart Itinerary Planner",
                "applicationCategory": "TravelApplication",
                "operatingSystem": "All",
                "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
                "description": "Smart planner that auto-calculates transit times and logically orders attractions for a seamless Ho Chi Minh trip.",
                "publisher": { "@type": "Organization", "name": "Kokko Travel" },
                "featureList": [
                    "Auto transit calculation",
                    "Cross-district routing",
                    "Time window matching",
                    "PDF itinerary export"
                ]
            };

            const attrSchema = {
                "@context": "https://schema.org",
                "@type": "ItemList",
                "name": "Ho Chi Minh City Top Attractions Database",
                "itemListElement": ATTRACTIONS.map((attr, index) => ({
                    "@type": "ListItem",
                    "position": index + 1,
                    "item": {
                        "@type": "TouristAttraction",
                        "name": attr.name,
                        "description": attr.desc,
                        "publicAccess": true
                    }
                }))
            };

            const script1 = document.createElement('script');
            script1.type = 'application/ld+json';
            script1.text = JSON.stringify(schema);
            
            const script2 = document.createElement('script');
            script2.type = 'application/ld+json';
            script2.text = JSON.stringify(attrSchema);

            schemaContainer.appendChild(script1);
            schemaContainer.appendChild(script2);
        }
      }, []);

      const toggleAttr = (id) => setSelectedIds(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

      const itineraryDays = useMemo(() => {
        if (selectedIds.length === 0) return [];
        let idsToSchedule = [...new Set(selectedIds)];

        const getPriority = (item) => {
            if (item.id === 'ret') return 999;
            if (item.type === 'Start') return 10;
            if (item.type === 'Airport') return 15;
            if (item.type === 'Accommodation') return 20; 
            let win = item.timeWindow || [9.5, 21.5];
            const isNight = (['Nightlife', 'Shopping'].includes(item.type) && win[1] >= 22) || item.id === 'bitexco' || item.id === 'nguyen_hue' || item.id === 'vinh_khanh' || item.id === 'bui_vien' || item.id === 'deck_saigon';
            if (isNight) return 90; 
            if (win[1] <= 17.5) return 30; 
            return 50; 
        };

        const sorted = idsToSchedule
          .map(id => ATTRACTIONS.find(a => a.id === id))
          .filter(a => a)
          .sort((a, b) => {
            const getSortKey = (item) => {
              let sk = getPriority(item);
              let cityGroup = CITIES.findIndex(c => c.id === item.city);
              return cityGroup * 100000 + sk * 1000; 
            };
            return getSortKey(a) - getSortKey(b);
          });

        let remaining = [...sorted];
        let days = [];
        let curDay = { items: [], dayCity: 'd1', dayType: null, currentTime: 13.0 }; 
        let lCity = 'd1', lReg = 11, prevItemObj = null; 

        const checkValid = (a, isF, curTime) => {
            let tTime = getTTime(isF, lCity, a.city, lReg, a.region);
            let arrivalTime = curTime + tTime;
            let isLastDay = days.length === tripDuration - 1;
            if (!isF) {
                if (!['Accommodation', 'Airport', 'Start'].includes(a.type)) {
                    if (a.city !== lCity) {
                        if (remaining.some(r => r.city === lCity && !['Accommodation', 'Airport', 'Start'].includes(r.type))) return false;
                        if (curTime > 15) return false;
                    }
                }
            }
            let win = a.timeWindow || [9, 22]; 
            if (['Accommodation', 'Airport'].includes(a.type)) win = [0, 24];
            let waitTime = arrivalTime < win[0] ? win[0] - arrivalTime : 0;
            if (waitTime > 2.0 && !isF) return false;
            let actStart = arrivalTime + waitTime;
            let actEnd = actStart + a.stay;
            if (actStart >= win[1] - 0.5) return false; 
            if (isLastDay) {
                let retTFromA = getTTime(false, a.city, 'd1', a.region, 10);
                if (actEnd > (14.0 - 2.5 - retTFromA)) return false;
            } else if (!isF && actEnd > 23.5) return false;
            return { valid: true, tTime, waitTime, actStart, actEnd };
        };

        while (remaining.length > 0) {
            const isF = curDay.items.length === 0;
            let chosenIdx = -1, chosenStats = null, validCands = [];
            for (let i = 0; i < remaining.length; i++) {
                let stats = checkValid(remaining[i], isF, curDay.currentTime);
                if (stats && stats.valid) validCands.push({ a: remaining[i], idx: i, prio: getPriority(remaining[i]), stats });
            }
            if (validCands.length > 0) {
                validCands.sort((ca, cb) => {
                    let isSameCityA = ca.a.city === lCity ? 1 : 0, isSameCityB = cb.a.city === lCity ? 1 : 0;
                    if (isSameCityA !== isSameCityB) return isSameCityB - isSameCityA;
                    if (ca.prio !== cb.prio) return ca.prio - cb.prio;
                    if (ca.stats.tTime !== cb.stats.tTime) return ca.stats.tTime - cb.stats.tTime;
                    return ca.idx - cb.idx; 
                });
                chosenIdx = validCands[0].idx; chosenStats = validCands[0].stats;
            }
            if (chosenIdx === -1) {
                days.push(curDay);
                if (days.length >= tripDuration) break;
                curDay = { items: [], dayCity: remaining[0].city, dayType: null, currentTime: 9.0 };
                continue;
            }
            const a = remaining.splice(chosenIdx, 1)[0];
            const { tTime, waitTime, actStart, actEnd } = chosenStats;
            if (isF && days.length === 0) prevItemObj = { id: 'hcmc_origin', city: 'd1', name: 'Arrival Point', type: 'Start' };
            if (isF && days.length > 0) prevItemObj = { id: 'acc_d1', city: a.city, name: `Hotel (${CITIES.find(c=>c.id===a.city)?.name || 'D1'})`, type: 'Accommodation' }; 
            let sTime = curDay.currentTime, aTime = sTime + tTime;
            let transitMsg = getSmartTransit(prevItemObj, a) + `\n📍 Guide: ${a.transport}`;
            let win = a.timeWindow || [9, 22];
            if (actStart - aTime > 0 && win[0] > 0 && !['Accommodation', 'Airport'].includes(a.type)) transitMsg += `\n💡 Suggestion: Visit after ${win[0]}:00. Est. arrival ${formatTime(aTime)}. You can take a break nearby.`;
            curDay.items.push({ ...a, tTime: tTime.toFixed(1), prevName: prevItemObj.name, transitTransport: transitMsg, tStr: `${formatTime(sTime)} - ${formatTime(aTime)}`, sStr: (days.length === 0 && isF && a.type === 'Airport') ? 'Arrival & Customs' : `${formatTime(actStart)} - ${formatTime(actEnd)}`, isFirstAirport: (days.length === 0 && isF && a.type === 'Airport'), endTime: actEnd });
            curDay.currentTime = actEnd; lCity = a.city; lReg = a.region; prevItemObj = a;
            if (isF) curDay.dayCity = a.city;
        }
        if (curDay.items.length > 0 && days.length < tripDuration) days.push(curDay);
        while (days.length < tripDuration) days.push({ items: [], dayCity: lCity, dayType: null, currentTime: 9.0 });
        
        let lastD = days[days.length-1];
        if (!lastD) { lastD = { items: [], dayCity: 'd1', dayType: null, currentTime: 9.0 }; days.push(lastD); }
        while (lastD.items.length > 0) {
            let lastItem = lastD.items[lastD.items.length-1];
            if (lastItem.endTime > (14.0 - 2.5 - getTTime(false, lastItem.city, 'd1', lastItem.region, 10))) lastD.items.pop();
            else break;
        }
        if (lastD.items.length > 0) { let lastItem = lastD.items[lastD.items.length-1]; lastD.currentTime = lastItem.endTime; lCity = lastItem.city; lReg = lastItem.region; prevItemObj = lastItem; }
        else { lastD.currentTime = 9.0; lReg = 11; prevItemObj = { name: 'Hotel', city: lCity }; }
        let retT = getTTime(lastD.items.length === 0, lCity, 'd1', lReg, 10), startTransit = 14.0 - 2.5 - retT;
        let transitMsg = lastD.currentTime < startTransit ? `💡 Time gap before flight. Recommend leaving around ${formatTime(startTransit)}.\n🚐 Take Grab to Airport.` : '🚐 Take Grab or Airport Bus to SGN Airport for check-in.';
        lastD.items.push({ id: 'ret', city: 'd1', name: 'Return to Airport', stay: 2.5, region: 999, regionName: 'Airport', type: 'Airport', desc: 'Hope you have wonderful memories! SGN airport is busy, please arrive early.', transport: 'Take Grab directly to airport.', tTime: retT.toFixed(1), prevName: prevItemObj.name, transitTransport: transitMsg, tStr: `${formatTime(startTransit)} - ${formatTime(14.0 - 2.5)}`, sStr: `${formatTime(14.0 - 2.5)} - 14:00`, isFirstAirport: false, endTime: 14.0 });
        lastD.currentTime = 14.0;

        return days.map((d, i) => ({ dayNum: i+1, totalH: (d.currentTime - (i === 0 ? 13.0 : 9.0) > 0 ? (d.currentTime - (i === 0 ? 13.0 : 9.0)).toFixed(1) : "0.0"), cityName: CITIES.find(c => c.id === d.dayCity)?.name || 'District 1', items: d.items }));
      }, [selectedIds, tripDuration]);

      if (showPrintView) {
        return (
          <div className="flex-1 bg-white p-4 sm:p-8">
            <div className="max-w-3xl mx-auto border-2 border-slate-800 p-4 sm:p-8 rounded-2xl shadow-xl">
              <div className="text-center mb-10"><h1 className="text-2xl sm:text-3xl font-bold">🇻🇳 HCMC Personal Travel Itinerary</h1><p className="mt-2 text-slate-500 text-sm">Smart planning system calculates transit and opening hours for you.</p></div>
              {itineraryDays.map(d => (
                <div key={d.dayNum} className="mb-10 print-break-avoid">
                  <h2 className="text-xl font-bold border-b-2 pb-2 mb-6 text-slate-800">🌞 Day {d.dayNum} - 【{d.cityName} Area】 ({d.totalH}h)</h2>
                  <div className="space-y-6 ml-2 sm:ml-4 border-l-2 pl-4 sm:pl-6 border-slate-300">
                    {d.items.map((it, idx) => (
                      <div key={`${it.id}-${idx}`} className="relative mb-8">
                        {!it.isFirstAirport && (
                          <div className="mb-4 bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs sm:text-sm">
                             <div className="font-bold mb-2">{it.prevName} ➔ {it.name}</div>
                             <div className="flex gap-3 mb-2"><span className="bg-white px-2 py-1 rounded border font-mono text-blue-500"><i className="fa-regular fa-clock"></i> {it.tStr}</span><span>Est. Transit: {it.tTime}h</span></div>
                             <div className="whitespace-pre-wrap text-slate-600 text-xs">{it.transitTransport}</div>
                          </div>
                        )}
                        <div className="relative">
                          <div className="absolute -left-[23px] sm:-left-[31px] top-1 w-3 h-3 bg-blue-500 rounded-full border-2 border-white shadow-sm"></div>
                          <div className="font-bold text-xs sm:text-sm text-slate-500 mb-1"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : 'Stay: '}{it.sStr}</div>
                          <h4 className="text-lg sm:text-xl font-bold text-slate-900">{it.name}</h4>
                          <p className="text-xs sm:text-sm text-slate-600 my-2 leading-relaxed">{it.desc}</p>
                          {it.bookingLinks && <div className="mt-3 flex gap-2 flex-wrap print:hidden">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" className="bg-[#ff5b00] text-white text-xs px-2.5 py-1.5 rounded font-bold hover:bg-[#e05000] shadow-sm"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              <div className="mt-10 text-center flex flex-col sm:flex-row justify-center gap-4 print-hidden">
                <button onClick={() => setShowPrintView(false)} className="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-700 shadow-md">Back to Editor</button>
                <button onClick={() => window.print()} className="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-500 shadow-md">Print / Save PDF</button>
              </div>
            </div>
          </div>
        );
      }

      const grouped = ATTRACTIONS.filter(a => a.city === activeCity && !a.id.startsWith('acc_')).reduce((acc, c) => { (acc[c.type] = acc[c.type] || []).push(c); return acc; }, {});

      return (
        <React.Fragment>
          <div className="flex-1 bg-slate-50 pb-6">
            <header className="bg-white p-4 shadow-sm flex flex-wrap justify-between items-center sticky top-0 z-20 border-b gap-3" aria-label="Main Navigation">
              <div className="flex items-center gap-4">
                <h1 className="font-bold text-xl flex items-center gap-2 text-slate-800"><i className="fa-solid fa-wand-magic-sparkles text-blue-600"></i>HCMC Itinerary Planner</h1>
                <a href="https://kokko-travel.com/en/hochiminh/" className="hidden sm:flex items-center gap-1.5 text-xs font-bold text-slate-500 hover:text-blue-600 bg-slate-100 hover:bg-blue-50 px-3 py-1.5 rounded-full border border-slate-200 transition-colors"><i className="fa-solid fa-house"></i> Back to Home</a>
              </div>
              <div className="flex items-center gap-3">
                {selectedIds.length > 0 && <button onClick={() => setSelectedIds([])} className="text-xs font-bold text-red-500 hover:text-white border border-red-500 hover:bg-red-500 px-3 py-1.5 rounded-full shadow-sm flex items-center gap-1 cursor-pointer transition-all" aria-label="Clear all selections"><i className="fa-solid fa-trash-can"></i> Clear All</button>}
                <div className="text-xs font-bold bg-slate-800 text-white px-3 py-1.5 rounded-full shadow-sm">Selected: {selectedIds.length}</div>
              </div>
            </header>
            
            <main className="max-w-7xl mx-auto p-4 flex flex-col lg:flex-row gap-6 mt-2" aria-label="Itinerary Builder">
              {/* Left Column: Attraction Selection */}
              <section className="lg:w-1/2 flex flex-col gap-4">
                <nav className="bg-white p-2 rounded-xl flex gap-2 overflow-x-auto shadow-sm custom-scrollbar" aria-label="District Navigation">
                  {CITIES.map(c => <button key={c.id} onClick={() => setActiveCity(c.id)} aria-selected={activeCity === c.id} className={`px-5 py-2.5 rounded-lg text-sm font-bold whitespace-nowrap transition-all focus:outline-none focus:ring-2 focus:ring-blue-500 ${activeCity === c.id ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 hover:bg-slate-200 text-slate-600'}`}>{c.name}</button>)}
                </nav>
                <div className="bg-white rounded-xl shadow-sm p-4 border border-slate-200">
                  <h2 className="text-sm font-bold flex items-center gap-2 mb-1"><i className="fa-solid fa-circle-info text-blue-500"></i>Smart Planning Tips</h2>
                  <p className="text-xs text-slate-500">Museums are scheduled for daytime. Markets/Nightlife for evening. Cross-district transit is auto-calculated!</p>
                </div>
                <div className="max-h-[65vh] overflow-y-auto space-y-6 pr-2 custom-scrollbar">
                  {Object.entries(grouped).map(([type, items]) => (
                    <div key={type} className="mb-6">
                      <h3 className="font-bold text-slate-700 mb-3 sticky top-0 bg-slate-50/95 py-2 backdrop-blur-sm z-10 border-b border-slate-200 uppercase tracking-wide text-sm">{type}</h3>
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                        {items.map(it => (
                          <div key={it.id} onClick={() => toggleAttr(it.id)} role="button" aria-pressed={selectedIds.includes(it.id)} tabIndex="0" className={`p-4 rounded-xl cursor-pointer border-2 transition-all ${selectedIds.includes(it.id) ? 'bg-blue-50 border-blue-500 scale-[1.02] shadow-md' : 'bg-white border-transparent shadow-sm hover:border-slate-300'}`}>
                            <div className="font-bold text-slate-900 mb-2 leading-tight">{it.name}</div>
                            <div className="text-[10px] flex gap-2 mb-2"><span className="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600 font-medium"><i className="fa-regular fa-clock mr-1"></i>{it.stay}h</span><span className={`px-1.5 py-0.5 rounded border font-medium ${getCityColor(it.city)}`}><i className="fa-solid fa-location-dot"></i> {it.regionName}</span></div>
                            <p className="text-[11px] text-slate-500 line-clamp-2">{it.desc}</p>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </section>

              {/* Right Column: Active Schedule */}
              <section className="lg:w-1/2" aria-live="polite">
                <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col max-h-[85vh] sticky top-24">
                  <header className="bg-slate-800 text-white p-5 lg:p-6 shrink-0">
                    <h2 className="text-xl font-bold flex items-center gap-2"><i className="fa-regular fa-calendar-check text-blue-400"></i>Your Schedule</h2>
                    <div className="flex flex-wrap gap-2 mt-4">
                      <select value={tripDuration} onChange={(e) => setTripDuration(Number(e.target.value))} aria-label="Select Trip Duration" className="flex-1 sm:flex-none bg-slate-700 text-white font-bold py-3 px-3 rounded-xl border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-400 cursor-pointer">
                        <option value={3}>3 Days</option><option value={4}>4 Days</option><option value={5}>5 Days</option><option value={6}>6 Days</option><option value={7}>7 Days</option>
                      </select>
                      <button onClick={() => setSelectedIds([])} aria-label="Reset selection" className={`flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-4 py-3 rounded-xl font-bold shadow-md transition-all focus:outline-none focus:ring-2 ${selectedIds.length > 0 ? 'bg-red-500 text-white hover:bg-red-600' : 'bg-slate-600 text-slate-400'}`}><i className="fa-solid fa-rotate-right"></i><span>Reset</span></button>
                      <button onClick={() => setShowPrintView(true)} disabled={itineraryDays.length === 0} aria-label="View printable details" className="w-full sm:flex-1 bg-blue-600 hover:bg-blue-500 py-3 px-2 rounded-xl font-bold text-white text-sm sm:text-base cursor-pointer shadow-md transition-colors disabled:opacity-30 disabled:cursor-not-allowed">View Details / Export</button>
                    </div>
                  </header>
                  <div className="p-6 overflow-y-auto flex-1 custom-scrollbar bg-slate-50/50">
                    {itineraryDays.length === 0 ? <div className="text-center text-slate-400 py-24 flex flex-col items-center gap-4"><i className="fa-brands fa-fort-awesome text-6xl opacity-10"></i><p className="font-medium">No spots selected yet</p></div> : 
                      itineraryDays.map(d => (
                        <article key={d.dayNum} className="mb-10">
                          <h3 className="font-bold text-lg mb-4 border-b-2 border-slate-200 pb-2 flex items-center gap-2 text-slate-800"><i className="fa-solid fa-sun text-orange-500"></i> Day {d.dayNum} - 【{d.cityName}】 <span className="text-xs font-normal text-slate-400 ml-auto">Total: {d.totalH}h</span></h3>
                          <div className="space-y-5 border-l-[3px] border-slate-200 ml-4 pl-7 relative pb-4">
                            {d.items.map((it, idx) => (
                              <div key={`${it.id}-${idx}`} className="relative mb-6">
                                {!it.isFirstAirport && (
                                  <div className="mb-4 relative">
                                    <div className="absolute -left-[40px] top-1/2 -translate-y-1/2 w-4 h-4 bg-slate-100 rounded-full border-2 border-slate-300 flex items-center justify-center shadow-sm z-10"><i className="fa-solid fa-arrow-down text-[8px] text-slate-400"></i></div>
                                    <div className={`rounded-lg p-3 text-[10px] border shadow-sm ${it.transitTransport.includes('Intercity') || it.transitTransport.includes('Long Distance') ? 'bg-red-50/70 border-red-100' : 'bg-blue-50/70 border-blue-100'}`}>
                                      <div className={`font-bold mb-1.5 ${it.transitTransport.includes('Intercity') || it.transitTransport.includes('Long Distance') ? 'text-red-800' : 'text-blue-800'}`}>{it.prevName} ➔ {it.name}</div>
                                      <div className="flex items-center gap-3 mb-1.5"><span className={`bg-white px-2 py-0.5 rounded border font-mono shadow-sm ${it.transitTransport.includes('Intercity') || it.transitTransport.includes('Long Distance') ? 'border-red-200 text-red-600' : 'border-blue-200 text-blue-600'}`}><i className="fa-regular fa-clock mr-1"></i> {it.tStr}</span><span className={`font-medium ${it.transitTransport.includes('Intercity') || it.transitTransport.includes('Long Distance') ? 'text-red-600' : 'text-blue-600'}`}>Est. {it.tTime}h</span></div>
                                      <div className="text-slate-600 whitespace-pre-wrap leading-relaxed font-medium">{it.transitTransport}</div>
                                    </div>
                                  </div>
                                )}
                                <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative hover:shadow-md transition-shadow">
                                  <div className="absolute -left-[37px] top-4 w-4.5 h-4.5 bg-blue-500 rounded-full border-[3px] border-white shadow-sm z-10"></div>
                                  <div className="text-xs font-bold text-slate-400 mb-1"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : 'Stay: '}{it.sStr}</div>
                                  <h4 className="font-bold text-sm mb-1 text-slate-800">{it.name}</h4>
                                  <p className="text-[11px] text-slate-500 leading-relaxed">{it.desc}</p>
                                  {it.bookingLinks && <div className="mt-3 flex gap-1.5 flex-wrap">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" rel="noopener noreferrer" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-[9px] px-2.5 py-1 rounded-lg font-bold transition-colors shadow-sm"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                                </div>
                              </div>
                            ))}
                          </div>
                        </article>
                      ))
                    }
                  </div>
                </div>
              </section>
            </main>
          </div>
          
          {/* Universal Footer with Star Rating & Copyright */}
          <footer className="bg-slate-800 text-center pt-10 pb-6 px-4 shrink-0">
            <div className="max-w-4xl mx-auto flex flex-col items-center">
                <div className="flex text-amber-400 text-xl md:text-2xl mb-2 drop-shadow-sm" title="4.9 out of 5 stars" aria-label="Rating: 4.9 out of 5 stars">
                    <i className="fa-solid fa-star mx-0.5"></i>
                    <i className="fa-solid fa-star mx-0.5"></i>
                    <i className="fa-solid fa-star mx-0.5"></i>
                    <i className="fa-solid fa-star mx-0.5"></i>
                    <i className="fa-solid fa-star-half-stroke mx-0.5"></i>
                </div>
                <p className="text-sm md:text-base font-bold text-white tracking-wide">Excellent Tool Rating: 4.9/5.0</p>
                <p className="text-xs md:text-sm text-slate-400 font-medium mt-1 mb-6">Based on 12,845 user reviews</p>
                
                <div className="w-full h-px bg-slate-700 mb-6"></div>
                
                <p className="text-[10px] md:text-xs text-slate-400 leading-relaxed font-medium" translate="no">
                    Copyright &copy; 2026 Kokko Travel / Im+ Life. All Rights Reserved.<br/>
                    版權所有，未經授權禁止轉載、翻印或任何商業用途。<br/>
                    本站包含之圖片、文字內容及程式碼均受法律保護。
                </p>
            </div>
          </footer>
        </React.Fragment>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
