    <!-- [AEO, GEO, AAO] Dynamic JSON-LD Schema Injector -->
    <!-- This feeds structured data directly to LLMs, Perplexity, Google SGE, and AI Agents without them needing to render the DOM -->
    <script>
        function generateSchema(hotelData) {
            let itemListElement = [];
            let position = 1;

            for (const distKey in hotelData) {
                const district = hotelData[distKey];
                for (const catKey in district.categories) {
                    const hotels = district.categories[catKey];
                    hotels.forEach(hotel => {
                        itemListElement.push({
                            "@type": "ListItem",
                            "position": position++,
                            "item": {
                                "@type": "Hotel",
                                "name": hotel.name,
                                "description": hotel.feature.join(". "),
                                "address": {
                                    "@type": "PostalAddress",
                                    "streetAddress": hotel.address,
                                    "addressLocality": "Ho Chi Minh City",
                                    "addressCountry": "VN"
                                },
                                "url": hotel.url
                            }
                        });
                    });
                }
            }

            const schema = {
                "@context": "https://schema.org",
                "@type": "ItemList",
                "mainEntityOfPage": {
                    "@type": "WebPage",
                    "@id": "https://kokko-travel.com/en/hochminh/"
                },
                "name": "Top Premium Hotels in Ho Chi Minh City",
                "description": "Expertly curated list of the best hotels in Ho Chi Minh City across various districts and categories.",
                "itemListElement": itemListElement
            };

            const script = document.createElement('script');
            script.type = 'application/ld+json';
            script.text = JSON.stringify(schema);
            document.head.appendChild(script);
        }
    </script>

            // 2. Ensure it ends with &locale=en_xx&curr=USD
            // Remove existing locale/curr to prevent duplicates
            newUrl = newUrl.replace(/&locale=[^&]*/gi, '').replace(/&curr=[^&]*/gi, '');
            // Append correct formatting
            const separator = newUrl.includes('?') ? '&' : '?';

        function initDistrictButtons() {
            Object.keys(hotelData).forEach(key => {

                districtContainer.appendChild(btn);
            });
        }

        // 2. Select District
        function selectDistrict(key, activeBtn) {
            currentDistrictKey = key;

            const allBtns = districtContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('area-btn-active');
                btn.classList.add('area-btn-inactive');
                btn.setAttribute('aria-selected', 'false');
            });
            activeBtn.classList.remove('area-btn-inactive');
            activeBtn.classList.add('area-btn-active');
            activeBtn.setAttribute('aria-selected', 'true');

            categoryContainer.classList.remove('hidden');
            renderCategoryButtons();
        }

        // 3. Render Category Buttons
        function renderCategoryButtons() {
            categoryContainer.innerHTML = '';
            const currentCategories = Object.keys(hotelData[currentDistrictKey].categories);

                btn.onclick = () => selectCategory(cat, btn);
                categoryContainer.appendChild(btn);
            });

            const firstCatBtn = categoryContainer.querySelector('button');
            if(firstCatBtn) {
                selectCategory(currentCategories[0], firstCatBtn);
            }
        }

                                    ${hotel.name}
                                </h3>
                                ${linkTagHTML}
                            </div>
                            <div class="pl-0 sm:pl-8 space-y-3">
                                <div class="flex items-start">
                                    <span class="font-bold text-teal-800 bg-teal-100 px-2 py-0.5 rounded mr-3 flex-shrink-0 text-xs mt-0.5"><i class="fa-solid fa-star mr-1" aria-hidden="true"></i>Highlights</span> 
                                    <ul itemprop="description" class="list-disc pl-4 m-0 text-sm text-slate-700 leading-relaxed font-medium space-y-1.5 w-full">
                                        ${hotel.feature.map(item => `<li>${item}</li>`).join('')}
                                    </ul>
                                </div>
                                <div class="flex items-start" itemprop="address" itemscope itemtype="https://schema.org/PostalAddress">
                                    <span class="font-bold text-teal-800 bg-teal-100 px-2 py-0.5 rounded mr-3 flex-shrink-0 text-xs mt-0.5"><i class="fa-solid fa-map-pin mr-1" aria-hidden="true"></i>Location</span> 
                                    <span itemprop="streetAddress" class="text-sm text-slate-700 leading-relaxed font-medium pt-0.5">${hotel.address}</span>
                                </div>
                            </div>
                        </article>
                    `;
                });
                
                htmlContent += `</div>`;
            }

            contentArea.innerHTML = htmlContent;
        }

        // Horizontal Scroll Control
        function scrollDistricts(direction) {
            const container = document.getElementById('district-buttons');
            const scrollAmount = 200; 
            if (direction === 'left') {
                container.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
            } else {
                container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initDistrictButtons();
            const firstDistrictBtn = districtContainer.querySelector('button');
            if(firstDistrictBtn) {
                selectDistrict('d1', firstDistrictBtn);
            }
        });
    </script>
</body>
</html>
