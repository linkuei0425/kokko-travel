<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HCMC Hotel Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #5eead4; /* teal-300 */
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2dd4bf; /* teal-400 */
        }
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        /* Area Buttons - Teal Theme */
        .area-btn-active {
            background-color: #0f766e; /* teal-700 */
            color: white;
            border-color: #0f766e;
            box-shadow: 0 4px 6px -1px rgba(15, 118, 110, 0.3);
        }
        .area-btn-inactive {
            background-color: white;
            color: #4b5563; /* gray-600 */
            border-color: #d1d5db; /* gray-300 */
        }
        .area-btn-inactive:hover {
            background-color: #f0fdfa; /* teal-50 */
            color: #115e59; /* teal-800 */
            border-color: #5eead4; /* teal-300 */
        }

        /* Category Buttons */
        .cat-btn-active {
            background-color: #0d9488; /* teal-600 */
            color: white;
            border-color: #0d9488;
        }
        .cat-btn-inactive {
            background-color: #f8fafc; /* slate-50 */
            color: #64748b; /* slate-500 */
            border-color: #cbd5e1; /* slate-300 */
        }
        .cat-btn-inactive:hover {
            background-color: #f0fdfa; /* teal-50 */
            color: #0d9488;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="bg-[#f0fdfa] min-h-screen font-sans text-gray-800 pb-12">

    <div class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <div class="flex flex-col md:flex-row justify-center items-center gap-4 mb-3">
                <h1 class="text-3xl md:text-4xl font-extrabold text-teal-900 tracking-wide">
                    <i class="fa-solid fa-hotel mr-2 text-teal-600"></i>HCMC Hotel Guide
                </h1>
                <a href="https://linkuei0425.github.io/HoChiMinh-US/" class="inline-flex items-center px-4 py-2 bg-white hover:bg-teal-100 text-teal-700 text-sm font-bold rounded-lg transition-colors shadow-sm border border-teal-200">
                    <i class="fa-solid fa-house mr-2"></i>
                    Back to Home
                </a>
            </div>
            <p class="text-teal-600 font-medium text-sm md:text-base">Selected premium hotels in Ho Chi Minh City for a comfortable and convenient stay in Vietnam.</p>
        </header>

        <!-- First Layer: District Buttons (Horizontal Scroll) -->
        <div class="mb-6 overflow-hidden relative">
            <div class="flex items-center justify-between mb-3">
                <span class="text-sm font-bold text-teal-700 uppercase tracking-wider">Select District</span>
                <!-- Scroll Arrows -->
                <div class="flex gap-2">
                    <button onclick="scrollDistricts('left')" class="p-1.5 rounded-full bg-teal-100 text-teal-600 hover:bg-teal-200 transition-colors shadow-sm" aria-label="Scroll Left">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                        </svg>
                    </button>
                    <button onclick="scrollDistricts('right')" class="p-1.5 rounded-full bg-teal-100 text-teal-600 hover:bg-teal-200 transition-colors shadow-sm" aria-label="Scroll Right">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                        </svg>
                    </button>
                </div>
            </div>
            <div id="district-buttons" class="flex overflow-x-auto scrollbar-hide gap-3 pb-2 scroll-smooth">
                <!-- District buttons injected by JS -->
            </div>
        </div>

        <!-- Second Layer: Category Buttons -->
        <div id="category-buttons" class="flex flex-wrap justify-center gap-3 mb-8 bg-white p-3 rounded-xl shadow-sm border border-teal-100 hidden">
            <!-- Category buttons injected by JS -->
        </div>

        <!-- Content Area -->
        <div id="content-area" class="bg-white rounded-2xl shadow-md border border-teal-100 p-6 min-h-[400px]">
            <div class="flex h-full items-center justify-center text-teal-300 pt-20 pb-20">
                <p class="font-bold text-lg"><i class="fa-solid fa-spinner fa-spin mr-2"></i>Loading recommended hotels...</p>
            </div>
        </div>
    </div>

    <script>
        // HCMC Hotel Database (Translated to English with updated URLs)
        const hotelData = {
            "d1": {
                name: "District 1",
                categories: {
                    "Luxury": [
                        { name: "The Reverie Saigon", feature: ["HCMC's most luxurious 6-star hotel", "Gorgeous classic Italian royal decor", "High-floor sweeping views of the Saigon River at night"], address: "22-36 Nguyen Hue Boulevard, District 1", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-2507659/the-reverie-saigon/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" },
                        { name: "Park Hyatt Saigon", feature: ["Classic French colonial 5-star hotel", "Elegant and quiet environment with a stunning outdoor pool", "Prime location, steps away from the Opera House"], address: "2 Lam Son Square, District 1", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-2073112/park-hyatt-saigon/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" },
                        { name: "Caravelle Saigon", feature: ["Legendary historic hotel from the Vietnam War era", "Impeccable location in the heart of the city", "Renowned rooftop Saigon Saigon Bar for city night views"], address: "19-23 Lam Son Square, District 1", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-839839/caravelle-saigon/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" },
                        { name: "Hotel Majestic Saigon", feature: ["Built in 1925, retaining strong French colonial vibes", "Features a vintage, elegant old-style elevator", "Facing the Saigon River with a highly romantic historical charm"], address: "1 Dong Khoi Street, District 1", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-993081/hotel-majestic-saigon/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" }
                    ],
                    "High Value": [
                        { name: "Silverland Yen Hotel", feature: ["Relaxing wooden design blending Japanese and Vietnamese styles", "Stunning rooftop infinity warm jacuzzi", "Cozy atmosphere with great value for money"], address: "73-75 Thu Khoa Huan Street, District 1", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-713825/silverland-yen-hotel/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" },
                        { name: "The Hammock Hotel Fine Arts Museum", feature: ["Vibrant design-focused boutique hotel", "Every room features a signature relaxing hammock", "Free snacks and drinks in the rooftop lounge"], address: "59-61 Nguyen Thai Binh Street, District 1", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-2469821/the-hammock-hotel-fine-arts-museum/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" },
                        { name: "Liberty Central Saigon Citypoint", feature: ["Excellent location, walking distance to major attractions", "Rooftop infinity pool and lounge bar", "Perfect and convenient base for exploring the city"], address: "59-61 Pasteur Street, District 1", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-1171819/liberty-central-saigon-citypoint/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" },
                        { name: "Cochin Sang Hotel", feature: ["Quality boutique hotel with French retro style", "Every corner is well-designed and photogenic", "Features an outdoor hydrotherapy pool, surrounded by great food"], address: "28-30 Nguyen An Ninh Street, District 1", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-91659052/cochin-sang-hotel/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" },
                        { name: "Fusion Suites Saigon", feature: ["Minimalist wooden style focused on wellness and relaxation", "Rooms feature a unique 'floating bathtub' design", "Accommodation packages often include exclusive SPA services"], address: "3-5 Suong Nguyet Anh Street, District 1", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-5483003/fusion-suites-saigon/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" }
                    ],
                    "Boutique & Apartment": [
                        { name: "Sedona Suites Ho Chi Minh City", feature: ["Located above the famous Saigon Centre mall", "Premium serviced apartments with spacious rooms and full kitchens", "High floors offering unobstructed panoramic city views"], address: "67 Le Loi Boulevard, District 1", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-2125576/sedona-suites-ho-chi-minh-city/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" },
                        { name: "Sherwood Suites", feature: ["Luxurious and elegant apartment-style hotel design", "Provides fully equipped kitchens and spacious living rooms", "Ideal for family trips or long-term stays"], address: "192 Pasteur Street, District 3", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-12515356/sherwood-suites/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" }
                    ]
                }
            },
            "d2": {
                name: "District 2 (Thao Dien)",
                categories: {
                    "Riverside Resort": [
                        { name: "Mia Saigon – Luxury Boutique Hotel", feature: ["Top-tier French luxury resort hotel along the Saigon River", "Features a gorgeous outdoor pool and stunning river views", "Enjoy breakfast while watching boats go by for the ultimate vacation vibe"], address: "2-4 Street 10, An Phu Ward, District 2", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-40370975/mia-saigon-luxury-boutique-hotel/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" },
                        { name: "Villa Song Saigon", feature: ["Pure white riverside villa with strong French colonial flair", "Quiet and hidden environment, perfectly escaping the city noise", "Offers exclusive speedboat shuttle service to District 1"], address: "199 Nguyen Van Huong, Thao Dien Ward, District 2", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-1314801/villa-song-saigon/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" },
                        { name: "Thao Dien Boutique Hotel", feature: ["A tranquil oasis deep inside the Thao Dien area", "Features lush gardens and traditional Vietnamese-style architecture", "Full of Southeast Asian resort vibes for total relaxation"], address: "189-197 Nguyen Van Huong, Thao Dien Ward, District 2", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-123256976/thao-dien-masteri-riverside-saigon-home/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" },
                        { name: "Somerset Vista Ho Chi Minh City", feature: ["Well-known premium serviced apartment in Thao Dien", "Massive pool and fully equipped fitness club facilities", "Spacious rooms, highly suitable for families and kids"], address: "628C Hanoi Highway, An Phu Ward, District 2", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-703806/somerset-vista-ho-chi-minh-city/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" }
                    ]
                }
            },
            "d3": {
                name: "District 3",
                categories: {
                    "Quiet & Elegant": [
                        { name: "Hotel des Arts Saigon, MGallery", feature: ["Full of Parisian French flair and artistic atmosphere", "The rooftop glass infinity pool is a famous photo spot", "Features a popular high-altitude bar overlooking the city"], address: "76-78 Nguyen Thi Minh Khai, District 3", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-2637837/hotel-des-arts-saigon-mgallery-collection/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" },
                        { name: "Mai House Saigon Hotel", feature: ["High-quality French classical architecture exterior", "Interior decor filled with elegant French-Vietnamese fusion aesthetics", "Meticulous service with an exquisite and delicious breakfast"], address: "1-3-5 Ngo Thoi Nhiem, District 3", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-35913091/mai-house-saigon/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" },
                        { name: "La Vela Saigon Hotel", feature: ["Boasts the largest and most spectacular rooftop infinity pool in HCMC", "Enjoy stunning panoramic views of the city skyline from above", "Modern and spacious room design"], address: "280 Nam Ky Khoi Nghia, District 3", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-54612636/la-vela-saigon-hotel/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" },
                        { name: "Bach Suites Saigon", feature: ["A small boutique hotel located near Turtle Lake", "Striking black-and-white retro architectural exterior", "Rooms filled with European classical details and elegant ambiance"], address: "10A Phạm Ngọc Thạch, District 3", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-16052500/bach-suites-saigon/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" }
                    ]
                }
            },
            "d5": {
                name: "District 5",
                categories: {
                    "Budget & Convenient": [
                        { name: "Windsor Plaza Hotel", feature: ["Large 5-star hotel located in the District 5 Chinatown", "An Dong Plaza downstairs makes souvenir shopping extremely convenient", "Rooftop features a restaurant with excellent panoramic views"], address: "18 An Duong Vuong Street, District 5", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-758766/windsor-plaza-hotel/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" },
                        { name: "Equatorial Ho Chi Minh City", feature: ["Historic classic 5-star hotel with an excellent reputation", "Spacious rooms providing excellent living comfort", "Features a large outdoor swimming pool and gym, great value"], address: "242 Tran Binh Trong, District 5", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-993064/hotel-equatorial-ho-chi-minh-city/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" },
                        { name: "Zazz Urban Ho Chi Minh", feature: ["Vibrant and trendy design boutique hotel", "Bold modern color schemes with brand new facilities", "Offers a great sleep experience and a relaxing rooftop space"], address: "28 Su Van Hanh, District 5", url: "https://www.trip.com/hotels/ho-chi-minh-city-hotel-detail-42814486/zazz-urban-ho-chi-minh/?Allianceid=7913725&SID=303142750&trip_sub1=&trip_sub3=D14678848&locale=en_xx&curr=USD" }
                    ]
                }
            }
        };

        const districtContainer = document.getElementById('district-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const contentArea = document.getElementById('content-area');
        
        let currentDistrictKey = null;
        let currentCategoryName = null;

        // 1. Initialize District Buttons
        function initDistrictButtons() {
            Object.keys(hotelData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-5 py-2.5 rounded-full font-bold text-sm transition-all duration-200 border area-btn-inactive shadow-sm flex-shrink-0`;
                btn.innerHTML = `<i class="fa-solid fa-map-pin mr-1.5 opacity-70"></i>${hotelData[key].name}`;
                btn.onclick = () => selectDistrict(key, btn);
                districtContainer.appendChild(btn);
            });
        }

        // 2. Select District
        function selectDistrict(key, activeBtn) {
            currentDistrictKey = key;

            const allBtns = districtContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('area-btn-active');
                btn.classList.add('area-btn-inactive');
            });
            activeBtn.classList.remove('area-btn-inactive');
            activeBtn.classList.add('area-btn-active');

            categoryContainer.classList.remove('hidden');
            renderCategoryButtons();
        }

        // 3. Render Category Buttons
        function renderCategoryButtons() {
            categoryContainer.innerHTML = '';
            const currentCategories = Object.keys(hotelData[currentDistrictKey].categories);
            
            currentCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-5 py-2 rounded-lg font-bold text-sm transition-all duration-200 border cat-btn-inactive shadow-sm`;
                btn.innerText = cat;
                btn.onclick = () => selectCategory(cat, btn);
                categoryContainer.appendChild(btn);
            });

            // Default select the first category
            const firstCatBtn = categoryContainer.querySelector('button');
            if(firstCatBtn) {
                selectCategory(currentCategories[0], firstCatBtn);
            }
        }

        // 4. Select Category
        function selectCategory(categoryName, activeBtn) {
            currentCategoryName = categoryName;

            const allBtns = categoryContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('cat-btn-active');
                btn.classList.add('cat-btn-inactive');
            });
            activeBtn.classList.remove('cat-btn-inactive');
            activeBtn.classList.add('cat-btn-active');

            renderHotels();
        }

        // 5. Render Hotel Data
        function renderHotels() {
            const districtData = hotelData[currentDistrictKey];
            const hotels = districtData.categories[currentCategoryName] || [];

            let htmlContent = `
                <div class="flex flex-col sm:flex-row sm:items-center mb-6 border-b pb-4 border-teal-100 animate-fade-in">
                    <h2 class="text-2xl font-bold text-teal-900 mr-3">
                        <i class="fa-solid fa-location-dot mr-2 text-teal-500"></i>${districtData.name}
                    </h2>
                    <span class="inline-block mt-2 sm:mt-0 px-3 py-1 bg-teal-100 text-teal-800 text-sm font-bold rounded-full border border-teal-200">
                        <i class="fa-solid fa-tag mr-1"></i>${currentCategoryName}
                    </span>
                </div>
            `;

            if (hotels.length === 0) {
                htmlContent += `<p class="text-slate-500 py-10 text-center animate-fade-in">No recommended hotels available in this category.</p>`;
            } else {
                htmlContent += `<div class="space-y-5">`;
                
                hotels.forEach((hotel, index) => {
                    const linkTagHTML = hotel.url 
                        ? `<a href="${hotel.url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center px-5 py-2.5 mt-3 sm:mt-0 rounded-xl text-sm font-bold bg-[#ff5b00] text-white hover:bg-[#e05000] transition-colors shadow-sm cursor-pointer sm:ml-auto w-full sm:w-auto">
                               <i class="fa-solid fa-magnifying-glass mr-1.5"></i>View Details
                           </a>`
                        : '';

                    htmlContent += `
                        <div class="bg-white border border-teal-100 p-5 md:p-6 rounded-2xl hover:shadow-lg transition-all duration-300 animate-fade-in" style="animation-delay: ${index * 0.05}s;">
                            <div class="flex flex-col sm:flex-row sm:items-start justify-between mb-4 gap-2">
                                <h4 class="text-xl font-bold text-teal-900 flex items-start leading-tight pt-1">
                                    <span class="text-white bg-teal-500 rounded-full w-6 h-6 inline-flex items-center justify-center text-sm mr-2 flex-shrink-0">${index + 1}</span> 
                                    ${hotel.name}
                                </h4>
                                ${linkTagHTML}
                            </div>
                            <div class="pl-0 sm:pl-8 space-y-3">
                                <div class="flex items-start">
                                    <span class="font-bold text-teal-800 bg-teal-100 px-2 py-0.5 rounded mr-3 flex-shrink-0 text-xs mt-0.5"><i class="fa-solid fa-star mr-1"></i>Highlights</span> 
                                    <ul class="list-disc pl-4 m-0 text-sm text-slate-700 leading-relaxed font-medium space-y-1.5 w-full">
                                        ${hotel.feature.map(item => `<li>${item}</li>`).join('')}
                                    </ul>
                                </div>
                                <div class="flex items-start">
                                    <span class="font-bold text-teal-800 bg-teal-100 px-2 py-0.5 rounded mr-3 flex-shrink-0 text-xs mt-0.5"><i class="fa-solid fa-map-pin mr-1"></i>Location</span> 
                                    <span class="text-sm text-slate-700 leading-relaxed font-medium pt-0.5">${hotel.address}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                htmlContent += `</div>`;
            }

            contentArea.innerHTML = htmlContent;
        }

        // Horizontal Scroll Control
        function scrollDistricts(direction) {
            const container = document.getElementById('district-buttons');
            const scrollAmount = 200; // Scroll distance
            if (direction === 'left') {
                container.scrollBy({ left: -scrollAmount, behavior: 'smooth' });
            } else {
                container.scrollBy({ left: scrollAmount, behavior: 'smooth' });
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initDistrictButtons();
            const firstDistrictBtn = districtContainer.querySelector('button');
            if(firstDistrictBtn) {
                selectDistrict('d1', firstDistrictBtn);
            }
        });
    </script>
</body>
</html>
