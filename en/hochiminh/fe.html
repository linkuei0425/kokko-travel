<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ho Chi Minh City Travel Guide</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Hide scrollbar but keep functionality */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body id="app-body" class="min-h-screen font-sans pb-12 transition-colors duration-500 text-gray-800">

  <!-- Header -->
  <header id="app-header" class="bg-white/80 backdrop-blur-md sticky top-0 z-10 shadow-sm border-b transition-colors duration-500">
    
    <!-- Back to Home Button -->
    <div class="max-w-6xl mx-auto px-4 pt-4">
      <a href="https://linkuei0425.github.io/HoChiMinh-US/" class="inline-flex items-center px-3 py-1.5 text-sm font-medium text-gray-600 bg-white/60 hover:bg-white hover:text-gray-900 rounded-full border border-gray-200 shadow-sm transition-all duration-300 hover:shadow-md hover:-translate-x-1">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-1"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        Back to Home
      </a>
    </div>

    <div class="max-w-6xl mx-auto px-4 pb-6 pt-2">
      <div class="flex items-center justify-center space-x-3 mb-2">
        <div id="title-icon-left" class="animate-pulse"></div>
        <h1 class="text-2xl md:text-3xl font-bold text-gray-800 transition-colors duration-500 text-center">
          Pearl of the Far East: Ho Chi Minh City
        </h1>
        <div id="title-icon-right" class="animate-pulse"></div>
      </div>
      <p class="text-center text-gray-500 text-sm md:text-base">
        Selected <span id="season-text" class="font-semibold">Historical</span> Must-Visit Spots in District 1, 2, 3, 4, 5
      </p>
    </div>

    <!-- Category Toggle -->
    <div class="flex justify-center mb-4">
      <div class="bg-gray-100/80 backdrop-blur-sm p-1.5 rounded-full inline-flex border border-gray-200 shadow-inner">
        <button id="btn-history" class="flex items-center px-5 py-2 rounded-full text-sm font-bold transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M2 22h20"/><path d="M12 2v20"/><path d="m4 12 8-8 8 8"/><path d="M6 22v-6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v6"/></svg>
          Historical
        </button>
        <button id="btn-trendy" class="flex items-center px-5 py-2 rounded-full text-sm font-bold transition-all duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>
          Trendy & Photogenic
        </button>
      </div>
    </div>
    
    <!-- Navigation Tabs -->
    <div class="max-w-4xl mx-auto px-4 pb-4">
      <div id="tabs-container" class="flex overflow-x-auto hide-scrollbar space-x-2 md:justify-center py-2">
        <!-- Tabs injected by JS -->
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-4 mt-8">
    <div class="mb-6 flex items-center space-x-2 transition-colors duration-500" id="section-title-container">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
      <h2 id="section-title" class="text-2xl font-bold border-b-2 pb-1 pr-4 inline-block transition-colors duration-500">
        District 1 Highlights
      </h2>
    </div>

    <div id="cards-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <!-- Cards injected by JS -->
    </div>
  </main>
  
  <!-- Footer -->
  <footer class="max-w-6xl mx-auto px-4 mt-16 text-center text-gray-400 text-sm">
    <p id="footer-text">※ HCMC Metro Line 1 is now open for District 1 and Thao Dien. For other areas, Grab is highly recommended due to hot weather and occasional showers.</p>
  </footer>

  <script>
    const historyData = {
      'District 1': [
        { name: 'Saigon Central Post Office', feature: 'Designed by a French architect, it is full of classic French style. The high dome and vintage map walls are must-take photo spots. You can buy a postcard here and send it to yourself or friends.', transport: '🚇 【Metro】Take Metro Line 1 to "Opera House" station, walk for about 8 mins.<br>🚗 【Grab】Easy to book from anywhere in the city. Good to visit along with the Notre Dame Cathedral.' },
        { name: 'Independence Palace', feature: 'Former South Vietnam Presidential Palace, perfectly preserving the 60s architecture, diplomatic reception rooms, and underground military command center. An important landmark to understand modern Vietnamese history.', transport: '🚇 【Metro】Take Metro Line 1 to "Ben Thanh" station, walk along Le Duan Boulevard for about 10 mins.<br>🚗 【Grab】About a 5-10 min ride from the city center.' },
        { name: 'Notre Dame Cathedral of Saigon', feature: 'Built with red bricks imported from France, featuring magnificent twin towers. Although currently under renovation and closed inside, its exterior remains the most representative spiritual landmark in HCMC.', transport: '🚇 【Metro】Take Metro Line 1 to "Opera House" station, walk for about 8 mins.<br>🚗 【Grab】Right next to the Saigon Central Post Office.' }
      ],
      'District 3': [
        { name: 'War Remnants Museum', feature: 'Displays the cruelty of the Vietnam War through historical photos and artifacts (e.g., US fighter jets and tanks). Although the atmosphere is heavy, it is highly educational and a must-visit.', transport: '🚇 【Metro】No direct access.<br>🚗 【Grab】Recommend taking a Grab from District 1 (like Ben Thanh), about a 10-minute ride.' },
        { name: 'Vinh Nghiem Pagoda', feature: 'One of the largest Buddhist temples in HCMC, blending traditional Vietnamese Buddhism with modern architecture. The temple features a seven-story stupa with a solemn atmosphere.', transport: '🚇 【Metro】No direct access.<br>🚗 【Grab】A bit far from the city center, taking a Grab is highly recommended.' }
      ],
      'District 4': [
        { name: 'Ho Chi Minh Museum (Dragon Wharf)', feature: 'Unique French-Vietnamese mixed architecture on the Saigon River. This is where Ho Chi Minh left Vietnam to seek a way to save the country. Now a museum displaying his life.', transport: '🚇 【Metro】No direct access.<br>🚗 【Grab】Just across the bridge from District 1, about a 5-10 min ride. Very close.' }
      ],
      'District 5': [
        { name: 'Thien Hau Temple', feature: 'Located in Cho Lon (Chinatown), built in the 18th century. The exquisite ceramic reliefs and large incense coils hanging from the ceiling are its biggest features, full of traditional atmosphere.', transport: '🚇 【Metro】No direct access.<br>🚗 【Grab】Located in Chinatown, about a 20-30 min ride from District 1. Grab is strongly recommended.' },
        { name: 'Binh Tay Market', feature: 'The largest wholesale market in the Cho Lon area, featuring a unique French clock tower exterior and Chinese courtyard design. A great place to experience local life and wholesale vitality.', transport: '🚇 【Metro】No direct access.<br>🚗 【Grab】Also in District 5, about a 5 min ride from Thien Hau Temple.' }
      ]
    };

    const trendyData = {
      'District 1': [
        { name: 'The Cafe Apartments', feature: 'An entire nine-story old apartment building turned into dozens of cafes and creative shops. When lit up at night, it looks like a Rubik\'s Cube. The most iconic hipster spot in HCMC.', transport: '🚇 【Metro】Take Metro Line 1 to "Opera House", exit to Nguyen Hue Street, walk about 3-5 mins.<br>🚗 【Grab】Set destination directly to "The Cafe Apartment".' },
        { name: 'Nguyen Hue Walking Street', feature: 'A spacious walking street leading directly to the beautiful HCMC People\'s Committee building. Cool in the evening, surrounded by luxury hotels and malls. Street performers gather at night.', transport: '🚇 【Metro】Take Metro Line 1 to "Opera House", exit right at the square.<br>🚗 【Grab】Can be pinned to HCMC Opera House or City Hall.' },
        { name: 'Bui Vien Walking Street', feature: 'The famous sleepless street packed with bars, restaurants, and street food. Deafening music and dazzling lights at night. The top choice to experience HCMC\'s crazy nightlife.', transport: '🚇 【Metro】Take Metro Line 1 to "Ben Thanh", walk about 10 mins.<br>🚗 【Grab】Heavy traffic and controlled access at night, recommend dropping off at the intersection and walking in.' }
      ],
      'District 2 (Thao Dien)': [
        { name: 'Thao Dien Creative Neighborhood', feature: 'Known as the expat enclave, full of exotic vibes. The streets are lined with high-quality boutique shops, French bakeries, handicrafts, and lush garden cafes.', transport: '🚇 【Metro】Take Metro Line 1 to "Thao Dien" or "An Phu" station, right outside the exit.<br>🚗 【Grab】About a 20-30 min ride from the city center across the Saigon River.' },
        { name: 'Saigon Outcast', feature: 'A subculture and art settlement built from shipping containers. Often hosts weekend flea markets, farmer\'s markets, and outdoor cinemas. Full of a free-spirited vibe.', transport: '🚇 【Metro】Take Metro Line 1 to "Thao Dien", then transfer to a 5-min Grab ride.<br>🚗 【Grab】Pin "Saigon Outcast" directly.' },
        { name: 'Riverside Restaurants', feature: 'Thao Dien borders the Saigon River. It\'s highly recommended to pick a high-altitude bar or riverside restaurant here in the evening to enjoy dinner or cocktails while watching the sunset.', transport: '🚇 【Metro】Take Metro Line 1 to "Thao Dien", take a short Grab ride or walk to the riverside.<br>🚗 【Grab】Recommend taking a Grab directly to your reserved restaurant.' }
      ],
      'District 3': [
        { name: 'Tan Dinh Church (Pink Church)', feature: 'Features a dreamy macaron pink exterior with Gothic and Renaissance architectural details. The hottest Instagram spot that looks eye-catching from every angle.', transport: '🚇 【Metro】No direct access.<br>🚗 【Grab】Located on Hai Ba Trung St with heavy traffic. About a 10-15 min Grab ride from District 1.' },
        { name: 'Turtle Lake Coffee Streets', feature: 'A roundabout landmark where local youth gather. Hidden around this seemingly ordinary roundabout are many design-focused independent cafes and unique street food stalls.', transport: '🚇 【Metro】No direct access.<br>🚗 【Grab】Not far from District 1. Can take a Grab from Opera House or walk about 15-20 mins.' }
      ],
      'District 4': [
        { name: 'Xom Chieu Market & Alley 200', feature: 'The most representative traditional market in District 4. A fresh food hub by day, the surrounding "Alley 200" turns into a local food paradise by late afternoon. Best place for authentic street food.', transport: '🚇 【Metro】No direct access.<br>🚗 【Grab】Deep in District 4 with narrow alleys. Recommend taking a Grab (car or bike) to the outer edge and walking.' },
        { name: 'Vinh Khanh Seafood Street', feature: 'Don\'t miss this if you want to experience Vietnamese nightlife and street seafood! The street is packed with seafood restaurants and plastic stools. Very lively and grounded vibe.', transport: '🚇 【Metro】No direct access.<br>🚗 【Grab】Crowded and bustling at night. About a 10-15 min Grab ride from District 1.' }
      ]
    };

    // States
    let activeCategory = 'history';
    let activeTab = 'District 1';

    // SVG Icons
    const svgMonument = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 22h20"/><path d="M12 2v20"/><path d="m4 12 8-8 8 8"/><path d="M6 22v-6a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v6"/></svg>`;
    const svgCamera = `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3"/></svg>`;
    const svgSparkles = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-400 mr-2 flex-shrink-0 mt-0.5"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>`;
    const svgMapPin = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500 mr-2 flex-shrink-0 mt-0.5"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>`;

    // Theme config
    const themeConfig = {
      history: {
        bg: 'bg-amber-50', selection: 'selection:bg-amber-300', textMain: 'text-amber-600',
        borderMain: 'border-amber-100', tabActive: 'bg-amber-600 text-white shadow-md transform scale-105',
        tabHover: 'bg-white text-gray-600 hover:bg-amber-100 hover:text-amber-700', iconH2: 'text-amber-600', borderH2: 'border-amber-200',
        cardGradient: 'from-amber-300 via-amber-400 to-amber-300 group-hover:from-amber-400 group-hover:to-amber-500',
        numberBg: 'bg-amber-100 text-amber-700', transportBg: 'bg-amber-50',
        btnActive: 'bg-white text-amber-600 shadow-sm transform scale-105',
        btnInactive: 'text-gray-500 hover:text-amber-500 hover:bg-white/50'
      },
      trendy: {
        bg: 'bg-teal-50', selection: 'selection:bg-teal-300', textMain: 'text-teal-600',
        borderMain: 'border-teal-100', tabActive: 'bg-teal-500 text-white shadow-md transform scale-105',
        tabHover: 'bg-white text-gray-600 hover:bg-teal-100 hover:text-teal-600', iconH2: 'text-teal-600', borderH2: 'border-teal-200',
        cardGradient: 'from-teal-300 via-teal-400 to-teal-300 group-hover:from-teal-400 group-hover:to-teal-500',
        numberBg: 'bg-teal-100 text-teal-600', transportBg: 'bg-teal-50',
        btnActive: 'bg-white text-teal-600 shadow-sm transform scale-105',
        btnInactive: 'text-gray-500 hover:text-teal-500 hover:bg-white/50'
      }
    };

    function updateTheme() {
      const t = themeConfig[activeCategory];
      
      // Body & Header
      document.getElementById('app-body').className = `min-h-screen font-sans pb-12 transition-colors duration-500 text-gray-800 ${t.bg} ${t.selection} selection:text-white`;
      document.getElementById('app-header').className = `bg-white/80 backdrop-blur-md sticky top-0 z-10 shadow-sm border-b transition-colors duration-500 ${t.borderMain}`;
      
      // Icons & Text
      const iconSvg = activeCategory === 'history' ? svgMonument : svgCamera;
      document.getElementById('title-icon-left').innerHTML = iconSvg;
      document.getElementById('title-icon-right').innerHTML = iconSvg;
      document.getElementById('title-icon-left').className = `animate-pulse ${t.textMain}`;
      document.getElementById('title-icon-right').className = `animate-pulse ${t.textMain}`;
      
      document.getElementById('season-text').innerText = activeCategory === 'history' ? 'Historical' : 'Trendy';

      // Section Title
      document.getElementById('section-title-container').className = `mb-6 flex items-center space-x-2 transition-colors duration-500 ${t.iconH2}`;
      document.getElementById('section-title').className = `text-2xl font-bold border-b-2 pb-1 pr-4 inline-block transition-colors duration-500 ${t.borderH2}`;

      // Toggle Buttons
      document.getElementById('btn-history').className = `flex items-center px-5 py-2 rounded-full text-sm font-bold transition-all duration-300 ${activeCategory === 'history' ? t.btnActive : t.btnInactive}`;
      document.getElementById('btn-trendy').className = `flex items-center px-5 py-2 rounded-full text-sm font-bold transition-all duration-300 ${activeCategory === 'trendy' ? t.btnActive : t.btnInactive}`;
    }

    function renderTabs() {
      const t = themeConfig[activeCategory];
      const data = activeCategory === 'history' ? historyData : trendyData;
      const cities = Object.keys(data);
      const container = document.getElementById('tabs-container');
      
      // Fallback to the first tab if the current tab is not in the new category
      if (!cities.includes(activeTab)) {
        activeTab = cities[0];
      }

      container.innerHTML = cities.map(city => `
        <button
          onclick="setTab('${city}')"
          class="flex-shrink-0 px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-300 ease-in-out ${activeTab === city ? t.tabActive : t.tabHover}"
        >
          ${city}
        </button>
      `).join('');
    }

    function renderCards() {
      const t = themeConfig[activeCategory];
      const data = activeCategory === 'history' ? historyData : trendyData;
      const spots = data[activeTab];
      
      document.getElementById('section-title').innerText = `${activeTab} Highlights`;

      const container = document.getElementById('cards-container');
      container.innerHTML = spots.map((spot, index) => `
        <div class="bg-white rounded-2xl shadow-sm hover:shadow-xl transition-shadow duration-300 overflow-hidden border border-gray-50 flex flex-col h-full group">
          <div class="h-2 w-full bg-gradient-to-r transition-colors duration-500 ${t.cardGradient}"></div>
          <div class="p-6 flex-grow flex flex-col">
            <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-start">
              <span class="rounded-full w-6 h-6 flex items-center justify-center text-sm mr-2 flex-shrink-0 mt-0.5 transition-colors duration-500 ${t.numberBg}">
                ${index + 1}
              </span>
              ${spot.name}
            </h3>
            
            <div class="mb-6 flex-grow">
              <div class="flex items-start text-gray-600 mb-1">
                ${svgSparkles}
                <span class="font-semibold text-gray-700">Highlights</span>
              </div>
              <p class="text-gray-600 leading-relaxed pl-7 text-sm">
                ${spot.feature}
              </p>
            </div>

            <div class="rounded-xl p-4 mt-auto transition-colors duration-500 ${t.transportBg}">
              <div class="flex items-start text-gray-700 mb-2">
                ${svgMapPin}
                <span class="font-semibold">Metro & Grab Guide</span>
              </div>
              <p class="text-gray-600 text-sm pl-7 leading-relaxed space-y-1">
                ${spot.transport}
              </p>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Events and updates
    function setCategory(category) {
      if (activeCategory === category) return;
      activeCategory = category;
      updateTheme();
      renderTabs();
      renderCards();
    }

    function setTab(tab) {
      if (activeTab === tab) return;
      activeTab = tab;
      renderTabs();
      renderCards();
    }

    document.getElementById('btn-history').addEventListener('click', () => setCategory('history'));
    document.getElementById('btn-trendy').addEventListener('click', () => setCategory('trendy'));

    // Initialization
    updateTheme();
    renderTabs();
    renderCards();
  </script>
</body>
</html>
