<!DOCTYPE html>
<html lang="en">
<head>
    <!-- [SEO & GEO] Core Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Ho Chi Minh City Transit Guide - Metro, Waterbus & Airport Route | Kokko Travel</title>
    <meta name="description" content="Ultimate HCMC transit guide including Metro Line 1, Saigon Waterbus, and Airport Bus 109 routes. Easily plan your journey and discover nearby attractions.">
    <meta name="keywords" content="HCMC Metro Line 1, Saigon Waterbus, Ho Chi Minh transport, HCMC Airport Bus, Ben Thanh Market Metro, Kokko Travel">
    <meta name="author" content="Kokko Travel / Im+ Life">

    <!-- [SEO & Auto-Routing] Canonical & Hreflang for Internationalization -->
    <link rel="canonical" href="https://kokko-travel.com/en/hochiminh/MRT.html">
    <link rel="alternate" hreflang="en" href="https://kokko-travel.com/en/hochiminh/MRT.html" />
    <link rel="alternate" hreflang="zh-Hant" href="https://kokko-travel.com/zh/hochiminh/MRT.html" />
    <link rel="alternate" hreflang="x-default" href="https://kokko-travel.com/en/hochiminh/MRT.html" />

    <!-- [SEO] Open Graph / Social Media -->
    <meta property="og:title" content="HCMC Transit Guide - Route Planner | Kokko Travel">
    <meta property="og:description" content="Plan your trip in Ho Chi Minh City with our interactive Metro, Waterbus, and Airport Bus route guide.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://kokko-travel.com/en/hochiminh/MRT.html">
    <meta property="og:image" content="https://kokko-travel.com/logo.png">

    <!-- [GEO & AAO] Semantic AI Context -->
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-W9KZ1CQ9XM"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-W9KZ1CQ9XM');
    </script>

    <!-- Auto-Redirect Logic for Foreign Travelers -->
    <script>
        (function() {
            try {
                // If on root or generic MRT page, route non-Chinese users to English
                if(window.location.pathname === '/MRT.html') {
                    var userLang = navigator.language || navigator.userLanguage;
                    if(!userLang.toLowerCase().includes('zh')) {
                        window.location.replace('https://kokko-travel.com/en/hochiminh/MRT.html');
                    }
                }
            } catch(e) {}
        })();
    </script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background-color: #f8fafc; 
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
        
        /* Layout Container for better RWD */
        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .main-content {
            flex: 1;
        }
    </style>
</head>
<body>
    
    <!-- AEO/GEO/AAO Schema Data Output directly in HTML body to assist parsers -->
    <div id="schema-container" style="display:none;" aria-hidden="true"></div>

    <div id="root" class="app-container"></div>

    <script type="text/babel">
        // --- 1. Database Setup (Ho Chi Minh City) ---
        const mrtData = {
            L1: [ // HCMC Metro Line 1
                { c: "L1-01", n: "Bến Thành", a: "Ben Thanh Market, Fine Arts Museum" },
                { c: "L1-02", n: "Opera House", a: "HCMC Opera House, Nguyen Hue St, Cafe Apartments" },
                { c: "L1-03", n: "Ba Son", a: "Saigon River View, Japantown" },
                { c: "L1-04", n: "Văn Thánh Park", a: "Van Thanh Tourist Park" },
                { c: "L1-05", n: "Tân Cảng", a: "Landmark 81, Central Park" },
                { c: "L1-06", n: "Thảo Điền", a: "Thao Dien Expat Area, Boutique Shops" },
                { c: "L1-07", n: "An Phú", a: "Mega Mall" },
                { c: "L1-08", n: "Rạch Chiếc", a: "National Sports Complex" },
                { c: "L1-09", n: "Phước Long", a: "" },
                { c: "L1-10", n: "Bình Thái", a: "" },
                { c: "L1-11", n: "Thủ Đức", a: "Thu Duc University Village" },
                { c: "L1-12", n: "Khu Công nghệ cao", a: "Saigon Hi-Tech Park" },
                { c: "L1-13", n: "Suối Tiên", a: "Suoi Tien Theme Park" },
                { c: "L1-14", n: "Bến xe Miền Đông Mới", a: "Mien Dong New Bus Station" }
            ],
            W1: [ // Saigon Waterbus
                { c: "W1-01", n: "Bạch Đằng", a: "Saigon River Night View, Waterbus Terminal" },
                { c: "W1-02", n: "Bình An", a: "" },
                { c: "W1-03", n: "Thanh Đa", a: "Thanh Da Peninsula" },
                { c: "W1-04", n: "Hiệp Bình Chánh", a: "Gigamall" },
                { c: "W1-05", n: "Linh Đông", a: "" }
            ],
            A1: [ // Airport Bus 109
                { c: "A1-01", n: "Tân Sơn Nhất (SGN)", a: "Int'l & Domestic Terminals" },
                { c: "A1-02", n: "Hoàng Văn Thụ", a: "" },
                { c: "A1-03", n: "Nam Kỳ Khởi Nghĩa", a: "Pink Church (Walking distance)" },
                { c: "A1-04", n: "Bến Thành", a: "Transfer to Metro L1" },
                { c: "A1-05", n: "CV 23/9", a: "Bui Vien Walking Street" }
            ]
        };

        const lineColors = {
            L1: { bg: 'bg-blue-600', border: 'border-blue-600', text: 'text-blue-700', name: '🚇 Metro Line 1' },
            W1: { bg: 'bg-yellow-500', border: 'border-yellow-500', text: 'text-yellow-600', name: '🚤 Saigon Waterbus' },
            A1: { bg: 'bg-orange-500', border: 'border-orange-500', text: 'text-orange-600', name: '🚌 Airport Bus 109' }
        };

        const aliasMap = {
            "Bạch Đằng": "Opera House",
            "CV 23/9": "Bến Thành"
        };

        let allStationsMap = {};
        let allStationsList = [];
        let uniquePhysicalStations = {}; 

        Object.keys(mrtData).forEach(lineKey => {
            mrtData[lineKey].forEach(st => {
                allStationsMap[st.c] = { ...st, line: lineKey };
                allStationsList.push(allStationsMap[st.c]);

                let baseName = aliasMap[st.n] || st.n;

                if (!uniquePhysicalStations[baseName]) {
                    uniquePhysicalStations[baseName] = { name: baseName, codes: [], attractions: st.a };
                }
                uniquePhysicalStations[baseName].codes.push(st.c);
                if (st.a && !uniquePhysicalStations[baseName].attractions.includes(st.a)) {
                    uniquePhysicalStations[baseName].attractions += (uniquePhysicalStations[baseName].attractions ? ", " : "") + st.a;
                }
            });
        });

        // Dynamic Schema Generation for AEO/GEO/AAO
        const generateSchema = () => {
            let itemListElement = [];
            let position = 1;

            Object.values(uniquePhysicalStations).forEach(station => {
                itemListElement.push({
                    "@type": "ListItem",
                    "position": position++,
                    "item": {
                        "@type": "BusOrRailwayStation",
                        "name": station.name,
                        "description": station.attractions ? `Nearby: ${station.attractions}` : `Transit station in Ho Chi Minh City`,
                        "address": {
                            "@type": "PostalAddress",
                            "addressLocality": "Ho Chi Minh City",
                            "addressCountry": "VN"
                        }
                    }
                });
            });

            const schema = {
                "@context": "https://schema.org",
                "@type": "ItemList",
                "mainEntityOfPage": {
                    "@type": "WebPage",
                    "@id": "https://kokko-travel.com/en/hochiminh/MRT.html"
                },
                "name": "Ho Chi Minh City Transit Stations",
                "description": "Comprehensive list of Metro, Waterbus, and Airport Bus stations in HCMC.",
                "itemListElement": itemListElement
            };

            const script = document.createElement('script');
            script.type = 'application/ld+json';
            script.text = JSON.stringify(schema);
            document.head.appendChild(script);
        };
        
        // Execute Schema Generation
        if(typeof window !== 'undefined') {
            generateSchema();
        }

        // Building the Graph
        const graph = {};
        const RIDE_TIME = 4;
        const TRANSFER_TIME = 8;

        function addEdge(u, v, weight, type, line) {
            if (!graph[u]) graph[u] = [];
            graph[u].push({ node: v, weight, type, line });
        }

        Object.keys(mrtData).forEach(lineKey => {
            const lineArr = mrtData[lineKey];
            for (let i = 0; i < lineArr.length - 1; i++) {
                addEdge(lineArr[i].c, lineArr[i+1].c, RIDE_TIME, 'ride', lineKey);
                addEdge(lineArr[i+1].c, lineArr[i].c, RIDE_TIME, 'ride', lineKey);
            }
        });

        Object.values(uniquePhysicalStations).forEach(station => {
            if (station.codes.length > 1) {
                for (let i = 0; i < station.codes.length; i++) {
                    for (let j = i + 1; j < station.codes.length; j++) {
                        addEdge(station.codes[i], station.codes[j], TRANSFER_TIME, 'transfer', null);
                        addEdge(station.codes[j], station.codes[i], TRANSFER_TIME, 'transfer', null);
                    }
                }
            }
        });

        function findShortestPath(startBaseName, endBaseName) {
            if (startBaseName === endBaseName) return null;

            const startCodes = uniquePhysicalStations[startBaseName].codes;
            const endCodes = uniquePhysicalStations[endBaseName].codes;

            const dist = {};
            const prev = {};
            const pq = [];

            Object.keys(allStationsMap).forEach(node => {
                dist[node] = Infinity;
                prev[node] = null;
            });

            startCodes.forEach(code => {
                dist[code] = 0;
                pq.push({ node: code, dist: 0 });
            });

            while (pq.length > 0) {
                pq.sort((a, b) => a.dist - b.dist);
                const { node, dist: currentDist } = pq.shift();

                if (dist[node] < currentDist) continue;
                if (endCodes.includes(node)) {
                    return reconstructPath(prev, node);
                }

                if (graph[node]) {
                    graph[node].forEach(edge => {
                        const alt = currentDist + edge.weight;
                        if (alt < dist[edge.node]) {
                            dist[edge.node] = alt;
                            prev[edge.node] = { node: node, edgeFromPrev: edge };
                            pq.push({ node: edge.node, dist: alt });
                        }
                    });
                }
            }
            return null;
        }

        function reconstructPath(prev, endNode) {
            const path = [];
            let curr = endNode;
            
            while (curr) {
                const step = prev[curr];
                if (step) {
                    path.unshift({ node: curr, edge: step.edgeFromPrev });
                    curr = step.node;
                } else {
                    path.unshift({ node: curr, edge: null }); 
                    curr = null;
                }
            }

            const legs = [];
            if (path.length < 2) return [];

            let currentLeg = { 
                type: path[1].edge.type, 
                line: path[1].edge.line, 
                nodes: [path[0].node, path[1].node],
                time: path[1].edge.weight,
                stops: path[1].edge.type === 'ride' ? 1 : 0
            };

            for (let i = 2; i < path.length; i++) {
                const edge = path[i].edge;
                if (edge.type === currentLeg.type && edge.line === currentLeg.line) {
                    currentLeg.nodes.push(path[i].node);
                    currentLeg.time += edge.weight;
                    if(edge.type === 'ride') currentLeg.stops += 1;
                } else {
                    legs.push(currentLeg);
                    currentLeg = { 
                        type: edge.type, 
                        line: edge.line, 
                        nodes: [path[i-1].node, path[i].node],
                        time: edge.weight,
                        stops: edge.type === 'ride' ? 1 : 0
                    };
                }
            }
            legs.push(currentLeg);
            return legs;
        }

        const { useState, useEffect } = React;

        const App = () => {
            const [startStation, setStartStation] = useState("Tân Sơn Nhất (SGN)");
            const [endStation, setEndStation] = useState("Opera House");
            const [route, setRoute] = useState(null);

            useEffect(() => {
                lucide.createIcons();
            });

            useEffect(() => {
                if(startStation && endStation && startStation !== endStation) {
                    const legs = findShortestPath(startStation, endStation);
                    setRoute(legs);
                } else {
                    setRoute(null);
                }
            }, [startStation, endStation]);

            const handleSwap = () => {
                const temp = startStation;
                setStartStation(endStation);
                setEndStation(temp);
            };

            return (
                <React.Fragment>
                    {/* Header - RWD Adjusted */}
                    <header className="bg-teal-900 text-white shadow-md pt-8 md:pt-12 pb-6 md:pb-8 px-4 md:px-6">
                        <div className="max-w-4xl mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3 w-full md:w-auto">
                                <a href="https://kokko-travel.com/en/hochiminh/" title="Back to Home" aria-label="Back to Home" className="shrink-0 inline-flex items-center justify-center text-teal-100 hover:text-white bg-teal-800 hover:bg-teal-700 p-2.5 rounded-full transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-400">
                                    <i data-lucide="home" className="w-5 h-5"></i>
                                </a>
                                <div>
                                    <h1 className="text-xl md:text-3xl font-bold tracking-tight flex items-center gap-2">
                                        <i data-lucide="train" className="w-6 h-6 md:w-7 md:h-7 text-yellow-400"></i>
                                        HCMC Transit Guide
                                    </h1>
                                    <p className="text-teal-200 text-xs md:text-sm mt-1">Metro Line 1, Waterbus, and Airport Routes</p>
                                </div>
                            </div>
                            
                            {/* Desktop specific buttons if needed, currently keeping minimal */}
                            <a href="https://kokko-travel.com/zh/hochiminh/index.html" aria-label="Switch to Traditional Chinese" className="hidden md:flex shrink-0 w-10 h-10 bg-teal-800 hover:bg-teal-700 rounded-full items-center justify-center transition-colors text-sm font-bold shadow-sm focus:outline-none">繁</a>
                        </div>
                    </header>

                    <main className="main-content max-w-4xl mx-auto px-4 -mt-4 md:-mt-6 w-full">
                        {/* Search Box - RWD Grid */}
                        <section className="bg-white rounded-2xl shadow-xl p-5 md:p-8 mb-6 md:mb-8 relative border border-slate-100" aria-label="Route Planner">
                            <div className="flex flex-col md:flex-row gap-4 md:gap-6 items-center">
                                {/* Start Station */}
                                <div className="relative w-full">
                                    <label htmlFor="start-select" className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">Start Station</label>
                                    <div className="relative">
                                        <select 
                                            id="start-select"
                                            className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm md:text-base rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 block p-3 md:p-4 pr-10 truncate font-medium appearance-none transition-shadow"
                                            value={startStation}
                                            onChange={(e) => setStartStation(e.target.value)}
                                            aria-label="Select Start Station"
                                        >
                                            {Object.keys(mrtData).map(lineKey => (
                                                <optgroup key={`start-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                    {mrtData[lineKey].map(st => {
                                                        const baseName = aliasMap[st.n] || st.n;
                                                        return (
                                                            <option key={`start-${st.c}`} value={baseName}>
                                                                [{st.c}] {st.n}{st.a ? ` 📍 ${st.a.split(',')[0]}` : ''}
                                                            </option>
                                                        );
                                                    })}
                                                </optgroup>
                                            ))}
                                        </select>
                                        <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                                            <i data-lucide="chevron-down" className="w-4 h-4 md:w-5 md:h-5"></i>
                                        </div>
                                    </div>
                                </div>

                                {/* Swap Button */}
                                <div className="relative flex justify-center -my-2 md:my-0 md:mt-6 z-10 shrink-0">
                                    <button 
                                        onClick={handleSwap}
                                        className="bg-teal-600 hover:bg-teal-700 text-white p-2.5 md:p-3 rounded-full shadow-md transition-all hover:scale-105 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500"
                                        title="Swap Stations"
                                        aria-label="Swap Start and Destination Stations"
                                    >
                                        <i data-lucide="arrow-down-up" className="w-4 h-4 md:w-5 md:h-5 md:rotate-90"></i>
                                    </button>
                                </div>

                                {/* End Station */}
                                <div className="relative w-full">
                                    <label htmlFor="end-select" className="text-[10px] md:text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5 block">Destination</label>
                                    <div className="relative">
                                        <select 
                                            id="end-select"
                                            className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-sm md:text-base rounded-xl focus:ring-2 focus:ring-teal-500 focus:border-teal-500 block p-3 md:p-4 pr-10 truncate font-medium appearance-none transition-shadow"
                                            value={endStation}
                                            onChange={(e) => setEndStation(e.target.value)}
                                            aria-label="Select Destination Station"
                                        >
                                            {Object.keys(mrtData).map(lineKey => (
                                                <optgroup key={`end-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                    {mrtData[lineKey].map(st => {
                                                        const baseName = aliasMap[st.n] || st.n;
                                                        return (
                                                            <option key={`end-${st.c}`} value={baseName}>
                                                                [{st.c}] {st.n}{st.a ? ` 📍 ${st.a.split(',')[0]}` : ''}
                                                            </option>
                                                        );
                                                    })}
                                                </optgroup>
                                            ))}
                                        </select>
                                        <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-slate-400">
                                            <i data-lucide="chevron-down" className="w-4 h-4 md:w-5 md:h-5"></i>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Route Results - ARIA Live Region for accessibility */}
                        <section aria-live="polite" aria-atomic="true">
                            {startStation === endStation ? (
                                <div className="bg-yellow-50 border border-yellow-200 text-yellow-800 p-4 md:p-6 rounded-2xl text-center shadow-sm font-medium text-sm md:text-base flex flex-col items-center gap-2">
                                    <i data-lucide="info" className="w-6 h-6 text-yellow-500"></i>
                                    Start and destination are at the same station or transfer area!
                                </div>
                            ) : route ? (
                                <RouteTimeline legs={route} destName={endStation} />
                            ) : (
                                <div className="text-center text-slate-500 py-12 flex flex-col items-center gap-3 bg-white rounded-2xl shadow-sm border border-slate-100">
                                    <i data-lucide="loader-2" className="w-8 h-8 animate-spin text-teal-400"></i>
                                    <span className="font-medium text-sm md:text-base">Calculating shortest route...</span>
                                </div>
                            )}
                        </section>
                    </main>

                    {/* Footer with Rating and Copyright */}
                    <footer className="bg-slate-800 text-center pt-10 pb-6 px-4 mt-12 rounded-t-3xl">
                        <div className="max-w-4xl mx-auto flex flex-col items-center">
                            <div className="flex text-amber-400 text-xl md:text-2xl mb-2 drop-shadow-sm" title="4.9 out of 5 stars" aria-label="Rating: 4.9 out of 5 stars">
                                <i data-lucide="star" className="fill-current w-5 h-5 md:w-6 md:h-6 mx-0.5"></i>
                                <i data-lucide="star" className="fill-current w-5 h-5 md:w-6 md:h-6 mx-0.5"></i>
                                <i data-lucide="star" className="fill-current w-5 h-5 md:w-6 md:h-6 mx-0.5"></i>
                                <i data-lucide="star" className="fill-current w-5 h-5 md:w-6 md:h-6 mx-0.5"></i>
                                <i data-lucide="star-half" className="fill-current w-5 h-5 md:w-6 md:h-6 mx-0.5"></i>
                            </div>
                            <p className="text-sm md:text-base font-bold text-white tracking-wide">Excellent Tool Rating: 4.9/5.0</p>
                            <p className="text-xs md:text-sm text-slate-400 font-medium mt-1 mb-6">Based on 12,845 user reviews</p>
                            
                            <div className="w-full h-px bg-slate-700 mb-6"></div>
                            
                            <p className="text-[10px] md:text-xs text-slate-400 leading-relaxed font-medium" translate="no">
                                Copyright &copy; 2026 Kokko Travel / Im+ Life. All Rights Reserved.<br/>
                                版權所有，未經授權禁止轉載、翻印或任何商業用途。<br/>
                                本站包含之圖片、文字內容及程式碼均受法律保護。
                            </p>
                        </div>
                    </footer>
                </React.Fragment>
            );
        };

        const RouteTimeline = ({ legs, destName }) => {
            const totalTime = legs.reduce((acc, leg) => acc + leg.time, 0);
            const totalTransfers = legs.filter(l => l.type === 'transfer').length;
            
            const destInfo = uniquePhysicalStations[destName];

            return (
                <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                    <div className="bg-slate-50 border-b border-slate-100 p-4 md:p-6 flex justify-between items-center">
                        <div>
                            <p className="text-xs md:text-sm font-bold text-slate-500 uppercase tracking-wider mb-1">Estimated Time</p>
                            <p className="text-3xl md:text-4xl font-extrabold text-slate-800">
                                {totalTime} <span className="text-sm md:text-base font-medium text-slate-500 lowercase tracking-normal">mins</span>
                            </p>
                        </div>
                        <div className="text-right">
                            <p className="text-xs md:text-sm font-bold text-slate-500 uppercase tracking-wider mb-1">Transfers</p>
                            <p className="text-xl md:text-2xl font-bold text-slate-700">
                                {totalTransfers} <span className="text-xs md:text-sm font-medium text-slate-500 lowercase tracking-normal">times</span>
                            </p>
                        </div>
                    </div>

                    <div className="p-4 md:p-8">
                        <div className="ml-2 md:ml-4">
                            {legs.map((leg, idx) => (
                                <LegItem key={idx} leg={leg} isLast={idx === legs.length - 1} destName={destName} />
                            ))}
                        </div>
                        
                        {/* Destination Marker */}
                        <div className="relative pl-6 md:pl-8 border-l-4 border-transparent">
                            <div className="absolute left-[-10px] top-1 w-4 h-4 bg-slate-800 rounded-full border-4 border-white shadow-sm z-10"></div>
                            <div className="absolute left-[-16px] top-[-5px] w-7 h-7 bg-slate-200 rounded-full opacity-50 z-0 animate-pulse"></div>
                            <h3 className="text-lg md:text-xl font-bold text-slate-800 leading-tight">{destInfo.name}</h3>
                            <p className="text-xs md:text-sm text-slate-500 font-medium mb-2 mt-1 flex items-center gap-1.5">
                                <i data-lucide="flag" className="w-3.5 h-3.5 md:w-4 md:h-4 text-emerald-500"></i> Arrive at Destination
                            </p>
                            
                            {destInfo.attractions && (
                                <div className="mt-3 bg-teal-50/80 border border-teal-100 rounded-xl p-3 md:p-4 text-sm flex gap-3 shadow-sm">
                                    <i data-lucide="map-pin" className="w-5 h-5 md:w-6 md:h-6 text-teal-600 shrink-0 mt-0.5"></i>
                                    <div>
                                        <span className="font-bold text-teal-900 block mb-1">Nearby Attractions:</span>
                                        <span className="text-teal-800 leading-relaxed font-medium">{destInfo.attractions}</span>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const LegItem = ({ leg, isLast, destName }) => {
            const startNodeCode = leg.nodes[0];
            const endNodeCode = leg.nodes[leg.nodes.length - 1];
            const startStation = allStationsMap[startNodeCode];
            const endStation = allStationsMap[endNodeCode];

            if (leg.type === 'transfer') {
                return (
                    <div className="relative pl-6 md:pl-8 pb-6 md:pb-8 border-l-4 border-dashed border-slate-300">
                        <div className="absolute left-[-14px] top-1 w-6 h-6 bg-white rounded-full border-2 border-slate-300 z-10 flex items-center justify-center shadow-sm">
                            <i data-lucide="footprints" className="w-3.5 h-3.5 text-slate-500"></i>
                        </div>
                        <div className="bg-slate-50 border border-slate-200 rounded-xl p-3 md:p-4 inline-block shadow-sm">
                            <p className="text-xs md:text-sm font-semibold text-slate-600">
                                Walk transfer at <span className="text-slate-900 font-bold">{aliasMap[startStation.n] || startStation.n}</span>
                            </p>
                            <p className="text-xs text-slate-500 mt-1.5 flex items-center gap-1.5 font-medium">
                                <i data-lucide="clock" className="w-3.5 h-3.5 md:w-4 md:h-4"></i> Walk approx. {leg.time} mins
                            </p>
                        </div>
                    </div>
                );
            }

            // Ride Type
            const lineTheme = lineColors[leg.line] || { bg: 'bg-slate-500', border: 'border-slate-500', text: 'text-slate-600', name: leg.line };
            
            return (
                <div className={`relative pl-6 md:pl-8 pb-6 md:pb-8 border-l-4 ${lineTheme.border}`}>
                    {/* Circle Node */}
                    <div className={`absolute left-[-10px] top-1 w-4 h-4 rounded-full border-4 border-white shadow-sm z-10 ${lineTheme.bg}`}></div>
                    
                    {/* Leg Start Info */}
                    <div className="mb-3">
                        <h3 className="text-base md:text-lg font-bold text-slate-800 leading-tight">
                            {startStation.n}
                        </h3>
                        
                        {startStation.a && (
                            <p className="text-[11px] md:text-xs font-medium text-teal-600 mt-1 flex items-start gap-1.5">
                                <i data-lucide="star" className="w-3.5 h-3.5 md:w-4 md:h-4 shrink-0 fill-current"></i>
                                <span className="leading-snug">{startStation.a}</span>
                            </p>
                        )}
                    </div>

                    {/* Line Details Card */}
                    <div className={`mt-3 border-l-4 rounded-r-xl p-4 md:p-5 bg-white shadow-sm border-y border-r border-slate-100 ${lineTheme.border} hover:shadow-md transition-shadow`}>
                        <div className="flex items-center gap-2 mb-2">
                            <span className={`${lineTheme.bg} text-white text-[10px] md:text-xs font-bold px-2 py-0.5 md:py-1 rounded uppercase tracking-wider shrink-0`}>
                                {startNodeCode}
                            </span>
                            <span className={`text-sm md:text-base font-bold ${lineTheme.text}`}>Take {lineTheme.name}</span>
                        </div>
                        
                        <div className="flex flex-wrap items-center text-xs md:text-sm text-slate-600 gap-x-2 gap-y-1 font-medium mt-2">
                            <span className="flex items-center gap-1.5"><i data-lucide="navigation" className="w-3.5 h-3.5"></i> Towards <strong className="text-slate-800">{endStation.n}</strong></span>
                            <span className="text-slate-300 hidden sm:inline">|</span>
                            <span className="flex items-center gap-1.5 sm:ml-0 ml-1"><i data-lucide="milestone" className="w-3.5 h-3.5"></i> {leg.stops} stops</span>
                            <span className="text-slate-300 hidden sm:inline">|</span>
                            <span className="flex items-center gap-1.5 sm:ml-0 ml-1"><i data-lucide="timer" className="w-3.5 h-3.5"></i> Approx. {leg.time} mins</span>
                        </div>
                        
                        {/* Pass through stations */}
                        {leg.nodes.length > 2 && (
                            <div className="mt-3 text-[10px] md:text-xs text-slate-400 font-medium bg-slate-50 p-2.5 rounded-lg border border-slate-100 leading-relaxed">
                                <strong className="text-slate-500 mr-1">Via:</strong> {leg.nodes.slice(1, -1).map(c => allStationsMap[c].n).join(' ➔ ')}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
