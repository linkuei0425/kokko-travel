<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busan Hotel Recommendation Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        /* Area buttons active/inactive state */
        .area-btn-active {
            background-color: #1e40af; /* blue-800 */
            color: white;
            border-color: #1e40af;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .area-btn-inactive {
            background-color: white;
            color: #4b5563; /* gray-600 */
            border-color: #d1d5db; /* gray-300 */
        }
        .area-btn-inactive:hover {
            background-color: #f3f4f6; /* gray-100 */
            color: #1f2937;
        }

        /* Category buttons active/inactive state */
        .cat-btn-active {
            background-color: #3b82f6; /* blue-500 */
            color: white;
            border-color: #3b82f6;
        }
        .cat-btn-inactive {
            background-color: #f8fafc; /* slate-50 */
            color: #64748b; /* slate-500 */
            border-color: #cbd5e1; /* slate-300 */
        }
        .cat-btn-inactive:hover {
            background-color: #e2e8f0; /* slate-200 */
            color: #334155;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-gray-800 pb-12">

    <div class="max-w-5xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="text-center mb-8">
            <div class="flex flex-col md:flex-row justify-center items-center gap-4 mb-3">
                <h1 class="text-3xl md:text-4xl font-extrabold text-slate-800 tracking-wide">🇰🇷 Busan Hotel Recommendation Guide</h1>
                <!-- Back to Home Link (Busan-US) -->
                <a href="https://linkuei0425.github.io/Busan-US/index.html" class="inline-flex items-center px-4 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 text-sm font-bold rounded-lg transition-colors shadow-sm">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Back to Home
                </a>
            </div>
            <p class="text-slate-500 text-sm md:text-base">Select a district and accommodation type to explore exclusive recommendations</p>
        </header>

        <!-- First level: District Buttons -->
        <div id="district-buttons" class="grid grid-cols-2 md:grid-cols-5 gap-3 mb-6">
            <!-- Dynamically generated by JS -->
        </div>

        <!-- Second level: Category Buttons -->
        <div id="category-buttons" class="grid grid-cols-3 gap-3 mb-8 bg-white p-3 rounded-xl shadow-sm border border-slate-200 hidden">
            <!-- Dynamically generated by JS -->
        </div>

        <!-- Content Area -->
        <div id="content-area" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 min-h-[400px]">
            <div class="flex h-full items-center justify-center text-slate-400 pt-20 pb-20">
                <p>Please click on a district and category above to load hotel recommendations...</p>
            </div>
        </div>
    </div>

    <script>
        // Busan Hotel Data Structure in English (with updated Trip.com affiliate links)
        const hotelData = {
            "haeundae": {
                name: "Haeundae",
                categories: {
                    "5-Star Ocean View": [
                        { name: "SIGNIEL Busan", feature: "Located in Busan's tallest building, LCT Tower, featuring extremely luxurious high-altitude infinity pools and invincible ocean views. It is the top accommodation choice in Busan.", address: "30 Dalmaji-gil, Haeundae-gu / Right next to Haeundae Beach, inside LCT Tower", url: "https://www.trip.com/hotels/busan-hotel-detail-61927965/signiel-busan/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" },
                        { name: "Paradise Hotel Busan", feature: "A long-established luxurious beachfront hotel with the famous outdoor ocean-view hot spring (Cimer) and an attached casino. Perfect for a vacation.", address: "296 Haeundaehaebeen-ro, Haeundae-gu / First row of Haeundae Beach", url: "https://www.trip.com/hotels/busan-hotel-detail-689014/paradise-hotel-busan/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" },
                        { name: "Grand Josun Busan", feature: "Created by the Shinsegae Group, the interior is full of French elegance. The infinity pool offers a great view, and the beach is just downstairs.", address: "292 Haeundaehaebeen-ro, Haeundae-gu / Center of Haeundae Beach", url: "https://www.trip.com/hotels/busan-hotel-detail-67688375/grand-josun-busan/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" }
                    ],
                    "Budget Hotels": [
                        { name: "Felix by STX", feature: "An apartment-style hotel. Rooms come with a kitchenette and microwave, offering spacious accommodation. Directly connected to Haeundae Subway Station for extreme convenience.", address: "620 Haeun-daero, Haeundae-gu / Above Haeundae Subway Station", url: "https://www.trip.com/hotels/busan-hotel-detail-65112975/felix-by-stx/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" },
                        { name: "Shilla Stay Haeundae", feature: "A business brand under the famous Korean Shilla Hotel. Stable quality with a rooftop ocean-view pool and bar. Very high cost-performance ratio.", address: "46 Haeun-daero 570beon-gil, Haeundae-gu / 5-min walk to both the beach and subway station", url: "https://www.trip.com/hotels/busan-hotel-detail-7074941/shilla-stay-busan-haeundae/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" }
                    ],
                    "Hostels": [
                        { name: "Canvas Hostel", feature: "A beautiful youth hostel with a pure white minimalist style. Clean environment, strong sense of design, and provides various public spaces for socializing.", address: "14 Haeundaehaebyeon-ro 197beon-gil / Between Dongbaek Station and Haeundae Station", url: "https://www.trip.com/hotels/busan-hotel-detail-5612295/canvas-hostel/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" }
                    ]
                }
            },
            "seomyeon": {
                name: "Seomyeon",
                categories: {
                    "5-Star Hotels": [
                        { name: "Lotte Hotel Busan", feature: "A landmark 5-star hotel at Seomyeon Station, co-constructed with Lotte Department Store and duty-free shops. Satisfies shopping, dining, and transportation needs all at once.", address: "772 Gaya-daero, Busanjin-gu / 3-min walk from Seomyeon Station", url: "https://www.trip.com/hotels/busan-hotel-detail-19517030/lotte-hotel-busan/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" }
                    ],
                    "High CP / Budget": [
                        { name: "Arban Hotel", feature: "A highly popular budget accommodation in Seomyeon! Spacious and comfortable rooms. There's a beautiful sky garden outside the top-floor lobby, and the bustling commercial district is right downstairs.", address: "32 Jungang-daero 691beonga-gil, Busanjin-gu / Located in the center of Seomyeon commercial district", url: "https://www.trip.com/hotels/busan-hotel-detail-4396607/arban-hotel-busan/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" },
                        { name: "Solaria Nishitetsu Hotel Busan", feature: "A Japanese chain hotel with meticulous service. It features a large public bath for relaxation. Good soundproofing, clean, and hygienic.", address: "20 Seomyeon-ro, Busanjin-gu / Inside Seomyeon commercial district, walking distance to the underground mall", url: "https://www.trip.com/hotels/busan-hotel-detail-1585728/solaria-nishitetsu-hotel-busan/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" }
                    ],
                    "Hostels": [
                        { name: "Sangsang Stay Busan", feature: "A mixed-use hotel combining creative cultural spaces with youth hostel/budget double rooms. Full of youthful energy and design, highly popular among backpackers.", address: "39 Seomyeon-ro, Busanjin-gu / Near Seomyeon Station Exit 1", url: "https://www.trip.com/hotels/busan-hotel-detail-67108378/ktg-sangsang-madang-busan-stay-hostel/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" }
                    ]
                }
            },
            "nampo": {
                name: "Nampo / Busan Station",
                categories: {
                    "Star Hotels": [
                        { name: "Asti Hotel Busan Station", feature: "Adjacent to Busan KTX Station, suitable for travelers taking high-speed rails or early/late flights. The top-floor lobby and ocean-view rooms offer a wide panoramic view of Busan Port.", address: "12-5 Jungang-daero 214beon-gil, Dong-gu / Next to Busan Railway Station", url: "https://www.trip.com/hotels/busan-hotel-detail-19636528/asti-hotel-busan/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" },
                        { name: "Commodore Hotel Busan", feature: "A unique hotel with an exterior shaped like a traditional Korean palace. The Korean drama 'Crash Landing on You' was filmed here. Full of rich classical Korean charm.", address: "151 Junggu-ro, Jung-gu / On the hillside between Busan Station and Nampo-dong", url: "https://www.trip.com/hotels/busan-hotel-detail-1245961/commodore-hotel-busan/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" }
                    ],
                    "High CP / Budget": [
                        { name: "Nampo Hound Hotel Premier", feature: "Highly rated accommodation in Nampo-dong with industrial design. Great location, walking distance to BIFF Square, Jagalchi Market, and Gwangbok-ro shopping street.", address: "10 Bosu-daero 24beon-gil, Jung-gu / 5-min walk from Jagalchi Station Exit 3", url: "https://www.trip.com/hotels/busan-hotel-detail-14474671/nampo-hound-hotel-premier/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" },
                        { name: "Stanford Hotel Busan", feature: "A comfortable and affordable business hotel right opposite BIFF Square. There's a convenience store downstairs. The location is flawless for buying cosmetics and enjoying food.", address: "53 Gudeok-ro, Jung-gu / Opposite BIFF Square in Nampo-dong", url: "https://www.trip.com/hotels/busan-hotel-detail-11221494/stanford-inn-busan/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" },
                        { name: "GNB Hotel", feature: "Close to Bupyeong Kkangtong Market and Gukje Market, convenient for late-night snacks and shopping. Spacious rooms and affordable prices.", address: "11 Bupyeong-dong 1-ga, Jung-gu / Next to Bupyeong Kkangtong Market", url: "https://www.trip.com/hotels/busan-hotel-detail-5612401/gnb-hotel/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" }
                    ]
                }
            },
            "gwangalli": {
                name: "Gwangalli",
                categories: {
                    "Ocean View Hotels": [
                        { name: "Kent Hotel Gwangalli by Kensington", feature: "Boasts a front ocean view of Gwangalli Beach. You can directly enjoy the night view of Gwangan Bridge from your room. There's a highly popular high-altitude ocean view bar on the top floor.", address: "229 Gwanganhaebyeon-ro, Suyeong-gu / First row of Gwangalli Beach", url: "https://www.trip.com/hotels/busan-hotel-detail-5215454/kent-hotel-gwangalli-by-kensington/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" },
                        { name: "Hotel Aqua Palace", feature: "Highlights a direct view of Gwangan Bridge from the rooms. Features a large jjimjilbang and an indoor water park. Highly suitable for families.", address: "225 Gwanganhaebyeon-ro, Suyeong-gu / First row of Gwangalli Beach", url: "https://www.trip.com/hotels/busan-hotel-detail-689065/hotel-aqua-palace/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" }
                    ],
                    "Budget Stays": [
                        { name: "H Avenue Hotel Gwangalli", feature: "A popular budget ocean-view hotel for young people. The rooftop terrace bar is very photogenic, and the first-floor lobby is designed with a strong sense of fashion.", address: "29 Gwanganhaebyeon-ro 278beon-gil, Suyeong-gu / East side of Gwangalli Beach", url: "https://www.trip.com/hotels/busan-hotel-detail-10568278/hotel-h-avenue/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" }
                    ]
                }
            },
            "yeongdo": {
                name: "Yeongdo / Songdo",
                categories: {
                    "Ocean View Resorts": [
                        { name: "La Valse Hotel", feature: "A highly popular photogenic hotel in Yeongdo! Features 360-degree panoramic harbor views surrounded by the sea. The large floor-to-ceiling windows in the rooms are perfect for photos, and the rooftop cafe is a must-visit.", address: "82 Bongnaenaru-ro, Yeongdo-gu / Yeongdo, near Nampo-dong commercial district", url: "https://www.trip.com/hotels/busan-hotel-detail-31099521/lavalse-hotel-busan/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" },
                        { name: "Fairfield by Marriott Busan Songdo Beach", feature: "Located in the first row of Songdo Beach. All room types are ocean-view rooms! Peaceful vacation atmosphere, and very close to the Songdo Marine Cable Car.", address: "113 Songdohaebyeon-ro, Seo-gu / Next to Songdo Beach", url: "https://www.trip.com/hotels/busan-hotel-detail-62286239/fairfield-by-marriott-busan-songdo-beach/?Allianceid=7913725&SID=298157945&trip_sub3=D13696895&locale=en_xx&curr=USD" }
                    ]
                }
            }
        };

        const districtContainer = document.getElementById('district-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const contentArea = document.getElementById('content-area');
        
        let currentDistrictKey = null;
        let currentCategoryName = null;

        // 1. Initialize district buttons
        function initDistrictButtons() {
            Object.keys(hotelData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-3 rounded-lg font-bold text-sm transition-all duration-200 border area-btn-inactive`;
                btn.innerText = hotelData[key].name;
                btn.onclick = () => selectDistrict(key, btn);
                districtContainer.appendChild(btn);
            });
        }

        // 2. Select district
        function selectDistrict(key, activeBtn) {
            currentDistrictKey = key;

            // Update district buttons appearance
            const allBtns = districtContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('area-btn-active');
                btn.classList.add('area-btn-inactive');
            });
            activeBtn.classList.remove('area-btn-inactive');
            activeBtn.classList.add('area-btn-active');

            // Show second level category buttons
            categoryContainer.classList.remove('hidden');
            renderCategoryButtons();
        }

        // 3. Render category buttons
        function renderCategoryButtons() {
            categoryContainer.innerHTML = '';
            
            // Get available categories for the selected district
            const currentCategories = Object.keys(hotelData[currentDistrictKey].categories);
            
            currentCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-lg font-bold text-sm transition-all duration-200 border cat-btn-inactive`;
                btn.innerText = cat;
                btn.onclick = () => selectCategory(cat, btn);
                categoryContainer.appendChild(btn);
            });

            // Default click the first category of the area
            const firstCatBtn = categoryContainer.querySelector('button');
            if(firstCatBtn) {
                selectCategory(currentCategories[0], firstCatBtn);
            }
        }

        // 4. Select category and render hotel list
        function selectCategory(categoryName, activeBtn) {
            currentCategoryName = categoryName;

            // Update category buttons appearance
            const allBtns = categoryContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('cat-btn-active');
                btn.classList.add('cat-btn-inactive');
            });
            activeBtn.classList.remove('cat-btn-inactive');
            activeBtn.classList.add('cat-btn-active');

            renderHotels();
        }

        // 5. Render hotel data to screen
        function renderHotels() {
            const districtData = hotelData[currentDistrictKey];
            const hotels = districtData.categories[currentCategoryName] || [];

            let htmlContent = `
                <div class="flex items-center mb-6 border-b pb-4 border-slate-200">
                    <h2 class="text-2xl font-bold text-slate-800 mr-3">📍 ${districtData.name}</h2>
                    <span class="px-3 py-1 bg-blue-100 text-blue-800 text-sm font-bold rounded-full">${currentCategoryName}</span>
                </div>
            `;

            if (hotels.length === 0) {
                htmlContent += `<p class="text-slate-500 py-10 text-center">No recommendations currently available for this category.</p>`;
            } else {
                htmlContent += `<div class="space-y-4">`;
                
                hotels.forEach((hotel, index) => {
                    // Check if URL exists for Hotel Details button
                    const linkTagHTML = hotel.url 
                        ? `<a href="${hotel.url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center px-3 py-1 mt-1 sm:mt-0 rounded-md text-xs font-bold bg-blue-600 text-white hover:bg-blue-700 transition-colors shadow-sm cursor-pointer ml-0 sm:ml-3">
                               <svg class="mr-1 h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                               View Hotel Details
                           </a>`
                        : `<span class="inline-flex items-center px-3 py-1 mt-1 sm:mt-0 rounded-md text-xs font-bold bg-slate-200 text-slate-500 ml-0 sm:ml-3">
                               View Hotel Details
                           </span>`;

                    htmlContent += `
                        <div class="bg-slate-50 border border-slate-200 p-5 rounded-lg hover:shadow-md transition-shadow duration-200 group">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-start mb-4">
                                <h4 class="text-lg font-bold text-slate-800 flex items-center">
                                    <span class="text-blue-500 font-mono text-base mr-2">${index + 1}.</span> 
                                    ${hotel.name}
                                </h4>
                                ${linkTagHTML}
                            </div>
                            <div class="pl-6 space-y-3">
                                <p class="text-sm text-slate-600 leading-relaxed">
                                    <span class="font-bold text-slate-700 bg-blue-50 px-1.5 py-0.5 rounded mr-1">Feature</span> ${hotel.feature}
                                </p>
                                <p class="text-sm text-slate-600 leading-relaxed">
                                    <span class="font-bold text-slate-700 bg-slate-200 px-1.5 py-0.5 rounded mr-1">Address / Transport</span> ${hotel.address}
                                </p>
                            </div>
                        </div>
                    `;
                });
                
                htmlContent += `</div>`;
            }

            contentArea.innerHTML = htmlContent;
        }

        // Initialize on DOM load
        document.addEventListener('DOMContentLoaded', () => {
            initDistrictButtons();
            
            // Default open Haeundae
            const firstDistrictBtn = districtContainer.querySelector('button');
            if(firstDistrictBtn) {
                selectDistrict('haeundae', firstDistrictBtn);
            }
        });
    </script>
</body>
</html>
