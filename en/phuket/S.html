      { id: 'wat_chalong', city: 'south', name: 'Wat Chalong Temple', stay: 1.5, timeWindow: [8, 17], region: 12, regionName: 'South', type: 'Sightseeing', desc: 'The largest and most revered Buddhist temple in Phuket. Known for its golden architecture and grand pagoda.', transport: 'Accessible via the Blue Bus from Phuket Town, or by Bolt.', ratingValue: "4.7", reviewCount: "18500" },
      { id: 'promthep_cape', city: 'south', name: 'Promthep Cape', stay: 2, timeWindow: [16.5, 19], region: 12, regionName: 'South', type: 'Hidden Gem', desc: 'The most iconic sunset viewpoint in Thailand! Watch the golden sun dip into the Andaman Sea.', transport: 'No public buses. Essential to rent a scooter or charter a taxi with waiting time.', ratingValue: "4.8", reviewCount: "25000" },
      { id: 'three_monkeys', city: 'south', name: 'Three Monkeys Restaurant', stay: 2.5, timeWindow: [10, 21], region: 12, regionName: 'South', type: 'Hidden Gem', desc: 'Phuket’s hottest jungle cafe. Hidden in a dense tropical rainforest featuring bamboo architecture and bird-nest seating.', transport: 'Located on a hillside. Must take a Grab or Bolt directly to the entrance.', ratingValue: "4.6", reviewCount: "12500" },

      // ================= Phuket Town =================
      { id: 'old_town', city: 'town', name: 'Phuket Old Town', stay: 3, timeWindow: [9, 20], region: 13, regionName: 'Phuket Town', type: 'Sightseeing', desc: 'Rich in history, preserving vibrant Sino-Portuguese architecture. Now filled with boutique cafes and artisan shops.', transport: 'The transport hub! Accessible via local Blue Buses from almost any beach.', ratingValue: "4.7", reviewCount: "31000" },
      { id: 'sunday_market', city: 'town', name: 'Sunday Walking Street', stay: 2.5, timeWindow: [16, 22], region: 13, regionName: 'Phuket Town', type: 'Shopping', desc: '[SUNDAY ONLY] The beautiful Thalang Road transforms into a massive cultural night market with crafts, music, and street food.', transport: 'Buses stop running at night. You must use Bolt to return to your hotel.', ratingValue: "4.8", reviewCount: "15600" },
      { id: 'naka_market', city: 'town', name: 'Naka Weekend Market', stay: 3, timeWindow: [16, 23], region: 13, regionName: 'Phuket Town', type: 'Shopping', desc: '[WEEKEND ONLY] The largest night market in Phuket. Massive sections for cheap clothing and endless local street food.', transport: 'Take a Pink Bus from Old Town, or a Bolt from beach areas.', ratingValue: "4.4", reviewCount: "14200" },
      { id: 'andamanda', city: 'town', name: 'Andamanda Waterpark', stay: 5, timeWindow: [10, 18], region: 13, regionName: 'Phuket Town', type: 'Sightseeing', desc: 'The newest and largest waterpark in Phuket! Designed with Thai mythology themes, featuring huge wave pools and extreme slides.', transport: 'Located just outside Phuket Town. Bolt or Grab is recommended.', ratingValue: "4.7", reviewCount: "5400", bookingLinks: [{url: 'https://www.klook.com/en-US/activity/71806-andamanda-phuket-admission-phuket/?spm=SearchResult.SearchResult_LIST&clickId=77c4cd2b54&aid=117940', text: 'Waterpark Tickets'}] },
      { id: 'hanuman_world', city: 'town', name: 'Hanuman World Zipline', stay: 3, timeWindow: [9, 17], region: 13, regionName: 'Phuket Town', type: 'Hidden Gem', desc: 'An extreme zipline adventure deep in the tropical rainforest. Conquer skywalks and high-speed cable slides.', transport: 'Tour packages usually include hotel pick-up and drop-off.', ratingValue: "4.6", reviewCount: "8900", bookingLinks: [{url: 'https://www.klook.com/en-US/activity/3732-zipline-adventure-hanuman-world-phuket-skywalk/?spm=SearchResult.SearchResult_LIST&clickId=33b8fc6196&aid=117940', text: 'Zipline Packages'}] },

      // ================= Northwest =================
      { id: 'kamala_beach', city: 'northwest', name: 'Kamala Beach', stay: 2, timeWindow: [8, 18], region: 14, regionName: 'Northwest', type: 'Sightseeing', desc: 'A peaceful and relaxing beach, perfect for travelers wanting to escape the crowds. Surrounded by luxury resorts.', transport: 'Take the Phuket Smart Bus, or a Bolt from Patong.', ratingValue: "4.5", reviewCount: "9800" },
      { id: 'cafe_del_mar', city: 'northwest', name: 'Cafe Del Mar Beach Club', stay: 3, timeWindow: [14, 24], region: 14, regionName: 'Northwest', type: 'Nightlife', desc: 'One of the most premium beach clubs in Phuket. Lounge on white daybeds by the pool, sip cocktails, and listen to sunset DJ sets.', transport: 'Located on Kamala Beach. Bolt is recommended.', ratingValue: "4.5", reviewCount: "4200" },

      // ================= Island Hopping =================
      { id: 'phi_phi', city: 'islands', name: 'Phi Phi & Maya Bay Tour', stay: 8.5, timeWindow: [8, 18], region: 20, regionName: 'Islands', type: 'Sightseeing', desc: 'The quintessential Phuket island-hopping trip! Visit the breathtaking Maya Bay (from the movie "The Beach") and snorkel in crystal-clear lagoons.', transport: 'Must book a local tour. Vans will pick you up from your hotel to the pier.', ratingValue: "4.8", reviewCount: "45000", bookingLinks: [{url: 'https://www.klook.com/en-US/search/result/?query=Phi+Phi+Island+Tour&aid=117940', text: 'Phi Phi Speedboat Tour'}] },
      { id: 'james_bond', city: 'islands', name: 'James Bond & Phang Nga Bay', stay: 8, timeWindow: [8, 17], region: 20, regionName: 'Islands', type: 'Sightseeing', desc: 'Marvel at the gravity-defying limestone karsts and canoe through hidden sea caves and mangrove forests.', transport: 'Piers are far away. A guided tour with hotel transfer is mandatory.', ratingValue: "4.6", reviewCount: "32000", bookingLinks: [{url: 'https://www.klook.com/en-US/search/result/?query=Phang+Nga+Bay+Canoe&aid=117940', text: 'Phang Nga Canoe Tour'}] },
      { id: 'racha_coral', city: 'islands', name: 'Racha & Coral Islands Tour', stay: 7.5, timeWindow: [8, 17], region: 20, regionName: 'Islands', type: 'Sightseeing', desc: 'The closest beautiful islands to the mainland. Racha offers crystal waters for diving, while Coral Island is packed with water sports.', transport: 'Departs from Chalong Pier. Booking an all-inclusive day trip is easiest.', ratingValue: "4.5", reviewCount: "18500", bookingLinks: [{url: 'https://www.klook.com/en-US/search/result/?query=Racha+Coral+Island+Tour&aid=117940', text: 'Racha Catamaran Tour'}] },
      { id: 'similan', city: 'islands', name: 'Similan Islands Tour (Seasonal)', stay: 10.5, timeWindow: [6, 19], region: 20, regionName: 'Islands', type: 'Hidden Gem', desc: '[OCT - MAY ONLY] A world-class diving paradise! Features jelly-like turquoise waters, fine white sand, and high chances of spotting sea turtles.', transport: 'Very long journey (1.5h drive + 1.5h boat). Must be booked via an agency.', ratingValue: "4.9", reviewCount: "21000", bookingLinks: [{url: 'https://www.klook.com/en-US/search/result/?query=Similan+Islands&aid=117940', text: 'Similan Snorkeling'}] }
    ];

    const CITIES = [
      { id: 'patong', name: 'Patong', color: 'blue' },
      { id: 'south', name: 'Kata/South', color: 'amber' },
      { id: 'town', name: 'Phuket Town', color: 'teal' },
      { id: 'northwest', name: 'Northwest', color: 'rose' },
      { id: 'islands', name: 'Islands', color: 'emerald' }
    ];

    // --- Core Transit Logic (English) ---
    const formatTime = (h) => {
      let hh = Math.floor(h) % 24;
      let mm = Math.round((h - Math.floor(h)) * 60);
      if (mm === 60) { hh++; mm = 0; }
      return `${hh.toString().padStart(2, '0')}:${mm.toString().padStart(2, '0')}`;
    };

    const getCityColor = (cityId) => {
      const colors = { patong: 'blue', south: 'amber', town: 'teal', northwest: 'rose', islands: 'emerald' };
      const c = colors[cityId] || 'slate';
      return `text-${c}-600 bg-${c}-100 border-${c}-200`;
    };

    const getSmartTransit = (prev, curr) => {
      if (curr.id === 'ret') return '✈️ [Departure] Take a taxi, Bolt, or private transfer to Phuket International Airport (HKT) for check-in.';

      if (curr.region === 20) return `🚤 [Island Hopping] Board the agency's van to the pier, then transfer to a speedboat/catamaran.\n💡 Tip: Island hopping is a full-day trip. Bring sunblock and motion sickness pills.`;
      if (prev && prev.region === 20) return `🚐 [Return to Hotel] Conclude your island tour and take the agency's transfer van back to your hotel.`;

      if (!prev || prev.id.startsWith('acc_') || prev.type === 'Gateway') {
        if (curr.type === 'Gateway') return `🛬 [Arrival in Phuket] Take the Phuket Smart Bus or an airport taxi to ${curr.name}.`;
        return `🏨 [Depart to] Use the Bolt app or a local Tuk-Tuk to head to ${curr.name}.`;
      }

      if (prev.city !== curr.city && prev.id !== 'origin') {
         return `🚕 [Cross-Region Travel] Phuket is large. We highly recommend using the Bolt or InDrive app for cross-region travel (transparent pricing & comfortable).\n💡 During the day, you can also transit through Phuket Town using local Blue Buses.`;
      }

      return `🛺 [Local Transfer] Walk or take a short Bolt/Tuk-Tuk ride from ${prev.name} to ${curr.name}.`;
    };

    // --- React App ---
    function App() {
      const [activeCity, setActiveCity] = useState('patong');
      const [selectedIds, setSelectedIds] = useState([]);
      const [showPrintView, setShowPrintView] = useState(false);
      const [tripDuration, setTripDuration] = useState(5);

      const toggleAttr = (id) => setSelectedIds(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

      const itineraryDays = useMemo(() => {
        if (selectedIds.length === 0) return [];

        let idsToSchedule = [...selectedIds];
        idsToSchedule = [...new Set(idsToSchedule)];

        const getPriority = (item) => {
            if (item.id === 'ret') return 999;
            if (item.type === 'Gateway') return 10;
            if (item.type === 'Accommodation') return 15; 
            
            let win = item.timeWindow || [9.5, 21.5];

            const isNight = ['Nightlife', 'Shopping'].includes(item.type) && win[0] >= 16;
            if (isNight) return 90; 
            
            if (item.stay >= 5) return 25;
            if (win[1] <= 18) return 30; 
            
            return 50; 
        };

        const sorted = idsToSchedule
          .map(id => ATTRACTIONS.find(a => a.id === id))
          .filter(a => a)
          .sort((a, b) => {
            const getSortKey = (item) => {
              let sk = getPriority(item);
              let cityGroup = CITIES.findIndex(c => c.id === item.city);
              return cityGroup * 100000 + sk * 1000; 
            };
            return getSortKey(a) - getSortKey(b);
          });

        let remaining = [...sorted];
        let days = [];
        
        let curDay = { items: [], dayCity: 'patong', dayType: null, currentTime: 13.0 }; 
        let lCity = 'patong', lReg = 11;
        let prevItemObj = null; 

        const getTTime = (isNewDay, fCity, tCity, fReg, tReg) => {
            if (fReg === 20 && tReg !== 20) return 1.5; 
            if (tReg === 20 && fReg !== 20) return 1.5;
            if (isNewDay) return 0.5; 
            if (fCity && tCity && fCity !== tCity) return 0.8; 
            return 0.3; 
        };

        const checkValid = (a, isF, curTime) => {
            let tTime = getTTime(isF, lCity, a.city, lReg, a.region);
            let arrivalTime = curTime + tTime;
            let isLastDay = days.length === tripDuration - 1;
            
            if (!isF) {
                let isBasic = ['Accommodation', 'Gateway'].includes(a.type);
                if (!isBasic) {
                    if (a.city !== lCity) {
                        let hasSameCityLeft = remaining.some(r => r.city === lCity && !['Accommodation', 'Gateway'].includes(r.type));
                        if (hasSameCityLeft) return false; 
                        if (curTime > 15 && a.type !== 'Shopping' && a.type !== 'Nightlife') return false;
                    }
                }
            }

            let win = a.timeWindow || [8, 22]; 
            if (['Accommodation', 'Gateway'].includes(a.type)) win = [0, 24];

            let waitTime = 0;
            if (arrivalTime < win[0]) {
                waitTime = win[0] - arrivalTime;
                if (waitTime > 2.0 && !isF) return false; 
            }

            let actStart = arrivalTime + waitTime;
            let actEnd = actStart + a.stay;

            if (actStart >= win[1] - 0.5) return false; 
            if (a.stay >= 5 && actStart > 12) return false;

            if (isLastDay) {
                let retTFromA = getTTime(false, a.city, 'patong', a.region, 10);
                let maxEndTime = 14.0 - 2.5 - retTFromA; 
                if (actEnd > maxEndTime) return false;
            } else {
                if (!isF && actEnd > 24.0) return false; 
            }

            return { valid: true, tTime, waitTime, actStart, actEnd };
        };

        while (remaining.length > 0) {
            const isF = curDay.items.length === 0;
            let chosenIdx = -1;
            let chosenStats = null;

            let validCands = [];
            for (let i = 0; i < remaining.length; i++) {
                let stats = checkValid(remaining[i], isF, curDay.currentTime);
                if (stats && stats.valid) {
                    validCands.push({ a: remaining[i], idx: i, prio: getPriority(remaining[i]), stats });
                }
            }

            if (validCands.length > 0) {
                validCands.sort((ca, cb) => {
                    let isSameCityA = ca.a.city === lCity ? 1 : 0;
                    let isSameCityB = cb.a.city === lCity ? 1 : 0;
                    if (isSameCityA !== isSameCityB) return isSameCityB - isSameCityA;
                    if (ca.prio !== cb.prio) return ca.prio - cb.prio;
                    if (ca.stats.tTime !== cb.stats.tTime) return ca.stats.tTime - cb.stats.tTime;
                    let winA = ca.a.timeWindow || [8, 22];
                    let winB = cb.a.timeWindow || [8, 22];
                    if (winA[1] !== winB[1]) return winA[1] - winB[1];
                    return ca.idx - cb.idx;
                });
                chosenIdx = validCands[0].idx;
                chosenStats = validCands[0].stats;
            }

            if (chosenIdx === -1) {
                days.push(curDay);
                if (days.length >= tripDuration) break; 
                curDay = { items: [], dayCity: remaining[0].city, dayType: null, currentTime: 9.0 };
                continue;
            }

            const a = remaining.splice(chosenIdx, 1)[0];
            const { tTime, waitTime, actStart, actEnd } = chosenStats;

            if (isF && days.length === 0) prevItemObj = { id: 'origin', city: 'patong', name: 'Arrival / Origin', type: 'Gateway' };
            if (isF && days.length > 0) prevItemObj = { id: 'acc_hotel', city: a.city, name: `Hotel (${CITIES.find(c=>c.id===a.city)?.name || 'Patong'})`, type: 'Accommodation' }; 

            let sTime = curDay.currentTime;
            let aTime = sTime + tTime;
            let finalWaitTime = actStart - aTime; 

            let transitMsg = getSmartTransit(prevItemObj, a);
            if(a.transport) transitMsg += `\n📍 Transport Guide: ${a.transport}`;
            
            let win = a.timeWindow || [8, 22];
            if (finalWaitTime > 0 && win[0] > 0 && !['Accommodation', 'Gateway'].includes(a.type)) {
                transitMsg += `\n💡 Tip: Recommend starting after ${win[0]}:00. You'll arrive around ${formatTime(aTime)}, take a break nearby.`;
            }

            let isFirstAirport = (days.length === 0 && isF && a.type === 'Gateway');

            curDay.items.push({
                ...a, tTime: tTime.toFixed(1), prevName: prevItemObj.name, transitTransport: transitMsg,
                tStr: `${formatTime(sTime)} - ${formatTime(aTime)}`,
                sStr: isFirstAirport ? 'Arrival & Immigration' : `${formatTime(actStart)} - ${formatTime(actEnd)}`,
                isFirstAirport,
                endTime: actEnd
            });

            curDay.currentTime = actEnd;
            lCity = a.city; lReg = a.region; prevItemObj = a;
            if (isF) curDay.dayCity = a.city;
        }
        
        if (curDay.items.length > 0 && days.length < tripDuration) {
            days.push(curDay);
        }
        while (days.length < tripDuration) {
            days.push({ items: [], dayCity: lCity, dayType: null, currentTime: 9.0 });
        }

        // ================= Force Airport on Last Day =================
        let lastD = days[days.length-1];
        if (!lastD) {
            lastD = { items: [], dayCity: 'patong', dayType: null, currentTime: 9.0 };
            days.push(lastD);
        }
        
        let retT = getTTime(lastD.items.length === 0, lCity, 'patong', lReg, 10);

        while (lastD.items.length > 0) {
            let lastItem = lastD.items[lastD.items.length-1];
            let testRetT = getTTime(false, lastItem.city, 'patong', lastItem.region, 10);
            if (lastItem.endTime > (14.0 - 2.5 - testRetT)) {
                lastD.items.pop();
            } else {
                break;
            }
        }

        if (lastD.items.length > 0) {
            let lastItem = lastD.items[lastD.items.length-1];
            lastD.currentTime = lastItem.endTime;
            lCity = lastItem.city;
            lReg = lastItem.region;
            prevItemObj = lastItem;
        } else {
            lastD.currentTime = 9.0;
            lReg = 11;
            prevItemObj = { name: 'Hotel', city: lCity };
        }
        
        retT = getTTime(lastD.items.length === 0, lCity, 'patong', lReg, 10);
        let startTransit = 14.0 - 2.5 - retT;
        let transitMsg = '🚐 Take a Bolt, taxi, or hotel transfer to Phuket International Airport (HKT).';
        
        if (lastD.currentTime < startTransit) {
            transitMsg = `💡 You have some free time before heading to the airport. We suggest departing at ${formatTime(startTransit)}.\n🚐 Board your vehicle to Phuket Airport.`;
        }
        
        let retPrev = prevItemObj || {name: 'Hotel', city: 'patong'};
        lastD.items.push({
            id: 'ret', city: 'patong', name: 'End of Journey - Head to Airport', stay: 2.5, region: 999, regionName: 'Airport', type: 'Gateway',
            desc: 'Head home with unforgettable Phuket memories! We recommend arriving early for tax refunds and duty-free shopping.', transport: 'Take a taxi from your last stop to HKT.',
            tTime: retT.toFixed(1), prevName: retPrev.name, transitTransport: transitMsg,
            tStr: `${formatTime(startTransit)} - ${formatTime(14.0 - 2.5)}`,
            sStr: `${formatTime(14.0 - 2.5)} - 14:00`,
            isFirstAirport: false,
            endTime: 14.0
        });
        
        lastD.currentTime = 14.0;

        return days.map((d, i) => {
          const base = (i === 0 && d.items[0]?.isFirstAirport ? 13.0 : (i === 0 ? 13.0 : 9.0));
          const end = d.currentTime;
          return { dayNum: i+1, totalH: (end - base > 0 ? (end - base).toFixed(1) : "0.0"), cityName: CITIES.find(c => c.id === d.dayCity)?.name || 'Patong', items: d.items };
        });
      }, [selectedIds, tripDuration]);

      if (showPrintView) {
        return (
          <div className="min-h-screen bg-white p-4 sm:p-8">
            <div className="max-w-4xl mx-auto border-2 border-slate-800 p-6 sm:p-10 rounded-3xl shadow-sm">

                <p className="mt-3 text-slate-500 font-medium">Smart AI calculations for transit times and attraction hours</p>
              </div>
              {itineraryDays.map(d => (
                <div key={d.dayNum} className="mb-12 print-break-avoid">
                  <h2 className="text-2xl font-bold border-b-2 border-teal-500/30 pb-3 mb-6 text-slate-800">
                    🌞 Day {d.dayNum} - [{d.cityName} Area] <span className="text-base font-medium text-slate-500 ml-2">({d.totalH}h)</span>
                  </h2>
                  <div className="space-y-6 ml-3 sm:ml-5 border-l-[3px] pl-6 sm:pl-8 border-slate-200">
                    {d.items.map((it, idx) => (
                      <div key={`${it.id}-${idx}`} className="relative mb-8">
                        {!it.isFirstAirport && (
                          <div className="mb-4 bg-slate-50 border border-slate-200 rounded-xl p-4 shadow-sm text-sm">
                             <div className="font-bold text-slate-700 mb-2">{it.prevName} ➔ {it.name}</div>
                             <div className="flex gap-4 mb-2">
                               <span className="bg-white px-2.5 py-1 rounded border font-mono text-teal-600 font-bold"><i className="fa-regular fa-clock mr-1"></i> {it.tStr}</span>
                               <span className="text-slate-600 font-medium">Est. Transit: {it.tTime}h</span>
                             </div>
                             <div className="whitespace-pre-wrap text-slate-600">{it.transitTransport}</div>
                          </div>
                        )}
                        <div className="relative bg-white p-5 rounded-xl border border-slate-100 shadow-sm">
                          <div className="absolute -left-[37px] sm:-left-[45px] top-1/2 -translate-y-1/2 w-4 h-4 bg-teal-500 rounded-full border-[3px] border-white shadow-sm"></div>
                          <div className="font-bold text-sm text-slate-400 mb-2"><i className="fa-regular fa-clock mr-1"></i> {it.isFirstAirport ? '' : 'Stay: '}{it.sStr}</div>
                          <h4 className="text-xl font-black text-slate-800 mb-1">{it.name}</h4>
                          <p className="text-sm text-slate-600 leading-relaxed mb-3">{it.desc}</p>
                          {it.bookingLinks && (
                            <div className="flex gap-2 flex-wrap print-hidden mt-3">
                              {it.bookingLinks.map((l, i) => (
                                <a key={i} href={l.url} target="_blank" rel="noopener noreferrer" className="bg-[#ff5b00] text-white text-xs px-3 py-1.5 rounded-lg font-bold hover:bg-[#e05000] shadow-sm"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>
                              ))}
                            </div>
                          )}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              <div className="mt-12 text-center flex flex-col sm:flex-row justify-center gap-4 print-hidden">
                <button onClick={() => setShowPrintView(false)} className="bg-slate-800 text-white px-8 py-3.5 rounded-2xl font-bold hover:bg-slate-700 shadow-md">Return to Edit</button>
                <button onClick={() => window.print()} className="bg-teal-600 text-white px-8 py-3.5 rounded-2xl font-bold hover:bg-teal-500 shadow-md">Print / Save PDF</button>
              </div>
            </div>
          </div>
        );
      }

      const grouped = ATTRACTIONS.filter(a => a.city === activeCity && !a.id.startsWith('acc_')).reduce((acc, c) => { (acc[c.type] = acc[c.type] || []).push(c); return acc; }, {});

      return (
        <div className="min-h-screen bg-slate-50 pb-10 flex flex-col">
          
          {/* Header */}
          <header className="bg-white/95 backdrop-blur-md p-4 sm:px-6 shadow-sm flex flex-wrap justify-between items-center sticky top-0 z-30 border-b border-slate-200 gap-3">
            <div className="flex items-center gap-4">
              <h1 className="font-black text-xl sm:text-2xl text-slate-800 flex items-center gap-2"><i className="fa-solid fa-umbrella-beach text-teal-500"></i>Itinerary Wizard</h1>
              <a href="https://kokko-travel.com/en/phuket/" target="_blank" rel="noopener noreferrer" className="hidden sm:flex items-center gap-1.5 text-sm font-bold text-slate-500 hover:text-teal-600 bg-slate-100 hover:bg-teal-50 px-4 py-2 rounded-full transition-all border border-slate-200 hover:shadow-sm">
                <i className="fa-solid fa-house"></i> Back to Home

            <div className="flex items-center gap-3">

              </nav>
              
              <div className="bg-white rounded-2xl shadow-sm p-5 border border-slate-200/60">
                <h2 className="text-sm font-bold flex items-center gap-2 mb-2 tracking-wide text-slate-700">
                  <i className="fa-solid fa-circle-info text-teal-500 text-lg"></i>
                  AI Scheduling Tips
                </h2>
                <p className="text-xs sm:text-sm text-slate-500 leading-relaxed">
                  We automatically schedule <strong className="text-orange-500">boat tours</strong> for the daytime and <strong className="text-indigo-500">bars/night markets</strong> for the evening.<br className="hidden sm:block"/>Bolt/Tuk-tuk transit times between regions are calculated for you!
                </p>
              </div>

              <div className="max-h-[65vh] overflow-y-auto space-y-6 pr-2 custom-scrollbar pb-10">
                {Object.entries(grouped).map(([type, items]) => (
                  <section key={type} className="mb-6">
                    <h3 className="font-black text-slate-800 mb-4 sticky top-0 bg-slate-50/95 py-3 backdrop-blur-md z-10 border-b border-slate-200/60 tracking-wide uppercase text-sm">{type}</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                      {items.map(it => (
                        <article key={it.id} onClick={() => toggleAttr(it.id)} itemScope itemType="https://schema.org/TouristAttraction" className={`p-5 rounded-2xl cursor-pointer border-2 transition-all duration-300 flex flex-col group ${selectedIds.includes(it.id) ? 'bg-teal-50/60 border-teal-500 scale-[1.02] shadow-md' : 'bg-white border-slate-100 shadow-sm hover:border-teal-200 hover:shadow-md'}`}>
                          <h4 itemProp="name" className="font-bold text-slate-900 leading-snug mb-3 text-base group-hover:text-teal-700 transition-colors">{it.name}</h4>
                          
                          {/* Schema.org AggregateRating UI Injection */}
                          {it.ratingValue && (
                            <div itemProp="aggregateRating" itemScope itemType="https://schema.org/AggregateRating" className="flex items-center gap-1.5 mb-3 bg-amber-50/80 w-max px-2.5 py-1 rounded-md border border-amber-100 shadow-sm">
                                <i className="fa-solid fa-star text-amber-400 text-[10px]"></i>
                                <span itemProp="ratingValue" className="font-bold text-slate-700 text-xs">{it.ratingValue}</span>

                            </div>
                          )}

                          <div className="text-[11px] font-medium flex flex-wrap gap-2 mb-3">
                            <span className="bg-slate-100 px-2 py-1 rounded-md text-slate-600 border border-slate-200 shadow-sm"><i className="fa-regular fa-clock mr-1"></i>{it.stay}h</span>
                            <span className={`px-2 py-1 rounded-md border shadow-sm ${getCityColor(it.city)}`}><i className="fa-solid fa-location-dot mr-1"></i>{it.regionName}</span>
                          </div>
                          <p itemProp="description" className="text-xs sm:text-sm text-slate-500 line-clamp-3 leading-relaxed mt-auto">{it.desc}</p>
                        </article>
                      ))}
                    </div>
                  </section>
                ))}
              </div>
            </div>

            {/* Right: Auto-Generated Itinerary */}
            <div className="lg:w-1/2">
              <div className="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden flex flex-col max-h-[85vh] sticky top-24">
                <div className="bg-slate-800 text-white p-6 lg:p-8">
                  <h2 className="text-2xl font-black flex items-center gap-2 tracking-wide"><i className="fa-regular fa-calendar-check text-teal-400"></i>Your Itinerary</h2>
                  <p className="text-xs sm:text-sm text-slate-300 mt-2 leading-relaxed">💡 Select attractions on the left. We will organize them by days and time windows.</p>
                  
                  <div className="flex flex-wrap gap-3 mt-6">
                    <div className="flex gap-3 w-full sm:w-auto">
                      <select 
                        value={tripDuration} 
                        onChange={(e) => setTripDuration(Number(e.target.value))}
                        className="flex-1 sm:flex-none bg-slate-700 hover:bg-slate-600 text-white font-bold py-3.5 px-4 rounded-xl outline-none cursor-pointer transition-colors shadow-inner border border-slate-600 text-sm focus:ring-2 focus:ring-teal-500"
                        title="Select Trip Duration"
                      >
                        <option value={4}>4 Days</option>
                        <option value={5}>5 Days</option>
                        <option value={6}>6 Days</option>
                        <option value={7}>7 Days</option>
                        <option value={8}>8 Days</option>
                      </select>
                      <button onClick={() => setSelectedIds([])} className={`flex-1 sm:flex-none flex items-center justify-center gap-2 px-5 py-3.5 rounded-xl font-bold shadow-md transition-all cursor-pointer text-sm ${selectedIds.length > 0 ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-slate-700 text-slate-400 hover:bg-slate-600 hover:text-white'}`} title="Reset">
                        <i className="fa-solid fa-rotate-right"></i> Reset
                      </button>
                    </div>
                    <button onClick={() => setShowPrintView(true)} disabled={itineraryDays.length === 0} className="w-full sm:flex-1 bg-teal-500 hover:bg-teal-600 py-3.5 px-4 rounded-xl font-bold shadow-lg transition-all disabled:opacity-30 disabled:cursor-not-allowed text-white text-sm cursor-pointer">
                      Generate Schedule
                    </button>
                  </div>
                </div>
                
                <div className="p-5 sm:p-8 overflow-y-auto flex-1 custom-scrollbar bg-slate-50/50">
                  {itineraryDays.length === 0 ? <div className="text-center text-slate-400 py-24 flex flex-col items-center gap-4"><i className="fa-solid fa-plane-departure text-6xl opacity-10"></i><p className="text-lg font-medium">Select attractions to begin building.</p></div> : 
                    itineraryDays.map(d => (
                      <section key={d.dayNum} className="mb-12">
                        <h3 className="font-black text-xl mb-6 border-b-2 border-slate-200/80 pb-3 flex items-center gap-2 text-slate-800">
                          <i className="fa-solid fa-sun text-orange-500 text-2xl drop-shadow-sm"></i> Day {d.dayNum} - [{d.cityName}] 
                          <span className="text-xs font-bold text-slate-500 bg-slate-200 px-2 py-1 rounded ml-auto">Total: {d.totalH}h</span>
                        </h3>
                        <div className="space-y-6 border-l-[3px] border-slate-200 ml-4 sm:ml-5 pl-7 sm:pl-8 relative pb-4">
                          {d.items.map((it, idx) => (
                            <div key={`${it.id}-${idx}`} className="relative mb-8">
                              {!it.isFirstAirport && (
                                <div className="mb-5 relative">
                                  <div className="absolute -left-[45px] sm:-left-[49px] top-1/2 -translate-y-1/2 w-5 h-5 bg-slate-100 rounded-full border-2 border-slate-300 flex items-center justify-center shadow-sm z-10"><i className="fa-solid fa-arrow-down text-[10px] text-slate-400"></i></div>
                                  <div className={`rounded-2xl p-4 text-xs sm:text-sm border shadow-sm ${it.transitTransport.includes('Cross-Region') || it.transitTransport.includes('Island') ? 'bg-orange-50/80 border-orange-100' : 'bg-teal-50/80 border-teal-100'}`}>
                                    <div className={`font-bold mb-2 tracking-wide ${it.transitTransport.includes('Cross-Region') || it.transitTransport.includes('Island') ? 'text-orange-800' : 'text-teal-800'}`}>{it.prevName} ➔ {it.name}</div>
                                    <div className="flex items-center gap-4 mb-2">
                                      <span className={`bg-white px-2.5 py-1 rounded-md border font-mono shadow-sm font-bold ${it.transitTransport.includes('Cross-Region') || it.transitTransport.includes('Island') ? 'border-orange-200 text-orange-600' : 'border-teal-200 text-teal-600'}`}>
                                        <i className="fa-regular fa-clock mr-1"></i> {it.tStr}
                                      </span>
                                      <span className={`font-bold ${it.transitTransport.includes('Cross-Region') || it.transitTransport.includes('Island') ? 'text-orange-600' : 'text-teal-600'}`}>Transit: {it.tTime}h</span>

                              <article className="bg-white p-5 sm:p-6 rounded-2xl border border-slate-200 shadow-sm relative hover:shadow-lg transition-all duration-300">
                                <div className="absolute -left-[41px] sm:-left-[45px] top-6 w-5 h-5 bg-teal-500 rounded-full border-[3px] border-white shadow-md z-10"></div>
                                <div className="text-xs sm:text-sm font-bold text-slate-400 mb-3"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : 'Stay: '}{it.sStr}</div>
                                <h4 className="font-black text-lg sm:text-xl mb-2 text-slate-800">{it.name}</h4>
                                <p className="text-xs sm:text-sm text-slate-500 leading-relaxed mb-1">{it.desc}</p>
                                {it.bookingLinks && <div className="mt-4 flex gap-2 flex-wrap">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" rel="noopener noreferrer" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-[10px] sm:text-xs px-3 py-1.5 rounded-lg font-bold transition-colors shadow-sm focus:ring-2 focus:ring-[#ff5b00] focus:ring-offset-1"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                              </article>

                      </section>

                </div>
              </div>
            </div>
          </main>

          {/* ========================================== */}
          {/* 5. FAQ Section (SEO Long-tail keywords)    */}

          <section aria-labelledby="faq-heading" className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-12 mb-8 w-full print-hidden">
            <div className="bg-white rounded-3xl shadow-sm border border-slate-200/60 p-6 sm:p-10">
              <h2 id="faq-heading" className="text-2xl sm:text-3xl font-black text-slate-800 mb-8 flex items-center">
                <i className="fa-regular fa-circle-question mr-3 text-teal-500 text-3xl"></i>Phuket Itinerary FAQ
              </h2>
              <div className="space-y-4">
                <details className="group border border-slate-200 rounded-2xl bg-slate-50 [&_summary::-webkit-details-marker]:hidden overflow-hidden">
                  <summary className="flex justify-between items-center font-bold cursor-pointer list-none p-6 text-slate-800 hover:text-teal-600 transition-colors text-lg sm:text-xl">
                    <span>How many days do I need for a perfect Phuket itinerary?</span>
                    <span className="transition group-open:rotate-180 text-teal-500 bg-white p-1 rounded-full shadow-sm"><i className="fa-solid fa-chevron-down"></i></span>
                  </summary>
                  <div className="text-slate-600 p-6 pt-0 leading-relaxed text-base sm:text-lg border-t border-slate-200/60 mt-2 bg-white">

                  </div>
