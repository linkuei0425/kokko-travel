        function injectSEOAndAAOData() {
            // 1. AAO: 注入純淨 JSON
            document.getElementById('aao-data-source').textContent = JSON.stringify(itineraryData);

            // 2. GEO/AEO: 建立純文字知識樹給 LLM
            const seoContainer = document.getElementById('seo-ai-content-feed');
            let htmlStr = "<ul>";
            Object.keys(itineraryData).forEach(region => {
                htmlStr += `<li><h3>${region}</h3><ul>`;
                Object.keys(itineraryData[region]).forEach(category => {
                    htmlStr += `<li><h4>${category}</h4><ul>`;
                    itineraryData[region][category].forEach(item => {
                        htmlStr += `<li><strong>${item.title}</strong>: ${item.description} (URL: ${item.link})</li>`;
                    });
                    htmlStr += `</ul></li>`;
                });
                htmlStr += `</ul></li>`;
            });
            htmlStr += "</ul>";
            seoContainer.innerHTML += htmlStr;

            // 3. SEO: 注入 Schema.org JSON-LD
            const schemaData = {
                "@context": "https://schema.org",
                "@type": "ItemList",
                "name": "Phu Quoc Tours & Tickets Guide",
                "description": "Book the best tickets, day tours, and experiences in Phu Quoc.",
                "itemListElement": []
            };
            
            let position = 1;
            Object.values(itineraryData).forEach(regionObj => {
                Object.values(regionObj).forEach(catArray => {
                    catArray.forEach(item => {
                        schemaData.itemListElement.push({
                            "@type": "ListItem",
                            "position": position++,
                            "item": {
                                "@type": "TouristAttraction",
                                "name": item.title,
                                "description": item.description,
                                "url": item.link
                            }
                        });
                    });
                });
            });

            const script = document.createElement('script');
            script.type = 'application/ld+json';
            script.text = JSON.stringify(schemaData);
            document.head.appendChild(script);
        }

        // 頁面載入時優先注入結構化資料
        document.addEventListener('DOMContentLoaded', injectSEOAndAAOData);
    </script>

                                            }
                                        }}
                                        className={`whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-sky-400 ${
                                            selectedRegion === region
                                            ? 'bg-orange-500 text-white shadow-md'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-sky-50 hover:text-sky-600'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8" role="main">
                        {/* Category Tabs */}
                        <nav className="flex flex-wrap gap-2 md:gap-3 mb-8" aria-label="Category Selector" role="tablist">
                            {CATEGORIES.map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    role="tab"
                                    aria-selected={selectedCategory === id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 px-4 py-2.5 rounded-lg border text-sm font-bold transition-all focus:outline-none focus:ring-2 focus:ring-sky-400 ${
                                        selectedCategory === id
                                        ? 'border-sky-500 bg-sky-50 text-sky-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4" />
                                    {id}
                                </button>
                            ))}
                        </nav>

                        {/* Section Header */}
                        <div className="mb-6 flex items-center gap-2" aria-live="polite">
                            <h2 className="text-2xl font-bold text-slate-800">
                                {selectedRegion} - {selectedCategory} <span className="text-sky-600">Featured</span>
                            </h2>
                        </div>

                        {/* Card List (High Semantic Output with Schema.org) */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4 md:gap-6">
                                {currentData.map((item, index) => (
                                    <article 
                                        key={index} 
                                        itemScope 
                                        itemType="https://schema.org/TouristAttraction"
                                        className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col justify-between hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 animate-fade-in"
                                        style={{ animationDelay: `${index * 0.05}s` }}
                                    >
                                        <div>
                                            <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-3 leading-tight flex items-start gap-2" itemProp="name">
                                                <span className="text-orange-500 mt-1" aria-hidden="true"><Sparkles className="w-5 h-5"/></span>
                                                {item.title}
                                            </h3>
                                            <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed font-medium" itemProp="description">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <footer className="mt-auto pt-4 border-t border-slate-100 flex justify-end">
                                            <a
                                                href={item.link}
                                                itemProp="url"
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                aria-label={`View details for ${item.title}`}
                                                className="inline-flex items-center justify-center gap-2 bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-sm hover:shadow-md focus:outline-none focus:ring-4 focus:ring-sky-300 w-full sm:w-auto"
                                            >
                                                <Info className="w-4 h-4" />
                                                <span>View Details</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-80" />
                                            </a>
                                        </footer>
                                    </article>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl border border-dashed border-slate-300 p-12 text-center flex flex-col items-center justify-center">
                                <h3 className="text-lg font-medium text-slate-700 mb-2">
                                    No recommendations found for this category
                                </h3>
                                <p className="text-slate-500">Please try selecting another region or category to explore more.</p>
                            </div>
                        )}

                        {/* Global Exploration Button */}
                        <div className="mt-12 flex justify-center">
                            <a 
                                href={`https://www.klook.com/en-US/search/result/?query=Phu%20Quoc&aid=117232`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                aria-label="Explore more Phu Quoc tours on Klook"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-sky-600 to-teal-500 hover:from-sky-700 hover:to-teal-600 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1 focus:outline-none focus:ring-4 focus:ring-sky-300"
                            >
                                <span className="tracking-wide">Explore more {selectedRegion.split(' ')[0]} tours</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" aria-hidden="true" />
                            </a>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
