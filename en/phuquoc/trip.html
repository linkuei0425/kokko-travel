<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phu Quoc Tickets & Trip Guide</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Hide horizontal scrollbar but keep functionality */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Navigation Icons ---
        const MapPin = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const Ticket = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>;
        const Sun = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const Sparkles = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
        const TrainFront = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3.1V7a4 4 0 0 0 8 0V3.1"/><path d="M9 15h6"/><path d="M14 19.5l3-3-3-3"/><path d="M10 19.5l-3-3 3-3"/><path d="M4 22v-3.5"/><path d="M20 22v-3.5"/><rect width="16" height="16" x="4" y="3" rx="2"/></svg>;
        const ExternalLink = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>;
        const Info = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const Home = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;

        const REGIONS = ['North (Vinpearl)', 'Central (Duong Dong)', 'South & Island Hopping'];
        const CATEGORIES = [
            { id: 'Tickets', icon: Ticket },
            { id: 'Day Tours', icon: Sun },
            { id: 'Experiences', icon: Sparkles },
            { id: 'Transport & SIM', icon: TrainFront }
        ];

        // --- Phu Quoc Trip Data ---
        const itineraryData = {
            'North (Vinpearl)': {
                'Tickets': [
                    { title: 'VinWonders Phu Quoc Ticket', description: 'Vietnam\'s largest theme park! Enjoy the giant turtle aquarium, thrilling water park, and various rides perfect for families.', link: 'https://affiliate.klook.com/redirect?aid=117232&aff_adid=1246553&k_site=https%3A%2F%2Fwww.klook.com%2Fen-US%2Factivity%2F11989-vinwonders-phu-quoc-ticket%2F' },
                    { title: 'Vinpearl Safari Phu Quoc Ticket', description: 'Experience the semi-wild safari by bus where "humans are caged while animals roam free". You can also feed giraffes and elephants.', link: 'https://www.klook.com/en-US/activity/11990-vinpearl-safari-phu-quoc-ticket/?aid=117232' },
                    { title: 'Grand World Phu Quoc Attraction Ticket', description: 'Includes Teddy Bear Museum admission and exclusive viewing seats for the "Colors of Venice" show, experiencing the charm of Vietnam\'s Venice.', link: 'https://www.klook.com/en-US/activity/56159-grand-world-phu-quoc-attraction-ticket/?aid=117232' },
                    { title: 'Klook Phu Quoc Pass', description: 'One pass to play all popular attractions! Customize your bundle with VinWonders, Safari, and Cable Car to save more on your trip.', link: 'https://www.klook.com/en-US/activity/69602-phu-quoc-play-and-stay-travel-pass/?aid=117232' }
                ],
                'Experiences': [
                    { title: 'Grand World Venice Gondola Ride', description: 'Ride a romantic Italian-style gondola along the Grand World canal, admiring the colorful European architecture on both sides.', link: 'https://www.klook.com/en-US/search/result/?query=Grand%20World%20Gondola&aid=117232' }
                ],
                'Day Tours': [
                    { title: 'Northern Phu Quoc Day Tour: Kayaking, Starfish Beach & Rach Vem', description: 'Travel to the secret Starfish Beach in northern Phu Quoc. Find red starfish in the pristine white sand and clear water, and enjoy kayaking.', link: 'https://www.klook.com/en-US/activity/4341-nature-discovery-phu-quoc/?aid=117232' },
                    { title: 'Starfish Beach, Sunset Sanato & Night Fishing Tour (Chinese Guide)', description: 'Led by a professional guide, visit Starfish Beach and catch the most beautiful sunset at Sunset Sanato, followed by a unique night fishing experience.', link: 'https://www.klook.com/en-US/activity/155191-starfish-beach-sunset-sanato-twilight-sunset-night-fishing-tour/?aid=117232' }
                ],
                'Transport & SIM': [
                    { title: 'Phu Quoc Airport Transfer', description: 'Safe and comfortable private transfer from the airport directly to your hotel in the North, Central, or South without any hassle.', link: 'https://www.klook.com/en-US/airport-transfers/?aid=117232' },
                    { title: 'Rach Gia ⇋ Phu Quoc High-Speed Ferry', description: 'High-speed ferry service connecting mainland Vietnam and Phu Quoc, perfect for travelers arriving at Rach Gia port.', link: 'https://www.klook.com/en-US/activity/96718-high-speed-ferry-rach-gia-phu-quoc/?aid=117232' },
                    { title: 'Phu Quoc 8-Hour Private Car Charter', description: 'Ideal for families or groups. A dedicated driver and AC car will comfortably take you to attractions with fully customizable itineraries.', link: 'https://www.klook.com/en-US/activity/6343-private-car-charter-phu-quoc/?aid=117232' },
                    { title: 'Vietnam 5G eSIM', description: 'Scan the QR Code to get connected instantly! No need to remove your physical SIM card. Excellent signal coverage across Phu Quoc.', link: 'https://affiliate.klook.com/redirect?aid=117232&aff_adid=1246549&k_site=https%3A%2F%2Fwww.klook.com%2Fen-US%2Factivity%2F123902-vietnam-esim-high-speed-internet-qr-code-voucher%2F' },
                    { title: 'Vietnam 4G SIM Card (Phu Quoc Airport Pick Up)', description: 'Pick up your physical SIM at the airport for stable, high-speed internet to easily navigate, book Grabs, and share island photos.', link: 'https://www.klook.com/en-US/activity/117294-4g-sim-card-phu-quoc-airport-pick-up-for-vietnam/?spm=SearchResult.SearchResult_LIST&clickId=88ee710a66&aid=117232' }
                ]
            },
            'Central (Duong Dong)': {
                'Tickets': [
                    { title: 'Sunset Sanato Beach Ticket', description: 'Phu Quoc\'s most famous sunset spot! The beach features large surreal art installations like long-legged elephants and fairies.', link: 'https://www.klook.com/en-US/activity/58425-sunset-sanato-beach-admission-ticket/?aid=117232' }
                ],
                'Experiences': [
                    { title: 'La Spa Massage Experience', description: 'A must-try relaxing experience in Vietnam! Enjoy head-to-toe relaxation with a full body essential oil massage in a comfortable environment.', link: 'https://www.klook.com/en-US/activity/154835-la-spa-massage-experience-in-phu-quoc/?aid=117232' },
                    { title: 'Soc Nau Mud Bath, Spa & Massage', description: 'Experience Phu Quoc\'s signature mud bath! The mineral-rich mud deeply cleanses your skin, paired with a spa massage to soothe fatigue.', link: 'https://www.klook.com/en-US/activity/36869-thoc-mud-bath-spa-experience-in-phu-quoc/?aid=117232' },
                    { title: 'Phu Quoc Bamboo Basket Boat Tour', description: 'Ride a traditional Vietnamese "basket boat" and experience the local fishermen\'s lifestyle and unique water scenery in tranquil waters.', link: 'https://www.klook.com/en-US/activity/166499-bamboo-basket-boat-tour-phu-quoc/?aid=117232' },
                    { title: 'Sunset & Night Squid Fishing', description: 'Depart from Duong Dong port at dusk to watch the beautiful island sunset, then experience traditional squid fishing with hot seafood served onboard.', link: 'https://www.klook.com/en-US/search/result/?query=Phu%20Quoc%20Squid%20Fishing&aid=117232' }
                ],
                'Day Tours': [
                    { title: 'Phu Quoc 8-Hour Private Car Charter', description: 'A dedicated driver will guide you! Freely arrange your trip to classic spots like Ho Quoc Pagoda, Fish Sauce Factory, and the Night Market.', link: 'https://www.klook.com/en-US/activity/6343-private-car-charter-phu-quoc/?aid=117232' }
                ],
                'Transport & SIM': [
                    { title: 'Phu Quoc Airport Transfer', description: 'Safe and comfortable private transfer from the airport directly to your hotel in the North, Central, or South without any hassle.', link: 'https://www.klook.com/en-US/airport-transfers/?aid=117232' },
                    { title: 'Rach Gia ⇋ Phu Quoc High-Speed Ferry', description: 'High-speed ferry service connecting mainland Vietnam and Phu Quoc, perfect for travelers arriving at Rach Gia port.', link: 'https://www.klook.com/en-US/activity/96718-high-speed-ferry-rach-gia-phu-quoc/?aid=117232' },
                    { title: 'Phu Quoc 8-Hour Private Car Charter', description: 'Ideal for families or groups. A dedicated driver and AC car will comfortably take you to attractions with fully customizable itineraries.', link: 'https://www.klook.com/en-US/activity/6343-private-car-charter-phu-quoc/?aid=117232' },
                    { title: 'Vietnam 5G eSIM', description: 'Scan the QR Code to get connected instantly! No need to remove your physical SIM card. Excellent signal coverage across Phu Quoc.', link: 'https://affiliate.klook.com/redirect?aid=117232&aff_adid=1246549&k_site=https%3A%2F%2Fwww.klook.com%2Fen-US%2Factivity%2F123902-vietnam-esim-high-speed-internet-qr-code-voucher%2F' },
                    { title: 'Vietnam 4G SIM Card (Phu Quoc Airport Pick Up)', description: 'Pick up your physical SIM at the airport for stable, high-speed internet to easily navigate, book Grabs, and share island photos.', link: 'https://www.klook.com/en-US/activity/117294-4g-sim-card-phu-quoc-airport-pick-up-for-vietnam/?spm=SearchResult.SearchResult_LIST&clickId=88ee710a66&aid=117232' }
                ]
            },
            'South & Island Hopping': {
                'Tickets': [
                    { title: 'Sun World Hon Thom Nature Park Ticket', description: 'Ride the Guinness World Record-holding longest trans-sea cable car, overlooking the blue sea and fishing boats, straight to Aquatopia water park.', link: 'https://affiliate.klook.com/redirect?aid=117232&aff_adid=1246554&k_site=https%3A%2F%2Fwww.klook.com%2Fen-US%2Factivity%2F20750-sun-world-hon-thom-cable-car-ticket%2F' },
                    { title: 'Kiss of the Sea Show Ticket', description: 'A world-class performance combining a giant water screen, lasers, fire dances, and dozens of international dancers, ending with spectacular fireworks.', link: 'https://www.klook.com/en-US/activity/81479-kiss-the-star-show-ticket/?aid=117232' },
                    { title: 'Kiss Bridge Ticket', description: 'The most romantic new landmark in Sunset Town! At sunset, the sun falls precisely into the gap between the two disconnected bridge segments.', link: 'https://www.klook.com/en-US/search/result/?query=Kiss%20Bridge%20Phu%20Quoc&aid=117232' }
                ],
                'Day Tours': [
                    { title: 'Fingernail, Dam Ngang & May Rut Island Day Tour', description: 'Take a speedboat to the most pristine outer islands around Phu Quoc, snorkel in clear coral reefs, and enjoy the tropical island vibe.', link: 'https://www.klook.com/en-US/activity/10834-fingernail-island-dam-ngang-may-rut-island-day-tour-phu-quoc/?aid=117232' },
                    { title: 'Phu Quoc Coral Mountain & Half Moon Reef Snorkeling', description: 'Take a speedboat deep into Phu Quoc\'s most beautiful snorkeling spots to explore colorful coral reef ecosystems and marine life.', link: 'https://www.klook.com/en-US/activity/56528-phu-quoc-snorkeling-day-tour-by-speedboat/?aid=117232' },
                    { title: 'Island Hopping Snorkeling + Cable Car Combo Tour', description: 'The most popular perfect combo! Snorkel at beautiful outer islands and take the trans-sea cable car back to enjoy a magnificent sunset.', link: 'https://www.klook.com/en-US/activity/23196-island-hopping-tour-cable-car-experience-phu-quoc/?aid=117232' }
                ],
                'Experiences': [
                    { title: 'Dining Experience at Sun Bavaria in Sunset Town', description: 'Enjoy delicious meals and cold beer while admiring the charming sunset view in the European-Mediterranean-style Sunset Town.', link: 'https://www.klook.com/en-US/activity/155428-dining-experience-at-sun-bavaria-magic-in-sunset-town-phu-quoc/?aid=117232' },
                    { title: 'Phu Quoc Seawalker Experience', description: 'Explore the underwater world up close even if you can\'t swim! Wear a special oxygen helmet and take photos with tropical fish and corals.', link: 'https://www.klook.com/en-US/search/result/?query=Phu%20Quoc%20Seawalker&aid=117232' },
                    { title: 'Phu Quoc Scuba Diving Experience', description: 'Dive into Phu Quoc\'s clear waters led by professional instructors. Explore colorful coral reefs and marine life; safe for beginners with zero experience.', link: 'https://www.klook.com/en-US/activity/83250-scuba-diving-in-phu-quoc-island/?spm=SearchResult.SearchResult_LIST&clickId=dd5668a1f7&aid=117232' }
                ],
                'Transport & SIM': [
                    { title: 'Phu Quoc Airport Transfer', description: 'Safe and comfortable private transfer from the airport directly to your hotel in the North, Central, or South without any hassle.', link: 'https://www.klook.com/en-US/airport-transfers/?aid=117232' },
                    { title: 'Rach Gia ⇋ Phu Quoc High-Speed Ferry', description: 'High-speed ferry service connecting mainland Vietnam and Phu Quoc, perfect for travelers arriving at Rach Gia port.', link: 'https://www.klook.com/en-US/activity/96718-high-speed-ferry-rach-gia-phu-quoc/?aid=117232' },
                    { title: 'Phu Quoc 8-Hour Private Car Charter', description: 'Ideal for families or groups. A dedicated driver and AC car will comfortably take you to attractions with fully customizable itineraries.', link: 'https://www.klook.com/en-US/activity/6343-private-car-charter-phu-quoc/?aid=117232' },
                    { title: 'Vietnam 5G eSIM', description: 'Scan the QR Code to get connected instantly! No need to remove your physical SIM card. Excellent signal coverage across Phu Quoc.', link: 'https://affiliate.klook.com/redirect?aid=117232&aff_adid=1246549&k_site=https%3A%2F%2Fwww.klook.com%2Fen-US%2Factivity%2F123902-vietnam-esim-high-speed-internet-qr-code-voucher%2F' },
                    { title: 'Vietnam 4G SIM Card (Phu Quoc Airport Pick Up)', description: 'Pick up your physical SIM at the airport for stable, high-speed internet to easily navigate, book Grabs, and share island photos.', link: 'https://www.klook.com/en-US/activity/117294-4g-sim-card-phu-quoc-airport-pick-up-for-vietnam/?spm=SearchResult.SearchResult_LIST&clickId=88ee710a66&aid=117232' }
                ]
            }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('North (Vinpearl)');
            const [selectedCategory, setSelectedCategory] = useState('Tickets');

            const currentData = itineraryData[selectedRegion]?.[selectedCategory] || [];

            return (
                <div className="min-h-screen bg-sky-50 font-sans text-slate-800 pb-12">
                    {/* Header */}
                    <header className="bg-white shadow-sm sticky top-0 z-10 border-b border-sky-100">
                        <div className="max-w-7xl mx-auto px-4 py-4 md:py-6">
                            <div className="flex items-center justify-between gap-2 mb-4">
                                <div className="flex items-center gap-2">
                                    <MapPin className="text-sky-600 w-6 h-6 md:w-8 md:h-8" />
                                    <h1 className="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-sky-600 to-teal-500">
                                        Phu Quoc Trip Guide
                                    </h1>
                                </div>
                                <a
                                    href="https://linkuei0425.github.io/PhuQuoc-US/"
                                    className="hidden md:flex items-center gap-1.5 px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 bg-sky-600 text-white hover:bg-sky-700 shadow-sm"
                                >
                                    <Home className="w-4 h-4" />
                                    Back to Home
                                </a>
                            </div>
                            
                            {/* Region Selection */}
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                <a
                                    href="https://linkuei0425.github.io/PhuQuoc-US/"
                                    className="md:hidden flex items-center justify-center gap-1.5 whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 bg-sky-600 text-white hover:bg-sky-700 shadow-sm"
                                >
                                    <Home className="w-4 h-4" />
                                    Home
                                </a>
                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => {
                                            setSelectedRegion(region);
                                            if (!itineraryData[region]?.[selectedCategory]) {
                                                const availableCategories = Object.keys(itineraryData[region] || {});
                                                if (availableCategories.length > 0) {
                                                    setSelectedCategory(availableCategories[0]);
                                                }
                                            }
                                        }}
                                        className={`whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 ${
                                            selectedRegion === region
                                            ? 'bg-orange-500 text-white shadow-md'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-sky-50 hover:text-sky-600'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {/* Category Tabs */}
                        <div className="flex flex-wrap gap-2 md:gap-3 mb-8">
                            {CATEGORIES.map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 px-4 py-2.5 rounded-lg border text-sm font-bold transition-all ${
                                        selectedCategory === id
                                        ? 'border-sky-500 bg-sky-50 text-sky-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4" />
                                    {id}
                                </button>
                            ))}
                        </div>

                        {/* Section Header */}
                        <div className="mb-6 flex items-center gap-2">
                            <h2 className="text-2xl font-bold text-slate-800">
                                {selectedRegion} - {selectedCategory} <span className="text-sky-600">Featured</span>
                            </h2>
                        </div>

                        {/* Card List */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4 md:gap-6">
                                {currentData.map((item, index) => (
                                    <div 
                                        key={index} 
                                        className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col justify-between hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 animate-fade-in"
                                        style={{ animationDelay: `${index * 0.05}s` }}
                                    >
                                        <div>
                                            <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-3 leading-tight flex items-start gap-2">
                                                <span className="text-orange-500 mt-1"><Sparkles className="w-5 h-5"/></span>
                                                {item.title}
                                            </h3>
                                            <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed font-medium">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-4 border-t border-slate-100 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-sm hover:shadow-md w-full sm:w-auto"
                                            >
                                                <Info className="w-4 h-4" />
                                                <span>View Details</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-80" />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl border border-dashed border-slate-300 p-12 text-center flex flex-col items-center justify-center">
                                <h3 className="text-lg font-medium text-slate-700 mb-2">
                                    No recommendations found for this category
                                </h3>
                                <p className="text-slate-500">Please try selecting another region or category to explore more.</p>
                            </div>
                        )}

                        {/* Global Exploration Button */}
                        <div className="mt-12 flex justify-center">
                            <a 
                                href={`https://www.klook.com/en-US/search/result/?query=Phu%20Quoc&aid=117232`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-sky-600 to-teal-500 hover:from-sky-700 hover:to-teal-600 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1"
                            >
                                <span className="tracking-wide">Explore more {selectedRegion.split(' ')[0]} tours</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
