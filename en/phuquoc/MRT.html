    <!-- 8. 核心資料與 SEO/GEO/AAO 注入邏輯 (獨立於 React 之外確保爬蟲抓取) -->
    <script>
        // Database Setup (Phu Quoc Bus Routes)
        const busData = {
            V17: [ 
                { c: "V17-1", n: "Phu Quoc Airport", e: "Sân bay Phú Quốc", a: "International & Domestic Terminals" },
                { c: "V17-2", n: "Long Beach", e: "Bãi Trường", a: "Eden Resort, Novotel, etc." },
                { c: "V17-3", n: "Duong Dong Town", e: "Dương Đông", a: "Night Market, Dinh Cau Shrine" },
                { c: "V17-4", n: "Ong Lang Beach", e: "Ông Lang", a: "Quiet beach area" },
                { c: "V17-5", n: "Grand World", e: "Grand World", a: "Venice Canal, Water Show (Transfer available)" },
                { c: "V17-6", n: "VinWonders", e: "VinWonders", a: "Giant Turtle Aquarium, Theme Park" },
                { c: "V17-7", n: "Vinpearl Safari", e: "Vinpearl Safari", a: "Semi-wild safari, feed giraffes" }
            ],
            V19: [ 
                { c: "V19-1", n: "Sun World Cable Car", e: "Cáp treo Hòn Thơm", a: "Over-sea cable car to Aquatopia" },
                { c: "V19-2", n: "Sunset Town", e: "Thị trấn Hoàng Hôn", a: "Kiss Bridge, Romantic European vibe" },
                { c: "V19-3", n: "Kem Beach", e: "Bãi Kem", a: "JW Marriott, Beautiful white sand" },
                { c: "V19-4", n: "Sunset Sanato", e: "Sunset Sanato", a: "Alien beach, trendy sunset spot" },
                { c: "V19-5", n: "Phu Quoc Airport", e: "Sân bay Phú Quốc", a: "Transfer to V17" },
                { c: "V19-6", n: "Duong Dong Town", e: "Dương Đông", a: "Transfer to V17" },
                { c: "V19-7", n: "Grand World", e: "Grand World", a: "Transfer to V17" }
            ],
            S1: [ 
                { c: "S1-1", n: "Duong Dong Town", e: "Dương Đông", a: "Transfer to V17/V19" },
                { c: "S1-2", n: "Phu Quoc Prison", e: "Nhà tù Phú Quốc", a: "Coconut Tree Prison historical site" },
                { c: "S1-3", n: "Sao Beach", e: "Bãi Sao", a: "Beautiful white sand, sea swing" },
                { c: "S1-4", n: "Ho Quoc Pagoda", e: "Chùa Hộ Quốc", a: "Largest Buddhist temple, ocean view" }
            ]
        };

        const lineColors = {
            V17: { bg: 'bg-green-600', border: 'border-green-600', text: 'text-green-700', name: '🚌 VinBus V17 (Airport ↔ North)' },
            V19: { bg: 'bg-blue-600', border: 'border-blue-600', text: 'text-blue-700', name: '🚌 VinBus V19 (South ↔ North)' },
            S1: { bg: 'bg-orange-500', border: 'border-orange-500', text: 'text-orange-600', name: '🚐 South Tour Route (Downtown ↔ Sao Beach)' }
        };

        const aliasMap = {};

        // 注入 SEO, GEO 與 AAO 資料
        function injectSEOAndAAOData() {
            // 1. AAO: 注入純淨 JSON 給 AI Agents
            document.getElementById('aao-data-source').textContent = JSON.stringify(busData);

            // 2. GEO/AEO: 建立純文字知識樹給 LLM 爬蟲
            const seoContainer = document.getElementById('seo-ai-content-feed');
            let htmlStr = "<ul>";
            Object.keys(busData).forEach(lineKey => {
                htmlStr += `<li><h3>${lineColors[lineKey].name}</h3><ul>`;
                busData[lineKey].forEach((st, idx) => {
                    htmlStr += `<li><strong>Stop ${idx + 1}: ${st.n}</strong> (${st.e}) - Nearby: ${st.a || 'N/A'}</li>`;
                });
                htmlStr += `</ul></li>`;
            });
            htmlStr += "</ul>";
            seoContainer.innerHTML += htmlStr;

            // 3. SEO: 注入 Schema.org JSON-LD 
            const schemaData = {
                "@context": "https://schema.org",
                "@type": "ItemList",
                "name": "Phu Quoc Public Transport Routes",
                "description": "Comprehensive list of bus lines and stations in Phu Quoc Island.",
                "itemListElement": Object.keys(busData).map((lineKey, index) => ({
                    "@type": "ListItem",
                    "position": index + 1,
                    "item": {
                        "@type": "BusTrip",
                        "name": lineColors[lineKey].name,
                        "description": `Bus route serving Phu Quoc. Key stops include ${busData[lineKey][0].n} and ${busData[lineKey][busData[lineKey].length - 1].n}.`,
                        "provider": {
                            "@type": "Organization",
                            "name": lineKey.startsWith('V') ? "VinBus" : "Local Tour"
                        }
                    }
                }))
            };

            const script = document.createElement('script');
            script.type = 'application/ld+json';
            script.text = JSON.stringify(schemaData);
            document.head.appendChild(script);
        }

        // 頁面載入時優先注入結構化資料
        document.addEventListener('DOMContentLoaded', injectSEOAndAAOData);
    </script>

    <!-- 9. React Application -->
    <script type="text/babel">
        // Flatten all stations (使用 Global 的 busData)
        let allStationsMap = {};
        let allStationsList = [];
        let uniquePhysicalStations = {}; 

        Object.keys(busData).forEach(lineKey => {
            busData[lineKey].forEach(st => {
                allStationsMap[st.c] = { ...st, line: lineKey };
                allStationsList.push(allStationsMap[st.c]);

                let baseName = aliasMap[st.n] || st.n;

                if (!uniquePhysicalStations[baseName]) {
                    uniquePhysicalStations[baseName] = { name: baseName, en: st.e, codes: [], attractions: st.a };
                }
                uniquePhysicalStations[baseName].codes.push(st.c);
                if (st.a && !uniquePhysicalStations[baseName].attractions.includes(st.a)) {
                    uniquePhysicalStations[baseName].attractions += (uniquePhysicalStations[baseName].attractions ? ", " : "") + st.a;
                }
            });
        });

        // Graph Construction
        const graph = {};
        const RIDE_TIME = 15; // Approx. 15 mins per bus stop
        const TRANSFER_TIME = 10; // Transfer waiting/walking time

        function addEdge(u, v, weight, type, line) {
            if (!graph[u]) graph[u] = [];
            graph[u].push({ node: v, weight, type, line });
        }

        // Connect adjacent stations
        Object.keys(busData).forEach(lineKey => {
            const lineArr = busData[lineKey];
            for (let i = 0; i < lineArr.length - 1; i++) {
                addEdge(lineArr[i].c, lineArr[i+1].c, RIDE_TIME, 'ride', lineKey);
                addEdge(lineArr[i+1].c, lineArr[i].c, RIDE_TIME, 'ride', lineKey);
            }
        });

        // Connect transfer stations
        Object.values(uniquePhysicalStations).forEach(station => {
            if (station.codes.length > 1) {
                for (let i = 0; i < station.codes.length; i++) {
                    for (let j = i + 1; j < station.codes.length; j++) {
                        addEdge(station.codes[i], station.codes[j], TRANSFER_TIME, 'transfer', null);
                        addEdge(station.codes[j], station.codes[i], TRANSFER_TIME, 'transfer', null);
                    }
                }
            }
        });

        // Dijkstra Algorithm
        function findShortestPath(startBaseName, endBaseName) {
            if (startBaseName === endBaseName) return null;

            const startCodes = uniquePhysicalStations[startBaseName].codes;
            const endCodes = uniquePhysicalStations[endBaseName].codes;

            const dist = {};
            const prev = {};
            const pq = [];

            Object.keys(allStationsMap).forEach(node => {
                dist[node] = Infinity;
                prev[node] = null;
            });

            startCodes.forEach(code => {
                dist[code] = 0;
                pq.push({ node: code, dist: 0 });
            });

            while (pq.length > 0) {
                pq.sort((a, b) => a.dist - b.dist);
                const { node, dist: currentDist } = pq.shift();

                if (dist[node] < currentDist) continue;
                if (endCodes.includes(node)) {
                    return reconstructPath(prev, node);
                }

                if (graph[node]) {
                    graph[node].forEach(edge => {
                        const alt = currentDist + edge.weight;
                        if (alt < dist[edge.node]) {
                            dist[edge.node] = alt;
                            prev[edge.node] = { node: node, edgeFromPrev: edge };
                            pq.push({ node: edge.node, dist: alt });
                        }
                    });
                }
            }
            return null;
        }

        function reconstructPath(prev, endNode) {
            const path = [];
            let curr = endNode;
            
            while (curr) {
                const step = prev[curr];
                if (step) {
                    path.unshift({ node: curr, edge: step.edgeFromPrev });
                    curr = step.node;
                } else {
                    path.unshift({ node: curr, edge: null }); 
                    curr = null;
                }
            }

            const legs = [];
            if (path.length < 2) return [];

            let currentLeg = { 
                type: path[1].edge.type, 
                line: path[1].edge.line, 
                nodes: [path[0].node, path[1].node],
                time: path[1].edge.weight,
                stops: path[1].edge.type === 'ride' ? 1 : 0
            };

            for (let i = 2; i < path.length; i++) {
                const edge = path[i].edge;
                if (edge.type === currentLeg.type && edge.line === currentLeg.line) {
                    currentLeg.nodes.push(path[i].node);
                    currentLeg.time += edge.weight;
                    if(edge.type === 'ride') currentLeg.stops += 1;
                } else {
                    legs.push(currentLeg);
                    currentLeg = { 
                        type: edge.type, 
                        line: edge.line, 
                        nodes: [path[i-1].node, path[i].node],
                        time: edge.weight,
                        stops: edge.type === 'ride' ? 1 : 0
                    };
                }
            }
            legs.push(currentLeg);
            return legs;
        }

        // React Components
        const { useState, useEffect } = React;

        const App = () => {
            const [startStation, setStartStation] = useState("Phu Quoc Airport");
            const [endStation, setEndStation] = useState("Grand World");
            const [route, setRoute] = useState(null);

            useEffect(() => {
                lucide.createIcons();
            });

            useEffect(() => {
                if(startStation && endStation && startStation !== endStation) {
                    const legs = findShortestPath(startStation, endStation);
                    setRoute(legs);
                } else {
                    setRoute(null);
                }
            }, [startStation, endStation]);

            const handleSwap = () => {
                const temp = startStation;
                setStartStation(endStation);
                setEndStation(temp);
            };

            return (
                <div className="min-h-screen pb-12">
                    {/* Header (Semantic Tag) */}
                    <header className="bg-teal-900 text-white shadow-md pt-12 pb-8 px-6 text-center" role="banner">
                        <div className="flex items-center justify-center gap-4 mb-3">
                            <a href="https://kokko-travel.com/en/phuquoc/" title="Back to Home" className="inline-flex items-center justify-center text-teal-100 hover:text-white bg-teal-800 hover:bg-teal-700 p-2.5 rounded-full transition-colors shadow-sm" aria-label="Back to Home Page">
                                <i data-lucide="home" className="w-5 h-5" aria-hidden="true"></i>
                            </a>
                            <h1 className="text-2xl md:text-3xl font-bold tracking-tight flex items-center gap-2">
                                <i data-lucide="bus" className="w-7 h-7 text-yellow-400" aria-hidden="true"></i>
                                Phu Quoc Transport Guide
                            </h1>
                        </div>
                        <p className="text-teal-200 text-sm">VinBus & Sightseeing Route Planner</p>
                    </header>

                    <main className="max-w-2xl mx-auto px-4 -mt-6" role="main">
                        {/* Search Box */}
                        <section className="bg-white rounded-2xl shadow-xl p-6 mb-8 relative" aria-label="Route Search Form">
                            <div className="flex flex-col gap-4">
                                <div className="relative">
                                    <label htmlFor="start-station" className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">Start Station</label>
                                    <select 
                                        id="start-station"
                                        className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-base rounded-xl focus:ring-teal-500 focus:border-teal-500 block p-3.5 pr-8 truncate font-medium appearance-none cursor-pointer"
                                        value={startStation}
                                        onChange={(e) => setStartStation(e.target.value)}
                                        aria-label="Select start station"
                                    >
                                        {Object.keys(busData).map(lineKey => (
                                            <optgroup key={`start-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                {busData[lineKey].map(st => {
                                                    const baseName = aliasMap[st.n] || st.n;
                                                    return (
                                                        <option key={`start-${st.c}`} value={baseName}>
                                                            [{st.c}] {st.n} ({st.e}){st.a ? ` 📍 ${st.a.split(',')[0]}` : ''}
                                                        </option>
                                                    );
                                                })}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 top-6 flex items-center px-3 text-slate-500">
                                        <i data-lucide="chevron-down" className="w-5 h-5" aria-hidden="true"></i>
                                    </div>
                                </div>

                                <div className="relative flex justify-center -my-3 z-10">
                                    <button 
                                        onClick={handleSwap}
                                        className="bg-teal-600 hover:bg-teal-700 focus:ring-4 focus:ring-teal-300 text-white p-2.5 rounded-full shadow-md transition-transform hover:scale-105 outline-none"
                                        title="Swap route"
                                        aria-label="Swap start and destination stations"
                                    >
                                        <i data-lucide="arrow-down-up" className="w-5 h-5" aria-hidden="true"></i>
                                    </button>
                                </div>

                                <div className="relative">
                                    <label htmlFor="end-station" className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">Destination</label>
                                    <select 
                                        id="end-station"
                                        className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-base rounded-xl focus:ring-teal-500 focus:border-teal-500 block p-3.5 pr-8 truncate font-medium appearance-none cursor-pointer"
                                        value={endStation}
                                        onChange={(e) => setEndStation(e.target.value)}
                                        aria-label="Select destination station"
                                    >
                                        {Object.keys(busData).map(lineKey => (
                                            <optgroup key={`end-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                {busData[lineKey].map(st => {
                                                    const baseName = aliasMap[st.n] || st.n;
                                                    return (
                                                        <option key={`end-${st.c}`} value={baseName}>
                                                            [{st.c}] {st.n} ({st.e}){st.a ? ` 📍 ${st.a.split(',')[0]}` : ''}
                                                        </option>
                                                    );
                                                })}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 top-6 flex items-center px-3 text-slate-500">
                                        <i data-lucide="chevron-down" className="w-5 h-5" aria-hidden="true"></i>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Route Results (aria-live 通知無障礙設備動態更新) */}
                        <section aria-live="polite" aria-atomic="true">
                            {startStation === endStation ? (
                                <div className="bg-yellow-50 text-yellow-800 p-4 rounded-xl text-center shadow-sm font-medium">
                                    📍 Start and destination are the same station or transfer area!
                                </div>
                            ) : route ? (
                                <RouteTimeline legs={route} destName={endStation} />
                            ) : (
                                <div className="text-center text-slate-500 py-8 font-medium">
                                    <i data-lucide="loader-2" className="w-6 h-6 animate-spin mx-auto mb-2 text-teal-500"></i>
                                    Calculating best route...
                                </div>
                            )}
                        </section>
                    </main>
                </div>
            );
        };

        const RouteTimeline = ({ legs, destName }) => {
            const totalTime = legs.reduce((acc, leg) => acc + leg.time, 0);
            const totalTransfers = legs.filter(l => l.type === 'transfer').length;
            
            const destInfo = uniquePhysicalStations[destName];

            return (
                <article className="bg-white rounded-2xl shadow-xl overflow-hidden">
                    <header className="bg-slate-50 border-b border-slate-100 p-5 flex justify-between items-center">
                        <div>
                            <p className="text-sm font-semibold text-slate-500 mb-1">Est. Time</p>
                            <p className="text-3xl font-bold text-slate-800">
                                {totalTime} <span className="text-base font-normal text-slate-500">mins</span>
                            </p>
                        </div>
                        <div className="text-right">
                            <p className="text-sm font-semibold text-slate-500 mb-1">Transfers</p>
                            <p className="text-lg font-bold text-slate-700">
                                {totalTransfers} <span className="text-sm font-normal text-slate-500">times</span>
                            </p>
                        </div>
                    </header>

                    <div className="p-6">
                        <div className="ml-4">
                            {legs.map((leg, idx) => (
                                <LegItem key={idx} leg={leg} isLast={idx === legs.length - 1} destName={destName} />
                            ))}
                        </div>
                        
                        {/* Destination Marker */}
                        <div className="relative pl-8 border-l-4 border-transparent">
                            <div className="absolute left-[-10px] top-1 w-4 h-4 bg-slate-800 rounded-full border-4 border-white shadow-sm z-10"></div>
                            <div className="absolute left-[-16px] top-[-5px] w-7 h-7 bg-slate-200 rounded-full opacity-50 z-0 animate-pulse"></div>
                            <h3 className="text-lg font-bold text-slate-800">{destInfo.name} <span className="text-sm font-normal text-slate-500 ml-1">{destInfo.en}</span></h3>
                            <p className="text-sm text-slate-500 mb-2">Arrive at Destination</p>
                            
                            {destInfo.attractions && (
                                <div className="mt-2 bg-teal-50 border border-teal-100 rounded-lg p-3 text-sm flex gap-2">
                                    <i data-lucide="map-pin" className="w-5 h-5 text-teal-600 shrink-0" aria-hidden="true"></i>
                                    <div>
                                        <span className="font-semibold text-teal-900 block mb-0.5">Nearby Attractions:</span>
                                        <span className="text-teal-800">{destInfo.attractions}</span>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </article>
            );
        };

        const LegItem = ({ leg, isLast, destName }) => {
            const startNodeCode = leg.nodes[0];
            const endNodeCode = leg.nodes[leg.nodes.length - 1];
            const startStation = allStationsMap[startNodeCode];
            const endStation = allStationsMap[endNodeCode];

            if (leg.type === 'transfer') {
                return (
                    <div className="relative pl-8 pb-8 border-l-4 border-dashed border-slate-300">
                        <div className="absolute left-[-14px] top-1 w-6 h-6 bg-white rounded-full border-2 border-slate-300 z-10 flex items-center justify-center">
                            <i data-lucide="footprints" className="w-3.5 h-3.5 text-slate-500" aria-hidden="true"></i>
                        </div>
                        <div className="bg-slate-50 border border-slate-200 rounded-lg p-3 inline-block">
                            <p className="text-sm font-semibold text-slate-700">
                                Transfer at: <span className="text-slate-900">{aliasMap[startStation.n] || startStation.n}</span>
                            </p>
                            <p className="text-xs text-slate-500 mt-1 flex items-center gap-1">
                                <i data-lucide="clock" className="w-3 h-3" aria-hidden="true"></i> Walk & wait approx. {leg.time} mins
                            </p>
                        </div>
                    </div>
                );
            }

            // Ride Type
            const lineTheme = lineColors[leg.line] || { bg: 'bg-slate-500', border: 'border-slate-500', text: 'text-slate-600', name: leg.line };
            
            return (
                <div className={`relative pl-8 pb-8 border-l-4 ${lineTheme.border}`}>
                    {/* Circle Node */}
                    <div className={`absolute left-[-10px] top-1 w-4 h-4 rounded-full border-4 border-white shadow-sm z-10 ${lineTheme.bg}`}></div>
                    
                    {/* Leg Start Info */}
                    <div className="mb-2">
                        <h3 className="text-base font-bold text-slate-800">
                            {startStation.n} <span className="text-sm font-normal text-slate-500 ml-1">{startStation.e}</span>
                        </h3>
                        
                        {startStation.a && (
                            <p className="text-xs text-teal-600 mt-1 flex items-start gap-1">
                                <i data-lucide="star" className="w-3.5 h-3.5 mt-0.5 shrink-0" aria-hidden="true"></i>
                                <span>{startStation.a}</span>
                            </p>
                        )}
                    </div>

                    {/* Line Details Card */}
                    <div className={`mt-3 border-l-4 rounded-r-lg p-4 bg-white shadow-sm border-y border-r border-slate-100 ${lineTheme.border}`}>
                        <div className="flex items-center gap-2 mb-1">
                            <span className={`${lineTheme.bg} text-white text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider`}>
                                {startNodeCode}
                            </span>
                            <span className={`text-sm font-semibold ${lineTheme.text}`}>Take {lineTheme.name}</span>
                        </div>
                        <p className="text-xs text-slate-500 flex items-center gap-2 mt-2">
                            <span>To <strong>{endStation.n}</strong></span>
                            <span className="text-slate-300">|</span>
                            <span>{leg.stops} stops</span>
                            <span className="text-slate-300">|</span>
                            <span>Approx. {leg.time} mins</span>
                        </p>
                        
                        {/* Pass through stations */}
                        <div className="mt-2 text-xs text-slate-400">
                            Via: {leg.nodes.slice(1, -1).map(c => allStationsMap[c].n).join(' ➔ ') || 'No intermediate stops'}
                        </div>
                    </div>
                </div>
            );
        };

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
