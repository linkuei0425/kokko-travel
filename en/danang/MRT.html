<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Da Nang Transport (City Bus/Hoi An/Ba Na Hills) Route & Attraction Search</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f0f9ff; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. Database (Da Nang, Hoi An, and Ba Na Hills Transport System) ---
        const transportData = {
            D12: [ // Danabus Route 12 (Coastal Tourism Line)
                { c: "D12-01", n: "Tho Quang Wharf", e: "Thọ Quang", a: "Entrance to Son Tra Peninsula" },
                { c: "D12-02", n: "Bien Dong Park", e: "East Sea Park", a: "My Khe Beach North, Pigeon Square" },
                { c: "D12-03", n: "My Khe Beach", e: "Biển Mỹ Khê", a: "Famous white sand beach, Seafood street" },
                { c: "D12-04", n: "Lotte Mart", e: "Lotte Mart", a: "Souvenir shopping, Korean supermarket" },
                { c: "D12-05", n: "Helio Night Market", e: "Chợ đêm Helio", a: "Trendy night market, Asia Park" }
            ],
            LK02: [ // Inter-provincial Bus (Da Nang - Hoi An)
                { c: "LK02-01", n: "Da Nang Central Bus Station", e: "Bến xe trung tâm", a: "Long-distance bus transfers" },
                { c: "LK02-02", n: "Da Nang University", e: "Đại học Đà Nẵng", a: "West side of city center" },
                { c: "LK02-03", n: "Dragon Bridge (West)", e: "Cầu Rồng (Phía Tây)", a: "Pink Cathedral (5m walk), Han Market" },
                { c: "LK02-04", n: "Marble Mountains", e: "Ngũ Hành Sơn", a: "Limestone caves, Buddhist sanctuaries" },
                { c: "LK02-05", n: "Hoi An Bus Station", e: "Bến xe Hội An", a: "Gateway to Hoi An Ancient Town" }
            ],
            AIR: [ // Airport Shuttle / City Center Routes
                { c: "A1-01", n: "Da Nang Int'l Airport", e: "Sân bay Đà Nẵng (DAD)", a: "International/Domestic terminals" },
                { c: "A1-02", n: "Nguyen Van Linh St", e: "Đường Nguyễn Văn Linh", a: "City financial district" },
                { c: "A1-03", n: "Dragon Bridge (West)", e: "Cầu Rồng (Phía Tây)", a: "Dragon Bridge, Love Lock Bridge, Cham Museum" },
                { c: "A1-04", n: "My Khe Beach", e: "Biển Mỹ Khê", a: "Transfer to D12 Route" }
            ],
            HOI: [ // Hoi An Local Shuttle/Tram
                { c: "H-01", n: "Hoi An Bus Station", e: "Bến xe Hội An", a: "Inter-city bus terminal" },
                { c: "H-02", n: "Old Town Entrance (North)", e: "Phố Cổ Hội An", a: "Ancient Town, Japanese Bridge" },
                { c: "H-03", n: "An Bang Beach", e: "Biển An Bàng", a: "Coastal restaurants & cafes" },
                { c: "H-04", n: "Cam Thanh Wharf", e: "Bến tàu Cẩm Thanh", a: "Coconut Forest Basket Boat experience" }
            ],
            BAN: [ // Ba Na Hills Shuttle (Tourist shuttle or private charter route)
                { c: "B-01", n: "Dragon Bridge (West)", e: "Cầu Rồng (Phía Tây)", a: "Main pickup point for tourist shuttles" },
                { c: "B-02", n: "Ba Na Hills Station", e: "Ga cáp treo Bà Nà", a: "Golden Bridge, French Village, Sun World" }
            ]
        };

        const lineColors = {
            D12: { bg: 'bg-sky-500', border: 'border-sky-500', text: 'text-sky-700', name: '🚌 Danabus Route 12' },
            LK02: { bg: 'bg-yellow-500', border: 'border-yellow-500', text: 'text-yellow-700', name: '🚍 Hoi An Bus LK02' },
            AIR: { bg: 'bg-blue-600', border: 'border-blue-600', text: 'text-blue-800', name: '✈️ Airport Shuttle' },
            HOI: { bg: 'bg-emerald-500', border: 'border-emerald-500', text: 'text-emerald-700', name: '🚲 Hoi An Shuttle/Tram' },
            BAN: { bg: 'bg-indigo-600', border: 'border-indigo-600', text: 'text-indigo-800', name: '🚠 Ba Na Hills Shuttle' }
        };

        // Transfer point mapping: Detailed locations
        const aliasMap = {
            "Dragon Bridge (West)": "City Center Hub (West side/Near Han Market)",
            "My Khe Beach": "Coastal Hub (My Khe Beach Central)",
            "Hoi An Bus Station": "Hoi An Transfer Center (Town Fringe)"
        };

        let allStationsMap = {};
        let uniquePhysicalStations = {}; 

        Object.keys(transportData).forEach(lineKey => {
            transportData[lineKey].forEach(st => {
                allStationsMap[st.c] = { ...st, line: lineKey };
                let baseName = aliasMap[st.n] || st.n;

                if (!uniquePhysicalStations[baseName]) {
                    uniquePhysicalStations[baseName] = { name: baseName, en: st.e, codes: [], attractions: st.a };
                }
                uniquePhysicalStations[baseName].codes.push(st.c);
                if (st.a && !uniquePhysicalStations[baseName].attractions.includes(st.a)) {
                    uniquePhysicalStations[baseName].attractions += (uniquePhysicalStations[baseName].attractions ? ", " : "") + st.a;
                }
            });
        });

        const graph = {};
        const BUS_TIME = 6; 
        const BANA_RIDE_TIME = 45; 
        const TRANSFER_TIME = 10; 

        function addEdge(u, v, weight, type, line) {
            if (!graph[u]) graph[u] = [];
            graph[u].push({ node: v, weight, type, line });
        }

        Object.keys(transportData).forEach(lineKey => {
            const lineArr = transportData[lineKey];
            const weight = lineKey === 'BAN' ? BANA_RIDE_TIME : BUS_TIME;
            for (let i = 0; i < lineArr.length - 1; i++) {
                addEdge(lineArr[i].c, lineArr[i+1].c, weight, 'ride', lineKey);
                addEdge(lineArr[i+1].c, lineArr[i].c, weight, 'ride', lineKey);
            }
        });

        Object.values(uniquePhysicalStations).forEach(station => {
            if (station.codes.length > 1) {
                for (let i = 0; i < station.codes.length; i++) {
                    for (let j = i + 1; j < station.codes.length; j++) {
                        addEdge(station.codes[i], station.codes[j], TRANSFER_TIME, 'transfer', null);
                        addEdge(station.codes[j], station.codes[i], TRANSFER_TIME, 'transfer', null);
                    }
                }
            }
        });

        function findShortestPath(startBaseName, endBaseName) {
            if (startBaseName === endBaseName) return null;
            const startCodes = uniquePhysicalStations[startBaseName].codes;
            const endCodes = uniquePhysicalStations[endBaseName].codes;
            const dist = {};
            const prev = {};
            const pq = [];
            Object.keys(allStationsMap).forEach(node => { dist[node] = Infinity; prev[node] = null; });
            startCodes.forEach(code => { dist[code] = 0; pq.push({ node: code, dist: 0 }); });

            while (pq.length > 0) {
                pq.sort((a, b) => a.dist - b.dist);
                const { node, dist: currentDist } = pq.shift();
                if (dist[node] < currentDist) continue;
                if (endCodes.includes(node)) return reconstructPath(prev, node);

                if (graph[node]) {
                    graph[node].forEach(edge => {
                        const alt = currentDist + edge.weight;
                        if (alt < dist[edge.node]) {
                            dist[edge.node] = alt;
                            prev[edge.node] = { node: node, edgeFromPrev: edge };
                            pq.push({ node: edge.node, dist: alt });
                        }
                    });
                }
            }
            return null;
        }

        function reconstructPath(prev, endNode) {
            const path = [];
            let curr = endNode;
            while (curr) {
                const step = prev[curr];
                if (step) { path.unshift({ node: curr, edge: step.edgeFromPrev }); curr = step.node; }
                else { path.unshift({ node: curr, edge: null }); curr = null; }
            }
            const legs = [];
            if (path.length < 2) return [];
            let currentLeg = { 
                type: path[1].edge.type, 
                line: path[1].edge.line, 
                nodes: [path[0].node, path[1].node],
                time: path[1].edge.weight,
                stops: path[1].edge.type === 'ride' ? 1 : 0
            };
            for (let i = 2; i < path.length; i++) {
                const edge = path[i].edge;
                if (edge.type === currentLeg.type && edge.line === currentLeg.line) {
                    currentLeg.nodes.push(path[i].node);
                    currentLeg.time += edge.weight;
                    if(edge.type === 'ride') currentLeg.stops += 1;
                } else {
                    legs.push(currentLeg);
                    currentLeg = { type: edge.type, line: edge.line, nodes: [path[i-1].node, path[i].node], time: edge.weight, stops: edge.type === 'ride' ? 1 : 0 };
                }
            }
            legs.push(currentLeg);
            return legs;
        }

        const { useState, useEffect } = React;

        const App = () => {
            const [startStation, setStartStation] = useState("Da Nang Int'l Airport");
            const [endStation, setEndStation] = useState("Ba Na Hills Station");
            const [route, setRoute] = useState(null);

            useEffect(() => { lucide.createIcons(); });

            useEffect(() => {
                if(startStation && endStation && startStation !== endStation) {
                    const legs = findShortestPath(startStation, endStation);
                    setRoute(legs);
                } else { setRoute(null); }
            }, [startStation, endStation]);

            const handleSwap = () => {
                const temp = startStation;
                setStartStation(endStation);
                setEndStation(temp);
            };

            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-blue-800 text-white shadow-md pt-12 pb-8 px-6 text-center">
                        <div className="flex items-center justify-center gap-4 mb-3">
                            <a href="https://linkuei0425.github.io/DaNang-US/" title="Back to Home" className="inline-flex items-center justify-center text-blue-100 hover:text-white bg-blue-700 hover:bg-blue-600 p-2.5 rounded-full transition-colors shadow-sm">
                                <i data-lucide="home" className="w-5 h-5"></i>
                            </a>
                            <h1 className="text-2xl md:text-3xl font-bold tracking-tight flex items-center gap-2">
                                <i data-lucide="map" className="w-7 h-7 text-yellow-300"></i>
                                Da Nang Transport Guide
                            </h1>
                        </div>
                        <p className="text-blue-100 text-sm">Routes for Danabus, Hoi An Shuttles & Ba Na Hills</p>
                    </header>

                    <main className="max-w-2xl mx-auto px-4 -mt-6">
                        <div className="bg-white rounded-2xl shadow-xl p-6 mb-8 relative">
                            <div className="flex flex-col gap-4">
                                <div className="relative">
                                    <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">From</label>
                                    <select className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-base rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3.5 pr-8 font-medium appearance-none" value={startStation} onChange={(e) => setStartStation(e.target.value)}>
                                        {Object.keys(transportData).map(lineKey => (
                                            <optgroup key={`start-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                {transportData[lineKey].map(st => {
                                                    const baseName = aliasMap[st.n] || st.n;
                                                    return <option key={`start-${st.c}`} value={baseName}>[{st.c}] {st.n}</option>;
                                                })}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 top-6 flex items-center px-3 text-slate-500">
                                        <i data-lucide="chevron-down" className="w-5 h-5"></i>
                                    </div>
                                </div>

                                <div className="relative flex justify-center -my-3 z-10">
                                    <button onClick={handleSwap} className="bg-yellow-500 hover:bg-yellow-600 text-white p-2.5 rounded-full shadow-md transition-transform hover:scale-105">
                                        <i data-lucide="arrow-down-up" className="w-5 h-5"></i>
                                    </button>
                                </div>

                                <div className="relative">
                                    <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">To</label>
                                    <select className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-base rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3.5 pr-8 font-medium appearance-none" value={endStation} onChange={(e) => setEndStation(e.target.value)}>
                                        {Object.keys(transportData).map(lineKey => (
                                            <optgroup key={`end-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                {transportData[lineKey].map(st => {
                                                    const baseName = aliasMap[st.n] || st.n;
                                                    return <option key={`end-${st.c}`} value={baseName}>[{st.c}] {st.n}</option>;
                                                })}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 top-6 flex items-center px-3 text-slate-500">
                                        <i data-lucide="chevron-down" className="w-5 h-5"></i>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {startStation === endStation ? (
                            <div className="bg-blue-50 text-blue-800 p-4 rounded-xl text-center shadow-sm">
                                📍 You are already at your destination!
                            </div>
                        ) : route ? (
                            <RouteTimeline legs={route} destName={endStation} />
                        ) : (
                            <div className="text-center text-slate-500 py-8 italic">
                                Sorry, no direct connection found between these points...
                            </div>
                        )}
                        
                        <div className="mt-8 bg-blue-100/50 rounded-xl p-4 text-xs text-blue-800 space-y-2 border border-blue-200">
                            <p className="font-bold flex items-center gap-1"><i data-lucide="info" className="w-3.5 h-3.5"></i> Travel Tips:</p>
                            <ul className="list-disc pl-4 space-y-1">
                                <li><strong>City Center Hub (Dragon Bridge West):</strong> This point is located near the Cham Museum and Han River. It's a key transfer spot for Ba Na Hills shuttles and Hoi An buses. Pink Cathedral and Han Market are a 5-10 min walk away.</li>
                                <li><strong>Ba Na Hills:</strong> Booking a shared shuttle via Klook/KKday is recommended for best value. For groups, a <strong>Grab Charter</strong> (including wait time) is a great option.</li>
                                <li><strong>Hoi An Electric Trams:</strong> After arriving at Hoi An station via the LK02 bus, use local green trams to reach the heart of the Ancient Town.</li>
                            </ul>
                        </div>
                    </main>
                </div>
            );
        };

        const RouteTimeline = ({ legs, destName }) => {
            const totalTime = legs.reduce((acc, leg) => acc + leg.time, 0);
            const totalTransfers = legs.filter(l => l.type === 'transfer').length;
            const destInfo = uniquePhysicalStations[destName];

            return (
                <div className="bg-white rounded-2xl shadow-xl overflow-hidden">
                    <div className="bg-slate-50 border-b border-slate-100 p-5 flex justify-between items-center">
                        <div><p className="text-sm font-semibold text-slate-500 mb-1">Estimated Time</p><p className="text-3xl font-bold text-slate-800">{totalTime} <span className="text-base font-normal text-slate-500">mins</span></p></div>
                        <div className="text-right"><p className="text-sm font-semibold text-slate-500 mb-1">Transfers</p><p className="text-lg font-bold text-slate-700">{totalTransfers} <span className="text-sm font-normal text-slate-500">time(s)</span></p></div>
                    </div>

                    <div className="p-6">
                        <div className="ml-4">
                            {legs.map((leg, idx) => (
                                <LegItem key={idx} leg={leg} isLast={idx === legs.length - 1} destName={destName} />
                            ))}
                        </div>
                        <div className="relative pl-8 border-l-4 border-transparent">
                            <div className="absolute left-[-10px] top-1 w-4 h-4 bg-slate-800 rounded-full border-4 border-white shadow-sm z-10"></div>
                            <h3 className="text-lg font-bold text-slate-800">{destInfo.name} <span className="text-sm font-normal text-slate-500 ml-1">{destInfo.en}</span></h3>
                            <p className="text-sm text-slate-500 mb-2">Arrive at Destination</p>
                            {destInfo.attractions && (
                                <div className="mt-2 bg-blue-50 border border-blue-100 rounded-lg p-3 text-sm flex gap-2">
                                    <i data-lucide="map-pin" className="w-5 h-5 text-blue-600 shrink-0"></i>
                                    <div><span className="font-semibold text-blue-900 block mb-0.5">Nearby Landmarks:</span><span className="text-blue-800">{destInfo.attractions}</span></div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const LegItem = ({ leg, isLast, destName }) => {
            const startNodeCode = leg.nodes[0];
            const endNodeCode = leg.nodes[leg.nodes.length - 1];
            const startStation = allStationsMap[startNodeCode];
            const endStation = allStationsMap[endNodeCode];

            if (leg.type === 'transfer') {
                return (
                    <div className="relative pl-8 pb-8 border-l-4 border-dashed border-slate-300">
                        <div className="absolute left-[-14px] top-1 w-6 h-6 bg-white rounded-full border-2 border-slate-300 z-10 flex items-center justify-center">
                            <i data-lucide="footprints" className="w-3.5 h-3.5 text-slate-500"></i>
                        </div>
                        <div className="bg-slate-50 border border-slate-200 rounded-lg p-3 inline-block">
                            <p className="text-sm font-semibold text-slate-700">Transfer vehicles at <span className="text-slate-900">{aliasMap[startStation.n] || startStation.n}</span></p>
                            <p className="text-xs text-slate-500 mt-1 flex items-center gap-1"><i data-lucide="clock" className="w-3 h-3"></i> Walk/Wait approx. {leg.time} mins</p>
                        </div>
                    </div>
                );
            }

            const lineTheme = lineColors[leg.line] || { bg: 'bg-slate-500', border: 'border-slate-500', text: 'text-slate-600', name: leg.line };
            return (
                <div className={`relative pl-8 pb-8 border-l-4 ${lineTheme.border}`}>
                    <div className={`absolute left-[-10px] top-1 w-4 h-4 rounded-full border-4 border-white shadow-sm z-10 ${lineTheme.bg}`}></div>
                    <div className="mb-2">
                        <h3 className="text-base font-bold text-slate-800">{startStation.n} <span className="text-sm font-normal text-slate-500 ml-1">{startStation.en}</span></h3>
                        {startStation.a && (
                            <p className="text-xs text-blue-600 mt-1 flex items-start gap-1"><i data-lucide="star" className="w-3.5 h-3.5 mt-0.5 shrink-0"></i><span>{startStation.a}</span></p>
                        )}
                    </div>
                    <div className={`mt-3 border-l-4 rounded-r-lg p-4 bg-white shadow-sm border-y border-r border-slate-100 ${lineTheme.border}`}>
                        <div className="flex items-center gap-2 mb-1">
                            <span className={`${lineTheme.bg} text-white text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider`}>{startNodeCode}</span>
                            <span className={`text-sm font-semibold ${lineTheme.text}`}>Take {lineTheme.name}</span>
                        </div>
                        <p className="text-xs text-slate-500 flex items-center gap-2 mt-2">
                            <span>To <strong>{endStation.n}</strong></span><span className="text-slate-300">|</span><span>{leg.stops} stop(s)</span><span className="text-slate-300">|</span><span>Approx. {leg.time} mins</span>
                        </p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        lucide.createIcons();
    </script>
</body>
</html>
