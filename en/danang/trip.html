<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Hide horizontal scrollbar but keep functionality */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- Navigation Icons ---
        const MapPin = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const Ticket = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>;
        const Sun = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const Sparkles = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
        const TrainFront = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3.1V7a4 4 0 0 0 8 0V3.1"/><path d="M9 15h6"/><path d="M14 19.5l3-3-3-3"/><path d="M10 19.5l-3-3 3-3"/><path d="M4 22v-3.5"/><path d="M20 22v-3.5"/><rect width="16" height="16" x="4" y="3" rx="2"/></svg>;
        const ExternalLink = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>;
        const Info = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const Home = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;

            { id: 'Experiences & Entertainment', icon: Sparkles },
            { id: 'Transport & WiFi', icon: TrainFront }

        // --- Da Nang Itinerary Data ---
        const itineraryData = {
            'Da Nang City': {

                    { title: '🎟️ Marble Mountains & Hoi An Day Tour', description: 'Explore the mysterious limestone caves of the Marble Mountains, then head to Hoi An Ancient Town to enjoy its historic architecture and beautiful lanterns.', link: 'https://www.klook.com/en-US/activity/13570-marble-mountain-hoi-an-day-tour-da-nang/?spm=SearchResult.SearchResult_LIST&clickId=c6958adb44&aid=117264' },
                    { title: 'Linh Ung Pagoda, Marble Mountains & Hoi An Day Tour', description: 'A fulfilling classic route: visit the giant Lady Buddha, explore caves, and take a stroll through the ancient town of Hoi An.', link: 'https://www.klook.com/en-US/activity/147576-linh-ung-pagoda-son-tra-peninsula-marble-mountains-hoian-tour/?spm=SearchResult.SearchResult_LIST&clickId=82da1455c6&aid=117264' }
                ],
                'Experiences & Entertainment': [
                    { title: 'Da Nang Airport (DAD) Orchid Lounge', description: 'The perfect place to wait for your flight! Enjoy comfortable seating, delicious food, and shower facilities to wash away travel fatigue.', link: 'https://www.klook.com/en-US/activity/113258-orchid-lounge-da-nang-international-airport-dad/?spm=SearchResult.SearchResult_LIST&clickId=7d0eab97e4&aid=117264' },
                    { title: 'Han River Evening Cruise in Da Nang', description: 'Sail along the Han River at dusk and admire the dazzling lights of the Dragon Bridge and the beautiful city night view.', link: 'https://www.klook.com/en-US/activity/28414-han-river-evening-cruise-da-nang/?spm=SearchResult.SearchResult_LIST&clickId=e72f66e358&aid=117264' },
                    { title: 'Nguon Spa Massage in Da Nang', description: 'Enjoy professional massages in a comfortable environment and completely release your accumulated travel fatigue.', link: 'https://www.klook.com/en-US/activity/119654-nguon-spa-massage-da-nang/?spm=SearchResult.SearchResult_LIST&clickId=e98c6c8d9a&aid=117264' },
                    { title: 'Trees Spa Experience in Da Nang', description: 'Immerse yourself in a natural atmosphere and experience premium spa services for total relaxation of body and mind.', link: 'https://www.klook.com/en-US/activity/55550-trees-spa-experience-da-nang/?spm=SearchResult.SearchResult_LIST&clickId=3ec7d3a1fb&aid=117264' },
                    { title: 'Sum Spa & Massage Da Nang', description: 'A highly-rated local SPA offering various massage packages to soothe every inch of your skin.', link: 'https://www.klook.com/en-US/activity/124120-sum-spa-massage-experience-da-nang/?spm=SearchResult.SearchResult_LIST&clickId=c175a8ddbb&aid=117264' },
                    { title: 'Herbal Spa in Da Nang', description: 'Da Nang\'s highly popular hot stone and herbal massage, bringing you ultimate relaxation with traditional Vietnamese techniques.', link: 'https://www.klook.com/en-US/activity/13122-herbal-spa-da-nang/?spm=SearchResult.SearchResult_LIST&clickId=bb04418f0b&aid=117264' }
                ],
                'Transport & WiFi': [
                    { title: '🎟️ Da Nang Airport Transfers', description: 'Avoid the hassle of haggling outside the airport. A dedicated driver will pick you up and take you safely and comfortably to your downtown hotel.', link: 'https://www.klook.com/en-US/airport-transfers/?flightDirection=1&code=DAD&spm=SearchResult.SearchResult_LIST&clickId=4bc47d4ea1&aid=117264' },
                    { title: 'Da Nang Airport Fast Track Service', description: 'Skip the long immigration lines. A dedicated staff member will guide you through the premium lane, saving you valuable time.', link: 'https://www.klook.com/en-US/activity/86297-da-nang-airport-fast-track/?spm=SearchResult.SearchResult_LIST&clickId=2eeae9beb8&aid=117264' },
                    { title: '🎟️ Vietnam 5G SIM Card', description: 'Pick up right at the airport. A stable connection ensures peace of mind for navigating and traveling.', link: 'https://www.klook.com/en-US/activity/16622-4g-sim-card-vietnam/?spm=SearchResult.SearchResult_LIST&clickId=8a2050b326&aid=117264' },
                    { title: '5G eSIM for Vietnam', description: 'Simply scan the QR code to activate your internet. No need to swap physical cards—essential for navigation and social media.', link: 'https://www.klook.com/en-US/activity/123902-vietnam-esim-high-speed-internet-qr-code-voucher/?spm=SearchResult.SearchResult_LIST&clickId=d82cc57b90&aid=117264' },
                    { title: 'Da Nang Private Car Charter', description: 'You decide the itinerary! A private driver takes you to major attractions in Central Vietnam without time or route restrictions.', link: 'https://www.klook.com/en-US/activity/6266-private-car-charter-da-nang/?spm=SearchResult.SearchResult_LIST&clickId=57f12b20e5&aid=117264' },
                    { title: 'Shared Shuttle Bus between Da Nang Airport / Da Nang & Hoi An', description: 'An economical and practical transport option for easily traveling between the popular cities of Da Nang and Hoi An.', link: 'https://www.klook.com/en-US/activity/12191-shared-shuttle-bus-transfers-between-da-nang-airport-da-nang-hoi-an-da-nang/?spm=SearchResult.SearchResult_LIST&clickId=fe88e47f4c&aid=117264' },

                'Day Tours': [
                    { title: 'Private Ba Na Hills & Golden Bridge Day Tour (from Da Nang)', description: 'Exclusive itinerary arrangement! Let a professional guide take you on a relaxing tour of Ba Na Hills and the classic Golden Bridge.', link: 'https://www.klook.com/en-US/activity/14319-private-ba-na-hills-golden-bridge-day-trip-optional-english-speaking-guide-da-nang/?spm=SearchResult.SearchResult_LIST&clickId=f9da1a1bc9&aid=117264' },
                    { title: 'Private Ba Na Hills, Golden Bridge & Hoi An Day Tour', description: 'Collect two major attractions at once! Stroll through the cloud-top French Village by day and immerse in Hoi An\'s sea of lanterns by night.', link: 'https://www.klook.com/en-US/activity/14311-private-hoi-an-day-tour-from-da-nang/?spm=SearchResult.SearchResult_LIST&clickId=09fcefce79&aid=117264' },
                    { title: 'Golden Bridge & Hoi An Ancient Town Full Day Tour', description: 'A classic itinerary combination, taking you through a European fairy-tale world and classic Vietnamese charm.', link: 'https://www.klook.com/en-US/activity/194913-golden-bridge-ba-na-hills-hoi-an-ancient-town-full-day-private-trip-multilingual-speaking-driver/?spm=SearchResult.SearchResult_LIST&clickId=2b7359d5d1&aid=117264' }

                ],
                'Transport & WiFi': [
                    { title: '🎟️ Round-trip Shuttle Bus / Da Nang to Ba Na Hills Bus', description: 'Comfortable and convenient round-trip shuttle bus from the city, making transportation to Ba Na Hills a breeze.', link: 'https://affiliate.klook.com/redirect?aid=117264&aff_adid=1246763&k_site=https%3A%2F%2Fwww.klook.com%2Fen-US%2Factivity%2F32080-shared-shuttle-bus-transfer-da-nang-city-ba-na-hills%2F' },

                ]

                    { title: '🎟️ Hoi An Memories Show Ticket', description: 'A large-scale live performance featuring hundreds of actors, recreating 400 years of Hoi An\'s prosperous history on a magnificent stage.', link: 'https://www.klook.com/en-US/activity/17514-hoi-an-memories-show-ticket/?spm=SearchResult.SearchResult_LIST&clickId=1561c69a7c&aid=117264' }
                ],
                'Day Tours': [
                    { title: 'Marble Mountains & Monkey Mountain Sunset Tour (from Hoi An)', description: 'Depart from Hoi An to explore the Marble Mountains, and enjoy a charming coastal sunset at the Son Tra Peninsula.', link: 'https://www.klook.com/en-US/activity/33884-marble-mountains-monkey-sunset-tour-hoi-an/?spm=SearchResult.SearchResult_LIST&clickId=9fbf60e39c&aid=117264' },
                    { title: 'Cham Islands Day Trip', description: 'Head to the Cham Islands, known for crystal-clear waters and rich coral reefs. Enjoy snorkeling and fresh seafood.', link: 'https://www.klook.com/en-US/activity/4791-cham-islands-day-trip-hoi-an/?spm=SearchResult.SearchResult_LIST&clickId=56194d9d16&aid=117264' }
                ],
                'Experiences & Entertainment': [
                    { title: 'Traditional Ao Dai Rental & Photoshoot in Hoi An', description: 'Put on a flowing Ao Dai and take stunning photos in front of the vintage yellow walls, leaving unforgettable memories.', link: 'https://www.klook.com/en-US/activity/115060-traditional-ao-dai-rental-photoshoot-hoi-an/?spm=SearchResult.SearchResult_LIST&clickId=cd4b0124ac&aid=117264' },
                    { title: 'Lantern Making Class in Hoi An', description: 'Handpick your fabrics and bamboo frames, and follow a master craftsman to make a unique Hoi An lantern to take home as a souvenir.', link: 'https://www.klook.com/en-US/activity/9280-lantern-making-class-hoi-an/?spm=SearchResult.SearchResult_LIST&clickId=d9d4add767&aid=117264' }
                ],
                'Transport & WiFi': [
                    { title: '🎟️ Hoi An Airport Transfers', description: 'Avoid the hassle of haggling outside the airport. A dedicated driver will pick you up and take you safely and comfortably to your hotel.', link: 'https://www.klook.com/en-US/airport-transfers/?flightDirection=1&code=DAD&spm=SearchResult.SearchResult_LIST&clickId=4bc47d4ea1&aid=117264' },
                    { title: 'Hoi An Airport Fast Track Service', description: 'Skip the long immigration lines. A dedicated staff member will guide you through the premium lane, saving you valuable time.', link: 'https://www.klook.com/en-US/activity/86297-da-nang-airport-fast-track/?spm=SearchResult.SearchResult_LIST&clickId=2eeae9beb8&aid=117264' },
                    { title: '🎟️ Vietnam 5G SIM Card', description: 'Pick up right at the airport. A stable connection ensures peace of mind for navigating and traveling.', link: 'https://www.klook.com/en-US/activity/16622-4g-sim-card-vietnam/?spm=SearchResult.SearchResult_LIST&clickId=8a2050b326&aid=117264' },
                    { title: '5G eSIM for Vietnam', description: 'Simply scan the QR code to activate your internet. No need to swap physical cards—essential for navigation and social media.', link: 'https://www.klook.com/en-US/activity/123902-vietnam-esim-high-speed-internet-qr-code-voucher/?spm=SearchResult.SearchResult_LIST&clickId=d82cc57b90&aid=117264' },
                    { title: 'Hoi An Private Car Charter', description: 'You decide the itinerary! A private driver takes you to major attractions in Central Vietnam without time or route restrictions.', link: 'https://www.klook.com/en-US/activity/6266-private-car-charter-da-nang/?spm=SearchResult.SearchResult_LIST&clickId=57f12b20e5&aid=117264' },
                    { title: 'Shared Shuttle Bus between Da Nang Airport / Da Nang & Hoi An', description: 'An economical and practical transport option for easily traveling between popular cities.', link: 'https://www.klook.com/en-US/activity/12191-shared-shuttle-bus-transfers-between-da-nang-airport-da-nang-hoi-an-da-nang/?spm=SearchResult.SearchResult_LIST&clickId=fe88e47f4c&aid=117264' },
                    { title: 'Hanoi - Hoi An Sleeper Bus', description: 'Experience Vietnam\'s unique long-distance sleeper bus. Travel lying down, saving on accommodation while heading to your next destination.', link: 'https://www.klook.com/en-US/activity/145072-hanoi-da-nang-hoi-an-cabin-sleeper-bus-by-hk-buslines/?spm=SearchResult.SearchResult_LIST&clickId=1f9e0f6f02&aid=117264' }
                ]
            },
            'Hue / My Son Sanctuary': {
                'Attractions & Tickets': [
                    { title: 'Hue Monuments Complex Admission Ticket', description: 'Explore the political center of Vietnam\'s last feudal dynasty, visit the magnificent palace complex, and feel the historical glory of the Nguyen Dynasty.', link: 'https://www.klook.com/en-US/activity/74899-hue-monuments-complex-admission-ticket/?aid=117264' }
                ],
                'Day Tours': [
                    { title: 'My Son Sanctuary Half Day Tour (from Da Nang)', description: 'Explore the UNESCO World Heritage Site "Vietnamese Angkor Wat," and feel the mysterious aura of the thousand-year-old Champa Kingdom.', link: 'https://www.klook.com/en-US/activity/9371-my-son-sanctuary-tour-da-nang/?spm=SearchResult.SearchResult_LIST&clickId=20d6c395c6&aid=117264' },
                    { title: 'Hue Discovery Day Tour', description: 'Deeply explore the ancient capital of Hue, visit the Thien Mu Pagoda, the Imperial City, and the royal tombs, immersing yourself in rich history and culture.', link: 'https://www.klook.com/en-US/activity/1560-hue-discovery-half-full-day-tour-hue/?aid=117264' },
                    { title: 'Trekking Bach Ma National Park Day Tour', description: 'Escape the hustle and bustle, hike deep into Bach Ma National Park, and admire magnificent waterfalls and a rich ecosystem.', link: 'https://www.klook.com/en-US/activity/11139-trekking-bach-ma-national-park-day-tour-hue/?aid=117264' }
                ],
                'Transport & WiFi': [
                    { title: 'Train Ticket between Da Nang and Hue', description: 'Experience a unique Vietnamese railway journey, enjoying the invincible sea views of the Hai Van Pass, hailed as the "Most Marvelous Pass in the World."', link: 'https://affiliate.klook.com/redirect?aid=117264&aff_adid=1246766&k_site=https%3A%2F%2Fwww.klook.com%2Fen-US%2Factivity%2F99690-train-ticket-between-hue-danang%2F' },
                    { title: 'Motorbike Rental in Hue', description: 'Ride a motorbike through the streets and alleys of Hue, freely exploring the ancient capital\'s charm and hidden local delicacies.', link: 'https://www.klook.com/en-US/activity/151839-hue-city-sightseeing-food-tour-by-motorbike/?aid=117264' }
                ]
            }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('Da Nang City');
            const [selectedCategory, setSelectedCategory] = useState('Attractions & Tickets');

            const currentData = itineraryData[selectedRegion]?.[selectedCategory] || [];

            return (
                <div className="min-h-screen bg-rose-50 font-sans text-slate-800 pb-12">
                    {/* Top Navigation Bar */}
                    <header className="bg-white shadow-sm sticky top-0 z-10 border-b border-rose-100">
                        <div className="max-w-7xl mx-auto px-4 py-4 md:py-6">
                            <div className="flex items-center justify-between gap-2 mb-4">
                                <div className="flex items-center gap-2">
                                    <MapPin className="text-rose-600 w-6 h-6 md:w-8 md:h-8" />
                                    <h1 className="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-rose-600 to-orange-500">
                                        Da Nang Trip Guide
                                    </h1>
                                </div>
                                <a
                                    href="https://linkuei0425.github.io/DaNang-US/"
                                    className="hidden md:flex items-center gap-1.5 px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 bg-rose-600 text-white hover:bg-rose-700 shadow-sm"
                                >
                                    <Home className="w-4 h-4" />
                                    Home
                                </a>
                            </div>
                            
                            {/* Region Selection */}
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                <a
                                    href="https://linkuei0425.github.io/DaNang-US/"
                                    className="md:hidden flex items-center justify-center gap-1.5 whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 bg-rose-600 text-white hover:bg-rose-700 shadow-sm"
                                >
                                    <Home className="w-4 h-4" />
                                    Home
                                </a>
                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => {
                                            setSelectedRegion(region);
                                            // When switching regions, auto-select the first available category if current is not available
                                            if (!itineraryData[region]?.[selectedCategory]) {
                                                const availableCategories = Object.keys(itineraryData[region] || {});
                                                if (availableCategories.length > 0) {
                                                    setSelectedCategory(availableCategories[0]);
                                                }
                                            }
                                        }}
                                        className={`whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 ${
                                            selectedRegion === region
                                            ? 'bg-orange-500 text-white shadow-md'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-orange-50 hover:text-orange-600'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {/* Category Tags */}
                        <div className="flex flex-wrap gap-2 md:gap-3 mb-8">
                            {CATEGORIES.map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 px-4 py-2.5 rounded-lg border text-sm font-bold transition-all ${
                                        selectedCategory === id
                                        ? 'border-rose-500 bg-rose-50 text-rose-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4" />
                                    {id}
                                </button>
                            ))}
                        </div>

                        {/* Content Title */}
                        <div className="mb-6 flex items-center gap-2">
                            <h2 className="text-2xl font-bold text-slate-800">
                                {selectedRegion} - {selectedCategory} <span className="text-rose-600">Top Picks</span>
                            </h2>
                        </div>

                        {/* Card List */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4 md:gap-6">
                                {currentData.map((item, index) => (
                                    <div 
                                        key={index} 
                                        className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col justify-between hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 animate-fade-in"
                                        style={{ animationDelay: `${index * 0.05}s` }}
                                    >
                                        <div>
                                            <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-3 leading-tight flex items-start gap-2">
                                                <span className="text-orange-500 mt-1"><Sparkles className="w-5 h-5"/></span>
                                                {item.title}
                                            </h3>
                                            <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed font-medium">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-4 border-t border-slate-100 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-rose-600 hover:bg-rose-700 text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-sm hover:shadow-md w-full sm:w-auto"
                                            >
                                                <Info className="w-4 h-4" />
                                                <span>View Details</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-80" />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl border border-dashed border-slate-300 p-12 text-center flex flex-col items-center justify-center">
                                <h3 className="text-lg font-medium text-slate-700 mb-2">
                                    No items available in this category for the selected region.
                                </h3>
                                <p className="text-slate-500">Please try selecting a different category or region.</p>
                            </div>
                        )}

                        {/* Global Explore Button */}
                        <div className="mt-12 flex justify-center">
                            <a 
                                href={`https://www.klook.com/en-US/search/result/?query=${encodeURIComponent(selectedRegion)}&aid=117264`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-rose-600 to-orange-500 hover:from-rose-700 hover:to-orange-600 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1"
                            >
                                <span className="tracking-wide">Explore more {selectedRegion} activities</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
