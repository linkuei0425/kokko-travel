<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fukuoka Trip Guide | Explore Kyushu</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX (CDN) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Hide horizontal scrollbar but keep functionality */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- SVG Icon Components ---
        const MapPin = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const Ticket = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>;
        const Sun = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const Utensils = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2v0a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3Zm0 0v7"/></svg>;
        const Sparkles = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
        const TrainFront = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3.1V7a4 4 0 0 0 8 0V3.1"/><path d="M9 15h6"/><path d="M14 19.5l3-3-3-3"/><path d="M10 19.5l-3-3 3-3"/><path d="M4 22v-3.5"/><path d="M20 22v-3.5"/><rect width="16" height="16" x="4" y="3" rx="2"/></svg>;
        const ExternalLink = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>;
        const Info = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const Home = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;

        // Categories and Icons
        const CATEGORIES = [
            { id: 'Tickets', icon: Ticket },
            { id: 'Day Tours', icon: Sun },
            { id: 'Food & Fun', icon: Utensils },
            { id: 'Transport & SIM', icon: TrainFront }
        ];

        // Regions
        const REGIONS = ['Fukuoka City', 'Dazaifu / Yanagawa', 'Yufuin / Beppu', 'Itoshima', 'Takachiho', 'Kumamoto'];

        // Available categories per region
        const getAvailableCategoryIds = (region) => {
            if (['Dazaifu / Yanagawa', 'Yufuin / Beppu', 'Kumamoto'].includes(region)) return ['Day Tours', 'Tickets', 'Transport & SIM'];
            if (['Itoshima', 'Takachiho'].includes(region)) return ['Day Tours', 'Transport & SIM'];
            return ['Tickets', 'Day Tours', 'Food & Fun', 'Transport & SIM'];
        };

        // Itinerary Data
        const itineraryData = {
            'Fukuoka City': {
                'Tickets': [
                    {
                        title: 'Fukuoka Tower Observation Deck Ticket',
                        description: "Japan's highest seaside tower! Standing at 234 meters, enjoy 360-degree panoramic views of Fukuoka city and Hakata Bay. A romantic landmark for couples and families.",
                        link: 'https://www.klook.com/en-US/activity/19854-tower-entrance-ticket-fukuoka/?aid=115450&aff_adid=1234745'
                    },
                    {
                        title: 'teamLab Forest Fukuoka (Boss E・ZO FUKUOKA)',
                        description: 'A masterpiece by the world-renowned teamLab. Use your smartphone to "catch" and study animals in a magical, interactive light forest.',
                        link: 'https://www.klook.com/en-US/activity/51227-teamlab-forest-fukuoka/?aid=115450&aff_adid=1234745'
                    },
                    {
                        title: 'Marine World Uminonakamichi',
                        description: "Kyushu's premier aquarium. Featuring giant tanks and incredible dolphin/sea lion performances, it's the perfect destination for family fun.",
                        link: 'https://www.klook.com/en-US/activity/28959-uminonakamichi-marine-world-ticket-fukuoka/?aid=115450&aff_adid=1234745'
                    }
                ],
                'Day Tours': [
                    {
                        title: 'Itoshima Scenic Day Tour from Fukuoka',
                        description: 'Explore Fukuoka’s backyard! Visit the Sakurai Futamigaura Couple Stones, trendy seaside cafes, Shiraito Falls, and the "Totoro Forest" trail.',
                        link: 'https://www.klook.com/en-US/activity/157298-one-day-tour-to-itoshima-island-kyushu-japan-shiraito-falls-totor/?aid=115450&aff_adid=1234745'
                    },
                    {
                        title: 'Kyushu Customized Private Charter Tour',
                        description: 'Best for groups with elderly or children. Enjoy a private driver and flexible schedule to explore Fukuoka City, Itoshima, or Dazaifu at your own pace.',
                        link: 'https://www.klook.com/en-US/activity/167747-fukuoka-itoshima-tour-shiraito-falls-dazaifu-custom-schedule/?aid=115450&aff_adid=1234745'
                    }
                ],
                'Food & Fun': [
                    {
                        title: 'BOSS E・ZO FUKUOKA Attraction Pass',
                        description: 'Located next to the Fukuoka Dome. Experience the thrilling "Subesube" slide from the rooftop or the V-World VR park.',
                        link: 'https://www.klook.com/en-US/activity/41270-ezo-fukuoka-ticket/?aid=115450&aff_adid=1234745'
                    },
                    {
                        title: 'Traditional Noh Theater Experience',
                        description: 'Learn about Japan’s oldest theatrical art. Wear traditional masks and costumes on a professional stage for a unique cultural experience.',
                        link: 'https://www.klook.com/en-US/activity/53119-traditional-noh-theater-experience-fukuoka/?aid=115450&aff_adid=1234745'
                    }
                ],
                'Transport & SIM': [
                    {
                        title: 'Japan 4G/5G High-Speed eSIM',
                        description: 'No physical card needed. Scan the QR code to connect instantly upon arrival! Reliable network for maps and social media.',
                        link: 'https://www.klook.com/en-US/activity/109393-japan-esim-high-speed-internet-qr-code-voucher/?aid=115450&aff_adid=1234745'
                    },
                    {
                        title: 'Japan 4G SIM Card (Physical)',
                        description: 'Perfect for phones without eSIM support. Unlimited data options available with convenient airport pick-up.',
                        link: 'https://www.klook.com/en-US/activity/87444-4g-japan-sim-japan-airport-pick-up-unlimited-data/?aid=115450&aff_adid=1234745'
                    },
                    {
                        title: 'JR Pass Whole/North/South Kyushu',
                        description: 'The ultimate pass for Kyushu travelers! Unlimited rides on Shinkansen and limited express trains (like Yufuin no Mori).',
                        link: 'https://www.klook.com/en-US/activity/2371-jr-kyushu-jr-pass/?aid=115450&aff_adid=1234745'
                    },
                    {
                        title: 'Fukuoka Airport (FUK) Private Transfer',
                        description: 'Skip the subway queues. Pre-book a private car to your hotel in Hakata or Tenjin with fixed pricing and friendly drivers.',
                        link: 'https://www.klook.com/en-US/airport-transfers/?flightDirection=1&code=FUK&aid=115450&aff_adid=1234745'
                    },
                    {
                        title: 'SUNQ Pass Kyushu Bus Ticket',
                        description: 'Unlimited rides on highway buses and city buses throughout Kyushu. Reaches areas inaccessible by train.',
                        link: 'https://www.klook.com/en-US/activity/28320-kyushu-sunq-pass/?aid=115450&aff_adid=1234745'
                    }
                ]
            },
            'Dazaifu / Yanagawa': {
                'Day Tours': [
                    {
                        title: 'Yanagawa, Dazaifu & Itoshima Day Tour',
                        description: 'See three iconic sights in one day! Enjoy a vintage boat ride in Yanagawa, visit the sacred Dazaifu Shrine, and see the sunset at Itoshima.',
                        link: 'https://www.klook.com/en-US/activity/170117-kyushu-day-trip-itoshima-couple-rocks-yanagawa-boat-ride-dazaifu/?aid=115450&aff_adid=1234745'
                    }
                ],
                'Tickets': [
                    {
                        title: 'Dazaifu Tenmangu Kimono Rental',
                        description: 'Stroll through the historic Dazaifu approach in a beautiful Kimono while enjoying local plum cakes. A favorite for travelers.',
                        link: 'https://www.klook.com/en-US/activity/163166-kimono-rental-at-dazaifu-tenmangu-shrine-kimono-rental-hibiki/?aid=115450&aff_adid=1234745'
                    },
                    {
                        title: 'Yanagawa Sightseeing Canal Boat Ticket',
                        description: 'Experience the "Venice of Kyushu." Listen to traditional boatman songs as you float through willow-lined canals.',
                        link: 'https://www.klook.com/en-US/activity/132921-yanagawa-river-cruise-experience-by-hakushu-kanko/?aid=115450&aff_adid=1234745'
                    }
                ],
                'Transport & SIM': [
                    {
                        title: 'Dazaifu & Yanagawa Excursion Pass',
                        description: 'Includes Nishitetsu round-trip train tickets and canal boat tickets. Comes with discounts for local shops and restaurants.',
                        link: 'https://www.klook.com/en-US/activity/152456-dazaifu-yanagawa-excursion-pass-fukuoka/?aid=115450&aff_adid=1234745'
                    },
                    {
                        title: 'SUNQ Pass Kyushu Bus Ticket',
                        description: 'The economical choice for bus travelers. Covers highway buses from Fukuoka to Dazaifu.',
                        link: 'https://www.klook.com/en-US/activity/28320-kyushu-sunq-pass/?aid=115450&aff_adid=1234745'
                    }
                ]
            },
            'Yufuin / Beppu': {
                'Day Tours': [
                    {
                        title: 'Kyushu Day Tour: Yufuin no Mori, Yufuin, Nyoirin-ji & Beppu Hells',
                        description: 'The ultimate Kyushu combo! Experience the famous sightseeing train, walk through charming Yufuin, visit the "Frog Temple," and see the stunning Beppu Hells.',
                        link: 'https://affiliate.klook.com/redirect?aid=115450&aff_adid=1234830&k_site=https%3A%2F%2Fwww.klook.com%2Fen-US%2Factivity%2F95611-beppu-onsen-yufuin-one-day-tour-fukuoka%2F'
                    },
                    {
                        title: 'Kyushu Oita: Yufuin & African Safari & Beppu Hells Day Tour',
                        description: 'A perfect family day! Explore Yufuin, get close to animals at the Kyushu African Safari, and witness the natural power of Beppu’s bubbling geysers.',
                        link: 'https://affiliate.klook.com/redirect?aid=115450&aff_adid=1234835&k_site=https%3A%2F%2Fwww.klook.com%2Fen-US%2Factivity%2F118390-yufuin-kyushu-wildlife-park-african-safari-day-tour-from-fukuoka%2F'
                    }
                ],
                'Tickets': [
                    {
                        title: 'Kyushu African Safari & Yufuin Day Tour',
                        description: 'Ride the special "Jungle Bus" to feed lions and elephants in a wild habitat. Admission and transport included.',
                        link: 'https://www.klook.com/en-US/activity/130584-kyushu-wildlife-park-african-safari-yufuin-day-tour-from-fukuoka/?aid=115450&aff_adid=1234745'
                    },
                    {
                        title: 'Beppu Jigoku Onsen Museum Ticket',
                        description: 'Discover the mystery of hot springs! This museum combines art and science, and features a geothermally heated foot bath.',
                        link: 'https://www.klook.com/en-US/activity/97168-jigoku-onsen-museum-ticket-beppu/?aid=115450&aff_adid=1234745'
                    }
                ],
                'Transport & SIM': [
                    {
                        title: 'JR Kyushu Rail Pass',
                        description: 'The best way to visit Yufuin! Use this pass to reserve seats on the highly popular "Yufuin no Mori" sightseeing train.',
                        link: 'https://www.klook.com/en-US/activity/2371-jr-kyushu-jr-pass/?aid=115450&aff_adid=1234745'
                    }
                ]
            },
            'Itoshima': {
                'Day Tours': [
                    {
                        title: 'Itoshima Hidden Gems Day Tour',
                        description: 'Explore "Fukuoka’s Hawaii"! Visit the white torii gate at Futamigaura, Shiraito Falls, and the famous "Palm Tree Swings."',
                        link: 'https://www.klook.com/en-US/activity/114628-shiraito-falls-keya-no-ohto-sakurai-futamigauras-couple-stones-day-trip/?aid=115450&aff_adid=1234745'
                    }
                ],
                'Transport & SIM': [
                    {
                        title: 'Japan 4G/5G High-Speed eSIM',
                        description: 'Reliable network for your seaside getaway. Stay connected while exploring the beautiful coast of Itoshima.',
                        link: 'https://www.klook.com/en-US/activity/109393-japan-esim-high-speed-internet-qr-code-voucher/?aid=115450&aff_adid=1234745'
                    }
                ]
            },
            'Takachiho': {
                'Day Tours': [
                    {
                        title: 'Takachiho Gorge & Aso Day Tour from Fukuoka',
                        description: 'Visit the land of myths! Marvel at the Manai Falls in Takachiho Gorge and enjoy the vast scenery of Mount Aso and Kusasenri.',
                        link: 'https://www.klook.com/en-US/activity/119927-kumamoto-castle-takachiho-gorge-footpath-one-day-tour-from-fukuoka/?aid=115450&aff_adid=1234745'
                    }
                ],
                'Transport & SIM': [
                    {
                        title: 'SUNQ Pass Kyushu Bus Ticket',
                        description: 'Take the "Gokuraku" highway bus directly from Fukuoka to Takachiho. The most convenient transport option.',
                        link: 'https://www.klook.com/en-US/activity/28320-kyushu-sunq-pass/?aid=115450&aff_adid=1234745'
                    }
                ]
            },
            'Kumamoto': {
                'Day Tours': [
                    {
                        title: 'Mount Aso & Kumamoto Castle Day Tour',
                        description: "Visit one of Japan's top three castles and experience the active volcanic landscape of Mount Aso's Kusasenri.",
                        link: 'https://www.klook.com/en-US/activity/181458-kumamoto-mt-aso-day-tour-from-fukuoka/?aid=115450&aff_adid=1234745'
                    },
                    {
                        title: 'Kamishimi Kumanoza Shrine & Kurokawa Onsen',
                        description: 'Visit the mysterious "Gateway to Another World" shrine followed by a relaxing afternoon in the historic Kurokawa Onsen village.',
                        link: 'https://www.klook.com/en-US/activity/179643-aso-nature-day-tour-kumano-shrine-kusasenri-and-kurokawa-onsen/?aid=115450&aff_adid=1234745'
                    }
                ],
                'Tickets': [
                    {
                        title: 'Kumamoto Samurai Heritage Private Tour',
                        description: 'Explore the Momoyama-style gardens and samurai history of Kumamoto with a local expert guide.',
                        link: 'https://www.klook.com/en-US/activity/195198-kumamoto-samurai-heritage-private-tour-with-local-guide/?aid=115450&aff_adid=1234745'
                    }
                ],
                'Transport & SIM': [
                    {
                        title: 'Kyushu Rail Pass (JR Pass)',
                        description: 'Take the Shinkansen from Hakata to Kumamoto in just 30 minutes! The fastest and best way to travel.',
                        link: 'https://www.klook.com/en-US/activity/2371-jr-kyushu-jr-pass/?aid=115450&aff_adid=1234745'
                    }
                ]
            }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('Fukuoka City');
            const [selectedCategory, setSelectedCategory] = useState('Tickets');

            const currentData = itineraryData[selectedRegion]?.[selectedCategory] || [];

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800">
                    {/* Header */}
                    <header className="bg-white shadow-sm sticky top-0 z-10">
                        <div className="max-w-5xl mx-auto px-4 py-4 md:py-6">
                            <div className="flex items-center gap-2 mb-4">
                                <MapPin className="text-rose-600 w-6 h-6 md:w-8 md:h-8" />
                                <h1 className="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-red-600 to-rose-500">
                                Fukuoka & Kyushu Explorer
                                </h1>
                            </div>
                            
                            {/* Region Selection */}
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                <a
                                    href="https://linkuei0425.github.io/FUKUOKA-US/trip.html"
                                    className="flex items-center gap-1.5 whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-200 bg-rose-50 text-rose-700 hover:bg-rose-100 border border-rose-200"
                                >
                                    <Home className="w-4 h-4" />
                                    Home
                                </a>

                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => {
                                            setSelectedRegion(region);
                                            const allowed = getAvailableCategoryIds(region);
                                            if (!allowed.includes(selectedCategory)) {
                                                setSelectedCategory(allowed[0]);
                                            }
                                        }}
                                        className={`whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-200 ${
                                            selectedRegion === region
                                            ? 'bg-slate-800 text-white shadow-md'
                                            : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-6">
                        {/* Categories */}
                        <div className="flex flex-wrap gap-2 md:gap-3 mb-8">
                            {CATEGORIES.filter(cat => getAvailableCategoryIds(selectedRegion).includes(cat.id)).map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 px-4 py-2 rounded-lg border text-sm font-medium transition-all ${
                                        selectedCategory === id
                                        ? 'border-rose-500 bg-rose-50 text-rose-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4" />
                                    {id}
                                </button>
                            ))}
                        </div>

                        {/* Results Heading */}
                        <div className="mb-6">
                            <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                Best of {selectedRegion} - {selectedCategory}
                            </h2>
                        </div>

                        {/* Item List */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6">
                                {currentData.map((item, index) => (
                                    <div 
                                        key={index} 
                                        className="bg-white rounded-xl shadow-sm border border-slate-100 p-5 md:p-6 flex flex-col justify-between hover:shadow-md transition-shadow"
                                    >
                                        <div>
                                            <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-3 leading-tight">
                                                {item.title}
                                            </h3>
                                            <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-4 border-t border-slate-50 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-rose-600 hover:bg-rose-700 text-white font-medium py-2.5 px-5 rounded-lg transition-colors w-full sm:w-auto"
                                            >
                                                <Info className="w-4 h-4" />
                                                <span>View Details</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-70" />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl border border-dashed border-slate-300 p-12 text-center flex flex-col items-center justify-center">
                                <div className="bg-slate-50 p-4 rounded-full mb-4">
                                    <Sparkles className="w-8 h-8 text-slate-400" />
                                </div>
                                <h3 className="text-lg font-medium text-slate-700 mb-2">
                                    No recommendations for {selectedCategory} in {selectedRegion} yet.
                                </h3>
                                <p className="text-slate-500">
                                    We are constantly updating our list. Stay tuned!
                                </p>
                            </div>
                        )}

                        {/* CTA Button */}
                        <div className="mt-10 flex justify-center">
                            <a 
                                href="https://affiliate.klook.com/redirect?aid=115450&aff_adid=1234768&k_site=https%3A%2F%2Fwww.klook.com%2Fen-US%2F" 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-bold py-3.5 px-8 rounded-full shadow-lg hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1"
                            >
                                <Sparkles className="w-5 h-5" />
                                <span className="tracking-wide">Explore more Fukuoka trips on Klook</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
