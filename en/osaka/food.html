            "meat": { name: "🥩 Yakiniku & Premium Wagyu", color: "bg-red-100 text-red-800 hover:bg-red-600 hover:text-white border-red-400" },

            "dessert": { name: "🍵 Desserts & Matcha", color: "bg-emerald-100 text-emerald-800 hover:bg-emerald-600 hover:text-white border-emerald-400" }
        };

        let currentRegion = "";
        let currentCategory = "";

        // Elements
        const regionContainer = document.getElementById('region-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const categorySection = document.getElementById('category-section');
        const contentArea = document.getElementById('content-area');

        // Render Regions
        function initRegions() {
            Object.keys(db).forEach(key => {
                const btn = document.createElement('button');
                btn.className = "whitespace-nowrap px-5 py-2.5 rounded-full border border-slate-300 bg-white text-slate-700 font-bold hover:bg-rose-600 hover:text-white hover:border-rose-600 transition-colors shadow-sm";
                btn.innerText = db[key].name;
                btn.onclick = () => selectRegion(key, btn);
                regionContainer.appendChild(btn);
            });
        }

        // Render Categories
        function initCategories() {
            Object.keys(categoriesMap).forEach(key => {
                const config = categoriesMap[key];
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-4 py-2 rounded-full border transition-all font-bold ${config.color}`;
                btn.innerText = config.name;
                btn.onclick = () => selectCategory(key, btn);
                categoryContainer.appendChild(btn);
            });
        }

        function selectRegion(regionKey, clickedBtn) {
            currentRegion = regionKey;
            
            // Highlight active region
            Array.from(regionContainer.children).forEach(btn => {
                btn.classList.remove('bg-rose-600', 'text-white', 'border-rose-600');
                btn.classList.add('bg-white', 'text-slate-700');
            });
            clickedBtn.classList.remove('bg-white', 'text-slate-700', 'hover:bg-rose-600');
            clickedBtn.classList.add('bg-rose-600', 'text-white', 'border-rose-600');

            // Show category section
            categorySection.classList.remove('hidden');
            categorySection.classList.add('fade-in');
            
            // Filter categories based on region data
            Array.from(categoryContainer.children).forEach(btn => {
                const catKey = Object.keys(categoriesMap).find(k => categoriesMap[k].name === btn.innerText);
                if (db[regionKey].categories[catKey]) {
                    btn.style.display = "block";
                } else {
                    btn.style.display = "none";
                }
            });

            // Auto select first available category if none selected or current is hidden
            if(!currentCategory || !db[regionKey].categories[currentCategory]) {
                const availableCat = Object.keys(categoriesMap).find(k => db[regionKey].categories[k]);
                if (availableCat) {
                    const targetBtn = Array.from(categoryContainer.children).find(btn => btn.innerText === categoriesMap[availableCat].name);
                    selectCategory(availableCat, targetBtn);
                } else {
                    contentArea.innerHTML = `<p class="col-span-full text-center py-8 text-slate-500">No food data available for this city.</p>`;
                }
            } else {
                const targetBtn = Array.from(categoryContainer.children).find(btn => btn.innerText === categoriesMap[currentCategory].name);
                selectCategory(currentCategory, targetBtn);
            }
        }

        function selectCategory(catKey, clickedBtn) {
            currentCategory = catKey;

            // Highlight active category
            Array.from(categoryContainer.children).forEach(btn => {
                btn.classList.remove('ring-2', 'ring-offset-2', 'ring-rose-500', 'shadow-md', 'scale-105');
                btn.style.opacity = "0.5";
            });
            if (clickedBtn) {
                clickedBtn.classList.add('ring-2', 'ring-offset-2', 'ring-rose-500', 'shadow-md', 'scale-105');
                clickedBtn.style.opacity = "1";
            }

            renderContent();
        }

        function renderContent() {
            contentArea.innerHTML = '';
            const items = db[currentRegion].categories[currentCategory];

            if(!items || items.length === 0) {
                contentArea.innerHTML = `<p class="col-span-full text-center py-12 text-slate-500 text-lg font-bold">No recommendations available in this category. Let's explore other foods!</p>`;
                return;
            }

            const currentCityName = db[currentRegion].name.split(' ')[0];

            items.forEach((item, index) => {
                // Generate Google Maps URL (add Japan and city name to improve accuracy)
                const pureAddress = item.address.split('<br>')[0];
                const encodedQuery = encodeURIComponent(`${item.name} Japan ${pureAddress}`);
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;

                const badgeHtml = item.recommend ? `<span class="bg-red-500 text-white text-xs px-2 py-0.5 rounded ml-2 align-middle shadow-sm">🔥 Highly Recommended</span>` : '';

                const bookingBtnHtml = item.bookingLink ? `
                    <a href="${item.bookingLink}" target="_blank" class="w-full flex items-center justify-center gap-2 bg-[#ff5b00] hover:bg-[#e05000] text-white py-3 rounded-xl font-bold transition-colors shadow-sm hover:shadow-md text-base">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
                        </svg>
                        Book Online for Exclusive Deals
                    </a>
                ` : '';

                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-rose-100 overflow-hidden flex flex-col fade-in hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1";
                card.style.animationDelay = `${index * 0.08}s`;

                card.innerHTML = `
                    <div class="p-6 flex-grow">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-xl font-bold text-slate-800 leading-tight flex items-center flex-wrap gap-y-2">${item.name} ${badgeHtml}</h3>
                        </div>
                        <p class="text-slate-600 text-sm mb-5 leading-relaxed tracking-wide"><span class="font-bold text-rose-700 bg-rose-100 px-2 py-0.5 rounded mr-1 shadow-sm">Highlight</span>${item.feature}</p>
                        
                        <div class="bg-rose-50/50 p-4 rounded-xl flex items-start gap-3 border border-rose-100">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-rose-600 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <p class="text-sm text-slate-600 leading-tight font-medium"><span class="font-bold text-rose-800">Address: </span>${item.address}</p>
                        </div>
                    </div>
                    
                    <div class="px-6 pb-6 mt-auto flex flex-col gap-3">
                        ${bookingBtnHtml}
                        <!-- Google Maps 導航按鈕 -->
                        <a href="${mapsUrl}" target="_blank" class="w-full flex items-center justify-center gap-2 btn-nav text-white py-3 rounded-xl font-bold transition-colors shadow-sm hover:shadow-md text-base">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z" clip-rule="evenodd" />
                            </svg>
                            Open in Google Maps
                        </a>
                    </div>
                `;
                contentArea.appendChild(card);
            });
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            initRegions();
            initCategories();
        });

    </script>
</body>
