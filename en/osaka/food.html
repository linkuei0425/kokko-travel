        // AAO & GEO: 深度優化的結構化資料生成 (JSON-LD Schema)

        function injectStructuredData() {

                "@context": "https://schema.org",

                    "description": "關西地區大阪、京都、奈良、神戶、宇治、姬路的精選餐廳與小吃導覽",
                    "itemListElement": []
                }
            };

            for (const [regionKey, regionData] of Object.entries(db)) {
                for (const [catKey, spots] of Object.entries(regionData.categories)) {
                    spots.forEach(spot => {
                        // 移除 HTML 標籤以提供乾淨的地址供機器讀取
                        const rawAddress = spot.address.split('<br>')[0];
                        
                        schema.mainEntity.itemListElement.push({
                            "@type": "ListItem",
                            "position": position++,
                            "item": {
                                "@type": "Restaurant",
                                "name": `${regionData.name} - ${spot.name}`,
                                "description": spot.feature,
                                "address": {
                                    "@type": "PostalAddress",

                                },

                            }
                        });
                    });
                }

            script.type = 'application/ld+json';
            script.text = JSON.stringify(schema);
            document.head.appendChild(script);
        }
        injectStructuredData();

                btn.className = `whitespace-nowrap min-h-[44px] px-4 sm:px-5 py-2 rounded-full border transition-all text-sm sm:text-base font-bold focus:outline-none focus:ring-2 focus:ring-offset-1 ${config.color}`;

        }

        function selectRegion(regionKey, clickedBtn) {
            currentRegion = regionKey;
            
            // Highlight active region & update ARIA
            Array.from(regionContainer.children).forEach(btn => {
                btn.classList.remove('bg-rose-600', 'text-white', 'border-rose-600');
                btn.classList.add('bg-white', 'text-slate-700');
                btn.setAttribute("aria-selected", "false");

            clickedBtn.setAttribute("aria-selected", "true");

            // Show category section
            categorySection.classList.remove('hidden');
            categorySection.classList.add('fade-in');
            
            // Filter categories based on region data
            Array.from(categoryContainer.children).forEach(btn => {
                const catKey = Object.keys(categoriesMap).find(k => categoriesMap[k].name === btn.innerText);
                if (db[regionKey].categories[catKey]) {
                    btn.style.display = "block";
                } else {
                    btn.style.display = "none";
                }
            });

            // Auto select first available category if none selected or current is hidden
            if(!currentCategory || !db[regionKey].categories[currentCategory]) {
                const availableCat = Object.keys(categoriesMap).find(k => db[regionKey].categories[k]);

            renderContent();
        }

                        <p class="text-slate-600 text-sm sm:text-base mb-6 leading-relaxed tracking-wide font-medium"><span class="font-bold text-rose-700 bg-rose-100 px-2 py-0.5 rounded mr-1.5 shadow-sm">特色</span>${item.feature}</p>
                        
                        <div class="bg-rose-50/50 p-4 sm:p-5 rounded-xl flex items-start gap-3 border border-rose-100 mt-auto">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6 text-rose-600 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <p class="text-sm sm:text-base text-slate-600 leading-tight font-medium"><span class="font-bold text-rose-800 block mb-1">地址與交通：</span>${item.address}</p>
                        </div>
                    </div>
                    
                    <div class="px-6 sm:px-7 pb-6 sm:pb-7 flex flex-col gap-3">
                        ${bookingBtnHtml}
                        <!-- Google Maps 導航按鈕 -->
                        <a href="${mapsUrl}" target="_blank" aria-label="在 Google Maps 中開啟 ${item.name}" class="w-full flex items-center justify-center gap-2 btn-nav text-white py-3 rounded-xl font-bold transition-colors shadow-sm hover:shadow-md text-base min-h-[48px]">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 sm:h-6 sm:w-6" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                                <path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z" clip-rule="evenodd" />
                            </svg>
                            開啟 Google Maps 導航
                        </a>
                    </div>
                `;
                contentArea.appendChild(card);
            });
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            initRegions();
            initCategories();
        });

    </script>
</body>
