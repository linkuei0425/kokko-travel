                    { title: 'Private Car Transfer to Kobe', description: 'The most comfortable choice for large luggage or families. A private driver transfers you directly from the airport or Osaka hotel to Kobe.', link: 'https://www.klook.com/en-US/search/result/?query=Kobe%20Private%20Car&aid=116515' },
                    { title: 'Kansai Thru Pass', description: 'Roam Kansai private railways with one card. Perfectly covers Hankyu, Hanshin, and Kobe subways. Ideal for hopping cities daily.', link: 'https://www.klook.com/en-US/activity/1329-kansai-thru-pass-osaka/?aid=116515' }
                ]
            },
            'Himeji': {
                'Tickets': [
                    { title: 'Himeji Castle (White Heron Castle) Ticket', description: 'Japan\'s No.1 castle and World Heritage! Snow-white walls like a white heron. Its complex defenses and grand keep are amazing.', link: 'https://www.klook.com/en-US/activity/20058-himeji-castle-kokoen-ticket/?aid=116515' },
                    { title: 'Koko-en Garden Ticket', description: 'Large Japanese garden next to Himeji Castle. Divided into 9 themed gardens using the castle as borrowed scenery. Autumn illumination is stunning.', link: 'https://www.klook.com/en-US/activity/20058-himeji-castle-kokoen-ticket/?aid=116515' },
                    { title: 'Himeji Central Park Ticket', description: 'Combines a drive-through safari park with a thrilling roller coaster amusement park. Himeji\'s most popular family entertainment facility.', link: 'https://www.klook.com/en-US/activity/48275-himeji-central-park-ticket/?aid=116515' }
                ],
                'Day Tours': [
                    { title: 'Himeji Castle, Arima Onsen & Mt. Rokko Tour', description: 'Covers Hyogo\'s top 3 essentials in one trip! See the famous castle, soak in ancient springs, and enjoy million-dollar night views without transfer fatigue.', link: 'https://www.klook.com/en-US/search/result/?query=Himeji%20Castle%20Arima%20Onsen&aid=116515' },
                    { title: 'Ono Sakura Corridor & Himeji Castle Spring Tour', description: 'Spring cherry blossom exclusive route! Visit the endless sakura avenue and take dreamy photos in front of the blossom-dotted White Heron Castle.', link: 'https://www.klook.com/en-US/search/result/?query=Himeji%20Castle%20Cherry%20Blossom&aid=116515' },
                    { title: 'Himeji Castle & Koko-en Historical Half-Day Tour', description: 'Led by an expert history guide. Explains the complex defensive maze and architectural secrets of the main keep. No longer just a quick look.', link: 'https://www.klook.com/en-US/search/result/?query=Himeji%20Castle%20Half%20Day&aid=116515' },
                    { title: 'Himeji & Akashi Kaikyo Bridge Day Tour', description: 'After exploring World Heritage Himeji Castle, head to Maiko Park to gaze up at the world\'s longest suspension bridge, Akashi Kaikyo Bridge.', link: 'https://www.klook.com/en-US/search/result/?query=Himeji%20Akashi%20Kaikyo&aid=116515' },
                    { title: 'Himeji & Kurashiki Castle and Canal Day Tour', description: 'A grand cross-city tour! See pure white Himeji Castle in the morning, then head to Kurashiki Bikan Historical Quarter in Okayama for a retro canal boat ride.', link: 'https://www.klook.com/en-US/search/result/?query=Himeji%20Kurashiki%20Tour&aid=116515' },
                    { title: 'Himeji & Okayama Seto Inland Sea 2-Day Tour', description: '2-day itinerary combining Himeji Castle and Okayama Korakuen Garden. Slowly enjoy the warm climate and fresh seafood of the Seto Inland Sea.', link: 'https://www.klook.com/en-US/search/result/?query=Himeji%20Okayama%20Tour&aid=116515' },
                    { title: 'Himeji Sakura/Autumn Leaves Private Charter Tour', description: 'Hate crowds? Charter a private car to Himeji\'s hidden cherry blossom/red leaf spots unknown to foreign tourists for an exclusive view.', link: 'https://www.klook.com/en-US/search/result/?query=Himeji%20Private%20Car&aid=116515' }
                ],
                'Experiences': [
                    { title: 'Himeji Castle Town Kimono & Ninja Experience', description: 'Change into beautiful kimonos or cool ninja outfits. Use pure white Himeji Castle as a backdrop to take a series of time-traveling souvenir photos.', link: 'https://www.klook.com/en-US/search/result/?query=Himeji%20Kimono%20Ninja&aid=116515' }
                ],
                'Transport & WiFi': [
                    { title: 'JR Kansai Wide Area Pass', description: 'The ultimate pass to take the Shinkansen to Himeji! Only takes about 30 mins directly from Shin-Osaka. The most cost-effective choice.', link: 'https://www.klook.com/en-US/activity/3277-5-day-kansai-wide-area-jr-pass/?aid=116515' },
                    { title: 'Kansai Thru Pass', description: 'If you choose to ride the Sanyo Railway to slowly enjoy the scenery to Himeji, this private railway pass is a must-have.', link: 'https://www.klook.com/en-US/activity/1329-kansai-thru-pass-osaka/?aid=116515' },
                    { title: 'Private Car Transfer to Himeji', description: 'Farther from Osaka. If traveling with elders or heavy luggage, chartering a car from the airport/hotel is the most comfortable luxury choice.', link: 'https://www.klook.com/en-US/search/result/?query=Himeji%20Private%20Transfer&aid=116515' },
                    { title: 'Himeji Port to Shodoshima Ferry Ticket', description: 'Want to island-hop the Seto Inland Sea? Take a ferry from Himeji Port to olive-producing Shodoshima for a romantic island journey.', link: 'https://www.klook.com/en-US/search/result/?query=Shodoshima%20Ferry&aid=116515' }
                ]
            }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('Osaka');
            const [selectedCategory, setSelectedCategory] = useState('Tickets');

            const currentData = itineraryData[selectedRegion]?.[selectedCategory] || [];

            return (
                <div className="min-h-screen bg-[#f0fdf4] font-sans text-slate-800 pb-12">
                    {/* Header */}
                    <header className="bg-white shadow-sm sticky top-0 z-10 border-b border-emerald-100">
                        <div className="max-w-7xl mx-auto px-4 py-4 md:py-6">
                            <div className="flex items-center justify-between gap-2 mb-4">
                                <div className="flex items-center gap-2">
                                    <MapPin className="text-emerald-600 w-6 h-6 md:w-8 md:h-8" />
                                    <h1 className="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-600 to-teal-500">
                                        Kansai Trip Guide
                                    </h1>
                                </div>
                                <a
                                    href="https://linkuei0425.github.io/Osaka-US/"
                                    className="hidden md:flex items-center gap-1.5 px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm"
                                >
                                    <Home className="w-4 h-4" />
                                    Back to Home
                                </a>
                            </div>
                            
                            {/* Region Selection */}
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                <a
                                    href="https://linkuei0425.github.io/Osaka-US/"
                                    className="md:hidden flex items-center justify-center gap-1.5 whitespace-nowrap px-4 py-2 rounded-full text-sm font-bold transition-all duration-200 bg-emerald-600 text-white hover:bg-emerald-700 shadow-sm"
                                >
                                    <Home className="w-4 h-4" />
                                    Home
                                </a>
                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => setSelectedRegion(region)}
                                        className={`whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 ${
                                            selectedRegion === region
                                            ? 'bg-teal-600 text-white shadow-md'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-teal-50 hover:text-teal-700'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 py-8">
                        {/* Category Tabs */}
                        <div className="flex flex-wrap gap-2 md:gap-3 mb-8">
                            {CATEGORIES.map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 px-4 py-2.5 rounded-lg border text-sm font-bold transition-all ${
                                        selectedCategory === id
                                        ? 'border-emerald-500 bg-emerald-50 text-emerald-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4" />
                                    {id}
                                </button>
                            ))}
                        </div>

                        {/* Content Title */}
                        <div className="mb-6 flex items-center gap-2">
                            <h2 className="text-2xl font-bold text-slate-800">
                                {selectedRegion} - {selectedCategory} <span className="text-emerald-600">Recommendations</span>
                            </h2>
                        </div>

                        {/* Card List */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-4 md:gap-6">
                                {currentData.map((item, index) => (
                                    <div 
                                        key={index} 
                                        className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 flex flex-col justify-between hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1 animate-fade-in"
                                        style={{ animationDelay: `${index * 0.05}s` }}
                                    >
                                        <div>
                                            <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-3 leading-tight flex items-start gap-2">
                                                <span className="text-emerald-500 mt-1"><Sparkles className="w-5 h-5"/></span>
                                                {item.title}
                                            </h3>
                                            <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed font-medium">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-4 border-t border-slate-100 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-[#ff5b00] hover:bg-[#e05000] text-white font-bold py-3 px-6 rounded-xl transition-colors shadow-sm hover:shadow-md w-full sm:w-auto"
                                            >
                                                <Info className="w-4 h-4" />
                                                <span>Details</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-80" />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl border border-dashed border-slate-300 p-12 text-center flex flex-col items-center justify-center">
                                <h3 className="text-lg font-medium text-slate-700 mb-2">
                                    No items available in this category for this region.
                                </h3>
                                <p className="text-slate-500">Please try selecting another category.</p>
                            </div>
                        )}

                        {/* Global Explore Button */}
                        <div className="mt-12 flex justify-center">
                            <a 
                                href={`https://www.klook.com/en-US/search/result/?query=${encodeURIComponent(selectedRegion)}&aid=116515`}
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1"
                            >
                                <span className="tracking-wide">Explore more activities in {selectedRegion}</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
