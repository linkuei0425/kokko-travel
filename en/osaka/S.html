      { id: 'kobe_umie', city: 'kobe', name: 'Kobe Harborland umie', stay: 2.5, timeWindow: [10, 21], region: 51, regionName: 'Kobe Port Area', type: 'Shopping', desc: 'Combines shopping and dining. The wooden boardwalk and Mosaic square are very romantic at night.', transport: 'JR to Kobe Station, 5 mins walk.' },
      { id: 'meriken_park', city: 'kobe', name: 'Meriken Park', stay: 1.5, timeWindow: [0, 24], region: 51, regionName: 'Kobe Port Area', type: 'Park', desc: 'Features the famous "BE KOBE" monument and preserves ruins from the Great Hanshin Earthquake.', transport: 'Next to Kobe Port Tower, walking distance.' },
      { id: 'nunobiki', city: 'kobe', name: 'Nunobiki Herb Gardens', stay: 3, timeWindow: [10, 17], region: 52, regionName: 'Kobe City', type: 'Hidden Gem', desc: 'A mountaintop garden accessible by ropeway. Overlooks the magnificent port city panorama.', transport: 'Shinkansen or Subway to Shin-Kobe Station, transfer to ropeway.' },
      { id: 'kitano', city: 'kobe', name: 'Kitano Ijinkan-Gai', stay: 2, timeWindow: [10, 17], region: 52, regionName: 'Kobe City', type: 'Attraction', desc: 'Western-style houses where foreigners lived in the Meiji era. Feels like strolling in Europe.', transport: 'JR/Hankyu/Hanshin to Sannomiya Station, 15 mins uphill walk.' },
      { id: 'arima', city: 'kobe', name: 'Arima Onsen', stay: 3.5, timeWindow: [10, 20], region: 54, regionName: 'Kobe Suburbs', type: 'Hidden Gem', desc: 'One of Japan\'s three oldest hot springs. Features iron-rich "Kinsen" (gold spring) and clear "Ginsen" (silver spring).', transport: 'Highway bus from Sannomiya/Umeda, or Kobe Electric Railway to Arima Onsen Station.', bookingLinks: [{url: 'https://www.klook.com/en-US/activity/141926-kobe-port-arima-onsen-mt-rokko-night-view-tour-from-osaka/?aid=116515', text: 'Arima & Mt. Rokko Tour'}] },
      { id: 'maya', city: 'kobe', name: 'Mount Maya Kikuseidai', stay: 2, timeWindow: [17, 21.5], region: 55, regionName: 'Kobe Suburbs', type: 'Hidden Gem', desc: 'One of Japan\'s Top 3 Night Views! Offers a sweeping panoramic view over Osaka Bay.', transport: 'City bus to Maya Cable Station, transfer to ropeway to Hoshi no Eki.' },

      // ================= Himeji =================
      { id: 'himeji_castle', city: 'himeji', name: 'Himeji Castle', stay: 3, timeWindow: [9, 16.5], region: 61, regionName: 'Himeji City', type: 'Attraction', desc: 'Japan\'s #1 castle and World Heritage site. Preserves an incredibly intact wooden keep and defense maze.', transport: 'JR Kobe Line or Shinkansen to Himeji Station, 15 mins straight walk.', bookingLinks: [{url: 'https://www.klook.com/en-US/activity/195510-ono-cherry-blossom-corridor-himeji-castle-kobe-mentai-park-tour/?aid=116515', text: 'Himeji Castle Day Tour'}, {url: 'https://www.klook.com/en-US/activity/94348-himeji-castle-arima-onse-mt-rokko-day-tour-osaka/?aid=116515', text: 'Himeji & Arima Tour'}] },
      { id: 'miyuki_dori', city: 'himeji', name: 'Miyuki-dori Shopping Street', stay: 1.5, timeWindow: [10, 19], region: 61, regionName: 'Himeji City', type: 'Shopping', desc: 'A strip mall stretching from Himeji Station to the castle. Full of local atmosphere.', transport: 'JR Himeji Station, right outside.' },
      { id: 'kokoen', city: 'himeji', name: 'Koko-en Garden', stay: 1.5, timeWindow: [9, 17], region: 61, regionName: 'Himeji City', type: 'Park', desc: 'A Japanese strolling garden next to the Himeji Castle moat. Showcases ultimate garden craftsmanship.', transport: '5 mins walk from Himeji Castle exit.' },
      { id: 'engyoji', city: 'himeji', name: 'Engyo-ji (Mt. Shosha)', stay: 3, timeWindow: [9, 17], region: 62, regionName: 'Himeji Suburbs', type: 'Hidden Gem', desc: 'A thousand-year-old temple hidden in a dense forest. Filming location for "The Last Samurai".', transport: 'Bus from Himeji Station to Shosha Ropeway, then ropeway up.' },

      // ================= Miyama =================
      { id: 'kayabuki', city: 'miyama', name: 'Kayabuki no Sato', stay: 2.5, timeWindow: [9, 17], region: 71, regionName: 'Miyama Town', type: 'Attraction', desc: 'One of Japan\'s 3 major thatched roof villages. A fairytale-like traditional farming village.', transport: 'JR to Hiyoshi Station, transfer to Nantan City Bus to "Kita" stop.', bookingLinks: [{url: 'https://www.klook.com/en-US/activity/189675-miyama-village-katsuo-ji-temple-one-day-tour/?spm=SearchResult.SearchResult_LIST&clickId=55c143f4d1&aid=116515', text: 'Miyama Village Day Tour'}] },
      { id: 'miyama_hiroba', city: 'miyama', name: 'Miyama Fureai Hiroba', stay: 1, timeWindow: [9, 17], region: 71, regionName: 'Miyama Town', type: 'Shopping', desc: 'The most bustling rest stop in Miyama. Don\'t miss the super rich Miyama milk and ice cream.', transport: 'Nantan City Bus to "Agake" stop.' },
      { id: 'ono_dam', city: 'miyama', name: 'Ono Dam Park', stay: 1.5, timeWindow: [0, 24], region: 71, regionName: 'Miyama Town', type: 'Park', desc: 'Known as "Rainbow Lake". Cherry blossoms in spring and red leaves in autumn. Great for picnics.', transport: 'Nantan City Bus or drive.' },
      { id: 'chii_hachiman', city: 'miyama', name: 'Chii Hachiman Shrine', stay: 1, timeWindow: [0, 24], region: 71, regionName: 'Miyama Town', type: 'Hidden Gem', desc: 'An ancient shrine deep in the thatched village. Emits an ethereal, tranquil atmosphere.', transport: 'Inside Kayabuki no Sato, walking distance.' }
    ];

    const CITIES = [
      { id: 'osaka', name: 'Osaka', color: 'blue' },
      { id: 'kyoto', name: 'Kyoto', color: 'emerald' },
      { id: 'miyama', name: 'Miyama', color: 'fuchsia' },
      { id: 'nara', name: 'Nara', color: 'amber' },
      { id: 'uji', name: 'Uji', color: 'teal' },
      { id: 'kobe', name: 'Kobe', color: 'indigo' },
      { id: 'himeji', name: 'Himeji', color: 'rose' }
    ];

    // --- Core Routing & Scheduling Logic ---
    const formatTime = (h) => {
      let hh = Math.floor(h) % 24;
      let mm = Math.round((h - Math.floor(h)) * 60);
      if (mm === 60) { hh++; mm = 0; }
      return `${hh.toString().padStart(2, '0')}:${mm.toString().padStart(2, '0')}`;
    };

    const getCityColor = (cityId) => {
      const colors = { osaka: 'blue', kyoto: 'emerald', miyama: 'fuchsia', nara: 'amber', uji: 'teal', kobe: 'indigo', himeji: 'rose' };
      const c = colors[cityId] || 'slate';
      return `text-${c}-600 bg-${c}-100 border-${c}-200`;
    };

    const getSmartTransit = (prev, curr) => {
      if (curr.id === 'ret') return '✈️ [Ready to return] Take JR Haruka or Nankai Railway to Kansai International Airport (KIX) for check-in.';

      if (curr.region === 26) return `🚆 [Suburban Long-Distance] Heading to Kyoto by the Sea (Amanohashidate/Ine) takes about 2~2.5 hours by Limited Express train and bus.\n💡 Tip: Getting the JR Kansai Wide Area Pass is highly recommended!`;
      if (curr.id === 'koyasan') return `🚆 [Suburban Long-Distance] Take Nankai Limited Express to Gokurakubashi, transfer to the Koyasan Cable Car (approx. 2 hrs).`;
      if (curr.id === 'kumano') return `🚆 [Suburban Long-Distance] Take JR Limited Express Kuroshio to Kumano Kodo (approx. 3.5-4 hrs).\n💡 Tip: It's a long journey, highly recommend a 2-day 1-night stay and using the JR Pass.`;

      if (!prev || prev.id.startsWith('acc_') || prev.type === 'Start') {
        if (curr.type === 'Airport') return `🛬 [Arrive in Kansai] Take Nankai Railway, Limousine Bus, or JR to the city: ${curr.name}.`;
        return `🏨 [Departing] Take public transport to ${curr.name}.`;
      }

      if (prev.city !== curr.city && prev.id !== 'osaka_origin') {
         let text = '';
         const route = `${prev.city}-${curr.city}`;
         if (route.includes('miyama')) text = 'Take JR and transfer to Nantan City Bus, or drive (approx. 1.5~2 hrs).';
         else if (route === 'osaka-kyoto' || route === 'kyoto-osaka') text = 'Take JR Kyoto Line (Special Rapid) or Hankyu/Keihan Main Line (approx. 30-45 mins).';
         else if (route === 'osaka-nara' || route === 'nara-osaka') text = 'Take Kintetsu Nara Line or JR Yamatoji Line (approx. 40-50 mins).';
         else if (route === 'osaka-kobe' || route === 'kobe-osaka') text = 'Take JR Kobe Line (Special Rapid) or Hankyu/Hanshin Main Line (approx. 25-35 mins).';
         else if (route === 'osaka-himeji' || route === 'himeji-osaka') text = 'Take JR Kobe Line (Special Rapid) or Shinkansen (approx. 30-65 mins).';
         else if (route === 'kyoto-nara' || route === 'nara-kyoto') text = 'Take Kintetsu Kyoto Line or JR Nara Line (approx. 35-45 mins).';
         else text = `Take JR or local private railways for cross-city travel.`;
         return `🚄 [Cross-City Transfer] ${text}\n💡 Tip: Make good use of tourist passes or transport tickets.`;
      }

      return `🚇 [City Transit] Transfer by train or bus from ${prev.name} to ${curr.name}.`;
    };

    // --- Main App Component ---
    function App() {
      const [activeCity, setActiveCity] = useState('osaka');
      const [selectedIds, setSelectedIds] = useState([]);
      const [showPrintView, setShowPrintView] = useState(false);
      const [tripDuration, setTripDuration] = useState(5);

      const toggleAttr = (id) => setSelectedIds(p => p.includes(id) ? p.filter(x => x !== id) : [...p, id]);

      const itineraryDays = useMemo(() => {
        if (selectedIds.length === 0) return [];

        let idsToSchedule = [...selectedIds];
        
        // Binding logic: if Todaiji or Kasuga Taisha is selected, auto-add Nara Park
        if (idsToSchedule.includes('todaiji') || idsToSchedule.includes('kasuga')) {
            if (!idsToSchedule.includes('nara_park')) idsToSchedule.push('nara_park');
        }
        idsToSchedule = [...new Set(idsToSchedule)];

        // Priority Logic (ensures logical flow by time)
        const getPriority = (item) => {
            if (item.id === 'ret') return 999;
            if (item.type === 'Start') return 10;
            if (item.type === 'Airport') return 15;
            if (item.type === 'Accommodation') return 20; 
            
            let win = item.timeWindow || [9.5, 21.5];

            // Evening attractions pushed to later
            const isNight = (['Shopping', 'Hot Spring'].includes(item.type) && win[1] >= 19) || item.id === 'maya' || item.id === 'harukas' || item.id === 'teamlab_botanical';
            if (isNight) return 90; 
            
            // Temples, history, and zoos prioritized for daytime (they close around 17:00)
            if (win[1] <= 17.5) return 30; 
            
            return 50; 
        };

        const sorted = idsToSchedule
          .map(id => ATTRACTIONS.find(a => a.id === id))
          .filter(a => a)
          .sort((a, b) => {
            const getSortKey = (item) => {
              let sk = getPriority(item);
              // Group cities together
              let cityGroup = CITIES.findIndex(c => c.id === item.city);
              return cityGroup * 100000 + sk * 1000; 
            };
            return getSortKey(a) - getSortKey(b);
          });

        let remaining = [...sorted];
        let days = [];
        
        // ★ Day 1 starts at 12:00 (assume noon arrival at KIX or luggage drop-off)
        let curDay = { items: [], dayCity: 'osaka', dayType: null, currentTime: 12.0 }; 
        let lCity = 'osaka', lReg = 12;
        let prevItemObj = null; 

        // Transit Time Calculator
        const getTTime = (isNewDay, fCity, tCity, fReg, tReg) => {
            let extraFarTime = 0;
            if ((fReg === 17 && tReg !== 17) || (tReg === 17 && fReg !== 17)) extraFarTime += 1.5; // Koyasan, Kumano Kodo
            if ((fReg === 26 && tReg !== 26) || (tReg === 26 && fReg !== 26)) extraFarTime += 1.5; // Amanohashidate, Ine
            
            if (fReg === 26 && tReg === 26 && fCity === tCity && !isNewDay) return 0.8;

            if (fCity && tCity && fCity !== tCity) {
                if (fCity === 'miyama' || tCity === 'miyama') return 2.0 + extraFarTime;
                const pair = [fCity, tCity].sort().join('-');
                if (pair === 'himeji-osaka') return 1.5 + extraFarTime;
                if (pair === 'kobe-kyoto') return 1.5 + extraFarTime;
                return 1.0 + extraFarTime; 
            }
            if (isNewDay) return 0.5 + extraFarTime; 
            return (fReg !== tReg ? 0.8 : 0.3) + extraFarTime; 
        };

        const checkValid = (a, isF, curTime) => {
            let tTime = getTTime(isF, lCity, a.city, lReg, a.region);
            let arrivalTime = curTime + tTime;
            let isLastDay = days.length === tripDuration - 1;
            
            if (!isF) {
                let isBasic = ['Accommodation', 'Airport', 'Start'].includes(a.type);
                if (!isBasic) {
                    // Lock same-city attractions to the same day
                    if (a.city !== lCity) {
                        let hasSameCityLeft = remaining.some(r => r.city === lCity && !['Accommodation', 'Airport', 'Start'].includes(r.type));
                        if (hasSameCityLeft) return false; 
                        
                        if (curTime > 14) return false;
                    }
                }
            }

            let win = a.timeWindow || [9, 21.5]; 
            if (['Accommodation', 'Airport'].includes(a.type)) win = [0, 24];

            let waitTime = 0;
            if (arrivalTime < win[0]) {
                waitTime = win[0] - arrivalTime;
                if (waitTime > 2.0 && !isF) return false; 
            }

            let actStart = arrivalTime + waitTime;
            let actEnd = actStart + a.stay;

            if (actStart >= win[1] - 0.5) return false; 
            
            if (isLastDay) {
                let retTFromA = getTTime(false, a.city, 'osaka', a.region, 10);
                let maxEndTime = 14.0 - 2.5 - retTFromA; 
                if (actEnd > maxEndTime) return false;
            } else {
                if (!isF && actEnd > 22.0) return false; 
            }

            return { valid: true, tTime, waitTime, actStart, actEnd };
        };

        while (remaining.length > 0) {
            const isF = curDay.items.length === 0;
            let chosenIdx = -1;
            let chosenStats = null;

            let validCands = [];
            for (let i = 0; i < remaining.length; i++) {
                let stats = checkValid(remaining[i], isF, curDay.currentTime);
                if (stats && stats.valid) {
                    validCands.push({ a: remaining[i], idx: i, prio: getPriority(remaining[i]), stats });
                }
            }

            if (validCands.length > 0) {
                validCands.sort((ca, cb) => {
                    let isSameCityA = ca.a.city === lCity ? 1 : 0;
                    let isSameCityB = cb.a.city === lCity ? 1 : 0;
                    if (isSameCityA !== isSameCityB) return isSameCityB - isSameCityA;

                    if (ca.prio !== cb.prio) return ca.prio - cb.prio;
                    if (ca.stats.tTime !== cb.stats.tTime) return ca.stats.tTime - cb.stats.tTime;
                    let winA = ca.a.timeWindow || [9, 21.5];
                    let winB = cb.a.timeWindow || [9, 21.5];
                    if (winA[1] !== winB[1]) return winA[1] - winB[1];
                    
                    return ca.idx - cb.idx; 
                });
                chosenIdx = validCands[0].idx;
                chosenStats = validCands[0].stats;
            }

            if (chosenIdx === -1) {
                days.push(curDay);
                if (days.length >= tripDuration) break; 
                
                curDay = { items: [], dayCity: remaining[0].city, dayType: null, currentTime: 9.0 };
                continue;
            }

            const a = remaining.splice(chosenIdx, 1)[0];
            const { tTime, waitTime, actStart, actEnd } = chosenStats;

            if (isF && days.length === 0) prevItemObj = { id: 'osaka_origin', city: 'osaka', name: 'Airport/Arrival', type: 'Start' };
            if (isF && days.length > 0) prevItemObj = { id: 'acc_osaka', city: a.city, name: `Accommodation (${CITIES.find(c=>c.id===a.city)?.name || 'Osaka'})`, type: 'Accommodation' }; 

            let sTime = curDay.currentTime;
            let aTime = sTime + tTime;
            let finalWaitTime = actStart - aTime; 

            let transitMsg = getSmartTransit(prevItemObj, a);
            transitMsg += `\n📍 Route Guide: ${a.transport}`;
            
            let win = a.timeWindow || [9, 21.5];
            if (finalWaitTime > 0 && win[0] > 0 && !['Accommodation', 'Airport'].includes(a.type)) {
                transitMsg += `\n💡 Tip: Recommended to start after ${win[0]}:00. Estimated arrival at ${formatTime(aTime)}, you can rest nearby.`;
            }

            let isFirstAirport = (days.length === 0 && isF && a.type === 'Airport');

            curDay.items.push({
                ...a, tTime: tTime, prevName: prevItemObj.name, transitTransport: transitMsg,
                tStr: `${formatTime(sTime)} - ${formatTime(aTime)}`,
                sStr: isFirstAirport ? 'Arrival/Immigration' : `${formatTime(actStart)} - ${formatTime(actEnd)}`,
                isFirstAirport,
                endTime: actEnd
            });

            curDay.currentTime = actEnd;
            lCity = a.city; lReg = a.region; prevItemObj = a;
            if (isF) curDay.dayCity = a.city;
        }
        
        if (curDay.items.length > 0 && days.length < tripDuration) {
            days.push(curDay);
        }
        while (days.length < tripDuration) {
            days.push({ items: [], dayCity: lCity, dayType: null, currentTime: 9.0 });
        }

        // ================= ★ Final Airport Transfer (Locked to 14:00 on the last day) =================
        let lastD = days[days.length-1];
        if (!lastD) {
            lastD = { items: [], dayCity: 'osaka', dayType: null, currentTime: 9.0 };
            days.push(lastD);
        }
        
        let retT = getTTime(lastD.items.length === 0, lCity, 'osaka', lReg, 10);

        while (lastD.items.length > 0) {
            let lastItem = lastD.items[lastD.items.length-1];
            let testRetT = getTTime(false, lastItem.city, 'osaka', lastItem.region, 10);
            if (lastItem.endTime > (14.0 - 2.5 - testRetT)) {
                lastD.items.pop();
            } else {
                break;
            }
        }

        if (lastD.items.length > 0) {
            let lastItem = lastD.items[lastD.items.length-1];
            lastD.currentTime = lastItem.endTime;
            lCity = lastItem.city;
            lReg = lastItem.region;
            prevItemObj = lastItem;
        } else {
            lastD.currentTime = 9.0;
            lReg = 12;
            prevItemObj = { name: 'Accommodation', city: lCity };
        }
        
        retT = getTTime(lastD.items.length === 0, lCity, 'osaka', lReg, 10);
        let startTransit = 14.0 - 2.5 - retT;
        let transitMsg = '🚐 Take JR Haruka, Nankai Electric Railway, or Limousine Bus to KIX Airport for check-in.';
        
        if (lastD.currentTime < startTransit) {
            transitMsg = `💡 There is spare time before heading to the airport. Recommended to depart at ${formatTime(startTransit)}.\n🚐 Take public transport to the airport.`;
        }
        
        let retPrev = prevItemObj || {name: 'Accommodation', city: 'osaka'};
        lastD.items.push({
            id: 'ret', city: 'osaka', name: 'End of Trip - Head to Airport', stay: 2.5, region: 999, regionName: 'Airport', type: 'Airport',
            desc: 'Wishing you perfect memories of Kansai! Please arrive early for check-in. You can do final duty-free shopping at the airport.', transport: 'Take a direct train or transfer from your last location to Kansai Airport.',
            tTime: retT, prevName: retPrev.name, transitTransport: transitMsg,
            tStr: `${formatTime(startTransit)} - ${formatTime(14.0 - 2.5)}`,
            sStr: `${formatTime(14.0 - 2.5)} - 14:00`,
            isFirstAirport: false,
            endTime: 14.0
        });
        
        lastD.currentTime = 14.0;

        return days.map((d, i) => {
          const base = (i === 0 && d.items[0]?.isFirstAirport ? 12.0 : (i === 0 ? 12.0 : 9.0));
          const end = d.currentTime;
          return { dayNum: i+1, totalH: (end - base > 0 ? (end - base).toFixed(1) : "0.0"), cityName: CITIES.find(c => c.id === d.dayCity)?.name || 'Osaka', items: d.items };
        });
      }, [selectedIds, tripDuration]);

      if (showPrintView) {
        return (
          <div className="min-h-screen bg-white p-4 sm:p-8">
            <div className="max-w-3xl mx-auto border-2 border-slate-800 p-4 sm:p-8 rounded-2xl">
              <div className="text-center mb-10"><h1 className="text-2xl sm:text-3xl font-bold">⛩️ Exclusive Kansai Itinerary</h1><p className="mt-2 text-slate-500 text-sm">The smart scheduling system automatically calculates cross-district transit and temple business hours.</p></div>
              {itineraryDays.map(d => (
                <div key={d.dayNum} className="mb-10 print-break-avoid">
                  <h2 className="text-xl font-bold border-b-2 pb-2 mb-6">🌞 Day {d.dayNum} - [{d.cityName} Area] ({d.totalH}h)</h2>
                  <div className="space-y-6 ml-2 sm:ml-4 border-l-2 pl-4 sm:pl-6 border-slate-300">
                    {d.items.map((it, idx) => (
                      <div key={`${it.id}-${idx}`} className="relative mb-8">
                        {!it.isFirstAirport && (
                          <div className="mb-4 bg-slate-50 border border-slate-200 rounded-lg p-3 text-xs sm:text-sm">
                             <div className="font-bold mb-2">{it.prevName} ➔ {it.name}</div>
                             <div className="flex gap-3 mb-2"><span className="bg-white px-2 py-1 rounded border font-mono text-blue-500"><i className="fa-regular fa-clock"></i> {it.tStr}</span><span>Est. Travel Time: {it.tTime}h</span></div>
                             <div className="whitespace-pre-wrap text-slate-600">{it.transitTransport}</div>
                          </div>
                        )}
                        <div className="relative">
                          <div className="absolute -left-[23px] sm:-left-[31px] top-1 w-3 h-3 bg-blue-500 rounded-full border-2 border-white"></div>
                          <div className="font-bold text-xs sm:text-sm text-slate-500 mb-1"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : 'Stay: '}{it.sStr}</div>
                          <h4 className="text-lg sm:text-xl font-bold text-slate-900">{it.name}</h4>
                          <p className="text-xs sm:text-sm text-slate-600 my-2 leading-relaxed">{it.desc}</p>
                          {it.bookingLinks && <div className="mt-3 flex gap-2 flex-wrap print:hidden">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" className="bg-[#ff5b00] text-white text-xs px-2.5 py-1.5 rounded font-bold hover:bg-[#e05000]"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
              <div className="mt-10 text-center flex flex-col sm:flex-row justify-center gap-4 print-hidden">
                <button onClick={() => setShowPrintView(false)} className="bg-slate-800 text-white px-6 py-3 rounded-xl font-bold hover:bg-slate-700">Back to Edit</button>
                <button onClick={() => window.print()} className="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-500">Print Itinerary / Save as PDF</button>
              </div>
            </div>
          </div>
        );
      }

      const grouped = ATTRACTIONS.filter(a => a.city === activeCity && !a.id.startsWith('acc_')).reduce((acc, c) => { (acc[c.type] = acc[c.type] || []).push(c); return acc; }, {});

      return (
        <div className="min-h-screen bg-slate-50 pb-10">
          <header className="bg-white p-4 shadow-sm flex flex-wrap justify-between items-center sticky top-0 z-20 border-b gap-3">
            <div className="flex items-center gap-4">
              <h1 className="font-bold text-xl flex items-center gap-2"><i className="fa-solid fa-train-tram text-blue-600"></i>Kansai Itinerary Wizard</h1>
              <a 
                href="https://linkuei0425.github.io/Osaka-US/" 
                className="hidden sm:flex items-center gap-1.5 text-xs font-bold text-slate-500 hover:text-blue-600 bg-slate-100 hover:bg-blue-50 px-3 py-1.5 rounded-full transition-colors border border-slate-200"
              >
                <i className="fa-solid fa-house"></i> Back to Home
              </a>
            </div>
            <div className="flex items-center gap-3">
              {selectedIds.length > 0 && (
                <button 
                  onClick={() => setSelectedIds([])} 
                  className="text-xs font-bold text-red-500 hover:text-white border border-red-500 hover:bg-red-500 px-3 py-1.5 rounded-full shadow-sm transition-colors flex items-center gap-1 cursor-pointer"
                  title="Clear all selected attractions"
                >
                  <i className="fa-solid fa-trash-can"></i> Clear
                </button>
              )}
              <div className="text-xs font-bold bg-slate-800 text-white px-3 py-1.5 rounded-full shadow-sm">{selectedIds.length} Selected</div>
            </div>
          </header>
          
          <main className="max-w-7xl mx-auto p-4 flex flex-col lg:flex-row gap-6 mt-2">
            
            {/* Left side: Attractions selection */}
            <div className="lg:w-1/2 flex flex-col gap-4">
              <div className="bg-white p-2 rounded-xl flex gap-2 overflow-x-auto shadow-sm custom-scrollbar">
                {CITIES.map(c => <button key={c.id} onClick={() => setActiveCity(c.id)} className={`px-5 py-2.5 rounded-lg text-sm font-bold whitespace-nowrap transition-all duration-200 ${activeCity === c.id ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 hover:bg-slate-200 text-slate-600'}`}>{c.name}</button>)}
              </div>
              
              <div className="bg-white rounded-xl shadow-sm p-4 border border-slate-200">
                <h2 className="text-sm font-bold flex items-center gap-2 mb-1">
                  <i className="fa-solid fa-circle-info text-blue-500"></i>
                  Smart Scheduling Tips
                </h2>
                <p className="text-xs text-slate-500">
                  The system automatically schedules <strong className="text-orange-500">early-closing temples</strong> in the daytime and <strong className="text-indigo-500">shopping/night views</strong> in the evening.<br/>It also calculates cross-city travel time!
                </p>
              </div>

              <div className="max-h-[65vh] overflow-y-auto space-y-6 pr-2 custom-scrollbar">
                {Object.entries(grouped).map(([type, items]) => (
                  <div key={type} className="mb-6">
                    <h3 className="font-bold text-slate-700 mb-3 sticky top-0 bg-slate-50/90 py-2 backdrop-blur-sm z-10 border-b border-slate-200">{type}</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                      {items.map(it => (
                        <div key={it.id} onClick={() => toggleAttr(it.id)} className={`p-4 rounded-xl cursor-pointer border-2 transition-all duration-200 ${selectedIds.includes(it.id) ? 'bg-blue-50 border-blue-500 scale-[1.02] shadow-md' : 'bg-white border-transparent shadow-sm hover:border-slate-300'}`}>
                          <div className="font-bold text-slate-900 leading-tight mb-2">{it.name}</div>
                          <div className="text-[10px] flex gap-2 mb-2">
                            <span className="bg-slate-100 px-1.5 py-0.5 rounded text-slate-600"><i className="fa-regular fa-clock mr-1"></i>{it.stay}h</span>
                            <span className={`px-1.5 py-0.5 rounded border ${getCityColor(it.city)}`}><i className="fa-solid fa-location-dot"></i> {it.regionName}</span>
                          </div>
                          <p className="text-xs text-slate-500 line-clamp-2">{it.desc}</p>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            </div>

            {/* Right side: Generated Itinerary */}
            <div className="lg:w-1/2">
              <div className="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden flex flex-col max-h-[85vh] sticky top-24">
                <div className="bg-slate-800 text-white p-5 lg:p-6">
                  <h2 className="text-xl font-bold flex items-center gap-2"><i className="fa-regular fa-calendar-check text-blue-400"></i>Your Itinerary</h2>
                  <p className="text-xs opacity-80 mt-1.5">💡 If there are too many items, the system will automatically split them into multiple days based on hours and transit.</p>
                  
                  <div className="flex flex-wrap gap-2 mt-4">
                    <div className="flex gap-2 w-full sm:w-auto">
                      <select 
                        value={tripDuration} 
                        onChange={(e) => setTripDuration(Number(e.target.value))}
                        className="flex-1 sm:flex-none bg-slate-700 hover:bg-slate-600 text-white font-bold py-3 px-3 rounded-xl outline-none cursor-pointer transition-colors shadow-lg border border-slate-600"
                        title="Select total trip days"
                      >
                        <option value={4}>4-Day Trip</option>
                        <option value={5}>5-Day Trip</option>
                        <option value={6}>6-Day Trip</option>
                        <option value={7}>7-Day Trip</option>
                        <option value={8}>8-Day Trip</option>
                      </select>
                      <button 
                        onClick={() => setSelectedIds([])} 
                        className={`flex-1 sm:flex-none flex items-center justify-center gap-1.5 px-4 py-3 rounded-xl font-bold shadow-lg transition-all cursor-pointer ${selectedIds.length > 0 ? 'bg-red-500 hover:bg-red-600 text-white' : 'bg-slate-600 text-slate-400 hover:bg-slate-500 hover:text-white'}`}
                        title="Clear and restart itinerary"
                      >
                        <i className="fa-solid fa-rotate-right"></i>
                        <span>Reset</span>
                      </button>
                    </div>
                    <button onClick={() => setShowPrintView(true)} disabled={itineraryDays.length === 0} className="w-full sm:flex-1 bg-blue-500 hover:bg-blue-600 py-3 px-2 rounded-xl font-bold shadow-lg transition-all disabled:opacity-30 disabled:cursor-not-allowed text-white text-sm sm:text-base cursor-pointer">
                      Generate Detailed Itinerary
                    </button>
                  </div>
                </div>
                
                <div className="p-6 overflow-y-auto flex-1 custom-scrollbar bg-slate-50/50">
                  {itineraryDays.length === 0 ? <div className="text-center text-slate-400 py-24 flex flex-col items-center gap-4"><i className="fa-brands fa-fort-awesome text-6xl opacity-10"></i><p>No attractions selected yet</p></div> : 
                    itineraryDays.map(d => (
                      <div key={d.dayNum} className="mb-10">
                        <h3 className="font-bold text-lg mb-4 border-b-2 border-slate-200 pb-2 flex items-center gap-2 text-slate-800"><i className="fa-solid fa-sun text-orange-500"></i> Day {d.dayNum} - [{d.cityName}] <span className="text-xs font-normal text-slate-400 ml-auto">Total: {d.totalH}h</span></h3>
                        <div className="space-y-5 border-l-[3px] border-slate-200 ml-4 pl-7 relative pb-4">
                          {d.items.map((it, idx) => (
                            <div key={`${it.id}-${idx}`} className="relative mb-6">
                              {!it.isFirstAirport && (
                                <div className="mb-4 relative">
                                  <div className="absolute -left-[40px] top-1/2 -translate-y-1/2 w-4 h-4 bg-slate-100 rounded-full border-2 border-slate-300 flex items-center justify-center shadow-sm z-10"><i className="fa-solid fa-arrow-down text-[8px] text-slate-400"></i></div>
                                  <div className={`rounded-lg p-3 text-[11px] border shadow-sm ${it.transitTransport.includes('Cross-City') || it.transitTransport.includes('Suburban') ? 'bg-red-50/70 border-red-100' : 'bg-blue-50/70 border-blue-100'}`}>
                                    <div className={`font-bold mb-1.5 ${it.transitTransport.includes('Cross-City') || it.transitTransport.includes('Suburban') ? 'text-red-800' : 'text-blue-800'}`}>{it.prevName} ➔ {it.name}</div>
                                    <div className="flex items-center gap-3 mb-1.5">
                                      <span className={`bg-white px-2 py-0.5 rounded border font-mono shadow-sm ${it.transitTransport.includes('Cross-City') || it.transitTransport.includes('Suburban') ? 'border-red-200 text-red-600' : 'border-blue-200 text-blue-600'}`}>
                                        <i className="fa-regular fa-clock mr-1"></i> {it.tStr}
                                      </span>
                                      <span className={`font-medium ${it.transitTransport.includes('Cross-City') || it.transitTransport.includes('Suburban') ? 'text-red-600' : 'text-blue-600'}`}>Travel {it.tTime}h</span>
                                    </div>
                                    <div className="text-slate-600 whitespace-pre-wrap leading-relaxed">{it.transitTransport}</div>
                                  </div>
                                </div>
                              )}
                              <div className="bg-white p-4 rounded-xl border border-slate-200 shadow-sm relative hover:shadow-md transition-shadow">
                                <div className="absolute -left-[37px] top-4 w-4.5 h-4.5 bg-blue-500 rounded-full border-[3px] border-white shadow-sm z-10"></div>
                                <div className="text-xs font-bold text-slate-400 mb-1"><i className="fa-regular fa-clock"></i> {it.isFirstAirport ? '' : 'Stay: '}{it.sStr}</div>
                                <h4 className="font-bold text-base mb-1">{it.name}</h4>
                                <p className="text-xs text-slate-500 leading-relaxed">{it.desc}</p>
                                {it.bookingLinks && <div className="mt-3 flex gap-1.5 flex-wrap">{it.bookingLinks.map((l, i) => <a key={i} href={l.url} target="_blank" className="bg-[#ff5b00] hover:bg-[#e05000] text-white text-[9px] px-2.5 py-1 rounded-lg font-bold transition-colors shadow-sm"><i className="fa-solid fa-ticket mr-1"></i>🎟️ {l.text}</a>)}</div>}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))
                  }
                </div>
              </div>
            </div>
          </main>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
