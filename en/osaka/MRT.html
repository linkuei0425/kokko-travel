        let uniquePhysicalStations = {}; 

        Object.keys(mrtData).forEach(lineKey => {
            mrtData[lineKey].forEach(st => {
                allStationsMap[st.c] = { ...st, line: lineKey };
                allStationsList.push(allStationsMap[st.c]);

                let baseName = aliasMap[st.n] || st.n;

                if (!uniquePhysicalStations[baseName]) {
                    uniquePhysicalStations[baseName] = { name: baseName, en: st.e, codes: [], attractions: st.a };
                }
                uniquePhysicalStations[baseName].codes.push(st.c);
                if (st.a && !uniquePhysicalStations[baseName].attractions.includes(st.a)) {
                    uniquePhysicalStations[baseName].attractions += (uniquePhysicalStations[baseName].attractions ? ", " : "") + st.a;
                }
            });
        });

        const graph = {};
        const RIDE_TIME = 2; // ~2 min per stop
        const TRANSFER_TIME = 6; // ~6 min average transfer in Osaka
        const LOOP_TIME = 2; 

        function addEdge(u, v, weight, type, line) {
            if (!graph[u]) graph[u] = [];
            graph[u].push({ node: v, weight, type, line });
        }

        Object.keys(mrtData).forEach(lineKey => {
            const lineArr = mrtData[lineKey];
            for (let i = 0; i < lineArr.length - 1; i++) {
                addEdge(lineArr[i].c, lineArr[i+1].c, RIDE_TIME, 'ride', lineKey);
                addEdge(lineArr[i+1].c, lineArr[i].c, RIDE_TIME, 'ride', lineKey);
            }
            if (lineKey === 'JR_O') {
                addEdge(lineArr[lineArr.length - 1].c, lineArr[0].c, LOOP_TIME, 'ride', lineKey);
                addEdge(lineArr[0].c, lineArr[lineArr.length - 1].c, LOOP_TIME, 'ride', lineKey);
            }
        });

        Object.values(uniquePhysicalStations).forEach(station => {
            if (station.codes.length > 1) {
                for (let i = 0; i < station.codes.length; i++) {
                    for (let j = i + 1; j < station.codes.length; j++) {
                        let tTime = station.name === 'Umeda' ? 8 : TRANSFER_TIME; // Umeda dungeon penalty
                        addEdge(station.codes[i], station.codes[j], tTime, 'transfer', null);
                        addEdge(station.codes[j], station.codes[i], tTime, 'transfer', null);
                    }
                }
            }
        });

        function findShortestPath(startBaseName, endBaseName) {
            if (startBaseName === endBaseName) return null;

            const startCodes = uniquePhysicalStations[startBaseName].codes;
            const endCodes = uniquePhysicalStations[endBaseName].codes;

            const dist = {};
            const prev = {};
            const pq = [];

            Object.keys(allStationsMap).forEach(node => {
                dist[node] = Infinity;
                prev[node] = null;
            });

            startCodes.forEach(code => {
                dist[code] = 0;
                pq.push({ node: code, dist: 0 });
            });

            while (pq.length > 0) {
                pq.sort((a, b) => a.dist - b.dist);
                const { node, dist: currentDist } = pq.shift();

                if (dist[node] < currentDist) continue;
                if (endCodes.includes(node)) {
                    return reconstructPath(prev, node);
                }

                if (graph[node]) {
                    graph[node].forEach(edge => {
                        const alt = currentDist + edge.weight;
                        if (alt < dist[edge.node]) {
                            dist[edge.node] = alt;
                            prev[edge.node] = { node: node, edgeFromPrev: edge };
                            pq.push({ node: edge.node, dist: alt });
                        }
                    });
                }
            }
            return null;
        }

        function reconstructPath(prev, endNode) {
            const path = [];
            let curr = endNode;
            
            while (curr) {
                const step = prev[curr];
                if (step) {
                    path.unshift({ node: curr, edge: step.edgeFromPrev });
                    curr = step.node;
                } else {
                    path.unshift({ node: curr, edge: null }); 
                    curr = null;
                }
            }

            const legs = [];
            if (path.length < 2) return [];

            let currentLeg = { 
                type: path[1].edge.type, 
                line: path[1].edge.line, 
                nodes: [path[0].node, path[1].node],
                time: path[1].edge.weight,
                stops: path[1].edge.type === 'ride' ? 1 : 0
            };

            for (let i = 2; i < path.length; i++) {
                const edge = path[i].edge;
                if (edge.type === currentLeg.type && edge.line === currentLeg.line) {
                    currentLeg.nodes.push(path[i].node);
                    currentLeg.time += edge.weight;
                    if(edge.type === 'ride') currentLeg.stops += 1;
                } else {
                    legs.push(currentLeg);
                    currentLeg = { 
                        type: edge.type, 
                        line: edge.line, 
                        nodes: [path[i-1].node, path[i].node],
                        time: edge.weight,
                        stops: edge.type === 'ride' ? 1 : 0
                    };
                }
            }
            legs.push(currentLeg);
            return legs;
        }

        const { useState, useEffect } = React;

        const App = () => {
            const [startStation, setStartStation] = useState("Umeda");
            const [endStation, setEndStation] = useState("Universal City");
            const [route, setRoute] = useState(null);

            useEffect(() => {
                lucide.createIcons();
            });

            useEffect(() => {
                if(startStation && endStation && startStation !== endStation) {
                    const legs = findShortestPath(startStation, endStation);
                    setRoute(legs);
                } else {
                    setRoute(null);
                }
            }, [startStation, endStation]);

            const handleSwap = () => {
                const temp = startStation;
                setStartStation(endStation);
                setEndStation(temp);
            };

            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-slate-900 text-white shadow-md pt-12 pb-8 px-6 text-center">
                        <div className="flex items-center justify-center gap-4 mb-3">
                            <a href="https://linkuei0425.github.io/Osaka-US/index.html" title="Back to Home" className="inline-flex items-center justify-center text-slate-300 hover:text-white bg-slate-800 hover:bg-slate-700 p-2.5 rounded-full transition-colors shadow-sm">
                                <i data-lucide="home" className="w-5 h-5"></i>
                            </a>
                            <h1 className="text-3xl font-bold tracking-tight flex items-center gap-2">
                                <i data-lucide="train" className="w-8 h-8 text-amber-400"></i>
                                Osaka Transit (Metro/JR/Private)
                            </h1>
                        </div>
                        <p className="text-slate-400 text-sm">Quick route, time, and attraction guide</p>
                    </header>

                    <main className="max-w-2xl mx-auto px-4 -mt-6">
                        <div className="bg-white rounded-2xl shadow-xl p-6 mb-8 relative">
                            <div className="flex flex-col gap-4">
                                <div className="relative">
                                    <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">Start Station</label>
                                    <select 
                                        className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-base rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3.5 pr-8 truncate font-medium appearance-none"
                                        value={startStation}
                                        onChange={(e) => setStartStation(e.target.value)}
                                    >
                                        {Object.keys(mrtData).map(lineKey => (
                                            <optgroup key={`start-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                {mrtData[lineKey].map(st => {
                                                    const baseName = aliasMap[st.n] || st.n;
                                                    return (
                                                        <option key={`start-${st.c}`} value={baseName}>
                                                            [{st.c}] {st.n} ({st.e}){st.a ? ` 📍 ${st.a.split(', ')[0]}` : ''}
                                                        </option>
                                                    );
                                                })}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 top-6 flex items-center px-3 text-slate-500">
                                        <i data-lucide="chevron-down" className="w-5 h-5"></i>
                                    </div>
                                </div>

                                <div className="relative flex justify-center -my-3 z-10">
                                    <button 
                                        onClick={handleSwap}
                                        className="bg-blue-600 hover:bg-blue-700 text-white p-2.5 rounded-full shadow-md transition-transform hover:scale-105"
                                        title="Swap Stations"
                                    >
                                        <i data-lucide="arrow-down-up" className="w-5 h-5"></i>
                                    </button>
                                </div>

                                <div className="relative">
                                    <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">Destination Station</label>
                                    <select 
                                        className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-base rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3.5 pr-8 truncate font-medium appearance-none"
                                        value={endStation}
                                        onChange={(e) => setEndStation(e.target.value)}
                                    >
                                        {Object.keys(mrtData).map(lineKey => (
                                            <optgroup key={`end-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                {mrtData[lineKey].map(st => {
                                                    const baseName = aliasMap[st.n] || st.n;
                                                    return (
                                                        <option key={`end-${st.c}`} value={baseName}>
                                                            [{st.c}] {st.n} ({st.e}){st.a ? ` 📍 ${st.a.split(', ')[0]}` : ''}
                                                        </option>
                                                    );
                                                })}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 top-6 flex items-center px-3 text-slate-500">
                                        <i data-lucide="chevron-down" className="w-5 h-5"></i>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {startStation === endStation ? (
                            <div className="bg-yellow-50 text-yellow-800 p-4 rounded-xl text-center shadow-sm">
                                📍 Start and destination are the same station/group!
                            </div>
                        ) : route ? (
                            <RouteTimeline legs={route} destName={endStation} />
                        ) : (
                            <div className="text-center text-slate-500 py-8">
                                Calculating route...
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const RouteTimeline = ({ legs, destName }) => {
            const totalTime = legs.reduce((acc, leg) => acc + leg.time, 0);
            const totalTransfers = legs.filter(l => l.type === 'transfer').length;
            
            const destInfo = uniquePhysicalStations[destName];

            return (
                <div className="bg-white rounded-2xl shadow-xl overflow-hidden">
                    <div className="bg-slate-50 border-b border-slate-100 p-5 flex justify-between items-center">
                        <div>
                            <p className="text-sm font-semibold text-slate-500 mb-1">Estimated Time</p>
                            <p className="text-3xl font-bold text-slate-800">
                                {totalTime} <span className="text-base font-normal text-slate-500">min</span>
                            </p>
                        </div>
                        <div className="text-right">
                            <p className="text-sm font-semibold text-slate-500 mb-1">Transfers</p>
                            <p className="text-lg font-bold text-slate-700">
                                {totalTransfers}
                            </p>
                        </div>
                    </div>

                    <div className="p-6">
                        <div className="ml-4">
                            {legs.map((leg, idx) => (
                                <LegItem key={idx} leg={leg} isLast={idx === legs.length - 1} destName={destName} />
                            ))}
                        </div>
                        
                        <div className="relative pl-8 border-l-4 border-transparent">
                            <div className="absolute left-[-10px] top-1 w-4 h-4 bg-slate-800 rounded-full border-4 border-white shadow-sm z-10"></div>
                            <div className="absolute left-[-16px] top-[-5px] w-7 h-7 bg-slate-200 rounded-full opacity-50 z-0 animate-pulse"></div>
                            <h3 className="text-lg font-bold text-slate-800">{destInfo.name} <span className="text-sm font-normal text-slate-500 ml-1">{destInfo.en}</span></h3>
                            <p className="text-sm text-slate-500 mb-2">Arrive at Destination</p>
                            
                            {destInfo.attractions && (
                                <div className="mt-2 bg-indigo-50 border border-indigo-100 rounded-lg p-3 text-sm flex gap-2">
                                    <i data-lucide="map-pin" className="w-5 h-5 text-indigo-500 shrink-0"></i>
                                    <div>
                                        <span className="font-semibold text-indigo-900 block mb-0.5">Nearby Attractions:</span>
                                        <span className="text-indigo-800">{destInfo.attractions}</span>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const LegItem = ({ leg, isLast, destName }) => {
            const startNodeCode = leg.nodes[0];
            const endNodeCode = leg.nodes[leg.nodes.length - 1];
            const startStation = allStationsMap[startNodeCode];
            const endStation = allStationsMap[endNodeCode];

            if (leg.type === 'transfer') {
                return (
                    <div className="relative pl-8 pb-8 border-l-4 border-dashed border-slate-300">
                        <div className="absolute left-[-14px] top-1 w-6 h-6 bg-white rounded-full border-2 border-slate-300 z-10 flex items-center justify-center">
                            <i data-lucide="footprints" className="w-3.5 h-3.5 text-slate-500"></i>
                        </div>
                        <div className="bg-slate-50 border border-slate-200 rounded-lg p-3 inline-block">
                            <p className="text-sm font-semibold text-slate-700">
                                Transfer at <span className="text-slate-900">{aliasMap[startStation.n] || startStation.n}</span>
                            </p>
                            <p className="text-xs text-slate-500 mt-1 flex items-center gap-1">
                                <i data-lucide="clock" className="w-3 h-3"></i> Walk approx. {leg.time} min
                            </p>
                        </div>
                    </div>
                );
            }

            const lineTheme = lineColors[leg.line] || { bg: 'bg-slate-500', border: 'border-slate-500', text: 'text-slate-600', name: leg.line };
            
            return (
                <div className={`relative pl-8 pb-8 border-l-4 ${lineTheme.border}`}>
                    <div className={`absolute left-[-10px] top-1 w-4 h-4 rounded-full border-4 border-white shadow-sm z-10 ${lineTheme.bg}`}></div>
                    
                    <div className="mb-2">
                        <h3 className="text-base font-bold text-slate-800">
                            {startStation.n} <span className="text-sm font-normal text-slate-500 ml-1">{startStation.e}</span>
                        </h3>
                        
                        {startStation.a && (
                            <p className="text-xs text-indigo-600 mt-1 flex items-start gap-1">
                                <i data-lucide="star" className="w-3.5 h-3.5 mt-0.5 shrink-0"></i>
                                <span>{startStation.a}</span>
                            </p>
                        )}
                    </div>

                    <div className={`mt-3 border-l-4 rounded-r-lg p-4 bg-white shadow-sm border-y border-r border-slate-100 ${lineTheme.border}`}>
                        <div className="flex items-center gap-2 mb-1">
                            <span className={`${lineTheme.bg} text-white text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider`}>
                                {startNodeCode}
                            </span>
                            <span className={`text-sm font-semibold ${lineTheme.text}`}>Take {lineTheme.name}</span>
                        </div>
                        <p className="text-xs text-slate-500 flex items-center gap-2 mt-2">
                            <span>Toward <strong>{endStation.n}</strong></span>
                            <span className="text-slate-300">|</span>
                            <span>{leg.stops} stop(s)</span>
                            <span className="text-slate-300">|</span>
                            <span>Approx. {leg.time} min</span>
                        </p>
                        
                        <div className="mt-2 text-xs text-slate-400">
                            Via: {leg.nodes.slice(1, -1).map(c => allStationsMap[c].n).join(' ➔ ') || 'No intermediate stops'}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        lucide.createIcons();
    </script>
</body>
</html>
