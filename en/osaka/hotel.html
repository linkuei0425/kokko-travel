                        { name: "Centurion Hotel Classic Nara", feature: "Affordable price and modern classical decor. Very convenient to walk to Kintetsu station or shopping streets. Excellent CP value.", address: "1-1 Aburasakachicho, Nara / 5 min walk from JR Nara Sta.", url: "https://www.trip.com/hotels/nara-hotel-detail-11221547/centurion-hotel-classic-nara-station/?Allianceid=7913725&SID=301540016&trip_sub1=&trip_sub3=D14300267&locale=en_xx&curr=USD" }

                        { name: "Gekkoen Yugetsusanso", feature: "Surrounded by mountains and water, featuring a highly poetic stream-side open-air hot spring. The building retains traditional Sukiya-style architecture. Antique charm.", address: "318 Arimacho, Kita-ku, Kobe / Shuttle from Arima Onsen Sta.", url: "https://www.trip.com/hotels/kobe-hotel-detail-1640941/gekkoen-yugetsusanso/?Allianceid=7913725&SID=301540016&trip_sub1=&trip_sub3=D14300267&locale=en_xx&curr=USD" },
                        { name: "Arima Grand Hotel", feature: "The largest and best-equipped luxury hotel in Arima Onsen. The rooftop open-air bath offers an unobstructed view of Arima's mountain mist.", address: "1304-1 Arimacho, Kita-ku, Kobe / Shuttle from Arima Onsen Sta.", url: "https://www.trip.com/hotels/kobe-hotel-detail-1643194/arima-grand-hotel/?Allianceid=7913725&SID=301540016&trip_sub1=&trip_sub3=D14300267&locale=en_xx&curr=USD" },
                        { name: "Arima Onsen Gekkoen Korokan", feature: "Sister inn of Yugetsusanso, taking a modern and elegant route. Features excellent views and offers top-tier Kobe beef and seasonal Kaiseki cuisine.", address: "318 Arimacho, Kita-ku, Kobe / Shuttle from Arima Onsen Sta.", url: "https://www.trip.com/hotels/kobe-hotel-detail-2144572/arima-onsen-gekkoen-korokan/?Allianceid=7913725&SID=301540016&trip_sub1=&trip_sub3=D14300267&locale=en_xx&curr=USD" },
                        { name: "Tocen Goshoboh", feature: "The oldest inn in Arima Onsen! A favorite of literary giants like Junichiro Tanizaki. Its semi-mixed Golden Spring large bath is very historically unique.", address: "858 Arimacho, Kita-ku, Kobe / 5 min walk from Arima Onsen Sta.", url: "https://www.trip.com/hotels/kobe-hotel-detail-1642233/tocen-goshoboh/?Allianceid=7913725&SID=301540016&trip_sub1=&trip_sub3=D14300267&locale=en_xx&curr=USD" }
                    ],
                    "City Center High Value": [
                        { name: "Remm Plus Kobe Sannomiya", feature: "A quality business hotel connected to Sannomiya Station! Designed for 'good sleep', all rooms feature high-spec mattresses and massage chairs to relieve travel fatigue.", address: "4-2-1 Kanocho, Chuo-ku, Kobe / Directly connected to Hankyu Sannomiya Sta.", url: "https://www.trip.com/hotels/kobe-hotel-detail-67843473/remm-plus-kobe-sannomiya/?Allianceid=7913725&SID=301540016&trip_sub1=&trip_sub3=D14300267&locale=en_xx&curr=USD" },
                        { name: "Daiwa Roynet Hotel Kobe Sannomiya", feature: "Highly acclaimed chain brand. Very close to the bustling Sannomiya shopping street. Bright and clean rooms, an ideal base for business and sightseeing.", address: "5-1-6 Gokodori, Chuo-ku, Kobe / 7 min walk from JR Sannomiya Sta.", url: "https://www.trip.com/hotels/kobe-hotel-detail-1036070/daiwa-roynet-hotel-kobe-sannomiya/?Allianceid=7913725&SID=301540016&trip_sub1=&trip_sub3=D14300267&locale=en_xx&curr=USD" },
                        { name: "Candeo Hotels Kobe Tor Road", feature: "Full of modern design. The biggest selling point is the top-floor 'Sky Spa', where you can bathe while enjoying Kobe's mesmerizing city night view.", address: "3-8-8 Sannomiyacho, Chuo-ku, Kobe / 3 min walk from JR Motomachi Sta.", url: "https://www.trip.com/hotels/kobe-hotel-detail-11440078/candeo-hotels-kobe-tor-road/?Allianceid=7913725&SID=301540016&trip_sub1=&trip_sub3=D14300267&locale=en_xx&curr=USD" },
                        { name: "Brenza Hotel", feature: "A highly stylish boutique hotel in Kobe. The brick exterior and industrial room design attract young people. Excellent transport and dining nearby.", address: "6-1-1 Kumoidori, Chuo-ku, Kobe / 3 min walk from JR Sannomiya Sta.", url: "https://www.trip.com/hotels/kobe-hotel-detail-13589880/brenza-hotel/?Allianceid=7913725&SID=301540016&trip_sub1=&trip_sub3=D14300267&locale=en_xx&curr=USD" },
                        { name: "Hotel Monte Hermana Kobe Amalie", feature: "Exterior and interior overflow with Kobe's unique European retro style. Affordable and cozy, not far from Ikuta Shrine and shopping streets.", address: "2-2-28 Nakayamatedori, Chuo-ku, Kobe / 7 min walk from JR Sannomiya Sta.", url: "https://www.trip.com/hotels/kobe-hotel-detail-1634538/hotel-monte-hermana-kobe-amalie/?Allianceid=7913725&SID=301540016&trip_sub1=&trip_sub3=D14300267&locale=en_xx&curr=USD" }
                    ]
                }
            },
            "himeji": {
                name: "Himeji",
                categories: {
                    "Castle View & High Value": [
                        { name: "Hotel Monterey Himeji", feature: "Right next to Himeji Station, perfectly blending classical European design. Some rooms and the large bath offer direct views of the pure white Himeji Castle.", address: "60 Ekimaecho, Himeji / 1 min walk from JR Himeji Sta.", url: "https://www.trip.com/hotels/himeji-hotel-detail-12211910/hotel-monterey-himeji/?Allianceid=7913725&SID=301540016&trip_sub1=&trip_sub3=D14300267&locale=en_xx&curr=USD" },
                        { name: "Daiwa Roynet Hotel Himeji", feature: "Famous Japanese business hotel chain. Bright, spacious rooms with separated bath/toilet. Extremely close to the station and arcade. High CP value.", address: "353 Ekimaecho, Himeji / 4 min walk from JR Himeji Sta.", url: "https://www.trip.com/hotels/himeji-hotel-detail-25983758/daiwa-roynet-hotel-himeji/?Allianceid=7913725&SID=301540016&trip_sub1=&trip_sub3=D14300267&locale=en_xx&curr=USD" },
                        { name: "Dormy Inn Himeji", feature: "Top choice for hot spring lovers! Top floor features a natural hot spring bath and open-air bath. Free popsicles and famous late-night soy sauce ramen after bathing.", address: "160 Toyozawacho, Himeji / 3 min walk from JR Himeji Sta. South Exit", url: "https://www.trip.com/hotels/himeji-hotel-detail-1639908/dormy-inn-himeji-natural-hot-spring/?Allianceid=7913725&SID=301540016&trip_sub1=&trip_sub3=D14300267&locale=en_xx&curr=USD" },
                        { name: "Richmond Hotel Himeji", feature: "A consistently winning Japanese business hotel brand! Meticulous service, fully equipped rooms, and comfortable beds. Perfect for quality-conscious travelers.", address: "2-7 Nounencho, Himeji / 6 min walk from JR Himeji Sta.", url: "https://www.trip.com/hotels/himeji-hotel-detail-17793318/richmond-hotel-himeji/?Allianceid=7913725&SID=301540016&trip_sub1=&trip_sub3=D14300267&locale=en_xx&curr=USD" },
                        { name: "Hotel Nikko Himeji", feature: "A high-end hotel right in front of JR Himeji Station South Exit. Features comfortable, spacious rooms and high-floor restaurants. Himeji's most representative star hotel.", address: "100 Minamiekimaecho, Himeji / 1 min walk from JR Himeji Sta.", url: "https://www.trip.com/hotels/himeji-hotel-detail-1579298/hotel-nikko-himeji/?Allianceid=7913725&SID=301540016&trip_sub1=&trip_sub3=D14300267&locale=en_xx&curr=USD" }
                    ]
                }
            }
        };

        const districtContainer = document.getElementById('district-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const contentArea = document.getElementById('content-area');
        
        let currentDistrictKey = null;
        let currentCategoryName = null;

        // 1. Initialize District Buttons
        function initDistrictButtons() {
            Object.keys(hotelData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-5 py-2.5 rounded-full font-bold text-sm transition-all duration-200 border area-btn-inactive shadow-sm flex-shrink-0`;
                btn.innerHTML = `<i class="fa-solid fa-map-pin mr-1.5 opacity-70"></i>${hotelData[key].name}`;
                btn.onclick = () => selectDistrict(key, btn);
                districtContainer.appendChild(btn);
            });
        }

        // 2. Select District
        function selectDistrict(key, activeBtn) {
            currentDistrictKey = key;

            const allBtns = districtContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('area-btn-active');
                btn.classList.add('area-btn-inactive');
            });
            activeBtn.classList.remove('area-btn-inactive');
            activeBtn.classList.add('area-btn-active');

            categoryContainer.classList.remove('hidden');
            renderCategoryButtons();
        }

        // 3. Render Category Buttons
        function renderCategoryButtons() {
            categoryContainer.innerHTML = '';
            const currentCategories = Object.keys(hotelData[currentDistrictKey].categories);
            
            currentCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-5 py-2 rounded-lg font-bold text-sm transition-all duration-200 border cat-btn-inactive shadow-sm`;
                btn.innerText = cat;
                btn.onclick = () => selectCategory(cat, btn);
                categoryContainer.appendChild(btn);
            });

            // Default click on the first category
            const firstCatBtn = categoryContainer.querySelector('button');
            if(firstCatBtn) {
                selectCategory(currentCategories[0], firstCatBtn);
            }
        }

        // 4. Select Category
        function selectCategory(categoryName, activeBtn) {
            currentCategoryName = categoryName;

            const allBtns = categoryContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('cat-btn-active');
                btn.classList.add('cat-btn-inactive');
            });
            activeBtn.classList.remove('cat-btn-inactive');
            activeBtn.classList.add('cat-btn-active');

            renderHotels();
        }

        // 5. Render Hotel Data
        function renderHotels() {
            const districtData = hotelData[currentDistrictKey];
            const hotels = districtData.categories[currentCategoryName] || [];

            let htmlContent = `
                <div class="flex flex-col sm:flex-row sm:items-center mb-6 border-b pb-4 border-rose-100 animate-fade-in">
                    <h2 class="text-2xl font-bold text-rose-900 mr-3">
                        <i class="fa-solid fa-location-dot mr-2 text-rose-500"></i>${districtData.name}
                    </h2>
                    <span class="inline-block mt-2 sm:mt-0 px-3 py-1 bg-rose-100 text-rose-700 text-sm font-bold rounded-full border border-rose-200">
                        <i class="fa-solid fa-tag mr-1"></i>${currentCategoryName}
                    </span>
                </div>
            `;

            if (hotels.length === 0) {
                htmlContent += `<p class="text-slate-500 py-10 text-center animate-fade-in">No recommended hotels available in this category.</p>`;
            } else {
                htmlContent += `<div class="space-y-5">`;
                
                hotels.forEach((hotel, index) => {
                    const linkTagHTML = hotel.url 
                        ? `<a href="${hotel.url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center px-5 py-2.5 mt-3 sm:mt-0 rounded-xl text-sm font-bold bg-[#ff5b00] text-white hover:bg-[#e05000] transition-colors shadow-sm cursor-pointer sm:ml-auto w-full sm:w-auto">
                               <i class="fa-solid fa-magnifying-glass mr-1.5"></i>Details & Booking
                           </a>`
                        : '';

                    htmlContent += `
                        <div class="bg-[#fff9f9] border border-rose-50 p-5 md:p-6 rounded-2xl hover:shadow-md transition-all duration-300 animate-fade-in" style="animation-delay: ${index * 0.05}s;">
                            <div class="flex flex-col sm:flex-row sm:items-start justify-between mb-4 gap-2">
                                <h4 class="text-xl font-bold text-rose-900 flex items-start leading-tight pt-1">
                                    <span class="text-white bg-rose-400 rounded-full w-6 h-6 inline-flex items-center justify-center text-sm mr-2 flex-shrink-0">${index + 1}</span> 
                                    ${hotel.name}
                                </h4>
                                ${linkTagHTML}
                            </div>
                            <div class="pl-0 sm:pl-8 space-y-3">
                                <div class="flex items-start">
                                    <span class="font-bold text-rose-800 bg-rose-100 px-2 py-0.5 rounded mr-2 flex-shrink-0 text-xs mt-0.5"><i class="fa-solid fa-star mr-1"></i>Highlights</span> 
                                    <span class="text-sm text-slate-700 leading-relaxed font-medium">${hotel.feature}</span>
                                </div>
                                <div class="flex items-start">
                                    <span class="font-bold text-rose-800 bg-rose-100 px-2 py-0.5 rounded mr-2 flex-shrink-0 text-xs mt-0.5"><i class="fa-solid fa-map-pin mr-1"></i>Location</span> 
                                    <span class="text-sm text-slate-700 leading-relaxed font-medium">${hotel.address}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                htmlContent += `</div>`;
            }

            contentArea.innerHTML = htmlContent;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            initDistrictButtons();
            const firstDistrictBtn = districtContainer.querySelector('button');
            if(firstDistrictBtn) {
                selectDistrict('osaka', firstDistrictBtn);
            }
        });
    </script>
