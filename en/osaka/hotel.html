                        { name: "Hotel Monte Hermana Kobe Amalie (神戶阿瑪麗埃蒙特埃馬納酒店)", feature: "外觀與內裝洋溢著神戶特有的歐洲復古風情。價格親民且氣氛溫馨，距離生田神社與商店街都不遠。", address: "神戶市中央區中山手通 2-2-28 / JR三宮站步行7分鐘", url: "https://tw.trip.com/hotels/list/?keyword=Hotel%20Monte%20Hermana%20Kobe&Allianceid=299526438" }
                    ]
                }
            },
            "himeji": {
                name: "姬路 (Himeji)",
                categories: {
                    "城景與便利高CP": [
                        { name: "Hotel Monterey Himeji (姬路蒙特利酒店)", feature: "就在姬路車站旁，完美融合古典歐風設計。部分房型與大浴場可直接遠眺純白的姬路城。", address: "姬路市駅前町 60 / JR姬路站步行1分鐘", url: "https://tw.trip.com/hotels/list/?keyword=Hotel%20Monterey%20Himeji&Allianceid=299526438" },
                        { name: "Daiwa Roynet Hotel Himeji (姬路大和魯內酒店)", feature: "日本知名連鎖商務飯店，房間寬敞明亮，乾濕分離衛浴。距離車站與商店街極近，性價比極高。", address: "姬路市駅前町 353 / JR姬路站步行4分鐘", url: "https://tw.trip.com/hotels/list/?keyword=Daiwa%20Roynet%20Hotel%20Himeji&Allianceid=299526438" },
                        { name: "Dormy Inn Himeji (天然溫泉 白鷺之湯)", feature: "溫泉控首選！頂樓設有天然溫泉大浴場與露天風呂，泡湯後還有免費冰棒與著名的宵夜醬油拉麵。", address: "姬路市豐澤町 160 / JR姬路站南口步行3分鐘", url: "https://tw.trip.com/hotels/list/?keyword=Dormy%20Inn%20Himeji&Allianceid=299526438" },
                        { name: "Richmond Hotel Himeji (姬路里士滿飯店)", feature: "日本常勝軍商務旅館品牌！服務細膩、房內設施齊全且床鋪舒適，非常適合在意住宿品質的旅客。", address: "姬路市南畝町 2-7 / JR姬路站步行6分鐘", url: "https://tw.trip.com/hotels/list/?keyword=Richmond%20Hotel%20Himeji&Allianceid=299526438" },
                        { name: "Hotel Nikko Himeji (姬路日航酒店)", feature: "JR姬路站南口正前方的高級飯店。擁有舒適寬敞的客房與高樓層餐廳，是姬路市內最具代表性的星級飯店。", address: "姬路市南駅前町 100 / JR姬路站步行1分鐘", url: "https://tw.trip.com/hotels/list/?keyword=Hotel%20Nikko%20Himeji&Allianceid=299526438" }
                    ]
                }
            }
        };

        // AAO & GEO: 動態生成 Knowledge Graph (JSON-LD) 供 AI 代理人與搜尋引擎讀取全站結構
        function injectStructuredData() {
            const schema = {
                "@context": "https://schema.org",
                "@type": ["WebPage", "CollectionPage"],
                "mainEntity": {
                    "@type": "ItemList",
                    "name": "日本關西優質住宿與飯店推薦",
                    "description": "關西地區大阪、京都、奈良、神戶、宇治、美山與姬路的精選飯店與旅館導覽",
                    "itemListElement": []
                }
            };
            let position = 1;
            
            for (const [regionKey, regionData] of Object.entries(hotelData)) {
                for (const [catKey, hotels] of Object.entries(regionData.categories)) {
                    hotels.forEach(hotel => {
                        const rawAddress = hotel.address.split(' / ')[0]; // 移除交通資訊以提供乾淨的地址
                        schema.mainEntity.itemListElement.push({
                            "@type": "ListItem",
                            "position": position++,
                            "item": {
                                "@type": "LodgingBusiness",
                                "name": `${regionData.name} - ${hotel.name}`,
                                "description": hotel.feature,
                                "address": {
                                    "@type": "PostalAddress",
                                    "streetAddress": rawAddress,
                                    "addressRegion": regionData.name,
                                    "addressCountry": "JP"
                                },
                                "starRating": {
                                    "@type": "Rating",
                                    "ratingValue": "4" // 基礎評分參考
                                }
                            }
                        });
                    });
                }
            }

            const script = document.createElement('script');
            script.type = 'application/ld+json';
            script.text = JSON.stringify(schema);
            document.head.appendChild(script);
        }
        injectStructuredData();

        const districtContainer = document.getElementById('district-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const contentArea = document.getElementById('content-area');
        
        let currentDistrictKey = null;
        let currentCategoryName = null;

        // 1. 初始化區域按鈕
        function initDistrictButtons() {
            Object.keys(hotelData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `snap-center whitespace-nowrap min-h-[44px] px-5 sm:px-6 py-2.5 rounded-full font-bold text-sm sm:text-base transition-all duration-200 border area-btn-inactive shadow-sm flex-shrink-0 focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-rose-400`;
                btn.innerHTML = `<i class="fa-solid fa-map-pin mr-1.5 opacity-70" aria-hidden="true"></i>${hotelData[key].name}`;
                btn.setAttribute("role", "tab");
                btn.onclick = () => selectDistrict(key, btn);
                districtContainer.appendChild(btn);
            });
        }

        // 2. 選擇區域
        function selectDistrict(key, activeBtn) {
            currentDistrictKey = key;

            const allBtns = districtContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('area-btn-active');
                btn.classList.add('area-btn-inactive');
                btn.setAttribute("aria-selected", "false");
            });
            activeBtn.classList.remove('area-btn-inactive');
            activeBtn.classList.add('area-btn-active');
            activeBtn.setAttribute("aria-selected", "true");

            categoryContainer.classList.remove('hidden');
            renderCategoryButtons();
        }

        // 3. 渲染分類按鈕
        function renderCategoryButtons() {
            categoryContainer.innerHTML = '';
            const currentCategories = Object.keys(hotelData[currentDistrictKey].categories);
            
            currentCategories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `min-h-[44px] px-4 sm:px-5 py-2 rounded-lg font-bold text-sm sm:text-base transition-all duration-200 border cat-btn-inactive shadow-sm focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-rose-400`;
                btn.innerText = cat;
                btn.setAttribute("aria-pressed", "false");
                btn.onclick = () => selectCategory(cat, btn);
                categoryContainer.appendChild(btn);
            });

            // 預設點擊第一個分類
            const firstCatBtn = categoryContainer.querySelector('button');
            if(firstCatBtn) {
                selectCategory(currentCategories[0], firstCatBtn);
            }
        }

        // 4. 選擇分類
        function selectCategory(categoryName, activeBtn) {
            currentCategoryName = categoryName;

            const allBtns = categoryContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('cat-btn-active');
                btn.classList.add('cat-btn-inactive');
                btn.setAttribute("aria-pressed", "false");
            });
            activeBtn.classList.remove('cat-btn-inactive');
            activeBtn.classList.add('cat-btn-active');
            activeBtn.setAttribute("aria-pressed", "true");

            renderHotels();
        }

        // 5. 渲染飯店資料 (包含深度響應式網格升級)
        function renderHotels() {
            const districtData = hotelData[currentDistrictKey];
            const hotels = districtData.categories[currentCategoryName] || [];

            let htmlContent = `
                <div class="flex flex-col sm:flex-row sm:items-center mb-6 border-b pb-4 border-rose-100 animate-fade-in">
                    <h2 class="text-2xl sm:text-3xl font-bold text-rose-900 mr-4 tracking-tight flex items-center">
                        <i class="fa-solid fa-location-dot mr-2.5 text-rose-500" aria-hidden="true"></i>${districtData.name}
                    </h2>
                    <span class="inline-flex mt-3 sm:mt-0 px-3 py-1.5 bg-rose-100 text-rose-800 text-sm sm:text-base font-bold rounded-full border border-rose-200 shadow-sm items-center w-max">
                        <i class="fa-solid fa-tag mr-1.5" aria-hidden="true"></i>${currentCategoryName}
                    </span>
                </div>
            `;

            if (hotels.length === 0) {
                htmlContent += `<p class="text-slate-500 py-10 text-center animate-fade-in text-base sm:text-lg font-medium">此分類目前無推薦資料。</p>`;
            } else {
                // RWD調整：利用 grid grid-cols-1 lg:grid-cols-2 提供大螢幕雙欄舒適閱讀
                htmlContent += `<div class="grid grid-cols-1 lg:grid-cols-2 gap-5 sm:gap-6 lg:gap-8">`;
                
                hotels.forEach((hotel, index) => {
                    const linkTagHTML = hotel.url 
                        ? `<a href="${hotel.url}" target="_blank" rel="noopener noreferrer" aria-label="查看 ${hotel.name} 詳細說明" class="w-full flex items-center justify-center min-h-[44px] px-5 sm:px-6 py-2.5 rounded-xl text-sm sm:text-base font-bold bg-[#ff5b00] text-white hover:bg-[#e05000] transition-colors shadow-sm cursor-pointer focus:outline-none focus:ring-2 focus:ring-[#ff5b00] focus:ring-offset-2">
                               <i class="fa-solid fa-magnifying-glass mr-2" aria-hidden="true"></i>詳細說明
                           </a>`
                        : '';

                    htmlContent += `
                        <article aria-labelledby="hotel-title-${index}" class="bg-[#fff9f9] border border-rose-50 p-5 md:p-7 rounded-2xl hover:shadow-lg transition-all duration-300 animate-fade-in transform hover:-translate-y-1 flex flex-col h-full" style="animation-delay: ${index * 0.05}s;">
                            <div class="flex-grow">
                                <div class="flex flex-col sm:flex-row sm:items-start justify-between mb-4 sm:mb-5 gap-2 sm:gap-4">
                                    <h3 id="hotel-title-${index}" class="text-xl sm:text-2xl font-bold text-rose-900 flex items-start leading-tight pt-1">
                                        <span class="text-white bg-rose-400 rounded-full w-6 h-6 sm:w-7 sm:h-7 inline-flex items-center justify-center text-sm sm:text-base mr-2.5 sm:mr-3 flex-shrink-0 font-bold shadow-sm" aria-hidden="true">${index + 1}</span> 
                                        ${hotel.name}
                                    </h3>
                                </div>
                                <div class="pl-0 sm:pl-10 space-y-3 sm:space-y-4 mb-6">
                                    <div class="flex items-start">
                                        <span class="font-bold text-rose-800 bg-rose-100 px-2.5 py-0.5 rounded mr-2.5 flex-shrink-0 text-xs sm:text-sm mt-0.5 shadow-sm"><i class="fa-solid fa-star mr-1.5" aria-hidden="true"></i>亮點</span> 
                                        <p class="text-sm sm:text-base text-slate-700 leading-relaxed font-medium">${hotel.feature}</p>
                                    </div>
                                    <div class="flex items-start">
                                        <span class="font-bold text-rose-800 bg-rose-100 px-2.5 py-0.5 rounded mr-2.5 flex-shrink-0 text-xs sm:text-sm mt-0.5 shadow-sm"><i class="fa-solid fa-map-pin mr-1.5" aria-hidden="true"></i>位置</span> 
                                        <p class="text-sm sm:text-base text-slate-700 leading-relaxed font-medium">${hotel.address}</p>
                                    </div>
                                </div>
                            </div>
                            <div class="pl-0 sm:pl-10 mt-auto pt-4 border-t border-rose-100/50">
                                ${linkTagHTML}
                            </div>
                        </article>
                    `;
                });
                
                htmlContent += `</div>`;
            }

            contentArea.innerHTML = htmlContent;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initDistrictButtons();
            const firstDistrictBtn = districtContainer.querySelector('button');
            if(firstDistrictBtn) {
                selectDistrict('osaka', firstDistrictBtn);
            }
        });
    </script>
</body>
</html>
