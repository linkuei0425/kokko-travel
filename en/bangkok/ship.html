<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangkok Water Transport - Full Network Guide</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f0f9ff; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- 1. Bangkok Water Transport Database (Full Network) ---
        const mrtData = {
            CPE_ORG: [ // Chao Phraya Express Boat (Orange Flag) - All Piers
                { c: "N30", n: "Nonthaburi", e: "Nonthaburi (Pibul 3)", a: "Nonthaburi Market, Old City Hall" },
                { c: "N29/1", n: "Phra Nangklao", e: "Phra Nangklao Bridge", a: "MRT Purple Line Link" },
                { c: "N28", n: "Wat Khien", e: "Wat Khien", a: "" },
                { c: "N24", n: "Rama 7 Bridge", e: "Rama 7 Bridge", a: "KMUTNB University" },
                { c: "N23", n: "Wat Soi Thong", e: "Wat Soi Thong", a: "" },
                { c: "N22", n: "Rama 6 Bridge", e: "Rama 6 Bridge", a: "" },
                { c: "N21", n: "Kiak Kai", e: "Kiak Kai", a: "Parliament House" },
                { c: "N20", n: "Kheaw Khai Ka", e: "Kheaw Khai Ka", a: "" },
                { c: "N18", n: "Payap", e: "Payap", a: "Sukhothai Thammathirat" },
                { c: "N15", n: "Thewet", e: "Thewet", a: "Thewet Market, Flower Market" },
                { c: "N13", n: "Phra Arthit", e: "Phra Arthit", a: "Khaosan Road, Rambuttri" },
                { c: "N12", n: "Phra Pin Klao", e: "Phra Pin Klao Bridge", a: "National Museum" },
                { c: "N11", n: "Thonburi Railway", e: "Thonburi Railway", a: "Siriraj Hospital" },
                { c: "N10", n: "Prannok", e: "Prannok (Wang Lang)", a: "Wang Lang Market, Siriraj" },
                { c: "N9", n: "Tha Chang", e: "Tha Chang", a: "Grand Palace, Wat Phra Kaew" },
                { c: "N8", n: "Tha Tien", e: "Tha Tien", a: "Wat Pho, Wat Arun Cross-river Ferry" },
                { c: "N6/1", n: "Yodpiman", e: "Yodpiman", a: "Flower Market (Pak Khlong Talat)" },
                { c: "N6", n: "Memorial Bridge", e: "Memorial Bridge (Saphan Phut)", a: "Night Market" },
                { c: "N5", n: "Rachawongse", e: "Rachawongse", a: "Chinatown (Yaowarat), Sampeng Market" },
                { c: "N4", n: "Marine Dept", e: "Marine Department", a: "Talat Noi Art Street" },
                { c: "N3", n: "Si Phraya", e: "Si Phraya", a: "River City Bangkok, Warehouse 30" },
                { c: "N1", n: "Oriental", e: "Oriental", a: "Mandarin Oriental Hotel" },
                { c: "CEN", n: "Sathorn", e: "Sathorn (Central Pier)", a: "BTS Saphan Taksin Link" },
                { c: "S1", n: "Wat Sawetachat", e: "Wat Sawetachat", a: "" },
                { c: "S2", n: "Wat Worachanyawas", e: "Wat Worachanyawas", a: "Local Massage Area" },
                { c: "S3", n: "Wat Rajsingkorn", e: "Wat Rajsingkorn", a: "Asiatique The Riverfront" }
            ],
            CPE_BLU: [ // Chao Phraya Tourist Boat (Blue Flag)
                { c: "TB1", n: "Phra Arthit", e: "Phra Arthit", a: "Khaosan Road" },
                { c: "TB2", n: "Tha Chang", e: "Tha Chang", a: "Grand Palace" },
                { c: "TB3", n: "Tha Tien", e: "Tha Tien", a: "Wat Pho" },
                { c: "TB4", n: "Pak Khlong Talat", e: "Pak Khlong Talat", a: "Flower Market" },
                { c: "TB5", n: "Rachawongse", e: "Rachawongse", a: "Chinatown" },
                { c: "TB6", n: "Wat Arun", e: "Wat Arun", a: "Temple of Dawn" },
                { c: "TB7", n: "ICONSIAM", e: "ICONSIAM", a: "Luxury Mall" },
                { c: "CEN_B", n: "Sathorn", e: "Sathorn (Central Pier)", a: "BTS Saphan Taksin" },
                { c: "TB8", n: "Asiatique", e: "Asiatique", a: "Night Market" }
            ],
            KSS_WES: [ // Khlong Saen Saep Canal Boat (West Line)
                { c: "W1", n: "Panfa Leelard", e: "Panfa Leelard", a: "Golden Mount (Wat Saket), Loha Prasat" },
                { c: "W2", n: "Talad Bo-Bae", e: "Talad Bo-Bae", a: "Bo-Bae Clothing Market" },
                { c: "W3", n: "Sapan Charoen Pol", e: "Sapan Charoen Pol", a: "" },
                { c: "W4", n: "Baan Krua Nua", e: "Baan Krua Nua", a: "Jim Thompson House" },
                { c: "W5", n: "Sapan Hua Chang", e: "Sapan Hua Chang", a: "Siam Discovery, MBK Center" },
                { c: "W6", n: "Pratunam", e: "Pratunam (Central Hub)", a: "CentralWorld, Platinum Mall" }
            ],
            KSS_EAS: [ // Khlong Saen Saep Canal Boat (East Line)
                { c: "E1", n: "Pratunam", e: "Pratunam (Central Hub)", a: "Transfer to West Line" },
                { c: "E2", n: "Chidlom", e: "Chidlom", a: "Central Chidlom, Mercury Ville" },
                { c: "E3", n: "Wireless", e: "Wireless", a: "Embassy Row" },
                { c: "E4", n: "Nana Nua", e: "Nana Nua", a: "Sukhumvit Soi 3" },
                { c: "E4/1", n: "Nana Chard", e: "Nana Chard", a: "" },
                { c: "E5", n: "Asoke-Petchaburi", e: "Asoke-Petchaburi", a: "MRT Phetchaburi, ARL Makkasan" },
                { c: "E6", n: "Prasanmit", e: "Prasanmit", a: "SWU University" },
                { c: "E7", n: "Italthai", e: "Italthai", a: "Italthai Tower" },
                { c: "E8", n: "Wat Mai Chonglom", e: "Wat Mai Chonglom", a: "" },
                { c: "E9", n: "Baan Don Huay Kwang", e: "Baan Don Huay Kwang", a: "" },
                { c: "E10", n: "Soi Thonglo", e: "Soi Thonglo", a: "Thonglo District" },
                { c: "E10/1", n: "Charn Issara", e: "Charn Issara", a: "" },
                { c: "E11", n: "Vijit School", e: "Vijit School", a: "" },
                { c: "E12", n: "Sapan Klong Tun", e: "Sapan Klong Tun", a: "" },
                { c: "E13", n: "The Mall Ram", e: "The Mall Ramkhamhaeng", a: "Shopping Mall" },
                { c: "E14", n: "Wat Noi", e: "Wat Noi", a: "" },
                { c: "E15", n: "Ramkhamhaeng 29", e: "Ramkhamhaeng 29", a: "" },
                { c: "E16", n: "Wat Tepleela", e: "Wat Tepleela", a: "" },
                { c: "E17", n: "Ramkhamhaeng 53", e: "Ramkhamhaeng 53", a: "" },
                { c: "E18", n: "Mahadthai", e: "Mahadthai", a: "" },
                { c: "E19", n: "Wat Klang", e: "Wat Klang", a: "" },
                { c: "E20", n: "The Mall Bangkapi", e: "The Mall Bangkapi", a: "Bangkapi Mall" },
                { c: "E21", n: "Bang Kapi", e: "Bang Kapi", a: "Bangkapi Market" },
                { c: "E22", n: "Wat Sriboonreung", e: "Wat Sriboonreung", a: "Final Terminal" }
            ]
        };

        const lineColors = {
            CPE_ORG: { bg: 'bg-orange-500', border: 'border-orange-500', text: 'text-orange-700', name: '🟠 Chao Phraya Express (Orange)' },
            CPE_BLU: { bg: 'bg-blue-600', border: 'border-blue-600', text: 'text-blue-700', name: '🔵 Chao Phraya Tourist (Blue)' },
            KSS_WES: { bg: 'bg-slate-500', border: 'border-slate-500', text: 'text-slate-600', name: '🚣 Khlong Saen Saep (West)' },
            KSS_EAS: { bg: 'bg-slate-600', border: 'border-slate-600', text: 'text-slate-700', name: '🚣 Khlong Saen Saep (East)' }
        };

        const aliasMap = {
            "Sathorn (Central Pier)": "Sathorn (Central Pier Hub)",
            "Pratunam (Central Hub)": "Pratunam (Canal Transfer Hub)",
            "Phra Arthit": "Phra Arthit / Khaosan",
            "Tha Chang": "Tha Chang (Grand Palace)",
            "Rachawongse": "Rachawongse (Chinatown)",
            "Tha Tien": "Tha Tien (Wat Pho)"
        };

        let allStationsMap = {};
        let uniquePhysicalStations = {}; 

        Object.keys(mrtData).forEach(lineKey => {
            mrtData[lineKey].forEach(st => {
                allStationsMap[st.c] = { ...st, line: lineKey };
                let baseName = aliasMap[st.e] || st.e;

                if (!uniquePhysicalStations[baseName]) {
                    uniquePhysicalStations[baseName] = { name: baseName, en: st.e, codes: [], attractions: st.a };
                }
                uniquePhysicalStations[baseName].codes.push(st.c);
                if (st.a && !uniquePhysicalStations[baseName].attractions.includes(st.a)) {
                    uniquePhysicalStations[baseName].attractions += (uniquePhysicalStations[baseName].attractions ? ", " : "") + st.a;
                }
            });
        });

        const graph = {};
        const RIDE_TIME = 3; 
        const TRANSFER_TIME = 5; 

        function addEdge(u, v, weight, type, line) {
            if (!graph[u]) graph[u] = [];
            graph[u].push({ node: v, weight, type, line });
        }

        Object.keys(mrtData).forEach(lineKey => {
            const lineArr = mrtData[lineKey];
            for (let i = 0; i < lineArr.length - 1; i++) {
                addEdge(lineArr[i].c, lineArr[i+1].c, RIDE_TIME, 'ride', lineKey);
                addEdge(lineArr[i+1].c, lineArr[i].c, RIDE_TIME, 'ride', lineKey);
            }
        });

        Object.values(uniquePhysicalStations).forEach(station => {
            if (station.codes.length > 1) {
                for (let i = 0; i < station.codes.length; i++) {
                    for (let j = i + 1; j < station.codes.length; j++) {
                        let tTime = (station.name.includes('Pratunam')) ? 3 : TRANSFER_TIME; 
                        addEdge(station.codes[i], station.codes[j], tTime, 'transfer', null);
                        addEdge(station.codes[j], station.codes[i], tTime, 'transfer', null);
                    }
                }
            }
        });

        function findShortestPath(startBaseName, endBaseName) {
            if (startBaseName === endBaseName) return null;
            const startCodes = uniquePhysicalStations[startBaseName].codes;
            const endCodes = uniquePhysicalStations[endBaseName].codes;
            const dist = {};
            const prev = {};
            const pq = [];

            Object.keys(allStationsMap).forEach(node => {
                dist[node] = Infinity;
                prev[node] = null;
            });
            startCodes.forEach(code => {
                dist[code] = 0;
                pq.push({ node: code, dist: 0 });
            });
            while (pq.length > 0) {
                pq.sort((a, b) => a.dist - b.dist);
                const { node, dist: currentDist } = pq.shift();
                if (dist[node] < currentDist) continue;
                if (endCodes.includes(node)) return reconstructPath(prev, node);
                if (graph[node]) {
                    graph[node].forEach(edge => {
                        const alt = currentDist + edge.weight;
                        if (alt < dist[edge.node]) {
                            dist[edge.node] = alt;
                            prev[edge.node] = { node: node, edgeFromPrev: edge };
                            pq.push({ node: edge.node, dist: alt });
                        }
                    });
                }
            }
            return null;
        }

        function reconstructPath(prev, endNode) {
            const path = [];
            let curr = endNode;
            while (curr) {
                const step = prev[curr];
                if (step) {
                    path.unshift({ node: curr, edge: step.edgeFromPrev });
                    curr = step.node;
                } else {
                    path.unshift({ node: curr, edge: null }); 
                    curr = null;
                }
            }
            const legs = [];
            if (path.length < 2) return [];
            let currentLeg = { 
                type: path[1].edge.type, 
                line: path[1].edge.line, 
                nodes: [path[0].node, path[1].node],
                time: path[1].edge.weight,
                stops: path[1].edge.type === 'ride' ? 1 : 0
            };
            for (let i = 2; i < path.length; i++) {
                const edge = path[i].edge;
                if (edge.type === currentLeg.type && edge.line === currentLeg.line) {
                    currentLeg.nodes.push(path[i].node);
                    currentLeg.time += edge.weight;
                    if(edge.type === 'ride') currentLeg.stops += 1;
                } else {
                    legs.push(currentLeg);
                    currentLeg = { 
                        type: edge.type, 
                        line: edge.line, 
                        nodes: [path[i-1].node, path[i].node],
                        time: edge.weight,
                        stops: edge.type === 'ride' ? 1 : 0
                    };
                }
            }
            legs.push(currentLeg);
            return legs;
        }

        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className }) => {
            const spanRef = useRef(null);
            useEffect(() => {
                if (spanRef.current) {
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    if (className) i.setAttribute('class', className);
                    spanRef.current.innerHTML = '';
                    spanRef.current.appendChild(i);
                    lucide.createIcons({ root: spanRef.current });
                }
            }, [name, className]);
            return <span ref={spanRef} style={{ display: 'contents' }}></span>;
        };

        const App = () => {
            const [startStation, setStartStation] = useState("Sathorn (Central Pier Hub)");
            const [endStation, setEndStation] = useState("Tha Chang (Grand Palace)");
            const [route, setRoute] = useState(null);

            useEffect(() => {
                if(startStation && endStation && startStation !== endStation) {
                    const legs = findShortestPath(startStation, endStation);
                    setRoute(legs);
                } else {
                    setRoute(null);
                }
            }, [startStation, endStation]);

            const handleSwap = () => {
                const temp = startStation;
                setStartStation(endStation);
                setEndStation(temp);
            };

            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-blue-900 text-white shadow-md pt-12 pb-8 px-6 text-center">
                        <div className="flex items-center justify-center gap-4 mb-3">
                            <a href="https://linkuei0425.github.io/BANGKOK-US/index.html" title="Home" className="inline-flex items-center justify-center text-blue-200 hover:text-white bg-blue-800 hover:bg-blue-700 p-2.5 rounded-full transition-colors shadow-sm">
                                <Icon name="home" className="w-5 h-5" />
                            </a>
                            <h1 className="text-3xl font-bold tracking-tight flex items-center gap-2">
                                <Icon name="ship" className="w-8 h-8 text-sky-400" />
                                Bangkok Water Transport
                            </h1>
                        </div>
                        <p className="text-blue-300 text-sm font-medium">Full Network Guide: Express Boats & Canal Boats</p>
                    </header>

                    <main className="max-w-2xl mx-auto px-4 -mt-6">
                        <div className="bg-white rounded-2xl shadow-xl p-6 mb-8 relative">
                            <div className="flex flex-col gap-4">
                                <div className="relative">
                                    <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">Departing From</label>
                                    <select 
                                        className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-base rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3.5 pr-8 truncate font-medium appearance-none"
                                        value={startStation}
                                        onChange={(e) => setStartStation(e.target.value)}
                                    >
                                        {Object.keys(mrtData).map(lineKey => (
                                            <optgroup key={`start-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                {mrtData[lineKey].map(st => {
                                                    const baseName = aliasMap[st.e] || st.e;
                                                    return (
                                                        <option key={`start-${st.c}`} value={baseName}>
                                                            [{st.c}] {st.e}{st.a ? ` 📍 ${st.a.split(',')[0]}` : ''}
                                                        </option>
                                                    );
                                                })}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 top-6 flex items-center px-3 text-slate-500">
                                        <Icon name="chevron-down" className="w-5 h-5" />
                                    </div>
                                </div>

                                <div className="relative flex justify-center -my-3 z-10">
                                    <button onClick={handleSwap} className="bg-sky-600 hover:bg-sky-700 text-white p-2.5 rounded-full shadow-md transition-transform hover:scale-105">
                                        <Icon name="arrow-down-up" className="w-5 h-5" />
                                    </button>
                                </div>

                                <div className="relative">
                                    <label className="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1 block">Arriving At</label>
                                    <select 
                                        className="w-full bg-slate-50 border border-slate-200 text-slate-800 text-base rounded-xl focus:ring-blue-500 focus:border-blue-500 block p-3.5 pr-8 truncate font-medium appearance-none"
                                        value={endStation}
                                        onChange={(e) => setEndStation(e.target.value)}
                                    >
                                        {Object.keys(mrtData).map(lineKey => (
                                            <optgroup key={`end-group-${lineKey}`} label={lineColors[lineKey].name}>
                                                {mrtData[lineKey].map(st => {
                                                    const baseName = aliasMap[st.e] || st.e;
                                                    return (
                                                        <option key={`end-${st.c}`} value={baseName}>
                                                            [{st.c}] {st.e}{st.a ? ` 📍 ${st.a.split(',')[0]}` : ''}
                                                        </option>
                                                    );
                                                })}
                                            </optgroup>
                                        ))}
                                    </select>
                                    <div className="pointer-events-none absolute inset-y-0 right-0 top-6 flex items-center px-3 text-slate-500">
                                        <Icon name="chevron-down" className="w-5 h-5" />
                                    </div>
                                </div>
                            </div>
                        </div>

                        {startStation === endStation ? (
                            <div className="bg-yellow-50 text-yellow-800 p-4 rounded-xl text-center shadow-sm font-medium">
                                📍 Departure and arrival are the same location.
                            </div>
                        ) : route ? (
                            <RouteTimeline legs={route} destName={endStation} />
                        ) : (
                            <div className="text-center text-slate-500 py-8">
                                Finding the best water route...
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const RouteTimeline = ({ legs, destName }) => {
            const totalTime = legs.reduce((acc, leg) => acc + leg.time, 0);
            const totalTransfers = legs.filter(l => l.type === 'transfer').length;
            const destInfo = uniquePhysicalStations[destName];

            return (
                <div className="bg-white rounded-2xl shadow-xl overflow-hidden">
                    <div className="bg-sky-50 border-b border-sky-100 p-5 flex justify-between items-center">
                        <div>
                            <p className="text-sm font-semibold text-sky-600 mb-1">Total Voyage Time</p>
                            <p className="text-3xl font-bold text-slate-800">
                                {totalTime} <span className="text-base font-normal text-slate-500">mins</span>
                            </p>
                        </div>
                        <div className="text-right">
                            <p className="text-sm font-semibold text-sky-600 mb-1">Boat Switches</p>
                            <p className="text-lg font-bold text-slate-700">
                                {totalTransfers} <span className="text-sm font-normal text-slate-500">time(s)</span>
                            </p>
                        </div>
                    </div>

                    <div className="p-6">
                        <div className="ml-4">
                            {legs.map((leg, idx) => (
                                <LegItem key={idx} leg={leg} isLast={idx === legs.length - 1} destName={destName} />
                            ))}
                        </div>
                        
                        <div className="relative pl-8 border-l-4 border-transparent">
                            <div className="absolute left-[-10px] top-1 w-4 h-4 bg-slate-800 rounded-full border-4 border-white shadow-sm z-10"></div>
                            <div className="absolute left-[-16px] top-[-5px] w-7 h-7 bg-sky-200 rounded-full opacity-50 z-0 animate-pulse"></div>
                            <h3 className="text-lg font-bold text-slate-800">{destInfo.name}</h3>
                            <p className="text-sm text-slate-500 mb-2">Arrival (Pier)</p>
                            {destInfo.attractions && (
                                <div className="mt-2 bg-blue-50 border border-blue-100 rounded-lg p-3 text-sm flex gap-2">
                                    <Icon name="anchor" className="w-5 h-5 text-blue-500 shrink-0" />
                                    <div>
                                        <span className="font-semibold text-blue-900 block mb-0.5">Nearby Landmarks:</span>
                                        <span className="text-blue-800">{destInfo.attractions}</span>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const LegItem = ({ leg, isLast, destName }) => {
            const startNodeCode = leg.nodes[0];
            const endNodeCode = leg.nodes[leg.nodes.length - 1];
            const startStation = allStationsMap[startNodeCode];
            const endStation = allStationsMap[endNodeCode];

            if (leg.type === 'transfer') {
                return (
                    <div className="relative pl-8 pb-8 border-l-4 border-dashed border-slate-300">
                        <div className="absolute left-[-14px] top-1 w-6 h-6 bg-white rounded-full border-2 border-slate-300 z-10 flex items-center justify-center">
                            <Icon name="footprints" className="w-3.5 h-3.5 text-slate-500" />
                        </div>
                        <div className="bg-slate-50 border border-slate-200 rounded-lg p-3 inline-block">
                            <p className="text-sm font-semibold text-slate-700">
                                Switch boats at <span className="text-slate-900">{aliasMap[startStation.e] || startStation.e}</span> Pier
                            </p>
                            <p className="text-xs text-slate-500 mt-1 flex items-center gap-1">
                                <Icon name="clock" className="w-3 h-3" /> approx. {leg.time} mins
                            </p>
                        </div>
                    </div>
                );
            }

            const lineTheme = lineColors[leg.line] || { bg: 'bg-slate-500', border: 'border-slate-500', text: 'text-slate-600', name: leg.line };
            
            return (
                <div className={`relative pl-8 pb-8 border-l-4 ${lineTheme.border}`}>
                    <div className={`absolute left-[-10px] top-1 w-4 h-4 rounded-full border-4 border-white shadow-sm z-10 ${lineTheme.bg}`}></div>
                    <div className="mb-2">
                        <h3 className="text-base font-bold text-slate-800">{startStation.e}</h3>
                        {startStation.a && (
                            <p className="text-xs text-blue-600 mt-1 flex items-start gap-1">
                                <Icon name="star" className="w-3.5 h-3.5 mt-0.5 shrink-0" />
                                <span>{startStation.a}</span>
                            </p>
                        )}
                    </div>
                    <div className={`mt-3 border-l-4 rounded-r-lg p-4 bg-white shadow-sm border-y border-r border-slate-100 ${lineTheme.border}`}>
                        <div className="flex items-center gap-2 mb-1">
                            <span className={`${lineTheme.bg} text-white text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider`}>{startNodeCode}</span>
                            <span className={`text-sm font-semibold ${lineTheme.text}`}>{lineTheme.name}</span>
                        </div>
                        <p className="text-xs text-slate-500 flex items-center gap-2 mt-2">
                            <span>To <strong>{endStation.e}</strong></span>
                            <span className="text-slate-300">|</span>
                            <span>{leg.stops} stops</span>
                            <span className="text-slate-300">|</span>
                            <span>approx. {leg.time} mins</span>
                        </p>
                        <div className="mt-2 text-xs text-slate-400">
                            Via: {leg.nodes.slice(1, -1).map(c => allStationsMap[c].e).join(' ➔ ') || 'Direct Voyage'}
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
