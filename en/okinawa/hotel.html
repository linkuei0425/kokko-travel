                        { name: "IRAPH SUI, a Luxury Collection Hotel, Miyako Okinawa", feature: "A top luxury brand under Marriott, located on Irabu Island connected to Miyakojima. Enjoy ultimate tranquility and invincible sunset ocean views.", address: "Irabu Island", url: "https://www.trip.com/hotels/miyakojima-hotel-detail-23217500/iraph-sui-a-luxury-collection-hotel-miyako-okinawa/?Allianceid=7913725&SID=298685913&trip_sub1=&trip_sub3=D13802637&curr=USD&locale=en_xx" }
                    ],
                    "High CP Ocean View / Design": [
                        { name: "HOTEL LOCUS", feature: "A highly design-oriented modern ocean-view hotel. All rooms face the sea, with a pool and lounge area on the top floor. Convenient transportation and extremely high value.", address: "Around Hirara Port", url: "https://www.trip.com/hotels/miyakojima-hotel-detail-11536559/hotel-locus/?Allianceid=7913725&SID=298685913&trip_sub1=&trip_sub3=D13802637&curr=USD&locale=en_xx" },
                        { name: "Hotel Torifito Miyakojima Resort", feature: "Close to Miyako Airport with new facilities and affordable prices. Features a large outdoor pool, making it perfect for families and self-driving tourists.", address: "Around Miyako Airport", url: "https://www.trip.com/hotels/miyakojima-hotel-detail-64802670/hoteltorifito-miyakojima-resort/?Allianceid=7913725&SID=298685913&trip_sub1=&trip_sub3=D13802637&curr=USD&locale=en_xx" }
                    ],
                    "Condo Hotel": [
                        { name: "Palm Springs Miyakojima Resort", feature: "Spacious condo hotel offering a fully equipped kitchen and washing machine. Suitable for long stays and family trips, as comfortable as home.", address: "Around Miyakojima City Area", url: "https://www.trip.com/hotels/miyakojima-hotel-detail-22220137/palm-springs-miyakojima-resort/?Allianceid=7913725&SID=298685913&trip_sub1=&trip_sub3=D13802637&curr=USD&locale=en_xx" }
                    ]
                }
            }
        };

        const districtContainer = document.getElementById('district-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const contentArea = document.getElementById('content-area');
        let curDist = null, curCat = null;

        function init() {
            Object.keys(hotelData).forEach(k => {
                let b = document.createElement('button');
                b.className = 'px-2 py-2.5 rounded-lg font-bold text-[13px] md:text-sm border area-btn-inactive transition-colors duration-200';
                b.innerText = hotelData[k].name;
                b.onclick = () => selectDist(k, b);
                districtContainer.appendChild(b);
            });
            selectDist('naha', districtContainer.children[0]);
        }

        function selectDist(k, b) {
            curDist = k;
            Array.from(districtContainer.children).forEach(btn => btn.className = 'px-2 py-2.5 rounded-lg font-bold text-[13px] md:text-sm border area-btn-inactive transition-colors duration-200');
            b.className = 'px-2 py-2.5 rounded-lg font-bold text-[13px] md:text-sm border area-btn-active transition-colors duration-200 shadow-md';
            categoryContainer.classList.remove('hidden');
            renderCats();
        }

        function renderCats() {
            categoryContainer.innerHTML = '';
            Object.keys(hotelData[curDist].categories).forEach(c => {
                let b = document.createElement('button');
                b.className = 'px-2 py-2 rounded-lg font-bold text-[13px] md:text-sm border cat-btn-inactive transition-colors duration-200';
                b.innerText = c;
                b.onclick = () => selectCat(c, b);
                categoryContainer.appendChild(b);
            });
            selectCat(Object.keys(hotelData[curDist].categories)[0], categoryContainer.children[0]);
        }

        function selectCat(c, b) {
            curCat = c;
            Array.from(categoryContainer.children).forEach(btn => btn.className = 'px-2 py-2 rounded-lg font-bold text-[13px] md:text-sm border cat-btn-inactive transition-colors duration-200');
            b.className = 'px-2 py-2 rounded-lg font-bold text-[13px] md:text-sm border cat-btn-active transition-colors duration-200 shadow-sm';
            renderHotels();
        }

        function renderHotels() {
            let h = hotelData[curDist].categories[curCat];
            contentArea.innerHTML = h.map((x, index) => `
                <div class="mb-5 p-5 border border-sky-100 rounded-xl bg-slate-50 hover:shadow-md transition-shadow">
                    <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-3">
                        <h3 class="font-bold text-lg text-sky-800 flex items-start sm:items-center gap-2">
                            <span class="bg-sky-200 text-sky-800 px-2 py-0.5 rounded-md text-sm shrink-0">${index + 1}</span>
                            <span>${x.name}</span>
                        </h3>
                        <a href="${x.url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center bg-blue-500 hover:bg-blue-600 text-white text-[13px] font-bold py-1.5 px-3 rounded-lg shadow-sm transition-colors shrink-0">
                            View Details
                        </a>
                    </div>
                    <p class="text-sm text-gray-700 mt-3 leading-relaxed">
                        <strong class="text-sky-700 bg-sky-100 px-1.5 py-0.5 rounded">Feature</strong> ${x.feature}
                    </p>
                    <p class="text-sm text-gray-600 mt-2">
                        <strong class="text-slate-600 bg-slate-200 px-1.5 py-0.5 rounded">Location</strong> ${x.address}
                    </p>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
