<body class="text-gray-800 antialiased selection:bg-sky-200 selection:text-sky-900">

    <!-- Header (Semantic tag for AEO) -->
    <header role="banner" class="bg-sky-600 text-white sticky top-0 z-50 shadow-md">
        <div class="container mx-auto px-4 md:px-6 lg:px-8 py-3 md:py-4 flex items-center justify-between">
            <h1 class="text-lg md:text-2xl font-bold flex items-center gap-2 tracking-tight">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 md:h-7 md:w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" />

            </h1>
            <nav aria-label="Main Navigation">
                <a href="https://kokko-travel.com/en/okinawa/" target="_blank" rel="noopener noreferrer" aria-label="Go back to Home page" class="flex items-center gap-1.5 text-xs md:text-sm font-medium bg-sky-700 hover:bg-sky-800 px-3 py-2 md:px-4 md:py-2 rounded-lg transition-colors shadow-sm border border-sky-500">
                    <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 md:h-5 md:w-5" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z" clip-rule="evenodd" />
                    </svg>

    <!-- Main Content Area with clear role for Screen Readers & AI Agents -->
    <main role="main" class="container mx-auto px-4 md:px-6 lg:px-8 py-6 md:py-8 max-w-7xl">
        
        <!-- Region Selector -->
        <section class="mb-6 md:mb-8" aria-labelledby="region-heading">
            <h2 id="region-heading" class="text-xs md:text-sm font-bold text-gray-500 mb-3 md:mb-4 uppercase tracking-wider">Select Region</h2>
            <!-- RWD: Better padding and gap for touch devices -->
            <div id="region-buttons" role="group" aria-label="Regions" class="flex overflow-x-auto gap-3 pb-3 scrollbar-hide snap-x"></div>
        </section>

        <!-- Category Selector -->
        <section class="mb-8 md:mb-10 hidden" id="category-section" aria-labelledby="category-heading">
            <h2 id="category-heading" class="text-xs md:text-sm font-bold text-gray-500 mb-3 md:mb-4 uppercase tracking-wider">Select Category</h2>
            <div id="category-buttons" role="group" aria-label="Categories" class="flex flex-wrap gap-2 md:gap-3"></div>
        </section>

        <!-- Content Area (aria-live="polite" tells AI/ScreenReaders when content changes) -->
        <section aria-live="polite" aria-atomic="true" class="w-full">
            <!-- RWD: grid-cols-1 (Mobile) -> grid-cols-2 (Tablet) -> grid-cols-3 (Desktop) -->
            <div id="content-area" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 md:gap-6 lg:gap-8">
                <div class="col-span-full text-center py-16 text-gray-400">
                    <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 md:h-20 md:w-20 mx-auto mb-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7" />
                    </svg>
                    <p class="text-base md:text-lg">Please select a region and category above to explore Okinawa's food.</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Semantic Footer with Copyright Legalities -->

    </footer>

    <script>
        // Database structured for both UI rendering and GEO/AAO Schema Generation
        const db = {
            "naha": {
                name: "Naha City (Monorail Area)",
                categories: {
                    "soba": [
                        { name: "Danbo Ramen (Naha Makishi)", feature: "Although it's a Kyushu-style ramen, it's extremely popular in Okinawa! With its rich broth and late-night hours, it's the perfect midnight snack after strolling down Kokusai Dori.", address: "2-16-10 Makishi, Naha / 5-min walk from Miebashi Station (Monorail)" },
                        { name: "Shuri Soba", feature: "A famous Okinawa soba spot! Chewy handmade noodles paired with a clear bonito broth and melt-in-your-mouth pork. Highly popular, sells out quickly daily.", address: "1-7 Akatacho, Shuri, Naha / 5-min walk from Shuri Station (Monorail)" }
                    ],
                    "meat": [
                        { name: "Ryukyu no Ushi (Kokusai Dori)", feature: "Premium Okinawa Wagyu beef! Evenly marbled and melts in your mouth. A bit pricey, but absolutely worth the experience.", address: "3-2-3 Makishi, Naha / 5-min walk from Makishi Station (Monorail)" },
                        { name: "Jack's Steak House", feature: "A vintage American-style steakhouse loved by locals. Famous for its great value and classic retro atmosphere.", address: "1-7-3 Nishi, Naha / 8-min walk from Asahibashi Station (Monorail)" }
                    ],
                    "izakaya": [
                        { name: "Mekiki no Ginji (Shintoshin)", feature: "An izakaya famous for its huge wooden barrel exterior! Offers fresh seafood directly from the source and high-value sashimi platters. Reservation highly recommended.", address: "1-9-19 Ameku, Naha / 15-min walk from Omoromachi Station (Monorail) or by taxi" },
                        { name: "Kokusai Dori Yataimura", feature: "A food village gathering over 20 unique street-food-style izakayas. Lively atmosphere, perfect for enjoying Orion draft beer and skewers.", address: "3-11-16 Makishi, Naha / 4-min walk from Makishi Station (Monorail)" }
                    ],
                    "cafe": [
                        { name: "A Happy Pancake (Senagajima)", feature: "Souffle pancakes so fluffy they bring you happiness! Enjoy them alongside gorgeous ocean views and planes taking off at Senagajima.", address: "Inside Senagajima Umikaji Terrace / Direct via Umikaji Liner bus from Akamine Station" },
                        { name: "Pork Tamago Onigiri", feature: "Okinawa's classic soul food. Made to order with thick slices of spam and a fluffy fried egg. Extremely satisfying!", address: "2-8-35 Matsuo, Naha (Makishi Market Main Store) / 10-min walk from Makishi Station" }
                    ]
                }
            },
            "chatan": {
                name: "Chatan / American Village",
                categories: {
                    "meat": [
                        { name: "Jojoen (Urasoe PARCO CITY)", feature: "A top-tier Japanese BBQ chain! This specific branch offers stunning ocean views, allowing you to enjoy premium Wagyu while watching the sea.", address: "3-1-1 Irijima, Urasoe (PARCO CITY 3F) / Take a bus from Naha Bus Terminal to 'PARCO CITY Mae'" },
                        { name: "Blue Ocean Steak", feature: "A stylish steakhouse located in American Village. Specializes in Ryukyu Wagyu and seafood, offering beautiful sunset views.", address: "51-2 Mihama, Chatan / 15-min walk from 'Kuwae' bus stop" }
                    ],
                    "taco": [
                        { name: "Taco Rice Cafe Kijimuna", feature: "Famous for Okinawa's signature 'Taco Rice'! Their specialty 'Omu-Taco' topped with a fluffy omelet and mildly spicy meat sauce is a must-try.", address: "9-1 Mihama, Chatan (Depot Island) / 10-min walk from 'Kuwae' bus stop" },
                        { name: "A&W Burger (Chatan)", feature: "An Okinawa-exclusive American fast food chain! You must try their famous 'Root Beer'—and the best part is, dine-in root beer comes with free refills.", address: "2-5-5 Mihama, Chatan / 10-min walk from 'Kuwae' bus stop" }
                    ],
                    "cafe": [
                        { name: "ZHYVAGO COFFEE WORKS", feature: "A West Coast industrial-style cafe with an ocean view! The coffee quality is excellent. Sipping a latte by the seawall is a must-do in American Village.", address: "9-46 Mihama, Chatan / 12-min walk from 'Kuwae' bus stop" },
                        { name: "Seaside Cafe hanon", feature: "A dreamy, pure-white Greek-style pancake house! Serves exquisite sweet and savory pancakes and boasts the best outdoor terrace in American Village.", address: "9-39 Mihama, Chatan / 12-min walk from 'Kuwae' bus stop" }
                    ]
                }
            },
            "onna": {
                name: "Onna Village / West Coast",
                categories: {
                    "meat": [
                        { name: "Ryukyu no Ushi (Onna Main Store)", feature: "The hardest-to-book premium BBQ on the West Coast! Treating yourself to top-tier Wagyu here after a day of diving is a dream come true for many.", address: "909-2 Maeganeku, Onna / 3-min walk from 'Maeganeku' bus stop" },
                        { name: "Agu no Kakurega", feature: "Specializes in Okinawa's local 'Agu Pork' shabu-shabu and BBQ. The meat is incredibly sweet, rich in fat, and has no gaminess at all.", address: "1-1 Fuchaku, Onna / 2-min walk from 'Fuchaku' bus stop" }
                    ],
                    "cafe": [
                        { name: "Hoshino Resorts Banta Cafe", feature: "One of Japan's largest ocean-view cafes! Built on a cliff, offering breathtaking views from various seating areas including the beach, rocks, and terrace.", address: "560 Gima, Yomitan / No public transport, rental car required" },
                        { name: "Hawaiian Pancakes House Paanilani", feature: "A super popular Hawaiian pancake breakfast spot in Onna! Opens at 7 AM. Their signature 'Nut Sauce Pancake' is incredibly rich and sweet.", address: "698 Seragaki, Onna / 1-min walk from 'Seragaki' bus stop" }
                    ],
                    "soba": [
                        { name: "Bansho-tei", feature: "A beloved local spot in Yomitan. Uses homemade noodles. Highly recommend the Okinawa Soba topped with rich, collagen-filled pork cartilage.", address: "473 Kina, Yomitan / 2-min walk from 'Kina' bus stop" }
                    ]
                }
            },
            "nago": {
                name: "Nago / North / Kouri Island",
                categories: {
                    "soba": [
                        { name: "Kishimoto Shokudo", feature: "A century-old pioneer of Okinawa soba! Uses traditional noodles made with wood ash, giving them a unique aroma. Their handmade mixed rice (Jushi) is also a must.", address: "5 Toguchi, Motobu / 5-min walk from 'Motobu Museum Mae' bus stop" },
                        { name: "Ufuya", feature: "Dine inside a traditional century-old Ryukyu house! Famous for Agu pork soba and set meals. The atmosphere is incredible, complete with a small waterfall nearby.", address: "90 Nakayama, Nago / No public transport, rental car required" }
                    ],
                    "cafe": [
                        { name: "KOURI SHRIMP", feature: "A must-eat on Kouri Island! Hawaiian-style garlic butter shrimp. The amazing aroma, combined with beautiful ocean views and a cold beer, is absolute perfection.", address: "Kouri Island / No public transport, rental car required" },
                        { name: "Pizza in the Sky (Kajinho)", feature: "A scenic pizza place located on a hillside. Enjoy rich, cheesy pizza on the porch of a traditional wooden house overlooking an endless ocean.", address: "1153-2 Yamazato, Motobu / Located on a hillside, rental car required" }
                    ]
                }
            }
        };

        const categoriesMap = {
            "soba": { name: "🍜 Okinawa Soba & Ramen", color: "bg-amber-100 text-amber-800 hover:bg-amber-600 hover:text-white border-amber-400 focus:ring-amber-500" },
            "meat": { name: "🥩 Premium Wagyu & Agu Pork", color: "bg-rose-100 text-rose-800 hover:bg-rose-600 hover:text-white border-rose-400 focus:ring-rose-500" },
            "taco": { name: "🌮 Taco Rice & Fast Food", color: "bg-green-100 text-green-800 hover:bg-green-600 hover:text-white border-green-400 focus:ring-green-500" },
            "izakaya": { name: "🍻 Izakaya & Seafood", color: "bg-indigo-100 text-indigo-800 hover:bg-indigo-600 hover:text-white border-indigo-400 focus:ring-indigo-500" },
            "cafe": { name: "☕ Ocean View Cafes & Desserts", color: "bg-sky-100 text-sky-800 hover:bg-sky-600 hover:text-white border-sky-400 focus:ring-sky-500" }
        };

        let currentRegion = "";
        let currentCategory = "";

        const regionContainer = document.getElementById('region-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const categorySection = document.getElementById('category-section');
        const contentArea = document.getElementById('content-area');

        // ==========================================
        // GEO & AEO: Generate JSON-LD Dynamically 
        // Makes the JS DB fully readable for AI Bots & Search Engines
        // ==========================================
        function generateStructuredData() {
            const schemaData = {
                "@context": "https://schema.org",
                "@type": "ItemList",
                "itemListElement": []
            };

            let position = 1;
            Object.keys(db).forEach(regionKey => {
                Object.keys(db[regionKey].categories).forEach(catKey => {
                    db[regionKey].categories[catKey].forEach(item => {
                        schemaData.itemListElement.push({
                            "@type": "ListItem",
                            "position": position++,
                            "item": {
                                "@type": "Restaurant",
                                "name": item.name,
                                "description": item.feature,
                                "address": {
                                    "@type": "PostalAddress",
                                    "streetAddress": item.address,
                                    "addressLocality": db[regionKey].name,
                                    "addressRegion": "Okinawa",
                                    "addressCountry": "JP"
                                }
                            }
                        });
                    });
                });
            });

            const script = document.createElement('script');
            script.type = 'application/ld+json';
            script.text = JSON.stringify(schemaData);
            document.head.appendChild(script);
        }

        // Initialize UI
        function initRegions() {
            Object.keys(db).forEach(key => {
                const btn = document.createElement('button');
                // Added extensive data-attributes and aria-labels for AAO (AI Agents)
                btn.className = "whitespace-nowrap px-4 py-2.5 md:py-2 md:px-5 rounded-full border border-gray-300 bg-white text-gray-700 font-medium hover:bg-sky-600 hover:text-white hover:border-sky-600 transition-colors shadow-sm snap-start focus:outline-none focus:ring-2 focus:ring-sky-500 text-sm md:text-base";
                btn.innerText = db[key].name;
                btn.setAttribute("data-region-id", key);
                btn.setAttribute("aria-pressed", "false");
                btn.onclick = () => selectRegion(key, btn);
                regionContainer.appendChild(btn);
            });
        }

        function initCategories() {
            Object.keys(categoriesMap).forEach(key => {
                const config = categoriesMap[key];
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-4 py-2.5 md:py-2 md:px-5 rounded-full border transition-all font-medium text-sm md:text-base focus:outline-none focus:ring-2 focus:ring-offset-1 ${config.color}`;
                btn.innerText = config.name;
                btn.setAttribute("data-category-id", key);
                btn.setAttribute("aria-pressed", "false");
                btn.onclick = () => selectCategory(key, btn);
                categoryContainer.appendChild(btn);
            });
        }

        function selectRegion(regionKey, clickedBtn) {
            currentRegion = regionKey;
            
            Array.from(regionContainer.children).forEach(btn => {
                btn.classList.remove('bg-sky-600', 'text-white', 'border-sky-600');
                btn.classList.add('bg-white', 'text-gray-700');
                btn.setAttribute("aria-pressed", "false");
            });
            clickedBtn.classList.remove('bg-white', 'text-gray-700', 'hover:bg-sky-600');
            clickedBtn.classList.add('bg-sky-600', 'text-white', 'border-sky-600');
            clickedBtn.setAttribute("aria-pressed", "true");

            categorySection.classList.remove('hidden');
            categorySection.classList.add('fade-in');
            
            if(!currentCategory) {
                const firstCatBtn = categoryContainer.children[0];
                selectCategory('soba', firstCatBtn);
            } else {
                renderContent();
            }
        }

        function selectCategory(catKey, clickedBtn) {
            currentCategory = catKey;

            Array.from(categoryContainer.children).forEach(btn => {
                btn.classList.remove('ring-2', 'ring-offset-2', 'shadow-md', 'scale-105');
                btn.style.opacity = "0.6";
                btn.setAttribute("aria-pressed", "false");
            });
            clickedBtn.classList.add('ring-2', 'ring-offset-2', 'shadow-md', 'scale-105');
            clickedBtn.style.opacity = "1";
            clickedBtn.setAttribute("aria-pressed", "true");

            renderContent();
        }

        function renderContent() {
            contentArea.innerHTML = '';
            const items = db[currentRegion].categories[currentCategory];

            if(!items || items.length === 0) {
                contentArea.innerHTML = `
                    <div class="col-span-full text-center py-16 text-gray-400 fade-in">
                        <p class="text-base md:text-lg">No recommendations for this category in this region yet. Please explore other food!</p>
                    </div>`;
                return;
            }

            items.forEach((item, index) => {
                const encodedQuery = encodeURIComponent(`${item.name} Okinawa`);
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;

                // Changed structure to <article> for better Document Outline (SEO)
                const card = document.createElement('article');
                card.className = "bg-white rounded-2xl shadow-sm border border-sky-100 overflow-hidden flex flex-col fade-in hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1";
                card.style.animationDelay = `${index * 0.08}s`;

                card.innerHTML = `
                    <div class="p-5 md:p-6 flex-grow">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-lg md:text-xl font-bold text-gray-800 leading-tight">${item.name}</h3>
                        </div>
                        <p class="text-gray-600 text-sm md:text-base mb-5 leading-relaxed tracking-wide">
                            <span class="inline-block font-bold text-sky-800 bg-sky-100 px-2 py-0.5 rounded text-xs md:text-sm mr-2 mb-1 border border-sky-200">Must Try</span>
                            ${item.feature}
                        </p>
                        
                        <div class="bg-slate-50 p-4 rounded-xl flex items-start gap-3 border border-slate-100 mt-auto">
                            <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 md:h-6 md:w-6 text-sky-600 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <p class="text-xs md:text-sm text-gray-700 leading-tight font-medium"><span class="font-bold text-sky-900 block mb-1">Address & Transport:</span>${item.address}</p>
                        </div>
                    </div>
                    
                    <div class="px-5 pb-5 md:px-6 md:pb-6 mt-auto pt-2">
                        <a href="${mapsUrl}" target="_blank" rel="noopener noreferrer" aria-label="Open Google Maps for ${item.name}" class="w-full flex items-center justify-center gap-2 btn-nav text-white py-3 md:py-3.5 rounded-xl font-bold transition-all shadow-sm hover:shadow-lg focus:outline-none focus:ring-4 focus:ring-sky-300">
                            <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z" clip-rule="evenodd" />
                            </svg>
                            Open Google Maps
                        </a>
                    </div>
                `;
                contentArea.appendChild(card);
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            generateStructuredData(); // Run GEO/AEO script injection immediately
            initRegions();
            initCategories();
        });
    </script>
</body>
</html>
