<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seoul Trip Guide</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX compilation (CDN) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Hide horizontal scrollbar but keep scroll functionality */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- SVG Icons ---
        const MapPin = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const Ticket = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>;
        const Waves = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 6c.6.5 1.2 1 2.5 1C7 7 7 5 9.5 5c2.6 0 2.6 2 5 2 2.3 0 2.3-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 12c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.6 2 5 2 2.3 0 2.3-2 5-2 1.3 0 1.9.5 2.5 1"/><path d="M2 18c.6.5 1.2 1 2.5 1 2.5 0 2.5-2 5-2 2.6 0 2.6 2 5 2 2.3 0 2.3-2 5-2 1.3 0 1.9.5 2.5 1"/></svg>;
        const Sun = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const Sparkles = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
        const TrainFront = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3.1V7a4 4 0 0 0 8 0V3.1"/><path d="M9 15h6"/><path d="M14 19.5l3-3-3-3"/><path d="M10 19.5l-3-3 3-3"/><path d="M4 22v-3.5"/><path d="M20 22v-3.5"/><rect width="16" height="16" x="4" y="3" rx="2"/></svg>;
        const ExternalLink = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>;
        const Info = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const Home = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;

        // Categories
        const CATEGORIES = [
            { id: 'Tickets', icon: Ticket },
            { id: 'Spa & Sauna', icon: Waves },
            { id: 'Day Tours', icon: Sun },
            { id: 'Experiences', icon: Sparkles },
            { id: 'Transport & Wi-Fi', icon: TrainFront }
        ];

        // Regions
        const REGIONS = ['Seoul', 'Seoul Suburbs', 'Winter Ski Resorts'];

        // Available categories based on region
        const getAvailableCategoryIds = (region) => {
            if (region === 'Winter Ski Resorts') return ['Day Tours', 'Transport & Wi-Fi'];
            if (region === 'Seoul Suburbs') return ['Tickets', 'Day Tours', 'Transport & Wi-Fi'];
            return ['Tickets', 'Spa & Sauna', 'Day Tours', 'Experiences', 'Transport & Wi-Fi'];
        };

        // Itinerary Database
        const itineraryData = {
            'Seoul': {
                'Tickets': [
                    {
                        title: 'Lotte World Ticket Seoul',
                        description: 'One of the world\'s largest indoor theme parks, combining the indoor "Adventure" and outdoor "Magic Island". Enjoy thrilling rides and parades regardless of the weather.',
                        link: 'https://www.klook.com/en-US/activity/251-lotte-world-seoul/?aid=115640'
                    },
                    {
                        title: 'N Seoul Tower Ticket',
                        description: 'Seoul\'s iconic landmark. Take the high-speed elevator to the observatory for a stunning 360-degree panoramic view and romantic nightscapes of the city.',
                        link: 'https://affiliate.klook.com/redirect?aid=115640&aff_adid=1236616&k_site=https%3A%2F%2Fwww.klook.com%2Fen-US%2Factivity%2F412-n-seoul-tower-seoul%2F'
                    },
                    {
                        title: 'Discover Seoul Pass',
                        description: 'An exclusive tourist pass for foreigners. Offers free admission to over 50 top attractions (like Gyeongbokgung Palace) and doubles as a T-money transit card.',
                        link: 'https://www.klook.com/en-US/activity/2852-discover-seoul-pass-seoul/?aid=115640'
                    },
                    {
                        title: 'Lotte World Aquarium Ticket',
                        description: 'Located in Lotte World Tower, featuring Korea\'s largest underwater tunnel with 650 marine species across 13 unique ecological theme zones.',
                        link: 'https://www.klook.com/en-US/activity/33305-lotte-world-aquarium-ticket/?aid=115640'
                    },
                    {
                        title: 'Klook Pass Seoul',
                        description: 'Access multiple top Seoul attractions with one pass. Choose 2 to 6 activities with great discounts. Perfect for flexible itinerary planning.',
                        link: 'https://www.klook.com/en-US/activity/74595-seoul-pass/?aid=115640'
                    }
                ],
                'Spa & Sauna': [
                    {
                        title: 'Dongdaemun GoodMorning City SPAREX Sauna Ticket',
                        description: 'Experience an authentic Korean Jjimjilbang! Located in Dongdaemun, it\'s the perfect place to relax after shopping, featuring various saunas and traditional sikhye (sweet rice beverage).',
                        link: 'https://www.klook.com/en-US/activity/133675-seoul-dongdaemun-sparex-jjimjilbang-sauna-admission-ticket/?aid=115640'
                    },
                    {
                        title: 'AQUAFIELD Ticket (Hanam/Goyang/Anseong)',
                        description: 'Premium modern Jjimjilbang and leisure facilities. Features highly aesthetic designs and various themed resting areas, making it a popular spot for relaxation and photos.',
                        link: 'https://www.klook.com/en-US/activity/110249-aquafield-hanam-goyang-anseong-ticket/?spm=SearchResult.SearchResult_LIST&clickId=6608ec750f&aid=115640'
                    },
                    {
                        title: 'THE FORET SPA Massage Experience in Seongsu',
                        description: 'A premium spa hidden in trendy Seongsu-dong. Enjoy professional massages and skincare treatments in a relaxing, nature-inspired environment.',
                        link: 'https://www.klook.com/en-US/activity/102937-seoul-spa/?spm=SearchResult.SearchResult_LIST&clickId=b3249eaf1c&aid=115640'
                    }
                ],
                'Day Tours': [
                    {
                        title: 'Hanbok Rental at Gyeongbokgung (by Hanboknam)',
                        description: 'A must-do cultural experience in Seoul! Choose from hundreds of traditional and gorgeous Hanboks. Includes free entry to Gyeongbokgung Palace for amazing photos.',
                        link: 'https://www.klook.com/en-US/activity/7955-hanbok-rental-gyeongbokgung-seoul/?aid=115640'
                    },
                    {
                        title: 'Eland Han River Cruise Ticket',
                        description: 'Sail along the Han River and enjoy iconic landmarks like Yeouido and Banpo Bridge Rainbow Fountain. Night cruises feature romantic views and live music.',
                        link: 'https://www.klook.com/en-US/activity/1360-eland-han-river-cruise-seoul/?aid=115640'
                    },
                    {
                        title: 'Seoraksan National Park Day Tour',
                        description: 'A favorite for nature lovers! Visit one of Korea\'s most beautiful mountains and take a cable car to Gwongeumseong Fortress for spectacular panoramic views.',
                        link: 'https://www.klook.com/en-US/activity/868-seoraksan-national-park-day-trip-seoul/?aid=115640'
                    },
                    {
                        title: 'Seoul City Sightseeing Bus (Open-Top / Night Route)',
                        description: 'Great transport choice for first-timers. Hop-on hop-off bus connecting Gwanghwamun, Myeongdong, and N Seoul Tower. The night route offers dazzling city lights.',
                        link: 'https://www.klook.com/en-US/activity/261-seoul-city-sightseeing-bus-seoul/?aid=115640'
                    }
                ],
                'Experiences': [
                    {
                        title: 'Running Man Thematic Experience Center',
                        description: 'Become the main character of the popular Korean TV show! Solve puzzles and collect R coins in various immersive and dynamic zones.',
                        link: 'https://www.klook.com/en-US/activity/6488-running-man-thematic-experience-center-ticket-seoul/?spm=SearchResult.SearchResult_LIST&clickId=342761066f&aid=115640'
                    },
                    {
                        title: 'Wild Wild <After Party> Show in Seoul',
                        description: 'A visual feast designed exclusively for women! An interactive, immersive performance combining strength, modern dance, and dynamic music.',
                        link: 'https://www.klook.com/en-US/activity/78871-show-wildwilddream-seoul/?spm=SearchResult.SearchResult_LIST&clickId=3831620997&aid=115640'
                    }
                ],
                'Transport & Wi-Fi': [
                    {
                        title: 'AREX Incheon Airport Express Train Ticket',
                        description: 'The fastest way from Incheon Airport to Seoul Station. Takes only 43 minutes with reserved seating and free Wi-Fi. Essential for independent travelers.',
                        link: 'https://affiliate.klook.com/redirect?aid=115640&aff_adid=1236615&k_site=https%3A%2F%2Fwww.klook.com%2Fen-US%2Factivity%2F1163-airport-to-seoul-city-center-arex-train-incheon%2F'
                    },
                    {
                        title: 'South Korea 4G / 5G eSIM',
                        description: 'Scan the QR code to connect instantly without the hassle of swapping physical SIM cards. Nationwide coverage across South Korea.',
                        link: 'https://www.klook.com/en-US/activity/109354-south-korea-esim-high-speed-internet-qr-code-voucher/?spm=SearchResult.SearchResult_LIST&clickId=107415ab54&aid=115640'
                    },
                    {
                        title: 'South Korea Unlimited 4G Prepaid SIM Card',
                        description: 'Enjoy nationwide 4G coverage wherever you go. Pick up conveniently at major Korean airports upon arrival.',
                        link: 'https://www.klook.com/en-US/activity/16469-kt-olleh-4g-sim-south-korea/?spm=SearchResult.SearchResult_LIST&clickId=4c5dc27056&aid=115640'
                    },
                    {
                        title: 'Incheon Airport (ICN) to Seoul Private Transfer',
                        description: 'Exclusive driver waiting with a sign, offering a point-to-point direct transfer to your hotel. Great for large luggage or traveling with elders.',
                        link: 'https://www.klook.com/en-US/airport-transfers/?aid=115640'
                    }
                ]
            },
            'Seoul Suburbs': {
                'Tickets': [
                    {
                        title: 'Everland Resort Ticket',
                        description: 'Korea\'s largest theme park featuring the popular T Express wooden roller coaster, Safari World to see animals up close, and beautiful seasonal gardens.',
                        link: 'https://www.klook.com/en-US/activity/252-everland-gyeonggi-do/?aid=115640'
                    },
                    {
                        title: 'LEGOLAND Korea Resort Ticket',
                        description: 'Asia\'s largest LEGOLAND built on an island in Chuncheon. Features 7 theme zones and over 40 rides, perfect for a fun family day out.',
                        link: 'https://www.klook.com/en-US/activity/70318-lego-land-korea-resort-pass/?aid=115640'
                    }
                ],
                'Day Tours': [
                    {
                        title: 'Nami Island / Petite France / Garden of Morning Calm Tour',
                        description: 'The most classic route! Visit the iconic "Winter Sonata" filming location Nami Island, the European-style Petite France, and the stunning Garden of Morning Calm.',
                        link: 'https://affiliate.klook.com/redirect?aid=115640&aff_adid=1236617&k_site=https%3A%2F%2Fwww.klook.com%2Fen-US%2Factivity%2F74501-strawberry-picking-eobi-ice-valley-bus-tour-gangwondo%2F'
                    },
                    {
                        title: 'DMZ Half / Full Day Tour',
                        description: 'Dive deep into Korean history. Visit Imjingak, the 3rd Infiltration Tunnel, and Dora Observatory to get a close look at the North Korean territory.',
                        link: 'https://www.klook.com/en-US/activity/216-dmz-tour-gyeonggi-do/?spm=SearchResult.SearchResult_LIST&clickId=f5e59fe9c1&aid=115640'
                    },
                    {
                        title: 'Alpaca World / Nami Island / Garden of Morning Calm Day Tour',
                        description: 'Perfect for families and couples! Interact with adorable alpacas, paired with a relaxing stroll through Nami Island or a ride on the Samaksan Cable Car.',
                        link: 'https://www.klook.com/en-US/activity/10245-alpaca-pasture-nami-island-garden-of-morning-calm-day-tour-seoul/?spm=SearchResult.SearchResult_LIST&clickId=b48a5d1810&aid=115640'
                    },
                    {
                        title: 'Seoraksan National Park Day Tour',
                        description: 'Visit one of Korea\'s most beautiful mountains and take a cable car to Gwongeumseong Fortress. An absolute top destination for autumn foliage.',
                        link: 'https://www.klook.com/en-US/activity/75845-naejang-mountain-jeonju-hanok-village/?spm=SearchResult.SearchResult_LIST&clickId=d67309db66&aid=115640'
                    }
                ],
                'Transport & Wi-Fi': [
                    {
                        title: 'Seoul Private Car Charter',
                        description: 'The most flexible way to travel. Customize your own route in the city or suburbs (e.g., Nami Island, Suwon Hwaseong) with a private vehicle and driver.',
                        link: 'https://www.klook.com/en-US/activity/14657-seoul-gangwon-do-private-car-charter/?spm=SearchResult.SearchResult_LIST&clickId=34e71e7da4&aid=115640'
                    }
                ]
            },
            'Winter Ski Resorts': {
                'Day Tours': [
                    {
                        title: 'Elysian Gangchon Ski Resort Day Tour',
                        description: 'The closest ski resort to Seoul, accessible by subway. Beginner-friendly slopes with equipment rental and lessons included.',
                        link: 'https://www.klook.com/en-US/activity/67592-elysian-ski-resort-one-day-tour/?spm=SearchResult.SearchResult_LIST&clickId=f87d9b7afc2&aid=115640'
                    },
                    {
                        title: 'Jisan Forest Ski Resort Half / Full Day Tour',
                        description: 'Located in Icheon, about 1.5 hours away. Features flexible scheduling and a sun plaza, perfect for those who prefer less travel time.',
                        link: 'https://www.klook.com/en-US/activity/129599-jisan-ski-resort-one-day-tour/?spm=SearchResult.SearchResult_LIST&clickId=038c907c57&aid=115640'
                    },
                    {
                        title: 'Yongpyong Ski Resort Ski / Snowboard Lessons',
                        description: 'Korea\'s largest and oldest ski resort, a Winter Olympics venue, and filming location for many K-dramas with diverse slopes.',
                        link: 'https://www.klook.com/en-US/activity/100212-ski-lesson/?spm=SearchResult.SearchResult_LIST&clickId=f3a7460249&aid=115640'
                    },
                    {
                        title: 'Alpensia Ski Resort Ski and Snowboard Lessons',
                        description: 'A premium resort with an Alpine vibe, excellent snow quality, and modern facilities. Professional lessons available for all skill levels.',
                        link: 'https://www.klook.com/en-US/activity/99884-ski-lesson/?spm=SearchResult.SearchResult_LIST&clickId=e5e540a187&aid=115640'
                    }
                ],
                'Transport & Wi-Fi': [
                    {
                        title: 'Vivaldi Park / Oak Valley / Elysian Gangchon Private Transfer',
                        description: 'Exclusive direct private transfer from Seoul to major ski resorts. Skip the hassle of carrying heavy gear on public transit.',
                        link: 'https://www.klook.com/en-US/activity/6207-vivaldi-oak-valley-elysian-private-charter-seoul/?spm=SearchResult.SearchResult_LIST&clickId=fdd1c33c0b&aid=115640'
                    }
                ]
            }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('Seoul');
            const [selectedCategory, setSelectedCategory] = useState('Day Tours');

            const currentData = itineraryData[selectedRegion]?.[selectedCategory] || [];

            return (
                <div className="min-h-screen bg-[#fff1f2] font-sans text-slate-800 pb-12">
                    {/* Header Navigation */}
                    <header className="bg-white shadow-sm sticky top-0 z-10">
                        <div className="max-w-5xl mx-auto px-4 py-4 md:py-6">
                            <div className="flex items-center gap-2 mb-4">
                                <MapPin className="text-rose-600 w-6 h-6 md:w-8 md:h-8" />
                                <h1 className="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-rose-600 to-pink-500">
                                Seoul Trip Explorer Guide
                                </h1>
                            </div>
                            
                            {/* Region Selection */}
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                <a
                                    href="https://linkuei0425.github.io/Seoul-US/index.html"
                                    className="flex items-center gap-1.5 whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-200 bg-rose-50 text-rose-700 hover:bg-rose-100 border border-rose-200"
                                >
                                    <Home className="w-4 h-4" />
                                    Back to Home
                                </a>

                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => {
                                            setSelectedRegion(region);
                                            const allowed = getAvailableCategoryIds(region);
                                            if (!allowed.includes(selectedCategory)) {
                                                setSelectedCategory(allowed[0]);
                                            }
                                        }}
                                        className={`whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-200 ${
                                            selectedRegion === region
                                            ? 'bg-rose-600 text-white shadow-md'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-6">
                        {/* Category Tags */}
                        <div className="flex flex-wrap gap-2 md:gap-3 mb-8">
                            {CATEGORIES.filter(cat => getAvailableCategoryIds(selectedRegion).includes(cat.id)).map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 px-4 py-2 rounded-lg border text-sm font-medium transition-all ${
                                        selectedCategory === id
                                        ? 'border-rose-500 bg-rose-50 text-rose-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4" />
                                    {id}
                                </button>
                            ))}
                        </div>

                        {/* Content Title */}
                        <div className="mb-6">
                            <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                {selectedRegion} - {selectedCategory} Top Picks
                            </h2>
                        </div>

                        {/* Cards List */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6">
                                {currentData.map((item, index) => (
                                    <div 
                                        key={index} 
                                        className="bg-white rounded-xl shadow-sm border border-slate-100 p-5 md:p-6 flex flex-col justify-between hover:shadow-md transition-shadow"
                                    >
                                        <div>
                                            <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-3 leading-tight">
                                                {item.title}
                                            </h3>
                                            <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-4 border-t border-slate-50 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-rose-600 hover:bg-rose-700 text-white font-medium py-2.5 px-5 rounded-lg transition-colors w-full sm:w-auto"
                                            >
                                                <Info className="w-4 h-4" />
                                                <span>Details & Booking</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-70" />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl border border-dashed border-slate-300 p-12 text-center flex flex-col items-center justify-center">
                                <h3 className="text-lg font-medium text-slate-700 mb-2">
                                    No items available in this category for the selected region.
                                </h3>
                                <p className="text-slate-500">Please try selecting a different category or region.</p>
                            </div>
                        )}

                        {/* Klook Global Explore Button */}
                        <div className="mt-10 flex justify-center">
                            <a 
                                href="https://www.klook.com/en-US/search/result/?query=Seoul&aid=115640" 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-bold py-3.5 px-8 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1"
                            >
                                <span className="tracking-wide">Explore More Seoul Trips on Klook</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
