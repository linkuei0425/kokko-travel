                            </nav>
                        </div>
                    </header>

                    <main className="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-10 w-full">
                        <nav aria-label="Category Navigation" className="flex flex-wrap gap-2.5 sm:gap-3 mb-8 sm:mb-10">
                            {CATEGORIES.filter(cat => getAvailableCategoryIds(selectedRegion).includes(cat.id)).map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-2 px-4 sm:px-5 py-2.5 sm:py-3 rounded-xl border text-sm sm:text-base font-semibold transition-all duration-200 min-h-[44px] ${
                                        selectedCategory === id
                                        ? 'border-rose-500 bg-rose-50 text-rose-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                    aria-pressed={selectedCategory === id}
                                >
                                    <Icon className="w-4 h-4 sm:w-5 sm:h-5" />
                                    {id}
                                </button>
                            ))}
                        </nav>

                        <section aria-labelledby="section-title">
                            <div className="mb-6 sm:mb-8 flex items-center gap-3">
                                <h2 id="section-title" className="text-2xl sm:text-3xl font-bold text-slate-800 tracking-tight">
                                    Top Picks for {selectedCategory} in {selectedRegion}
                                </h2>
                            </div>

                            {currentData.length > 0 ? (
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 sm:gap-6 lg:gap-8">
                                    {currentData.map((item, index) => (
                                        <article 
                                            key={index} 
                                            itemScope 
                                            itemType="https://schema.org/TouristAttraction"
                                            className="bg-white rounded-2xl shadow-sm border border-slate-100 p-5 sm:p-6 lg:p-7 flex flex-col justify-between hover:shadow-xl hover:-translate-y-1 transition-all duration-300 group"
                                        >
                                            <div>
                                                <h3 itemProp="name" className="text-xl sm:text-2xl font-bold text-slate-800 mb-3 sm:mb-4 leading-tight group-hover:text-rose-600 transition-colors">
                                                    {item.title}
                                                </h3>
                                                <p itemProp="description" className="text-slate-600 text-sm sm:text-base mb-6 leading-relaxed">
                                                    {item.description}
                                                </p>
                                            </div>
                                            
                                            <div className="mt-auto pt-5 border-t border-slate-100 flex justify-end">
                                                <a
                                                    href={item.link}
                                                    target="_blank"
                                                    rel="noopener noreferrer"
                                                    itemProp="url"
                                                    className="inline-flex items-center justify-center gap-2 bg-rose-600 hover:bg-rose-700 active:bg-rose-800 text-white font-semibold py-3 px-6 rounded-xl transition-colors duration-200 w-full sm:w-auto min-h-[44px]"
                                                    aria-label={`View details and book ${item.title}`}
                                                >
                                                    <Info className="w-5 h-5" />
                                                    <span>View Details</span>
                                                    <ExternalLink className="w-4 h-4 ml-1 opacity-70" />
                                                </a>
                                            </div>
                                        </article>
                                    ))}
                                </div>
                            ) : (
                                <div className="bg-white rounded-2xl border-2 border-dashed border-slate-300 p-12 sm:p-16 text-center flex flex-col items-center justify-center">
                                    <h3 className="text-lg sm:text-xl font-semibold text-slate-700 mb-3">
                                        No curated items available in this category.
                                    </h3>
                                    <p className="text-slate-500 text-sm sm:text-base">Please try exploring a different category or region above to discover more.</p>
                                </div>
                            )}
                        </section>

                        <div className="mt-12 sm:mt-16 flex justify-center">
                            <a 
                                href="https://www.klook.com/en-US/search/result/?query=Seoul&aid=115640" 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white font-bold py-4 px-8 sm:px-10 rounded-full shadow-lg hover:shadow-orange-500/30 transition-all duration-300 transform hover:-translate-y-1 min-h-[56px] text-base sm:text-lg w-full sm:w-auto"
                            >
                                <span className="tracking-wide">Explore More Seoul Activities</span>
                                <ExternalLink className="w-5 h-5 sm:w-6 sm:h-6 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>

                    <footer className="bg-white border-t border-slate-200 mt-auto">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-10 text-center">
                            <p className="text-sm sm:text-base text-slate-600 font-medium mb-3">
                                Copyright © 2026 Kokko Travel / Im+ Life. All Rights Reserved.
                            </p>
                            <p className="text-xs sm:text-sm text-slate-500 leading-relaxed max-w-2xl mx-auto">
                                版權所有，未經授權禁止轉載、翻印或任何商業用途。<br className="hidden sm:block" />
                                本站包含之圖片、文字內容及程式碼均受法律保護。
                            </p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
