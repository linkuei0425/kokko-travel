<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chiang Mai Shopping Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Custom scrollbar hiding (for category buttons) */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .tab-btn.active {
            background-color: #0d9488; /* Teal-600 */
            color: white;
            box-shadow: 0 4px 6px -1px rgba(13, 148, 136, 0.3);
            border-color: #0d9488;
        }
        .tab-btn {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <!-- Top Navigation -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex-shrink-0 flex items-center">
                    <span class="font-bold text-xl text-teal-600 tracking-wider"><i class="fa-solid fa-bag-shopping mr-2"></i>CNX SHOPPING</span>
                </div>
                <div>
                    <!-- Back to Home Link -->
                    <a href="https://linkuei0425.github.io/ChiangMai-US/" class="inline-flex items-center justify-center px-4 py-2 border border-transparent rounded-full shadow-sm text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-colors">
                        <i class="fa-solid fa-house mr-2"></i> Back to Home
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Banner -->
    <header class="bg-gradient-to-r from-emerald-500 via-teal-500 to-cyan-500 py-12 lg:py-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold text-white mb-4 shadow-sm">Chiang Mai Shopping Guide</h1>
            <p class="text-lg md:text-xl text-white opacity-90 max-w-2xl mx-auto">Explore our top 50 handpicked stores, from artisan crafts and local pharmacies to herbal fragrances. Shop your way through Chiang Mai!</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Category Buttons (Horizontally scrollable) -->
        <div class="flex overflow-x-auto hide-scrollbar space-x-3 pb-4 mb-6 md:justify-center">
            <button onclick="filterCategory('streetwear', this)" class="tab-btn active whitespace-nowrap px-6 py-3 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm hover:bg-teal-50 focus:outline-none flex items-center">
                <span class="mr-2 text-lg">👕</span> Artisan & Crafts
            </button>
            <button onclick="filterCategory('pharmacy', this)" class="tab-btn whitespace-nowrap px-6 py-3 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm hover:bg-teal-50 focus:outline-none flex items-center">
                <span class="mr-2 text-lg">💊</span> Pharmacies
            </button>
            <button onclick="filterCategory('beauty', this)" class="tab-btn whitespace-nowrap px-6 py-3 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm hover:bg-teal-50 focus:outline-none flex items-center">
                <span class="mr-2 text-lg">💄</span> Beauty & Cosmetics
            </button>
            <button onclick="filterCategory('fragrance', this)" class="tab-btn whitespace-nowrap px-6 py-3 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm hover:bg-teal-50 focus:outline-none flex items-center">
                <span class="mr-2 text-lg">🌿</span> Fragrance & Spa
            </button>
            <button onclick="filterCategory('pet', this)" class="tab-btn whitespace-nowrap px-6 py-3 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm hover:bg-teal-50 focus:outline-none flex items-center">
                <span class="mr-2 text-lg">🐾</span> Pet Supplies
            </button>
        </div>

        <!-- Content Area -->
        <div id="shop-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards will be dynamically generated by JS -->
        </div>

    </main>

    <footer class="bg-gray-800 text-white py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-sm text-gray-400">© 2026 Chiang Mai Shopping Guide. Curating the best shopping experiences for your trip.</p>
        </div>
    </footer>

    <script>
        // Shop Database - English Version
        const shopData = [
            // --- Artisan & Crafts ---
            { cat: 'streetwear', name: 'Playworks', feature: 'The most popular original illustration brand in Chiang Mai. Canvas bags and postcards full of local indie vibes.', loc: 'Think Park / Nimman', transit: 'Opposite MAYA Mall, 1 min walk' },
            { cat: 'streetwear', name: 'Ginger & The House Shop', feature: 'Colorful bohemian style clothing and gorgeous home decor.', loc: 'Moonmuang Rd', transit: 'East Old City, 5 mins walk from Tha Phae Gate' },
            { cat: 'streetwear', name: 'Cotton Farm', feature: 'High-quality handmade Northern Thai cotton, linen clothing, and traditional textiles.', loc: 'Ratchadamnoen Rd', transit: 'Old City, 5 mins walk from Wat Chedi Luang' },
            { cat: 'streetwear', name: 'Studio Naenna', feature: 'Premium textiles promoting eco-friendly dyes and indigo dyeing craftsmanship.', loc: 'Nimman Soi 1', transit: 'Nimman Soi 1, walking distance' },
            { cat: 'streetwear', name: 'Nussara', feature: 'Quality apparel perfectly blending traditional Northern weaving with modern fashion.', loc: 'Tha Phae Rd', transit: 'Outside Tha Phae Gate, 3 mins walk' },
            { cat: 'streetwear', name: 'Sop Moei Arts', feature: 'Non-profit organization supporting hill tribe crafts and exquisite handmade bags.', loc: 'Charoen Rat Rd', transit: 'Riverside area, Grab recommended' },
            { cat: 'streetwear', name: 'Think Park Market', feature: 'Gathering of local young designers offering apparel and handmade goods.', loc: 'Think Park Plaza', transit: 'Nimman Intersection, opposite MAYA' },
            { cat: 'streetwear', name: 'Baan Kang Wat', feature: 'An artisan village full of handmade warmth, offering various crafts and clothes.', loc: 'Soi Wat Umong', transit: 'Near CMU back mountain, Grab recommended' },
            { cat: 'streetwear', name: 'Chuen Jai', feature: 'Fresh, natural, Japanese-style indie clothing and woven straw bags.', loc: 'Nimman Soi 13', transit: 'Nimman alleys' },
            { cat: 'streetwear', name: 'MAYA Street Fashion (2F)', feature: 'A collection of Thai local trending fashion, streetwear accessories, and shoes.', loc: 'MAYA Lifestyle Shopping Center', transit: 'Core of Nimman area' },

            // --- Pharmacies ---
            { cat: 'pharmacy', name: 'Dara Pharmacy', feature: 'The largest local pharmacy in Chiang Mai with the most complete selection and fair prices.', loc: 'Kaew Nawarat Rd', transit: 'Near Dara Academy, Grab recommended' },
            { cat: 'pharmacy', name: 'Win Cosmetics (Pharmacy Sec.)', feature: 'Besides cosmetics, the 2nd floor offers highly competitive prices on Thai household medicines.', loc: 'Warorot Market', transit: '10 mins walk from Tha Phae Gate' },
            { cat: 'pharmacy', name: 'Punya Pharmacy', feature: 'A trusted chain pharmacy among students and locals in the CMU area.', loc: 'Suthep Rd', transit: 'CMU back gate, Songthaew recommended' },
            { cat: 'pharmacy', name: 'Fascino', feature: 'Thailand\'s largest professional chain pharmacy with certified pharmacists on duty.', loc: 'Multiple branches', transit: 'Check nearest location' },
            { cat: 'pharmacy', name: 'Boots (MAYA Branch)', feature: 'UK chain, exclusively selling the Thai Sabai-Arom herbal series.', loc: 'MAYA Lifestyle Shopping Center', transit: 'Core of Nimman area' },
            { cat: 'pharmacy', name: 'Watsons', feature: 'Frequent promotions on local Thai supplements, vitamins, and mosquito repellents.', loc: 'Central Festival Chiangmai', transit: 'Inside mall, Grab recommended' },
            { cat: 'pharmacy', name: 'Chiang Mai Herbs Trading', feature: 'Specializes in traditional Northern Thai herbs, dried spices, and massage herbal balls.', loc: 'Warorot Market', transit: 'Inside Warorot Market' },
            { cat: 'pharmacy', name: 'Big C Extra Pharmacy', feature: 'Great to pick up Ya Dom (inhalers) and green balms while grocery shopping.', loc: 'Superhighway Rd', transit: 'Grab recommended' },
            { cat: 'pharmacy', name: 'Health Up', feature: 'Modern pharmacy offering high-quality Thai medicines and international supplements.', loc: 'Central Plaza Airport', transit: 'Near Chiang Mai Airport' },
            { cat: 'pharmacy', name: 'Tsuruha', feature: 'Excellent choice combining Japanese medicines with local Thai staple drugs.', loc: 'MAYA Lifestyle Shopping Center', transit: 'Core of Nimman area' },

            // --- Beauty & Cosmetics ---
            { cat: 'beauty', name: 'Win Cosmetics', feature: 'Chiang Mai\'s cosmetic wholesale heaven! Find all major Thai local makeup brands at the best prices.', loc: 'Warorot HQ / Nimman Branch', transit: 'Warorot Area / Nimman Area' },
            { cat: 'beauty', name: 'EVEANDBOY', feature: 'Known as the "Sephora of Thailand", offering the most complete range of trending local makeup.', loc: 'MAYA Lifestyle Shopping Center', transit: 'Basement, Nimman area' },
            { cat: 'beauty', name: 'Herb Basics', feature: 'Chiang Mai exclusive natural herbal skincare. Hand creams and facial soaps are must-buy souvenirs.', loc: 'Sunday Market / Airport', transit: 'Old City / Inside Airport' },
            { cat: 'beauty', name: 'Sephora', feature: 'International brands and exclusive high-end Thai/Global cosmetics.', loc: 'Central Festival Chiangmai', transit: 'Grab or mall shuttle recommended' },
            { cat: 'beauty', name: 'Beautrium', feature: 'Mega beauty store with frequent massive discounts on cosmetics.', loc: 'Central Festival Chiangmai', transit: 'Inside mall, Grab recommended' },
            { cat: 'beauty', name: 'KARMART', feature: 'Home to Cathy Doll and other affordable makeup brands with cute packaging.', loc: 'MAYA / Central Festival', transit: 'Available in major malls' },
            { cat: 'beauty', name: 'Chiangmai Direct', feature: 'Long-standing local wholesale store for cosmetics and daily necessities. Great for bargain hunting.', loc: 'Mueang Chiang Mai District', transit: 'Songthaew or Grab recommended' },
            { cat: 'beauty', name: 'Beauty Buffet', feature: 'Famous across Asia for their "Milk" series face wash and body lotions.', loc: 'Central Plaza Airport', transit: 'Near Chiang Mai Airport' },
            { cat: 'beauty', name: 'Oriental Princess', feature: 'Thailand\'s national skincare brand, highlighting body lotions, hair care, and natural extracts.', loc: 'Big C Extra / Central Airport', transit: 'Inside major malls' },
            { cat: 'beauty', name: 'Mistine Beauty Shop', feature: 'Thailand\'s #1 makeup brand. Waterproof eyeliners and Wings powder foundations are a must-buy.', loc: 'Counters inside Win Cosmetics', transit: 'Warorot Market Area' },

            // --- Fragrance & Spa ---
            { cat: 'fragrance', name: 'Herb Basics', feature: 'The strongest local fragrance brand! Essential oils, diffusers, and massage oils at very friendly prices.', loc: 'Ratchadamnoen Rd (Old City)', transit: '8 mins walk from Tha Phae Gate' },
            { cat: 'fragrance', name: 'Phutawan', feature: 'Affordable yet high-quality Thai local fragrance. Reed diffusers and pillow mists are very popular.', loc: 'MAYA Lifestyle Shopping Center', transit: 'Core of Nimman area' },
            { cat: 'fragrance', name: 'Panpuri', feature: 'Luxurious premium organic skincare and fragrance, favored by many 5-star hotels and top-tier spas.', loc: 'Central Festival Chiangmai', transit: 'Grab recommended' },
            { cat: 'fragrance', name: 'Thann', feature: 'Internationally renowned Thai spa brand, famous for Shiso and woody oriental scents.', loc: 'Central Festival Chiangmai', transit: 'Grab recommended' },
            { cat: 'fragrance', name: 'Harnn', feature: 'Focuses on Asian herbs. Natural handmade soaps and exquisite home diffusers with a premium feel.', loc: 'Central Festival Chiangmai', transit: 'Grab recommended' },
            { cat: 'fragrance', name: 'Sense of Lanna', feature: 'Local brand blending Northern Lanna culture. Beautiful packaging makes it perfect for gifts.', loc: 'Chiang Mai Airport', transit: 'Inside departure lounge' },
            { cat: 'fragrance', name: 'Botanique', feature: 'Emphasizes natural floral and fruity scents. Diffuser bottles feature simple, elegant designs.', loc: 'MAYA Lifestyle Shopping Center', transit: 'Core of Nimman area' },
            { cat: 'fragrance', name: 'Vieng Joom On', feature: 'Tea-scented fragrance line from the famous teahouse, offering healing oriental tea aromas.', loc: 'Charoen Rat Rd', transit: 'Riverside area, Grab recommended' },
            { cat: 'fragrance', name: 'BsaB', feature: 'Eco-friendly and natural, using unique volcanic stones and branches as scent diffusers.', loc: 'Central Festival Chiangmai', transit: 'Grab recommended' },
            { cat: 'fragrance', name: 'Lanna Spa Products', feature: 'Supplies professional-grade essential oils and exfoliating bath salts to local spas.', loc: 'Warorot Market area', transit: 'Explore around Warorot' },

            // --- Pet Supplies ---
            { cat: 'pet', name: 'Khamthieng Market (Pet Zone)', feature: 'Chiang Mai\'s largest plant and pet market, offering various pet clothes and supplies.', loc: 'Khamthieng Flower Market', transit: 'North of Old City, Grab recommended' },
            { cat: 'pet', name: 'Pet Safari', feature: 'Premium pet lifestyle store in Chiang Mai, featuring imported boutique items and quality leashes.', loc: 'Central Festival Chiangmai', transit: 'Basement floor of the mall' },
            { cat: 'pet', name: 'Pet Lovers Centre', feature: 'Large multinational chain. Complete with basic supplies and international main diet brands.', loc: 'Central Plaza Airport', transit: 'Near Chiang Mai Airport' },
            { cat: 'pet', name: 'Chiangmai Pet Shop', feature: 'Large local pet megastore with affordable prices on cat litter and food.', loc: 'Chang Phueak Area', transit: 'Songthaew or Grab recommended' },
            { cat: 'pet', name: 'Manoon Pet Shop', feature: 'Famous Thai pet store chain offering a variety of treats and affordable toys.', loc: 'Multiple suburban branches', transit: 'Check nearest location' },
            { cat: 'pet', name: 'Pet Mart Chiang Mai', feature: 'A local favorite pet supermarket, rich in items and frequent promotions.', loc: 'Suthep Rd', transit: 'Near CMU, Grab recommended' },
            { cat: 'pet', name: 'Star Pet by Lotus\'s', feature: 'Pet zone integrated into the hypermarket, convenient for buying treats during grocery runs.', loc: 'Lotus\'s Hang Dong', transit: 'Hang Dong area, Grab recommended' },
            { cat: 'pet', name: 'Dog Country', feature: 'Dog-centric boutique where you can find locally designed leashes and cute outfits.', loc: 'Nimman Area', transit: 'Walk or Songthaew in Nimman' },
            { cat: 'pet', name: 'Perfect Pet', feature: 'Highly rated local store. Friendly owner and diverse product range.', loc: 'San Sai Area', transit: 'Farther from city, Grab required' },
            { cat: 'pet', name: 'Cat Republic (Supplies)', feature: 'Retail area attached to the famous cat cafe, offering many high-quality cat-themed products.', loc: 'Nimman Soi 9', transit: 'Nimman area, walking distance' }
        ];

        // Function to render cards
        function renderCards(category) {
            const container = document.getElementById('shop-container');
            container.innerHTML = ''; // Clear existing content

            const filteredData = shopData.filter(item => item.cat === category);

            filteredData.forEach((shop, index) => {
                const delay = index * 50; // Simple entrance animation delay
                
                // Generate Google Maps URL
                const mapSearchQuery = encodeURIComponent(`${shop.name} Chiang Mai`);
                const mapUrl = `https://www.google.com/maps/search/?api=1&query=${mapSearchQuery}`;
                
                const card = document.createElement('div');
                card.className = `bg-white rounded-2xl shadow-sm border border-gray-100 p-6 flex flex-col justify-between hover:shadow-lg transition-shadow duration-300 transform hover:-translate-y-1 animate-fade-in`;
                card.style.animationDelay = `${delay}ms`;
                
                card.innerHTML = `
                    <div>
                        <div class="flex items-start justify-between mb-4">
                            <h3 class="text-xl font-bold text-gray-800">${shop.name}</h3>
                        </div>
                        <div class="space-y-3">
                            <div class="flex items-start">
                                <i class="fa-solid fa-star text-yellow-400 mt-1 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-xs text-gray-400 font-semibold mb-1">Highlight</p>
                                    <p class="text-sm text-gray-700">${shop.feature}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <i class="fa-solid fa-location-dot text-red-400 mt-1 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-xs text-gray-400 font-semibold mb-1">Location</p>
                                    <p class="text-sm text-gray-700 font-medium">${shop.loc}</p>
                                </div>
                            </div>
                            <div class="flex items-start">
                                <i class="fa-solid fa-car-side text-teal-500 mt-1 mr-3 w-4 text-center"></i>
                                <div>
                                    <p class="text-xs text-gray-400 font-semibold mb-1">Transit</p>
                                    <span class="inline-block bg-teal-50 text-teal-700 text-xs px-2 py-1 rounded-md font-medium">${shop.transit}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- Google Maps Navigation Button -->
                    <div class="mt-5 pt-4 border-t border-gray-100">
                        <a href="${mapUrl}" target="_blank" rel="noopener noreferrer" 
                           class="w-full flex items-center justify-center px-4 py-2 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-blue-500 hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-400 transition-colors">
                            <i class="fa-solid fa-map-location-dot mr-2"></i> Open in Google Maps
                        </a>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Handle category button clicks
        function filterCategory(category, btnElement) {
            // Remove active state from all buttons
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));

            // Add active state to clicked button
            btnElement.classList.add('active');

            // Render corresponding data
            renderCards(category);
        }

        // Add simple entrance animation CSS
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
                animation: fadeIn 0.5s ease-out forwards;
                opacity: 0;
            }
        `;
        document.head.appendChild(style);

        // Load first category (streetwear) on initialization
        window.onload = () => {
            const firstBtn = document.querySelector('.tab-btn');
            filterCategory('streetwear', firstBtn);
        };
    </script>
</body>
</html>
