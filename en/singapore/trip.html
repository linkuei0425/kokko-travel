<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Singapore Trip Guide</title>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (CDN) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX (CDN) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Hide scrollbar for Chrome, Safari and Opera */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- SVG Icon Components ---
        const MapPin = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>;
        const Ticket = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"/><path d="M13 5v2"/><path d="M13 17v2"/><path d="M13 11v2"/></svg>;
        const Sun = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
        const Sparkles = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
        const TrainFront = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3.1V7a4 4 0 0 0 8 0V3.1"/><path d="M9 15h6"/><path d="M14 19.5l3-3-3-3"/><path d="M10 19.5l-3-3 3-3"/><path d="M4 22v-3.5"/><path d="M20 22v-3.5"/><rect width="16" height="16" x="4" y="3" rx="2"/></svg>;
        const ExternalLink = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>;
        const Info = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const Home = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;

        // Categories
        const CATEGORIES = [
            { id: 'Tickets', icon: Ticket },
            { id: 'Day Tours', icon: Sun },
            { id: 'Experiences', icon: Sparkles },
            { id: 'Transport & Wi-Fi', icon: TrainFront }
        ];

        // Regions
        const REGIONS = ['Singapore City', 'Sentosa', 'Cross-Border'];

        // Available categories per region
        const getAvailableCategoryIds = (region) => {
            if (region === 'Cross-Border') return ['Day Tours', 'Transport & Wi-Fi'];
            return ['Tickets', 'Day Tours', 'Experiences', 'Transport & Wi-Fi'];
        };

        // Itinerary Database (All links translated to /en-US/ with aid=115830 retained)
        const itineraryData = {
            'Singapore City': {
                'Tickets': [
                    {
                        title: 'Gardens by the Bay Ticket',
                        description: 'Singapore\'s must-visit landmark! Enter the world\'s largest glass greenhouse "Flower Dome" and the "Cloud Forest" with its 35-meter indoor waterfall. Experience the stunning Avatar world in air-conditioned comfort.',
                        link: 'https://www.klook.com/en-US/activity/127-gardens-by-the-bay-singapore/?aid=115830'
                    },
                    {
                        title: 'Jewel Changi Airport Attractions Ticket',
                        description: 'Located at the heart of Changi Airport. Besides the free indoor waterfall "Rain Vortex", buy tickets to the Canopy Park, Sky Nets, and Hedge Maze for lush jungle adventures.',
                        link: 'https://www.klook.com/en-US/activity/25872-jewel-changi-airport-attractions-ticket-singapore/?aid=115830'
                    },
                    {
                        title: 'Singapore Flyer Ticket',
                        description: 'Asia\'s largest observation wheel. Enjoy a 360-degree panoramic view of Marina Bay Sands and the financial district skyline. On a clear day, you can even see Malaysia and Indonesia.',
                        link: 'https://www.klook.com/en-US/activity/4534-singapore-flyer/?spm=SearchResult.SearchResult_LIST&clickId=0d87639ff5&aid=115830'
                    },
                    {
                        title: 'Marina Bay Sands SkyPark Observation Deck',
                        description: 'Ascend to the 57th floor of MBS. Take in the bustling night views of Marina Bay, Supertree light shows, and endless ocean horizons. A quintessential Singapore photo spot.',
                        link: 'https://www.klook.com/en-US/activity/10552-marina-bay-sands-skypark-observation-deck-admission-ticket-singapore/?spm=SearchResult.SearchResult_LIST&clickId=b7ee3859de&aid=115830'
                    },
                    {
                        title: 'Night Safari Singapore Ticket',
                        description: 'The world\'s first nocturnal wildlife park! Take a guided tram ride through the dark jungle to observe the nighttime habits of lions, tigers, and elephants. A truly unique experience.',
                        link: 'https://www.klook.com/en-US/activity/141-singapore-zoo-singapore/?aid=115830'
                    },
                    {
                        title: 'Science Centre Singapore & Omni-Theatre Ticket',
                        description: 'A highly educational family attraction! Let kids explore science through over a thousand interactive exhibits, or watch awe-inspiring dome movies at the Omni-Theatre.',
                        link: 'https://www.klook.com/en-US/activity/1347-science-centre-singapore-omni-theatre-movie-singapore/?aid=115830'
                    },
                    {
                        title: 'Klook Pass Singapore',
                        description: 'Enjoy multiple top Singapore attractions with one pass! Choose 2 to 6 activities (including Universal Studios, Gardens by the Bay, etc.) based on your itinerary, saving up to 48% off standard prices.',
                        link: 'https://www.klook.com/en-US/activity/73887-singapore-pass/?aid=115830'
                    }
                ],
                'Day Tours': [
                    {
                        title: 'Singapore DUCKtours',
                        description: 'Ride an amphibious vehicle from the Vietnam War era. Tour city landmarks on land, then splash directly into the Singapore River for views of the Merlion and MBS from the water. Great for families.',
                        link: 'https://www.klook.com/en-US/activity/62250-singapore-half-day-ducktour-seafood-lunch-dinner/?spm=SearchResult.SearchResult_LIST&clickId=5a90328183&aid=115830'
                    },
                    {
                        title: 'Big Bus Singapore Hop-On Hop-Off Tour',
                        description: 'Hop-on hop-off city sightseeing bus offering multiple routes. Easily travel between Little India, Chinatown, and Orchard Road without the hassle of navigating the MRT.',
                        link: 'https://www.klook.com/en-US/activity/87135-big-bus-sightseeing-tour-singapore/?spm=SearchResult.SearchResult_LIST&clickId=e4c2c75207&aid=115830'
                    },
                    {
                        title: 'Singapore Island Hopping Ferry: St John\'s, Lazarus, Kusu',
                        description: 'Escape the city buzz and explore Singapore\'s southern islands. Relax on the white sands of Lazarus Island or visit the historic temples on Kusu Island for a different side of the Lion City.',
                        link: 'https://www.klook.com/en-US/activity/20696-ferry-transfers-st-johns-kusu-island-singapore/?aid=115830'
                    }
                ],
                'Experiences': [
                    {
                        title: 'Disney Adventure Cruise (3 Nights)',
                        description: 'All sailings are hot for booking! Board the magical Disney cruise departing from Singapore. Experience world-class entertainment, themed dining, and exclusive character meet-and-greets.',
                        link: 'https://www.klook.com/en-US/activity/142451-3-night-disney-adventure-cruise-from-singapore/?aid=115830'
                    },
                    {
                        title: 'Singapore River Cruise',
                        description: 'Board a traditional bumboat and cruise gently along the Singapore River. Sail past the lively bars of Clarke Quay and the towering skyscrapers of the financial district.',
                        link: 'https://www.klook.com/en-US/activity/3846-river-cruise-singapore/?spm=SearchResult.SearchResult_LIST&clickId=9ef1e0dd1b&aid=115830'
                    }
                ],
                'Transport & Wi-Fi': [
                    {
                        title: 'Singapore NETS FlashPay Travel Card',
                        description: 'The essential smart card for Singapore! Use it on the MRT and buses, as well as in convenience stores and food courts. Pre-book and pick it up easily right at the airport.',
                        link: 'https://www.klook.com/en-US/activity/14299-travel-card-nets-flashpay-singapore/?aid=115830'
                    },
                    {
                        title: 'Singtel 5G Tourist SIM Card (Airport/City Pick Up)',
                        description: '5G internet from Singapore\'s largest telco. Offers stable speeds and massive data. Pick it up right after landing at the airport or various city locations. Plug and play convenience.',
                        link: 'https://www.klook.com/en-US/activity/77287-4g-travel-sim-card-singtel-singapore/?spm=SearchResult.SearchResult_LIST&clickId=362056dcb6&aid=115830'
                    },
                    {
                        title: 'Singapore 4G / 5G eSIM',
                        description: 'Activate your internet by scanning a QR code, skipping the hassle of swapping physical SIM cards. Offers various data plans with fast speeds covering the entire island.',
                        link: 'https://www.klook.com/en-US/activity/107849-singapore-esim-high-speed-internet/?spm=SearchResult.SearchResult_LIST&clickId=d690970e08&aid=115830'
                    },
                    {
                        title: 'Private Airport Transfers (Changi Airport to City)',
                        description: 'Exclusive driver meet-and-greet service. Direct door-to-door transfer to your hotel, skipping the struggle of navigating the MRT with luggage. Ideal for families or red-eye flights.',
                        link: 'https://www.klook.com/en-US/airport-transfers/?aid=115830'
                    }
                ]
            },
            'Sentosa': {
                'Tickets': [
                    {
                        title: 'Universal Studios Singapore Ticket',
                        description: 'Southeast Asia\'s only Universal Studios! While compact, it boasts the exclusive "Transformers The Ride: The Ultimate 3D Battle" and the world\'s tallest dueling roller coasters.',
                        link: 'https://www.klook.com/en-US/activity/117-universal-studios-singapore/?aid=115830'
                    },
                    {
                        title: 'Madame Tussauds Singapore Ticket',
                        description: 'Get up close with world-class celebrities, Hollywood stars, and Marvel heroes! Experience the "Spirit of Singapore" boat ride to uniquely learn about the country\'s development.',
                        link: 'https://www.klook.com/en-US/activity/1182-madame-tussauds-singapore/?aid=115830'
                    },
                    {
                        title: 'Skyline Luge Singapore Ticket',
                        description: 'Sentosa\'s mega-popular outdoor activity! Ride the Skyride chairlift for island views, then steer a gravity-powered luge cart down winding jungle tracks. Thrilling yet safe.',
                        link: 'https://www.klook.com/en-US/activity/132-skyline-luge-singapore/?aid=115830'
                    },
                    {
                        title: 'S.E.A. Aquarium Ticket',
                        description: 'One of the world\'s largest aquariums featuring a massive Open Ocean viewing panel. See manta rays, sharks, and tens of thousands of marine creatures.',
                        link: 'https://www.klook.com/en-US/activity/119-sea-aquarium-singapore/?aid=115830'
                    }
                ],
                'Day Tours': [
                    {
                        title: 'Sentosa Fun Pass',
                        description: 'A flexible token-based pass! Use tokens to redeem access to popular island attractions like the Skyline Luge, 4D AdventureLand, and Wings of Time. More cost-effective than buying individual tickets.',
                        link: 'https://www.klook.com/en-US/activity/2121-sentosa-fun-pass-singapore/?spm=SearchResult.SearchResult_LIST&clickId=80858dde9e&aid=115830'
                    }
                ],
                'Experiences': [
                    {
                        title: 'Harry Potter: Visions of Magic',
                        description: 'The wizarding world comes to life at Resorts World Sentosa! Combining interactive art and technology, explore the mysterious Ministry of Magic, Room of Requirement, and Newt\'s Menagerie.',
                        link: 'https://www.klook.com/en-US/activity/133319-harry-potter-visions-of-magic-in-resorts-world-sentosa-singapore/?aid=115830'
                    },
                    {
                        title: 'MegaZip (Mega Adventure Park)',
                        description: 'Launch from a 75-meter high jungle peak and fly over the forest canopy and Siloso Beach at 60 km/h. Feel the rush of the ocean breeze in Sentosa\'s most exhilarating extreme experience.',
                        link: 'https://www.klook.com/en-US/activity/713-megazip-singapore/?aid=115830'
                    },
                    {
                        title: 'Wings of Time Night Show',
                        description: 'A massive spectacular set on the ocean! Combining water fountains, lasers, fire effects, and an engaging story, it\'s the perfect finale to a day out on Sentosa island.',
                        link: 'https://www.klook.com/en-US/activity/135-wings-of-time-singapore/?spm=SearchResult.SearchResult_LIST&clickId=0ce2a5b36f&aid=115830'
                    },
                    {
                        title: 'Private Yacht Charter (by White Sails)',
                        description: 'The ultimate luxury getaway from Sentosa! Charter a private yacht to cruise the surrounding islands. Enjoy sunbathing, snorkeling, or romantic sunsets at sea.',
                        link: 'https://www.klook.com/en-US/activity/7845-private-yacht-charter-singapore/?aid=115830'
                    }
                ],
                'Transport & Wi-Fi': [
                    {
                        title: 'Sentosa Express Ticket',
                        description: 'The fastest way to connect VivoCity and Sentosa Island. With one ticket, you can easily access Universal Studios and all the major beaches.',
                        link: 'https://www.klook.com/en-US/activity/8268-sentosa-express-singapore/?aid=115830'
                    },
                    {
                        title: 'Singapore Cable Car Ticket',
                        description: 'The most scenic route between Mount Faber and Sentosa. Look down through glass cabins at the azure sea, lush forests, and Universal Studios. Riding at sunset adds a deeply romantic touch.',
                        link: 'https://www.klook.com/en-US/activity/130-faber-peak-cable-car-singapore/?spm=SearchResult.SearchResult_LIST&clickId=833951b59a&aid=115830'
                    }
                ]
            },
            'Cross-Border': {
                'Day Tours': [
                    {
                        title: 'LEGOLAND Malaysia Ticket',
                        description: 'Located in Johor Bahru, Malaysia, just across the bridge from Singapore. Asia\'s first Legoland theme park features 7 themed zones, making it an excellent playground for both adults and kids.',
                        link: 'https://www.klook.com/en-US/activity/7713-legoland-admission-ticket-johor-bahru/?aid=115830'
                    },
                    {
                        title: 'Premium Batam 1-Day Tour (From Singapore)',
                        description: 'A hassle-free cross-border day trip to Indonesia! Includes return ferry tickets, a city sightseeing tour, and an authentic seafood lunch. Experience the exotic charm of Batam.',
                        link: 'https://www.klook.com/en-US/activity/109385-premium-city-tour-batam/?aid=115830'
                    },
                    {
                        title: 'Bintan Mangrove Tour',
                        description: 'Take a speedboat deep into the lush mangrove ecosystem of Bintan, Indonesia. Spot wild monkeys and snakes by day, or witness a sky full of dancing fireflies on the night tour.',
                        link: 'https://www.klook.com/en-US/activity/3698-mangrove-river-tour-bintan/?aid=115830'
                    },
                    {
                        title: 'Batam and Bintan Multi-Day Tour (From Singapore)',
                        description: 'Explore two major tropical resort islands in one trip! Offers rich multi-day options including ferry tickets, accommodation, seafood feasts, and massage experiences.',
                        link: 'https://www.klook.com/en-US/activity/158885-multidaytour-batam-and-bintan-from-singapore/?spm=SearchResult.SearchResult_LIST&clickId=99df58e4a8&aid=115830'
                    }
                ],
                'Transport & Wi-Fi': [
                    {
                        title: 'Singapore - LEGOLAND Malaysia Bus Transfer',
                        description: 'Travel directly from downtown Singapore to LEGOLAND Malaysia. Skip the transit headaches and border-crossing confusion with this highly convenient transport option.',
                        link: 'https://www.klook.com/en-US/activity/2247-singapore-legoland-malaysia-bus/?aid=115830'
                    },
                    {
                        title: 'Singapore - Johor Bahru (JB) Bus',
                        description: 'The most economical cross-border transport between Singapore and JB. With frequent departures, you\'ll arrive in downtown JB right after customs to start your food and shopping spree.',
                        link: 'https://www.klook.com/en-US/activity/110362-singapore-johor-bahru-malaysia-bus/?aid=115830'
                    },
                    {
                        title: 'Singapore - Genting Highlands Bus Transfer',
                        description: 'A comfortable long-distance cross-border bus straight from Singapore to Malaysia\'s famous summer retreat, Genting Highlands. Enjoy the cool climate and world-class theme parks.',
                        link: 'https://www.klook.com/en-US/activity/114792-707-inc-bus-ticket-singapore-genting-highlands/?aid=115830'
                    },
                    {
                        title: 'Private Transfer between Singapore and Johor Bahru',
                        description: 'The top choice for families and groups! A private car picks you up from your Singapore hotel and smoothly crosses the Causeway. Customize your JB shopping and dining itinerary.',
                        link: 'https://www.klook.com/en-US/activity/43491-private-transfer-between-singapore-johor-bahru-malaysia/?aid=115830'
                    }
                ]
            }
        };

        function App() {
            const [selectedRegion, setSelectedRegion] = useState('Singapore City');
            const [selectedCategory, setSelectedCategory] = useState('Tickets');

            const currentData = itineraryData[selectedRegion]?.[selectedCategory] || [];

            return (
                <div className="min-h-screen bg-[#f0fdf4] font-sans text-slate-800 pb-12">
                    {/* Header Navigation */}
                    <header className="bg-white shadow-sm sticky top-0 z-10">
                        <div className="max-w-5xl mx-auto px-4 py-4 md:py-6">
                            <div className="flex items-center gap-2 mb-4">
                                <MapPin className="text-emerald-600 w-6 h-6 md:w-8 md:h-8" />
                                <h1 className="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-emerald-600 to-teal-500">
                                Singapore Trip Guide
                                </h1>
                            </div>
                            
                            {/* Region Selection */}
                            <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                <a
                                    href="https://linkuei0425.github.io/Singapore-US/index.html"
                                    className="flex items-center gap-1.5 whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-200 bg-emerald-50 text-emerald-700 hover:bg-emerald-100 border border-emerald-200"
                                >
                                    <Home className="w-4 h-4" />
                                    Back to Home
                                </a>

                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => {
                                            setSelectedRegion(region);
                                            const allowed = getAvailableCategoryIds(region);
                                            if (!allowed.includes(selectedCategory)) {
                                                setSelectedCategory(allowed[0]);
                                            }
                                        }}
                                        className={`whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-200 ${
                                            selectedRegion === region
                                            ? 'bg-emerald-600 text-white shadow-md'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-50'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    <main className="max-w-5xl mx-auto px-4 py-6">
                        {/* Category Tags */}
                        <div className="flex flex-wrap gap-2 md:gap-3 mb-8">
                            {CATEGORIES.filter(cat => getAvailableCategoryIds(selectedRegion).includes(cat.id)).map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    className={`flex items-center gap-1.5 px-4 py-2 rounded-lg border text-sm font-medium transition-all ${
                                        selectedCategory === id
                                        ? 'border-emerald-500 bg-emerald-50 text-emerald-700 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-600 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4" />
                                    {id}
                                </button>
                            ))}
                        </div>

                        {/* Content Title */}
                        <div className="mb-6">
                            <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                Selected Picks: {selectedRegion} - {selectedCategory}
                            </h2>
                        </div>

                        {/* Cards List */}
                        {currentData.length > 0 ? (
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4 md:gap-6">
                                {currentData.map((item, index) => (
                                    <div 
                                        key={index} 
                                        className="bg-white rounded-xl shadow-sm border border-slate-100 p-5 md:p-6 flex flex-col justify-between hover:shadow-md transition-shadow"
                                    >
                                        <div>
                                            <h3 className="text-lg md:text-xl font-bold text-slate-800 mb-3 leading-tight">
                                                {item.title}
                                            </h3>
                                            <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <div className="mt-auto pt-4 border-t border-slate-50 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-5 rounded-lg transition-colors w-full sm:w-auto"
                                            >
                                                <Info className="w-4 h-4" />
                                                <span>View Details & Book</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-70" />
                                            </a>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl border border-dashed border-slate-300 p-12 text-center flex flex-col items-center justify-center">
                                <h3 className="text-lg font-medium text-slate-700 mb-2">
                                    No activities found for this category in the selected region.
                                </h3>
                                <p className="text-slate-500">Please try selecting a different category or region.</p>
                            </div>
                        )}

                        {/* Global Explore Button */}
                        <div className="mt-10 flex justify-center">
                            <a 
                                href="https://www.klook.com/en-US/search/result/?query=Singapore&aid=115830" 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white font-bold py-3.5 px-8 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1"
                            >
                                <span className="tracking-wide">Explore more Singapore activities on Klook</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
