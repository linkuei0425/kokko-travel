                                        <h1 className="text-2xl md:text-3xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-emerald-700 to-teal-500 tracking-tight">
                                            Singapore Trip Guide
                                        </h1>
                                        <p className="text-xs md:text-sm font-medium text-slate-500 mt-1">Book the best tours, tickets & experiences</p>
                                    </div>
                                </div>
                                
                                {/* 15. Back to Home Link (Opens in New Window to EN URL) */}
                                <a
                                    href="https://kokko-travel.com/en/singapore/"
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="inline-flex items-center justify-center gap-2 whitespace-nowrap px-5 py-2.5 rounded-full text-sm font-bold transition-all duration-200 bg-emerald-600 text-white shadow-sm hover:bg-emerald-700 active:scale-95 focus:ring-4 focus:ring-emerald-500/20"
                                    aria-label="Back to Kokko Travel Home Page"
                                >
                                    <Home className="w-4 h-4" />
                                    BACK TO HOME
                                </a>
                            </div>
                            
                            {/* Region Selection (Semantic <nav>) */}
                            <nav className="flex gap-2 md:gap-3 overflow-x-auto pb-2 scrollbar-hide" aria-label="Region Selection">
                                {REGIONS.map((region) => (
                                    <button
                                        key={region}
                                        onClick={() => {
                                            setSelectedRegion(region);
                                            const allowed = getAvailableCategoryIds(region);
                                            if (!allowed.includes(selectedCategory)) {
                                                setSelectedCategory(allowed[0]);
                                            }
                                        }}
                                        aria-selected={selectedRegion === region}
                                        role="tab"
                                        className={`whitespace-nowrap px-6 py-3 rounded-full text-sm md:text-base font-bold transition-all duration-300 ${
                                            selectedRegion === region
                                            ? 'bg-emerald-600 text-white shadow-md transform -translate-y-0.5'
                                            : 'bg-white text-slate-600 border border-slate-200 hover:bg-emerald-50 hover:text-emerald-700'
                                        }`}
                                    >
                                        {region}
                                    </button>
                                ))}
                            </nav>
                        </div>
                    </header>

                    {/* SEO Semantic <main> */}
                    <main className="flex-grow max-w-6xl w-full mx-auto px-4 py-8 md:py-10">
                        
                        {/* Category Tags */}
                        <nav className="flex flex-wrap gap-2 md:gap-3 mb-10" aria-label="Category Selection">
                            {CATEGORIES.filter(cat => getAvailableCategoryIds(selectedRegion).includes(cat.id)).map(({ id, icon: Icon }) => (
                                <button
                                    key={id}
                                    onClick={() => setSelectedCategory(id)}
                                    aria-selected={selectedCategory === id}
                                    role="tab"
                                    className={`flex items-center gap-2 px-5 py-2.5 rounded-xl border text-sm md:text-base font-bold transition-all duration-200 ${
                                        selectedCategory === id
                                        ? 'border-emerald-500 bg-emerald-50 text-emerald-800 shadow-sm'
                                        : 'border-slate-200 bg-white text-slate-500 hover:border-slate-300 hover:bg-slate-50'
                                    }`}
                                >
                                    <Icon className="w-4 h-4 md:w-5 md:h-5" />
                                    {id}
                                </button>
                            ))}
                        </nav>

                        {/* Content Title */}
                        <div className="mb-8 border-l-4 border-emerald-500 pl-4">
                            <h2 className="text-xl md:text-2xl font-extrabold text-slate-800">
                                Best <span className="text-emerald-600">{selectedCategory}</span> in {selectedRegion}
                            </h2>
                        </div>

                        {/* Cards List (Dynamic Grid) */}
                        {currentData.length > 0 ? (
                            <div key={animateKey} className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade-in" role="region" aria-live="polite">
                                {currentData.map((item, index) => (
                                    <article 
                                        key={index} 
                                        className="bg-white rounded-3xl shadow-sm border border-slate-100 p-6 md:p-8 flex flex-col justify-between hover:shadow-xl transition-all duration-300 transform hover:-translate-y-1.5 group"
                                    >
                                        <div>
                                            <header>
                                                <h3 className="text-lg md:text-xl font-extrabold text-slate-800 mb-3 leading-snug group-hover:text-emerald-700 transition-colors">
                                                    {item.title}
                                                </h3>
                                            </header>
                                            <p className="text-slate-600 text-sm md:text-base mb-6 leading-relaxed font-medium">
                                                {item.description}
                                            </p>
                                        </div>
                                        
                                        <footer className="mt-auto pt-5 border-t border-slate-100 flex justify-end">
                                            <a
                                                href={item.link}
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-5 rounded-xl transition-all shadow-sm hover:shadow-md w-full active:scale-95 focus:ring-4 focus:ring-emerald-500/20"
                                                aria-label={`View details and book ${item.title}`}
                                            >
                                                <Info className="w-5 h-5" />
                                                <span>View & Book</span>
                                                <ExternalLink className="w-4 h-4 ml-1 opacity-80" />
                                            </a>
                                        </footer>
                                    </article>
                                ))}
                            </div>
                        ) : (
                            <div className="bg-white rounded-3xl border border-dashed border-slate-300 p-12 md:p-20 text-center flex flex-col items-center justify-center animate-fade-in">
                                <div className="bg-slate-50 p-4 rounded-full mb-4">
                                    <MapPin className="w-8 h-8 text-slate-400" />
                                </div>
                                <h3 className="text-lg md:text-xl font-bold text-slate-700 mb-2">
                                    No activities found
                                </h3>
                                <p className="text-slate-500 font-medium">Please try selecting a different category or region.</p>
                            </div>
                        )}

                        {/* Global Explore Button */}
                        <div className="mt-14 mb-8 flex justify-center">
                            <a 
                                href="https://www.klook.com/en-US/search/result/?query=Singapore&aid=115830" 
                                target="_blank" 
                                rel="noopener noreferrer"
                                className="inline-flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-700 hover:to-teal-600 text-white font-extrabold py-4 px-8 md:px-10 rounded-full shadow-lg transition-all duration-300 transform hover:-translate-y-1 focus:ring-4 focus:ring-emerald-500/30"
                            >
                                <span className="tracking-wide text-sm md:text-base">Explore all Singapore activities on Klook</span>
                                <ExternalLink className="w-5 h-5 ml-1 opacity-90" />
                            </a>
                        </div>
                    </main>

                    {/* 12. SEO Semantic <footer> with Double-Language Copyright Info & RWD Support */}
                    <footer className="mt-auto border-t border-slate-200 bg-white shadow-inner text-center text-slate-500 text-xs md:text-sm py-8 md:py-10 px-4 md:px-6 font-medium leading-relaxed" aria-label="Site Footer">
                        <div className="max-w-4xl mx-auto space-y-2">
                            <p className="font-bold text-slate-600">Copyright &copy; 2026 Kokko Travel / Im+ Life. All Rights Reserved.</p>
                            <p>Unauthorized reproduction, copying, or commercial use is strictly prohibited.<br className="block md:hidden" /> 版權所有，未經授權禁止轉載、翻印或任何商業用途。</p>
                            <p>All images, text content, and source code on this site are protected by law.<br className="block md:hidden" /> 本站包含之圖片、文字內容及程式碼均受法律保護。</p>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
