<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangkok Shopping Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Custom scrollbar hiding (for category buttons section) */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .tab-btn.active {
            background-color: #ec4899; /* Pink-500 */
            color: white;
            box-shadow: 0 4px 6px -1px rgba(236, 72, 153, 0.3);
            border-color: #ec4899;
        }
        .tab-btn {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <!-- Top Navigation Bar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex-shrink-0 flex items-center">
                    <span class="font-bold text-xl text-pink-600 tracking-wider"><i class="fa-solid fa-bag-shopping mr-2"></i>BKK SHOPPING</span>
                </div>
                <div>
                    <!-- Home Link -->
                    <a href="https://linkuei0425.github.io/BANGKOK-US/index.html" class="inline-flex items-center justify-center px-4 py-2 border border-transparent rounded-full shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
                        <i class="fa-solid fa-house mr-2"></i> Home
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Header Banner -->
    <header class="bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 py-12 lg:py-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <h1 class="text-3xl md:text-5xl font-extrabold text-white mb-4 shadow-sm">Bangkok Must-Buy Shopping Guide</h1>
            <p class="text-lg md:text-xl text-white opacity-90 max-w-2xl mx-auto">50 handpicked popular stores in Bangkok, from streetwear and pharmacies to fragrances and pet supplies. Shop till you drop with our guide!</p>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        
        <!-- Category Buttons (Scrollable horizontally) -->
        <div class="flex overflow-x-auto hide-scrollbar space-x-3 pb-4 mb-6 md:justify-center">
            <button onclick="filterCategory('streetwear', this)" class="tab-btn active whitespace-nowrap px-6 py-3 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm hover:bg-pink-50 focus:outline-none flex items-center">
                <span class="mr-2 text-lg">🛹</span> Streetwear
            </button>
            <button onclick="filterCategory('pharmacy', this)" class="tab-btn whitespace-nowrap px-6 py-3 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm hover:bg-pink-50 focus:outline-none flex items-center">
                <span class="mr-2 text-lg">💊</span> Pharmacy
            </button>
            <button onclick="filterCategory('beauty', this)" class="tab-btn whitespace-nowrap px-6 py-3 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm hover:bg-pink-50 focus:outline-none flex items-center">
                <span class="mr-2 text-lg">💄</span> Beauty
            </button>
            <button onclick="filterCategory('fragrance', this)" class="tab-btn whitespace-nowrap px-6 py-3 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm hover:bg-pink-50 focus:outline-none flex items-center">
                <span class="mr-2 text-lg">🌿</span> Fragrance
            </button>
            <button onclick="filterCategory('pet', this)" class="tab-btn whitespace-nowrap px-6 py-3 rounded-full border border-gray-200 bg-white text-gray-700 font-semibold text-sm hover:bg-pink-50 focus:outline-none flex items-center">
                <span class="mr-2 text-lg">🐾</span> Pet Supplies
            </button>
        </div>

        <!-- Content Display Area -->
        <div id="shop-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards will be generated dynamically via JavaScript -->
        </div>

    </main>

    <footer class="bg-gray-800 text-white py-8 mt-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-sm text-gray-400">© 2026 Bangkok Shopping Guide. Providing the best recommendations for your trip to Bangkok.</p>
        </div>
    </footer>

    <script>
        // Shop Database
        const shopData = [
            // --- Streetwear ---
            { cat: 'streetwear', name: 'Gentlewoman', feature: "Thailand's hottest canvas bags and typography logo apparel.", loc: 'Siam Square Flagship Store', transit: '3 min walk from BTS Siam' },
            { cat: 'streetwear', name: 'Daddy and the Muscle Academy', feature: 'Extremely cute retro illustration style, American girly streetwear.', loc: 'Siam Square Soi 2', transit: '4 min walk from BTS Siam' },
            { cat: 'streetwear', name: 'Carnival', feature: "Thailand's top streetwear sneaker select shop, often features exclusive collaborations.", loc: 'Siam Square Soi 7', transit: '5 min walk from BTS Siam' },
            { cat: 'streetwear', name: 'Matchbox', feature: 'A physical select shop gathering dozens of popular Thai IG brands.', loc: 'Siam Square', transit: '3 min walk from BTS Siam' },
            { cat: 'streetwear', name: 'Frank Garcon', feature: 'Unisex streetwear, offering apparel, stationery, and lifestyle items.', loc: 'Siam Square Soi 2', transit: '4 min walk from BTS Siam' },
            { cat: 'streetwear', name: 'Tres Fashion', feature: 'Thai designer brand collective store, fresh and slightly spicy style.', loc: 'Siam Square Soi 5', transit: '4 min walk from BTS Siam' },
            { cat: 'streetwear', name: 'Mitr', feature: 'Thai resort style combined with daily streetwear, very flattering fits.', loc: 'Siam Center 2F', transit: 'BTS Siam, mall connection' },
            { cat: 'streetwear', name: 'Pomelo', feature: 'Known as the Thai Zara, clean cuts and fast-updating styles.', loc: 'Central World', transit: '5 min walk from BTS Chit Lom' },
            { cat: 'streetwear', name: 'V.A.C. (Vii Athletic Club)', feature: 'Streetwear brand combining American street culture with local Thai elements.', loc: 'Siam Square Soi 1', transit: '4 min walk from BTS Siam' },
            { cat: 'streetwear', name: 'Boyy', feature: 'Internationally renowned Thai luxury bags, classic square buckle design.', loc: 'Gaysorn Village', transit: '3 min walk from BTS Chit Lom' },

            // --- Pharmacy ---
            { cat: 'pharmacy', name: 'Big C Supercenter', feature: 'Nasal inhalers, Ya Dom, green balms (ideal for bulk purchasing).', loc: 'Rajdamri Main Store', transit: '7 min walk from BTS Chit Lom' },
            { cat: 'pharmacy', name: 'Boots', feature: 'UK chain, exclusively sells the Thai Sabai-Arom herbal series.', loc: 'Available in major malls (e.g., Siam Paragon)', transit: 'Inside major BTS station malls' },
            { cat: 'pharmacy', name: 'Watsons', feature: 'Frequent promotions on local Thai supplements, vitamins, and mosquito repellents.', loc: 'Available in major malls (e.g., Central World)', transit: 'Inside major BTS station malls' },
            { cat: 'pharmacy', name: 'Lab Pharmacy', feature: 'High-end pharmacy offering professional pharmacist consultations and imported drugs.', loc: 'Silom Complex', transit: 'BTS Sala Daeng, inside the mall' },
            { cat: 'pharmacy', name: 'Fascino', feature: "Thailand's largest professional pharmacy chain, complete with medical supplies.", loc: 'Multiple branches in downtown Bangkok', transit: 'Depends on the branch location' },
            { cat: 'pharmacy', name: 'Health Up', feature: 'Common Thai pharmacy chain, balancing traditional Thai medicines and modern supplements.', loc: 'Inside major department stores and Big C', transit: 'Depends on the branch location' },
            { cat: 'pharmacy', name: 'Tsuruha Drug', feature: 'Combines Japanese cold medicines with local Thai staple drugs.', loc: 'Gateway Ekamai', transit: 'BTS Ekkamai, direct mall connection' },
            { cat: 'pharmacy', name: 'Matsumoto Kiyoshi', feature: 'Complete selection of original Japanese medicines, the best choice for Japanese drugs in Bangkok.', loc: 'Central World', transit: 'BTS Chit Lom' },
            { cat: 'pharmacy', name: 'Siam Pharmacy', feature: 'Traditional Thai pharmacy, affordable prices, highly trusted by locals.', loc: 'Phloen Chit area', transit: 'Near BTS Phloen Chit' },
            { cat: 'pharmacy', name: 'Asiatique Pharmacy', feature: 'Souvenir-style pharmacy tailored for foreign tourists (Royal Honey/cooling balms).', loc: 'Asiatique The Riverfront', transit: 'BTS Saphan Taksin, transfer to free shuttle boat' },

            // --- Beauty ---
            { cat: 'beauty', name: 'EVEANDBOY', feature: "Known as the 'Thai Sephora', with the most complete local makeup selection.", loc: 'Siam Square One', transit: 'BTS Siam, mall basement' },
            { cat: 'beauty', name: 'Beautrium', feature: 'Mega beauty retailer, prices are often better than EVEANDBOY.', loc: 'Siam Square Flagship Store', transit: '3 min walk from BTS Siam' },
            { cat: 'beauty', name: 'Sephora', feature: 'International brands and some exclusively imported high-end Thai makeup brands.', loc: 'Siam Center', transit: 'BTS Siam, inside the mall' },
            { cat: 'beauty', name: 'KARMART', feature: 'Owns Cathy Doll and other affordable makeup brands with cute packaging.', loc: 'Siam Square', transit: '4 min walk from BTS Siam' },
            { cat: 'beauty', name: 'Oriental Princess', feature: 'Thai national skincare brand, focusing on body lotions, hair care, and natural extracts.', loc: 'Big C Rajdamri 1st Floor', transit: '7 min walk from BTS Chit Lom' },
            { cat: 'beauty', name: 'Beauty Buffet', feature: "The 'Milk Facial Cleanser and Body Lotion' series that sells well all over Asia.", loc: 'MBK Center', transit: '3 min walk from BTS National Stadium' },
            { cat: 'beauty', name: 'Mistine Beauty Shop', feature: "Thailand's No.1 makeup brand store, waterproof eyeliners and powder compacts are must-buys.", loc: 'MBK Center / Big C', transit: 'Depends on the branch location' },
            { cat: 'beauty', name: 'Multy Beauty', feature: 'Focuses on the latest Korean trendy makeup and popular local Thai products.', loc: 'Siam Square Soi 5', transit: '4 min walk from BTS Siam' },
            { cat: 'beauty', name: 'Gourmet Market Beauty Zone', feature: 'Beauty section inside the supermarket, featuring niche Thai organic skincare brands.', loc: 'Siam Paragon G Floor', transit: 'BTS Siam, basement supermarket' },
            { cat: 'beauty', name: 'KISS Beauty Store', feature: 'Multi-brand beauty store, offering many drugstore makeup testers.', loc: 'Central World', transit: 'BTS Chit Lom' },

            // --- Fragrance ---
            { cat: 'fragrance', name: 'Karmakamet', feature: 'Premium fragrance, packaging features a strong retro pharmacy aesthetic.', loc: 'Central World / Phrom Phong', transit: 'BTS Chit Lom / Phrom Phong' },
            { cat: 'fragrance', name: 'Panpuri', feature: 'Luxurious organic skincare and fragrance, used by many five-star hotels.', loc: 'Gaysorn Village', transit: '3 min walk from BTS Chit Lom' },
            { cat: 'fragrance', name: 'Copenn.', feature: 'A wildly popular industrial minimalist niche fragrance, highly textured woody notes.', loc: 'Charoen Krung', transit: 'BTS Saphan Taksin, 5 min taxi ride' },
            { cat: 'fragrance', name: 'Thann', feature: 'Internationally renowned Thai SPA brand, famous for its shiso and woody scents.', loc: 'Siam Paragon', transit: 'BTS Siam' },
            { cat: 'fragrance', name: 'Harnn', feature: 'Focuses on Asian herbs, natural handmade soaps and room diffusers are very popular.', loc: 'Central World', transit: 'BTS Chit Lom' },
            { cat: 'fragrance', name: 'Journal', feature: 'Based on Thai coconut oil, named in conjunction with Thai culture.', loc: 'Siam Square One', transit: 'BTS Siam' },
            { cat: 'fragrance', name: 'Erb', feature: 'Inspired by ancient royal recipes, blended with modern exquisite perfumes.', loc: 'Central World', transit: 'BTS Chit Lom' },
            { cat: 'fragrance', name: 'Vuudh', feature: 'Room diffusers and scented candles inspired by major Asian cities.', loc: 'EmQuartier', transit: 'BTS Phrom Phong, inside the mall' },
            { cat: 'fragrance', name: 'BsaB', feature: 'Emphasizes eco-friendly and natural, uses volcanic stones as a diffusing medium.', loc: 'Central World', transit: 'BTS Chit Lom' },
            { cat: 'fragrance', name: 'Mt. Sapola', feature: 'A local long-established Home Spa, essential oils and natural handmade soaps are of extremely high quality.', loc: 'Siam Paragon', transit: 'BTS Siam' },

            // --- Pet Supplies ---
            { cat: 'pet', name: 'Chatuchak Weekend Market (Zone 13-15)', feature: 'Extremely suitable for wholesale treasure hunting, from cute clothes to accessories.', loc: 'Chatuchak Weekend Market', transit: 'BTS Mo Chit or MRT Kamphaeng Phet' },
            { cat: 'pet', name: 'Pet Safari', feature: "One of Bangkok's highest-end pet lifestyle stores, imported boutiques and quality leashes.", loc: 'Inside IconSiam', transit: 'BTS Saphan Taksin, transfer to free shuttle boat' },
            { cat: 'pet', name: 'Central Eastville', feature: 'Pet-friendly mall with plenty of pet strollers, snacks, and counters.', loc: 'Central Eastville', transit: 'Taxi or Grab recommended' },
            { cat: 'pet', name: 'Pet Lovers Centre', feature: 'Large chain pet supermarket, comprehensive basic supplies and staple foods.', loc: 'CentralPlaza Grand Rama 9', transit: 'MRT Phra Ram 9, inside the mall' },
            { cat: 'pet', name: 'Shamu Shamu Pet Shop', feature: 'Locally baked premium pet handmade snacks and supplements.', loc: 'Sukhumvit 49', transit: '10 min walk from BTS Thong Lo' },
            { cat: 'pet', name: 'Moggie Doggie Pet Shop', feature: 'Boutique-level cat and dog accessories, great for finding unique collars and clothes.', loc: 'Thong Lo Area', transit: 'BTS Thong Lo, taxi recommended' },
            { cat: 'pet', name: 'Bone and Yarn', feature: 'Thai designer brand, high-quality, unique leashes and travel bags.', loc: 'Ekkamai Area Physical Store', transit: 'BTS Ekkamai, taxi recommended' },
            { cat: 'pet', name: 'K-PET', feature: 'Gathering highly cost-effective pet toys from Japan, Korea, and local Thailand.', loc: 'Mega Bangna', transit: 'BTS Udom Suk, transfer to free shuttle bus' },
            { cat: 'pet', name: 'Hato Pet Wellness Center', feature: 'Geared towards pet health and premium care, features top-tier natural shampoos.', loc: 'Central Eastville', transit: 'Taxi or Grab recommended' },
            { cat: 'pet', name: 'Good Dog Club', feature: 'Local Thai influencer pet store, clothing style is full of childlike fun and trendy vibes.', loc: 'Major creative markets or pop-up stores', transit: 'Can be found in Siam area pop-up stores' }
        ];

        // Function to render cards
        function renderCards(category) {
            const container = document.getElementById('shop-container');
            container.innerHTML = ''; // Clear existing content

            const filteredData = shopData.filter(item => item.cat === category);

            filteredData.forEach((shop, index) => {
                const delay = index * 50; // Simple entrance animation delay
                
                const card = document.createElement('div');
                card.className = `bg-white rounded-2xl shadow-sm border border-gray-100 p-6 hover:shadow-lg transition-shadow duration-300 transform hover:-translate-y-1 animate-fade-in`;
                card.style.animationDelay = `${delay}ms`;
                
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-4">
                        <h3 class="text-xl font-bold text-gray-800">${shop.name}</h3>
                    </div>
                    <div class="space-y-3">
                        <div class="flex items-start">
                            <i class="fa-solid fa-star text-yellow-400 mt-1 mr-3 w-4 text-center"></i>
                            <div>
                                <p class="text-xs text-gray-400 font-semibold mb-1">Featured Products</p>
                                <p class="text-sm text-gray-700">${shop.feature}</p>
                            </div>
                        </div>
                        <div class="flex items-start">
                            <i class="fa-solid fa-location-dot text-red-400 mt-1 mr-3 w-4 text-center"></i>
                            <div>
                                <p class="text-xs text-gray-400 font-semibold mb-1">Location</p>
                                <p class="text-sm text-gray-700 font-medium">${shop.loc}</p>
                            </div>
                        </div>
                        <div class="flex items-start">
                            <i class="fa-solid fa-train-subway text-indigo-400 mt-1 mr-3 w-4 text-center"></i>
                            <div>
                                <p class="text-xs text-gray-400 font-semibold mb-1">Transportation</p>
                                <span class="inline-block bg-indigo-50 text-indigo-700 text-xs px-2 py-1 rounded-md font-medium">${shop.transit}</span>
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Logic for clicking category buttons
        function filterCategory(category, btnElement) {
            // Remove active state from all buttons
            const btns = document.querySelectorAll('.tab-btn');
            btns.forEach(btn => btn.classList.remove('active'));

            // Add active state to the currently clicked button
            btnElement.classList.add('active');

            // Render corresponding data
            renderCards(category);
        }

        // Add simple entrance animation CSS
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(10px); }
                to { opacity: 1; transform: translateY(0); }
            }
            .animate-fade-in {
                animation: fadeIn 0.5s ease-out forwards;
                opacity: 0;
            }
        `;
        document.head.appendChild(style);

        // Display the first category (Streetwear) upon initial load
        window.onload = () => {
            const firstBtn = document.querySelector('.tab-btn');
            filterCategory('streetwear', firstBtn);
        };
    </script>
</body>
</html>
