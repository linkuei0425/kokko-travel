                categories: {

                        { name: "Somerset Rama 9 Bangkok", feature: "Premium serviced apartments with full kitchens and laundry equipment inside the room. Perfect for long stays or families.", address: "22 Ratchadaphisek Rd / 5-min walk from MRT Phra Ram 9.", url: "https://www.trip.com/t/uXMs9ba5nT2?locale=en_xx&curr=USD" },
                        { name: "The Emerald Hotel", feature: "Classic large hotel in Huai Khwang. Slightly dated, but famous for its lavish buffet and spacious rooms.", address: "99 Ratchadaphisek Rd / 5-min walk from MRT Huai Khwang.", url: "https://www.trip.com/t/JPja0Ib5nT2?locale=en_xx&curr=USD" }
                    ],
                    "Budget Hotels": [
                        { name: "Ibis Styles Bangkok Ratchada", feature: "Vibrant and colorful design. Unbeatable location, right next to the MRT station and bustling night market areas.", address: "212 Ratchadaphisek Rd / 1-min walk from MRT Huai Khwang.", url: "https://www.trip.com/t/zo5Ou2e5nT2?locale=en_xx&curr=USD" },
                        { name: "Amanta Hotel & Residence Ratchada", feature: "Serviced apartments hidden in an alley behind the mall. Features a large tropical courtyard and pool, like an urban oasis.", address: "77-79 Ratchadaphisek Rd / 5-min walk from MRT Thailand Cultural Centre.", url: "https://www.trip.com/t/FVfjHWe5nT2?locale=en_xx&curr=USD" },
                        { name: "Prom Ratchada Hotel", feature: "Simple, clean, and affordable. Located right around the Ratchada Train Night Market (now The One Ratchada).", address: "558 Ratchadaphisek Soi 7 / 8-min walk from MRT Thailand Cultural Centre.", url: "https://www.trip.com/t/b6d135f5nT2?locale=en_xx&curr=USD" },
                        { name: "Ratchada Boutique Hotel", feature: "Dark-toned modern budget hotel. Rooms are small but refined. Suitable for young travelers and couples.", address: "121 Ratchadaphisek Soi 17 / 5-min walk from MRT Sutthisan.", url: "https://www.trip.com/t/pGWspqf5nT2?locale=en_xx&curr=USD" },
                        { name: "Mybed Ratchada", feature: "Modern budget hotel focused on minimalism and extreme low prices. Just across the road from the MRT.", address: "8/71 Ratchadaphisek Rd / 1-min walk from MRT Lat Phrao.", url: "https://www.trip.com/t/5GU9Fbg5nT2?locale=en_xx&curr=USD" }
                    ],
                    "Hostels": [
                        { name: "Siamaze Hostel", feature: "Offers rare double and family hostel rooms. Hosts free Thai cooking classes on weekends.", address: "90 Ratchadaphisek Soi 17 / 10-min walk from MRT Sutthisan.", url: "https://www.trip.com/t/m65siNh5nT2?locale=en_xx&curr=USD" },
                        { name: "Sova Hotel & Hostel", feature: "Concrete industrial style with spacious, extremely clean beds. The lobby feels like a high-quality hipster cafe.", address: "309/20 Ratchadaphisek Rd / 5-min walk from MRT Huai Khwang.", url: "https://www.trip.com/t/EBiNR5i5nT2?locale=en_xx&curr=USD" }
                    ]
                }
            },
            "chatuchak": {
                name: "Chatuchak & Ari",
                categories: {
                    "5-Star Hotels": [
                        { name: "Centara Grand at Central Plaza Ladprao", feature: "Connected to Central Ladprao mall, extremely convenient for shopping and food. Rooms overlook the vast Chatuchak Park.", address: "1695 Phahonyothin Rd / 2-min walk from BTS Ha Yaek Lat Phrao.", url: "https://www.trip.com/t/OvA2ZUk5nT2?locale=en_xx&curr=USD" },
                        { name: "The Quarter Ari by UHG", feature: "Landmark 4-star hotel in the Ari area. The rooftop infinity pool and gym offer great views. Fashionable and modern.", address: "428 Phahonyothin Rd / 8-min walk from BTS Ari.", url: "https://www.trip.com/t/eBRMo7l5nT2?locale=en_xx&curr=USD" },
                        { name: "Best Western Chatuchak", feature: "New chain hotel near Chatuchak Market. Facilities are very clean and modern. Top choice for wholesale shoppers or weekend market visits.", address: "104 Phahonyothin Rd / 2-min walk from MRT Kamphaeng Phet.", url: "https://www.trip.com/t/UFRdwZl5nT2?locale=en_xx&curr=USD" },
                        { name: "Josh Hotel", feature: "A must-visit retro boutique hotel for Instagrammers! Mint green pool and American retro decor, photogenic everywhere.", address: "19/2 Ari Soi 4 (Nua) / 8-min walk from BTS Ari.", url: "https://www.trip.com/t/i7YYp6m5nT2?locale=en_xx&curr=USD" },
                        { name: "Vibe Hotel Bangkok", feature: "Vibrant young brand with colorful and stylish design. Very close to Chatuchak and the BTS station.", address: "59 Phahonyothin Rd / 5-min walk from BTS Sena Nikhom.", url: "https://www.trip.com/t/JQAfnhm5nT2?locale=en_xx&curr=USD" }
                    ],
                    "Budget Hotels": [
                        { name: "Suda Palace Hotel", feature: "Leans toward old-school Thai style, but located right by the popular Saphan Khwai station at extremely cheap rates.", address: "245 Pradiphat Rd / 5-min walk from BTS Saphan Khwai.", url: "https://www.trip.com/t/62ni8Un5nT2?locale=en_xx&curr=USD" },
                        { name: "The Yard Bangkok", feature: "Originally a famous hostel. Its private rooms use container houses surrounded by greenery. Super chill vibe.", address: "51 Phahonyothin Soi 5 / 8-min walk from BTS Ari.", url: "https://www.trip.com/t/pg73Tso5nT2?locale=en_xx&curr=USD" },
                        { name: "Craftsman Bangkok", feature: "Despite the budget price, it offers high-quality decor and a stunning pool. The Baby Bar downstairs is a popular photo spot.", address: "34-36 Phahonyothin Soi 11 / Suggest taking a Tuk-Tuk or taxi to arrive.", url: "https://www.trip.com/t/I41bOZp5nT2?locale=en_xx&curr=USD" }
                    ],
                    "Hostels": [
                        { name: "Bed to Bangkok", feature: "Walking distance to Chatuchak Market! Pure white minimalist design with a comfortable public reading and workspace.", address: "1021/1 Phahonyothin Rd / 5-min walk from BTS Mo Chit.", url: "https://www.trip.com/t/ch9YKfq5nT2?locale=en_xx&curr=USD" },
                        { name: "Udee Bangkok Hostel", feature: "Cozy hostel converted from an old house. Provides simple yet delicious homemade Thai breakfast. Feels like staying at a local friend's home.", address: "49 Pradiphat Soi 19 / 12-min walk from BTS Saphan Khwai.", url: "https://www.trip.com/t/d8cPKCr5nT2?locale=en_xx&curr=USD" }
                    ]
                }
            }
        };

        const districtContainer = document.getElementById('district-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const contentArea = document.getElementById('content-area');
        
        let currentDistrictKey = null;
        let currentCategoryName = null;

        const categoriesList = ["5-Star Hotels", "Budget Hotels", "Hostels"];

        // 1. Initialize district buttons
        function initDistrictButtons() {
            Object.keys(hotelData).forEach(key => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-3 rounded-lg font-bold text-sm transition-all duration-200 border area-btn-inactive`;
                btn.innerText = hotelData[key].name;
                btn.onclick = () => selectDistrict(key, btn);
                districtContainer.appendChild(btn);
            });
        }

        // 2. Select district
        function selectDistrict(key, activeBtn) {
            currentDistrictKey = key;

            // Update area button styling
            const allBtns = districtContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('area-btn-active');
                btn.classList.add('area-btn-inactive');
            });
            activeBtn.classList.remove('area-btn-inactive');
            activeBtn.classList.add('area-btn-active');

            // Show category buttons
            categoryContainer.classList.remove('hidden');
            renderCategoryButtons();
        }

        // 3. Render category buttons
        function renderCategoryButtons() {
            categoryContainer.innerHTML = '';
            
            categoriesList.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `px-4 py-2 rounded-lg font-bold text-sm transition-all duration-200 border cat-btn-inactive`;
                btn.innerText = cat;
                btn.onclick = () => selectCategory(cat, btn);
                categoryContainer.appendChild(btn);
            });

            // Default click the first category (5-Star Hotels)
            const firstCatBtn = categoryContainer.querySelector('button');
            if(firstCatBtn) {
                selectCategory(categoriesList[0], firstCatBtn);
            }
        }

        // 4. Select category and render hotel list
        function selectCategory(categoryName, activeBtn) {
            currentCategoryName = categoryName;

            // Update category button styling
            const allBtns = categoryContainer.querySelectorAll('button');
            allBtns.forEach(btn => {
                btn.classList.remove('cat-btn-active');
                btn.classList.add('cat-btn-inactive');
            });
            activeBtn.classList.remove('cat-btn-inactive');
            activeBtn.classList.add('cat-btn-active');

            renderHotels();
        }

        // 5. Render hotels to content area
        function renderHotels() {
            const districtData = hotelData[currentDistrictKey];
            const hotels = districtData.categories[currentCategoryName] || [];

            let htmlContent = `
                <div class="flex items-center mb-6 border-b pb-4 border-slate-200">
                    <h2 class="text-2xl font-bold text-slate-800 mr-3">📍 ${districtData.name}</h2>
                    <span class="px-3 py-1 bg-blue-100 text-blue-800 text-sm font-bold rounded-full">${currentCategoryName}</span>
                </div>
            `;

            if (hotels.length === 0) {
                htmlContent += `<p class="text-slate-500 py-10 text-center">No recommendations available in this category currently.</p>`;
            } else {
                htmlContent += `<div class="space-y-4">`;
                
                hotels.forEach((hotel, index) => {
                    // Check if URL exists for the button
                    const linkTagHTML = hotel.url 
                        ? `<a href="${hotel.url}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center px-3 py-1 mt-1 sm:mt-0 rounded-md text-xs font-bold bg-blue-600 text-white hover:bg-blue-700 transition-colors shadow-sm cursor-pointer ml-0 sm:ml-3">
                               <svg class="mr-1 h-3.5 w-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                               View Hotel Details
                           </a>`
                        : `<span class="inline-flex items-center px-3 py-1 mt-1 sm:mt-0 rounded-md text-xs font-bold bg-slate-200 text-slate-500 ml-0 sm:ml-3">
                               View Hotel Details
                           </span>`;

                    htmlContent += `
                        <div class="bg-slate-50 border border-slate-200 p-5 rounded-lg hover:shadow-md transition-shadow duration-200 group">
                            <div class="flex flex-col sm:flex-row sm:items-center justify-start mb-4">
                                <h4 class="text-lg font-bold text-slate-800 flex items-center">
                                    <span class="text-blue-500 font-mono text-base mr-2">${index + 1}.</span> 
                                    ${hotel.name}
                                </h4>
                                ${linkTagHTML}
                            </div>
                            <div class="pl-6 space-y-3">
                                <p class="text-sm text-slate-600 leading-relaxed">
                                    <span class="font-bold text-slate-700 bg-blue-50 px-1.5 py-0.5 rounded mr-1">Features</span> ${hotel.feature}
                                </p>
                                <p class="text-sm text-slate-600 leading-relaxed">
                                    <span class="font-bold text-slate-700 bg-slate-200 px-1.5 py-0.5 rounded mr-1">Address / Transport</span> ${hotel.address}
                                </p>
                            </div>
                        </div>
                    `;
                });
                
                htmlContent += `</div>`;
            }

            contentArea.innerHTML = htmlContent;
        }

        // Initialize on DOM ready
        document.addEventListener('DOMContentLoaded', () => {
            initDistrictButtons();
            
            // Default select the first district (Siam)
            const firstDistrictBtn = districtContainer.querySelector('button');
            if(firstDistrictBtn) {
                selectDistrict('siam', firstDistrictBtn);
            }
        });
    </script>
</body>
