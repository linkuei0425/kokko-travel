                    "cafe": [
                        { name: "Cheongsudang", feature: "Ikseon-dong's most famous stunning cafe! Entrance features a pond and bamboo lantern landscaping. Full of Japanese Zen and Hanok vibes. Signature is freshly baked soufflé and matcha desserts.", address: "31-9 Donhwamun-ro 11na-gil, Jongno-gu, Seoul / Inside Ikseon-dong Hanok Village" },
                        { name: "Seoul Coffee (Ikseondong)", feature: "Retro cafe retaining traditional Hanok structure. Most famous for 'Vienna Butter Bread' sandwiching a thick block of butter and red bean paste, and cube ice cream.", address: "33-3 Supyo-ro 28-gil, Jongno-gu, Seoul / Inside Ikseon-dong Hanok Village" },
                        { name: "Onsu Gonggan", feature: "Hanok dessert shop themed around a hot bathhouse. Elegant vintage decor. They combine traditional Korean pastries with modern French dessert techniques. Exquisite and photogenic.", address: "31-8 Donhwamun-ro 11na-gil, Jongno-gu, Seoul / Inside Ikseon-dong Hanok Village" }
                    ],
                    "street_food": [
                        { name: "Gwangjang Market Mayak Gimbap", feature: "Gwangjang Market must-eat! Bite-sized gimbap brushed with sesame oil. Dipped in special mustard soy sauce (Mayak/Drug sauce), making you unable to stop eating.", address: "88 Changgyeonggung-ro, Jongno-gu, Seoul / Gwangjang Market Main Road" },
                        { name: "Jongno 3-ga Pojangmacha Street", feature: "One of Seoul's largest street food stall gatherings! At night, the whole street lights up with orange lights, selling stir-fries, udon, and seafood. Very K-drama vibe.", address: "Donhwamun-ro 11-gil, Jongno-gu, Seoul / Outside Jongno 3-ga Station Exits 3, 4, 6" },
                        { name: "Insadong Dragon's Beard Candy & Poop Bread", feature: "Traditional specialty snacks on Insadong's main street. Watch masters perform making pulled sugar Dragon's Beard Candy, and funny poop-shaped baked bread filled with red bean or chocolate.", address: "Insadong-gil, Jongno-gu, Seoul / Insadong Pedestrian Street" }
                    ]
                }
            },
            "dongdaemun": {
                name: "Dongdaemun / Hyehwa",
                categories: {
                    "bbq": [
                        { name: "Yukjeon Sikdang (Dongdaemun Main)", feature: "Synonymous with Seoul's super thick BBQ! Astounding pork belly thickness. Staff uses a thermometer for precise grilling. Meat juices burst in the mouth. Myeongi leaf wrap is a must.", address: "16 Nangye-ro 30-gil, Dongdaemun-gu, Seoul / 3 mins from Sinseol-dong Station" },
                        { name: "Daetongryeong BBQ", feature: "Famous Dongdaemun BBQ. Biggest feature is roasting pork belly inside 'bamboo tubes' in a high-temp kiln, giving the pork a faint bamboo fragrance and reducing greasiness.", address: "249-24 Jangchungdan-ro, Jung-gu, Seoul / Dongdaemun History & Culture Park Station" },
                        { name: "Daehak-ro Hyehwa BBQ Area", feature: "Near Sungkyunkwan University. Many affordable, large-portion BBQ places loved by students. Marinated pork ribs and grilled beef brisket are mainstream.", address: "Daehak-ro, Jongno-gu, Seoul / Hyehwa Station Area" }
                    ],
                    "chicken": [
                        { name: "Myeongdong Dak Hanmari (Dongdaemun)", feature: "A strong competitor located right next to Jin Ok-hwa! Broth is equally sweet. Advantage is generous side dishes like gizzards, and you avoid the overly crazy queues.", address: "14 Jongno 40ga-gil, Jongno-gu, Seoul / Inside Dongdaemun Dak Hanmari Alley" },
                        { name: "Gongneung One Bird (Dongdaemun)", feature: "Dongdaemun branch of another famous Dak Hanmari. Their soul lies in the garlic aroma and special dipping sauce. The final egg seaweed porridge is unmissable.", address: "20 Jongno 40ga-gil, Jongno-gu, Seoul / Inside Dongdaemun Dak Hanmari Alley" },
                        { name: "Hyehwa Daehak-ro Samgyetang", feature: "Cozy old shop loved by local students and professors. Glutinous rice in the samgyetang is stewed extremely soft. Environment is quieter and more comfortable than tourist areas.", address: "258-4 Changgyeonggung-ro, Jongno-gu, Seoul / Near Hyehwa Station" }
                    ],
                    "traditional": [
                        { name: "Hyehwa Stone Uncle Pizza", feature: "Daehak-ro legendary food! Called a pizza place, but the craziest part is ordering a wood-fired cheese pizza gets you a large pot of 'Korean Cheese Tteokbokki' and Shin Ramyun. East meets West.", address: "129-8 Daehak-ro, Jongno-gu, Seoul / 2 mins from Hyehwa Station" },
                        { name: "Donghwa Banjum (Jajangmyeon)", feature: "Historic Chinese-Korean restaurant in Dongdaemun open late. A must-eat after shopping the wholesale markets! Rich black bean sauce noodles and crispy sweet & sour pork.", address: "282-1 Jangchungdan-ro, Jung-gu, Seoul / Dongdaemun History & Culture Park Station" },
                        { name: "Kyochon Chicken (Dongdaemun No.1)", feature: "Though a chain, this Dongdaemun branch is open 24/7 and is huge! Half-and-half chicken (Honey/Kyochon Spicy) with cold beer is the king of late-night snacks.", address: "2F, 294 Jongno, Jongno-gu, Seoul / Dongdaemun Station Exit 6" }
                    ],
                    "cafe": [
                        { name: "Hakrim Dabang", feature: "Seoul's oldest existing cafe (founded 1956), filming location for 'My Love from the Star'. Retro vinyl records and old leather sofas. Signature is Vienna Coffee.", address: "2F, 119 Daehak-ro, Jongno-gu, Seoul / 1 min from Hyehwa Station" },
                        { name: "DDP Design Cafes", feature: "Located inside Dongdaemun Design Plaza (DDP). Spaces full of futuristic and streamlined design. Perfect for enjoying minimalist modern desserts after viewing exhibitions.", address: "281 Eulji-ro, Jung-gu, Seoul / Inside DDP building" },
                        { name: "Naksan Park View Cafes", feature: "Walking up the city wall behind Hyehwa Station leads to Naksan Park. Many tranquil cafes here offer views of Seoul's nightscape and Seoul Tower. Extremely romantic vibe.", address: "Naksan-gil Area, Jongno-gu, Seoul / Next to Naksan Park City Wall" }
                    ],
                    "street_food": [
                        { name: "DDP Street Food Stalls", feature: "Energy source for late-night wholesale buyers! Tents around DDP sell piping hot gimbap, tteokbokki, fish cake soup, and fried hotdogs. Gets livelier as the night deepens.", address: "Around 281 Eulji-ro, Jung-gu, Seoul / Around DDP and Wholesale Markets" },
                        { name: "Daehak-ro Chicken Skewers & Hotteok", feature: "Common student snacks outside Hyehwa Station exits. Giant skewers with special sauce and fried hotteok filled with brown sugar and nuts. Friendly prices.", address: "Daehak-ro, Jongno-gu, Seoul / Hyehwa Station Exits to Main Street" },
                        { name: "Gwanghui-dong Russian/Central Asian Snacks", feature: "Exotic district behind Dongdaemun. Find hidden meat skewers, naan bread, and Central Asian desserts here. A unique street food experience in Seoul.", address: "Gwanghui-dong, Jung-gu, Seoul / Next to Dongdaemun History & Culture Park Station" }
                    ]
                }
            }
        };

        // Custom Categories adapted for Seoul
        const categoriesMap = {
            "bbq": { name: "🥩 Korean BBQ", color: "bg-red-100 text-red-800 hover:bg-red-600 hover:text-white border-red-400" },
            "chicken": { name: "🍗 Samgyetang & Chicken", color: "bg-amber-100 text-amber-800 hover:bg-amber-600 hover:text-white border-amber-400" },
            "traditional": { name: "🍲 Traditional & Stews", color: "bg-orange-100 text-orange-800 hover:bg-orange-600 hover:text-white border-orange-400" },
            "cafe": { name: "☕ Aesthetic Cafes", color: "bg-rose-100 text-rose-800 hover:bg-rose-600 hover:text-white border-rose-400" },
            "street_food": { name: "🍢 Street & Market Food", color: "bg-purple-100 text-purple-800 hover:bg-purple-600 hover:text-white border-purple-400" }
        };

        let currentRegion = "";
        let currentCategory = "";

        // Elements
        const regionContainer = document.getElementById('region-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const categorySection = document.getElementById('category-section');
        const contentArea = document.getElementById('content-area');

        // Render Regions
        function initRegions() {
            Object.keys(db).forEach(key => {
                const btn = document.createElement('button');
                btn.className = "whitespace-nowrap px-4 py-2 rounded-full border border-gray-300 bg-white text-gray-700 font-medium hover:bg-rose-600 hover:text-white hover:border-rose-600 transition-colors shadow-sm";
                btn.innerText = db[key].name;
                btn.onclick = () => selectRegion(key, btn);
                regionContainer.appendChild(btn);
            });
        }

        // Render Categories
        function initCategories() {
            Object.keys(categoriesMap).forEach(key => {
                const config = categoriesMap[key];
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-4 py-2 rounded-full border transition-all font-medium ${config.color}`;
                btn.innerText = config.name;
                btn.onclick = () => selectCategory(key, btn);
                categoryContainer.appendChild(btn);
            });
        }

        function selectRegion(regionKey, clickedBtn) {
            currentRegion = regionKey;
            
            // Highlight active region
            Array.from(regionContainer.children).forEach(btn => {
                btn.classList.remove('bg-rose-600', 'text-white', 'border-rose-600');
                btn.classList.add('bg-white', 'text-gray-700');
            });
            clickedBtn.classList.remove('bg-white', 'text-gray-700', 'hover:bg-rose-600');
            clickedBtn.classList.add('bg-rose-600', 'text-white', 'border-rose-600');

            // Show category section
            categorySection.classList.remove('hidden');
            categorySection.classList.add('fade-in');
            
            // Auto select first category if none selected
            if(!currentCategory) {
                const firstCatBtn = categoryContainer.children[0];
                selectCategory('bbq', firstCatBtn);
            } else {
                renderContent();
            }
        }

        function selectCategory(catKey, clickedBtn) {
            currentCategory = catKey;

            // Highlight active category
            Array.from(categoryContainer.children).forEach(btn => {
                btn.classList.remove('ring-2', 'ring-offset-2', 'ring-rose-500', 'shadow-md', 'scale-105');
                btn.style.opacity = "0.6";
            });
            clickedBtn.classList.add('ring-2', 'ring-offset-2', 'ring-rose-500', 'shadow-md', 'scale-105');
            clickedBtn.style.opacity = "1";

            renderContent();
        }

        function renderContent() {
            contentArea.innerHTML = '';
            const items = db[currentRegion].categories[currentCategory];

            if(!items || items.length === 0) {
                contentArea.innerHTML = `<p class="col-span-full text-center py-8 text-gray-500">No data available for this category.</p>`;
                return;
            }

            items.forEach((item, index) => {
                // Generate Google Maps URL (Focus query on Seoul)
                const encodedQuery = encodeURIComponent(`${item.name} Seoul ${item.address.split('/')[0]}`);
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;

                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col fade-in hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1";
                card.style.animationDelay = `${index * 0.08}s`;

                card.innerHTML = `
                    <div class="p-6 flex-grow">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-xl font-bold text-gray-800 leading-tight">${item.name}</h3>
                        </div>
                        <p class="text-gray-600 text-sm mb-5 leading-relaxed tracking-wide"><span class="font-bold text-rose-700 bg-rose-50 px-2 py-0.5 rounded mr-1">Feature</span>${item.feature}</p>
                        
                        <div class="bg-gray-50/80 p-3.5 rounded-xl flex items-start gap-3 border border-gray-100">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-rose-600 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <p class="text-sm text-gray-600 leading-tight font-medium"><span class="font-bold text-rose-800">Address: </span>${item.address}</p>
                        </div>
                    </div>
                    
                    <div class="px-6 pb-6 mt-auto">
                        <a href="${mapsUrl}" target="_blank" class="w-full flex items-center justify-center gap-2 btn-nav text-white py-3 rounded-xl font-bold transition-colors shadow-sm hover:shadow-md">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z" clip-rule="evenodd" />
                            </svg>
                            Open Google Maps
                        </a>
                    </div>
                `;
                contentArea.appendChild(card);
            });
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            initRegions();
            initCategories();
        });

    </script>
</body>
</html>
