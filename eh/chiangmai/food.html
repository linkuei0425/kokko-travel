                        { name: "Strawberry Farms", feature: "Roads to Mon Jam are lined with farms offering fresh strawberry shakes and slightly tart fresh strawberries with sugar dip.", address: "Mon Jam Road" }
                    ],
                    "cafe": [
                        { name: "The Ironwood", feature: "A glasshouse garden cafe deep in the woods. Vintage European decor and ferns everywhere. Truly magical atmosphere.", address: "Mae Rim - Samoeng Rd / Hidden path, charter required" },
                        { name: "WTG (Woo Cafe Mae Rim)", feature: "The flagship branch of Woo Cafe in the mountains. Massive grounds, art lifestyle goods, and equally massive cakes.", address: "Mae Rim Main Rd / Grab recommended" },
                        { name: "WTG Mae Rim", feature: "Floor-to-ceiling windows facing paddy fields and mountains. Wooden tones and premium estate pour-over coffee.", address: "Mae Rim area / Charter recommended" }
                    ],
                    "rooftop_seafood": [
                        { name: "Mon Jam Viewpoint", feature: "The ultimate 'Mountain Rooftop'! Grab a beer on the cliff edge at 1000m altitude and space out watching the sea of clouds and terraces.", address: "Mon Jam Summit / Drive or charter up" },
                        { name: "Pongyang Jungle Coaster & Zipline", feature: "After riding the coaster, dine at their scenic restaurant suspended over the valley gorge with epic forest views.", address: "Mae Rim - Samoeng Rd / Charter required" },
                        { name: "Mae Rim River Seafood", feature: "Despite being in the mountains, garden restaurants on the main road breed live river prawns for fresh charcoal grilling.", address: "Route 107 / Charter recommended" }
                    ]
                }
            },
            "hangdong": {
                name: "Hang Dong",
                categories: {
                    "michelin": [
                        { name: "Khaomao-Khaofang", feature: "Michelin recommended for years. Feels like a real rainforest with waterfalls. High-level Northern Thai and seafood.", address: "Ratchaphruek Rd / Grab (takes 20-30 mins)" },
                        { name: "Han Tueng Chiang Mai", feature: "Traditional Northern food near the arts village using local wild herbs. Great fried veggie platter and rich curries.", address: "Near Baan Kang Wat / Grab recommended" },
                        { name: "Nics Restaurant & Playground", feature: "Very popular family-friendly restaurant offering Thai-Western fusion. Features a giant bamboo playground.", address: "Hang Dong Rd / Grab recommended" }
                    ],
                    "greenbowl": [
                        { name: "Tuptim Grob", feature: "Historic dessert shop. Giant, chewy 'Red Ruby' (water chestnuts in tapioca) in crushed ice and coconut milk. Perfect ending.", address: "Chiang Mai-Hang Dong Rd / Grab recommended" },
                        { name: "Khao Soi Mae Malai", feature: "Local favorite on the way south. Broth has a strong red curry aroma, served with generous pickled greens.", address: "Hang Dong Main Road / Ride recommended" },
                        { name: "Moo Kratha (BBQ Buffets)", feature: "Hang Dong has massive open-air Thai BBQ buffets where you can eat unlimited meat and veggies for under 200 THB.", address: "Hang Dong Area" }
                    ],
                    "dessert": [
                        { name: "Baan Kang Wat Desserts", feature: "Stilt wooden houses in the arts village sell handmade pound cakes, puddings, and drip coffee with an artisan vibe.", address: "191-197 Soi Wat Umong / Grab to Baan Kang Wat" },
                        { name: "Obchoei Original Homemade", feature: "Famous bakery in the arts village. The smell of fresh cinnamon rolls and croissants fills the wooden houses.", address: "Inside Baan Kang Wat / Walk" },
                        { name: "Carp Cafe", feature: "Built directly over a massive koi pond! Enjoy Thai desserts while feeding swarms of huge, vibrant koi fish.", address: "118/2 Moo 1, Hang Dong / Grab recommended" }
                    ],
                    "cafe": [
                        { name: "Daddy's Antique Cafe", feature: "Looks like a European castle filled with antique clocks from Europe. Offers premium pour-overs and brunch.", address: "45/8 Moo 1, Mae Hia / Grab recommended" },
                        { name: "The Baristro at Ping River", feature: "Concrete minimalist design by the quiet downstream river. Pure and tranquil space perfect for photography.", address: "Wang Sing Kham Rd / Grab recommended" },
                        { name: "No.39 Cafe (Wat Umong Area)", feature: "While the main branch is in Suthep, the alleys around the arts village feature similar slow-paced, pond-side wooden cabins.", address: "Wat Umong alleys" }
                    ],
                    "rooftop_seafood": [
                        { name: "Good View Village", feature: "Huge Hang Dong branch of the famous city restaurant. Massive garden and lake, lively night atmosphere, and epic seafood.", address: "Mae Hia / Grab recommended" },
                        { name: "Chom Cafe and Restaurant", feature: "Famous for its Alice in Wonderland mist forest! Giant trees and water misters create breathtaking fairy-tale photos.", address: "Somphot Chiang Mai 700 Pi Rd / Grab recommended" },
                        { name: "Pha Cho (Grand Canyon)", feature: "Further south in Hang Dong. Climb the viewpoint to see the bizarre red clay pillars and national park forest.", address: "Mae Wang National Park / Half-day charter required" }
                    ]
                }
            }
        };

        const categoriesMap = {
            "michelin": { name: "🌟 Michelin Guide", color: "bg-rose-100 text-rose-700 hover:bg-rose-600 hover:text-white border-rose-500" },
            "greenbowl": { name: "🟢 Green Bowl", color: "bg-emerald-100 text-emerald-700 hover:bg-emerald-600 hover:text-white border-emerald-500" },
            "dessert": { name: "🍧 Desserts & Drinks", color: "bg-amber-100 text-amber-700 hover:bg-amber-500 hover:text-white border-amber-500" },
            "cafe": { name: "☕ Cafes", color: "bg-orange-100 text-orange-800 hover:bg-orange-600 hover:text-white border-orange-600" },
            "rooftop_seafood": { name: "🍸 Rooftop & Popular", color: "bg-indigo-100 text-indigo-700 hover:bg-indigo-600 hover:text-white border-indigo-500" }
        };

        let currentRegion = "";
        let currentCategory = "";

        // Elements
        const regionContainer = document.getElementById('region-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const categorySection = document.getElementById('category-section');
        const contentArea = document.getElementById('content-area');

        // Render Regions
        function initRegions() {
            Object.keys(db).forEach(key => {
                const btn = document.createElement('button');
                btn.className = "whitespace-nowrap px-4 py-2 rounded-full border border-gray-300 bg-white text-gray-700 font-medium hover:bg-teal-600 hover:text-white hover:border-teal-600 transition-colors shadow-sm";
                btn.innerText = db[key].name;
                btn.onclick = () => selectRegion(key, btn);
                regionContainer.appendChild(btn);
            });
        }

        // Render Categories
        function initCategories() {
            Object.keys(categoriesMap).forEach(key => {
                const config = categoriesMap[key];
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-4 py-2 rounded-full border transition-all font-medium ${config.color}`;
                btn.innerText = config.name;
                btn.onclick = () => selectCategory(key, btn);
                categoryContainer.appendChild(btn);
            });
        }

        function selectRegion(regionKey, clickedBtn) {
            currentRegion = regionKey;
            
            // Highlight active region
            Array.from(regionContainer.children).forEach(btn => {
                btn.classList.remove('bg-teal-600', 'text-white', 'border-teal-600');
                btn.classList.add('bg-white', 'text-gray-700');
            });
            clickedBtn.classList.remove('bg-white', 'text-gray-700', 'hover:bg-teal-600');
            clickedBtn.classList.add('bg-teal-600', 'text-white', 'border-teal-600');

            // Show category section
            categorySection.classList.remove('hidden');
            categorySection.classList.add('fade-in');
            
            // Auto select first category if none selected
            if(!currentCategory) {
                const firstCatBtn = categoryContainer.children[0];
                selectCategory('michelin', firstCatBtn);
            } else {
                renderContent();
            }
        }

        function selectCategory(catKey, clickedBtn) {
            currentCategory = catKey;

            // Highlight active category
            Array.from(categoryContainer.children).forEach(btn => {
                btn.classList.remove('ring-2', 'ring-offset-2', 'ring-teal-500', 'shadow-md', 'scale-105');
                btn.style.opacity = "0.6";
            });
            clickedBtn.classList.add('ring-2', 'ring-offset-2', 'ring-teal-500', 'shadow-md', 'scale-105');
            clickedBtn.style.opacity = "1";

            renderContent();
        }

        function renderContent() {
            contentArea.innerHTML = '';
            const items = db[currentRegion].categories[currentCategory];

            if(!items || items.length === 0) {
                contentArea.innerHTML = `<p class="col-span-full text-center py-8 text-gray-500">No data available for this category.</p>`;
                return;
            }

            items.forEach((item, index) => {
                // Generate Google Maps URL (Focus query on Chiang Mai)
                const encodedQuery = encodeURIComponent(`${item.name} Chiang Mai`);
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;

                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col fade-in hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1";
                card.style.animationDelay = `${index * 0.08}s`;

                card.innerHTML = `
                    <div class="p-6 flex-grow">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-xl font-bold text-gray-800 leading-tight">${item.name}</h3>
                        </div>
                        <p class="text-gray-600 text-sm mb-5 leading-relaxed tracking-wide"><span class="font-bold text-teal-700 bg-teal-50 px-2 py-0.5 rounded mr-1">Highlight</span>${item.feature}</p>
                        
                        <div class="bg-gray-50/80 p-3.5 rounded-xl flex items-start gap-3 border border-gray-100">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-teal-600 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <p class="text-sm text-gray-600 leading-tight font-medium">${item.address}</p>
                        </div>
                    </div>
                    
                    <div class="px-6 pb-6 mt-auto">
                        <a href="${mapsUrl}" target="_blank" class="w-full flex items-center justify-center gap-2 btn-nav text-white py-3 rounded-xl font-bold transition-colors shadow-sm hover:shadow-md">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z" clip-rule="evenodd" />
                            </svg>
                            Open in Google Maps
                        </a>
                    </div>
                `;
                contentArea.appendChild(card);
            });
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            initRegions();
            initCategories();
        });

    </script>
</body>
</html>
