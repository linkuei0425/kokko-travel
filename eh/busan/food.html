                        { name: "Mokdo Dwaeji Gukbap", feature: "Clear broth style, highly rated by locals. Clean taste with no pork smell, accompanied by generous side dishes.", address: "36 Namhang-ro 31beon-gil, Yeongdo-gu / Yeongdo Namhang-dong" },
                        { name: "Bongnae Dwaeji Gukbap", feature: "Old shop next to Yeongdo Traditional Market. Cheap, large bowls with lots of meat. The best way to experience Yeongdo daily life.", address: "25 Taejong-ro 113beon-gil, Yeongdo-gu / Around Yeongdo Bongnae Market" }
                    ],
                    "seafood": [
                        { name: "Yeongdo Haenyeo Village", feature: "The most authentic seafood experience! Sit on coastal rocks and taste fresh sea urchin and sea cucumber paired with gimbap and seafood ramen.", address: "36 Jungnibuk-ro, Yeongdo-gu / Yeongdo Jungni Coast" },
                        { name: "Taejongdae Grilled Clam Village", feature: "Tent street at Taejongdae entrance. Charcoal-grilled fresh scallops and large clams covered in cheese and butter.", address: "830 Taejong-ro, Yeongdo-gu / Taejongdae Entrance" },
                        { name: "Yeongdo Hagfish Alley", feature: "Under Namhang Bridge, you'll find old shops specializing in spicy iron-plate hagfish. The flavors are heavier and more authentic than tourist areas.", address: "Namhang-ro, Yeongdo-gu / Under Namhang Bridge" }
                    ],
                    "bbq": [
                        { name: "Yeongdo Open-air Black Pork", feature: "Some hillside restaurants offer open-air Jeju black pork BBQ, letting you eat meat while enjoying the Yeongdo Bridge night view.", address: "39 Jonaegi-ro, Yeongdo-gu / Yeongdo Hillside" },
                        { name: "Mongmyeon", feature: "Popular local BBQ shop in Yeongdo. Offers thick-cut pork belly and neck, served with characteristic Korean cold noodles to refresh the palate.", address: "300 Taejong-ro, Yeongdo-gu / Yeongdo City Center" },
                        { name: "Taejongdae Charcoal Ribs", feature: "Energy recharge after Taejongdae! Specializes in secret sauce charcoal-grilled pork ribs. Sweet and tender, very popular with families.", address: "836 Taejong-ro, Yeongdo-gu / Taejongdae Entrance Area" }
                    ],
                    "cafe": [
                        { name: "Sinki Industry", feature: "Industrial style cafe converted from an old factory. The top floor offers excellent panoramic views of Busan Port and the bridge.", address: "2 Wachi-ro 51beon-gil, Yeongdo-gu / Yeongdo Hillside" },
                        { name: "Aether", feature: "Pure white Greek-style cafe in Huinnyeoul Culture Village. Built along the cliff, the curved terrace provides unobstructed ocean views.", address: "234 Jeoryeong-ro, Yeongdo-gu / Huinnyeoul Culture Village" },
                        { name: "P.ARK", feature: "Busan's largest ocean view cafe and cultural space! Built like a giant cruise ship, the tiered seating lets you watch the sea without blind spots.", address: "180 Haeyang-ro 195beon-gil, Yeongdo-gu / Yeongdo Dongsam-dong Coast" }
                    ],
                    "street_food": [
                        { name: "Samjin Amook (Yeongdo Main Store)", feature: "The birthplace of Korea's oldest fish cake brand. Displays dozens of fried fish cakes like a bakery, and offers hands-on workshops.", address: "36 Taejong-ro 99beon-gil, Yeongdo-gu / Next to Yeongdo Bongnae Market" },
                        { name: "Huinnyeoul Ice Cream & Drinks", feature: "While walking along the cliff path, many small windows sell cute ice cream and dreamy gradient sparkling drinks.", address: "242 Jeoryeong-ro, Yeongdo-gu / Huinnyeoul Culture Village Path" },
                        { name: "Yeongdo Tteokbokki Stall", feature: "Traditional stall in Namhang Market. The spicy tteokbokki sauce here is exceptionally thick and has a strong local seafood flavor.", address: "24 Namhangsijang-gil, Yeongdo-gu / Inside Namhang Market" }
                    ]
                }
            }
        };

        // Custom Categories adapted for Busan
        const categoriesMap = {
            "pork_soup": { name: "🍲 Pork Soup & Rice", color: "bg-amber-100 text-amber-800 hover:bg-amber-600 hover:text-white border-amber-400" },
            "seafood": { name: "🦀 Seafood & Clams", color: "bg-sky-100 text-sky-800 hover:bg-sky-600 hover:text-white border-sky-400" },
            "bbq": { name: "🥩 Korean BBQ", color: "bg-red-100 text-red-800 hover:bg-red-600 hover:text-white border-red-400" },
            "cafe": { name: "☕ Scenic Cafes", color: "bg-teal-100 text-teal-800 hover:bg-teal-600 hover:text-white border-teal-400" },
            "street_food": { name: "🍢 Street Food", color: "bg-orange-100 text-orange-800 hover:bg-orange-600 hover:text-white border-orange-400" }
        };

        let currentRegion = "";
        let currentCategory = "";

        // Elements
        const regionContainer = document.getElementById('region-buttons');
        const categoryContainer = document.getElementById('category-buttons');
        const categorySection = document.getElementById('category-section');
        const contentArea = document.getElementById('content-area');

        // Render Regions
        function initRegions() {
            Object.keys(db).forEach(key => {
                const btn = document.createElement('button');
                btn.className = "whitespace-nowrap px-4 py-2 rounded-full border border-gray-300 bg-white text-gray-700 font-medium hover:bg-blue-600 hover:text-white hover:border-blue-600 transition-colors shadow-sm";
                btn.innerText = db[key].name;
                btn.onclick = () => selectRegion(key, btn);
                regionContainer.appendChild(btn);
            });
        }

        // Render Categories
        function initCategories() {
            Object.keys(categoriesMap).forEach(key => {
                const config = categoriesMap[key];
                const btn = document.createElement('button');
                btn.className = `whitespace-nowrap px-4 py-2 rounded-full border transition-all font-medium ${config.color}`;
                btn.innerText = config.name;
                btn.onclick = () => selectCategory(key, btn);
                categoryContainer.appendChild(btn);
            });
        }

        function selectRegion(regionKey, clickedBtn) {
            currentRegion = regionKey;
            
            // Highlight active region
            Array.from(regionContainer.children).forEach(btn => {
                btn.classList.remove('bg-blue-600', 'text-white', 'border-blue-600');
                btn.classList.add('bg-white', 'text-gray-700');
            });
            clickedBtn.classList.remove('bg-white', 'text-gray-700', 'hover:bg-blue-600');
            clickedBtn.classList.add('bg-blue-600', 'text-white', 'border-blue-600');

            // Show category section
            categorySection.classList.remove('hidden');
            categorySection.classList.add('fade-in');
            
            // Auto select first category if none selected
            if(!currentCategory) {
                const firstCatBtn = categoryContainer.children[0];
                selectCategory('pork_soup', firstCatBtn);
            } else {
                renderContent();
            }
        }

        function selectCategory(catKey, clickedBtn) {
            currentCategory = catKey;

            // Highlight active category
            Array.from(categoryContainer.children).forEach(btn => {
                btn.classList.remove('ring-2', 'ring-offset-2', 'ring-blue-500', 'shadow-md', 'scale-105');
                btn.style.opacity = "0.6";
            });
            clickedBtn.classList.add('ring-2', 'ring-offset-2', 'ring-blue-500', 'shadow-md', 'scale-105');
            clickedBtn.style.opacity = "1";

            renderContent();
        }

        function renderContent() {
            contentArea.innerHTML = '';
            const items = db[currentRegion].categories[currentCategory];

            if(!items || items.length === 0) {
                contentArea.innerHTML = `<p class="col-span-full text-center py-8 text-gray-500">No data available for this category yet.</p>`;
                return;
            }

            items.forEach((item, index) => {
                // Generate Google Maps URL (Focus query on Busan)
                const encodedQuery = encodeURIComponent(`${item.name} Busan ${item.address.split('/')[0]}`);
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodedQuery}`;

                const card = document.createElement('div');
                card.className = "bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col fade-in hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1";
                card.style.animationDelay = `${index * 0.08}s`;

                card.innerHTML = `
                    <div class="p-6 flex-grow">
                        <div class="flex justify-between items-start mb-3">
                            <h3 class="text-xl font-bold text-gray-800 leading-tight">${item.name}</h3>
                        </div>
                        <p class="text-gray-600 text-sm mb-5 leading-relaxed tracking-wide"><span class="font-bold text-blue-700 bg-blue-50 px-2 py-0.5 rounded mr-1">Highlight</span>${item.feature}</p>
                        
                        <div class="bg-gray-50/80 p-3.5 rounded-xl flex items-start gap-3 border border-gray-100">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-blue-600 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                            <p class="text-sm text-gray-600 leading-tight font-medium"><span class="font-bold text-blue-800">Address: </span>${item.address}</p>
                        </div>
                    </div>
                    
                    <div class="px-6 pb-6 mt-auto">
                        <a href="${mapsUrl}" target="_blank" class="w-full flex items-center justify-center gap-2 btn-nav text-white py-3 rounded-xl font-bold transition-colors shadow-sm hover:shadow-md">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                <path fill-rule="evenodd" d="M12 1.586l-4 4v12.828l4-4V1.586zM3.707 3.293A1 1 0 002 4v10a1 1 0 00.293.707L6 18.414V5.586L3.707 3.293zM17.707 5.293L14 1.586v12.828l2.293 2.293A1 1 0 0018 16V6a1 1 0 00-.293-.707z" clip-rule="evenodd" />
                            </svg>
                            Open Google Maps
                        </a>
                    </div>
                `;
                contentArea.appendChild(card);
            });
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            initRegions();
            initCategories();
        });

    </script>
</body>
</html>
